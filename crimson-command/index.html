    const tileOk = terrain[i] === T_GROUND && !blockedG[i];
    ctx.fillStyle = ok ? "rgba(70,224,138,0.3)" : tileOk ? "rgba(255,74,74,0.18)" : "rgba(255,74,74,0.42)";
    ctx.fillRect(x * TILE + 1, y * TILE + 1, TILE - 2, TILE - 2);
  }
  ctx.strokeStyle = ok ? "#46e08a" : "#ff4a4a";
  ctx.setLineDash([6, 4]);
  ctx.strokeRect(tx * TILE + 1.5, ty * TILE + 1.5, def.w * TILE - 3, def.h * TILE - 3);
  ctx.setLineDash([]);
  ctx.fillStyle = ok ? "#bfffd9" : "#ffc2c2";
  ctx.font = "10px 'Courier New', monospace";
  ctx.textAlign = "center";
  ctx.fillText(def.name + "  $" + def.cost, (tx + def.w / 2) * TILE, ty * TILE - 5);
}

/* ---------------- §W HUD / SIDEBAR ---------------- */
let dispCredits = 0;

function drawButton(btn) {
  const isB = btn.kind === "build";
  const def = isB ? BUILDINGS[btn.key] : UNITS[btn.key];
  const afford = G.credits[0] >= def.cost;
  let prereqOk = true, prog = 0, queued = 0;
  if (!isB) {
    prereqOk = hasBld(0, def.from);
    const q = G.queues[0][def.from];
    for (let i = 0; i < q.length; i++) if (q[i].key === btn.key) queued++;
    if (q.length && q[0].key === btn.key) prog = 1 - q[0].t / def.time;
  }
  const hot = placing === btn.key;
  ctx.fillStyle = hot ? "rgba(53,232,255,0.22)" : "rgba(18,18,44,0.95)";
  rr(ctx, btn.x, btn.y, btn.w, btn.h, 4); ctx.fill();
  if (prog > 0) {
    ctx.fillStyle = "rgba(53,232,255,0.3)";
    ctx.fillRect(btn.x + 1, btn.y + 1, (btn.w - 2) * prog, btn.h - 2);
  }
  ctx.strokeStyle = hot ? "#35e8ff" : prereqOk && afford ? "rgba(120,200,230,0.55)" : "rgba(120,130,170,0.25)";
  rr(ctx, btn.x + 0.5, btn.y + 0.5, btn.w - 1, btn.h - 1, 4); ctx.stroke();
  ctx.globalAlpha = prereqOk ? (afford ? 1 : 0.55) : 0.32;
  ctx.fillStyle = "#cfe6ff";
  ctx.font = "9px 'Courier New', monospace";
  ctx.textAlign = "left";
  ctx.fillText(def.name, btn.x + 5, btn.y + 13);
  ctx.fillStyle = CRYS_COL;
  ctx.fillText("$" + def.cost, btn.x + 5, btn.y + Math.min(btn.h - 5, 26));
  if (!prereqOk) {
    ctx.fillStyle = "#ff9a9a";
    ctx.textAlign = "right";
    ctx.fillText("REQ", btn.x + btn.w - 4, btn.y + Math.min(btn.h - 5, 26));
  }
  ctx.globalAlpha = 1;
  if (queued > 0) {
    ctx.fillStyle = "#35e8ff";
    ctx.textAlign = "right";
    ctx.font = "10px 'Courier New', monospace";
    ctx.fillText("x" + queued, btn.x + btn.w - 4, btn.y + 13);
  }
}

function drawSidebar(t) {
  ctx.fillStyle = "#08081c";
  ctx.fillRect(ui.vw, 0, ui.sbw, ch);
  ctx.strokeStyle = "rgba(53,232,255,0.3)";
  ctx.beginPath(); ctx.moveTo(ui.vw + 0.5, 0); ctx.lineTo(ui.vw + 0.5, ch); ctx.stroke();
  /* minimap */
  const m = ui.mm;
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(miniC, m.x, m.y, m.w, m.h);
  ctx.imageSmoothingEnabled = true;
  const kx = m.w / (MAPW * TILE), ky = m.h / (MAPH * TILE);
  for (const b of G.buildings) {
    if (b.dead) continue;
    ctx.fillStyle = TCOL[b.team];
    ctx.fillRect(m.x + b.x * kx - 2, m.y + b.y * ky - 2, 4, 4);
  }
  for (const u of G.units) {
    if (u.dead) continue;
    ctx.fillStyle = u.team === 0 ? (u.d.harvest ? "#9ef7ff" : TCOL[0]) : TCOL[1];
    ctx.fillRect(m.x + u.x * kx - 1, m.y + u.y * ky - 1, 2, 2);
  }
  ctx.strokeStyle = "rgba(255,255,255,0.75)";
  ctx.strokeRect(m.x + camX * kx + 0.5, m.y + camY * ky + 0.5, ui.vw * kx, ch * ky);
  ctx.strokeStyle = "rgba(53,232,255,0.4)";
  ctx.strokeRect(m.x - 0.5, m.y - 0.5, m.w + 1, m.h + 1);
  /* credits + power */
  dispCredits = Math.abs(dispCredits - G.credits[0]) < 2 ? G.credits[0] : lerp(dispCredits, G.credits[0], 0.18);
  ctx.fillStyle = CRYS_COL;
  ctx.font = "bold 15px 'Courier New', monospace";
  ctx.textAlign = "left";
  ctx.fillText("$ " + Math.round(dispCredits), ui.vw + 9, m.y + m.h + 19);
  const pw = ui.sbw - 18, py = m.y + m.h + 26;
  const avail = G.powerAvail[0], used = G.powerUsed[0];
  const over = used > avail;
  ctx.fillStyle = "rgba(0,0,0,0.6)";
  ctx.fillRect(ui.vw + 9, py, pw, 6);
  const fmax = Math.max(avail, used, 1);
  ctx.fillStyle = over ? (Math.sin(t * 8) > 0 ? "#ff4a4a" : "#7e1426") : "#46e08a";
  ctx.fillRect(ui.vw + 9, py, pw * (used / fmax), 6);
  ctx.strokeStyle = "#cfe6ff";
  const mark = ui.vw + 9 + pw * (avail / fmax);
  ctx.beginPath(); ctx.moveTo(mark, py - 2); ctx.lineTo(mark, py + 8); ctx.stroke();
  ctx.fillStyle = over ? "#ff8866" : "#9fb8cc";
  ctx.font = "8px 'Courier New', monospace";
  ctx.fillText("PWR " + used + "/" + avail + (over ? " LOW!" : ""), ui.vw + 9, py + 15);
  /* section labels + buttons */
  ctx.fillStyle = "#7f9cb8";
  ctx.font = "9px 'Courier New', monospace";
  for (const lb of ui.labels) ctx.fillText(lb.text, ui.vw + 9, lb.y + 8);
  for (const btn of ui.btns) drawButton(btn);
}

function drawSelInfo() {
  let lines = null;
  if (sel.length === 1) {
    const u = sel[0];
    lines = [u.d.name, "HP " + Math.ceil(u.hp) + "/" + u.maxHp +
      (u.d.harvest ? "  LOAD " + Math.round(u.carry) + "/" + CONFIG.harvCap : "")];
  } else if (sel.length > 1) {
    const c = {};
    for (const u of sel) c[u.key] = (c[u.key] || 0) + 1;
    let parts = "";
    for (const k in c) parts += (parts ? "  " : "") + c[k] + "x" + UNITS[k].name.split(" ")[0];
    lines = [sel.length + " UNITS SELECTED", parts];
  } else if (selBuilding && !selBuilding.dead) {
    const b = selBuilding;
    lines = [b.d.name, "HP " + Math.ceil(b.hp) + "/" + b.maxHp + (b.done ? "" : "  BUILDING " + ((b.prog * 100) | 0) + "%")];
  }
  if (!lines) return;
  const w = 215, h = 38, x = 8, y = ch - h - 8;
  ctx.fillStyle = "rgba(8,8,28,0.85)";
  rr(ctx, x, y, w, h, 5); ctx.fill();
  ctx.strokeStyle = "rgba(53,232,255,0.35)";
  rr(ctx, x + 0.5, y + 0.5, w - 1, h - 1, 5); ctx.stroke();
  ctx.fillStyle = "#bfefff";
  ctx.textAlign = "left";
  ctx.font = "bold 11px 'Courier New', monospace";
  ctx.fillText(lines[0], x + 8, y + 15);
  ctx.font = "10px 'Courier New', monospace";
  ctx.fillStyle = "#8fb5cc";
  ctx.fillText(lines[1], x + 8, y + 29);
}

function drawHUD(t, rdt) {
  drawSidebar(t);
  drawSelInfo();
  /* timer */
  ctx.fillStyle = "rgba(8,8,28,0.7)";
  ctx.fillRect(8, 8, 62, 18);
  ctx.fillStyle = "#9fb8cc";
  ctx.font = "11px 'Courier New', monospace";
  ctx.textAlign = "left";
  ctx.fillText(fmtTime(G.t), 16, 21);
  /* attack-move hint */
  if (attackArm) {
    ctx.fillStyle = "#ff9a6a";
    ctx.font = "bold 11px 'Courier New', monospace";
    ctx.textAlign = "center";
    ctx.fillText("ATTACK MOVE — 点击目标位置", ui.vw / 2, 40);
    if (mouseX >= 0 && mouseX < ui.vw) {
      ctx.strokeStyle = "#ff9a6a";
      ctx.beginPath(); ctx.arc(mouseX, mouseY, 10, 0, TAU); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(mouseX - 15, mouseY); ctx.lineTo(mouseX - 5, mouseY);
      ctx.moveTo(mouseX + 5, mouseY); ctx.lineTo(mouseX + 15, mouseY);
      ctx.moveTo(mouseX, mouseY - 15); ctx.lineTo(mouseX, mouseY - 5);
      ctx.moveTo(mouseX, mouseY + 5); ctx.lineTo(mouseX, mouseY + 15);
      ctx.stroke();
    }
  }
  /* messages */
  ctx.textAlign = "center";
  ctx.font = "11px 'Courier New', monospace";
  for (let i = messages.length - 1; i >= 0; i--) {
    const mg = messages[i];
    mg.t -= rdt;
    if (mg.t <= 0) { messages.splice(i, 1); continue; }
    ctx.globalAlpha = clamp(mg.t, 0, 1);
    ctx.fillStyle = mg.col;
    ctx.fillText(mg.text, ui.vw / 2, 62 + i * 16);
  }
  ctx.globalAlpha = 1;
  /* selection box */
  if (dragSel && dragSel.moved) {
    ctx.strokeStyle = "rgba(120,255,210,0.9)";
    ctx.fillStyle = "rgba(120,255,210,0.08)";
    const x = Math.min(dragSel.x0, dragSel.x1), y = Math.min(dragSel.y0, dragSel.y1);
    const w = Math.abs(dragSel.x1 - dragSel.x0), h = Math.abs(dragSel.y1 - dragSel.y0);
    ctx.fillRect(x, y, w, h);
    ctx.strokeRect(x + 0.5, y + 0.5, w, h);
  }
}

/* ---------------- §X SCREENS ---------------- */
let titleT = 0;

function helpLines() {
  return touchUI ? [
    "点击选择 · 拖动框选部队 — tap to select, drag to box-select",
    "点地面移动 · 点敌人攻击 — tap ground to move, tap enemy to attack",
    "双指拖动平移 · 点小地图跳转 — two-finger drag pans, tap minimap to jump",
    "侧边栏建造建筑和兵种 — build from the sidebar",
    "采矿车自动采集水晶 — harvesters gather crystals",
    "目标：摧毁敌方所有建筑 — destroy the enemy base",
  ] : [
    "左键框选部队 · 右键移动/攻击 — drag-select, right-click to move/attack",
    "A + 点击 攻击移动 · Ctrl+1-3 编队 — A+click attack-move, ctrl groups",
    "侧边栏建造建筑和兵种 — build from the sidebar",
    "采矿车自动采集水晶 — harvesters gather crystals",
    "目标：摧毁敌方所有建筑 — destroy the enemy base",
    "P 暂停 · M 静音 — pause / mute",
  ];
}

function renderTitle(rdt) {
  titleT += rdt;
  ctx.fillStyle = "#050514";
  ctx.fillRect(0, 0, cw, ch);
  /* drifting grid */
  ctx.strokeStyle = "rgba(53,232,255,0.07)";
  const gs = 48, off = (titleT * 12) % gs;
  ctx.beginPath();
  for (let x = -off; x < cw; x += gs) { ctx.moveTo(x, 0); ctx.lineTo(x, ch); }
  for (let y = -off; y < ch; y += gs) { ctx.moveTo(0, y); ctx.lineTo(cw, y); }
  ctx.stroke();
  /* radar sweep */
  const rx = cw * 0.5, ry = ch * 0.30, rr0 = Math.min(cw, ch) * 0.34;
  ctx.strokeStyle = "rgba(255,43,78,0.16)";
  for (let i = 1; i <= 3; i++) { ctx.beginPath(); ctx.arc(rx, ry, rr0 * i / 3, 0, TAU); ctx.stroke(); }
  const sweep = titleT * 1.1;
  const grad = ctx.createLinearGradient(rx, ry, rx + Math.cos(sweep) * rr0, ry + Math.sin(sweep) * rr0);
  grad.addColorStop(0, "rgba(255,43,78,0)");
  grad.addColorStop(1, "rgba(255,43,78,0.5)");
  ctx.strokeStyle = grad;
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx + Math.cos(sweep) * rr0, ry + Math.sin(sweep) * rr0); ctx.stroke();
  ctx.lineWidth = 1;
  /* title */
  const ts = clamp(cw / 16, 26, 54);
  ctx.textAlign = "center";
  ctx.font = "bold " + ts + "px 'Courier New', monospace";
  ctx.fillStyle = "#ff2b4e";
  ctx.shadowColor = "#ff2b4e"; ctx.shadowBlur = 22;
  ctx.fillText("CRIMSON", cw / 2, ch * 0.22);
  ctx.fillStyle = "#35e8ff";
  ctx.shadowColor = "#35e8ff";
  ctx.fillText("COMMAND", cw / 2, ch * 0.22 + ts * 1.04);
  ctx.shadowBlur = 0;
  ctx.font = "11px 'Courier New', monospace";
  ctx.fillStyle = "#7f9cb8";
  ctx.fillText("TACTICAL SKIRMISH PROTOCOL — 战术遭遇战", cw / 2, ch * 0.22 + ts * 1.6);
  /* best time */
  const best = parseFloat(store.get("bestwin") || "0");
  if (best > 0) {
    ctx.fillStyle = CRYS_COL;
    ctx.font = "12px 'Courier New', monospace";
    ctx.fillText("BEST WIN 最快胜利  " + fmtTime(best), cw / 2, ch * 0.22 + ts * 1.6 + 20);
  }
  /* how-to panel */
  const lines = helpLines();
  const pw = Math.min(cw - 30, 470), lh = 17;
  const phh = lines.length * lh + 34;
  const px = cw / 2 - pw / 2, py = ch * 0.50;
  ctx.fillStyle = "rgba(10,10,30,0.82)";
  rr(ctx, px, py, pw, phh, 8); ctx.fill();
  ctx.strokeStyle = "rgba(53,232,255,0.4)";
  rr(ctx, px + 0.5, py + 0.5, pw - 1, phh - 1, 8); ctx.stroke();
  ctx.fillStyle = "#35e8ff";
  ctx.font = "bold 12px 'Courier New', monospace";
  ctx.fillText("HOW TO PLAY / 操作说明", cw / 2, py + 19);
  ctx.font = (cw < 460 ? "9px" : "10.5px") + " 'Courier New', monospace";
  ctx.fillStyle = "#bfd8ea";
  for (let i = 0; i < lines.length; i++) ctx.fillText(lines[i], cw / 2, py + 38 + i * lh);
  /* prompt */
  if (Math.sin(titleT * 4) > -0.3) {
    ctx.fillStyle = "#eaffff";
    ctx.font = "bold 13px 'Courier New', monospace";
    ctx.fillText(touchUI ? "TAP TO DEPLOY — 点击开始" : "CLICK / PRESS SPACE TO DEPLOY — 点击开始", cw / 2, py + phh + 30);
  }
}

function drawPause() {
  ctx.fillStyle = "rgba(3,3,14,0.72)";
  ctx.fillRect(0, 0, cw, ch);
  ctx.textAlign = "center";
  ctx.fillStyle = "#35e8ff";
  ctx.font = "bold 30px 'Courier New', monospace";
  ctx.fillText("PAUSED — 已暂停", cw / 2, ch * 0.42);
  ctx.font = "12px 'Courier New', monospace";
  ctx.fillStyle = "#9fb8cc";
  ctx.fillText(touchUI ? "点击屏幕继续 — tap to resume" : "P / ESC 继续 — resume", cw / 2, ch * 0.42 + 30);
  ctx.fillText("M 静音 — mute   ·   目标：摧毁敌方所有建筑", cw / 2, ch * 0.42 + 50);
}

function drawOver() {
  ctx.fillStyle = "rgba(3,3,14,0.78)";
  ctx.fillRect(0, 0, cw, ch);
  ctx.textAlign = "center";
  const win = G.win;
  ctx.font = "bold 44px 'Courier New', monospace";
  ctx.fillStyle = win ? "#35e8ff" : "#ff2b4e";
  ctx.shadowColor = win ? "#35e8ff" : "#ff2b4e";
  ctx.shadowBlur = 24;
  ctx.fillText(win ? "VICTORY" : "DEFEAT", cw / 2, ch * 0.30);
  ctx.shadowBlur = 0;
  ctx.font = "13px 'Courier New', monospace";
  ctx.fillStyle = "#bfd8ea";
  ctx.fillText(win ? "敌方基地已摧毁 — enemy base destroyed" : "我方基地失守 — your base has fallen", cw / 2, ch * 0.30 + 28);
  const st = G.stats;
  const rows = [
    ["MATCH TIME 用时", fmtTime(G.endT)],
    ["UNITS BUILT 生产单位", "" + st.unitsBuilt],
    ["UNITS LOST 损失单位", "" + st.unitsLost],
    ["CREDITS GATHERED 采集资金", "$" + st.creditsGathered],
  ];
  const best = parseFloat(store.get("bestwin") || "0");
  if (win && best > 0) rows.push(["BEST WIN 最快胜利", fmtTime(best) + (Math.abs(best - G.endT) < 0.5 ? "  NEW!" : "")]);
  ctx.font = "13px 'Courier New', monospace";
  let y = ch * 0.30 + 64;
  for (const r of rows) {
    ctx.textAlign = "right";
    ctx.fillStyle = "#7f9cb8";
    ctx.fillText(r[0], cw / 2 + 10, y);
    ctx.textAlign = "left";
    ctx.fillStyle = CRYS_COL;
    ctx.fillText("  " + r[1], cw / 2 + 18, y);
    y += 22;
  }
  if (performance.now() - overSince > 900 && Math.sin(titleT * 4) > -0.3) {
    ctx.textAlign = "center";
    ctx.fillStyle = "#eaffff";
    ctx.font = "bold 13px 'Courier New', monospace";
    ctx.fillText(touchUI ? "TAP TO CONTINUE — 点击继续" : "CLICK / SPACE TO CONTINUE — 点击继续", cw / 2, y + 24);
  }
}

/* ---------------- §Y MASTER RENDER ---------------- */
function render(alpha, rdt) {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (backLink && backLink.style) {
    backLink.style.display = (appState === "title" || appState === "over") ? "block" : "none";
  }
  if (appState === "title" || !G) { renderTitle(rdt); return; }
  titleT += rdt;          // keeps prompt blink alive on the over screen
  ctx.fillStyle = "#030310";
  ctx.fillRect(0, 0, cw, ch);
  /* world */
  ctx.save();
  ctx.beginPath(); ctx.rect(0, 0, ui.vw, ch); ctx.clip();
  ctx.translate(-Math.round(camX), -Math.round(camY));
  const sx = clamp(camX, 0, terrainC.width - 1), sy = clamp(camY, 0, terrainC.height - 1);
  const sw = Math.min(ui.vw + 2, terrainC.width - sx), sh = Math.min(ch + 2, terrainC.height - sy);
  if (sw > 0 && sh > 0) ctx.drawImage(terrainC, sx, sy, sw, sh, Math.round(sx), Math.round(sy), sw, sh);
  for (const b of G.buildings) {
    if (b.dead) continue;
    if ((b.tx + b.w) * TILE < camX - 20 || b.tx * TILE > camX + ui.vw + 20 ||
        (b.ty + b.h) * TILE < camY - 20 || b.ty * TILE > camY + ch + 20) continue;
    drawBuilding(b, G.t);
  }
  for (const u of G.units) { if (!u.dead) drawUnit(u, alpha); }
  drawProjectiles(alpha);
  drawParticles();
  drawGhost();
  ctx.restore();
  drawHUD(G.t, rdt);
  if (appState === "paused") drawPause();
  else if (appState === "over") drawOver();
}

/* ---------------- §Z MAIN LOOP ---------------- */
const STEP = 1 / CONFIG.logicHz;
let acc = 0;
let lastT = (typeof performance !== "undefined" ? performance.now() : 0) / 1000;

function frame(nowMs) {
  requestAnimationFrame(frame);
  const now = nowMs / 1000;
  const rdt = Math.min(0.1, Math.max(0, now - lastT));
  lastT = now;
  if (appState === "playing" && G) {
    acc += rdt;
    let n = 0;
    while (acc >= STEP && n < 6) { logicStep(STEP); acc -= STEP; n++; }
    if (n === 6) acc = 0;
    updateParticles(rdt);
    audio.music(G.t > CONFIG.aiFirstWave - 12);
  }
  updateCamera(rdt);
  render(appState === "playing" && G ? acc / STEP : 1, rdt);
}
requestAnimationFrame(frame);

/* ---------------- headless / smoke-test hooks ---------------- */
window.__cc = {
  start() { startMatch(); },
  step(dt) { if (G && !G.over) logicStep(dt); },
  game: () => G,
  state: () => appState,
  spawn: (team, key, x, y) => spawnUnit(team, key, x, y),
  attackMove: (u, x, y) => orderMove([u], x, y, true, true),
  config: CONFIG,
  findPathWorld,
};

</script>
</body>
