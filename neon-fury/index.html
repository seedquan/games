  if (cr.broken) return;
  const x = px(cr.x), y = py(cr.y);
  drawShadow(cr.x, cr.y, 40);
  ctx.save();
  ctx.translate(x, y - ps(20));
  ctx.shadowColor = "rgba(120,220,255,0.5)"; ctx.shadowBlur = 12;
  ctx.strokeStyle = "#8fdcff"; ctx.lineWidth = ps(3);
  const s = ps(18);
  ctx.strokeRect(-s, -s, s * 2, s * 2);
  ctx.beginPath(); ctx.moveTo(-s, -s); ctx.lineTo(s, s); ctx.moveTo(s, -s); ctx.lineTo(-s, s); ctx.stroke();
  ctx.restore();
}
function drawPickup(pk) {
  const x = px(pk.x), y = py(pk.y) - ps(pk.z);
  drawShadow(pk.x, pk.y, 22);
  ctx.save();
  ctx.translate(x, y - ps(8));
  const bob = Math.sin(pk.t * 5) * ps(3);
  ctx.translate(0, bob);
  ctx.shadowBlur = 14;
  if (pk.kind === "food") {
    ctx.shadowColor = "#6bff8f"; ctx.fillStyle = "#6bff8f";
    ctx.beginPath(); ctx.arc(0, 0, ps(9), 0, TAU); ctx.fill();
    ctx.fillStyle = "#063"; ctx.fillRect(-ps(2), -ps(11), ps(4), ps(4));
  } else if (pk.kind === "coin") {
    ctx.shadowColor = "#ffec6b"; ctx.fillStyle = "#ffec6b";
    ctx.beginPath(); ctx.arc(0, 0, ps(8), 0, TAU); ctx.fill();
    ctx.fillStyle = "#a80"; ctx.font = "700 " + ps(10) + "px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("$", 0, ps(1));
  } else {
    ctx.shadowColor = "#ffe14a"; ctx.strokeStyle = "#ffe14a"; ctx.lineWidth = ps(4);
    ctx.beginPath(); ctx.moveTo(-ps(12), ps(6)); ctx.lineTo(ps(12), -ps(6)); ctx.stroke();
  }
  ctx.restore();
}

function drawProjectile(pr) {
  const x = px(pr.x), y = py(pr.y) - ps(pr.z * 0.0);
  ctx.save();
  ctx.shadowColor = pr.col; ctx.shadowBlur = 14; ctx.fillStyle = pr.col;
  ctx.beginPath(); ctx.arc(x, y, ps(pr.r), 0, TAU); ctx.fill();
  ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(x, y, ps(pr.r * 0.4), 0, TAU); ctx.fill();
  ctx.restore();
}

/* ---- y-sorted scene render ---- */
function renderScene() {
  // collect drawables with sort key = y (depth) + z handled via draw
  const drawables = [];
  for (const cr of game.crates) if (!cr.broken) drawables.push({ y: cr.y, fn: () => drawCrate(cr) });
  for (const pk of game.pickups) if (!pk.taken) drawables.push({ y: pk.y - 0.1, fn: () => drawPickup(pk) });
  for (const e of game.enemies) drawables.push({ y: e.y, fn: () => drawEnemy(e) });
  for (const p of game.players) if (p.alive || p.downed) drawables.push({ y: p.y, fn: () => drawBrawler(p) });
  drawables.sort((a, b) => a.y - b.y);
  for (const d of drawables) d.fn();
  // projectiles on top
  for (const pr of game.projectiles) drawProjectile(pr);
}

function renderParticles() {
  for (const p of parts) {
    if (!p.on) continue;
    const a = clamp(p.life / p.max, 0, 1);
    if (p.kind === 0) {
      ctx.save(); ctx.globalAlpha = a; ctx.fillStyle = p.col; ctx.shadowColor = p.col; ctx.shadowBlur = ps(6);
      ctx.beginPath(); ctx.arc(px(p.x), py(p.y), ps(p.size) * a, 0, TAU); ctx.fill(); ctx.restore();
    } else {
      const r = ps(p.size) * (1 - a);
      ctx.save(); ctx.globalAlpha = a * 0.7; ctx.strokeStyle = p.col; ctx.shadowColor = p.col; ctx.shadowBlur = ps(8); ctx.lineWidth = ps(3);
      ctx.beginPath(); ctx.arc(px(p.x), py(p.y), r, 0, TAU); ctx.stroke(); ctx.restore();
    }
  }
  for (const s of sparks) {
    if (!s.on) continue;
    const a = clamp(s.life / s.max, 0, 1);
    ctx.save(); ctx.globalAlpha = a; ctx.fillStyle = s.col; ctx.shadowColor = s.col; ctx.shadowBlur = ps(8);
    const sz = ps(s.size) * a;
    ctx.translate(px(s.x), py(s.y)); ctx.rotate(Math.atan2(s.vy, s.vx));
    ctx.fillRect(-sz, -sz * 0.3, sz * 2, sz * 0.6);
    ctx.restore();
  }
}
function renderTexts() {
  for (const t of texts) {
    if (!t.on) continue;
    const a = clamp(t.life / t.max, 0, 1);
    ctx.save(); ctx.globalAlpha = a;
    neonText(t.str, px(t.x), py(t.y), Math.max(11, ps(t.size)), t.col);
    ctx.restore();
  }
}

/* ---- HUD ---- */
function drawHUD() {
  const pad = ps(14);
  // player panels
  game.players.forEach((p, i) => {
    const x = i === 0 ? playX + pad : playX + playW * viewScale - pad - ps(220);
    const y = playY + pad;
    drawPlayerPanel(p, x, y, i === 1);
  });
  // score center
  neonText("SCORE " + game.score, playX + playW * viewScale / 2, playY + pad + ps(8), Math.max(13, ps(18)), "#bff8ff");
  neonText("BEST " + best, playX + playW * viewScale / 2, playY + pad + ps(30), Math.max(10, ps(12)), "#7fd6ff");
  // stage
  neonText("STAGE " + (game.stage + 1) + "-" + (game.seg + 1), playX + playW * viewScale / 2, playY + pad + ps(50), Math.max(10, ps(12)), "#9be7ff");

  // combo
  if (game.combo >= 3 && game.comboT > 0) {
    ctx.save();
    const a = clamp(game.comboT, 0, 1);
    ctx.globalAlpha = a;
    neonText(game.combo + " COMBO", playX + playW * viewScale / 2, playY + ps(110), Math.max(16, ps(26 + Math.min(game.combo, 20))), "#ffec6b");
    ctx.restore();
  }

  // boss bar
  if (game.bossActive) {
    const b = game.bossActive;
    const bw = playW * viewScale * 0.6, bx = playX + (playW * viewScale - bw) / 2, by = playY + playH * viewScale - ps(40);
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0,0.55)"; ctx.fillRect(bx - 2, by - 2, bw + 4, ps(14) + 4);
    ctx.fillStyle = "#ff3b6b"; ctx.shadowColor = "#ff3b6b"; ctx.shadowBlur = ps(8);
    ctx.fillRect(bx, by, bw * clamp(b.hp / b.maxHp, 0, 1), ps(14));
    ctx.restore();
    neonText(b.name || "BOSS", playX + playW * viewScale / 2, by - ps(12), Math.max(11, ps(14)), "#ffd0d8");
  }

  // GO! arrow
  if (game.go && !game.locked) {
    const blink = Math.floor(performance.now() / 250) % 2 === 0;
    if (blink) {
      const gx = playX + playW * viewScale - ps(70), gy = playY + playH * viewScale * 0.32;
      neonText("GO!", gx, gy, Math.max(20, ps(34)), "#6bff8f");
      ctx.save();
      ctx.strokeStyle = "#6bff8f"; ctx.shadowColor = "#6bff8f"; ctx.shadowBlur = ps(10); ctx.lineWidth = ps(4);
      ctx.beginPath(); ctx.moveTo(gx - ps(24), gy + ps(28)); ctx.lineTo(gx + ps(24), gy + ps(28));
      ctx.lineTo(gx + ps(8), gy + ps(16)); ctx.moveTo(gx + ps(24), gy + ps(28)); ctx.lineTo(gx + ps(8), gy + ps(40));
      ctx.stroke(); ctx.restore();
    }
  }

  // boss warning
  if (game.bossWarnT > 0) {
    const a = Math.abs(Math.sin(game.bossWarnT * 8));
    ctx.save(); ctx.globalAlpha = a;
    neonText("⚠ WARNING ⚠", playX + playW * viewScale / 2, playY + playH * viewScale * 0.4, Math.max(20, ps(40)), "#ff3b6b");
    ctx.restore();
  }
}

function drawPlayerPanel(p, x, y, right) {
  const w = ps(210), bh = ps(14);
  ctx.save();
  // tag
  neonText("P" + (p.idx + 1), x + ps(14), y + ps(8), Math.max(12, ps(15)), p.col.body, "left");
  // hp bar
  const hx = x + ps(36);
  ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(hx, y, w - ps(36), bh);
  if (p.alive) {
    const t = clamp(p.hp / p.maxHp, 0, 1);
    ctx.fillStyle = t > 0.3 ? p.col.body : "#ff4040"; ctx.shadowColor = p.col.glow; ctx.shadowBlur = ps(6);
    ctx.fillRect(hx, y, (w - ps(36)) * t, bh);
    ctx.shadowBlur = 0;
  } else {
    ctx.fillStyle = "#440"; ctx.fillRect(hx, y, w - ps(36), bh);
  }
  ctx.strokeStyle = p.col.body; ctx.globalAlpha = 0.7; ctx.lineWidth = 1; ctx.strokeRect(hx, y, w - ps(36), bh);
  ctx.globalAlpha = 1;
  // lives icons
  for (let i = 0; i < p.lives; i++) {
    ctx.fillStyle = p.col.body; ctx.shadowColor = p.col.glow; ctx.shadowBlur = ps(4);
    ctx.beginPath(); ctx.arc(hx + ps(8) + i * ps(14), y + bh + ps(10), ps(4), 0, TAU); ctx.fill();
  }
  ctx.shadowBlur = 0;
  if (p.weapon) neonText("PIPE x" + p.weaponUses, hx + ps(70), y + bh + ps(10), Math.max(9, ps(11)), "#ffe14a", "left");
  if (!p.alive && p.downed) neonText("DOWN", hx + ps(110), y + ps(7), Math.max(10, ps(12)), "#ff6080", "left");
  ctx.restore();
}

/* ---- touch controls overlay ---- */
function drawTouchControls() {
  if (!touchUI || state !== "play") return;
  const L = touchLayout();
  ctx.save();
  ctx.globalAlpha = 0.32;
  // stick
  ctx.strokeStyle = "#9be7ff"; ctx.lineWidth = ps(3);
  ctx.beginPath(); ctx.arc(L.stick.cx, L.stick.cy, L.stick.r, 0, TAU); ctx.stroke();
  ctx.fillStyle = "#9be7ff";
  ctx.beginPath(); ctx.arc(L.stick.cx + touch.stickX * L.stick.r * 0.6, L.stick.cy + touch.stickY * L.stick.r * 0.6, L.stick.r * 0.4, 0, TAU); ctx.fill();
  // buttons
  const btns = [["attack", "#ff4fd0"], ["jump", "#19e6ff"], ["special", "#ffec6b"]];
  for (const [name, c] of btns) {
    const b = L[name];
    ctx.strokeStyle = c; ctx.fillStyle = c; ctx.lineWidth = ps(3);
    ctx.globalAlpha = touch.btn[name] ? 0.5 : 0.28;
    ctx.beginPath(); ctx.arc(b.cx, b.cy, b.r, 0, TAU); ctx.stroke();
    ctx.globalAlpha = 0.6;
    ctx.font = "700 " + ps(13) + "px monospace"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(b.label, b.cx, b.cy);
  }
  ctx.restore();
}

/* ---- title / over / clear screens ---- */
function howToLines() {
  if (touchUI) {
    return [
      "移动：左侧虚拟摇杆 — move (left stick)",
      "ATK 攻击 · JMP 跳 · SPC 必杀 — attack / jump / special",
      "走向敌人拓击，可投技 — walk into a foe to grab/throw",
      "目标：清场推进，击败BOSS — clear waves, beat the boss",
    ];
  }
  const pad = padAssign.some(p => p != null);
  if (pad) {
    return [
      "移动：摇杆/方向键 — move (stick / d-pad)",
      "□ 攻击 · × 跳 · ○/R1 必杀 — attack / jump / special",
      "走向敌人拓击，○ 投技 — walk into a foe to grab/throw",
      "目标：清场推进，击败BOSS — clear waves, beat the boss",
      "Start 开始/暂停 · P 暂停 · M 静音 · F 全屏",
    ];
  }
  return [
    "P1 移动：WASD/方向键 — move (8-dir)",
    "J 攻击 · K 跳 · L 必杀 — attack / jump / special",
    "走向敌人拓击，L 投技 — walk into a foe to grab/throw",
    "P2 键盘：IJKL 移动 · B 攻击 · N 跳 · M 必杀",
    "目标：清场推进，击败BOSS — clear waves, beat the boss",
    "P 暂停 · M 静音 · F 全屏",
  ];
}

function drawTitle() {
  // animated bg
  drawBackground();
  drawFloor();
  const cx = playX + playW * viewScale / 2;
  const topY = playY + playH * viewScale * 0.16;
  // title
  ctx.save();
  const pulse = 1 + Math.sin(performance.now() / 500) * 0.03;
  ctx.translate(cx, topY); ctx.scale(pulse, pulse);
  neonText("NEON", 0, -ps(22), Math.max(36, ps(64)), "#19e6ff");
  neonText("FURY", 0, ps(34), Math.max(36, ps(64)), "#ff4fd0");
  ctx.restore();
  neonText("belt-scroll brawler", cx, topY + ps(78), Math.max(11, ps(14)), "#9be7ff");

  // menu items
  const items = [
    "START",
    (numPlayers === 2 ? "PLAYERS: 2  (CO-OP)" : "PLAYERS: 1"),
    "AUTO-FULLSCREEN: " + (FS.auto ? "ON" : "OFF"),
  ];
  const my0 = playY + playH * viewScale * 0.5;
  items.forEach((it, i) => {
    const sel = i === titleSel;
    const y = my0 + i * ps(40);
    const c = i === 0 ? "#6bff8f" : (i === 1 ? "#ff4fd0" : "#9be7ff");
    neonText((sel ? "▸ " : "  ") + it + (sel && i > 0 ? " ◂" : ""), cx, y, Math.max(14, ps(sel ? 22 : 18)), sel ? "#ffffff" : c);
  });
  neonText(touchUI ? "tap to start · 点击开始" : "ENTER / □ / J to start · 回车开始", cx, my0 + ps(140), Math.max(11, ps(14)), "#ffec6b");
  neonText("BEST " + best, cx, my0 + ps(166), Math.max(11, ps(14)), "#bff8ff");

  // how-to panel
  const lines = howToLines();
  const hy = my0 + ps(196);
  ctx.save();
  ctx.globalAlpha = 0.9;
  neonText("操作说明 · HOW TO PLAY", cx, hy, Math.max(12, ps(15)), "#19e6ff");
  ctx.restore();
  lines.forEach((ln, i) => {
    ctx.save(); ctx.globalAlpha = 0.85;
    ctx.font = Math.max(10, ps(12)) + "px 'Courier New', monospace";
    ctx.fillStyle = "#bfe9ff"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(ln, cx, hy + ps(22) + i * ps(18));
    ctx.restore();
  });
}

function drawOverlayCenter(title, titleCol, sub, sub2) {
  ctx.save();
  ctx.fillStyle = "rgba(2,2,12,0.72)";
  ctx.fillRect(playX, playY, playW * viewScale, playH * viewScale);
  ctx.restore();
  const cx = playX + playW * viewScale / 2, cy = playY + playH * viewScale * 0.42;
  neonText(title, cx, cy, Math.max(28, ps(54)), titleCol);
  if (sub) neonText(sub, cx, cy + ps(60), Math.max(13, ps(18)), "#bff8ff");
  if (sub2) neonText(sub2, cx, cy + ps(92), Math.max(11, ps(14)), "#9be7ff");
}

function drawPauseOverlay() {
  drawOverlayCenter("PAUSED", "#19e6ff", "P / Esc / Start — resume 继续", "M 静音 · F 全屏 — mute / fullscreen");
}

/* ---------------- §W RENDER ROOT ---------------- */
function render() {
  clearCanvas();
  // shake offset
  let ox = 0, oy = 0;
  if (shakeT > 0) { ox = rand(-shakeMag, shakeMag); oy = rand(-shakeMag, shakeMag); }
  ctx.save();
  ctx.translate(ox, oy);

  if (state === "title") {
    drawTitle();
  } else {
    drawBackground();
    drawFloor();
    renderParticles(); // ground sparks behind chars (will also draw after); cheap
    renderScene();
    renderTexts();
    drawHUD();
    drawTouchControls();
    if (state === "over") drawOverlayCenter("GAME OVER", "#ff3b6b", "SCORE " + game.score, touchUI ? "tap to continue 点击继续" : "ENTER / □ — title 回标题");
    else if (state === "clear") drawOverlayCenter("STAGE CLEAR", "#6bff8f", "STAGE " + ((game.clearedStage || 0) + 1) + " — " + stages[game.clearedStage || 0].name, touchUI ? "tap to continue 点击继续" : "ENTER / □ — next stage 下一关");
    else if (state === "win") drawOverlayCenter("YOU WIN!", "#ffec6b", "FINAL SCORE " + game.score, touchUI ? "tap to continue 点击继续" : "ENTER / □ — title 回标题");
    if (paused && state === "play") drawPauseOverlay();
  }

  // toast
  if (toastT > 0) {
    ctx.save(); ctx.globalAlpha = clamp(toastT, 0, 1);
    neonText(toastMsg, playX + playW * viewScale / 2, playY + playH * viewScale * 0.14, Math.max(13, ps(18)), "#9be7ff");
    ctx.restore();
  }
  ctx.restore();
}

/* ---------------- §X MAIN LOOP ---------------- */
let lastT = 0;
function frame(now) {
  const t = now / 1000;
  let dt = lastT ? t - lastT : 0;
  lastT = t;
  if (dt > 0.1) dt = 0.1;

  pollPadMenus();
  applyKeyboardInputs();

  // fixed-timestep sim
  acc += dt;
  let steps = 0;
  while (acc >= FIXED && steps < 8) {
    simStep(FIXED);
    acc -= FIXED; steps++;
  }
  if (steps === 8) acc = 0;

  // real-time effect timers (tick even when paused / on menus)
  updateParts(dt); updateSparks(dt); updateTexts(dt);
  if (shakeT > 0) { shakeT -= dt; if (shakeT <= 0) shakeMag = 0; }
  if (toastT > 0) toastT -= dt;

  render();
  requestAnimationFrame(frame);
}
reassignPads();
updateFsBtn();
if (typeof requestAnimationFrame === "function") requestAnimationFrame(frame);

/* ---------------- §Y HEADLESS TEST HOOKS ---------------- */
if (typeof window !== "undefined") {
  window.__NF = {
    get state() { return state; }, set state(v) { state = v; },
    get game() { return game; },
    get paused() { return paused; }, set paused(v) { paused = v; },
    get numPlayers() { return numPlayers; }, set numPlayers(v) { numPlayers = v; },
    get best() { return best; },
    CONFIG, ENEMY_DEF, BOSS_DEF, stages,
    newGame, simStep, startGame, goTitle, startStage, enterSegment, spawnWave, spawnBoss,
    spawnEnemy, spawnPickup, spawnCrate, breakCrate,
    damageEnemy, killEnemy, damagePlayer, downPlayer, loseLifeRespawn, checkGameOver, endGame,
    tryAttack, startSwing, jumpKick, useSpecial, startGrab, throwEnemy, findGrabTarget,
    aliveEnemies, livePlayers, updateFlow, onStageCleared, continueAfterClear, nextSegment,
    parts, sparks, texts, keys, padPrev,
    reassignPads, pollPadMenus, applyKeyboardInputs, padBtn, padMove, readPadRaw,
    setPlayers(n) { numPlayers = n; },
    get padAssign() { return padAssign; },
    render, resize, depthOverlap, COL,
    titleConfirm, titleAdjust, get titleSel() { return titleSel; }, set titleSel(v) { titleSel = v; },
  };
}
</script>
