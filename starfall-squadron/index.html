<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>STARFALL SQUADRON</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #050514; overflow: hidden;
    touch-action: none; -webkit-user-select: none; user-select: none;

  }

  #arcade {
    position: fixed; top: 12px; left: 14px; z-index: 10;
    font: 14px "Courier New", monospace; letter-spacing: 1px;

    transition: opacity 0.2s; display: none;
  }
  #fsbtn:hover { opacity: 0.9; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="arcade" href="../">&larr; Arcade</a>
<button id="fsbtn" type="button" aria-label="Toggle fullscreen">FULLSCREEN ⛶</button>
<script>
"use strict";

/* ============================================================
   STARFALL SQUADRON — a vertically-scrolling neon shoot-'em-up.
   Local two-player co-op "打飞机" in the Raiden / 1942 tradition.

   Single file, zero dependencies, all art & audio procedural.

   Controls (P1): WASD / arrows move · auto-fire · Space/J = bomb
                  optional mouse-follow · P/Esc pause · M mute · F fullscreen
   Controls (P2): gamepad (left stick / d-pad move, △/Y or A = bomb,
                  auto-fire), OR second keyboard (IJKL / arrows-alt move,
                  . or / = bomb).
   Gamepad:       standard mapping (navigator.getGamepads, polled).
                  left stick / d-pad move · △/Y/A = bomb · Start = pause/start.
                  menus navigable by d-pad / stick, × / A confirm.
   Touch:         drag anywhere to move P1 (ship offset above finger),
                  auto-fire, on-screen BOMB button. (Touch = 1P.)
   Skill:         graze enemy bullets for score + bomb charge.
   ============================================================ */

/* ---------------- §B CONFIG ---------------- */
const CONFIG = Object.freeze({
  playW: 720,             // logical play-column width (WIDENED for roguelike field)
  playH: 820,             // logical play-column height
  shipR: 11,              // player collision radius
  shipSpeed: 360,         // px/s player movement
  shipAccel: 3600,
  invulnTime: 2.2,        // s of i-frames on (re)spawn
  // --- HP / armour model (replaces pure one-hit death) ---
  maxHP: 5,               // base hull segments (raised by ARMOR PLATING meta + blessing)
  hitInvuln: 0.7,         // s of brief i-frames + hit-flash after taking a hit
  contactDmg: 2,          // HP lost ramming an enemy body
  bossContactDmg: 3,      // HP lost touching the boss hull
  lowHPFrac: 0.34,        // <= this fraction of max HP triggers low-HP warning
  sectorHeal: 1,          // HP restored on each sector clear (small, tunable)
  healPickup: 1,          // HP restored by a small heal-on-pickup (shield capsule heals too)
  // --- downed + co-op revive ---
  downedTimeout: 12,      // s a downed wreck survives before auto-losing a life
  reviveTime: 3.0,        // s of partner proximity to complete a revive
  reviveRange: 64,        // px proximity radius for the reviver
  reviveHPFrac: 0.6,      // fraction of max HP a revived player returns at
  startLives: 3,
  startBombs: 3,
  maxBombs: 6,
  maxWeapon: 6,
  fireBase: 0.14,         // s between player shots at weapon 1
  fireMin: 0.075,         // floor at high weapon levels
  pBulletSpeed: 760,
  pBulletR: 5,
  pBulletDmg: 1,
  grazeR: 26,             // graze radius (px) around ship
  grazeScore: 30,
  grazeCharge: 0.012,     // bomb-meter fill per graze
  bombFullKills: 1,       // bomb meter -> +1 bomb when full
  enemyBulletSpeed: 230,
  enemyBulletR: 6,
  maxBullets: 1400,       // pooled enemy + player bullets each
  maxParticles: 720,
  comboWindow: 2.0,       // s to chain kills
  comboMax: 16,
  bucketSize: 64,         // spatial hash cell size for broad-phase
  bossEvery: 5,           // every Nth SECTOR is a boss sector
  wavesPerSector: 4,      // choreographed waves in a normal sector gauntlet
  maxOptions: 3,          // hard cap on Option drones per player (nerfed 4->3)
  optionOrbitR: 30,       // orbit radius of Option drones
  // --- Option drone tuning (supplement, not autowin) ---
  optionDmg: 0.5,         // base per-Option damage as a fraction of a main shot
  optionFalloff: 0.78,    // each additional Option does this much of the previous (diminishing returns)
  optionFireEvery: 2,     // Options fire once every N ship volleys (throttled cadence)
  optionBlessMul: 0.5,    // fraction of offensive blessing power Options inherit (dmgup/crit/pierce/split)
  missileCd: 3.0,         // base secondary homing-missile salvo cooldown (s)
  creditDivisor: 250,     // run score -> credits banked on game over (score/this)
});

/* ---------------- §C UTIL ---------------- */
const TAU = Math.PI * 2;
const rand = (a, b) => a + Math.random() * (b - a);
const randi = (a, b) => (a + Math.floor(Math.random() * (b - a + 1)));
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const dist2 = (x1, y1, x2, y2) => { const dx = x2 - x1, dy = y2 - y1; return dx * dx + dy * dy; };
const sign = (x) => x < 0 ? -1 : x > 0 ? 1 : 0;

const store = {
  get(k) { try { return localStorage.getItem("starfallsquadron." + k); } catch (e) { return this._m && this._m[k]; } },
  set(k, v) { try { localStorage.setItem("starfallsquadron." + k, v); } catch (e) { (this._m = this._m || {})[k] = v; } },
};

/* ---------------- §C1 WEAPON TYPES ----------------
   Four selectable PRIMARY weapon types, each with its own independent level
   (1..maxWeapon), visual & behaviour. VULCAN is the default — it preserves the
   original spread/stream cannon exactly. Levels widen / add streams / raise rate.
   Bullet "kind" routes both the simulation (pierce / homing / range) and the
   render. Player bullet kinds: 0 vulcan, 1 laser, 2 wave, 3 homing, 4 missile. */
const WEAPONS = [
  { id: "vulcan", name: "VULCAN", zh: "火神炮", col: "#bff4ff", icon: "V", kind: 0 },
  { id: "laser",  name: "LASER",  zh: "镭射",   col: "#b6ff6e", icon: "L", kind: 1 },
  { id: "wave",   name: "WAVE",   zh: "波动",   col: "#ffb066", icon: "W", kind: 2 },
  { id: "homing", name: "SEEKER", zh: "追踪",   col: "#d49bff", icon: "H", kind: 3 },
];
function weaponIndex(id) { const i = WEAPONS.findIndex((w) => w.id === id); return i < 0 ? 0 : i; }

/* ---------------- §C1b PERSISTENT META / ARMORY ----------------
   Between-runs upgrade shop. Persistent "credits" currency is banked from a
   fraction of run score on game over. Upgrades are SHARED across both players
   (simpler & symmetric for co-op — a single squadron loadout) and apply to P1
   and P2 identically at spawn. Costs grow geometrically (~x1.55/level).
   All persisted under "starfallsquadron." keys with the store try/catch fallback. */
let credits = parseInt(store.get("credits") || "0", 10) || 0;
const META_DEFAULTS = { wlvl: 0, maxw: 0, rate: 0, opt: 0, bomb: 0, graze: 0, life: 0, start: 0,
  reroll: 0, randboon: 0, gateodds: 0, unlockw: 0, revive: 0, armor: 0 };
let meta = Object.assign({}, META_DEFAULTS);
try { const m = JSON.parse(store.get("meta") || "{}"); if (m && typeof m === "object") meta = Object.assign(meta, m); } catch (e) { /* fresh meta */ }
function saveMeta() {
  store.set("credits", String(credits));
  try { store.set("meta", JSON.stringify(meta)); } catch (e) { /* noop */ }
}
/* META_UPGRADES — id keys into `meta`; max caps a level (0 = uncapped-ish but
   we keep sane caps). `apply` semantics are read at spawn / fire time. */
const META_UPGRADES = [
  { id: "wlvl",  name: "WARM CORE",       zh: "初始等级",   desc: "+1 starting weapon level",            base: 120, max: 5 },
  { id: "maxw",  name: "OVERCHARGE",      zh: "等级上限",   desc: "+1 max weapon level",                 base: 200, max: 4 },
  { id: "rate",  name: "TRIGGER MOD",     zh: "射速",       desc: "+6% fire rate",                       base: 90,  max: 8 },
  { id: "opt",   name: "DRONE BAY",       zh: "僚机",       desc: "+1 starting Option drone",            base: 320, max: CONFIG.maxOptions - 1 },
  { id: "bomb",  name: "BOMB RACK",       zh: "炸弹容量",   desc: "+1 bomb capacity & starting bomb",    base: 110, max: 4 },
  { id: "graze", name: "GRAZE TUNING",    zh: "擦弹充能",   desc: "+25% bomb charge from graze",          base: 80,  max: 6 },
  { id: "life",  name: "SPARE HULL",      zh: "额外命",     desc: "+1 starting life",                    base: 300, max: 3 },
  { id: "armor", name: "ARMOR PLATING",   zh: "装甲",       desc: "+1 max HP (hull segment)",            base: 160, max: 5 },
  { id: "start", name: "LOADOUT",         zh: "默认武器",   desc: "cycle the default starting weapon",   base: 150, max: 3 },
  // --- roguelike-flavored permanent upgrades ---
  { id: "reroll",   name: "REROLL CHIP",  zh: "重抽",       desc: "+1 blessing reroll per run",            base: 180, max: 3 },
  { id: "randboon", name: "OMEN",         zh: "起始祝福",   desc: "start each run with a random blessing", base: 240, max: 1 },
  { id: "gateodds", name: "FORTUNE",      zh: "命运",       desc: "better gate-reward odds (richer)",      base: 200, max: 3 },
  { id: "unlockw",  name: "ARSENAL",      zh: "军火库",     desc: "+1 starting weapon type at level 2",    base: 220, max: 3 },
  { id: "revive",   name: "REVIVE TOKEN", zh: "复活",       desc: "once per run, cheat death",             base: 400, max: 2 },
];
function metaCost(u) { const lv = meta[u.id] || 0; return Math.round(u.base * Math.pow(1.55, lv)); }
function metaMaxed(u) { return (meta[u.id] || 0) >= u.max; }
/* default starting weapon index chosen by the LOADOUT upgrade level (cyclic) */
function startWeaponIndex() { return (meta.start || 0) % WEAPONS.length; }

/* ---------------- §C1c BLESSINGS / BOONS (run-temporary build) ----------------
   Hades-style choose-1-of-3 boons applied PER PLAYER and reset every run. Each
   blessing has a rarity tier whose color/multiplier scales the effect. Stacks
   accumulate; the live build is read in fire/graze/kill code via blessVal(p,id).
   Synergy lines weave across the 4 weapons + Options/missiles + graze/bomb. */
const RARITY = [
  { id: "common",    name: "COMMON",    zh: "普通", col: "#b9c7d6", mul: 1.0,  w: 56 },
  { id: "rare",      name: "RARE",      zh: "稀有", col: "#5ee6ff", mul: 1.5,  w: 28 },
  { id: "epic",      name: "EPIC",      zh: "史诗", col: "#d49bff", mul: 2.1,  w: 12 },
  { id: "legendary", name: "LEGENDARY", zh: "传说", col: "#ffd36e", mul: 3.0,  w: 4  },
];
function rarityIndex(id) { return RARITY.findIndex((r) => r.id === id); }
/* roll a rarity, biased richer with run depth */
function rollRarity(depth) {
  let total = 0; const ws = [];
  for (let i = 0; i < RARITY.length; i++) {
    // deeper runs nudge weight toward higher tiers
    const boost = 1 + (depth || 0) * 0.05 * i;
    const w = RARITY[i].w * boost; ws.push(w); total += w;
  }
  let r = Math.random() * total;
  for (let i = 0; i < ws.length; i++) { r -= ws[i]; if (r <= 0) return i; }
  return 0;
}

/* BLESSINGS — `per` is the per-stack base value, scaled by rarity.mul at grant.
   `tags` documents the synergy line. `max` caps stacks. Effects are interpreted
   by gameplay code; see blessVal(). 16 blessings across several synergy lines. */
const BLESSINGS = [
  { id: "spread",   name: "SCATTER ARRAY",  zh: "散射阵列", per: 1,    max: 4, desc: "+shots / extra projectiles",          tags: "vulcan/wave" },
  { id: "pierce",   name: "PIERCING ROUNDS",zh: "穿甲弹",   per: 1,    max: 5, desc: "bullets pierce +1 enemy",             tags: "all" },
  { id: "split",    name: "SHRAPNEL",       zh: "破片",     per: 0.18, max: 3, desc: "bullets split on hit (chance)",       tags: "all" },
  { id: "homingAll",name: "GUIDANCE CHIP",  zh: "制导芯片", per: 1,    max: 1, desc: "ALL your shots gently home",          tags: "all" },
  { id: "chain",    name: "ARC RELAY",      zh: "电弧中继", per: 0.30, max: 4, desc: "LASER chains lightning to foes",      tags: "laser" },
  { id: "burn",     name: "PLASMA WAVE",    zh: "等离子",   per: 0.5,  max: 4, desc: "WAVE burns over time",                tags: "wave" },
  { id: "slow",     name: "GRAVITY WAVE",   zh: "引力波",   per: 0.12, max: 3, desc: "WAVE slows enemies it hits",          tags: "wave" },
  { id: "crit",     name: "TARGETING EYE",  zh: "暴击",     per: 0.08, max: 6, desc: "+crit chance",                        tags: "crit" },
  { id: "critdmg",  name: "OVERKILL",       zh: "暴伤",     per: 0.4,  max: 6, desc: "+crit damage",                        tags: "crit" },
  { id: "lifegraze",name: "SIPHON GRAZE",   zh: "吸取擦弹", per: 0.5,  max: 3, desc: "graze can heal / shields",            tags: "graze" },
  { id: "grazeR",   name: "WIDE FIELD",     zh: "擦弹范围", per: 6,    max: 4, desc: "+graze radius",                       tags: "graze" },
  { id: "optcount", name: "DRONE SWARM",    zh: "僚机群",   per: 1,    max: 2, desc: "+1 Option drone",                     tags: "option" },
  { id: "optmsl",   name: "DRONE MISSILES", zh: "僚机导弹", per: 1,    max: 1, desc: "Options fire missiles too",           tags: "option" },
  { id: "bombr",    name: "WIDE BLAST",     zh: "炸弹强化", per: 0.4,  max: 4, desc: "+bomb damage & charge",               tags: "bomb" },
  { id: "vampire",  name: "VAMPIRE CORE",   zh: "嗜血核心", per: 0.06, max: 4, desc: "chance to heal on kill",              tags: "vampire" },
  { id: "thorn",    name: "THORN FIELD",    zh: "荆棘力场", per: 0.5,  max: 3, desc: "reflect: shield blocks more, zaps",   tags: "thorn" },
  { id: "timedil",  name: "CHRONO BOMB",    zh: "时缓",     per: 1.4,  max: 2, desc: "bomb slows time briefly",             tags: "bomb" },
  { id: "dmgup",    name: "POWER CELL",     zh: "增伤",     per: 0.16, max: 6, desc: "+primary damage",                     tags: "all" },
  { id: "maxhp",    name: "HULL PLATING",   zh: "增甲",     per: 1,    max: 4, desc: "+1 max HP (and heal)",                tags: "survival" },
];
function blessingDef(id) { return BLESSINGS.find((b) => b.id === id); }

/* ---------------- canvas / view ---------------- */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let cw = 0, ch = 0, dpr = 1;
/* play-column placement (centred portrait band, letterboxed on wide screens) */
let viewScale = 1, playX = 0, playY = 0, playW = CONFIG.playW, playH = CONFIG.playH;

function resize() {
  dpr = Math.min(2, window.devicePixelRatio || 1);
  cw = window.innerWidth; ch = window.innerHeight;
  canvas.width = Math.round(cw * dpr);
  canvas.height = Math.round(ch * dpr);
  canvas.style.width = cw + "px";
  canvas.style.height = ch + "px";
  // Fit the WIDER play-column. On wide screens reserve slim side rails for HUD
  // but otherwise let the field claim most of the horizontal space.
  const sideRail = cw > 760 ? 132 : 0;       // px reserved each side for HUD rails
  const availW = Math.max(120, cw - sideRail * 2);
  const sx = availW / CONFIG.playW, sy = ch / CONFIG.playH;
  viewScale = Math.min(sx, sy);
  playW = CONFIG.playW * viewScale;
  playH = CONFIG.playH * viewScale;
  playX = (cw - playW) * 0.5;
  playY = (ch - playH) * 0.5;
}
window.addEventListener("resize", resize);
resize();

/* coarse-pointer (touch) devices get touch instructions + on-screen controls */
const touchUI = typeof matchMedia === "function" && matchMedia("(pointer: coarse)").matches;

/* ---------------- detail / quality flag ----------------
   Pure-cosmetic: gates the heavier per-craft procedural detail & extra
   animation passes so low-end / touch devices stay at 60fps. Full detail on
   precise-pointer desktops, reduced on coarse-pointer / touch. Never affects
   gameplay (hitboxes, speeds, spawns, bullets, scoring all unchanged). */
const DETAIL = !touchUI;

/* convert play-space (0..playW logical, 0..playH logical) to canvas px */
const px = (x) => playX + x * viewScale;
const py = (y) => playY + y * viewScale;
const ps = (s) => s * viewScale;

/* ---------------- §C2 FULLSCREEN ----------------
   Browsers only grant requestFullscreen() from a user gesture, fired from the
   start gesture, feature-detected & swallow rejections. Auto pref persisted. */
const FS = {
  auto: store.get("autofs") !== "0",
  autoTried: false,
};
function fsElement() { return document.fullscreenElement || document.webkitFullscreenElement || null; }
function fsSupported() {
  const el = document.documentElement;
  return !!(el.requestFullscreen || el.webkitRequestFullscreen ||
            document.exitFullscreen || document.webkitExitFullscreen);
}
function isFullscreen() { return !!fsElement(); }
function requestFullscreen() {
  if (isFullscreen()) return;
  const el = document.documentElement;
  try {
    const fn = el.requestFullscreen || el.webkitRequestFullscreen;
    if (!fn) return;
    const r = fn.call(el);
    if (r && typeof r.catch === "function") r.catch(() => {});
  } catch (e) { /* denied — never break the game */ }
}
function exitFullscreen() {
  try {
    const fn = document.exitFullscreen || document.webkitExitFullscreen;
    if (!fn) return;
    const r = fn.call(document);
    if (r && typeof r.catch === "function") r.catch(() => {});
  } catch (e) { /* ignore */ }
}
function toggleFullscreen() {
  if (isFullscreen()) { exitFullscreen(); }
  else { FS.autoTried = true; requestFullscreen(); }
}
function autoRequestFullscreen() {
  if (!FS.auto || FS.autoTried || isFullscreen()) return;
  FS.autoTried = true;
  requestFullscreen();
}
function setAutoFullscreen(on) {
  FS.auto = !!on;
  store.set("autofs", FS.auto ? "1" : "0");
  if (FS.auto) FS.autoTried = false;
}
function onFullscreenChange() { resize(); }
document.addEventListener("fullscreenchange", onFullscreenChange);
document.addEventListener("webkitfullscreenchange", onFullscreenChange);

const fsBtn = document.getElementById("fsbtn");
function updateFsBtn() {
  if (!fsBtn) return;
  fsBtn.style.display = (state === "title" || state === "shop" || state === "over" || state === "gates" || state === "boon" || paused) && fsSupported() ? "block" : "none";
  fsBtn.textContent = isFullscreen() ? "EXIT FULL ⛶" : "FULLSCREEN ⛶";
}
if (fsBtn) {
  const fsClick = (e) => { e.preventDefault(); e.stopPropagation(); toggleFullscreen(); updateFsBtn(); };
  fsBtn.addEventListener("click", fsClick);
  fsBtn.addEventListener("touchstart", fsClick, { passive: false });
}

/* ---------------- §D AUDIO ---------------- */
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.muted = store.get("muted") === "1";
    this.musicOn = false;
  }
  unlock() {
    if (!this.ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      const c = this.ctx = new AC();
      this.master = c.createGain();
      this.master.gain.value = this.muted ? 0 : 0.9;
      const comp = c.createDynamicsCompressor();
      this.master.connect(comp); comp.connect(c.destination);
      // feedback-delay "reverb" send
      this.send = c.createGain(); this.send.gain.value = 0.35;
      const delay = c.createDelay(1); delay.delayTime.value = 0.26;
      const fb = c.createGain(); fb.gain.value = 0.28;
      this.send.connect(delay); delay.connect(fb); fb.connect(delay);
      delay.connect(this.master);
      // music bus (duckable)
      this.musicGain = c.createGain(); this.musicGain.gain.value = 0.5;
      this.musicGain.connect(this.master); this.musicGain.connect(this.send);
      // noise buffer
      const buf = c.createBuffer(1, c.sampleRate, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      this.noiseBuf = buf;
      this.startMusic();
    }
    if (this.ctx.state !== "running") this.ctx.resume();
  }
  toggleMute() {
    this.muted = !this.muted;
    store.set("muted", this.muted ? "1" : "0");
    if (this.master) this.master.gain.value = this.muted ? 0 : 0.9;
  }
  ok() { return this.ctx && this.ctx.state === "running" && !this.muted; }
  tone(type, f0, f1, t0, dur, vol, wet) {
    const c = this.ctx, o = c.createOscillator(), g = c.createGain();
    o.type = type;
    o.frequency.setValueAtTime(f0, t0);
    if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(this.master);
    if (wet) g.connect(this.send);
    o.start(t0); o.stop(t0 + dur + 0.05);
  }
  noise(t0, dur, vol, filterType, f0, f1, pan) {
    const c = this.ctx, s = c.createBufferSource(), g = c.createGain();
    s.buffer = this.noiseBuf;
    const fl = c.createBiquadFilter();
    fl.type = filterType;
    fl.frequency.setValueAtTime(f0, t0);
    if (f1) fl.frequency.exponentialRampToValueAtTime(Math.max(20, f1), t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    s.connect(fl); fl.connect(g);
    let out = g;
    if (pan !== undefined && c.createStereoPanner) {
      const p = c.createStereoPanner(); p.pan.value = pan; g.connect(p); out = p;
    }
    out.connect(this.master);
    s.start(t0); s.stop(t0 + dur + 0.05);
  }
  /* --- SFX --- */
  shot(which) {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    const base = which === 1 ? 720 : 880;
    this.tone("square", base, base * 1.6, t, 0.05, 0.05, false);
  }
  enemyShot() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("sawtooth", 300, 180, t, 0.08, 0.04, false);
  }
  explosion(big) {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;

/* pooled; kind 0 = spark, 1 = expanding ring, 2 = thruster, 3 = debris */
const parts = [];
for (let i = 0; i < CONFIG.maxParticles; i++)
  parts.push({ on: false, kind: 0, x: 0, y: 0, vx: 0, vy: 0, life: 0, max: 1, size: 2, col: "#fff", drag: 0, maxR: 0 });
let partIdx = 0;
function spawnPart(kind, x, y, vx, vy, life, size, col, drag, maxR) {
  const p = parts[partIdx = (partIdx + 1) % parts.length];
  p.on = true; p.kind = kind; p.x = x; p.y = y; p.vx = vx; p.vy = vy;
  p.life = life; p.max = life; p.size = size; p.col = col; p.drag = drag || 0; p.maxR = maxR || 0;
}
function burst(x, y, n, col, speed, life, size) {
  for (let i = 0; i < n; i++) {
    const a = rand(0, TAU), s = rand(speed * 0.25, speed);
    spawnPart(0, x, y, Math.cos(a) * s, Math.sin(a) * s, rand(life * 0.5, life), rand(size * 0.6, size), col, 2.6);
  }
}

function debris(x, y, n, col) {
  for (let i = 0; i < n; i++) {
    const a = rand(0, TAU), s = rand(40, 220);
    spawnPart(3, x, y, Math.cos(a) * s, Math.sin(a) * s + rand(-30, 30), rand(0.5, 1.2), rand(2, 4), col, 1.2);

}
function updateParts(dt) {

    p.life -= dt;
    if (p.life <= 0) { p.on = false; continue; }
    if (p.kind !== 1) {
      const k = Math.exp(-p.drag * dt);
      p.vx *= k; p.vy *= k;
      if (p.kind === 3) p.vy += 280 * dt;   // debris falls
      p.x += p.vx * dt; p.y += p.vy * dt;

}

  for (const p of parts) {
    if (!p.on) continue;

      ctx.globalAlpha = a * 0.7;
      ctx.strokeStyle = p.col; ctx.lineWidth = ps(2);
      ctx.shadowBlur = ps(10); ctx.shadowColor = p.col;
      ctx.beginPath(); ctx.arc(px(p.x), py(p.y), ps(r), 0, TAU); ctx.stroke();
    } else {
      ctx.globalAlpha = a;
      ctx.fillStyle = p.col;
      ctx.shadowBlur = ps(6); ctx.shadowColor = p.col;
      const s = ps(p.size * (p.kind === 3 ? 1 : a + 0.3));
      ctx.fillRect(px(p.x) - s * 0.5, py(p.y) - s * 0.5, s, s);

    g.addColorStop(0, n.col);

  let b = p.bless[id];

  if (b.stacks >= def.max) { b.rarity = Math.max(b.rarity, rarityIdx || 0); return; }

/* heal a player by n HP, clamped to their max; floats a small "+HP" when alive.
   No-op on downed/dead players (revive restores HP separately). */
function healPlayer(p, n, showFloat) {
  if (!p || !p.alive || p.downed) return 0;
  const mx = maxHPFor(p);
  const before = p.hp;
  p.hp = clamp(p.hp + n, 0, mx);
  const gained = p.hp - before;
  if (gained > 0 && showFloat) floatText(p.x, p.y - 30, "+" + gained + "HP", "#7affc4", 13);
  return gained;
}
function maxBombsFor() { return CONFIG.maxBombs + (meta.bomb || 0); }
function curLevel(p) { return p.wlvl[p.wtype]; }
function curWeaponDef(p) { return WEAPONS[p.wtype]; }

/* ---------------- §I RUN / SECTOR DIRECTOR ----------------
   A RUN is a sequence of SECTORS. Each normal sector is a multi-wave gauntlet
   (CONFIG.wavesPerSector choreographed waves). Every CONFIG.bossEvery-th sector
   is a BOSS sector. Clearing a sector opens HADES-STYLE GATES (reward doors);
   entering one applies its reward (BLESSING gates open a choose-1-of-3 boon pick)
   and proceeds to the next, deeper, escalating sector. Runs are endless with a
   loop counter; difficulty scales with depth & loop. */
function newGame(players) {
  numPlayers = players;
  reassignPads();
  game = {
    score: 0, combo: 0, comboT: 0, maxCombo: 0,
    depth: 0,           // sectors entered (run depth)
    loop: 1,            // full cycles completed (endless-with-loops)
    sectorWave: 0,      // waves dispatched within the current sector
    sectorWaves: CONFIG.wavesPerSector,
    isBossSector: false,
    bossesKilled: 0,
    kills: 0,
    waveTimer: 1.4,
    waveActive: false,
    spawnQueue: [],     // {t, fn}
    spawnClock: 0,
    bossPending: false,
    sectorCleared: false,
    players: [],
    elapsed: 0,
    timeDil: 0,         // CHRONO BOMB slow-time timer
    reviveTokens: (meta.revive || 0),
    rerolls: (meta.reroll || 0),
    creditsEarned: 0,
    // gate / boon UI state
    gates: null,        // array of gate offers when state === "gates"
    gateSel: 0,
    boon: null,         // { player, options:[...] } when state === "boon"
    boonSel: 0,
    boonQueue: [],      // pending blessing picks (one per player, sequential)
    // legacy aliases kept so older HUD/scaling references still resolve
    get stage() { return this.depth; },
    set stage(v) { this.depth = v; },
    get wave() { return this.sectorWave; },
  };
  for (let i = 0; i < players; i++) {
    const p = makePlayer(i);
    p.alive = true; p.invuln = CONFIG.invulnTime;
    game.players.push(p);
  }
  enemies.length = 0; powerups.length = 0;
  clearEnemyBullets(false);
  for (const b of pBullets) b.on = false;
  texts.length = 0;
  boss = null;
  startSector();
}

/* begin a fresh sector at the current depth; pick boss vs gauntlet by cadence */
function startSector() {
  game.depth++;
  game.sectorWave = 0;
  game.sectorCleared = false;
  game.waveActive = false;
  game.bossPending = false;
  game.waveTimer = 1.2;
  game.spawnQueue.length = 0;
  game.spawnClock = 0;
  // bigger gauntlets as the run deepens (meatier "longer levels")
  game.sectorWaves = CONFIG.wavesPerSector + Math.min(3, Math.floor(game.depth / 4));
  game.isBossSector = (game.depth % CONFIG.bossEvery === 0);
  // CHALLENGE sectors (flagged by the chosen gate) ramp harder for double reward
  if (game.challengeNext) { game.challenge = true; game.challengeNext = false; game.sectorWaves += 1; }
  else game.challenge = false;
  // small between-sector hull repair (rewards clearing; tunable)
  if (game.players) for (const p of game.players) healPlayer(p, CONFIG.sectorHeal, false);
  const label = game.isBossSector ? "BOSS SECTOR" : ("SECTOR " + game.depth);
  showToast((game.challenge ? "⚔ CHALLENGE — " : "") + label + (game.loop > 1 ? "  ·  LOOP " + game.loop : ""));
}

/* enqueue the next choreographed wave of the current sector. The boss sector
   instead flags the boss to spawn once the field is clear. Wider field => wider
   formations (x positions span the new CONFIG.playW). */
function buildWave() {
  game.sectorWave++;
  const W = CONFIG.playW;
  game.spawnQueue.length = 0;
  game.spawnClock = 0;
  const lvl = (game.loop - 1) * 0.6 + game.depth * 0.14 + (game.challenge ? 0.8 : 0);
  const cmul = game.challenge ? 1.4 : 1;   // challenge sectors spawn more
  const q = game.spawnQueue;
  const add = (t, fn) => q.push({ t, fn });

  // BOSS sector: signal the boss once the (final) wave's lead-in clears
  if (game.isBossSector) { game.bossPending = true; return; }

  const pat = game.sectorWave % 6;
  if (pat === 1) {
    // diver column (spread across the wide field)
    const n = Math.round(6 * cmul);
    for (let i = 0; i < n; i++)
      add(i * 0.3, () => spawnEnemy(0, W * (0.16 + 0.68 * (i / Math.max(1, n - 1))), -30, { speed: 150 + lvl * 8, drops: i === n - 1 }));
  } else if (pat === 2) {
    // weaver V
    const n = Math.round(7 * cmul);
    for (let i = 0; i < n; i++)
      add(i * 0.26, () => spawnEnemy(1, W * 0.5 + (i - (n - 1) / 2) * 30, -30 - Math.abs(i - (n - 1) / 2) * 18, { amp: 110, freq: 1.8, speed: 80 }));
  } else if (pat === 3) {
    // strafers from both sides, deeper rows on the wide field
    const n = Math.round(5 * cmul);
    for (let i = 0; i < n; i++) {
      add(i * 0.38, () => spawnEnemy(2, -20, 80 + i * 36, { dir: 1, speed: 150, targetY: 80 + i * 36 }));
      add(i * 0.38 + 0.2, () => spawnEnemy(2, W + 20, 120 + i * 36, { dir: -1, speed: 150, targetY: 120 + i * 36 }));
    }
  } else if (pat === 4) {
    // turret arc + divers (turrets span the wider arc)
    for (let i = 0; i < 4; i++)
      add(i * 0.45, () => spawnEnemy(3, W * (0.18 + 0.21 * i), -30, { speed: 60, targetY: 70 + (i % 2) * 14 }));
    for (let i = 0; i < Math.round(5 * cmul); i++)
      add(1.6 + i * 0.28, () => spawnEnemy(0, W * (0.22 + 0.12 * i), -30, { speed: 160 }));
  } else if (pat === 5) {
    // twin gunships + escorts on the wide field
    add(0, () => spawnEnemy(4, W * 0.32, -50, { speed: 50, targetY: 110, drops: true }));
    if (game.depth > 3 || game.challenge) add(0.4, () => spawnEnemy(4, W * 0.68, -50, { speed: 50, targetY: 130, drops: true }));
    for (let i = 0; i < Math.round(6 * cmul); i++)
      add(0.5 + i * 0.24, () => spawnEnemy(1, W * (0.12 + 0.13 * i), -30, { amp: 70, speed: 90 }));
  } else {
    // mixed swarm across the full width
    const n = Math.round(8 * cmul);
    for (let i = 0; i < n; i++) {
      const ty = randi(0, 2);
      add(i * 0.2, () => spawnEnemy(ty, rand(W * 0.1, W * 0.9), -30, { speed: 120 + lvl * 6, amp: 90, dir: i % 2 ? 1 : -1, targetY: 60 + rand(0, 110) }));
    }
  }
  game.waveActive = true;
}

    else if (k === "Enter" || k === " " || k === "j") { shopConfirm(); }
    else if (k === "Escape" || k === "p") { closeShop(); }

  if (state === "gates") {

    else if (k === "ArrowRight" || k === "d") { game.gateSel = (game.gateSel + 1) % n; audio.toast(); }

function titleAdjust() {

  startGame();
}
function openShop() { state = "shop"; shopSel = 0; audio.toast(); updateFsBtn(); }

  if (game && game.fromGate) {

    game.fromGate = false;

/* mouse (P1 optional follow) */
canvas.addEventListener("mousemove", (e) => {

/* clickable menu-row hit testing (rects in canvas px, populated at draw time) */
let menuRects = [], shopRects = [], gateRects = [], boonRects = [], rerollRect = null;
function hitMenuRow(rects, cx, cy) {
  for (let i = 0; i < rects.length; i++) {
    const r = rects[i];
    if (r && cx >= r.x && cx <= r.x + r.w && cy >= r.y && cy <= r.y + r.h) return r.idx;
  }
  return -1;
}
window.addEventListener("mouseup", () => { mouseDown = false; });

/* touch */
const touches = { move: null, bomb: false, missile: false };
let bombBtnRect = { x: 0, y: 0, r: 0 };
let missileBtnRect = { x: 0, y: 0, r: 0 };
function ptInBomb(cx, cy) {
  return dist2(cx, cy, bombBtnRect.x, bombBtnRect.y) < bombBtnRect.r * bombBtnRect.r;
}
function ptInMissile(cx, cy) {
  return dist2(cx, cy, missileBtnRect.x, missileBtnRect.y) < missileBtnRect.r * missileBtnRect.r;
}
canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  audio.unlock();
  if (state === "title") {
    const r = canvas.getBoundingClientRect();
    const t0 = e.changedTouches[0];
    const row = hitMenuRow(menuRects, t0.clientX - r.left, t0.clientY - r.top);
    if (row >= 0) { titleSel = row; titleConfirm(); } else titleConfirm();
    return;
  }
  if (state === "shop") {
    const r = canvas.getBoundingClientRect();
    const t0 = e.changedTouches[0];
    const row = hitMenuRow(shopRects, t0.clientX - r.left, t0.clientY - r.top);
    if (row >= 0) { shopSel = row; shopConfirm(); }
    return;
  }
  if (state === "gates") {
    const r = canvas.getBoundingClientRect();
    const t0 = e.changedTouches[0];
    const row = hitMenuRow(gateRects, t0.clientX - r.left, t0.clientY - r.top);
    if (row >= 0) { game.gateSel = row; chooseGate(row); }
    return;
  }
  if (state === "boon") {
    const r = canvas.getBoundingClientRect();
    const t0 = e.changedTouches[0];
    const cx = t0.clientX - r.left, cy = t0.clientY - r.top;
    const row = hitMenuRow(boonRects, cx, cy);
    if (row >= 0) { game.boonSel = row; chooseBoon(row); }
    else if (rerollRect && cx >= rerollRect.x && cx <= rerollRect.x + rerollRect.w && cy >= rerollRect.y && cy <= rerollRect.y + rerollRect.h) rerollBoon();
    return;
  }
  if (state === "over") { goTitle(); return; }
  for (const t of e.changedTouches) {
    const r = canvas.getBoundingClientRect();
    const cx = t.clientX - r.left, cy = t.clientY - r.top;
    if (ptInBomb(cx, cy)) { if (game) usePlayerBomb(game.players[0]); touches.bomb = true; }
    else if (ptInMissile(cx, cy)) { touches.missile = true; }
    else { touches.move = { id: t.identifier, x: (cx - playX) / viewScale, y: (cy - playY) / viewScale }; }
  }
}, { passive: false });
canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  for (const t of e.changedTouches) {
    if (touches.move && t.identifier === touches.move.id) {
      touches.move.x = (t.clientX - r.left - playX) / viewScale;
      touches.move.y = (t.clientY - r.top - playY) / viewScale;
    }
  }
}, { passive: false });
function endTouch(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (touches.move && t.identifier === touches.move.id) touches.move = null;
  }
  touches.bomb = false;
  touches.missile = false;
}
canvas.addEventListener("touchend", endTouch, { passive: false });
canvas.addEventListener("touchcancel", endTouch, { passive: false });

/* gamepad */
let gamepads = {};            // index -> {prev buttons}
let padAssign = [null, null]; // player idx -> gamepad index
let lastPadConnected = -1;
const PAD_DEAD = 0.28;
window.addEventListener("gamepadconnected", (e) => {

window.addEventListener("gamepaddisconnected", (e) => {
  showToast("gamepad " + (e.gamepad.index + 1) + " disconnected");

function getPads() {
  try { return navigator.getGamepads ? navigator.getGamepads() : []; }
  catch (e) { return []; }
}
function reassignPads() {
  const pads = getPads();
  const idxs = [];
  for (let i = 0; i < pads.length; i++) if (pads[i]) idxs.push(i);
  // P1 prefers keyboard; assign pads to P2 first then P1 if available
  padAssign[0] = null; padAssign[1] = null;
  if (numPlayers === 2) {
    if (idxs.length >= 1) padAssign[1] = idxs[0];
    if (idxs.length >= 2) padAssign[0] = idxs[1];
  } else {
    if (idxs.length >= 1) padAssign[0] = idxs[0];
  }
}
// poll for menu/start + pause via gamepad each frame
let padPrev = {};
function readPad(idx) {
  if (idx == null) return null;
  const pads = getPads();
  const gp = pads[idx];
  if (!gp) return null;
  const ax = gp.axes || [];
  let mx = ax[0] || 0, my = ax[1] || 0;
  // d-pad fallback (buttons 12-15)
  const b = gp.buttons || [];
  const pressed = (i) => b[i] && b[i].pressed;
  if (pressed(14)) mx = -1; if (pressed(15)) mx = 1;
  if (pressed(12)) my = -1; if (pressed(13)) my = 1;
  if (Math.hypot(mx, my) < PAD_DEAD) { mx = 0; my = 0; }
  return {
    mx, my,
    bomb: pressed(3) || pressed(0) || pressed(2),  // triangle / A(cross) / square
    missile: pressed(1) || pressed(5) || pressed(7), // circle/B / RB / RT
    start: pressed(9),
    confirm: pressed(0) || pressed(9),
    up: pressed(12) || (ax[1] || 0) < -0.6,
    down: pressed(13) || (ax[1] || 0) > 0.6,
    left: pressed(14) || (ax[0] || 0) < -0.6,
    right: pressed(15) || (ax[0] || 0) > 0.6,
  };
}
function padEdge(idx, field, val) {
  const key = idx + ":" + field;
  const was = padPrev[key];
  padPrev[key] = val;
  return val && !was;
}
function pollPadMenus() {
  const pads = getPads();
  for (let i = 0; i < pads.length; i++) {
    if (!pads[i]) continue;
    const p = readPad(i);
    if (!p) continue;
    if (state === "title") {
      if (padEdge(i, "up", p.up)) { titleSel = (titleSel + TITLE_ITEMS - 1) % TITLE_ITEMS; audio.toast(); }
      if (padEdge(i, "down", p.down)) { titleSel = (titleSel + 1) % TITLE_ITEMS; audio.toast(); }
      if (padEdge(i, "left", p.left) || padEdge(i, "right", p.right)) { if (titleSel === 1 || titleSel === 2) titleAdjust(); }
      if (padEdge(i, "confirm", p.confirm)) titleConfirm();
    } else if (state === "shop") {
      const n = META_UPGRADES.length;
      if (padEdge(i, "up", p.up)) { shopSel = (shopSel + n) % (n + 1); audio.toast(); }
      if (padEdge(i, "down", p.down)) { shopSel = (shopSel + 1) % (n + 1); audio.toast(); }
      if (padEdge(i, "confirm", p.confirm)) shopConfirm();
      if (padEdge(i, "missile", p.missile)) closeShop();   // circle/B = back
    } else if (state === "gates") {
      const n = game.gates ? game.gates.length : 0;
      if (n) {
        if (padEdge(i, "left", p.left)) { game.gateSel = (game.gateSel + n - 1) % n; audio.toast(); }
        if (padEdge(i, "right", p.right)) { game.gateSel = (game.gateSel + 1) % n; audio.toast(); }
        if (padEdge(i, "confirm", p.confirm)) chooseGate(game.gateSel);
      }
    } else if (state === "boon") {
      const n = game.boon ? game.boon.options.length : 0;
      if (n) {
        if (padEdge(i, "left", p.left)) { game.boonSel = (game.boonSel + n - 1) % n; audio.toast(); }
        if (padEdge(i, "right", p.right)) { game.boonSel = (game.boonSel + 1) % n; audio.toast(); }
        if (padEdge(i, "confirm", p.confirm)) chooseBoon(game.boonSel);
        if (padEdge(i, "missile", p.missile)) rerollBoon();   // circle/B = reroll
      }
    } else if (state === "over") {
      if (padEdge(i, "confirm", p.confirm)) goTitle();
    } else if (state === "play") {
      if (padEdge(i, "start", p.start)) { paused = !paused; updateFsBtn(); }
    }
  }
}

/* ---------------- §K PLAYER ACTIONS ---------------- */
function usePlayerBomb(p) {
  if (!p || !p.alive || p.downed || p.bombs <= 0) return;
  p.bombs--;
  const cleared = clearEnemyBullets(true);
  // WIDE BLAST blessing scales bomb damage; CHRONO BOMB slows time briefly
  const bmul = 1 + blessVal(p, "bombr");
  for (const e of enemies) { e.hp -= 6 * bmul; e.flash = 0.2; if (e.hp <= 0) killEnemy(e, p.idx); }
  if (boss) {
    boss.hp -= 60 * bmul; boss.flash = 0.2;
    for (const part of boss.parts) if (part.alive) part.hp -= 30 * bmul;
  }
  const td = blessVal(p, "timedil");
  if (td > 0) { game.timeDil = Math.max(game.timeDil || 0, td); }
  game.score += cleared * 5;
  audio.bomb();
  addShake(16, 0.5);
  ring(p.x, p.y, p.col.ship, 600 * (1 + blessVal(p, "bombr") * 0.2), 0.7);
  ring(p.x, p.y, "#ffffff", 400, 0.5);
  burst(p.x, p.y, 40, p.col.ship, 360, 0.7, 4);
  floatText(p.x, p.y - 30, "BOMB!", "#ffffff", 22);
}

function addScore(n, x, y, col) {
  const mult = 1 + game.combo * 0.05;
  const gained = Math.round(n * mult);
  game.score += gained;
  if (x !== undefined) floatText(x, y, "" + gained, col || "#ffe98a", 14);
}
function registerKill(score, x, y) {
  game.combo = Math.min(CONFIG.comboMax, game.combo + 1);
  game.comboT = CONFIG.comboWindow;
  if (game.combo > game.maxCombo) game.maxCombo = game.combo;
  game.kills++;
  addScore(score + game.combo * 10, x, y);
}

/* Apply `dmg` HP of damage to a player. Shield absorbs one hit before HP.
   When HP reaches 0: SOLO consumes a life & respawns (game over when out);
   CO-OP sends the player DOWNED for a partner to revive. dmg defaults to 1. */
function damagePlayer(p, dmg) {
  if (!p.alive || p.downed || p.invuln > 0) return;
  dmg = dmg || 1;
  if (p.shield) {
    p.shield = false; p.invuln = 1.2;
    burst(p.x, p.y, 20, "#aef", 220, 0.5, 3);
    ring(p.x, p.y, "#aef", 80, 0.4);
    audio.explosion(false);
    // THORN FIELD blessing: shield break clears bullets near you & zaps foes
    const th = blessVal(p, "thorn");
    if (th > 0) {
      ring(p.x, p.y, "#ff8a4a", 120, 0.4);
      for (const e of enemies) { if (!e.dead && dist2(p.x, p.y, e.x, e.y) < 160 * 160) { e.hp -= 6 * th; e.flash = 0.15; if (e.hp <= 0) killEnemy(e, p.idx); } }
    }
    return;
  }
  // chip HP; brief i-frames + hit-flash so you don't melt to a stream
  p.hp -= dmg;
  p.hitFlash = 0.32;
  p.invuln = CONFIG.hitInvuln;
  audio.hurt();
  addShake(6, 0.18);
  burst(p.x, p.y, 8, "#ff7a7a", 160, 0.4, 3);
  ring(p.x, p.y, "#ff5a5a", 40, 0.3);
  if (p.hp > 0) {
    floatText(p.x, p.y - 28, "-" + dmg, "#ff8a8a", 13);
    return;
  }
  // HP depleted -> downed (co-op) or life loss (solo)
  downPlayer(p);
}

/* HP hit 0. SOLO: consume a life & respawn (or game over). CO-OP: the player
   becomes a drifting wreck/escape-pod that a partner can revive. */
function downPlayer(p) {
  p.hp = 0;
  game.combo = 0;
  // a partner is "available" only if alive and not themselves downed
  const partnerUp = game.players.some((q) => q !== p && q.alive && !q.downed);
  if (numPlayers === 2 && partnerUp) {
    // CO-OP DOWNED: drifting invulnerable wreck; partner revives by proximity
    p.downed = true;
    p.alive = true;            // stays "alive" (drifts/draws) but disabled & invuln
    p.downedT = CONFIG.downedTimeout;
    p.reviveProg = 0;
    p.reviverIdx = -1;
    p.vx *= 0.3; p.vy *= 0.3;
    audio.downed();
    addShake(10, 0.4);
    burst(p.x, p.y, 28, p.col.ship, 280, 0.8, 4);
    debris(p.x, p.y, 10, p.col.ship);
    ring(p.x, p.y, p.col.ship, 160, 0.6);
    floatText(p.x, p.y - 30, "DOWNED", "#ff6b6b", 18);
    return;
  }
  // SOLO (or no partner up): lose a life, respawn / game over
  loseLifeAndRespawn(p, true);
}

/* Consume one life. Respawn (full HP, i-frames) if any remain, else go OUT and
   check game over. `effects` adds the death burst (skipped for the silent
   downed-timeout path so the wreck doesn't re-explode). */
function loseLifeAndRespawn(p, effects) {
  p.downed = false; p.reviveProg = 0; p.reviverIdx = -1;
  p.lives--;
  p.deathFlash = 0.3;
  game.combo = 0;
  if (effects) {
    audio.playerDeath();
    addShake(14, 0.45);
    burst(p.x, p.y, 36, p.col.ship, 320, 0.9, 4);
    debris(p.x, p.y, 14, p.col.ship);
    ring(p.x, p.y, p.col.ship, 200, 0.6);
  }
  if (p.lives <= 0) {
    p.alive = false; p.spectating = true;
    checkGameOver();
  } else {
    p.alive = false;
    p.respawnT = 1.0;
  }
}
function respawnPlayer(p) {
  p.alive = true; p.spectating = false;
  p.downed = false; p.reviveProg = 0; p.reviverIdx = -1;
  p.x = CONFIG.playW * (p.idx === 0 ? 0.38 : 0.62);
  p.y = CONFIG.playH * 0.88;
  p.vx = 0; p.vy = 0;
  p.invuln = CONFIG.invulnTime;
  p.hp = maxHPFor(p); p.maxhp = maxHPFor(p); p.hitFlash = 0;
  // soften the loss: drop the current weapon a level (keep min 1) & lose an Option
  p.wlvl[p.wtype] = Math.max(1, p.wlvl[p.wtype] - 1);
  if (p.options > 0) p.options--;
}
/* a downed wreck is revived by a partner: returns at partial HP with i-frames.
   Reviving costs the downed player one life; with no lives left a REVIVE TOKEN
   is spent if owned, otherwise the revive fails (they stay down). */
function completeRevive(p) {
  if (!p.downed) return;
  if (p.lives > 0) {
    p.lives--;
  } else if (game.reviveTokens > 0) {
    game.reviveTokens--;
    floatText(p.x, p.y - 44, "TOKEN", "#ffd36e", 13);
  } else {
    // no lives & no token — cannot revive; remain downed
    p.reviveProg = 0; p.reviverIdx = -1;
    return;
  }
  p.downed = false; p.reviveProg = 0; p.reviverIdx = -1;
  p.alive = true; p.spectating = false;
  p.hp = Math.max(1, Math.round(maxHPFor(p) * CONFIG.reviveHPFrac));
  p.maxhp = maxHPFor(p);
  p.invuln = CONFIG.invulnTime;
  p.hitFlash = 0;
  audio.reviveDone();
  ring(p.x, p.y, p.col.ship, 220, 0.7);
  burst(p.x, p.y, 30, p.col.ship, 300, 0.8, 4);
  floatText(p.x, p.y - 30, "REVIVED!", "#7affc4", 18);
}
/* game over when nobody can still act: no player is up (alive & not downed) and
   none can respawn (no lives & not awaiting respawn), AND no downed wreck remains
   that a token could still recover. */
function checkGameOver() {
  const anyUp = game.players.some((p) => (p.alive && !p.downed) || p.lives > 0 || (p.respawnT > 0));
  const anyDownedRecoverable = game.players.some((p) => p.downed && (p.lives > 0 || game.reviveTokens > 0) &&
    game.players.some((q) => q !== p && q.alive && !q.downed));
  if (!anyUp && !anyDownedRecoverable) endGame();
}
let bestDepth = parseInt(store.get("bestdepth") || "0", 10) || 0;
function endGame() {
  state = "over"; paused = false;
  if (game.score > bestScore) { bestScore = game.score; store.set("best", "" + bestScore); }
  if (game.depth > bestDepth) { bestDepth = game.depth; store.set("bestdepth", "" + bestDepth); }
  // bank a fraction of run score + a depth bonus as persistent META credits
  game.creditsEarned = Math.floor(game.score / CONFIG.creditDivisor) + game.maxCombo * 2 + game.depth * 8;
  credits += game.creditsEarned;
  saveMeta();
  updateFsBtn();
}

/* ---------------- §L UPDATE: PLAYERS ---------------- */
function readPlayerInput(p) {
  let ix = 0, iy = 0, wantsMouse = false;
  if (p.idx === 0) {
    // keyboard
    for (const k in KEYMAP_P1_MOVE) {
      if (keys[k]) {
        const d = KEYMAP_P1_MOVE[k];
        if (d === "l") ix -= 1; else if (d === "r") ix += 1;
        else if (d === "u") iy -= 1; else if (d === "d") iy += 1;
      }
    }
  } else {
    // second keyboard set
    for (const k in KEYMAP_P2_MOVE) {
      if (keys[k]) {
        const d = KEYMAP_P2_MOVE[k];
        if (d === "l") ix -= 1; else if (d === "r") ix += 1;
        else if (d === "u") iy -= 1; else if (d === "d") iy += 1;
      }
    }
  }
  // gamepad
  const pad = readPad(padAssign[p.idx]);
  if (pad && (pad.mx || pad.my)) { ix += pad.mx; iy += pad.my; }
  if (pad && padEdge("act" + p.idx, "bomb", pad.bomb)) usePlayerBomb(p);
  // touch / mouse (P1 only)
  if (p.idx === 0) {
    if (touchUI && touches.move) {
      wantsMouse = "touch";
    } else if (mouseActive && mouseDown && state === "play") {
      wantsMouse = "mouse";
    }
  }
  return { ix, iy, wantsMouse };
}

/* secondary missile-salvo trigger: held / pressed. P1 = Shift or X (keyboard),
   touch MISSILE button; P2 = comma; gamepad = circle/B (button 1) or RB (5). */
function wantsMissile(p) {
  if (p.idx === 0) {
    if (keys["Shift"] || keys["x"]) return true;
    if (touchUI && touches.missile) return true;
  } else {
    if (keys[","]) return true;
  }
  const pad = readPad(padAssign[p.idx]);
  if (pad && pad.missile) return true;
  return false;
}

function updatePlayer(p, dt) {
  if (p.deathFlash > 0) p.deathFlash -= dt;
  if (p.hitFlash > 0) p.hitFlash -= dt;
  // DOWNED wreck: drifts slowly, cannot fire / act / be hit. Auto-timeout to a
  // life loss (or stay down if out of lives). Revive handled in updateRevives().
  if (p.downed) {
    p.x = clamp(p.x + p.vx * dt, 14, CONFIG.playW - 14);
    p.y = clamp(p.y + p.vy * dt + 14 * dt, 30, CONFIG.playH - 20);  // slow drift down
    p.vx *= Math.exp(-1.2 * dt); p.vy *= Math.exp(-1.2 * dt);
    p.downedT -= dt;
    if (Math.random() < 0.4) spawnPart(0, p.x + rand(-8, 8), p.y + rand(-6, 6), rand(-10, 10), rand(-20, 5), rand(0.3, 0.6), rand(2, 3), "#ff8a5a", 2);
    if (p.downedT <= 0) {
      // un-revived too long: lose a life & auto-respawn if any remain
      if (p.lives > 0) { loseLifeAndRespawn(p, false); }
      else { p.downedT = 0; checkGameOver(); }   // out of lives: stay down, maybe game over
    }
    return;
  }
  if (!p.alive) {
    if (p.respawnT > 0) {
      p.respawnT -= dt;
      if (p.respawnT <= 0 && p.lives > 0) respawnPlayer(p);
    }
    return;
  }
  if (p.invuln > 0) p.invuln -= dt;
  if (p.speedBoost > 0) p.speedBoost -= dt;
  // low-HP warning: pulse phase + periodic beep when at/under the danger fraction
  if (p.hp <= maxHPFor(p) * CONFIG.lowHPFrac) {
    const wasPhase = Math.floor(p.lowPulse / 0.9);
    p.lowPulse += dt;
    if (Math.floor(p.lowPulse / 0.9) !== wasPhase) audio.lowHP();
  } else { p.lowPulse = 0; }
  const inp = readPlayerInput(p);
  const spd = CONFIG.shipSpeed * (p.speedBoost > 0 ? 1.45 : 1);

  if (inp.wantsMouse === "touch" && touches.move) {
    // ship follows finger with an offset so it isn't hidden under the thumb
    const tx = clamp(touches.move.x, 0, CONFIG.playW);
    const ty = clamp(touches.move.y - 60, 0, CONFIG.playH);
    p.x = lerp(p.x, tx, clamp(dt * 14, 0, 1));
    p.y = lerp(p.y, ty, clamp(dt * 14, 0, 1));
    p.vx = 0; p.vy = 0;
  } else if (inp.wantsMouse === "mouse") {
    const tx = clamp(mouseX, 0, CONFIG.playW);
    const ty = clamp(mouseY, 0, CONFIG.playH);
    p.x = lerp(p.x, tx, clamp(dt * 16, 0, 1));
    p.y = lerp(p.y, ty, clamp(dt * 16, 0, 1));
    p.vx = 0; p.vy = 0;
  } else {
    const len = Math.hypot(inp.ix, inp.iy) || 1;
    const tvx = (inp.ix / (len > 1 ? len : 1)) * spd;
    const tvy = (inp.iy / (len > 1 ? len : 1)) * spd;
    p.vx = lerp(p.vx, tvx, clamp(dt * 12, 0, 1));
    p.vy = lerp(p.vy, tvy, clamp(dt * 12, 0, 1));
    p.x += p.vx * dt; p.y += p.vy * dt;
  }
  p.x = clamp(p.x, 14, CONFIG.playW - 14);
  p.y = clamp(p.y, 30, CONFIG.playH - 20);

  // thruster trail
  if (Math.random() < 0.8) {
    spawnPart(2, p.x + rand(-3, 3), p.y + 12, rand(-12, 12), rand(120, 220), rand(0.18, 0.34), rand(2, 4),
      Math.random() < 0.5 ? p.col.ship : "#ffffff", 3);
  }

  // Option drones: orbit phase advances; they trail above/around the ship
  if (p.options > 0) p.optAng += dt * 2.4;

  // auto-fire
  p.fireCd -= dt;
  if (p.fireCd <= 0) {
    fireWeapon(p);
    const lvl = curLevel(p);
    const maxL = maxWeaponLevel();
    // per-type base rate (homing & wave are a touch slower; laser is fast)
    const wt = p.wtype;
    const base = wt === 1 ? CONFIG.fireBase * 0.6 : wt === 2 ? CONFIG.fireBase * 1.1 : wt === 3 ? CONFIG.fireBase * 1.25 : CONFIG.fireBase;
    const minR = wt === 1 ? CONFIG.fireMin * 0.55 : CONFIG.fireMin;
    let rate = lerp(base, minR, (lvl - 1) / (maxL - 1 || 1));
    rate *= Math.pow(0.94, meta.rate || 0);   // TRIGGER MOD meta upgrade
    p.fireCd = rate;
  }

  // secondary homing-missile salvo (manual, on cooldown)
  if (p.missileCd > 0) p.missileCd -= dt;
  if (p.alive && wantsMissile(p) && p.missileCd <= 0) {
    fireMissileSalvo(p);
    p.missileCd = CONFIG.missileCd;
  }

  // graze detection (near-miss of enemy bullets). WIDE FIELD blessing widens it.
  const grR = CONFIG.grazeR + blessVal(p, "grazeR");
  const gr2 = (grR + CONFIG.enemyBulletR) * (grR + CONFIG.enemyBulletR);
  const chargeMul = 1 + 0.25 * (meta.graze || 0);   // GRAZE TUNING meta
  for (const b of eBullets) {
    if (!b.on || b.grazed) continue;
    const d2 = dist2(p.x, p.y, b.x, b.y);
    if (d2 < gr2) {
      b.grazed = true;
      game.score += CONFIG.grazeScore;
      p.bombMeter += CONFIG.grazeCharge * chargeMul;
      floatText(b.x, b.y, "graze", "#9be7ff", 11);
      spawnPart(0, b.x, b.y, 0, 0, 0.3, 3, "#9be7ff", 4);
      // SIPHON GRAZE blessing: occasional heal HP (then shield) from grazing
      const sg = blessVal(p, "lifegraze");
      if (sg > 0 && Math.random() < sg * 0.06) {
        if (p.hp < maxHPFor(p)) healPlayer(p, 1, true);
        else if (!p.shield) { p.shield = true; floatText(p.x, p.y - 30, "+SHIELD", "#9be7ff", 14); }
      }
      if (p.bombMeter >= 1) {
        p.bombMeter -= 1;
        if (p.bombs < maxBombsFor()) { p.bombs++; audio.extraLife(); floatText(p.x, p.y - 30, "+BOMB", "#ffffff", 16); }
        else p.bombMeter = 1;
      }
    }
  }
}

/* CO-OP REVIVE: positional — an UP partner flying within reviveRange of a DOWNED
   wreck fills its revive ring over reviveTime seconds; completing it brings the
   wreck back at partial HP. No button needed (works on touch/gamepad). The
   reviver stays vulnerable while reviving (tension). */
function updateRevives(dt) {
  if (numPlayers < 2) return;
  for (const p of game.players) {
    if (!p.downed) continue;
    // find an UP partner within range (nearest wins)
    let reviver = null, bd = Infinity;
    for (const q of game.players) {
      if (q === p || !q.alive || q.downed) continue;
      const d2 = dist2(p.x, p.y, q.x, q.y);
      if (d2 < CONFIG.reviveRange * CONFIG.reviveRange && d2 < bd) { bd = d2; reviver = q; }
    }
    if (reviver) {
      const wasPhase = Math.floor(p.reviveProg / 0.2);
      p.reviveProg = clamp(p.reviveProg + dt / CONFIG.reviveTime, 0, 1);
      p.reviverIdx = reviver.idx;
      if (Math.floor(p.reviveProg / 0.2) !== wasPhase && p.reviveProg < 1) audio.reviveTick();
      if (p.reviveProg >= 1) completeRevive(p);
    } else {
      // drains back when nobody is reviving
      p.reviveProg = clamp(p.reviveProg - dt * 0.5, 0, 1);
      p.reviverIdx = -1;
    }
  }
}

/* Fire the player's current weapon from the ship AND mirror it through each
   Option drone (offset above/around the ship). Keeps fire purely pooled. */
function fireWeapon(p) {
  emitWeapon(p, p.x, p.y, false);
  // Options are a SUPPLEMENT: throttled cadence, simplified single bolts, and
  // diminishing per-drone damage so a full set augments rather than dominates.
  if (p.options > 0) {
    p.optFireTick = (p.optFireTick + 1) % CONFIG.optionFireEvery;
    if (p.optFireTick === 0) {
      const n = Math.min(CONFIG.maxOptions, p.options);
      for (let i = 0; i < n; i++) {
        const a = p.optAng + (i / n) * TAU;
        const ox = p.x + Math.cos(a) * CONFIG.optionOrbitR;
        const oy = p.y + Math.sin(a) * CONFIG.optionOrbitR * 0.7 - 6;
        fireOptionBolt(p, ox, oy, i);   // simplified, diminishing-damage bolt
      }
    }
  }
}

/* An Option drone fires a single straight bolt of the player's current weapon
   colour. It does NOT mirror the full multi-stream volley — it is a modest
   supplement. Per-Option damage uses diminishing returns (each further drone
   does optionFalloff^i of the base) and inherits only a reduced fraction of the
   player's offensive blessings (dmgup/crit/pierce/split). idx = drone index. */
function fireOptionBolt(p, ox, oy, idx) {
  const W = WEAPONS[p.wtype];
  const sp = CONFIG.pBulletSpeed;
  // diminishing per-Option damage as a fraction of a main shot
  const falloff = Math.pow(CONFIG.optionFalloff, idx);
  let dmg = CONFIG.pBulletDmg * CONFIG.optionDmg * falloff;
  // reduced blessing inheritance: a fraction of dmgup, plus capped pierce/split
  const bm = CONFIG.optionBlessMul;
  dmg *= 1 + blessVal(p, "dmgup") * bm;
  const cc = blessVal(p, "crit") * bm;
  let pierce = 0;
  if (cc > 0 && Math.random() < cc) dmg *= 1.5 + blessVal(p, "critdmg") * bm;
  // Options get at most +1 pierce (only if the player has heavy pierce stacks)
  if (blessVal(p, "pierce") >= 2) pierce = 1;
  const b = firePlayerRaw(ox, oy - 8, 0, -sp * 1.05, dmg, W.col, 0, CONFIG.pBulletR * 0.85, pierce, 0, p.idx);
  // small chance to inherit split, scaled down
  const sp2 = blessVal(p, "split") * bm;
  if (sp2 > 0) b.split = sp2;
}

/* current blessing emit-modifiers, set per emitWeapon call and consumed by
   firePlayer. Single shared object — no per-frame allocation in the hot loop. */
const curEmitMods = { dmgMul: 1, crit: false, critDmg: 1, pierce: 0, homing: false, split: 0, burn: 0, slow: 0, chain: 0 };
function computeEmitMods(p) {
  const m = curEmitMods;
  m.dmgMul = 1 + blessVal(p, "dmgup");
  // crit roll per volley
  const cc = blessVal(p, "crit");
  m.crit = cc > 0 && Math.random() < cc;
  m.critDmg = 1.5 + blessVal(p, "critdmg");
  m.pierce = Math.round(blessVal(p, "pierce"));
  m.homing = blessHas(p, "homingAll");
  m.split = blessVal(p, "split");
  m.burn = blessVal(p, "burn");
  m.slow = blessVal(p, "slow");
  m.chain = blessVal(p, "chain");
  return m;
}

/* Emit one volley of the current weapon type from (ox,oy). `isOption` softens
   damage and suppresses sound/muzzle for the drone mirror. */
function emitWeapon(p, ox, oy, isOption) {
  const wt = p.wtype;
  const lvl = curLevel(p);
  const W = WEAPONS[wt];
  const col = W.col;
  const sp = CONFIG.pBulletSpeed;
  const baseDmg = CONFIG.pBulletDmg * (isOption ? 0.6 : 1);
  computeEmitMods(p);
  const sprAdd = Math.round(blessVal(p, "spread"));   // SCATTER ARRAY extra shots
  if (!isOption) {
    spawnPart(0, ox, oy - 14, 0, -90, 0.1, 4, "#ffffff", 4);
    if (DETAIL) spawnPart(0, ox + rand(-3, 3), oy - 12, rand(-30, 30), -120, 0.12, 3, col, 4);
  }
  const which = p.idx + 1;
  // gate weapon-specific effect riders to the right weapon type
  const keepBurn = curEmitMods.burn, keepSlow = curEmitMods.slow, keepChain = curEmitMods.chain;
  curEmitMods.burn = (wt === 2) ? keepBurn : 0;
  curEmitMods.slow = (wt === 2) ? keepSlow : 0;
  curEmitMods.chain = (wt === 1) ? keepChain : 0;
  if (wt === 0) {
    // VULCAN — original spread/stream cannon (preserved feel)
    const mk = (dx, ang) => { const a = -Math.PI / 2 + ang; firePlayer(ox + dx, oy - 10, Math.cos(a) * sp, Math.sin(a) * sp, baseDmg, col, 0, CONFIG.pBulletR, 0, 0, p.idx); };
    if (lvl === 1) { mk(0, 0); }
    else if (lvl === 2) { mk(-5, 0); mk(5, 0); }
    else if (lvl === 3) { mk(0, 0); mk(-7, -0.12); mk(7, 0.12); }
    else if (lvl === 4) { mk(-5, 0); mk(5, 0); mk(-10, -0.18); mk(10, 0.18); }
    else if (lvl === 5) { mk(0, 0); mk(-6, -0.1); mk(6, 0.1); mk(-12, -0.24); mk(12, 0.24); }
    else {
      mk(0, 0); mk(-6, -0.08); mk(6, 0.08); mk(-12, -0.2); mk(12, 0.2);
      firePlayer(ox - 14, oy, -sp * 0.4, -sp * 0.85, baseDmg, col, 0, CONFIG.pBulletR, 0, 0, p.idx);
      firePlayer(ox + 14, oy, sp * 0.4, -sp * 0.85, baseDmg, col, 0, CONFIG.pBulletR, 0, 0, p.idx);
    }
    // SCATTER ARRAY: extra angled rounds
    for (let i = 0; i < sprAdd; i++) { const s = (i + 1) * 0.16; mk(-(13 + i * 4), -s); mk(13 + i * 4, s); }
    if (!isOption) audio.shot(which);
  } else if (wt === 1) {
    // LASER — narrow, fast, piercing bolts straight up. High single-target DPS.
    const dmg = baseDmg * 1.3;
    const pierce = 1 + Math.floor(lvl / 2);    // passes through more foes at level
    const streams = (lvl >= 5 ? 3 : lvl >= 3 ? 2 : 1) + sprAdd;
    const lsp = sp * 1.5;
    for (let i = 0; i < streams; i++) {
      const dx = (i - (streams - 1) / 2) * 6;
      firePlayer(ox + dx, oy - 12, 0, -lsp, dmg, col, 1, CONFIG.pBulletR * 0.7, pierce, 0, p.idx);
    }
    if (!isOption) audio.laserHum(which);
  } else if (wt === 2) {
    // WAVE — wide short-range piercing crescents. Strong vs crowds, fades fast.
    const dmg = baseDmg * 0.9;
    const pierce = 99;                          // pierces freely (short life caps it)
    const life = 0.32 + lvl * 0.02;             // SHORT range via lifetime
    const wsp = sp * 0.7;
    const n = (1 + Math.min(4, Math.floor((lvl + 1) / 1.5))) + sprAdd;  // 2..5 wide arms (+spread)
    const spread = 0.5 + lvl * 0.06;
    for (let i = 0; i < n; i++) {
      const t = n === 1 ? 0 : (i / (n - 1)) - 0.5;
      const a = -Math.PI / 2 + t * spread;
      firePlayer(ox, oy - 6, Math.cos(a) * wsp, Math.sin(a) * wsp, dmg, col, 2, CONFIG.pBulletR * 1.4, pierce, life, p.idx);
    }
    if (!isOption) audio.waveWhomp(which);
  } else {
    // SEEKER — homing darts, lower raw DPS, track movers. More darts at level.
    const dmg = baseDmg * 0.85;
    const n = Math.min(6, (1 + Math.floor((lvl - 1) / 1.5)) + sprAdd);
    const hsp = sp * 0.78;
    for (let i = 0; i < n; i++) {
      const a = -Math.PI / 2 + (i - (n - 1) / 2) * 0.5;
      firePlayer(ox + (i - (n - 1) / 2) * 5, oy - 8, Math.cos(a) * hsp, Math.sin(a) * hsp, dmg, col, 3, CONFIG.pBulletR * 0.85, 0, 0, p.idx);
    }
    if (!isOption) audio.shot(which);
  }
  curEmitMods.burn = keepBurn; curEmitMods.slow = keepSlow; curEmitMods.chain = keepChain;
}

/* secondary salvo: a fan of strong homing missiles (kind 4) on a cooldown.
   DRONE MISSILES blessing adds an extra missile from each Option drone. */
function fireMissileSalvo(p) {
  const dmgMul = 1 + blessVal(p, "dmgup");
  const n = 2 + Math.min(2, Math.floor(p.options / 2));   // more missiles with drones
  const col = "#ffe07a";
  for (let i = 0; i < n; i++) {
    const a = -Math.PI / 2 + (i - (n - 1) / 2) * 0.4;
    const sp = CONFIG.pBulletSpeed * 0.55;
    firePlayer(p.x + (i - (n - 1) / 2) * 8, p.y - 8, Math.cos(a) * sp, Math.sin(a) * sp, CONFIG.pBulletDmg * 2.2 * dmgMul, col, 4, CONFIG.pBulletR * 1.1, 0, 0, p.idx);
  }
  if (blessHas(p, "optmsl") && p.options > 0) {
    // DRONE MISSILES: only the first 2 drones add a missile, at reduced damage,
    // so this stays a supplement rather than doubling the salvo.
    const k = Math.min(2, Math.min(CONFIG.maxOptions, p.options));
    for (let i = 0; i < k; i++) {
      const oa = p.optAng + (i / k) * TAU;
      const oxp = p.x + Math.cos(oa) * CONFIG.optionOrbitR;
      const oyp = p.y + Math.sin(oa) * CONFIG.optionOrbitR * 0.7 - 6;
      const sp = CONFIG.pBulletSpeed * 0.5;
      firePlayerRaw(oxp, oyp, 0, -sp, CONFIG.pBulletDmg * 0.8 * dmgMul, col, 4, CONFIG.pBulletR, 0, 0, p.idx);
    }
  }
  spawnPart(1, p.x, p.y, 0, 0, 0.3, 2, col, 0, 40);
  audio.missile();
}

/* find the nearest live enemy / boss to (x,y) for homing steering */
function findHomingTarget(x, y) {
  let bx = 0, by = 0, bd = Infinity, found = false;
  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    if (e.dead) continue;
    const d = dist2(x, y, e.x, e.y);
    if (d < bd) { bd = d; bx = e.x; by = e.y; found = true; }
  }
  if (boss && !boss.dead && !boss.entering) {
    const d = dist2(x, y, boss.x, boss.y);
    if (d < bd) { bx = boss.x; by = boss.y; found = true; }
  }
  return found ? { x: bx, y: by } : null;
}

/* ---------------- §M UPDATE: ENEMIES ---------------- */
function nearestPlayer(x, y) {
  let best = null, bd = Infinity;
  for (const p of game.players) {
    if (!p.alive || p.downed) continue;   // ignore downed wrecks
    const d = dist2(x, y, p.x, p.y);
    if (d < bd) { bd = d; best = p; }
  }
  return best;
}

function enemyFire(e) {
  const tp = nearestPlayer(e.x, e.y);
  const ebs = CONFIG.enemyBulletSpeed + (game.loop - 1) * 30;
  switch (e.type) {
    case 0: // diver: occasional straight shot
      fireEnemy(e.x, e.y + e.r, 0, ebs, 6, "#ff5a7a");
      break;
    case 1: // weaver: small aimed pair
      if (tp) {
        const a = Math.atan2(tp.y - e.y, tp.x - e.x);
        fireEnemy(e.x, e.y, Math.cos(a) * ebs, Math.sin(a) * ebs, 5, "#ff8ad0");
      }
      break;
    case 2: // strafer: spread downward
      for (let i = -1; i <= 1; i++)
        fireEnemy(e.x, e.y, i * 70, ebs, 6, "#ffd36e");
      break;
    case 3: // turret: aimed precise shot
      if (tp) {
        const a = Math.atan2(tp.y - e.y, tp.x - e.x);
        fireEnemy(e.x, e.y, Math.cos(a) * ebs * 1.2, Math.sin(a) * ebs * 1.2, 6, "#ff4444");
      }
      break;
    case 4: // gunship: wide aimed spread
      if (tp) {
        const base = Math.atan2(tp.y - e.y, tp.x - e.x);
        for (let i = -2; i <= 2; i++) {
          const a = base + i * 0.18;
          fireEnemy(e.x, e.y, Math.cos(a) * ebs, Math.sin(a) * ebs, 7, "#ff6b6b");
        }
      }
      break;
  }
  e.fireFlash = 0.16; e.recoil = 1;   // muzzle/recoil telegraph (cosmetic)
  audio.enemyShot();
}

function updateEnemy(e, dt) {
  e.t += dt;
  if (e.flash > 0) e.flash -= dt;
  if (e.fireFlash > 0) e.fireFlash -= dt;
  if (e.recoil > 0) e.recoil = Math.max(0, e.recoil - dt * 6);
  // blessing status effects: burn (DoT) + slow (movement scalar)
  let sm = 1;
  if (e.slow > 0) { e.slow -= dt; sm = 0.55; }
  if (e.burn > 0) {
    e.burn -= dt;
    e.hp -= e.burnDps * dt;
    if (Math.random() < 0.25) spawnPart(0, e.x + rand(-e.r * 0.5, e.r * 0.5), e.y, 0, -40, 0.25, 2, "#ffb066", 3);
    if (e.hp <= 0 && !e.dead) killEnemy(e);
  }
  dt *= sm;
  switch (e.type) {
    case 0: // diver: straight down, slight homing drift
      e.y += e.speed * dt;
      break;
    case 1: // weaver: sine across while descending
      e.y += e.speed * dt;
      e.x = e.baseX + Math.sin(e.t * e.freq + e.phase) * e.amp;
      break;
    case 2: // strafer: pop in from side, hold, pop out
      if (e.state === 0) {
        e.x += e.dir * e.speed * dt;
        e.y = e.targetY;
        if ((e.dir > 0 && e.x > CONFIG.playW * 0.3) || (e.dir < 0 && e.x < CONFIG.playW * 0.7)) {
          e.state = 1; e.stateT = rand(1.0, 1.8);
        }
      } else if (e.state === 1) {
        e.stateT -= dt;
        e.x += Math.sin(e.t * 3) * 30 * dt;
        if (e.stateT <= 0) e.state = 2;
      } else {
        e.x += e.dir * e.speed * 1.4 * dt;
        e.y += 30 * dt;
      }
      break;
    case 3: // turret: descend to target, then hold and aim
      if (e.y < e.targetY) e.y += e.speed * dt;
      else e.y += 8 * dt;
      break;
    case 4: // gunship: descend slowly, sway, hold
      if (e.y < e.targetY) e.y += e.speed * dt;
      else { e.x = e.baseX + Math.sin(e.t * 0.8) * 60; e.baseX = e.baseX; }
      break;
  }
  // firing
  e.fireCd -= dt;
  if (e.fireCd <= 0 && e.y > 0 && e.y < CONFIG.playH - 60) {
    enemyFire(e);
    const interval = [1.3, 1.6, 1.4, 1.1, 1.5][e.type] * rand(0.7, 1.2);
    e.fireCd = interval;
  }
}

function killEnemy(e, ownerIdx) {
  if (e.dead) return;
  e.dead = true;
  // VAMPIRE CORE blessing: chance to heal the killer on kill
  if (ownerIdx !== undefined && game && game.players[ownerIdx]) {
    const kp = game.players[ownerIdx];
    const vc = blessVal(kp, "vampire");
    if (vc > 0 && kp.alive && !kp.downed && Math.random() < vc) {
      // VAMPIRE CORE now lifesteals HP first; tops to shield/life when already full
      if (kp.hp < maxHPFor(kp)) { healPlayer(kp, 1, false); floatText(kp.x, kp.y - 26, "VAMP", "#ff6b6b", 12); }
      else if (!kp.shield) { kp.shield = true; floatText(kp.x, kp.y - 26, "VAMP", "#ff6b6b", 12); }
      else if (kp.lives < 9 && Math.random() < 0.25) { kp.lives++; floatText(kp.x, kp.y - 26, "+LIFE", "#ff6b6b", 13); }
    }
  }
  const big = e.type === 4;
  audio.explosion(big);
  burst(e.x, e.y, big ? 30 : 16, e.col, big ? 320 : 220, big ? 0.8 : 0.5, big ? 4 : 3);
  debris(e.x, e.y, big ? 10 : (DETAIL ? 6 : 4), e.col);
  // layered shockwave: coloured ring + inner white flash sized to craft
  ring(e.x, e.y, e.col, big ? 120 : 60, 0.5);
  ring(e.x, e.y, "#ffffff", big ? 70 : (e.r * 2.6), big ? 0.4 : 0.32);
  spawnPart(0, e.x, e.y, 0, 0, big ? 0.18 : 0.12, big ? 9 : 6, "#ffffff", 1);
  registerKill(e.score, e.x, e.y);
  if (big) addShake(8, 0.3);
  // drops
  if (e.drops) rollDrop(e.x, e.y);
  else if (Math.random() < 0.12) rollDrop(e.x, e.y);
}

/* ---------------- §N UPDATE: BOSS ---------------- */
function updateBoss(dt) {
  if (!boss) return;
  boss.t += dt;
  if (boss.flash > 0) boss.flash -= dt;
  if (boss.fireFlash > 0) boss.fireFlash -= dt;
  for (const part of boss.parts) if (part.flash > 0) part.flash -= dt;

  if (boss.dead) {
    boss.deathT += dt;
    // multi-explosion sequence
    if (Math.random() < 0.5) {
      const ex = boss.x + rand(-boss.r, boss.r), ey = boss.y + rand(-boss.r * 0.6, boss.r * 0.6);
      audio.explosion(true);
      burst(ex, ey, 18, boss.col, 280, 0.7, 4);
      ring(ex, ey, "#fff", 80, 0.4);
      addShake(10, 0.3);
    }
    if (boss.deathT > 1.8) {
      // final blast
      audio.explosion(true);
      burst(boss.x, boss.y, 60, "#fff", 420, 1.1, 6);
      ring(boss.x, boss.y, boss.col, 300, 0.9);
      ring(boss.x, boss.y, "#fff", 220, 0.7);
      debris(boss.x, boss.y, 24, boss.col);
      addShake(22, 0.7);
      registerKill(4000 + game.bossesKilled * 1000, boss.x, boss.y);
      // generous drops
      for (let i = 0; i < 4; i++) {
        const bx = boss.x + rand(-50, 50), by = boss.y + rand(-20, 20);
        if (i === 0) spawnWeaponDrop(bx, by);
        else if (i === 1) spawnPowerup(bx, by, "bomb");
        else if (i === 2) spawnPowerup(bx, by, "option");
        else spawnPowerup(bx, by, "gem");
      }
      game.bossesKilled++;
      boss = null;
      // defeating a boss clears the sector -> open a STRONGER gate choice
      if (state === "play") onSectorCleared();
    }
    return;
  }

  if (boss.entering) {
    boss.y = lerp(boss.y, boss.targetY, clamp(dt * 1.6, 0, 1));
    if (Math.abs(boss.y - boss.targetY) < 3) { boss.entering = false; boss.y = boss.targetY; }
    return;
  }

  // sway
  boss.x = CONFIG.playW * 0.5 + Math.sin(boss.t * 0.6) * (CONFIG.playW * 0.22);

  // phase cycling (each ~6s)
  boss.phaseT += dt;
  if (boss.phaseT > 6) { boss.phaseT = 0; boss.phase = (boss.phase + 1) % 3; }

  boss.fireCd -= dt;
  const ebs = CONFIG.enemyBulletSpeed + (game.loop - 1) * 25;
  if (boss.fireCd <= 0) {
    const phaseFns = bossPhaseFns(boss.defIdx);
    phaseFns[boss.phase](boss, ebs);
    boss.fireFlash = 0.18;
  }

  // boss spawns adds occasionally
  if (boss.t > 3 && Math.random() < 0.004 && enemies.length < 14) {
    spawnEnemy(randi(0, 1), rand(CONFIG.playW * 0.2, CONFIG.playW * 0.8), boss.y + 30, { speed: 130 });
  }
}

function bossPhaseFns(idx) {
  // returns 3 phase-functions; share patterns but tuned per boss
  const aimedSpread = (b, ebs, n, spread) => {
    const tp = nearestPlayer(b.x, b.y);
    if (!tp) { b.fireCd = 0.5; return; }
    const base = Math.atan2(tp.y - b.y, tp.x - b.x);
    for (let i = 0; i < n; i++) {
      const a = base + (i - (n - 1) / 2) * spread;
      fireEnemy(b.x, b.y + b.r * 0.5, Math.cos(a) * ebs, Math.sin(a) * ebs, 7, b.col);
    }
    audio.enemyShot();
    b.fireCd = 0.9;
  };
  const radialBurst = (b, ebs, n) => {
    const off = b.t * 0.7;
    for (let i = 0; i < n; i++) {
      const a = off + (i / n) * TAU;
      fireEnemy(b.x, b.y, Math.cos(a) * ebs * 0.9, Math.sin(a) * ebs * 0.9, 6, b.col);
    }
    audio.enemyShot();
    b.fireCd = 0.55;
  };
  const sweepLaser = (b, ebs) => {
    b.sweepA += 0.5;
    const a = Math.PI / 2 + Math.sin(b.sweepA) * 0.9;
    for (let s = 0; s < 3; s++) {
      const aa = a + (s - 1) * 0.05;
      fireEnemy(b.x, b.y + b.r * 0.4, Math.cos(aa) * ebs * 1.3, Math.sin(aa) * ebs * 1.3, 6, "#ffffff");
    }
    b.fireCd = 0.12;
  };
  if (idx === 0) { // WARDEN: aimed spread / radial / sweep
    return [
      (b, e) => aimedSpread(b, e, 5, 0.16),
      (b, e) => radialBurst(b, e, 14),
      (b, e) => sweepLaser(b, e),
    ];
  } else if (idx === 1) { // HIVE QUEEN: dense radial / aimed / spawn-heavy radial
    return [
      (b, e) => radialBurst(b, e, 20),
      (b, e) => aimedSpread(b, e, 7, 0.13),
      (b, e) => { radialBurst(b, e, 12); if (Math.random() < 0.3 && enemies.length < 16) spawnEnemy(1, b.x + rand(-40, 40), b.y + 30, { speed: 140 }); },
    ];
  } else { // DREADNOUGHT: everything, faster
    return [
      (b, e) => aimedSpread(b, e * 1.1, 9, 0.12),
      (b, e) => sweepLaser(b, e * 1.1),
      (b, e) => radialBurst(b, e * 1.05, 24),
    ];
  }
}

function damageBoss(b, dmg, hx, hy) {
  // check core part hits first (multi-part)
  b.hp -= dmg; b.flash = 0.12;
  spawnPart(0, hx, hy, 0, 0, 0.2, 3, "#fff", 4);
  if (b.hp <= 0 && !b.dead) {
    b.dead = true; b.deathT = 0;
    audio.siren();
    clearEnemyBullets(false);
  }
}

/* ---------------- §O COLLISIONS (broad-phase spatial hash) ---------------- */
const grid = new Map();
function gridKey(cx, cy) { return cx + "," + cy; }
function buildEnemyGrid() {
  grid.clear();
  const cs = CONFIG.bucketSize;
  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    if (e.dead) continue;
    const cx = Math.floor(e.x / cs), cy = Math.floor(e.y / cs);
    const k = gridKey(cx, cy);
    let arr = grid.get(k);
    if (!arr) { arr = []; grid.set(k, arr); }
    arr.push(e);
  }
}
function queryEnemies(x, y, r, cb) {
  const cs = CONFIG.bucketSize;
  const minX = Math.floor((x - r) / cs), maxX = Math.floor((x + r) / cs);
  const minY = Math.floor((y - r) / cs), maxY = Math.floor((y + r) / cs);
  for (let cx = minX; cx <= maxX; cx++)
    for (let cy = minY; cy <= maxY; cy++) {
      const arr = grid.get(gridKey(cx, cy));
      if (!arr) continue;
      for (let i = 0; i < arr.length; i++) if (cb(arr[i]) === true) return;
    }
}

/* consume one hit of bullet b; returns true if the bullet should stop (no
   pierce left). Pierce bullets keep going and won't re-hit the same target. */
function bulletConsume(b) {
  if (b.pierce > 0) { b.pierce--; return false; }
  b.on = false; return true;
}
function collidePlayerBullets() {
  buildEnemyGrid();
  for (const b of pBullets) {
    if (!b.on) continue;
    // boss hit
    if (boss && !boss.dead && !boss.entering && b.lastHit !== -2) {
      let bhit = false;
      for (const part of boss.parts) {
        if (!part.alive) continue;
        const ppx = boss.x + part.dx, ppy = boss.y + part.dy;
        if (dist2(b.x, b.y, ppx, ppy) < (part.r + b.r) * (part.r + b.r)) {
          part.hp -= b.dmg; part.flash = 0.12; bhit = true;
          spawnPart(0, b.x, b.y, 0, 0, 0.2, 3, "#fff", 4);
          if (part.hp <= 0) { part.alive = false; burst(ppx, ppy, 16, boss.col, 220, 0.6, 3); audio.explosion(false); addScore(300, ppx, ppy); }
          break;
        }
      }
      if (!bhit && dist2(b.x, b.y, boss.x, boss.y) < (boss.r + b.r) * (boss.r + b.r)) {
        damageBoss(boss, b.dmg, b.x, b.y); bhit = true;
      }
      if (bhit) { b.lastHit = -2; if (bulletConsume(b)) continue; }
    }
    if (!b.on) continue;
    // enemies (broad-phase). For pierce bullets, lastHit guards re-hitting one foe.
    queryEnemies(b.x, b.y, b.r + 26, (e) => {
      if (e.dead) return false;
      if (b.lastHit === e.eid) return false;
      if (dist2(b.x, b.y, e.x, e.y) < (e.r + b.r) * (e.r + b.r)) {
        e.hp -= b.dmg; e.flash = 0.12;
        spawnPart(0, b.x, b.y, 0, 0, 0.18, 3, b.crit ? "#ffd36e" : "#fff", b.crit ? 6 : 4);
        if (b.crit) floatText(e.x, e.y - 8, "CRIT", "#ffd36e", 12);
        // blessing riders: burn (WAVE), slow (WAVE), chain (LASER), split (any)
        if (b.burn > 0) { e.burn = Math.max(e.burn, 1.4); e.burnDps = Math.max(e.burnDps, b.burn); }
        if (b.slow > 0) e.slow = Math.max(e.slow, 1.0);
        if (b.chain > 0) applyChain(b, e);
        if (b.split > 0 && Math.random() < b.split) spawnShrapnel(b, e);
        if (e.hp <= 0) killEnemy(e, b.owner);
        b.lastHit = e.eid;
        return bulletConsume(b);   // true => stop scanning (bullet gone)
      }
      return false;
    });
  }
}
/* ARC RELAY — chain a fraction of damage to the nearest OTHER live enemy. */
function applyChain(b, from) {
  let best = null, bd = Infinity;
  for (let i = 0; i < enemies.length; i++) {
    const e = enemies[i];
    if (e.dead || e.eid === from.eid) continue;
    const d = dist2(from.x, from.y, e.x, e.y);
    if (d < bd && d < 150 * 150) { bd = d; best = e; }
  }
  if (!best) return;
  best.hp -= b.dmg * b.chain; best.flash = 0.1;
  spawnPart(0, (from.x + best.x) / 2, (from.y + best.y) / 2, 0, 0, 0.16, 4, "#b6ff6e", 6);
  if (best.hp <= 0 && !best.dead) killEnemy(best, b.owner);
}
/* SHRAPNEL — split a couple of low-damage fragments on hit (pooled). */
function spawnShrapnel(b, e) {
  for (let i = -1; i <= 1; i += 2) {
    const a = -Math.PI / 2 + i * 0.7;
    const sp = CONFIG.pBulletSpeed * 0.6;
    const f = firePlayer(e.x, e.y, Math.cos(a) * sp, Math.sin(a) * sp, b.dmg * 0.45, b.col, 0, CONFIG.pBulletR * 0.7, 0, 0.45, b.owner);
    f.split = 0;   // fragments don't recursively split
  }
}

function collideEnemyBulletsAndBodies() {
  for (const p of game.players) {
    // downed wrecks are invulnerable & untargetable so they can't chain-die
    if (!p.alive || p.downed) continue;
    const hr = CONFIG.shipR;
    const vulnerable = () => p.alive && !p.downed && p.invuln <= 0;
    // enemy bullets (most deal 1 HP)
    for (const b of eBullets) {
      if (!b.on) continue;
      if (dist2(p.x, p.y, b.x, b.y) < (hr + b.r) * (hr + b.r)) {
        b.on = false;
        damagePlayer(p, 1);
        if (!vulnerable()) break;
      }
    }
    if (!vulnerable()) continue;
    // enemy bodies (contact is heavier)
    for (const e of enemies) {
      if (e.dead) continue;
      if (dist2(p.x, p.y, e.x, e.y) < (hr + e.r) * (hr + e.r)) {
        // ram: hurt both
        e.hp -= 4; e.flash = 0.15;
        if (e.hp <= 0) killEnemy(e);
        damagePlayer(p, CONFIG.contactDmg);
        break;
      }
    }
    if (!vulnerable()) continue;
    // boss body (heaviest contact)
    if (boss && !boss.dead && !boss.entering) {
      if (dist2(p.x, p.y, boss.x, boss.y) < (hr + boss.r) * (hr + boss.r)) {
        damagePlayer(p, CONFIG.bossContactDmg);
      }
    }
  }
}

/* ---------------- §P UPDATE: POWERUPS ---------------- */
function applyPowerup(p, kind, wt) {
  switch (kind) {
    case "weapon": {
      const maxL = maxWeaponLevel();
      if (wt === p.wtype) {
        // same type — level it up
        if (p.wlvl[wt] < maxL) { p.wlvl[wt]++; floatText(p.x, p.y - 26, WEAPONS[wt].name + " " + p.wlvl[wt], WEAPONS[wt].col, 15); }
        else { game.score += 1000; floatText(p.x, p.y - 26, "+1000", WEAPONS[wt].col, 16); }
      } else {
        // different type — switch; bump it to a sane level on switch
        p.wtype = wt;
        p.wlvl[wt] = Math.min(maxL, Math.max(p.wlvl[wt], 2));
        floatText(p.x, p.y - 26, WEAPONS[wt].name + " / " + WEAPONS[wt].zh, WEAPONS[wt].col, 15);
      }
      audio.powerup("weapon");
      break;
    }
    case "option":
      if (p.options < CONFIG.maxOptions) { p.options++; floatText(p.x, p.y - 26, "OPTION x" + p.options, "#aef", 15); audio.optionAttach(); }
      else { game.score += 800; floatText(p.x, p.y - 26, "+800", "#aef", 16); audio.powerup("gem"); }
      break;
    case "bomb":
      if (p.bombs < maxBombsFor()) p.bombs++;
      else game.score += 500;
      floatText(p.x, p.y - 26, "+BOMB", "#ffd36e", 16);
      audio.powerup("bomb");
      break;
    case "shield":
      p.shield = true; floatText(p.x, p.y - 26, "SHIELD", "#9be7ff", 16);
      // small heal-on-pickup so the shield capsule also patches the hull
      healPlayer(p, CONFIG.healPickup, true);
      audio.powerup("weapon");
      break;
    case "speed":
      p.speedBoost = 8; floatText(p.x, p.y - 26, "SPEED", "#caa0ff", 16);
      audio.powerup("weapon");
      break;
    case "gem":
      game.score += 250; floatText(p.x, p.y - 26, "+250", "#ffe98a", 14);
      audio.powerup("gem");
      break;
  }
}
function updatePowerups(dt) {
  for (let i = powerups.length - 1; i >= 0; i--) {
    const pu = powerups[i];
    pu.t += dt;
    pu.x += pu.vx * dt; pu.y += pu.vy * dt;
    pu.vx *= Math.exp(-1.5 * dt);
    if (pu.x < 12 || pu.x > CONFIG.playW - 12) pu.vx *= -1;
    if (pu.y > CONFIG.playH + 30) { powerups.splice(i, 1); continue; }
    // pickup
    let taken = false;
    for (const p of game.players) {
      if (!p.alive || p.downed) continue;
      if (dist2(p.x, p.y, pu.x, pu.y) < (CONFIG.shipR + pu.r + 6) * (CONFIG.shipR + pu.r + 6)) {
        applyPowerup(p, pu.kind, pu.wt);
        burst(pu.x, pu.y, 10, "#fff", 140, 0.4, 3);
        taken = true; break;
      }
    }
    if (taken) powerups.splice(i, 1);
  }
}

/* ---------------- §Q MAIN SIM STEP ---------------- */
function stepWaves(dt) {
  if (game.sectorCleared) return;   // sector done, waiting for gates UI
  if (boss) return;                 // no new waves while boss active
  if (game.bossPending) {
    // wait until field is clearish then spawn boss
    if (enemies.length === 0) { spawnBoss(); game.bossPending = false; }
    return;
  }
  if (!game.waveActive) {
    game.waveTimer -= dt;
    if (game.waveTimer <= 0) {
      if (game.sectorWave >= game.sectorWaves) { onSectorCleared(); return; }
      buildWave();
    }
    return;
  }
  // dispatch queued spawns
  game.spawnClock += dt;
  const q = game.spawnQueue;
  while (q.length && q[0].t <= game.spawnClock) {
    const item = q.shift();
    try { item.fn(); } catch (e) { /* never break sim */ }
  }
