  // wave ends when queue empty + field clear
  if (q.length === 0 && enemies.length === 0) {
    game.waveActive = false;
    game.waveTimer = 1.8;
  }
}

/* a sector is fully cleared -> open the HADES-STYLE GATE choice. Boss sectors
   that loop back to depth divisible by full cycle bump the loop counter. */
function onSectorCleared() {
  game.sectorCleared = true;
  game.waveActive = false;
  // every full cycle of sectors (bossEvery * loopSectors) increases the loop
  if (game.depth > 0 && game.depth % (CONFIG.bossEvery * 2) === 0) {
    game.loop++;
    showToast("LOOP " + game.loop + " — escalating!");
  }
  openGates();
}

/* ---------------- §I2 GATES (Hades-style reward doors) ---------------- */
const GATE_TYPES = {
  blessing: { name: "BLESSING", zh: "祝福",   col: "#d49bff", icon: "✦" },
  weapon:   { name: "WEAPON",   zh: "武器",   col: "#b6ff6e", icon: "W" },
  option:   { name: "DRONE",    zh: "僚机",   col: "#aef0ff", icon: "O" },
  heal:     { name: "REPAIR",   zh: "维修",   col: "#7affc4", icon: "+" },
  credits:  { name: "CREDITS",  zh: "点数",   col: "#ffe98a", icon: "$" },
  bomb:     { name: "BOMB",     zh: "炸弹",   col: "#ffd36e", icon: "B" },
  shop:     { name: "SHOP",     zh: "商店",   col: "#5ee6ff", icon: "⚙" },
  challenge:{ name: "CHALLENGE",zh: "试炼",   col: "#ff6b6b", icon: "⚔" },
};
/* pick a sane, varied spread of gate offers. Boss-cleared sectors get richer
   offers (always a blessing + a strong pick). FORTUNE meta improves odds. */
function rollGates(boss) {
  const pool = ["weapon", "option", "heal", "credits", "bomb"];
  const offers = [];
  // first slot: a blessing (the heart of the build) — guaranteed most sectors
  if (boss || Math.random() < 0.85) offers.push("blessing");
  // shop / challenge appear occasionally
  if (Math.random() < 0.22 + (meta.gateodds || 0) * 0.04) offers.push("shop");
  if (Math.random() < 0.18) offers.push("challenge");
  // fill remaining slots from the pool, no dupes, up to 3 total
  const want = boss ? 3 : (2 + (Math.random() < 0.5 ? 1 : 0));
  const shuffled = pool.slice().sort(() => Math.random() - 0.5);
  for (const t of shuffled) { if (offers.length >= want) break; if (offers.indexOf(t) < 0) offers.push(t); }
  while (offers.length > 3) offers.pop();
  if (offers.length < 2) offers.push("credits");
  // build offer objects (rarity preview for blessing scaled by depth + FORTUNE)
  return offers.map((type) => ({
    type,
    rarity: type === "blessing" ? rollRarity(game.depth + (meta.gateodds || 0) * 2 + (boss ? 4 : 0)) : 0,
    bossReward: !!boss,
  }));
}
function openGates() {
  game.gates = rollGates(game.isBossSector);
  game.gateSel = 0;
  state = "gates";
  audio.toast();
  updateFsBtn();
}
/* the player flies into / selects a gate; apply its reward then advance */
function chooseGate(idx) {
  if (!game.gates || idx < 0 || idx >= game.gates.length) return;
  const g = game.gates[idx];
  const mult = g.bossReward ? 2 : 1;     // boss gates are stronger
  audio.purchase();
  switch (g.type) {
    case "blessing":
      // queue a choose-1-of-3 boon pick per player
      game.gates = null;
      beginBoonPicks(g.rarity, g.bossReward);
      return;
    case "weapon":
      for (const p of game.players) {
        const maxL = maxWeaponLevel();
        if (p.wlvl[p.wtype] < maxL) p.wlvl[p.wtype]++;
        else { const wi = (p.wtype + 1) % WEAPONS.length; p.wtype = wi; p.wlvl[wi] = Math.max(p.wlvl[wi], 2); }
      }
      showToast("WEAPON UP / 武器强化");
      break;
    case "option":
      for (const p of game.players) if (p.options < CONFIG.maxOptions) p.options++;
      showToast("DRONE / 僚机 +1");
      break;
    case "heal":
      for (const p of game.players) {
        if (p.lives < 9) p.lives += mult;
        p.shield = true;
        // full hull repair + revive any downed wreck / respawn the spectating
        if (p.downed) { p.downed = false; p.reviveProg = 0; p.reviverIdx = -1; p.alive = true; p.spectating = false; }
        p.hp = maxHPFor(p); p.maxhp = maxHPFor(p);
        if (!p.alive && p.lives > 0 && p.spectating) { p.spectating = false; respawnPlayer(p); }
      }
      showToast("REPAIR / 维修");
      break;
    case "credits": {
      const amt = (40 + game.depth * 12) * mult;
      credits += amt; saveMeta();
      showToast("+" + amt + " CR");
      break;
    }
    case "bomb":
      for (const p of game.players) p.bombs = Math.min(maxBombsFor(), p.bombs + mult);
      showToast("BOMB / 炸弹 +" + mult);
      break;
    case "shop":
      // mid-run shop reuses the ARMORY; return to run after
      game.gates = null;
      state = "shop"; shopSel = 0; game.fromGate = true; updateFsBtn();
      return;
    case "challenge":
      game.challengeNext = true;
      showToast("⚔ CHALLENGE — double reward next");
      break;
  }
  game.gates = null;
  advanceSector();
}
function advanceSector() {
  // clear the field & enter the next sector
  enemies.length = 0; clearEnemyBullets(false);
  for (const b of pBullets) b.on = false;
  state = "play"; paused = false;
  startSector();
  updateFsBtn();
}

/* ---------------- §I3 BOON PICKS (choose-1-of-3, per player) ---------------- */
function beginBoonPicks(baseRarity, bossReward) {
  game.boonQueue = game.players.filter((p) => p.lives > 0 || p.alive).map((p) => p.idx);
  game.boonBaseRarity = baseRarity || 0;
  game.boonBoss = !!bossReward;
  nextBoonPick();
}
function nextBoonPick() {
  if (!game.boonQueue || game.boonQueue.length === 0) { game.boon = null; advanceSector(); return; }
  const pidx = game.boonQueue.shift();
  const p = game.players[pidx];
  game.boon = { pidx, options: rollBoonOptions(p), rerollsLeft: game.rerolls };
  game.boonSel = 0;
  state = "boon";
  updateFsBtn();
}
/* roll 3 distinct blessing options for a player, each with its own rarity tier
   (>= the gate's base rarity). Avoids offering maxed-out blessings when possible. */
function rollBoonOptions(p) {
  const avail = BLESSINGS.filter((b) => blessStacks(p, b.id) < b.max);
  const src = avail.length >= 3 ? avail : BLESSINGS;
  const pool = src.slice().sort(() => Math.random() - 0.5);
  const out = [];
  for (let i = 0; i < pool.length && out.length < 3; i++) {
    let rr = rollRarity(game.depth + (game.boonBoss ? 4 : 0));
    if (rr < (game.boonBaseRarity || 0)) rr = game.boonBaseRarity;
    out.push({ id: pool[i].id, rarity: rr });
  }
  return out;
}
function chooseBoon(idx) {
  if (!game.boon || idx < 0 || idx >= game.boon.options.length) return;
  const o = game.boon.options[idx];
  const p = game.players[game.boon.pidx];
  grantBlessing(p, o.id, o.rarity);
  const def = blessingDef(o.id), R = RARITY[o.rarity];
  audio.powerup("weapon");
  showToast(R.name + " " + def.name);
  nextBoonPick();
}
function rerollBoon() {
  if (!game.boon || game.rerolls <= 0) { audio.denied(); return; }
  game.rerolls--;
  const p = game.players[game.boon.pidx];
  game.boon.options = rollBoonOptions(p);
  game.boon.rerollsLeft = game.rerolls;
  game.boonSel = 0;
  audio.toast();
}

function simStep(dt) {
  if (state !== "play" || paused) return;
  game.elapsed += dt;
  // combo decay
  if (game.comboT > 0) { game.comboT -= dt; if (game.comboT <= 0) game.combo = 0; }
  // CHRONO BOMB time-dilation: slows hostiles (not the player) briefly
  if (game.timeDil > 0) game.timeDil -= dt;
  const hostileDt = game.timeDil > 0 ? dt * 0.4 : dt;

  updateStars(dt);

  // players (always full-speed)
  for (const p of game.players) updatePlayer(p, dt);
  // co-op revives (positional proximity)
  updateRevives(dt);

  // enemies (slowed under time-dilation)
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    updateEnemy(e, hostileDt);
    if (e.dead || e.y > CONFIG.playH + 60 || e.x < -80 || e.x > CONFIG.playW + 80) {
      enemies.splice(i, 1);
    }
  }

  // boss (slowed under time-dilation)
  updateBoss(hostileDt);

  // bullets
  for (const b of pBullets) {
    if (!b.on) continue;
    b.t += dt;
    // homing kinds steer toward nearest target (3 = seeker dart, 4 = missile),
    // plus any bullet flagged by the GUIDANCE CHIP blessing (gentle homing).
    if (b.kind === 3 || b.kind === 4 || b.homing) {
      const tgt = findHomingTarget(b.x, b.y);
      if (tgt) {
        const sp = Math.hypot(b.vx, b.vy) || 1;
        const desired = Math.atan2(tgt.y - b.y, tgt.x - b.x);
        let cur = Math.atan2(b.vy, b.vx);
        let diff = desired - cur;
        while (diff > Math.PI) diff -= TAU;
        while (diff < -Math.PI) diff += TAU;
        // blessing-homing on non-seeker kinds turns gently so feel stays "shmup"
        const turnRate = b.kind === 4 ? 3.2 : (b.kind === 3 ? 5.0 : 2.2);
        const turn = turnRate * dt;   // rad/s cap
        cur += clamp(diff, -turn, turn);
        b.vx = Math.cos(cur) * sp; b.vy = Math.sin(cur) * sp;
        b.ang = cur;
      }
    }
    b.x += b.vx * dt; b.y += b.vy * dt;
    // wave (kind 2) self-expires for SHORT range; same for any timed bullet
    if (b.life > 0 && b.t >= b.life) { b.on = false; continue; }
    if (b.y < -20 || b.y > CONFIG.playH + 20 || b.x < -20 || b.x > CONFIG.playW + 20) b.on = false;
  }
  for (const b of eBullets) {
    if (!b.on) continue;
    b.t += dt;
    b.x += b.vx * hostileDt; b.y += b.vy * hostileDt;
    if (b.y < -30 || b.y > CONFIG.playH + 30 || b.x < -30 || b.x > CONFIG.playW + 30) b.on = false;
  }

  // collisions
  collidePlayerBullets();
  collideEnemyBulletsAndBodies();

  // powerups
  updatePowerups(dt);

  // waves
  stepWaves(dt);

  // fx
  updateParts(dt);
  updateTexts(dt);

}

/* ---------------- §R RENDER ----------------
   Pure-vector craft. All geometry scaled by ps() so visual size tracks the
   collision radii (shipR / e.r / boss.r) — fairness unchanged. Heavier detail
   passes gated behind DETAIL. Subtle animation driven by velocity & timers. */

/* secondary / dark accent for a player (P1 cyan, P2 magenta) */
function shipAccent(idx) { return idx === 0 ? "#1f6f88" : "#8a2e74"; }

/* compact floating HP pip cluster above a ship; subtle, fades out when full. */
function drawShipHPPips(p, x, y) {
  const mx = maxHPFor(p);
  if (mx <= 0) return;
  if (p.hp >= mx) return;   // hide when topped up
  const seg = Math.min(8, mx);                 // cap visible pips for very high max
  const filled = clamp(Math.ceil(p.hp / mx * seg), 0, seg);
  const pw = ps(5), gap = ps(2), totalW = seg * pw + (seg - 1) * gap;
  const sx = x - totalW / 2, sy = y - ps(CONFIG.shipR + 14);
  const low = p.hp <= mx * CONFIG.lowHPFrac;
  ctx.save();
  ctx.globalAlpha = low ? (0.6 + 0.4 * Math.abs(Math.sin(p.lowPulse * 6))) : 0.7;
  ctx.shadowBlur = 0;
  for (let i = 0; i < seg; i++) {
    const bx = sx + i * (pw + gap);
    ctx.fillStyle = i < filled ? (low ? "#ff5a5a" : p.col.ship) : "rgba(255,255,255,0.16)";
    ctx.fillRect(bx, sy, pw, ps(3));
  }
  ctx.restore();
}

/* a DOWNED player: dim drifting escape-pod/wreck with a partner-revive ring,
   a beam/tether to the reviver, and a "REVIVE" prompt + downed-timeout pip. */
function drawDownedWreck(p) {
  const x = px(p.x), y = py(p.y);
  const t = game ? game.elapsed : 0;
  // tether/beam from the reviver to the wreck (drawn first, behind)
  if (p.reviverIdx >= 0 && game.players[p.reviverIdx]) {
    const q = game.players[p.reviverIdx];
    const qx = px(q.x), qy = py(q.y);
    ctx.save();
    ctx.globalAlpha = 0.5 + 0.3 * Math.sin(t * 10);
    ctx.strokeStyle = "#7affc4"; ctx.lineWidth = ps(2);
    ctx.shadowBlur = ps(10); ctx.shadowColor = "#7affc4";
    ctx.beginPath(); ctx.moveTo(qx, qy); ctx.lineTo(x, y); ctx.stroke();
    ctx.restore();
  }
  ctx.save();
  ctx.translate(x, y);
  // smoking wreck body (dim, slowly tumbling)
  ctx.rotate(Math.sin(t * 0.8 + p.idx) * 0.4);
  ctx.globalAlpha = 0.55;
  ctx.fillStyle = "#3a3a4a"; ctx.shadowBlur = ps(8); ctx.shadowColor = p.col.glow;
  ctx.beginPath();
  ctx.moveTo(0, -ps(12)); ctx.lineTo(ps(7), ps(8)); ctx.lineTo(-ps(6), ps(9));
  ctx.closePath(); ctx.fill();
  // dim cockpit ember
  ctx.fillStyle = p.col.ship; ctx.globalAlpha = 0.4 + 0.3 * Math.abs(Math.sin(t * 4));
  ctx.beginPath(); ctx.arc(0, -ps(2), ps(2.4), 0, TAU); ctx.fill();
  ctx.restore();
  // revive progress ring
  const prog = clamp(p.reviveProg, 0, 1);
  ctx.save();
  ctx.globalAlpha = 0.85;
  ctx.strokeStyle = "rgba(255,255,255,0.18)"; ctx.lineWidth = ps(3);
  ctx.shadowBlur = 0;
  ctx.beginPath(); ctx.arc(x, y, ps(CONFIG.shipR + 9), 0, TAU); ctx.stroke();
  if (prog > 0) {
    ctx.strokeStyle = "#7affc4"; ctx.lineWidth = ps(3);
    ctx.shadowBlur = ps(10); ctx.shadowColor = "#7affc4";
    ctx.beginPath(); ctx.arc(x, y, ps(CONFIG.shipR + 9), -Math.PI / 2, -Math.PI / 2 + prog * TAU); ctx.stroke();
  }
  ctx.restore();
  // prompt + downed timeout
  ctx.shadowBlur = ps(6); ctx.shadowColor = "#ff6b6b";
  ctx.fillStyle = "#ff8a8a";
  ctx.font = "700 " + Math.max(10, ps(12)) + "px 'Courier New', monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(p.col.tag + " DOWNED", x, y - ps(CONFIG.shipR + 22));
  ctx.fillStyle = "#7affc4"; ctx.font = "700 " + Math.max(9, ps(10)) + "px 'Courier New', monospace";
  ctx.fillText("REVIVE " + Math.max(0, Math.ceil(p.downedT)) + "s", x, y + ps(CONFIG.shipR + 18));
  ctx.shadowBlur = 0;
}

function drawShip(p) {
  if (!p.alive && !p.downed) return;
  if (p.downed) { drawDownedWreck(p); return; }
  // respawn invuln: phase/blink (skip every other beat, fade between)
  let alpha = 1;
  if (p.invuln > 0) {
    const ph = Math.floor(p.invuln * 12) % 2;
    if (ph === 0) return;
    alpha = 0.55;
  }
  const x = px(p.x), y = py(p.y);
  const col = p.col.ship, glow = p.col.glow, dark = shipAccent(p.idx);
  // banking tilt from horizontal velocity (visual only)
  const bank = clamp(p.vx / CONFIG.shipSpeed, -1, 1);
  // thrust intensity: flares when moving up (vy<0), shrinks when slowing
  const thrust = clamp(0.45 + (-p.vy) / CONFIG.shipSpeed * 0.75, 0.12, 1.4);
  const t = game ? game.elapsed : (typeof performance !== "undefined" ? performance.now() / 1000 : 0);

  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.transform(1, 0, bank * 0.32, 1, 0, 0);   // shear = bank lean
  ctx.rotate(bank * 0.18);

  // shield bubble (orbiting shimmer)
  if (p.shield) {
    const sr = ps(CONFIG.shipR + 8);
    ctx.save();
    ctx.globalAlpha = alpha * (0.5 + 0.18 * Math.sin(t * 5));
    ctx.strokeStyle = "rgba(174,238,255,0.9)"; ctx.lineWidth = ps(2);
    ctx.shadowBlur = ps(12); ctx.shadowColor = "#aef";
    ctx.beginPath(); ctx.arc(0, 0, sr, 0, TAU); ctx.stroke();
    if (DETAIL) {
      const oa = t * 2.4;
      ctx.fillStyle = "#dffbff";
      for (let i = 0; i < 3; i++) {
        const a = oa + i * TAU / 3;
        ctx.beginPath(); ctx.arc(Math.cos(a) * sr, Math.sin(a) * sr, ps(2), 0, TAU); ctx.fill();
      }
    }
    ctx.restore();
  }

  // engine thruster flames (twin nacelles), tinted to player, flare with thrust
  const fl = thrust * (0.85 + 0.3 * Math.sin(t * 30));
  for (const sx of [-1, 1]) {
    const ex = sx * ps(5);
    const g = ctx.createLinearGradient(ex, ps(8), ex, ps(8) + ps(16) * fl);
    g.addColorStop(0, "#ffffff");
    g.addColorStop(0.4, col);
    g.addColorStop(1, "rgba(0,0,0,0)");
    ctx.fillStyle = g;
    ctx.shadowBlur = ps(10); ctx.shadowColor = glow;
    ctx.beginPath();
    ctx.moveTo(ex - ps(2.4), ps(8));
    ctx.lineTo(ex + ps(2.4), ps(8));
    ctx.lineTo(ex, ps(8) + ps(16) * fl);
    ctx.closePath(); ctx.fill();
  }

  // weapon-level side pods / extra barrels (more as it powers up)
  const wlevel = curLevel(p);
  ctx.shadowBlur = ps(8); ctx.shadowColor = glow;
  if (wlevel >= 2) {
    ctx.fillStyle = dark;
    for (const sx of [-1, 1]) {
      ctx.fillRect(sx * ps(8) - ps(2), -ps(6), ps(4), ps(11));
    }
  }
  if (wlevel >= 4) {
    ctx.fillStyle = col;
    for (const sx of [-1, 1]) ctx.fillRect(sx * ps(12) - ps(1.5), -ps(2), ps(3), ps(9));
  }
  // muzzle barrels (grow with level)
  ctx.fillStyle = "#ffffff";
  const nb = Math.min(3, 1 + Math.floor((wlevel - 1) / 2));
  for (let i = 0; i < nb; i++) {
    const bx = (i - (nb - 1) / 2) * ps(4);
    ctx.fillRect(bx - ps(1), -ps(16), ps(2), ps(5));
  }

  // swept wings
  ctx.fillStyle = dark;
  ctx.beginPath();
  ctx.moveTo(-ps(4), -ps(2));
  ctx.lineTo(-ps(13), ps(9));
  ctx.lineTo(-ps(7), ps(10));
  ctx.lineTo(-ps(3), ps(4));
  ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(ps(4), -ps(2));
  ctx.lineTo(ps(13), ps(9));
  ctx.lineTo(ps(7), ps(10));
  ctx.lineTo(ps(3), ps(4));
  ctx.closePath(); ctx.fill();

  // main hull — sleek arrowhead interceptor
  const hg = ctx.createLinearGradient(0, -ps(16), 0, ps(11));
  hg.addColorStop(0, "#ffffff");
  hg.addColorStop(0.35, col);
  hg.addColorStop(1, dark);
  ctx.fillStyle = hg;
  ctx.shadowBlur = ps(12); ctx.shadowColor = glow;
  ctx.beginPath();
  ctx.moveTo(0, -ps(16));
  ctx.lineTo(ps(5), -ps(2));
  ctx.lineTo(ps(8), ps(8));
  ctx.lineTo(ps(3), ps(10));
  ctx.lineTo(0, ps(8));
  ctx.lineTo(-ps(3), ps(10));
  ctx.lineTo(-ps(8), ps(8));
  ctx.lineTo(-ps(5), -ps(2));
  ctx.closePath(); ctx.fill();

  // hull spine highlight
  if (DETAIL) {
    ctx.strokeStyle = "rgba(255,255,255,0.5)"; ctx.lineWidth = ps(1);
    ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.moveTo(0, -ps(13)); ctx.lineTo(0, ps(6)); ctx.stroke();
  }

  // glowing cockpit
  const cg = ctx.createRadialGradient(0, -ps(4), 0, 0, -ps(4), ps(4));
  cg.addColorStop(0, "#ffffff");
  cg.addColorStop(0.6, glow);
  cg.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = cg;
  ctx.shadowBlur = ps(8); ctx.shadowColor = glow;
  ctx.beginPath(); ctx.arc(0, -ps(4), ps(3.4), 0, TAU); ctx.fill();

  // wingtip nav lights (blink, P1/P2 colour)
  const blink = 0.55 + 0.45 * Math.sin(t * 8 + p.idx * 2);
  ctx.fillStyle = col; ctx.globalAlpha = alpha * blink;
  ctx.shadowBlur = ps(8); ctx.shadowColor = glow;
  ctx.beginPath(); ctx.arc(-ps(12.5), ps(9), ps(1.8), 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(ps(12.5), ps(9), ps(1.8), 0, TAU); ctx.fill();
  ctx.globalAlpha = alpha;

  ctx.restore();

  // tag
  if (numPlayers === 2) {
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.col.ship; ctx.shadowBlur = 0;
    ctx.font = "700 " + ps(10) + "px 'Courier New', monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(p.col.tag, x, y + ps(24));
  }
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;

  // hit-flash: brief red ring pulse around the ship when it just took damage
  if (p.hitFlash > 0) {
    ctx.save();
    ctx.globalAlpha = clamp(p.hitFlash / 0.32, 0, 1) * 0.8;
    ctx.strokeStyle = "#ff5a5a"; ctx.lineWidth = ps(2.5);
    ctx.shadowBlur = ps(10); ctx.shadowColor = "#ff5a5a";
    ctx.beginPath(); ctx.arc(x, y, ps(CONFIG.shipR + 5), 0, TAU); ctx.stroke();
    ctx.restore();
  }
  // floating HP pip cluster near the ship (fades out when full)
  drawShipHPPips(p, x, y);

  // Option drones — small spinning orbs orbiting the ship, tinted to player
  if (p.options > 0) {
    const n = Math.min(CONFIG.maxOptions, p.options);
    const orr = ps(CONFIG.optionOrbitR);
    for (let i = 0; i < n; i++) {
      const a = p.optAng + (i / n) * TAU;
      const ox = x + Math.cos(a) * orr;
      const oy = y + Math.sin(a) * orr * 0.7 - ps(6);
      ctx.save();
      ctx.translate(ox, oy);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = col; ctx.shadowBlur = ps(10); ctx.shadowColor = glow;
      ctx.beginPath(); ctx.arc(0, 0, ps(4.2), 0, TAU); ctx.fill();
      ctx.fillStyle = "#fff"; ctx.shadowBlur = ps(4);
      ctx.beginPath(); ctx.arc(0, 0, ps(2), 0, TAU); ctx.fill();
      ctx.restore();
    }
    ctx.globalAlpha = 1; ctx.shadowBlur = 0;
  }
}

/* per-type hostile accent (darker hull tone) — keeps friend/foe coding clear */
const ENEMY_ACCENT = ["#1f6b4e", "#2a5e80", "#8a6a1e", "#7a3a14", "#5a1e1e"];
const ENEMY_FIRE = ["#ff5a7a", "#ff8ad0", "#ffd36e", "#ff4444", "#ff6b6b"];

function drawEnemy(e) {
  const x = px(e.x), y = py(e.y);
  const flash = e.flash > 0;
  const r = ps(e.r);
  const dark = ENEMY_ACCENT[e.type];
  const fire = ENEMY_FIRE[e.type];
  const lit = e.fireFlash > 0;   // muzzle telegraph
  ctx.save();
  ctx.translate(x, y);
  ctx.shadowBlur = ps(12); ctx.shadowColor = e.col;

  switch (e.type) {
    case 0: { // DIVER — aggressive dart/wedge interceptor, forward spike, twin thrusters
      // thruster streams (upward, behind it as it dives down)
      const fb = 0.7 + 0.3 * Math.sin(e.t * 26);
      for (const sx of [-1, 1]) {
        ctx.fillStyle = "rgba(255,140,90,0.8)"; ctx.shadowBlur = ps(8); ctx.shadowColor = "#ff8a4a";
        ctx.beginPath();
        ctx.moveTo(sx * r * 0.5, -r * 0.6);
        ctx.lineTo(sx * r * 0.5 - sx * r * 0.18, -r * 0.6 - r * 0.7 * fb);
        ctx.lineTo(sx * r * 0.5 + sx * r * 0.18, -r * 0.6);
        ctx.closePath(); ctx.fill();
      }
      // forward spike
      ctx.fillStyle = flash ? "#fff" : "#ffd0c0"; ctx.shadowBlur = ps(6); ctx.shadowColor = fire;
      ctx.beginPath(); ctx.moveTo(0, r * 1.25); ctx.lineTo(r * 0.12, r * 0.7); ctx.lineTo(-r * 0.12, r * 0.7); ctx.closePath(); ctx.fill();
      // hull wedge (nose down)
      const g = ctx.createLinearGradient(0, -r, 0, r);
      g.addColorStop(0, dark); g.addColorStop(1, flash ? "#fff" : e.col);
      ctx.fillStyle = flash ? "#fff" : g; ctx.shadowBlur = ps(12); ctx.shadowColor = e.col;
      ctx.beginPath();
      ctx.moveTo(0, r); ctx.lineTo(r * 0.85, -r * 0.45); ctx.lineTo(r * 0.4, -r * 0.65);
      ctx.lineTo(0, -r * 0.35); ctx.lineTo(-r * 0.4, -r * 0.65); ctx.lineTo(-r * 0.85, -r * 0.45);
      ctx.closePath(); ctx.fill();
      break;
    }
    case 1: { // WEAVER — organic finned craft that banks into its sine curve
      const bankA = clamp(Math.cos(e.t * e.freq + e.phase) * e.amp * e.freq / 140, -0.6, 0.6);
      ctx.rotate(bankA);
      // side fins (flap subtly)
      const flap = Math.sin(e.t * 6) * 0.2;
      ctx.fillStyle = flash ? "#fff" : dark; ctx.shadowBlur = ps(10); ctx.shadowColor = e.col;
      for (const sx of [-1, 1]) {
        ctx.beginPath();
        ctx.moveTo(sx * r * 0.3, -r * 0.2);
        ctx.quadraticCurveTo(sx * r * 1.2, r * (0.1 + flap), sx * r * 0.5, r * 0.7);
        ctx.lineTo(sx * r * 0.2, r * 0.2);
        ctx.closePath(); ctx.fill();
      }
      // teardrop body
      const g = ctx.createLinearGradient(0, -r, 0, r);
      g.addColorStop(0, flash ? "#fff" : e.col); g.addColorStop(1, dark);
      ctx.fillStyle = flash ? "#fff" : g; ctx.shadowBlur = ps(12); ctx.shadowColor = e.col;
      ctx.beginPath();
      ctx.moveTo(0, -r * 0.95);
      ctx.quadraticCurveTo(r * 0.75, -r * 0.2, r * 0.45, r * 0.85);
      ctx.quadraticCurveTo(0, r * 1.1, -r * 0.45, r * 0.85);
      ctx.quadraticCurveTo(-r * 0.75, -r * 0.2, 0, -r * 0.95);
      ctx.closePath(); ctx.fill();
      break;
    }
    case 2: { // STRAFER — craft that flips/rotates as it pops in/out, guns swivel
      // spin while entering (state 0) / exiting (state 2), settle while holding
      let spin = e.t * 2;
      if (e.state === 1) spin = Math.sin(e.t * 3) * 0.4;   // hold: gentle wobble
      ctx.rotate(spin);
      // swivel guns (track downward)
      ctx.fillStyle = flash ? "#fff" : "#ffe0a0"; ctx.shadowBlur = ps(6); ctx.shadowColor = fire;
      const gl = lit ? r * 0.55 : r * 0.4;
      for (const sx of [-1, 1]) ctx.fillRect(sx * r * 0.7 - r * 0.08, 0, r * 0.16, gl);
      // hexagonal armored body
      const g = ctx.createLinearGradient(-r, 0, r, 0);
      g.addColorStop(0, dark); g.addColorStop(0.5, flash ? "#fff" : e.col); g.addColorStop(1, dark);
      ctx.fillStyle = flash ? "#fff" : g; ctx.shadowBlur = ps(12); ctx.shadowColor = e.col;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) { const a = i / 6 * TAU + 0.52; const fn = i === 0 ? "moveTo" : "lineTo"; ctx[fn](Math.cos(a) * r, Math.sin(a) * r); }
      ctx.closePath(); ctx.fill();
      break;
    }
    case 3: { // TURRET — hovering gun-platform, rotating barrel/eye tracks & recoils
      // base ring
      ctx.fillStyle = flash ? "#fff" : dark; ctx.shadowBlur = ps(10); ctx.shadowColor = e.col;
      ctx.beginPath(); ctx.arc(0, 0, r, 0, TAU); ctx.fill();
      // armored octagon plate
      const g = ctx.createRadialGradient(0, -r * 0.3, 0, 0, 0, r);
      g.addColorStop(0, flash ? "#fff" : e.col); g.addColorStop(1, dark);
      ctx.fillStyle = flash ? "#fff" : g;
      ctx.beginPath();
      for (let i = 0; i < 8; i++) { const a = i / 8 * TAU + 0.39; const fn = i === 0 ? "moveTo" : "lineTo"; ctx[fn](Math.cos(a) * r * 0.8, Math.sin(a) * r * 0.8); }
      ctx.closePath(); ctx.fill();
      // rotating barrel aimed at nearest player, with recoil
      let aim = Math.PI / 2;
      if (game) { const tp = nearestPlayer(e.x, e.y); if (tp) aim = Math.atan2(tp.y - e.y, tp.x - e.x); }
      const rec = r * 0.2 * e.recoil;
      ctx.rotate(aim - Math.PI / 2);
      ctx.fillStyle = flash ? "#fff" : "#3a1818"; ctx.shadowBlur = ps(6); ctx.shadowColor = fire;
      ctx.fillRect(-r * 0.18, r * 0.2 - rec, r * 0.36, r * 0.95);
      // muzzle glow when firing
      ctx.fillStyle = lit ? "#fff" : fire; ctx.shadowBlur = ps(lit ? 14 : 8); ctx.shadowColor = fire;
      ctx.beginPath(); ctx.arc(0, r * 1.1 - rec, r * (lit ? 0.28 : 0.16), 0, TAU); ctx.fill();
      ctx.rotate(-(aim - Math.PI / 2));
      // central "eye" core
      ctx.fillStyle = "#fff"; ctx.shadowBlur = ps(8); ctx.shadowColor = fire;
      ctx.beginPath(); ctx.arc(0, 0, r * 0.22, 0, TAU); ctx.fill();
      ctx.fillStyle = fire;
      ctx.beginPath(); ctx.arc(0, 0, r * 0.11, 0, TAU); ctx.fill();
      break;
    }
    case 4: { // GUNSHIP — bulky armored carrier, multi gun-ports, plating, damage states
      const dmg = 1 - e.hp / e.maxhp;
      // hull body
      const g = ctx.createLinearGradient(-r, 0, r, 0);
      g.addColorStop(0, dark); g.addColorStop(0.5, flash ? "#fff" : e.col); g.addColorStop(1, dark);
      ctx.fillStyle = flash ? "#fff" : g; ctx.shadowBlur = ps(14); ctx.shadowColor = e.col;
      ctx.beginPath();
      ctx.moveTo(0, r); ctx.lineTo(r, r * 0.1); ctx.lineTo(r * 0.85, -r * 0.55);
      ctx.lineTo(r * 0.45, -r); ctx.lineTo(-r * 0.45, -r); ctx.lineTo(-r * 0.85, -r * 0.55);
      ctx.lineTo(-r, r * 0.1);
      ctx.closePath(); ctx.fill();
      // armor plating seams
      if (DETAIL) {
        ctx.strokeStyle = "rgba(0,0,0,0.45)"; ctx.lineWidth = ps(1.5); ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.moveTo(-r * 0.7, -r * 0.2); ctx.lineTo(r * 0.7, -r * 0.2);
        ctx.moveTo(0, -r); ctx.lineTo(0, r * 0.6);
        ctx.stroke();
      }
      // gun ports — flash in sequence when firing the spread (5 ports)
      const seq = lit ? Math.floor(e.t * 40) % 5 : -1;
      for (let i = 0; i < 5; i++) {
        const gx = (i - 2) * r * 0.32;
        const on = lit && (i === seq || e.fireFlash > 0.1);
        ctx.fillStyle = on ? "#fff" : "#3a1010";
        ctx.shadowBlur = on ? ps(12) : 0; ctx.shadowColor = fire;
        ctx.beginPath(); ctx.arc(gx, r * 0.45, r * 0.12, 0, TAU); ctx.fill();
      }
      // bridge core
      ctx.fillStyle = "#fff"; ctx.shadowBlur = ps(8); ctx.shadowColor = fire;
      ctx.beginPath(); ctx.arc(0, -r * 0.3, r * 0.2, 0, TAU); ctx.fill();
      // damage: scorch / cracks as HP drops
      if (DETAIL && dmg > 0.35) {
        ctx.strokeStyle = "rgba(20,0,0,0.7)"; ctx.lineWidth = ps(1.5); ctx.shadowBlur = 0;
        ctx.beginPath();
        ctx.moveTo(-r * 0.5, -r * 0.4); ctx.lineTo(-r * 0.2, 0); ctx.lineTo(-r * 0.35, r * 0.4);
        if (dmg > 0.65) { ctx.moveTo(r * 0.5, -r * 0.3); ctx.lineTo(r * 0.25, r * 0.1); ctx.lineTo(r * 0.45, r * 0.5); }
        ctx.stroke();
        if (dmg > 0.65 && Math.sin(e.t * 18) > 0.4) {   // flickering damage fire
          ctx.fillStyle = "rgba(255,160,60,0.8)"; ctx.shadowBlur = ps(8); ctx.shadowColor = "#ff8a3a";
          ctx.beginPath(); ctx.arc(r * 0.3, -r * 0.1, r * 0.14, 0, TAU); ctx.fill();
        }
      }
      break;
    }
  }

  // hp bar for tanky gunship
  if (e.type === 4 && e.hp < e.maxhp) {
    ctx.shadowBlur = 0;
    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(-r, -r - ps(8), r * 2, ps(3));
    ctx.fillStyle = "#ff6b6b"; ctx.fillRect(-r, -r - ps(8), r * 2 * (e.hp / e.maxhp), ps(3));
  }
  ctx.restore();
  ctx.shadowBlur = 0;
}

function drawBoss() {
  if (!boss) return;
  const x = px(boss.x), y = py(boss.y);
  const r = ps(boss.r);
  const flash = boss.flash > 0;
  const lit = boss.fireFlash > 0;
  const charge = clamp(boss.phaseT / 6, 0, 1);   // 0..1 telegraph toward next attack window
  const dead = boss.dead;
  // dying flicker
  const dyA = dead ? (0.4 + 0.6 * Math.abs(Math.sin(boss.deathT * 22))) : 1;
  ctx.save();
  ctx.translate(x, y);
  ctx.globalAlpha = dyA;
  ctx.shadowBlur = ps(24); ctx.shadowColor = boss.col;

  if (boss.defIdx === 0) drawBossWarden(boss, r, flash, lit, charge);
  else if (boss.defIdx === 1) drawBossHive(boss, r, flash, lit, charge);
  else drawBossDread(boss, r, flash, lit, charge);

  // destructible side parts (drawn over hull, with damage state)
  for (const part of boss.parts) {
    if (!part.alive) continue;
    const pr = ps(part.r), pdx = ps(part.dx), pdy = ps(part.dy);
    const pf = part.flash > 0;
    ctx.save(); ctx.translate(pdx, pdy);
    ctx.rotate(boss.t * (boss.defIdx === 1 ? 1.4 : 2.2));   // rotating turret/pod ring
    ctx.shadowBlur = ps(12); ctx.shadowColor = boss.col;
    ctx.fillStyle = pf ? "#fff" : "#aa4455";
    ctx.beginPath();
    for (let i = 0; i < 6; i++) { const a = i / 6 * TAU; const fn = i === 0 ? "moveTo" : "lineTo"; ctx[fn](Math.cos(a) * pr, Math.sin(a) * pr); }
    ctx.closePath(); ctx.fill();
    ctx.rotate(-boss.t * (boss.defIdx === 1 ? 1.4 : 2.2));
    ctx.fillStyle = pf ? "#fff" : (lit ? "#ffdddd" : "#ff8888");
    ctx.shadowBlur = ps(lit ? 12 : 6); ctx.shadowColor = "#ff5a5a";
    ctx.beginPath(); ctx.arc(0, 0, pr * 0.4, 0, TAU); ctx.fill();
    ctx.restore();
  }

  ctx.restore();
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;
}

/* WARDEN — armored battlecruiser: rotating turret rings + charging core */
function drawBossWarden(b, r, flash, lit, charge) {
  // hull — angular fortress with twin gradients
  const g = ctx.createLinearGradient(0, -r, 0, r);
  g.addColorStop(0, "#5a1e1e"); g.addColorStop(0.5, flash ? "#fff" : b.col); g.addColorStop(1, "#3a1212");
  ctx.fillStyle = flash ? "#fff" : g;
  ctx.beginPath();
  ctx.moveTo(0, r); ctx.lineTo(r, r * 0.25); ctx.lineTo(r * 0.85, -r * 0.5);
  ctx.lineTo(r * 0.5, -r); ctx.lineTo(-r * 0.5, -r); ctx.lineTo(-r * 0.85, -r * 0.5);
  ctx.lineTo(-r, r * 0.25);
  ctx.closePath(); ctx.fill();
  // armor seams
  if (DETAIL) {
    ctx.strokeStyle = "rgba(0,0,0,0.4)"; ctx.lineWidth = ps(2); ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.moveTo(-r * 0.7, -r * 0.3); ctx.lineTo(r * 0.7, -r * 0.3);
    ctx.moveTo(-r * 0.5, r * 0.3); ctx.lineTo(r * 0.5, r * 0.3); ctx.stroke();
  }
  // two rotating turret rings
  ctx.shadowBlur = ps(10); ctx.shadowColor = b.col;
  for (const sx of [-1, 1]) {
    ctx.save(); ctx.translate(sx * r * 0.45, -r * 0.15);
    ctx.rotate(b.t * 1.6 * sx);
    ctx.fillStyle = "#2a1010";
    ctx.beginPath(); ctx.arc(0, 0, r * 0.28, 0, TAU); ctx.fill();
    ctx.fillStyle = lit ? "#fff" : "#ff7a6a";
    for (let i = 0; i < 4; i++) { const a = i / 4 * TAU; ctx.fillRect(Math.cos(a) * r * 0.1 - r * 0.04, Math.sin(a) * r * 0.1, r * 0.08, r * 0.3); }
    ctx.restore();
  }
  // charging core — grows & brightens with charge, flares at fire
  const cr = r * (0.22 + charge * 0.16) + (lit ? r * 0.1 : 0);
  const cg = ctx.createRadialGradient(0, 0, 0, 0, 0, cr);
  cg.addColorStop(0, "#fff");
  cg.addColorStop(0.5, lit ? "#fff" : "#ffd0a0");
  cg.addColorStop(1, "rgba(255,90,60,0)");
  ctx.fillStyle = cg; ctx.shadowBlur = ps(20); ctx.shadowColor = "#ff6b4a";
  ctx.beginPath(); ctx.arc(0, 0, cr, 0, TAU); ctx.fill();
}

/* HIVE QUEEN — organic mothership: pulsing egg-sacs + splaying limbs */
function drawBossHive(b, r, flash, lit, charge) {
  // splaying limbs (sway out as charge builds)
  const splay = 0.3 + charge * 0.5 + (lit ? 0.25 : 0);
  ctx.shadowBlur = ps(12); ctx.shadowColor = b.col;
  ctx.fillStyle = flash ? "#fff" : "#6a3a8a";
  for (const sx of [-1, 1]) {
    const sway = Math.sin(b.t * 1.5 + (sx > 0 ? 0 : 1)) * 0.15;
    ctx.beginPath();
    ctx.moveTo(sx * r * 0.3, -r * 0.2);
    ctx.quadraticCurveTo(sx * r * (1.1 + splay), r * 0.1, sx * r * (0.7 + sway), r * 0.9);
    ctx.quadraticCurveTo(sx * r * 0.5, r * 0.4, sx * r * 0.2, r * 0.1);
    ctx.closePath(); ctx.fill();
  }
  // rounded organic body
  const g = ctx.createRadialGradient(0, -r * 0.2, 0, 0, 0, r);
  g.addColorStop(0, flash ? "#fff" : "#d4a0ff"); g.addColorStop(1, "#4a2060");
  ctx.fillStyle = flash ? "#fff" : g; ctx.shadowBlur = ps(16); ctx.shadowColor = b.col;
  ctx.beginPath();
  for (let i = 0; i <= 8; i++) {
    const a = i / 8 * TAU - Math.PI / 2;
    const rr = r * (0.92 + 0.08 * Math.sin(a * 3 + b.t));
    const fn = i === 0 ? "moveTo" : "lineTo"; ctx[fn](Math.cos(a) * rr, Math.sin(a) * rr);
  }
  ctx.closePath(); ctx.fill();
  // pulsing egg-sacs (birth adds) — pulse rate ties to charge
  const pulse = 0.7 + 0.3 * Math.sin(b.t * (3 + charge * 4));
  for (let i = 0; i < 4; i++) {
    const a = i / 4 * TAU + b.t * 0.3;
    const ex = Math.cos(a) * r * 0.45, ey = Math.sin(a) * r * 0.45;
    ctx.fillStyle = lit ? "#fff" : "#ff9adf";
    ctx.shadowBlur = ps(10 * pulse); ctx.shadowColor = "#ff7ad0";
    ctx.beginPath(); ctx.arc(ex, ey, r * 0.16 * pulse, 0, TAU); ctx.fill();
  }
  // central glowing nucleus
  ctx.fillStyle = "#fff"; ctx.shadowBlur = ps(16); ctx.shadowColor = "#ffb0f0";
  ctx.beginPath(); ctx.arc(0, 0, r * 0.2 * pulse, 0, TAU); ctx.fill();
}

/* DREADNOUGHT — massive gunship: sequential cannon banks + sweeping laser emitters */
function drawBossDread(b, r, flash, lit, charge) {
  // broad armored hull
  const g = ctx.createLinearGradient(0, -r, 0, r);
  g.addColorStop(0, "#6a4010"); g.addColorStop(0.5, flash ? "#fff" : b.col); g.addColorStop(1, "#3a2408");
  ctx.fillStyle = flash ? "#fff" : g;
  ctx.beginPath();
  ctx.moveTo(0, r); ctx.lineTo(r, r * 0.3); ctx.lineTo(r, -r * 0.4);
  ctx.lineTo(r * 0.6, -r); ctx.lineTo(-r * 0.6, -r); ctx.lineTo(-r, -r * 0.4);
  ctx.lineTo(-r, r * 0.3);
  ctx.closePath(); ctx.fill();
  // armor plating
  if (DETAIL) {
    ctx.strokeStyle = "rgba(0,0,0,0.4)"; ctx.lineWidth = ps(2); ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.moveTo(-r * 0.8, 0); ctx.lineTo(r * 0.8, 0);
    ctx.moveTo(-r * 0.4, -r); ctx.lineTo(-r * 0.4, r * 0.6);
    ctx.moveTo(r * 0.4, -r); ctx.lineTo(r * 0.4, r * 0.6);
    ctx.stroke();
  }
  // sequential cannon banks across the front (light up in sequence)
  const seq = lit ? Math.floor(b.t * 30) % 6 : -1;
  ctx.shadowColor = "#ffae4a";
  for (let i = 0; i < 6; i++) {
    const gx = (i - 2.5) * r * 0.3;
    const on = (i === seq) || (lit && charge > 0.9);
    ctx.fillStyle = on ? "#fff" : "#3a2008";
    ctx.shadowBlur = on ? ps(14) : 0;
    ctx.fillRect(gx - r * 0.07, r * 0.4, r * 0.14, r * 0.4);
  }
  // sweeping laser emitters (telegraph beam line as charge nears full)
  const swA = Math.PI / 2 + Math.sin(b.sweepA) * 0.9;
  if (charge > 0.6 || lit) {
    ctx.save();
    ctx.globalAlpha *= lit ? 0.6 : (charge - 0.6) * 1.0;
    ctx.strokeStyle = "#fff"; ctx.lineWidth = ps(2); ctx.shadowBlur = ps(12); ctx.shadowColor = "#fff";
    ctx.beginPath(); ctx.moveTo(0, r * 0.4);
    ctx.lineTo(Math.cos(swA) * r * 3, r * 0.4 + Math.sin(swA) * r * 3); ctx.stroke();
    ctx.restore();
  }
  // twin emitter pods
  ctx.shadowBlur = ps(10); ctx.shadowColor = b.col;
  for (const sx of [-1, 1]) {
    ctx.fillStyle = lit ? "#fff" : "#ffc070";
    ctx.beginPath(); ctx.arc(sx * r * 0.6, -r * 0.5, r * 0.18, 0, TAU); ctx.fill();
  }
  // command core
  ctx.fillStyle = "#fff"; ctx.shadowBlur = ps(16); ctx.shadowColor = "#ffd0a0";
  ctx.beginPath(); ctx.arc(0, -r * 0.15, r * 0.18 + (lit ? r * 0.06 : 0), 0, TAU); ctx.fill();
}

function drawBullets() {
  // PLAYER bullets — each weapon type has a distinct shape, all cool/player-tinted
  // and clearly NOT the warm enemy orbs. kind: 0 vulcan,1 laser,2 wave,3 homing,4 missile
  for (const b of pBullets) {
    if (!b.on) continue;
    const bx = px(b.x), by = py(b.y), r = ps(b.r);
    if (b.kind === 1) {
      // LASER — slim elongated beam-bolt, bright white core
      ctx.fillStyle = b.col; ctx.shadowBlur = ps(12); ctx.shadowColor = b.col;
      ctx.fillRect(bx - r * 0.5, by - r * 3.2, r, r * 5.0);
      ctx.fillStyle = "#ffffff"; ctx.shadowBlur = ps(4);
      ctx.fillRect(bx - r * 0.22, by - r * 3.0, r * 0.44, r * 4.6);
    } else if (b.kind === 2) {
      // WAVE — crescent arc travelling outward
      ctx.strokeStyle = b.col; ctx.lineWidth = ps(3); ctx.shadowBlur = ps(12); ctx.shadowColor = b.col;
      ctx.beginPath();
      ctx.arc(bx, by, r * 1.3, b.ang - 1.1, b.ang + 1.1);
      ctx.stroke();
      ctx.strokeStyle = "#ffffff"; ctx.lineWidth = ps(1); ctx.shadowBlur = ps(3);
      ctx.beginPath(); ctx.arc(bx, by, r * 1.3, b.ang - 0.7, b.ang + 0.7); ctx.stroke();
    } else if (b.kind === 3 || b.kind === 4) {
      // HOMING dart / MISSILE — pointed shape oriented to travel, glowing tail
      ctx.save();
      ctx.translate(bx, by); ctx.rotate(b.ang + Math.PI / 2);
      const big = b.kind === 4;
      ctx.fillStyle = b.col; ctx.shadowBlur = ps(big ? 12 : 9); ctx.shadowColor = b.col;
      ctx.beginPath();
      ctx.moveTo(0, -r * (big ? 2.4 : 2.0));
      ctx.lineTo(r * 0.7, r * 1.2);
      ctx.lineTo(-r * 0.7, r * 1.2);
      ctx.closePath(); ctx.fill();
      // exhaust tail
      ctx.fillStyle = "#fff"; ctx.shadowBlur = ps(6);
      ctx.beginPath(); ctx.arc(0, r * 1.3, r * 0.5, 0, TAU); ctx.fill();
      ctx.restore();
    } else {
      // VULCAN — original tapered plasma bolt (preserved look)
      ctx.fillStyle = b.col; ctx.shadowBlur = ps(10); ctx.shadowColor = b.col;
      ctx.beginPath();
      ctx.moveTo(bx, by - r * 2.0);
      ctx.lineTo(bx + r * 0.6, by + r * 1.4);
      ctx.lineTo(bx - r * 0.6, by + r * 1.4);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#ffffff"; ctx.shadowBlur = ps(4);
      ctx.fillRect(bx - r * 0.28, by - r * 1.4, r * 0.56, r * 2.4);
    }
  }
  // ENEMY — hostile orb: warm/red glow ring + dark rim + bright center pip.
  for (const b of eBullets) {
    if (!b.on) continue;
    const bx = px(b.x), by = py(b.y), r = ps(b.r);
    const c = b.grazed ? "#ffd36e" : b.col;
    ctx.shadowBlur = ps(9); ctx.shadowColor = c;
    // outer glow body
    ctx.fillStyle = c;
    ctx.beginPath(); ctx.arc(bx, by, r, 0, TAU); ctx.fill();
    // dark rim for readability against bright fx
    ctx.shadowBlur = 0;
    ctx.strokeStyle = "rgba(40,0,10,0.55)"; ctx.lineWidth = ps(1);
    ctx.beginPath(); ctx.arc(bx, by, r, 0, TAU); ctx.stroke();
    // bright center pip
    ctx.fillStyle = "#ffffff";
    ctx.beginPath(); ctx.arc(bx, by, r * 0.42, 0, TAU); ctx.fill();
  }
  ctx.shadowBlur = 0;
}

const POWERUP_MAP = {
  weapon: { c: "#7affc4", t: "P" }, bomb: { c: "#ffd36e", t: "B" },
  shield: { c: "#9be7ff", t: "S" }, speed: { c: "#caa0ff", t: ">" }, gem: { c: "#ffe98a", t: "◆" },
  option: { c: "#aef0ff", t: "O" },
};
function powerupVisual(pu) {
  if (pu.kind === "weapon") { const w = WEAPONS[pu.wt] || WEAPONS[0]; return { c: w.col, t: w.icon }; }
  return POWERUP_MAP[pu.kind] || POWERUP_MAP.gem;
}
function drawPowerup(pu) {
  const x = px(pu.x), y = py(pu.y);
  const bob = Math.sin(pu.t * 4) * ps(2.5);
  const m = powerupVisual(pu);
  const r = ps(pu.r);
  // gentle spin: squash X by cos to fake a rotating capsule
  const spin = Math.cos(pu.t * 2.6);
  const sx = 0.45 + 0.55 * Math.abs(spin);
  ctx.save();
  ctx.translate(x, y + bob);
  // halo
  ctx.shadowBlur = ps(16); ctx.shadowColor = m.c;
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = m.c;
  ctx.beginPath(); ctx.arc(0, 0, r * 1.25, 0, TAU); ctx.fill();
  ctx.globalAlpha = 1;
  // capsule body (spinning)
  ctx.save();
  ctx.scale(sx, 1);
  const g = ctx.createLinearGradient(0, -r, 0, r);
  g.addColorStop(0, "#ffffff"); g.addColorStop(0.5, m.c); g.addColorStop(1, "rgba(0,0,0,0.55)");
  ctx.fillStyle = g; ctx.shadowBlur = ps(12); ctx.shadowColor = m.c;
  ctx.beginPath(); ctx.arc(0, 0, r, 0, TAU); ctx.fill();
  ctx.restore();
  // ring outline
  ctx.strokeStyle = m.c; ctx.lineWidth = ps(2); ctx.shadowBlur = ps(8);
  ctx.beginPath(); ctx.ellipse(0, 0, r * sx, r, 0, 0, TAU); ctx.stroke();
  // letter (fades when capsule edge-on)
  ctx.globalAlpha = 0.4 + 0.6 * Math.abs(spin);
  ctx.fillStyle = "#06121a"; ctx.shadowBlur = 0;
  ctx.font = "700 " + ps(15) + "px 'Courier New', monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(m.t, 0, ps(1));
  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ---------------- §S HUD + OVERLAYS ---------------- */
function neonText(str, x, y, size, col, align) {
  ctx.textAlign = align || "center"; ctx.textBaseline = "middle";
  ctx.font = "700 " + size + "px 'Courier New', monospace";
  ctx.shadowBlur = 12; ctx.shadowColor = col;
  ctx.fillStyle = col;
  ctx.fillText(str, x, y);
  ctx.shadowBlur = 0;
}

function drawHUD() {
  // play-column frame
  ctx.strokeStyle = "rgba(94,230,255,0.25)"; ctx.lineWidth = 2;
  ctx.strokeRect(playX, playY, playW, playH);

  // score top-centre (overlay)
  ctx.shadowBlur = 0;
  neonText("SCORE " + game.score, playX + playW / 2, playY + 18, Math.max(13, ps(15)), "#cfeaff");
  neonText("BEST " + Math.max(bestScore, game.score), playX + playW / 2, playY + 38, Math.max(10, ps(11)), "rgba(180,210,255,0.7)");
  // sector / depth / loop (+ time-dilation cue)
  const secLbl = "SECTOR " + game.depth + (game.isBossSector ? " ⚠BOSS" : (" · wave " + Math.min(game.sectorWave, game.sectorWaves) + "/" + game.sectorWaves)) + "  LOOP " + game.loop;
  neonText(secLbl, playX + playW / 2, playY + playH - 14, Math.max(9, ps(10)), game.timeDil > 0 ? "#caa0ff" : "rgba(150,180,230,0.6)");
  // combo
  if (game.combo > 1) {
    neonText("x" + game.combo + " COMBO", playX + playW / 2, playY + 58, Math.max(11, ps(13)), "#ffd36e");
  }

  // per-player HUD panels (side or stacked). Use left/right side panels if room, else overlay top-left.
  const sideRoom = playX > 150;
  for (let i = 0; i < game.players.length; i++) {
    const p = game.players[i];
    let hx, hy, align;
    if (sideRoom) {
      hx = (i === 0) ? 14 : cw - 14;
      hy = ch * 0.5 - 60;
      align = (i === 0) ? "left" : "right";
      drawPlayerPanel(p, hx, hy, align);
    } else {
      // overlay inside play column corners
      hx = (i === 0) ? playX + 8 : playX + playW - 8;
      hy = playY + 60 + i * 0;
      align = (i === 0) ? "left" : "right";
      drawPlayerPanelCompact(p, hx, playY + playH - 64, align);
    }
  }

  // low-HP red vignette near each endangered player (subtle, DETAIL-gated)
  if (DETAIL) {
    for (const p of game.players) {
      if (!p.alive || p.downed) continue;
      if (p.hp > maxHPFor(p) * CONFIG.lowHPFrac) continue;
      const x = px(p.x), y = py(p.y), R = ps(140);
      const a = 0.12 + 0.1 * Math.abs(Math.sin(p.lowPulse * 6));
      const g = ctx.createRadialGradient(x, y, ps(30), x, y, R);
      g.addColorStop(0, "rgba(255,40,40,0)");
      g.addColorStop(1, "rgba(255,30,30," + a.toFixed(3) + ")");
      ctx.fillStyle = g;
      ctx.save();
      ctx.beginPath(); ctx.rect(playX, playY, playW, playH); ctx.clip();
      ctx.fillRect(x - R, y - R, R * 2, R * 2);
      ctx.restore();
    }
  }

  // boss HP bar across top
  if (boss) {
    const bw = playW * 0.86, bx = playX + (playW - bw) / 2, by = playY + 6;
    ctx.fillStyle = "rgba(0,0,0,0.5)"; ctx.fillRect(bx, by, bw, ps(7));
    const frac = clamp(boss.hp / boss.maxhp, 0, 1);
    const grad = ctx.createLinearGradient(bx, 0, bx + bw, 0);
    grad.addColorStop(0, "#ff4444"); grad.addColorStop(1, boss.col);
    ctx.fillStyle = grad; ctx.fillRect(bx, by, bw * frac, ps(7));
    ctx.strokeStyle = "rgba(255,120,120,0.6)"; ctx.lineWidth = 1; ctx.strokeRect(bx, by, bw, ps(7));
    neonText(boss.def.name, playX + playW / 2, by + ps(18), Math.max(10, ps(11)), boss.col);
  }
}

function drawPlayerPanel(p, x, y, align) {
  ctx.textAlign = align; ctx.textBaseline = "top";
  const c = p.col.ship;
  ctx.shadowBlur = 8; ctx.shadowColor = c; ctx.fillStyle = c;
  ctx.font = "700 16px 'Courier New', monospace";
  ctx.fillText(p.col.tag, x, y);
  ctx.shadowBlur = 0; ctx.font = "700 13px 'Courier New', monospace";
  ctx.fillStyle = p.spectating ? "rgba(255,120,120,0.8)" : "#cfeaff";
  let yy = y + 22;
  if (p.spectating && p.lives <= 0 && !p.downed) {
    ctx.fillText("OUT", x, yy);
  } else if (p.downed) {
    ctx.fillStyle = "#ff8a8a";
    ctx.fillText("DOWNED " + Math.max(0, Math.ceil(p.downedT)) + "s", x, yy); yy += 18;
    ctx.fillStyle = "#7affc4";
    ctx.fillText("REVIVE " + Math.round(clamp(p.reviveProg, 0, 1) * 100) + "%", x, yy); yy += 18;
    ctx.fillStyle = c;
    ctx.fillText("♥ " + p.lives, x, yy); yy += 18;
  } else {
    ctx.fillStyle = c;
    ctx.fillText("♥ " + p.lives, x, yy); yy += 18;
    // HP bar (hull segments)
    drawHPBar(p, x, yy, align); ctx.textAlign = align; ctx.textBaseline = "top"; yy += 22;
    ctx.fillStyle = "#ffd36e";
    ctx.fillText("✦ " + p.bombs, x, yy); yy += 18;
    const W = curWeaponDef(p);
    ctx.fillStyle = W.col;
    ctx.fillText(W.icon + " " + W.name + " " + curLevel(p), x, yy); yy += 18;
    if (p.options > 0) { ctx.fillStyle = "#aef"; ctx.fillText("OPT x" + p.options, x, yy); yy += 18; }
    // bomb charge bar
    const bw = 54, bx = align === "left" ? x : x - bw;
    ctx.fillStyle = "rgba(255,255,255,0.15)"; ctx.fillRect(bx, yy + 2, bw, 5);
    ctx.fillStyle = "#9be7ff"; ctx.fillRect(bx, yy + 2, bw * clamp(p.bombMeter, 0, 1), 5);
    if (p.shield) { ctx.fillStyle = "#9be7ff"; ctx.fillText("⛨", align === "left" ? x + bw + 8 : x - bw - 8, yy - 2); }
    yy += 16;
    drawBlessingIcons(p, x, yy, align);
  }
}
/* per-player HP bar in the HUD rail — segmented hull bar, low-HP turns red. */
function drawHPBar(p, x, y, align) {
  const mx = maxHPFor(p);
  if (mx <= 0) return;
  const seg = Math.min(10, mx);
  const bw = 64, bx = align === "left" ? x : x - bw, bh = 7;
  const frac = clamp(p.hp / mx, 0, 1);
  const low = p.hp <= mx * CONFIG.lowHPFrac;
  ctx.shadowBlur = 0;
  ctx.fillStyle = "rgba(255,255,255,0.12)"; ctx.fillRect(bx, y, bw, bh);
  ctx.fillStyle = low ? "#ff5a5a" : "#7affc4"; ctx.fillRect(bx, y, bw * frac, bh);
  // segment ticks
  ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth = 1;
  for (let i = 1; i < seg; i++) { const tx = bx + bw * (i / seg); ctx.beginPath(); ctx.moveTo(tx, y); ctx.lineTo(tx, y + bh); ctx.stroke(); }
  ctx.strokeStyle = low ? "rgba(255,120,120,0.7)" : "rgba(120,255,196,0.5)"; ctx.strokeRect(bx, y, bw, bh);
  // numeric HP
  ctx.fillStyle = low ? "#ff8a8a" : "#cfeaff"; ctx.font = "700 10px 'Courier New', monospace";
  ctx.textAlign = align; ctx.textBaseline = "top";
  ctx.fillText("HP " + Math.max(0, Math.ceil(p.hp)) + "/" + mx, x, y + bh + 1);
}

/* held blessings as small coloured icons with stack counts (rarity-tinted),
   wrapping across rows so they never overflow the slim HUD rail. */
function drawBlessingIcons(p, x, y, align) {
  const ids = Object.keys(p.bless).filter((id) => p.bless[id] && p.bless[id].stacks > 0);
  if (!ids.length) return;
  ctx.textAlign = "left"; ctx.textBaseline = "middle";
  const sz = 16, gap = 2, perRow = 6;
  for (let i = 0; i < ids.length; i++) {
    const b = p.bless[ids[i]], R = RARITY[b.rarity] || RARITY[0], def = blessingDef(ids[i]);
    const col = i % perRow, row = Math.floor(i / perRow);
    const rowCount = Math.min(perRow, ids.length - row * perRow);
    const bx = (align === "left" ? x + col * (sz + gap) : x - (rowCount - col) * (sz + gap));
    const by = y + row * (sz + gap);
    ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.fillRect(bx, by - sz / 2, sz, sz);
    ctx.strokeStyle = R.col; ctx.lineWidth = 1; ctx.strokeRect(bx, by - sz / 2, sz, sz);
    ctx.fillStyle = R.col; ctx.shadowBlur = 4; ctx.shadowColor = R.col;
    ctx.font = "700 9px 'Courier New', monospace";
    ctx.fillText((def && def.name ? def.name[0] : "✦"), bx + 3, by - 1);
    ctx.shadowBlur = 0;
    if (b.stacks > 1) { ctx.fillStyle = "#fff"; ctx.font = "700 8px 'Courier New', monospace"; ctx.fillText(String(b.stacks), bx + sz - 6, by + 4); }
  }
}
function drawPlayerPanelCompact(p, x, y, align) {
  ctx.textAlign = align; ctx.textBaseline = "bottom";
  ctx.font = "700 12px 'Courier New', monospace";
  ctx.shadowBlur = 6; ctx.shadowColor = p.col.ship;
  const nb = Object.keys(p.bless).filter((id) => p.bless[id] && p.bless[id].stacks > 0).length;
  const txt = p.downed
    ? p.col.tag + " DOWN " + Math.round(clamp(p.reviveProg, 0, 1) * 100) + "%"
    : (p.spectating && p.lives <= 0)
    ? p.col.tag + " OUT"
    : p.col.tag + " ♥" + p.lives + " HP" + Math.max(0, Math.ceil(p.hp)) + "/" + maxHPFor(p) + " ✦" + p.bombs + " " + curWeaponDef(p).icon + curLevel(p) + (p.options > 0 ? " O" + p.options : "") + (nb > 0 ? " ✦" + nb : "");
  ctx.fillStyle = p.col.ship;
  ctx.fillText(txt, x, y);
  ctx.shadowBlur = 0;
}

function drawTouchControls() {
  if (!touchUI || state !== "play") return;
  // bomb button bottom-right of play column
  bombBtnRect.x = playX + playW - ps(50);
  bombBtnRect.y = playY + playH - ps(54);
  bombBtnRect.r = ps(38);
  ctx.save();
  ctx.globalAlpha = 0.6;
  ctx.strokeStyle = "#ffd36e"; ctx.lineWidth = ps(2);
  ctx.shadowBlur = ps(10); ctx.shadowColor = "#ffd36e";
  ctx.beginPath(); ctx.arc(bombBtnRect.x, bombBtnRect.y, bombBtnRect.r, 0, TAU); ctx.stroke();
  ctx.fillStyle = "rgba(0,0,0,0.4)"; ctx.beginPath(); ctx.arc(bombBtnRect.x, bombBtnRect.y, bombBtnRect.r, 0, TAU); ctx.fill();
  ctx.fillStyle = "#ffd36e"; ctx.shadowBlur = 0;
  ctx.font = "700 " + ps(14) + "px 'Courier New', monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("BOMB", bombBtnRect.x, bombBtnRect.y);
  ctx.restore();

function render() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // letterbox fill
  ctx.fillStyle = "#050514";
  ctx.fillRect(0, 0, cw, ch);

  // screen shake offset
  let ox = 0, oy = 0;
  if (shakeT > 0) { ox = rand(-shakeMag, shakeMag); oy = rand(-shakeMag, shakeMag); }
  ctx.save();
  ctx.translate(ox, oy);

  drawBackground();

  if (state === "play" || state === "over" || state === "gates" || state === "boon") {
    ctx.save();
    ctx.beginPath(); ctx.rect(playX, playY, playW, playH); ctx.clip();
    for (const pu of powerups) drawPowerup(pu);
    for (const e of enemies) drawEnemy(e);
    drawBoss();
    drawBullets();
    for (const p of game.players) drawShip(p);
    drawParts();
    drawTexts();
    ctx.restore();
    drawHUD();
    drawTouchControls();
  }

  if (state === "title") drawTitle();
  else if (state === "shop") { ctx.fillStyle = "rgba(5,5,20,0.82)"; ctx.fillRect(playX, playY, playW, playH); drawShop(); }
  else if (state === "gates") drawGates();
  else if (state === "boon") drawBoon();
  else if (state === "play" && paused) drawPause();
  else if (state === "over") drawOver();

  drawToast();
  ctx.restore();
}

/* ---------------- §T MAIN LOOP (fixed-timestep accumulator) ---------------- */
const FIXED = 1 / 120;
let acc = 0, lastT = performance.now();
function frame(now) {
  let dt = (now - lastT) / 1000;
  lastT = now;
  if (dt > 0.1) dt = 0.1;  // clamp huge stalls

  pollPadMenus();

  acc += dt;
  let steps = 0;
  while (acc >= FIXED && steps < 8) {
    simStep(FIXED);
    acc -= FIXED;
    steps++;
  }
  if (steps === 8) acc = 0; // spiral-of-death guard

  // shake/toast timers tick in real time so they always decay,
  // even on menus / gates / pause (where simStep early-returns).
  if (shakeT > 0) { shakeT -= dt; if (shakeT <= 0) shakeMag = 0; }
  if (toastT > 0) toastT -= dt;

  render();
  requestAnimationFrame(frame);
}
reassignPads();
updateFsBtn();
requestAnimationFrame(frame);

    // HP / downed / revive
    damagePlayer, downPlayer, completeRevive, loseLifeAndRespawn, respawnPlayer,
    updateRevives, healPlayer, maxHPFor, baseMaxHP,
    get reviveTokens() { return game ? game.reviveTokens : 0; },
    set reviveTokens(v) { if (game) game.reviveTokens = v; },
    get credits() { return credits; }, set credits(v) { credits = v; },
    get meta() { return meta; }, set meta(v) { meta = v; },
    metaCost, buyMeta, openShop, closeShop, shopConfirm, endGame,
    get shopSel() { return shopSel; }, set shopSel(v) { shopSel = v; },
    get titleSel() { return titleSel; }, set titleSel(v) { titleSel = v; },
    pollPadMenus, saveMeta,
    setPlayers(n) { numPlayers = n; },
    startGame, goTitle,
    // roguelike layer
    BLESSINGS, RARITY, GATE_TYPES, blessingDef, rollRarity,
    startSector, onSectorCleared, openGates, rollGates, chooseGate,
    beginBoonPicks, nextBoonPick, rollBoonOptions, chooseBoon, rerollBoon,
    grantBlessing, blessVal, blessStacks, blessHas, computeEmitMods,
    advanceSector,
    get bestDepth() { return bestDepth; }, set bestDepth(v) { bestDepth = v; },
    render,   // exposed for headless render-path smoke testing
    // screen<->world transform helpers (for the wider-field round-trip test)
    px, py, ps, get viewScale() { return viewScale; },
    get playX() { return playX; }, get playY() { return playY; },
    get playW() { return playW; }, get playH() { return playH; },
    resize,
  };
}
