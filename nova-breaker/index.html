<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>NOVA BREAKER</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #050514; overflow: hidden;
    touch-action: none; -webkit-user-select: none; user-select: none;
    overscroll-behavior: none;
  }
  canvas { display: block; touch-action: none; }
  #arcadeLink {
    position: fixed; top: 12px; left: 14px; z-index: 10;
    font: 14px "Courier New", monospace; letter-spacing: 1px;
    color: #7ef3ff; opacity: 0.38; text-decoration: none;
    text-shadow: 0 0 8px rgba(126,243,255,0.8);
    padding: 6px 8px; transition: opacity 0.2s;
  }
  #arcadeLink:hover { opacity: 0.9; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="arcadeLink" href="../">&larr; Arcade</a>
<script>
"use strict";

/* ============================================================
   NOVA BREAKER — a neon space brick-breaker.
   Single file, zero dependencies, all art & audio procedural.

   Controls: mouse / touch-drag / arrows / A-D = move paddle.
             Space / click / tap = launch ball.
             P or Esc = pause, M = mute.
             Gamepad: left stick / d-pad = move, A/cross = launch/confirm,
                      Start/Options = start/pause, B/circle = cancel.

   Roguelike: a RUN is a series of brick-stages; after each clear pick the
   next node (branching doors: combat / treasure / shop / boss), earn boons
   (choose 1 of 3, rarity-rolled, stackable) and currency, banked on death.
   The META HUB on the title screen spends currency on permanent upgrades.
   ============================================================ */

/* ---------------- §B CONFIG ---------------- */
const CONFIG = Object.freeze({
  W: 540, H: 760,            // virtual playfield size
  paddleW: 92, paddleH: 14, paddleY: 706,
  paddleWideW: 150, paddleSpeed: 620,   // keyboard px/s
  ballR: 7,
  ballSpeed0: 350,           // base ball speed, level 1
  ballSpeedPerLevel: 18,
  ballSpeedMax: 620,
  paddleSpeedup: 1.012,      // speed multiplier per paddle hit
  maxBounceAngle: 1.08,      // rad from vertical at paddle edge
  brickCols: 10, brickTop: 84, brickH: 22, brickGap: 4, sideMargin: 12,
  maxRows: 9,
  powerChance: 0.24,         // drop chance per broken brick
  powerFall: 150,            // px/s
  powerW: 34, powerH: 18,
  wideTime: 11, slowTime: 8, laserTime: 8,
  slowFactor: 0.55,
  laserRate: 0.32,           // s between shots
  laserSpeed: 700,
  maxBalls: 10,
  comboMax: 9,
  lives0: 3,
  maxParticles: 700,
  /* --- roguelike --- */
  bossDepths: 5,             // every Nth stage is a boss
  stickDeadzone: 0.2,
  gamepadSpeed: 720,        // px/s at full stick tilt
  hazardSpeed: 130,         // boss hazard fall speed
  bossHazardR: 9,
});

/* ---------------- §C UTIL ---------------- */
const TAU = Math.PI * 2;
const rand = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;

const store = {
  get(k) { try { return localStorage.getItem("novabreaker." + k); } catch (e) { return this._m && this._m[k]; } },
  set(k, v) { try { localStorage.setItem("novabreaker." + k, v); } catch (e) { (this._m = this._m || {})[k] = v; } },
};

/* ---------------- canvas / view ---------------- */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const arcadeLink = document.getElementById("arcadeLink");
let cw = 0, ch = 0, dpr = 1, scale = 1, ox = 0, oy = 0;

function resize() {
  dpr = Math.min(2, window.devicePixelRatio || 1);
  cw = window.innerWidth; ch = window.innerHeight;
  canvas.width = Math.round(cw * dpr);
  canvas.height = Math.round(ch * dpr);
  canvas.style.width = cw + "px";
  canvas.style.height = ch + "px";
  scale = Math.min(cw / CONFIG.W, ch / CONFIG.H);
  ox = (cw - CONFIG.W * scale) / 2;
  oy = (ch - CONFIG.H * scale) / 2;
}
window.addEventListener("resize", resize);
resize();

/* coarse-pointer (touch) devices get touch instructions */
const touchUI = typeof matchMedia === "function" && matchMedia("(pointer: coarse)").matches;

/* screen px -> world x */
const toWorldX = (px) => (px - ox) / scale;

/* ---------------- §D AUDIO ---------------- */
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.muted = store.get("muted") === "1";
    this._musicTimer = null;
    this._beat = 0;
    this._nextNote = 0;
  }
  unlock() {
    if (!this.ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      const c = this.ctx = new AC();
      this.master = c.createGain();
      this.master.gain.value = this.muted ? 0 : 1;
      const comp = c.createDynamicsCompressor();
      this.master.connect(comp);
      comp.connect(c.destination);
      // fake reverb: feedback delay
      this.send = c.createGain(); this.send.gain.value = 0.45;
      const delay = c.createDelay(1); delay.delayTime.value = 0.3;
      const fb = c.createGain(); fb.gain.value = 0.34;
      this.send.connect(delay); delay.connect(fb); fb.connect(delay);
      delay.connect(this.master);
      // 1s noise buffer for SFX
      const buf = c.createBuffer(1, c.sampleRate, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      this.noiseBuf = buf;
      this.startMusic();
    }
    if (this.ctx.state !== "running") this.ctx.resume();
  }
  toggleMute() {
    this.muted = !this.muted;
    store.set("muted", this.muted ? "1" : "0");
    if (this.master) this.master.gain.value = this.muted ? 0 : 1;
  }
  ok() { return this.ctx && this.ctx.state === "running" && !this.muted; }
  tone(type, f0, f1, t0, dur, vol, wet) {
    const c = this.ctx, o = c.createOscillator(), g = c.createGain();
    o.type = type;
    o.frequency.setValueAtTime(f0, t0);
    if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0 + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(this.master);
    if (wet) g.connect(this.send);
    o.start(t0); o.stop(t0 + dur + 0.05);
  }
  noise(t0, dur, vol, filterType, f0, f1) {
    const c = this.ctx, s = c.createBufferSource(), g = c.createGain();
    s.buffer = this.noiseBuf;
    const fl = c.createBiquadFilter();
    fl.type = filterType;
    fl.frequency.setValueAtTime(f0, t0);
    if (f1) fl.frequency.exponentialRampToValueAtTime(Math.max(20, f1), t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    s.connect(fl); fl.connect(g); g.connect(this.master);
    s.start(t0); s.stop(t0 + dur + 0.05);
  }
  /* --- SFX --- */
  paddle() { if (this.ok()) this.tone("triangle", 220, 180, this.ctx.currentTime, 0.09, 0.18, false); }
  wall() { if (this.ok()) this.tone("triangle", 160, 140, this.ctx.currentTime, 0.06, 0.1, false); }
  brick(combo, hp) {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    const base = 330 * Math.pow(1.0905, Math.min(combo, 14)); // pitch rises per combo
    this.tone("square", base, base * 1.5, t, 0.1, 0.12, true);
    this.tone("sine", base * 2, base * 2.4, t, 0.14, 0.08, true);
    if (hp <= 0) this.noise(t, 0.16, 0.12, "highpass", 1400, 4500);
    else this.noise(t, 0.06, 0.06, "bandpass", 2200, 2600);
  }
  power() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("sine", 440, 880, t, 0.16, 0.14, true);
    this.tone("sine", 660, 1320, t + 0.08, 0.18, 0.12, true);
  }
  laser() { if (this.ok()) this.tone("sawtooth", 980, 240, this.ctx.currentTime, 0.09, 0.07, false); }
  lifeLost() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("sawtooth", 320, 70, t, 0.5, 0.16, true);
    this.tone("square", 160, 45, t + 0.05, 0.55, 0.12, true);
    this.noise(t, 0.4, 0.1, "lowpass", 900, 120);
  }
  levelClear() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    [523, 659, 784, 1047].forEach((f, i) =>
      this.tone("sine", f, f, t + i * 0.11, 0.3, 0.13, true));
  }
  gameOver() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    [392, 311, 262, 196].forEach((f, i) =>
      this.tone("triangle", f, f * 0.97, t + i * 0.18, 0.4, 0.13, true));
  }
  boon() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    [523, 659, 784, 1047, 1319].forEach((f, i) =>
      this.tone("sine", f, f, t + i * 0.07, 0.26, 0.12, true));
    this.tone("triangle", 261, 392, t, 0.4, 0.08, true);
  }
  purchase() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("square", 880, 1320, t, 0.1, 0.1, true);
    this.tone("sine", 1320, 1760, t + 0.06, 0.16, 0.1, true);
  }
  deny() { if (this.ok()) this.tone("sawtooth", 180, 90, this.ctx.currentTime, 0.14, 0.12, false); }
  nav() { if (this.ok()) this.tone("triangle", 520, 560, this.ctx.currentTime, 0.04, 0.06, false); }
  bossWarn() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("sawtooth", 110, 70, t, 0.8, 0.16, true);
    this.tone("square", 55, 40, t, 0.9, 0.12, true);
    this.noise(t, 0.6, 0.1, "lowpass", 700, 120);
  }
  bossHit() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("square", 240, 120, t, 0.12, 0.14, true);
    this.noise(t, 0.12, 0.1, "bandpass", 1200, 600);
  }
  bossDie() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    [196, 262, 330, 392, 523, 659].forEach((f, i) =>
      this.tone("triangle", f, f, t + i * 0.1, 0.4, 0.13, true));
    this.noise(t, 0.7, 0.14, "lowpass", 1600, 100);
  }
  explode() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.noise(t, 0.22, 0.13, "highpass", 900, 3200);
    this.tone("square", 180, 60, t, 0.2, 0.1, true);
  }
  zap() { if (this.ok()) this.tone("sawtooth", 1400, 400, this.ctx.currentTime, 0.07, 0.06, true); }
  coin() { if (this.ok()) this.tone("square", 988, 1318, this.ctx.currentTime, 0.06, 0.05, false); }
  /* --- ambient music: slow minor-pentatonic pad --- */
  startMusic() {
    if (this._musicTimer) return;
    const scaleN = [110, 130.8, 146.8, 164.8, 196, 220, 261.6, 293.7];
    this._musicTimer = setInterval(() => {
      if (!this.ctx || this.ctx.state !== "running" || this.muted) return;
      const t = this.ctx.currentTime;
      if (t < this._nextNote) return;
      this._nextNote = t + 1.7;
      const b = this._beat++;
      const root = scaleN[(b * 3) % scaleN.length];
      this.tone("sine", root, root, t, 2.6, 0.045, true);
      this.tone("sine", root * 1.5, root * 1.5, t + 0.3, 2.2, 0.03, true);
      if (b % 2 === 0) this.tone("triangle", root / 2, root / 2, t, 2.8, 0.05, true);
      if (b % 4 === 3) {
        const hi = scaleN[(b * 5 + 4) % scaleN.length] * 4;
        this.tone("sine", hi, hi, t + 0.6, 1.4, 0.022, true);
      }
    }, 150);
  }
}
const audio = new AudioEngine();

/* ---------------- §E STARFIELD ---------------- */
const stars = [];
for (let i = 0; i < 110; i++) {
  stars.push({
    x: Math.random(), y: Math.random(),
    z: rand(0.25, 1),                 // depth: speed + brightness
    tw: rand(0, TAU),                 // twinkle phase
  });
}
function updateStars(dt) {
  for (const s of stars) {
    s.y += s.z * 0.012 * dt;
    if (s.y > 1) { s.y -= 1; s.x = Math.random(); }
    s.tw += dt * 2;
  }
}
function drawStars() {
  for (const s of stars) {
    const a = (0.25 + 0.65 * s.z) * (0.7 + 0.3 * Math.sin(s.tw));
    ctx.fillStyle = "rgba(190,210,255," + a.toFixed(3) + ")";
    const r = 0.6 + s.z * 1.3;
    ctx.fillRect(s.x * cw - r / 2, s.y * ch - r / 2, r, r);
  }
}

/* ---------------- §F PARTICLES ---------------- */
const particles = [];
function spawnBurst(x, y, color, n, speed, life) {
  for (let i = 0; i < n; i++) {
    if (particles.length >= CONFIG.maxParticles) particles.shift();
    const a = rand(0, TAU), v = rand(speed * 0.3, speed);
    particles.push({
      x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v,
      life: rand(life * 0.5, life), t: 0,
      color, r: rand(1.5, 3.5),
    });
  }
}
function updateParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.t += dt;
    if (p.t >= p.life) { particles.splice(i, 1); continue; }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 240 * dt;
    p.vx *= Math.pow(0.4, dt); p.vy *= Math.pow(0.6, dt);
  }
}
function drawParticles() {
  for (const p of particles) {
    const a = 1 - p.t / p.life;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * a, 0, TAU);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

/* ---------------- §G LEVELS ---------------- */
const BRICK_COLORS = [
  "#ff5e8a", "#ff9d4d", "#ffe14d", "#5dff7e", "#4de8ff", "#7e8aff", "#d06bff",
];
function brickW() {
  const C = CONFIG;
  return (C.W - C.sideMargin * 2 - (C.brickCols - 1) * C.brickGap) / C.brickCols;
}
/* Each pattern returns hp (0 = empty) for cell r,c. */
const PATTERNS = [
  function solid(r, c, rows, cols) { return 1 + (r < 2 ? 1 : 0); },
  function checker(r, c, rows, cols) { return (r + c) % 2 === 0 ? (r < 3 ? 2 : 1) : 0; },
  function pyramid(r, c, rows, cols) {
    const half = cols / 2;
    const w = (r + 1) / rows * half;
    return Math.abs(c + 0.5 - half) <= w ? (r === 0 ? 3 : r < 3 ? 2 : 1) : 0;
  },
  function diamond(r, c, rows, cols) {
    const cy = (rows - 1) / 2, cx = (cols - 1) / 2;
    const d = Math.abs(r - cy) / (rows / 2) + Math.abs(c - cx) / (cols / 2);
    return d <= 1 ? (d < 0.45 ? 3 : d < 0.8 ? 2 : 1) : 0;
  },
  function fortress(r, c, rows, cols) {
    const edge = c === 0 || c === cols - 1 || r === 0;
    if (edge) return 3;
    if (r >= rows - 2 && c > 2 && c < cols - 3) return 0; // gate
    return (r + c) % 3 === 0 ? 2 : 1;
  },
  function stripes(r, c, rows, cols) {
    return c % 3 === 1 ? 0 : (c % 3 === 0 ? (r < 4 ? 2 : 1) : (r % 2 === 0 ? 3 : 1));
  },
];

function buildLevel(n) {  // n is 1-based
  const C = CONFIG;
  const rows = Math.min(5 + Math.floor((n - 1) / 2), C.maxRows);
  const boost = Math.floor((n - 1) / PATTERNS.length); // +hp each full cycle
  const pat = PATTERNS[(n - 1) % PATTERNS.length];
  const bw = brickW();
  const bricks = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < C.brickCols; c++) {
      let hp = pat(r, c, rows, C.brickCols);
      if (hp <= 0) continue;
      hp = clamp(hp + (boost > 0 && (r + c) % 2 === 0 ? 1 : 0), 1, 3);
      bricks.push({
        x: C.sideMargin + c * (bw + C.brickGap),
        y: C.brickTop + r * (C.brickH + C.brickGap),
        w: bw, h: C.brickH,
        hp, maxHp: hp,
        color: BRICK_COLORS[(r + (n - 1)) % BRICK_COLORS.length],
        flash: 0,
      });
    }
  }
  return bricks;
}

/* ---------------- §G1b STAGES / MODIFIERS ---------------- */
/* Stage modifiers tweak a freshly built brick layout. */
const STAGE_MODS = {
  armored:  { name: "护甲 Armored",  color: "#9fb4d6", apply(br) { br.hp += 1; br.maxHp += 1; br.armored = true; } },
  moving:   { name: "移动 Moving",   color: "#ff9d4d", apply(br) { br.drift = rand(20, 46) * (Math.random() < 0.5 ? -1 : 1); br.driftBase = br.x; br.driftPhase = rand(0, TAU); } },
  dense:    { name: "密集 Dense",    color: "#ff5e8a", apply() {} },
};
function buildStage(depth, modId) {
  const bricks = buildLevel(depth);
  const mod = modId && STAGE_MODS[modId];
  if (mod) for (const br of bricks) mod.apply(br);
  // depth-scaled hp bump every 4 depths
  const bump = Math.floor((depth - 1) / 4);
  if (bump > 0) for (const br of bricks) { br.hp = Math.min(6, br.hp + bump); br.maxHp = br.hp; }
  return bricks;
}

/* ---------------- §G2 BOONS (roguelike upgrades) ---------------- */
/* Each boon: id, name (bilingual short), line (synergy), max stacks,
   rarity-scaled value via apply(level). Boons mutate G.boons counters and
   physics flags read across the engine. Stored as counts in G.boonStacks. */
const RARITY = [
  { id: "common",    name: "普通 Common",    color: "#9fb4d6", weight: 60, mult: 1 },
  { id: "rare",      name: "稀有 Rare",      color: "#4de8ff", weight: 28, mult: 1.6 },
  { id: "epic",      name: "史诗 Epic",      color: "#d06bff", weight: 9,  mult: 2.4 },
  { id: "legendary", name: "传说 Legendary", color: "#ffe14d", weight: 3,  mult: 3.6 },
];
function rarityById(id) { return RARITY.find(r => r.id === id) || RARITY[0]; }

/* BOONS catalogue. icon = short glyph for HUD. desc(level) is bilingual. */
const BOONS = [
  { id: "multiball", line: "balls", icon: "+B", name: "分裂球 Split Ball", max: 4,
    desc: (n) => "+" + n + " 球 each serve · +" + n + " ball(s) per serve" },
  { id: "balldmg", line: "power", icon: "DMG", max: 5,
    desc: (n) => "+" + n + " 球伤害 · +" + n + " ball damage" },
  { id: "ballsize", line: "power", icon: "BIG", max: 4,
    desc: (n) => "+" + Math.round(n * 35) + "% 球体积 · ball size" },
  { id: "paddlew", line: "paddle", icon: "WID", max: 5,
    desc: (n) => "+" + Math.round(n * 18) + " 挡板宽 · paddle width" },
  { id: "fireball", line: "power", icon: "FIRE", max: 1,
    desc: () => "穿透小球 · fireball pierces bricks" },
  { id: "explosive", line: "aoe", icon: "BOOM", max: 3,
    desc: (n) => "击碎砖块爆炸 r" + (28 + n * 12) + " · explosive bricks" },
  { id: "chain", line: "aoe", icon: "CHN", max: 3,
    desc: (n) => "连锁闪电 x" + n + " · chain-lightning between bricks" },
  { id: "sticky", line: "paddle", icon: "STK", max: 1,
    desc: () => "粘性挡板 · catch & re-aim the ball" },
  { id: "extralife", line: "survive", icon: "+1U", max: 9,
    desc: (n) => "+" + n + " 命 · +" + n + " life" },
  { id: "scoremul", line: "econ", icon: "$$", max: 5,
    desc: (n) => "+" + Math.round(n * 20) + "% 得分/金币 · score & currency" },
  { id: "slowmo", line: "survive", icon: "SLW", max: 1,
    desc: () => "近台慢动作 · slow-mo when ball nears paddle" },
  { id: "bumpers", line: "survive", icon: "BMP", max: 1,
    desc: () => "侧墙缓冲 · side-wall bumpers nudge ball up" },
  { id: "laser", line: "paddle", icon: "LZR", max: 3,
    desc: (n) => "激光挡板 rate+" + n + " · laser paddle shoots" },
  { id: "homing", line: "balls", icon: "HOM", max: 3,
    desc: (n) => "追踪微调 x" + n + " · homing ball nudge" },
  { id: "crit", line: "power", icon: "CRT", max: 5,
    desc: (n) => (n * 10) + "% 暴击x3 · " + (n * 10) + "% crit (x3 dmg)" },
  { id: "shield", line: "survive", icon: "SHD", max: 3,
    desc: (n) => "+" + n + " 护盾(免死) · floor shield saves" },
];
function boonById(id) { return BOONS.find(b => b.id === id); }

/* ---------------- §G3 META UPGRADES (persistent hub) ---------------- */
/* cost = base * ratio^owned (geometric). Persisted under meta.<id>. */
const META = [
  { id: "life", icon: "+1U", name: "起始生命 Starting Life",
    desc: "+1 起始命 · +1 starting life", base: 40, ratio: 1.8, max: 5 },
  { id: "dmg", icon: "DMG", name: "起始伤害 Starting Damage",
    desc: "+1 起始球伤 · +1 starting ball damage", base: 60, ratio: 2.0, max: 3 },
  { id: "boon", icon: "BN", name: "起始恩赐 Starting Boon",
    desc: "+1 起始恩赐 · start each run with +1 boon", base: 120, ratio: 2.4, max: 3 },
  { id: "luck", icon: "LK", name: "幸运 Luck",
    desc: "更好稀有度概率 · better boon rarity odds", base: 90, ratio: 1.9, max: 4 },
  { id: "wide", icon: "WID", name: "宽挡板 Wide Start",
    desc: "起始更宽挡板 · start with wider paddle", base: 50, ratio: 1.8, max: 4 },

/* ---------------- §H GAME STATE ---------------- */

/* persistent currency */

/* meta-upgrade ownership (persisted) */
const metaOwned = {};
for (const m of META) metaOwned[m.id] = parseInt(store.get("meta." + m.id) || "0", 10) || 0;

}
function buyMeta(m) {

/* --- boon helpers --- */
function boonCount(id) { return G.boonStacks[id] || 0; }
function addBoon(id, rarityId) {
  const def = boonById(id);
  if (!def) return;
  const r = rarityById(rarityId);
  // value scaling: rarity multiplier rounded, at least +1
  const inc = Math.max(1, Math.round(r.mult));
  const cur = boonCount(id);
  G.boonStacks[id] = Math.min(def.max, cur + Math.min(inc, def.max - cur || 1));
  // immediate-effect boons
  if (id === "extralife") G.lives += (G.boonStacks[id] - cur);
  if (id === "shield") G.shieldsLeft += (G.boonStacks[id] - cur);
  audio.boon();
  spawnBurst(G.paddle.x, CONFIG.paddleY - 30, r.color, 30, 240, 0.9);
}
/* derived stat helpers (read across engine) */
function ballDamage() { return 1 + metaLevel("dmg") + boonCount("balldmg"); }

  return CONFIG.paddleW + metaLevel("wide") * 14 + boonCount("paddlew") * 18;
}
function scoreMult() { return 1 + boonCount("scoremul") * 0.20; }

/* ---------------- §H2 RUN FLOW: rarity / boons / nodes / shop ---------------- */
function rollRarity() {
  // luck meta shifts weights toward higher rarity
  const luck = metaLevel("luck");
  const weights = RARITY.map((r, i) => Math.max(0.5, r.weight + (i > 0 ? luck * (i * 2.5) : -luck * 4)));
  let total = 0; for (const w of weights) total += w;
  let x = Math.random() * total;
  for (let i = 0; i < RARITY.length; i++) { x -= weights[i]; if (x <= 0) return RARITY[i]; }
  return RARITY[0];
}
function generateBoonChoices(count) {
  // candidate boons not yet maxed
  const pool = BOONS.filter(b => boonCount(b.id) < b.max);
  const src = pool.length ? pool.slice() : BOONS.slice();
  const out = [];
  for (let i = 0; i < count && src.length; i++) {
    const idx = Math.floor(Math.random() * src.length);
    const def = src.splice(idx, 1)[0];
    const r = rollRarity();
    out.push({ boon: def, rarity: r });
  }
  return out;
}
function offerBoons() {
  G.boonChoices = generateBoonChoices(3);
  G.menuIndex = 0;
  G.state = "boon";
  G.stateT = 0;
}
function chooseBoon(i) {
  const c = G.boonChoices[i];

  addBoon(c.boon.id, c.rarity.id);
  afterReward();
}
/* after a reward screen, present node choices (or end-of-run loop) */
function afterReward() {
  G.depth++;
  generateNodes();
  G.state = "nodes";
  G.stateT = 0;
  G.menuIndex = 0;
}
/* branching node generation: 2-3 options previewing kind + modifier + reward */
const NODE_KINDS = [
  { kind: "combat",   label: "战斗 Combat",   color: "#4de8ff", reward: "boon" },
  { kind: "elite",    label: "精英 Elite",    color: "#ff5e8a", reward: "boon", mod: "armored" },
  { kind: "hazard",   label: "危险 Hazard",   color: "#ff9d4d", reward: "boon", mod: "moving" },
  { kind: "treasure", label: "宝藏 Treasure", color: "#ffe14d", reward: "treasure" },
  { kind: "shop",     label: "商店 Shop",     color: "#5dff7e", reward: "shop" },
];
function generateNodes() {
  // boss at depth milestones
  if (G.depth % CONFIG.bossDepths === 0) {
    G.nodeChoices = [{ kind: "boss", label: "首领 BOSS", color: "#d06bff", reward: "boon", mod: null }];
    return;
  }
  const n = 2 + (Math.random() < 0.6 ? 1 : 0);
  const choices = [];
  const used = {};
  // always offer at least one plain combat
  choices.push(Object.assign({}, NODE_KINDS[0]));
  used.combat = true;
  while (choices.length < n) {
    const pick = NODE_KINDS[Math.floor(Math.random() * NODE_KINDS.length)];
    if (used[pick.kind] && pick.kind !== "combat") continue;
    used[pick.kind] = true;
    choices.push(Object.assign({}, pick));
  }
  G.nodeChoices = choices;
}
function chooseNode(i) {
  const node = G.nodeChoices[i];
  if (!node) return;
  G.nodeKind = node.kind;
  G.stageMod = node.mod || null;
  G.pendingReward = node.reward;
  G.runPath.push(node.kind);
  if (node.reward === "shop") { openShop(); return; }
  if (node.reward === "treasure") {
    // treasure: immediate currency + a boon
    const bonus = 30 + G.depth * 6;
    G.runCurrency += bonus; G.currency += bonus; store.set("currency", String(G.currency));
    flash("+" + bonus + " 金币 · gold");
    audio.coin();
    startStage();
    return;
  }
  startStage();
}
/* shop node (mid-run): spend currency on instant effects */
function openShop() {
  const disc = 1 - metaLevel("discount") * 0.10;
  const dep = G.depth;
  G.shopItems = [
    { id: "heal", name: "+1 命 · +1 life", cost: Math.round((25 + dep * 4) * disc),
      buy() { G.lives++; } },
    { id: "ball", name: "+1 起始球 · +1 ball (run)", cost: Math.round((40 + dep * 6) * disc),
      buy() { G.boonStacks.multiball = Math.min(boonById("multiball").max, boonCount("multiball") + 1); } },
    { id: "rndboon", name: "随机恩赐 · random boon", cost: Math.round((60 + dep * 8) * disc),
      buy() { const p = BOONS[Math.floor(rand(0, BOONS.length))]; addBoon(p.id, rollRarity().id); } },
    { id: "shield", name: "+1 护盾 · +1 floor shield", cost: Math.round((45 + dep * 5) * disc),
      buy() { G.shieldsLeft++; G.boonStacks.shield = boonCount("shield") + 1; } },
  ];
  G.menuIndex = 0;
  G.state = "shop";
  G.stateT = 0;
}
function buyShop(i) {
  const it = G.shopItems[i];
  if (!it || it.bought) { audio.deny(); return; }
  if (G.currency < it.cost) { audio.deny(); return; }
  G.currency -= it.cost;
  store.set("currency", String(G.currency));
  it.bought = true;
  it.buy();
  audio.purchase();
}
function leaveShop() {
  // after shopping, proceed into a combat stage at this depth
  G.nodeKind = "combat";
  G.stageMod = null;
  startStage();
}
/* award currency from a destroyed brick */
function earnCurrency(n) {
  const amt = Math.round(n * scoreMult());
  G.runCurrency += amt;
  G.currency += amt;
}

/* ---------------- §H3 BOSS ---------------- */
const BOSS_TYPES = [
  { id: "sentinel", name: "哨兵 SENTINEL", color: "#ff5e8a", hp: 40, attack: "drop" },
  { id: "weaver",   name: "织者 WEAVER",   color: "#d06bff", hp: 52, attack: "spread" },
];
function spawnBoss() {
  const loop = Math.floor((G.depth - 1) / (CONFIG.bossDepths)) ;
  const type = BOSS_TYPES[(Math.floor(G.depth / CONFIG.bossDepths) - 1) % BOSS_TYPES.length] || BOSS_TYPES[0];
  const hp = Math.round(type.hp * (1 + loop * 0.6));
  G.boss = {
    type, hpMax: hp, hp,
    x: CONFIG.W / 2, y: 150, w: 170, h: 54,
    vx: 70 + loop * 18,
    armorAngle: 0,            // shifting armor rotation
    coreExposed: false,
    fireCd: 2.0, phase: 0,
    flash: 0,
  };
  audio.bossWarn();
}
function bossCoreRect() {
  const b = G.boss;
  return { x: b.x - 26, y: b.y - 18, w: 52, h: 36 };
}
function hitBoss(px, py, dmg) {
  const b = G.boss;
  if (!b) return false;
  if (!b.coreExposed) { audio.wall(); spawnBurst(px, py, "#9fb4d6", 5, 120, 0.3); return true; }
  b.hp -= dmg;
  b.flash = 1;
  audio.bossHit();
  spawnBurst(px, py, b.type.color, 10, 200, 0.5);
  G.shake = Math.min(10, G.shake + 3);
  addScore(Math.round(40 * scoreMult()));
  earnCurrency(3);
  if (b.hp <= 0) defeatBoss();
  return true;
}
function defeatBoss() {
  const b = G.boss;
  audio.bossDie();
  spawnBurst(b.x, b.y, b.type.color, 80, 360, 1.4);
  G.shake = 14;
  const reward = 80 + G.depth * 10;
  G.runCurrency += reward; G.currency += reward; store.set("currency", String(G.currency));
  addScore(Math.round(600 * G.depth * scoreMult()));
  G.boss = null;
  G.hazards.length = 0;
}
function updateBoss(dt) {
  const b = G.boss;
  if (!b) return;
  b.flash = Math.max(0, b.flash - dt * 3);
  // move side to side
  b.x += b.vx * dt;
  if (b.x < b.w / 2 + 10) { b.x = b.w / 2 + 10; b.vx = Math.abs(b.vx); }
  if (b.x > CONFIG.W - b.w / 2 - 10) { b.x = CONFIG.W - b.w / 2 - 10; b.vx = -Math.abs(b.vx); }
  // shifting armor: core exposed periodically
  b.armorAngle += dt * 1.4;
  b.coreExposed = Math.sin(b.armorAngle) > 0.3;
  // attacks
  b.fireCd -= dt;
  if (b.fireCd <= 0) {
    b.fireCd = Math.max(1.0, 2.4 - G.depth * 0.05);
    if (b.type.attack === "drop") {
      G.hazards.push({ x: b.x, y: b.y + b.h / 2, vx: 0, vy: CONFIG.hazardSpeed });
    } else {
      for (const a of [-0.4, 0, 0.4]) {
        G.hazards.push({ x: b.x, y: b.y + b.h / 2, vx: Math.sin(a) * 90, vy: CONFIG.hazardSpeed * 0.9 });
      }
    }
    audio.zap();
  }
  // ball/boss collisions
  for (const ball of G.balls) {
    if (Math.abs(ball.x - b.x) < b.w / 2 + CONFIG.ballR && Math.abs(ball.y - b.y) < b.h / 2 + CONFIG.ballR) {
      // bounce off boss body
      if (ball.y < b.y) { ball.vy = -Math.abs(ball.vy); ball.y = b.y - b.h / 2 - CONFIG.ballR; }
      else { ball.vy = Math.abs(ball.vy); ball.y = b.y + b.h / 2 + CONFIG.ballR; }
      hitBoss(ball.x, ball.y, ballDamage());
    }
  }
  // lasers vs boss
  for (let i = G.lasers.length - 1; i >= 0; i--) {
    const L = G.lasers[i];
    if (Math.abs(L.x - b.x) < b.w / 2 && Math.abs(L.y - b.y) < b.h / 2) {
      hitBoss(L.x, L.y, ballDamage());
      G.lasers.splice(i, 1);
    }
  }
}
function updateHazards(dt) {
  const C = CONFIG, p = G.paddle;
  for (let i = G.hazards.length - 1; i >= 0; i--) {
    const hz = G.hazards[i];
    hz.x += hz.vx * dt; hz.y += hz.vy * dt;
    if (hz.y > C.H + 20) { G.hazards.splice(i, 1); continue; }
    // hit paddle -> lose ball/life-ish: trigger a life loss like missing ball
    if (hz.y > C.paddleY - C.paddleH && hz.y < C.paddleY + 14 &&
        Math.abs(hz.x - p.x) < p.w / 2 + C.bossHazardR) {
      G.hazards.splice(i, 1);
      spawnBurst(hz.x, C.paddleY, "#ff5e8a", 16, 220, 0.6);
      loseLife("被击中 · HIT!");
      return;
    }
  }
}

/* ball pool to avoid per-serve allocation churn */
const ballPool = [];
function getBall() {
  const b = ballPool.pop() || { x: 0, y: 0, vx: 0, vy: 0, speed: 0, trail: [] };
  b.trail.length = 0;
  return b;
}
function freeBall(b) { if (ballPool.length < 32) ballPool.push(b); }
function makeBall(x, y, angle, speed) {
  const b = getBall();
  b.x = x; b.y = y;
  b.vx = Math.sin(angle) * speed; b.vy = -Math.cos(angle) * speed; b.speed = speed;
  return b;
}
function ballSpeed() {
  return Math.min(CONFIG.ballSpeedMax, CONFIG.ballSpeed0 + (G.depth - 1) * CONFIG.ballSpeedPerLevel);
}
function startingBallCount() {
  return 1 + metaLevel("ball") + boonCount("multiball");
}
function resetServe() {
  for (const b of G.balls) freeBall(b);
  G.balls = [makeBall(G.paddle.x, CONFIG.paddleY - ballRadius() - CONFIG.paddleH / 2 - 1, 0, ballSpeed())];
  G.serving = true;
  G.caught = null;
  G.combo = 0;
}
/* spawn the extra serve balls once launched (multiball boon / meta) */
function spawnServeBalls(base) {
  const extra = startingBallCount() - 1;
  const ang0 = Math.atan2(base.vx, -base.vy);
  for (let i = 0; i < extra && G.balls.length < CONFIG.maxBalls; i++) {
    const da = (i % 2 === 0 ? 1 : -1) * (0.28 + 0.12 * Math.floor(i / 2));
    G.balls.push(makeBall(base.x, base.y, ang0 + da, base.speed));
  }
}
function startStage() {
  G.level = G.depth;
  G.boss = null;
  G.hazards = [];
  const mod = G.stageMod;
  if (G.nodeKind === "boss") {
    spawnBoss();
    G.bricks = [];
  } else {
    G.bricks = buildStage(G.depth, mod);
  }
  G.powerups = [];
  G.lasers = [];
  G.wideT = 0; G.slowT = 0; G.laserT = 0;
  G.paddle.w = paddleBaseW();
  resetServe();
  G.state = "play";
  G.stateT = 0;
}
function startGame() {
  G.score = 0;
  G.depth = 1; G.level = 1;
  G.combo = 0; G.comboBest = 0; G.newHi = false;
  G.runCurrency = 0; G.bricksDestroyed = 0;
  G.boonStacks = {};
  G.runPath = [];
  G.stageMod = null;
  G.nodeKind = "combat";
  // meta-derived starting state
  G.lives = CONFIG.lives0 + metaLevel("life");
  G.revivesLeft = metaLevel("revive");
  G.shieldsLeft = 0;
  // starting boons (meta)
  const sb = metaLevel("boon");
  for (let i = 0; i < sb; i++) {
    const pick = BOONS[Math.floor(rand(0, BOONS.length))];
    addBoon(pick.id, rollRarity().id);
  }
  startStage();
}
function enterHub() {
  G.state = "hub";
  G.stateT = 0;
  G.menuIndex = 0;
}
/* shared life-loss: shields absorb, then revive, then serve or end run */
function loseLife(msg) {
  G.combo = 0;
  if (G.shieldsLeft > 0) {
    G.shieldsLeft--;
    flash("护盾! · SHIELD!");
    audio.power();
    resetServe();
    return;
  }
  G.lives--;
  audio.lifeLost();
  G.shake = 10;
  if (G.lives <= 0) {
    if (G.revivesLeft > 0) {
      G.revivesLeft--;
      G.lives = 1;
      flash("复活! · REVIVE!");
      audio.power();
      resetServe();
      return;
    }
    endRun();
  } else {
    flash(msg || (G.lives === 1 ? "LAST LIFE!" : "LIFE LOST"));
    resetServe();
  }
}
function endRun() {
  // bank currency (already added live; just persist) and show summary
  store.set("currency", String(G.currency));
  G.state = "summary";
  G.stateT = 0;
  audio.gameOver();
}
function flash(msg) { G.flashMsg = msg; G.flashT = 1.6; }

function addScore(n) {
  G.score += n;
  if (G.score > G.hi) {
    G.hi = G.score;
    G.newHi = true;
    store.set("hi", String(G.hi));
  }
}

/* ---------------- §I INPUT ---------------- */
const keys = {};
let pointerActive = false;

/* current menu item count by state (for nav wrapping) */
function menuLen() {
  switch (G.state) {
    case "hub": return META.length + 1;          // +1 = "START RUN"
    case "boon": return G.boonChoices.length;
    case "nodes": return G.nodeChoices.length;
    case "shop": return G.shopItems.length + 1;   // +1 = "LEAVE"
    default: return 0;
  }
}
function navMenu(d) {
  const len = menuLen();
  if (len <= 0) return;
  G.menuIndex = (G.menuIndex + d + len) % len;
  audio.nav();
}
/* B / circle / Esc cancel within menus */
function cancelAction() {
  if (G.state === "hub") { G.state = "title"; G.stateT = 0; audio.nav(); return; }
  if (G.state === "shop") { audio.nav(); leaveShop(); return; }
}

/* confirm = A / cross / space / click / tap. Routes by state. */
function primaryAction() {
  audio.unlock();
  switch (G.state) {
    case "title": enterHub(); return;
    case "hub":
      if (G.menuIndex >= META.length) { startGame(); }
      else { buyMeta(META[G.menuIndex]); }
      return;
    case "summary":
      if (G.stateT > 0.6) enterHub();
      return;
    case "boon":
      chooseBoon(G.menuIndex); return;
    case "nodes":
      chooseNode(G.menuIndex); return;
    case "shop":
      if (G.menuIndex >= G.shopItems.length) leaveShop();
      else buyShop(G.menuIndex);
      return;
    case "play":
      if (G.paused) { G.paused = false; return; }
      if (G.caught) { releaseCaught(); return; }
      if (G.serving) launchBall();
      return;
  }
}
/* Start/Options button: starts run from title/hub, toggles pause in play */
function startAction() {
  audio.unlock();
  if (G.state === "title") { enterHub(); return; }
  if (G.state === "hub") { startGame(); return; }
  if (G.state === "play") { G.paused = !G.paused; return; }
  if (G.state === "summary" && G.stateT > 0.6) { enterHub(); return; }
}
function launchBall() {
  if (G.balls.length === 0) resetServe();
  G.serving = false;
  const b = G.balls[0];
  const a = rand(-0.35, 0.35);
  b.vx = Math.sin(a) * b.speed;
  b.vy = -Math.cos(a) * b.speed;
  spawnServeBalls(b);
  audio.paddle();
}
function releaseCaught() {
  const b = G.caught.ball;
  G.caught = null;
  const off = clamp((b.x - G.paddle.x) / (G.paddle.w / 2), -1, 1);
  const ang = off * CONFIG.maxBounceAngle;
  b.vx = Math.sin(ang) * b.speed;
  b.vy = -Math.cos(ang) * b.speed;
  audio.paddle();
}

window.addEventListener("keydown", (e) => {
  if (["ArrowLeft", "ArrowRight", " ", "ArrowUp", "ArrowDown"].includes(e.key)) e.preventDefault();
  const k = e.key.toLowerCase();
  keys[k] = true;
  if (e.repeat) return;
  audio.unlock();
  const inMenu = G.state === "hub" || G.state === "boon" || G.state === "nodes" || G.state === "shop";
  if (inMenu) {
    // menu navigation: arrows/WASD move highlight
    if (k === "arrowup" || k === "w" || k === "arrowleft" || k === "a") {
      navMenu(-1); return;
    }
    if (k === "arrowdown" || k === "s" || k === "arrowright" || k === "d") {
      navMenu(1); return;
    }
  }
  if (e.key === " " || e.key === "Enter") primaryAction();
  else if (e.key === "p" || e.key === "P") {
    if (G.state === "play") G.paused = !G.paused;
  } else if (e.key === "Escape") {
    if (G.state === "play") G.paused = !G.paused;
    else cancelAction();
  } else if (e.key === "Backspace") {
    cancelAction();
  } else if (e.key === "m" || e.key === "M") {
    audio.toggleMute();
    flash(audio.muted ? "MUTED" : "SOUND ON");
  }
});
window.addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });

function pointerMove(px) {
  if (G.state === "play" && !G.paused) {
    G.paddle.x = clamp(toWorldX(px), G.paddle.w / 2, CONFIG.W - G.paddle.w / 2);
  }
}
/* map a screen-space click to a menu item rectangle (set by render) */
function pointerSelect(px, py) {
  const wx = toWorldX(px), wy = (py - oy) / scale;
  for (let i = 0; i < menuRects.length; i++) {
    const r = menuRects[i];
    if (wx >= r.x && wx <= r.x + r.w && wy >= r.y && wy <= r.y + r.h) {
      G.menuIndex = r.idx;
      primaryAction();
      return true;
    }
  }
  return false;
}
/* menu hit-rectangles, refreshed each render of a menu state */
let menuRects = [];
const MENU_STATES = { hub: 1, boon: 1, nodes: 1, shop: 1 };
canvas.addEventListener("mousemove", (e) => pointerMove(e.clientX));
canvas.addEventListener("mousedown", (e) => {
  e.preventDefault();
  audio.unlock();
  if (MENU_STATES[G.state] && pointerSelect(e.clientX, e.clientY)) return;
  primaryAction();
});
canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  pointerActive = true;
  const t = e.changedTouches[0];
  audio.unlock();
  if (MENU_STATES[G.state] && pointerSelect(t.clientX, t.clientY)) return;
  pointerMove(t.clientX);
  primaryAction();
}, { passive: false });
canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();
  const t = e.changedTouches[0];
  pointerMove(t.clientX);
}, { passive: false });
canvas.addEventListener("touchend", (e) => { e.preventDefault(); pointerActive = false; }, { passive: false });

/* ---------------- §I2 GAMEPAD ---------------- */
/* Standard mapping: 0=A/cross, 1=B/circle, 9=Start/Options,
   12/13/14/15 = dpad up/down/left/right, axes[0] = left stick X.
   Edge-detected buttons fire on press; no per-frame allocations. */
const GP = {
  connected: false,
  index: -1,
  // previous pressed state for edge detection (fixed slots, no alloc)
  prevA: false, prevB: false, prevStart: false,
  prevUp: false, prevDown: false, prevLeft: false, prevRight: false,
  navRepeat: 0,            // d-pad/stick hold-to-repeat timer for menus
  stickX: 0,
};
let toastMsg = "", toastT = 0;
function toast(msg) { toastMsg = msg; toastT = 2.4; }

window.addEventListener("gamepadconnected", (e) => {
  GP.connected = true;
  GP.index = e.gamepad.index;
  toast("手柄已连接 — Gamepad connected");
});
window.addEventListener("gamepaddisconnected", (e) => {
  if (e.gamepad.index === GP.index) {
    GP.connected = false; GP.index = -1; GP.stickX = 0;
    toast("手柄已断开 — Gamepad disconnected");
  }
});

function pollGamepad(dt) {
  const pads = (typeof navigator !== "undefined" && navigator.getGamepads)
    ? navigator.getGamepads() : null;
  if (!pads) { GP.stickX = 0; return; }
  let pad = GP.index >= 0 ? pads[GP.index] : null;
  if (!pad) { for (let i = 0; i < pads.length; i++) { if (pads[i]) { pad = pads[i]; GP.index = i; GP.connected = true; break; } } }
  if (!pad) { GP.stickX = 0; return; }

  const btn = (i) => pad.buttons[i] && pad.buttons[i].pressed;
  const a = btn(0), b = btn(1), start = btn(9);
  const dUp = btn(12), dDown = btn(13), dLeft = btn(14), dRight = btn(15);

  // left stick X with deadzone; speed scales with tilt
  let ax = pad.axes && pad.axes.length > 0 ? pad.axes[0] : 0;
  if (Math.abs(ax) < CONFIG.stickDeadzone) ax = 0;
  GP.stickX = ax;

  const inMenu = G.state === "hub" || G.state === "boon" || G.state === "nodes" || G.state === "shop";

  // edge-detected confirm / cancel / start
  if (a && !GP.prevA) primaryAction();
  if (b && !GP.prevB) cancelAction();
  if (start && !GP.prevStart) startAction();

  // menu navigation: d-pad or stick, edge + slow repeat
  if (inMenu) {
    const navUp = dUp || dLeft || ax < -0.5;
    const navDown = dDown || dRight || ax > 0.5;
    const edgeUp = (dUp && !GP.prevUp) || (dLeft && !GP.prevLeft);
    const edgeDown = (dDown && !GP.prevDown) || (dRight && !GP.prevRight);
    if (edgeUp) { navMenu(-1); GP.navRepeat = 0.35; }
    else if (edgeDown) { navMenu(1); GP.navRepeat = 0.35; }
    else if (navUp || navDown) {
      GP.navRepeat -= dt;
      if (GP.navRepeat <= 0) { navMenu(navUp ? -1 : 1); GP.navRepeat = 0.18; }
    } else {
      GP.navRepeat = 0;
    }
  }

  GP.prevA = a; GP.prevB = b; GP.prevStart = start;
  GP.prevUp = dUp; GP.prevDown = dDown; GP.prevLeft = dLeft; GP.prevRight = dRight;
}

/* ---------------- §J POWER-UPS ---------------- */
const POWER_TYPES = [
  { id: "wide", label: "W", color: "#5dff7e", name: "WIDE PADDLE" },
  { id: "multi", label: "M", color: "#4de8ff", name: "MULTI-BALL" },
  { id: "slow", label: "S", color: "#d06bff", name: "SLOW-MO" },
  { id: "laser", label: "L", color: "#ff5e8a", name: "LASERS" },
];
function maybeDropPower(x, y) {
  if (Math.random() > CONFIG.powerChance) return;
  const t = POWER_TYPES[Math.floor(Math.random() * POWER_TYPES.length)];
  G.powerups.push({ x, y, type: t, rot: 0 });
}
function applyPower(t) {
  audio.power();
  flash(t.name);
  spawnBurst(G.paddle.x, CONFIG.paddleY, t.color, 26, 220, 0.7);
  if (t.id === "wide") {
    G.wideT = CONFIG.wideTime;
  } else if (t.id === "multi") {
    const cur = G.balls.slice();
    for (const b of cur) {
      if (G.balls.length >= CONFIG.maxBalls) break;
      const ang = Math.atan2(b.vx, -b.vy);
      for (const da of [-0.5, 0.5]) {
        if (G.balls.length >= CONFIG.maxBalls) break;
        G.balls.push(makeBall(b.x, b.y, ang + da, b.speed));
      }
    }
    G.serving = false;
  } else if (t.id === "slow") {
    G.slowT = CONFIG.slowTime;
  } else if (t.id === "laser") {
    G.laserT = CONFIG.laserTime;
    G.laserCd = 0;
  }
}

/* ---------------- §K BRICK / BALL PHYSICS ---------------- */
/* damage a brick by dmg points; px,py = impact point. Returns true if broken.
   cascade=false suppresses secondary AoE (prevents infinite recursion). */
function hitBrick(br, px, py, dmg, cascade) {
  dmg = dmg || 1;
  // crit chance
  let crit = false;
  if (critChance() > 0 && Math.random() < critChance()) { dmg *= 3; crit = true; }
  br.hp -= dmg;
  br.flash = 1;
  G.combo++;
  G.comboBest = Math.max(G.comboBest, G.combo);
  const mult = Math.min(G.combo, CONFIG.comboMax);
  audio.brick(G.combo, br.hp);
  if (br.hp <= 0) {
    addScore(Math.round((20 + 15 * (br.maxHp - 1)) * mult * scoreMult()));
    earnCurrency(1 + br.maxHp);
    G.bricksDestroyed++;
    spawnBurst(br.x + br.w / 2, br.y + br.h / 2, crit ? "#ffe14d" : br.color, 18 + br.maxHp * 6, 260, 0.8);
    G.shake = Math.min(8, G.shake + 2.2 + br.maxHp);
    maybeDropPower(br.x + br.w / 2, br.y + br.h / 2);
    const cx = br.x + br.w / 2, cy = br.y + br.h / 2, col = br.color;
    const i = G.bricks.indexOf(br);
    if (i >= 0) G.bricks.splice(i, 1);
    if (cascade !== false) {
      const er = explosiveRadius();
      if (er > 0) explodeAt(cx, cy, er, col);
      const cc = chainCount();
      if (cc > 0) chainLightning(cx, cy, cc, col);
    }
    return true;
  } else {
    addScore(Math.round(8 * mult * scoreMult()));
    spawnBurst(px, py, crit ? "#ffe14d" : br.color, 7, 160, 0.45);
    G.shake = Math.min(8, G.shake + 0.8);
    return false;
  }
}
/* explosive boon: damage all bricks within radius (no further cascade) */
function explodeAt(x, y, radius, color) {
  audio.explode();
  spawnBurst(x, y, color, 24, 300, 0.7);
  G.shake = Math.min(10, G.shake + 3);
  const r2 = radius * radius;
  for (let i = G.bricks.length - 1; i >= 0; i--) {
    const br = G.bricks[i];
    const bx = br.x + br.w / 2, by = br.y + br.h / 2;
    const dx = bx - x, dy = by - y;
    if (dx * dx + dy * dy <= r2) hitBrick(br, bx, by, 1, false);
  }
}
/* chain-lightning: arc to nearest n bricks, 1 dmg each (no cascade) */
function chainLightning(x, y, n, color) {
  audio.zap();
  let fx = x, fy = y;
  for (let k = 0; k < n; k++) {
    let best = null, bestD = Infinity;
    for (const br of G.bricks) {
      const bx = br.x + br.w / 2, by = br.y + br.h / 2;
      const d = (bx - fx) * (bx - fx) + (by - fy) * (by - fy);
      if (d < bestD) { bestD = d; best = br; }
    }
    if (!best) break;
    const bx = best.x + best.w / 2, by = best.y + best.h / 2;
    spawnBurst(bx, by, "#aef6ff", 5, 160, 0.3);
    // visual arc as short-lived particles along the line
    for (let t = 0; t <= 1; t += 0.2) {
      if (particles.length < CONFIG.maxParticles)
        particles.push({ x: lerp(fx, bx, t), y: lerp(fy, by, t), vx: 0, vy: 0, life: 0.18, t: 0, color: "#aef6ff", r: 2 });
    }
    hitBrick(best, bx, by, 1, false);
    fx = bx; fy = by;
  }
}

function collideBallBricks(b) {
  const r = ballRadius();
  const fire = boonCount("fireball") > 0;
  for (const br of G.bricks) {
    const nx = clamp(b.x, br.x, br.x + br.w);
    const ny = clamp(b.y, br.y, br.y + br.h);
    const dx = b.x - nx, dy = b.y - ny;
    if (dx * dx + dy * dy > r * r) continue;
    if (fire) {
      // fireball pierces: damage but do not reflect
      hitBrick(br, nx, ny, ballDamage());
      return false;
    }
    // resolve along the shallower axis
    const penX = r - Math.abs(dx), penY = r - Math.abs(dy);
    const inX = b.x > br.x && b.x < br.x + br.w;
    const inY = b.y > br.y && b.y < br.y + br.h;
    if (inX && !inY) {
      b.vy = -b.vy;
      b.y += (b.y < br.y + br.h / 2 ? -penY : penY);
    } else if (inY && !inX) {
      b.vx = -b.vx;
      b.x += (b.x < br.x + br.w / 2 ? -penX : penX);
    } else {
      // corner: reflect dominant component
      if (Math.abs(dx) > Math.abs(dy)) {
        b.vx = Math.abs(b.vx) * Math.sign(dx || 1);
      } else {
        b.vy = Math.abs(b.vy) * Math.sign(dy || 1);
      }
    }
    hitBrick(br, nx, ny, ballDamage());
    return true;
  }
  return false;
}

function updateBall(b, dt) {
  const C = CONFIG;
  const br = ballRadius();
  const sticky = boonCount("sticky") > 0;
  const bumpers = boonCount("bumpers") > 0;
  const hom = homingStr();
  // homing nudge toward nearest brick
  if (hom > 0 && G.bricks.length) {
    let best = null, bestD = Infinity;
    for (const k of G.bricks) {
      const d = (k.x - b.x) * (k.x - b.x) + (k.y - b.y) * (k.y - b.y);
      if (d < bestD) { bestD = d; best = k; }
    }
    if (best) {
      const ang = Math.atan2(best.y + best.h / 2 - b.y, best.x + best.w / 2 - b.x);
      b.vx += Math.cos(ang) * hom * dt;
      b.vy += Math.sin(ang) * hom * dt;
      const m = Math.hypot(b.vx, b.vy) || 1;
      b.vx = b.vx / m * b.speed; b.vy = b.vy / m * b.speed;
    }
  }
  // substep so fast balls never tunnel through bricks
  const steps = Math.max(1, Math.ceil((Math.hypot(b.vx, b.vy) * dt) / br));
  for (let s = 0; s < steps; s++) {
    b.x += b.vx * dt / steps;
    b.y += b.vy * dt / steps;
    // walls
    if (b.x < br) { b.x = br; b.vx = Math.abs(b.vx); audio.wall(); }
    else if (b.x > C.W - br) { b.x = C.W - br; b.vx = -Math.abs(b.vx); audio.wall(); }
    if (b.y < br) { b.y = br; b.vy = Math.abs(b.vy); audio.wall(); }
    // side-wall bumpers: nudge ball upward on wall hits
    if (bumpers && (b.x <= br + 1 || b.x >= C.W - br - 1) && b.vy > 0) {
      b.vy = -Math.abs(b.vy) * 0.6 - 60;
      const m = Math.hypot(b.vx, b.vy) || 1;
      b.vx = b.vx / m * b.speed; b.vy = b.vy / m * b.speed;
    }
    // paddle
    const p = G.paddle;
    const pTop = C.paddleY - C.paddleH / 2;
    if (b.vy > 0 && b.y + br >= pTop && b.y - br < C.paddleY + C.paddleH &&
        b.x > p.x - p.w / 2 - br && b.x < p.x + p.w / 2 + br) {
      b.y = pTop - br;
      if (sticky && !G.caught && !G.serving) {
        // catch ball; player re-aims and releases
        G.caught = { ball: b };
        b.vx = 0; b.vy = 0;
        G.combo = 0;
        p.glow = 1;
        audio.paddle();
        return;
      }
      const off = clamp((b.x - p.x) / (p.w / 2), -1, 1);
      const ang = off * C.maxBounceAngle;          // angle control by hit position
      b.speed = Math.min(C.ballSpeedMax, b.speed * C.paddleSpeedup);
      b.vx = Math.sin(ang) * b.speed;
      b.vy = -Math.cos(ang) * b.speed;
      G.combo = 0;                                  // combo resets on paddle touch
      p.glow = 1;
      audio.paddle();
      spawnBurst(b.x, pTop, "#7ef3ff", 6, 130, 0.35);
    }
    if (collideBallBricks(b)) {
      // keep speed magnitude exact after reflection
      const m = Math.hypot(b.vx, b.vy) || 1;
      b.vx = b.vx / m * b.speed;
      b.vy = b.vy / m * b.speed;
    }
  }
  // trail
  b.trail.push({ x: b.x, y: b.y });
  if (b.trail.length > 10) b.trail.shift();
}

/* slow-mo boon: time scale dips when ball is near paddle */
function slowmoScale() {
  if (boonCount("slowmo") <= 0) return 1;
  let near = false;
  for (const b of G.balls) { if (b.y > CONFIG.H * 0.7 && b.vy > 0) { near = true; break; } }
  return near ? 0.55 : 1;
}

/* ---------------- §L UPDATE ---------------- */
function update(dt) {
  G.stateT += dt;
  if (toastT > 0) toastT -= dt;
  updateStars(dt);
  if (G.flashT > 0) G.flashT -= dt;
  G.shake = Math.max(0, G.shake - dt * 18);
  updateParticles(dt);

  // gamepad poll every frame, regardless of state (menus need it)
  pollGamepad(dt);

  if (G.state !== "play" || G.paused) return;

  const ts = (G.slowT > 0 ? CONFIG.slowFactor : 1) * slowmoScale();
  const gdt = dt * ts;

  // power timers (temp pickups still exist alongside boons)
  G.wideT = Math.max(0, G.wideT - dt);
  G.slowT = Math.max(0, G.slowT - dt);
  G.laserT = Math.max(0, G.laserT - dt);
  const targetW = (G.wideT > 0 ? CONFIG.paddleWideW : paddleBaseW());
  G.paddle.w = lerp(G.paddle.w, targetW, Math.min(1, dt * 10));
  G.paddle.glow = Math.max(0, G.paddle.glow - dt * 4);

  // keyboard paddle
  const prevX = G.paddle.x;
  let dir = 0;
  if (keys["arrowleft"]) dir -= 1;
  if (keys["arrowright"]) dir += 1;
  // A/D only count for paddle when not used as menu nav (we're in play)
  if (keys["a"]) dir -= 1;
  if (keys["d"]) dir += 1;
  if (dir !== 0) {
    G.paddle.x = clamp(G.paddle.x + Math.sign(dir) * CONFIG.paddleSpeed * dt,
      G.paddle.w / 2, CONFIG.W - G.paddle.w / 2);
  }
  // gamepad: stick (analog, speed scales with tilt) + d-pad
  if (GP.stickX !== 0) {
    G.paddle.x = clamp(G.paddle.x + GP.stickX * CONFIG.gamepadSpeed * dt,
      G.paddle.w / 2, CONFIG.W - G.paddle.w / 2);
  }
  if (GP.prevLeft) G.paddle.x = clamp(G.paddle.x - CONFIG.gamepadSpeed * dt, G.paddle.w / 2, CONFIG.W - G.paddle.w / 2);
  if (GP.prevRight) G.paddle.x = clamp(G.paddle.x + CONFIG.gamepadSpeed * dt, G.paddle.w / 2, CONFIG.W - G.paddle.w / 2);
  G.paddle.vx = (G.paddle.x - prevX) / Math.max(dt, 1e-4);

  // lasers (temp pickup OR laser boon both enable; boon adds rate)
  const laserActive = G.laserT > 0 || boonCount("laser") > 0;
  if (laserActive) {
    G.laserCd -= dt;
    if (G.laserCd <= 0) {
      G.laserCd = CONFIG.laserRate / (1 + boonCount("laser") * 0.4);
      const p = G.paddle;
      G.lasers.push({ x: p.x - p.w / 2 + 6, y: CONFIG.paddleY - 10 });
      G.lasers.push({ x: p.x + p.w / 2 - 6, y: CONFIG.paddleY - 10 });
      audio.laser();
    }
  }
  for (let i = G.lasers.length - 1; i >= 0; i--) {
    const L = G.lasers[i];
    L.y -= CONFIG.laserSpeed * gdt;
    if (L.y < -20) { G.lasers.splice(i, 1); continue; }
    let hit = false;
    for (const br of G.bricks) {
      if (L.x > br.x && L.x < br.x + br.w && L.y > br.y && L.y < br.y + br.h) {
        hitBrick(br, L.x, L.y, ballDamage());
        hit = true;
        break;
      }
    }
    if (hit) G.lasers.splice(i, 1);
  }

  // drifting bricks (moving modifier)
  for (const br of G.bricks) {
    if (br.drift) {
      br.driftPhase += dt;
      br.x = br.driftBase + Math.sin(br.driftPhase * 1.2) * 26;
    }
  }

  // boss + hazards
  if (G.boss) { updateBoss(gdt); }
  if (G.hazards.length) updateHazards(gdt);

  // sticky-caught ball follows paddle
  if (G.caught) {
    G.caught.ball.x = G.paddle.x;
    G.caught.ball.y = CONFIG.paddleY - CONFIG.paddleH / 2 - ballRadius() - 1;
  }

  // balls
  if (G.serving) {
    if (G.balls.length === 0) resetServe();   // defensive: never serve with no ball
    const b = G.balls[0];
    b.x = G.paddle.x;
    b.y = CONFIG.paddleY - CONFIG.paddleH / 2 - ballRadius() - 1;
  } else {
    for (let i = G.balls.length - 1; i >= 0; i--) {
      const b = G.balls[i];
      if (G.caught && G.caught.ball === b) continue;
      updateBall(b, gdt);
      if (b.y > CONFIG.H + 30) {
        spawnBurst(b.x, CONFIG.H - 10, "#ff5e8a", 14, 200, 0.6);
        G.balls.splice(i, 1);
        freeBall(b);
      }
    }
    if (G.balls.length === 0) {
      loseLife();
      return;
    }
  }

  // powerup capsules
  for (let i = G.powerups.length - 1; i >= 0; i--) {
    const pu = G.powerups[i];
    pu.y += CONFIG.powerFall * gdt;
    pu.rot += dt * 3;
    const p = G.paddle;
    if (pu.y > CONFIG.paddleY - CONFIG.paddleH && pu.y < CONFIG.paddleY + 26 &&
        Math.abs(pu.x - p.x) < p.w / 2 + CONFIG.powerW / 2) {
      applyPower(pu.type);
      G.powerups.splice(i, 1);
    } else if (pu.y > CONFIG.H + 20) {
      G.powerups.splice(i, 1);
    }
  }

  // stage clear -> reward then node choices
  const cleared = G.boss ? false : (G.bricks.length === 0);
  if (cleared || (G.nodeKind === "boss" && !G.boss && G.stateT > 0.1)) {
    onStageClear();
  }
}

function onStageClear() {
  addScore(Math.round(250 * G.depth * scoreMult()));
  audio.levelClear();
  spawnBurst(CONFIG.W / 2, CONFIG.H / 2, "#7ef3ff", 60, 320, 1.2);
  // reward type set when the node was chosen
  if (G.pendingReward === "boon" || G.pendingReward == null || G.nodeKind === "boss") {
    offerBoons();
  } else {
    afterReward();
  }
}

/* ---------------- §M RENDER ---------------- */
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawBricks() {
  for (const br of G.bricks) {
    const frac = br.hp / br.maxHp;
    const bright = 0.35 + 0.65 * frac;             // brightness shows HP
    br.flash = Math.max(0, br.flash - 0.06);
    ctx.shadowColor = br.color;
    ctx.shadowBlur = 14 * bright + br.flash * 16;
    ctx.globalAlpha = bright + br.flash * (1 - bright);
    ctx.fillStyle = br.color;
    roundRect(br.x, br.y, br.w, br.h, 4);
    ctx.fill();
    // inner crystal facet
    ctx.globalAlpha = 0.35 * bright + br.flash * 0.6;
    ctx.fillStyle = "#ffffff";
    roundRect(br.x + 4, br.y + 3, br.w - 8, br.h / 2 - 3, 3);
    ctx.fill();
    // cracks for damaged bricks
    if (br.hp < br.maxHp) {
      ctx.globalAlpha = 0.65;
      ctx.strokeStyle = "#050514";
      ctx.lineWidth = 1.4;
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.moveTo(br.x + br.w * 0.3, br.y + 2);
      ctx.lineTo(br.x + br.w * 0.45, br.y + br.h * 0.55);
      ctx.lineTo(br.x + br.w * 0.32, br.y + br.h - 2);
      if (br.maxHp - br.hp > 1) {
        ctx.moveTo(br.x + br.w * 0.72, br.y + 2);
        ctx.lineTo(br.x + br.w * 0.6, br.y + br.h * 0.5);
        ctx.lineTo(br.x + br.w * 0.75, br.y + br.h - 2);
      }
      ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

function drawPaddle() {
  const p = G.paddle, C = CONFIG;
  const x = p.x - p.w / 2, y = C.paddleY - C.paddleH / 2;
  const laser = G.laserT > 0 || boonCount("laser") > 0;
  const sticky = boonCount("sticky") > 0;
  ctx.shadowColor = sticky ? "#ffe14d" : "#7ef3ff";
  ctx.shadowBlur = 16 + p.glow * 18;

  roundRect(x, y, p.w, C.paddleH, 7);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = "rgba(255,255,255,0.5)";
  roundRect(x + 5, y + 2.5, p.w - 10, 4, 2);
  ctx.fill();
  if (laser) {
    ctx.fillStyle = "#ffffff";
    ctx.shadowColor = "#ff5e8a"; ctx.shadowBlur = 10;
    ctx.fillRect(x + 3, y - 5, 5, 6);
    ctx.fillRect(x + p.w - 8, y - 5, 5, 6);
    ctx.shadowBlur = 0;

function drawBalls() {
  const R = ballRadius();
  const fire = boonCount("fireball") > 0;
  const col = fire ? "#ff9d4d" : "#aef6ff";
  for (const b of G.balls) {
    // trail
    for (let i = 0; i < b.trail.length; i++) {
      const t = b.trail[i], a = (i / b.trail.length) * 0.35;
      ctx.globalAlpha = a;
      ctx.fillStyle = col;
      ctx.beginPath();
      ctx.arc(t.x, t.y, R * (i / b.trail.length), 0, TAU);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.shadowColor = col;
    ctx.shadowBlur = fire ? 24 : 18;
    ctx.fillStyle = fire ? "#fff0d8" : "#ffffff";
    ctx.beginPath();
    ctx.arc(b.x, b.y, R, 0, TAU);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

function drawBoss() {
  const b = G.boss;
  if (!b) return;
  // body
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.shadowColor = b.type.color;
  ctx.shadowBlur = 22 + b.flash * 18;
  ctx.fillStyle = b.flash > 0 ? "#ffffff" : b.type.color;
  roundRect(-b.w / 2, -b.h / 2, b.w, b.h, 12);
  ctx.fill();
  // shifting armor plates
  ctx.shadowBlur = 0;
  ctx.fillStyle = "rgba(20,20,40,0.85)";
  const open = b.coreExposed;
  const gap = open ? 30 : 6;
  roundRect(-b.w / 2 + 6, -b.h / 2 + 6, b.w / 2 - gap, b.h - 12, 6); ctx.fill();
  roundRect(gap, -b.h / 2 + 6, b.w / 2 - gap, b.h - 12, 6); ctx.fill();

  const cr = bossCoreRect();
  ctx.translate(-b.x, -b.y);
  ctx.shadowColor = open ? "#ffe14d" : "#444";
  ctx.shadowBlur = open ? 20 : 4;
  ctx.fillStyle = open ? "#ffe14d" : "#5a5a70";
  roundRect(cr.x, cr.y, cr.w, cr.h, 8); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  // HP bar
  const C = CONFIG;
  const bw = C.W - 80, bx = 40, by = 64;
  ctx.fillStyle = "rgba(0,0,0,0.5)";
  ctx.fillRect(bx, by, bw, 8);

  ctx.fillRect(bx, by, bw * Math.max(0, b.hp / b.hpMax), 8);

    ["PAUSED", 40, "#7ef3ff", 0, 20],
    ["P / Esc / Start to resume", 15, "rgba(200,220,255,0.75)", 50, 4],
    [line, 12, "rgba(190,190,230,0.75)", 84, 4],
  ]);
}

/* small corner toast (gamepad connect/disconnect, etc.) */
function drawToast() {
  if (toastT <= 0) return;
  const C = CONFIG;
  ctx.globalAlpha = Math.min(1, toastT * 1.5);
  ctx.font = "bold 13px 'Courier New', monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  const w = ctx.measureText(toastMsg).width + 28;
  ctx.fillStyle = "rgba(10,10,30,0.85)";
  ctx.strokeStyle = "#7ef3ff"; ctx.lineWidth = 1.5;
  roundRect(C.W / 2 - w / 2, C.H - 60, w, 30, 8); ctx.fill(); ctx.stroke();
  ctx.fillStyle = "#7ef3ff"; ctx.shadowColor = "#7ef3ff"; ctx.shadowBlur = 8;
  ctx.fillText(toastMsg, C.W / 2, C.H - 45);
  ctx.shadowBlur = 0; ctx.globalAlpha = 1;
}

function render() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // background
  const grad = ctx.createLinearGradient(0, 0, 0, ch);
  grad.addColorStop(0, "#050514");
  grad.addColorStop(0.55, "#0a0a26");
  grad.addColorStop(1, "#10082a");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, cw, ch);
  drawStars();

  // playfield transform (+ screen shake)
  const sx = G.shake > 0.05 ? rand(-G.shake, G.shake) : 0;
  const sy = G.shake > 0.05 ? rand(-G.shake, G.shake) : 0;
  ctx.setTransform(dpr * scale, 0, 0, dpr * scale, dpr * (ox + sx * scale), dpr * (oy + sy * scale));

  // playfield bounds glow
  ctx.strokeStyle = "rgba(126,243,255,0.18)";
  ctx.lineWidth = 2;
  ctx.shadowColor = "#7ef3ff";
  ctx.shadowBlur = 10;
  ctx.strokeRect(1, 1, CONFIG.W - 2, CONFIG.H - 2);
  ctx.shadowBlur = 0;

  const showField = G.state === "play" || G.state === "summary" ||
    G.state === "boon" || G.state === "nodes" || G.state === "shop";
  if (showField) {
    drawBricks();
    if (G.boss) drawBoss();
    drawHazards();
    drawPowerups();
    drawLasers();
    drawPaddle();
    if (G.state === "play") drawBalls();
    drawParticles();
    drawHUD();
    if (G.state === "play" && !G.paused && (G.serving || G.caught)) {
      const pulse = 0.5 + 0.5 * Math.sin(G.stateT * 4);
      ctx.globalAlpha = pulse;
      const t = G.caught ? "瞄准后发射 — AIM & LAUNCH" : "点击/空格/A 发射 — TAP / SPACE / A TO LAUNCH";
      neonText(t, CONFIG.W / 2, CONFIG.H * 0.58, 15, "#ffe14d", 10);
      ctx.globalAlpha = 1;
    }
  } else {
    drawParticles();
  }

  if (G.state === "title") drawTitle();
  else if (G.state === "hub") drawHub();
  else if (G.state === "boon") drawBoonScreen();
  else if (G.state === "nodes") drawNodeScreen();
  else if (G.state === "shop") drawShop();
  else if (G.state === "summary") drawSummary();
  else if (G.paused) drawPause();

  drawToast();

  // arcade link visibility (title + hub + summary)
  const showLink = G.state === "title" || G.state === "hub" || G.state === "summary";
  if (arcadeLink.style.display !== (showLink ? "block" : "none")) {
    arcadeLink.style.display = showLink ? "block" : "none";
  }
}

/* ---------------- §N MAIN LOOP ---------------- */
let lastT = performance.now();
function frame(now) {
  let dt = (now - lastT) / 1000;
  lastT = now;
  if (dt > 0.05) dt = 0.05;   // clamp after tab-switch
  update(dt);
  render();
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// pause on tab hide
document.addEventListener("visibilitychange", () => {
  if (document.hidden && G.state === "play") G.paused = true;
});
</script>
</body>
