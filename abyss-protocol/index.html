  stats.weapon[curWeapon] = (stats.weapon[curWeapon] | 0) + 1;
  saveStats();
  rerollsLeft = Math.max(0, (meta.boon || 0) - 1);
  // lock in the HEAT contract for this run
  runHeat = Object.assign({}, heat);
  runHeatPts = heatTotal(runHeat);
  coreFrac = 0;
  player = newPlayer(); // fresh boons each run
  if (runHeat.lowhp) { // FRAGILE FRAME: -25% max HP
    player.maxHp = Math.max(20, Math.round(player.maxHp * 0.75));
    player.hp = player.maxHp;
  }
  if (runHeatPts > 0) toast("HEAT " + runHeatPts + " — 契约生效 · cores +" + runHeatPts * 25 + "%", "#ff7755");
  if (meta.boon > 0) {
    boonChoices = rollBoons();
    boonFromStart = true;
    state = "boon";
  } else {
    nextRoom();
  }
}

function openShop() { state = "shop"; audio.uiSnd(); }
function closeShop() { state = "hub"; audio.uiSnd(); }
function openStats() { state = "stats"; audio.uiSnd(); }
function closeStats() { state = "hub"; audio.uiSnd(); }
function openHeat() { state = "heat"; audio.uiSnd(); }
function closeHeat() { state = "hub"; audio.uiSnd(); }
function toggleHeat(i) {
  const m = HEAT_MODS[i];
  if (!m) return;
  heat[m.id] = ((heat[m.id] || 0) + 1) % (m.max + 1);
  saveHeat();
  audio.heatClunk();
}
function buyMeta(u) {
  const lv = meta[u.id] || 0;
  const c = metaCost(u, lv); // no level cap — geometric cost growth
  if (cores < c) { audio.deny(); toast("NOT ENOUGH CORES", "#ff5566"); return; }
  cores -= c;
  meta[u.id] = lv + 1;
  saveMeta();
  audio.buy();
  toast(u.name + " LV " + (lv + 1), "#ffcc44");
  // live-apply to hub player
  if (u.id === "hp") { player.maxHp += 15; player.hp += 15; }
  if (u.id === "dash" && meta.dash <= 4) { player.dashMax++; player.dashCharges++; }
}

/* ---------------- §O COLLISION ---------------- */
function collideArena(o) {
  const A = CONFIG, w = A.wall;
  if (o.x < w + o.r) { o.x = w + o.r; o.vx = Math.abs(o.vx) * 0.2; }
  if (o.x > A.arenaW - w - o.r) { o.x = A.arenaW - w - o.r; o.vx = -Math.abs(o.vx) * 0.2; }
  if (o.y < w + o.r) { o.y = w + o.r; o.vy = Math.abs(o.vy) * 0.2; }
  if (o.y > A.arenaH - w - o.r) { o.y = A.arenaH - w - o.r; o.vy = -Math.abs(o.vy) * 0.2; }
}
function collidePillars(o) {
  for (const p of pillars) {
    const d = dist(o.x, o.y, p.x, p.y), min = p.r + o.r;
    if (d < min && d > 0.001) {
      const nx = (o.x - p.x) / d, ny = (o.y - p.y) / d;
      o.x = p.x + nx * min; o.y = p.y + ny * min;
      const dot = o.vx * nx + o.vy * ny;
      if (dot < 0) { o.vx -= nx * dot; o.vy -= ny * dot; }
    }
  }
}
function pointInPillar(x, y, r) {
  for (const p of pillars) if (dist(x, y, p.x, p.y) < p.r + (r || 0)) return p;
  return null;
}

/* ---------------- §P UPDATE: PLAYER ---------------- */
function moveInput() {
  let mx = 0, my = 0;
  if (keys["w"] || keys["ArrowUp"]) my -= 1;
  if (keys["s"] || keys["ArrowDown"]) my += 1;
  if (keys["a"] || keys["ArrowLeft"]) mx -= 1;
  if (keys["d"] || keys["ArrowRight"]) mx += 1;
  if (joy.id !== -1) { mx += joy.dx; my += joy.dy; }
  const m = Math.hypot(mx, my);
  if (m > 1) { mx /= m; my /= m; }
  return { x: mx, y: my };
}

function trySlash() {
  const p = player;
  if ((shopRoom || roomType === "treasure") && state === "play") { // slash doubles as interact/take
    const pd = pedestalUnder();
    if (pd) { tryBuyPedestal(pd); return; }
  }
  if (p.slashCD > 0 || p.dashT > 0) return;
  if (!touchUI && mouseIdle()) kbAutoAim(); // keyboard-only: snap aim to nearest enemy
  const W = weaponDef();
  if (p.comboT <= 0) p.comboN = 0;
  p.comboN = p.comboN % 3 + 1;
  p.comboT = 1.5;
  const lunge = W.id === "lance" && p.comboN === 3; // lance: 3rd hit is a piercing lunge
  const maul = W.id === "maul";
  p.slashCD = CONFIG.meleeCD * W.cdMul;
  p.slashDur = CONFIG.slashDur * W.durMul;
  p.slashT = p.slashDur;
  p.slashSide *= -1;
  p.slashAng = p.aim;
  audio.slash(W.id);
  if (lunge) { // dash a short step forward along the thrust
    burst(p.x, p.y, W.col, 8, 150, 0.3, 2.5);
    p.x += Math.cos(p.slashAng) * 64;
    p.y += Math.sin(p.slashAng) * 64;
    collidePillars(p); collideArena(p);
    p.ifr = Math.max(p.ifr, 0.1);
    audio.dash();
  }
  // immediate hit detection — snappy
  const range = meleeRangeNow() * (lunge ? 1.15 : 1);
  const arc = lunge ? meleeArcNow() * 0.6 : meleeArcNow();
  const dmg = meleeDamage() * (lunge ? 1.3 : 1);
  const kb = maul ? 400 * (1 + 0.5 * boonPow("jugg")) : 260; // JUGGERNAUT: knockback +50%
  slashGhosts.push({ x: p.x, y: p.y, ang: p.slashAng, side: p.slashSide, arc, range, t: 0.32, tm: 0.32, col: W.col, lunge });
  if (slashGhosts.length > 10) slashGhosts.shift();
  let hitAny = false;
  for (const e of enemies) {
    if (e.hp <= 0) continue;
    const d = dist(p.x, p.y, e.x, e.y);
    if (d > range + e.r) continue;
    const a = angTo(p.x, p.y, e.x, e.y);
    if (Math.abs(angDiff(p.slashAng, a)) > arc / 2 + Math.atan2(e.r, Math.max(1, d))) continue;
    if (!lunge && shieldBlocks(e, p.x, p.y)) { // the lance lunge punches through shields
      // clang: blocked, but the impact knocks the shieldbearer back and exposes it
      e.kbx += Math.cos(a) * 340; e.kby += Math.sin(a) * 340;
      e.exposeT = 1.1;
      burst(e.x + Math.cos(e.shieldA) * (e.r + 6), e.y + Math.sin(e.shieldA) * (e.r + 6), "#88aaff", 8, 180, 0.3, 2.5);
      audio.clank();
      hitAny = true;
      continue;
    }
    // PHALANX: lance crits far more often at the tip of its reach
    let crit = critRoll();
    if (!crit && boonLv("phalanx") && d > range * 0.66) crit = Math.random() < 0.25 * boonPow("phalanx");
    hitEnemy(e, dmg, Math.cos(a) * kb, Math.sin(a) * kb, crit, true);
    if (maul && boonLv("jugg") && e.hp > 0) { // stunning slam (plain stun, no zap combos)
      e.shockT = Math.max(e.shockT || 0, e.type === "boss" ? 0.25 : 0.55);
    }
    if (lunge && boonLv("skewer") && e.hp > 0) { // SKEWER: drag pierced foes along
      e.kbx = (p.x - e.x) * 6; e.kby = (p.y - e.y) * 6;
    }
    if (boonLv("ignite")) applyBurn(e, 4 * boonPow("ignite") * dmgMul()); // IGNITION EDGE
    hitAny = true;
    // chain lightning
    const cl = boonLv("chain");
    if (cl) {
      let from = e, chained = 0;
      const hitIds = [e];
      const chFrac = Math.min(1.1, 0.5 + 0.1 * boonPow("chain")); // rarity-scaled chain damage
      while (chained < cl) {
        let tgt = null, bd = 170;
        for (const o of enemies) {
          if (o.hp <= 0 || hitIds.includes(o)) continue;
          const dd = dist(from.x, from.y, o.x, o.y);
          if (dd < bd) { bd = dd; tgt = o; }
        }
        if (!tgt) break;
        beams.push({ x1: from.x, y1: from.y, x2: tgt.x, y2: tgt.y, t: 0.18, col: "#8cc8ff" });
        sparkLine(from.x, from.y, tgt.x, tgt.y, "#8cc8ff", 8);
        hitEnemy(tgt, dmg * chFrac, 0, 0, false, false);
        hitIds.push(tgt);
        from = tgt; chained++;
      }
    }
  }
  // volatile barrels can be struck by melee
  for (const b of barrels) {
    if (b.dead || b.fuse >= 0) continue;
    const d = dist(p.x, p.y, b.x, b.y);
    if (d > range + b.r) continue;
    const a = angTo(p.x, p.y, b.x, b.y);
    if (Math.abs(angDiff(p.slashAng, a)) > arc / 2 + Math.atan2(b.r, Math.max(1, d))) continue;
    igniteBarrel(b, 0.06);
    hitAny = true;
  }
  if (maul) { // heavy slam: shockwave ring + AFTERSHOCK quake
    novas.push({ x: p.x, y: p.y, t: 0.35, tm: 0.35, maxR: range + 16, col: "#ff9966" });
    shake(4, 0.18);
    audio.maulSlam();
    if (boonLv("ashock")) {
      quakes.push({ x: p.x, y: p.y, r: range * 0.85, t: 1.4, tm: 1.4, tick: 0.25, dps: (5 + depth) * dmgMul() * boonPow("ashock") });
    }
  }
  if (hitAny) shake(2.5, 0.1);
}

function tryBolt() {
  const p = player;
  if (p.boltCD > 0) return;
  if (p.energy < CONFIG.boltCost) { return; }
  p.energy -= CONFIG.boltCost;
  p.boltCD = 0.26;
  if (touchUI && !mouseActive) {
    const near = nearestEnemy(p.x, p.y, 520);
    if (near) p.aim = angTo(p.x, p.y, near.x, near.y);
  } else if (mouseIdle()) {
    kbAutoAim(); // keyboard-only bolt: auto-aim
  }
  firePlayerBolt();
}

function tryFreeze() {
  const p = player;
  if (!p || p.hp <= 0 || p.freezeCD > 0) return;
  freezeBuf = 0;
  const cd = CONFIG.freezeCD * p.freezeCDMul * Math.max(0.3, Math.pow(0.75, boonPow("cryo")));
  p.freezeCD = cd; p.freezeCDMax = cd;
  novas.push({ x: p.x, y: p.y, t: 0.5, tm: 0.5, maxR: CONFIG.freezeR });
  audio.freezeCast();
  shake(3, 0.15);
  for (const e of enemies) {
    if (e.hp <= 0) continue;
    if (dist(p.x, p.y, e.x, e.y) < CONFIG.freezeR + e.r) {
      if ((e.shockT || 0) > 0) { shatterCombo(e); continue; }  // FREEZE + SHOCK = SHATTER
      if ((e.burnT || 0) > 0) { thermalSnap(e); continue; }    // BURN + FREEZE = THERMAL SNAP
      e.frozenT = e.type === "boss" ? CONFIG.freezeBossDur : CONFIG.freezeDur;
      e.vx = 0; e.vy = 0;
      burst(e.x, e.y, "#bfe8ff", 8, 130, 0.4, 2.5);
    }
  }
}

function tryDash() {
  const p = player;
  if (p.dashT > 0) return;
  if (p.dashCharges <= 0) return;
  const mv = moveInput();
  let dx = mv.x, dy = mv.y;
  if (Math.hypot(dx, dy) < 0.2) { dx = Math.cos(p.aim); dy = Math.sin(p.aim); }
  const m = Math.hypot(dx, dy);
  p.dashDX = dx / m; p.dashDY = dy / m;
  p.dashT = CONFIG.dashDur;
  p.ifr = Math.max(p.ifr, CONFIG.dashIfr);
  p.dashCharges--;
  if (p.dashCD <= 0) p.dashCD = CONFIG.dashCD;
  audio.dash();
  burst(p.x, p.y, "#5ee6ff", 10, 160, 0.35, 2.5);
}

let mouseActive = false;
canvas.addEventListener("mousemove", () => { mouseActive = true; });

function updatePlayer(dt) {
  const p = player;
  // aim (mouse aim only while the mouse is "recent" — keyboard auto-aim otherwise)
  if ((!touchUI || mouseActive) && !mouseIdle()) {
    p.aim = angTo(p.x, p.y, s2wX(mouse.x), s2wY(mouse.y));
  } else if (joy.id !== -1 && Math.hypot(joy.dx, joy.dy) > 0.25) {
    const near = nearestEnemy(p.x, p.y, 380);
    if (near) p.aim = angTo(p.x, p.y, near.x, near.y);
    else p.aim = Math.atan2(joy.dy, joy.dx);
  }
  // timers
  p.slashCD = Math.max(0, p.slashCD - dt);
  p.slashT = Math.max(0, p.slashT - dt);
  p.comboT = Math.max(0, p.comboT - dt);
  p.boltCD = Math.max(0, p.boltCD - dt);
  p.ifr = Math.max(0, p.ifr - dt);
  p.hurtT = Math.max(0, p.hurtT - dt);
  p.freezeCD = Math.max(0, p.freezeCD - dt);
  p.buyCD = Math.max(0, p.buyCD - dt);
  slashBuf = Math.max(0, slashBuf - dt);
  dashBuf = Math.max(0, dashBuf - dt);
  freezeBuf = Math.max(0, freezeBuf - dt);
  if (p.dashCharges < p.dashMax) {
    p.dashCD -= dt * dashRegenMul();
    if (p.dashCD <= 0) {
      p.dashCharges++;
      if (p.dashCharges < p.dashMax) p.dashCD = CONFIG.dashCD;
    }
  }
  // energy
  p.energy = Math.min(p.maxEnergy, p.energy + CONFIG.energyRegen * (1 + boonPow("over") * 0.4) * dt);

  // actions
  if (slashBuf > 0) { trySlash(); if (p.slashT > 0) slashBuf = 0; }
  if ((mouse.left || keys["j"]) && p.slashCD <= 0) trySlash();
  if ((mouse.right || keys["Shift"] || keys["ctrlRight"] || keys["e"] || boltHeld) && state === "play") tryBolt();
  if (boltHeld && state === "hub") tryBolt();
  if (freezeBuf > 0) tryFreeze();
  if (dashBuf > 0) { const had = p.dashT; tryDash(); if (p.dashT > 0 && !had) dashBuf = 0; }

  // movement
  const spd = CONFIG.playerSpeed * (1 + Math.min(0.55, boonPow("swift") * 0.12));
  if (p.dashT > 0) {
    p.dashT -= dt;
    p.vx = p.dashDX * CONFIG.dashSpeed;
    p.vy = p.dashDY * CONFIG.dashSpeed;
    p.trailT -= dt;
    if (p.trailT <= 0) {
      p.trailT = 0.016;
      p.trail.push({ x: p.x, y: p.y, t: 0.3, a: p.aim });
      if (boonLv("trail")) addZone(p.x, p.y);
      if (boonLv("sdash")) { // STATIC DASH: trail shocks nearby foes
        for (const e2 of enemies) {
          if (e2.hp > 0 && (e2.sdCD || 0) <= 0 && dist(p.x, p.y, e2.x, e2.y) < 60 + e2.r) {
            e2.sdCD = 1.4;
            applyShock(e2, 6 * boonPow("sdash") * dmgMul(), 1);
          }
        }
      }
    }
  } else {
    const mv = moveInput();
    const tx = mv.x * spd, ty = mv.y * spd;
    const acc = CONFIG.playerAccel * dt;
    p.vx += clamp(tx - p.vx, -acc, acc);
    p.vy += clamp(ty - p.vy, -acc, acc);
    if (Math.hypot(mv.x, mv.y) > 0.1) lastDir = { x: mv.x, y: mv.y };
  }
  p.x += p.vx * dt; p.y += p.vy * dt;
  collidePillars(p);
  collideArena(p);
  for (const tr of p.trail) tr.t -= dt;
  p.trail = p.trail.filter((tr) => tr.t > 0);

  // hub interactions
  if (state === "hub") {
    if (p.x > HUB.exitX - HUB.exitW / 2 && p.x < HUB.exitX + HUB.exitW / 2 && p.y < HUB.exitY + HUB.exitH + p.r) {
      startRun();
    }
  }
  // fountain rest stop: approach the spring to heal 30% (once)
  if (state === "play" && roomType === "fountain" && !fountainUsed &&
      dist(p.x, p.y, CONFIG.arenaW / 2, CONFIG.arenaH * 0.5) < 52) {
    fountainUsed = true;
    const h = Math.round(p.maxHp * 0.3);
    p.hp = Math.min(p.maxHp, p.hp + h);
    dnum(p.x, p.y - 20, "+" + h, "#66ffe0", true);
    burst(CONFIG.arenaW / 2, CONFIG.arenaH * 0.5, "#66ffe0", 30, 220, 0.8, 3);
    toast("SYSTEMS RESTORED +30%", "#66ffe0");
    audio.buy();
  }
  // doors
  if (state === "play" && roomClear) {
    for (const d of doors) {
      if (Math.abs(p.x - d.x) < d.w / 2 + p.r && p.y < d.y + d.h / 2 + p.r + 6) {
        enterDoor(d);
        break;
      }
    }
  }
  // pickups
  for (const pk of pickups) {
    const dd = dist(p.x, p.y, pk.x, pk.y);
    if (dd < 90) { // magnet
      const a = angTo(pk.x, pk.y, p.x, p.y);
      pk.vx += Math.cos(a) * 900 * dt; pk.vy += Math.sin(a) * 900 * dt;
    }
    if (dd < p.r + 10) {
      if (pk.kind === "core") {
        const g = coreGain(1);
        if (g > 0) { coreFloatN += g; if (coreFloatT <= 0) coreFloatT = 0.3; } // aggregated "+N ⬡" float
        audio.pickupSnd();
      }
      else { player.hp = Math.min(player.maxHp, player.hp + 8); dnum(p.x, p.y - 16, "+8", "#66ff99", false); audio.pickupSnd(); }
      pk.t = -1;
      burst(pk.x, pk.y, pk.kind === "core" ? "#ffcc44" : "#66ff99", 6, 120, 0.3, 2);
    }
  }
}

/* ---------------- §Q UPDATE: ENEMIES ---------------- */
function seekVec(e, tx, ty) {
  const a = angTo(e.x, e.y, tx, ty);
  return { x: Math.cos(a), y: Math.sin(a), a };
}

function enemyContact(e, dmg, dt) {
  e.contactCD = Math.max(0, e.contactCD - dt);
  if (e.contactCD > 0) return;
  if (dist(e.x, e.y, player.x, player.y) < e.r + player.r) {
    damagePlayer(dmg * eDmgMul() * (e.elite ? 1.35 : 1), angTo(e.x, e.y, player.x, player.y), e);
    e.contactCD = 0.5;
  }
}

function updateEnemy(e, dt) {
  e.flash = Math.max(0, e.flash - dt);
  e.spawnT = Math.max(0, e.spawnT - dt);
  if (e.spawnT > 0) return;
  if ((e.sdCD || 0) > 0) e.sdCD -= dt;
  if ((e.hazCD || 0) > 0) e.hazCD -= dt;
  // BURN: damage-over-time ticks (works alongside any state)
  if ((e.burnT || 0) > 0) {
    e.burnT -= dt;
    e.burnTick -= dt;
    if (e.burnTick <= 0) {
      e.burnTick = 0.5;
      statusDamage(e, e.burnDps * 0.5 * e.burnStacks, "#ff8844");
      if (Math.random() < 0.35) audio.burnCrackle();
      if (e.hp <= 0) return;
    }
    if (Math.random() < dt * 7) {
      addPart({ x: e.x + rand(-e.r, e.r), y: e.y + rand(-e.r, e.r), vx: rand(-15, 15), vy: -rand(30, 70), t: 0.45, tm: 0.45, col: Math.random() < 0.5 ? "#ff8844" : "#ffcc66", r: rand(1.5, 3), drag: 1 });
    }
    if (e.burnT <= 0) { e.burnStacks = 0; e.burnDps = 0; }
  }
  // SHOCK: brief stun — no movement, no attacks
  if ((e.shockT || 0) > 0) {
    e.shockT -= dt;
    e.vx *= Math.pow(0.001, dt); e.vy *= Math.pow(0.001, dt);
    e.x += e.vx * dt; e.y += e.vy * dt;
    if (Math.random() < dt * 12) {
      sparkLine(e.x + rand(-e.r, e.r), e.y + rand(-e.r, e.r), e.x + rand(-e.r, e.r), e.y + rand(-e.r, e.r), "#ffee55", 2);
    }
    collideArena(e);
    return;
  }
  // frozen: no movement, no attacks — cheap early-out
  if (e.frozenT > 0) {
    e.frozenT -= dt;
    e.kbx *= Math.pow(0.0001, dt); e.kby *= Math.pow(0.0001, dt);
    if (Math.random() < dt * 5) {
      addPart({ x: e.x + rand(-e.r, e.r), y: e.y + rand(-e.r, e.r), vx: 0, vy: 26, t: 0.4, tm: 0.4, col: "#bfe8ff", r: rand(1.5, 3), drag: 0 });
    }
    collideArena(e);
    return;
  }
  // knockback decay
  e.x += e.kbx * dt; e.y += e.kby * dt;
  e.kbx *= Math.pow(0.0001, dt); e.kby *= Math.pow(0.0001, dt);
  const p = player;
  const d = dist(e.x, e.y, p.x, p.y);

  if (e.type === "chaser") {
    e.cd = Math.max(0, e.cd - dt);
    if (e.state === "seek") {
      const v = seekVec(e, p.x, p.y);
      e.vx = v.x * e.speed; e.vy = v.y * e.speed;
      if (d < 150 && e.cd <= 0) { e.state = "wind"; e.t = 0.45; }
      enemyContact(e, 8, dt);
    } else if (e.state === "wind") {
      e.vx *= 0.85; e.vy *= 0.85;
      if (e.t > 0.15) { const v = seekVec(e, p.x, p.y); e.dirX = v.x; e.dirY = v.y; }
      e.t -= dt;
      if (e.t <= 0) {
        e.state = "lunge"; e.t = 0.3;
        e.vx = e.dirX * 460; e.vy = e.dirY * 460;
        audio.noise && audio.ok() && audio.noise(audio.ctx.currentTime, 0.12, 0.08, "bandpass", 1200, 400);
      }
    } else if (e.state === "lunge") {
      e.t -= dt;
      enemyContact(e, 13, dt);
      if (e.t <= 0) { e.state = "seek"; e.cd = rand(1.0, 1.6); e.vx *= 0.3; e.vy *= 0.3; }
    }
  } else if (e.type === "shooter") {
    e.cd = Math.max(0, e.cd - dt);
    if (e.state === "seek") {
      let mx = 0, my = 0;
      const v = seekVec(e, p.x, p.y);
      if (d < 190) { mx = -v.x; my = -v.y; }
      else if (d > 300) { mx = v.x; my = v.y; }
      else { mx = -v.y * e.strafe; my = v.x * e.strafe; if (Math.random() < dt * 0.5) e.strafe *= -1; }
      e.vx = lerp(e.vx, mx * e.speed, 6 * dt);
      e.vy = lerp(e.vy, my * e.speed, 6 * dt);
      if (e.cd <= 0 && d < 480) { e.state = "charge"; e.t = 0.6; }
    } else if (e.state === "charge") {
      e.vx *= 0.9; e.vy *= 0.9;
      e.t -= dt;
      if (e.t <= 0) {
        const a = angTo(e.x, e.y, p.x, p.y);
        fireEbolt(e.x, e.y, a, 270 + depth * 5, 10, "#cc66ff");
        if (depth >= 8) { fireEbolt(e.x, e.y, a + 0.25, 270, 10, "#cc66ff"); fireEbolt(e.x, e.y, a - 0.25, 270, 10, "#cc66ff"); }
        audio.bolt();
        e.state = "seek"; e.cd = rand(1.4, 2.2);
      }
    }
    enemyContact(e, 6, dt);
  } else if (e.type === "tank") {
    e.cd = Math.max(0, e.cd - dt);
    if (e.state === "seek") {
      const v = seekVec(e, p.x, p.y);
      e.vx = v.x * e.speed; e.vy = v.y * e.speed;
      if (d < 130 && e.cd <= 0) { e.state = "slam"; e.t = 0.85; }
      enemyContact(e, 10, dt);
    } else if (e.state === "slam") {
      e.vx = 0; e.vy = 0;
      e.t -= dt;
      if (e.t <= 0) {
        const R = 125;
        burst(e.x, e.y, "#ffaa33", 36, 360, 0.6, 4);
        shake(8, 0.35);
        audio.enemyDie(true);
        if (dist(e.x, e.y, p.x, p.y) < R + p.r) {
          damagePlayer(18 * eDmgMul(), angTo(e.x, e.y, p.x, p.y), e);
        }
        e.state = "seek"; e.cd = rand(2.0, 2.8);
      }
    }
  } else if (e.type === "swarmer") {
    e.phase += dt * 7;
    const v = seekVec(e, p.x, p.y);
    const wob = Math.sin(e.phase) * 0.7;
    e.vx = (v.x + -v.y * wob) * e.speed * 0.72;
    e.vy = (v.y + v.x * wob) * e.speed * 0.72;
    enemyContact(e, 6, dt);
  } else if (e.type === "bomber") {
    // scuttles at the player; close range arms a beeping fuse, then detonates (hurts everyone)
    if (e.state === "fuse") {
      const v = seekVec(e, p.x, p.y);
      e.vx = v.x * e.speed * 0.35; e.vy = v.y * e.speed * 0.35;
      e.t -= dt;
      if (!e.beeped && e.t < 0.45) { e.beeped = true; audio.bombBeep(); }
      if (e.t <= 0) { explodeBomber(e); return; }
    } else {
      e.phase += dt * 11;
      const v = seekVec(e, p.x, p.y);
      const wob = Math.sin(e.phase) * 0.5;
      e.vx = (v.x + -v.y * wob) * e.speed;
      e.vy = (v.y + v.x * wob) * e.speed;
      enemyContact(e, 6, dt);
      if (d < 95) { e.state = "fuse"; e.t = 1.0; e.beeped = false; audio.bombBeep(); }
    }
  } else if (e.type === "shield") {
    // shield faces the player but turns slowly — flank, freeze, shock or knock it back
    e.exposeT = Math.max(0, (e.exposeT || 0) - dt);
    const turn = 1.7 * dt;
    e.shieldA += clamp(angDiff(e.shieldA, angTo(e.x, e.y, p.x, p.y)), -turn, turn);
    const v = seekVec(e, p.x, p.y);
    const wantSpd = d > 60 ? 1 : 0.2;
    e.vx = lerp(e.vx, v.x * e.speed * wantSpd, 4 * dt);
    e.vy = lerp(e.vy, v.y * e.speed * wantSpd, 4 * dt);
    enemyContact(e, 9, dt);
  } else if (e.type === "medic") {
    // hovers behind others, beam-heals the most damaged ally
    let tgt = null, worst = 0.999;
    for (const o of enemies) {
      if (o === e || o.hp <= 0 || o.type === "medic") continue;
      const fr = o.hp / o.maxHp;
      if (fr < worst) { worst = fr; tgt = o; }
    }
    e.healTgt = null;
    let mx = 0, my = 0;
    if (tgt) {
      const away = angTo(p.x, p.y, tgt.x, tgt.y); // hide on the far side of the patient
      const wx = clamp(tgt.x + Math.cos(away) * 80, 40, CONFIG.arenaW - 40);
      const wy = clamp(tgt.y + Math.sin(away) * 80, 40, CONFIG.arenaH - 40);
      const v = seekVec(e, wx, wy);
      const dw = dist(e.x, e.y, wx, wy);
      mx = v.x * Math.min(1, dw / 60); my = v.y * Math.min(1, dw / 60);
      if (dist(e.x, e.y, tgt.x, tgt.y) < 230) {
        e.healTgt = tgt;
        e.cd -= dt;
        if (e.cd <= 0) {
          e.cd = 0.45;
          const h = Math.max(2, Math.round((4 + depth * 1.1)));
          tgt.hp = Math.min(tgt.maxHp, tgt.hp + h);
          dnum(tgt.x, tgt.y - tgt.r, "+" + h, "#66ffcc", false);
          burst(tgt.x, tgt.y, "#66ffcc", 3, 70, 0.3, 2);
        }
      }
    } else {
      const v = seekVec(e, p.x, p.y);
      mx = -v.x; my = -v.y; // nobody to heal: flee
    }
    if (d < 150) { const v = seekVec(e, p.x, p.y); mx -= v.x * 0.8; my -= v.y * 0.8; }
    e.vx = lerp(e.vx, mx * e.speed, 5 * dt);
    e.vy = lerp(e.vy, my * e.speed, 5 * dt);
    enemyContact(e, 4, dt);
  } else if (e.type === "phantom") {
    // cloaked stalker: shimmer drift -> decloak cue (0.5s) -> dash-strike -> visible recovery
    if (e.state === "cloak") {
      e.t += dt;
      const v = seekVec(e, p.x, p.y);
      const orbit = d > 200 ? 1 : 0.3;
      e.vx = lerp(e.vx, (v.x * orbit - v.y * 0.7 * e.strafe) * e.speed, 4 * dt);
      e.vy = lerp(e.vy, (v.y * orbit + v.x * 0.7 * e.strafe) * e.speed, 4 * dt);
      if (Math.random() < dt * 0.4) e.strafe *= -1;
      if (Math.random() < dt * 3) { // faint shimmer
        addPart({ x: e.x + rand(-e.r, e.r), y: e.y + rand(-e.r, e.r), vx: 0, vy: 0, t: 0.3, tm: 0.3, col: "rgba(187,153,255,0.4)", r: rand(1, 2), drag: 0 });
      }
      if (e.t > 1.4 && d < 240) {
        e.state = "reveal"; e.t = 0.5;
        audio.phantomCue();
        burst(e.x, e.y, e.col, 10, 120, 0.4, 2.5);
      }
    } else if (e.state === "reveal") {
      e.vx *= 0.85; e.vy *= 0.85;
      const v = seekVec(e, p.x, p.y); e.dirX = v.x; e.dirY = v.y;
      e.t -= dt;
      if (e.t <= 0) {
        e.state = "strike"; e.t = 0.32;
        e.vx = e.dirX * 540; e.vy = e.dirY * 540;
        audio.dash();
      }
    } else if (e.state === "strike") {
      e.t -= dt;
      enemyContact(e, 14, dt);
      if (e.t <= 0) { e.state = "recover"; e.t = 1.1; e.vx *= 0.2; e.vy *= 0.2; }
    } else { // recover (visible, vulnerable)
      e.t -= dt;
      e.vx *= 0.95; e.vy *= 0.95;
      if (e.t <= 0) { e.state = "cloak"; e.t = 0; }
    }
  } else if (e.type === "boss") {
    // BERSERK CORES heat contract: bosses enrage at 30% HP
    if (runHeat.enrage && !e.enraged && e.hp < e.maxHp * 0.3) {
      e.enraged = true;
      e.speed *= 1.3;
      toast("ENRAGED — 狂暴!", "#ff3366");
      audio.roar();
      burst(e.x, e.y, "#ff3366", 30, 300, 0.7, 4);
      shake(8, 0.4);
    }
    if (e.kind === "summoner") updateBossSummoner(e, dt, d);
    else if (e.kind === "artillery") updateBossArtillery(e, dt, d);
    else if (e.kind === "splitter") updateBossSplitter(e, dt, d);
    else updateBoss(e, dt, d);
  }

  // hazard awareness: drift off live/arming spike tiles (knockback can still shove them in)
  for (const h of hazards) {
    if (h.kind !== "spike") continue;
    if (spikeActive(h) || spikeWarning(h)) {
      const hdx = e.x - h.x, hdy = e.y - h.y;
      if (Math.abs(hdx) < h.s + e.r + 8 && Math.abs(hdy) < h.s + e.r + 8) {
        const dd = Math.max(8, Math.hypot(hdx, hdy));
        e.vx += hdx / dd * e.speed * 1.1;
        e.vy += hdy / dd * e.speed * 1.1;
      }
    }
  }

  e.x += e.vx * dt; e.y += e.vy * dt;
  if (!(e.type === "boss" && e.state === "dash")) collidePillars(e);
  collideArena(e);
  // separation
  for (const o of enemies) {
    if (o === e || o.hp <= 0) continue;
    const dd = dist(e.x, e.y, o.x, o.y), min = (e.r + o.r) * 0.8;
    if (dd < min && dd > 0.01) {
      const push = (min - dd) * 0.5;
      const a = angTo(o.x, o.y, e.x, e.y);
      e.x += Math.cos(a) * push; e.y += Math.sin(a) * push;
    }
  }
}

function updateBoss(e, dt, d) {
  e.rot += dt * (e.state === "radial" ? 6 : 1.2);
  const p = player;
  const phase2 = e.hp < e.maxHp * 0.5;
  const cdm = (e.hard ? 0.75 : 1) * (e.enraged ? 0.65 : 1); // hard variant / enrage: faster pattern cycling
  e.cd = Math.max(0, e.cd - dt);
  if (e.state === "move") {
    const v = seekVec(e, p.x, p.y);
    const want = d > 240 ? 1 : (d < 160 ? -0.6 : 0.2);
    e.vx = lerp(e.vx, v.x * e.speed * want, 3 * dt);
    e.vy = lerp(e.vy, v.y * e.speed * want, 3 * dt);
    if (e.cd <= 0) {
      e.atk = (e.atk + 1) % 3;
      e.sub = 0;
      if (e.atk === 0) { e.state = "radial"; e.t = 0.8; }
      else if (e.atk === 1) { e.state = "aim"; e.t = 0.7; }
      else { e.state = "summon"; e.t = 0.8; audio.roar(); }
    }
  } else if (e.state === "radial") {
    e.vx *= 0.92; e.vy *= 0.92;
    e.t -= dt;
    if (e.t <= 0) {
      const volleys = (phase2 ? 4 : 3) + (e.hard ? 1 : 0);
      const n = 16 + e.tier * 2 + (e.hard ? 4 : 0);
      const baseA = e.rot + e.sub * 0.13;
      for (let i = 0; i < n; i++) {
        fireEbolt(e.x, e.y, baseA + (i / n) * TAU, 165 + e.tier * 12, 10, "#ff3366", 7);
      }
      audio.bolt();
      shake(4, 0.15);
      e.sub++;
      if (e.sub >= volleys) { e.state = "move"; e.cd = (phase2 ? 1.5 : 2.2) * cdm; }
      else e.t = 0.42;
    }
  } else if (e.state === "aim") {
    e.vx *= 0.9; e.vy *= 0.9;
    if (e.t > 0.18) { const v = seekVec(e, p.x, p.y); e.dirX = v.x; e.dirY = v.y; }
    e.t -= dt;
    if (e.t <= 0) {
      e.state = "dash"; e.t = 0.6;
      e.vx = e.dirX * (520 + e.tier * 30); e.vy = e.dirY * (520 + e.tier * 30);
      audio.dash();
    }
  } else if (e.state === "dash") {
    e.t -= dt;
    enemyContact(e, 18, dt);
    addPart({ x: e.x + rand(-20, 20), y: e.y + rand(-20, 20), vx: 0, vy: 0, t: 0.3, tm: 0.3, col: "#ff3366", r: rand(2, 5), drag: 1 });
    const A = CONFIG;
    if (e.x < 70 || e.x > A.arenaW - 70 || e.y < 70 || e.y > A.arenaH - 70 || e.t <= 0) {
      e.state = "move"; e.cd = (phase2 ? 1.2 : 1.9) * cdm;
      e.vx *= 0.2; e.vy *= 0.2;
      shake(6, 0.25);
    }
  } else if (e.state === "summon") {
    e.vx *= 0.9; e.vy *= 0.9;
    e.t -= dt;
    if (e.t <= 0) {
      const n = phase2 ? 5 : 4;
      for (let i = 0; i < n; i++) {
        const a = (i / n) * TAU + e.rot;
        const x = clamp(e.x + Math.cos(a) * 110, 50, CONFIG.arenaW - 50);
        const y = clamp(e.y + Math.sin(a) * 110, 50, CONFIG.arenaH - 50);
        spawnQ.push({ type: Math.random() < 0.75 ? "swarmer" : "chaser", x, y, t: 0.8 });
      }
      // hard pairing: a radial burst alongside the summon
      if (e.hard) {
        for (let i = 0; i < 12; i++) fireEbolt(e.x, e.y, (i / 12) * TAU + e.rot, 170, 9, "#ff3366", 6);
      }
      e.state = "move"; e.cd = (phase2 ? 2.0 : 3.0) * cdm;
    }
  }
  enemyContact(e, 14, dt);
}

/* --- VOIDCALLER: teleports, spawns adds, radial bursts --- */
function updateBossSummoner(e, dt, d) {
  const p = player;
  const phase2 = e.hp < e.maxHp * 0.5;
  const cdm = (e.hard ? 0.75 : 1) * (phase2 ? 0.85 : 1) * (e.enraged ? 0.65 : 1);
  e.rot += dt * 2.2;
  e.cd = Math.max(0, e.cd - dt);
  if (e.state === "move") {
    const v = seekVec(e, p.x, p.y);
    const want = d > 330 ? 0.8 : (d < 230 ? -0.9 : 0.1);
    e.vx = lerp(e.vx, (v.x * want - v.y * 0.6 * e.strafe) * e.speed, 3 * dt);
    e.vy = lerp(e.vy, (v.y * want + v.x * 0.6 * e.strafe) * e.speed, 3 * dt);
    if (Math.random() < dt * 0.3) e.strafe *= -1;
    if (e.cd <= 0) {
      e.atk = (e.atk + 1) % 3;
      e.sub = 0;
      if (e.atk === 0) {
        e.state = "tele"; e.t = 0.55;
        let tx = 0, ty = 0, tries = 0;
        do {
          const a = rand(0, TAU), rr = rand(200, 340);
          tx = clamp(p.x + Math.cos(a) * rr, 70, CONFIG.arenaW - 70);
          ty = clamp(p.y + Math.sin(a) * rr, 70, CONFIG.arenaH - 70);
        } while (pointInPillar(tx, ty, e.r) && tries++ < 20);
        e.tx = tx; e.ty = ty;
      } else if (e.atk === 1) {
        e.state = "summon"; e.t = 0.9;
        audio.bossRoar("summoner");
      } else {
        e.state = "burst"; e.t = 0.7;
      }
    }
  } else if (e.state === "tele") {
    e.vx *= 0.85; e.vy *= 0.85;
    e.t -= dt;
    if (e.t <= 0) {
      burst(e.x, e.y, e.col, 18, 240, 0.5, 3);
      e.x = e.tx; e.y = e.ty;
      burst(e.x, e.y, e.col, 24, 260, 0.6, 3);
      audio.dash();
      const n = 8 + e.tier * 2 + (e.hard ? 4 : 0); // arrival burst (hard pairing: denser)
      const a0 = angTo(e.x, e.y, p.x, p.y);
      for (let i = 0; i < n; i++) fireEbolt(e.x, e.y, a0 + (i / n) * TAU, 185 + e.tier * 10, 9, e.col, 6);
      audio.bolt();
      e.state = "move"; e.cd = rand(1.3, 1.8) * cdm;
    }
  } else if (e.state === "summon") {
    e.vx *= 0.88; e.vy *= 0.88;
    e.t -= dt;
    if (e.t <= 0) {
      const n = (phase2 ? 4 : 3) + (e.hard ? 1 : 0);
      for (let i = 0; i < n; i++) {
        const a = (i / n) * TAU + e.rot;
        const x = clamp(e.x + Math.cos(a) * 120, 50, CONFIG.arenaW - 50);
        const y = clamp(e.y + Math.sin(a) * 120, 50, CONFIG.arenaH - 50);
        spawnQ.push({ type: Math.random() < 0.5 ? "swarmer" : (Math.random() < 0.6 ? "chaser" : "shooter"), x, y, t: 0.8 });
      }
      e.state = "move"; e.cd = rand(2.2, 3.0) * cdm;
    }
  } else if (e.state === "burst") {
    e.vx *= 0.9; e.vy *= 0.9;
    e.t -= dt;
    if (e.t <= 0) {
      const volleys = phase2 ? 3 : 2;
      const n = 12 + e.tier * 2;
      const baseA = e.rot * 3 + e.sub * 0.21;
      for (let i = 0; i < n; i++) fireEbolt(e.x, e.y, baseA + (i / n) * TAU, 170 + e.tier * 10, 10, e.col, 6);
      audio.bolt();
      shake(3, 0.12);
      e.sub++;
      if (e.sub >= volleys) { e.state = "move"; e.cd = rand(1.8, 2.4) * cdm; }
      else e.t = 0.4;
    }
  }
  enemyContact(e, 12, dt);
}

/* --- LANCE-7: long-range lance shots with laser-sight + mortar AoE circles --- */
function updateBossArtillery(e, dt, d) {
  const p = player;
  const phase2 = e.hp < e.maxHp * 0.5;
  const cdm = (e.hard ? 0.75 : 1) * (phase2 ? 0.85 : 1) * (e.enraged ? 0.65 : 1);
  e.rot += dt;
  e.cd = Math.max(0, e.cd - dt);
  if (e.state === "move") {
    const v = seekVec(e, p.x, p.y);
    const want = d < 330 ? -1 : (d > 470 ? 0.5 : 0);
    e.vx = lerp(e.vx, (v.x * want - v.y * 0.5 * e.strafe) * e.speed, 3 * dt);
    e.vy = lerp(e.vy, (v.y * want + v.x * 0.5 * e.strafe) * e.speed, 3 * dt);
    if (Math.random() < dt * 0.4) e.strafe *= -1;
    if (e.cd <= 0) {
      e.atk = (e.atk + 1) % 2;
      e.sub = 0;
      if (e.atk === 0) { e.state = "aim"; e.t = 0.95; }
      else { e.state = "mortar"; e.t = 0.6; }
    }
  } else if (e.state === "aim") {
    e.vx *= 0.85; e.vy *= 0.85;
    if (e.t > 0.28) { const v = seekVec(e, p.x, p.y); e.dirX = v.x; e.dirY = v.y; } // sight locks late
    e.t -= dt;
    if (e.t <= 0) {
      const a = Math.atan2(e.dirY, e.dirX);
      fireEbolt(e.x + e.dirX * e.r, e.y + e.dirY * e.r, a, 720 + e.tier * 30, 15, "#ffd0a0", 7);
      audio.bolt();
      shake(3, 0.1);
      e.sub++;
      const volleys = (phase2 ? 2 : 1) + (e.hard ? 1 : 0);
      if (e.sub >= volleys) { e.state = "move"; e.cd = rand(1.5, 2.1) * cdm; }
      else e.t = 0.5;
    }
  } else if (e.state === "mortar") {
    e.vx *= 0.85; e.vy *= 0.85;
    e.t -= dt;
    if (e.t <= 0) {
      const k = 3 + (phase2 ? 2 : 0) + (e.hard ? 1 : 0);
      for (let i = 0; i < k; i++) {
        const ox = i === 0 ? 0 : rand(-160, 160);
        const oy = i === 0 ? 0 : rand(-130, 130);
        const tt = 1.15 + i * 0.12;
        mortars.push({
          x: clamp(p.x + ox, 50, CONFIG.arenaW - 50),
          y: clamp(p.y + oy, 50, CONFIG.arenaH - 50),
          r: 68, t: tt, tm: tt, dmg: 16, col: e.col,
        });
      }
      audio.bolt();
      if (e.hard) { // hard pairing: a snap lance with the mortar call
        const a = angTo(e.x, e.y, p.x, p.y);
        fireEbolt(e.x, e.y, a, 700, 13, "#ffd0a0", 7);
      }
      e.state = "move"; e.cd = rand(2.0, 2.6) * cdm;
    }
  }
  enemyContact(e, 12, dt);
}

/* --- MITOSIS PRIME: big brute; splits at 50% HP, fragments split once more --- */
function updateBossSplitter(e, dt, d) {
  if (e.gen < 2 && e.hp <= e.maxHp * 0.5) { splitBoss(e); return; }
  const p = player;
  const cdm = (e.hard ? 0.75 : 1) * (e.enraged ? 0.65 : 1);
  e.rot += dt * 0.8;
  e.cd = Math.max(0, e.cd - dt);
  if (e.state === "move") {
    const v = seekVec(e, p.x, p.y);
    e.vx = lerp(e.vx, v.x * e.speed, 4 * dt);
    e.vy = lerp(e.vy, v.y * e.speed, 4 * dt);
    enemyContact(e, 12, dt);
    if (e.cd <= 0) {
      if (d < 150) { e.state = "slam"; e.t = 0.9; }
      else if (d < 460) { e.state = "wind"; e.t = 0.55; }
    }
  } else if (e.state === "wind") {
    e.vx *= 0.86; e.vy *= 0.86;
    if (e.t > 0.18) { const v = seekVec(e, p.x, p.y); e.dirX = v.x; e.dirY = v.y; }
    e.t -= dt;
    if (e.t <= 0) {
      e.state = "lunge"; e.t = 0.42;
      const spd = 480 + e.tier * 25;
      e.vx = e.dirX * spd; e.vy = e.dirY * spd;
      audio.dash();
    }
  } else if (e.state === "lunge") {
    e.t -= dt;
    enemyContact(e, 17, dt);
    if (e.t <= 0) { e.state = "move"; e.cd = rand(1.2, 1.8) * cdm; e.vx *= 0.25; e.vy *= 0.25; }
  } else if (e.state === "slam") {
    e.vx *= 0.85; e.vy *= 0.85;
    e.t -= dt;
    if (e.t <= 0) {
      const R = 95 + e.r;
      burst(e.x, e.y, e.col, 34, 360, 0.6, 4);
      shake(8, 0.35);
      audio.enemyDie(true);
      if (dist(e.x, e.y, p.x, p.y) < R + p.r) {
        damagePlayer(20 * eDmgMul(), angTo(e.x, e.y, p.x, p.y), e);
      }
      if (e.hard) { // hard pairing: slam shockwave ring
        for (let i = 0; i < 10; i++) fireEbolt(e.x, e.y, (i / 10) * TAU, 200, 9, e.col, 6);
      }
      e.state = "move"; e.cd = rand(1.6, 2.2) * cdm;
    }
  }
}

/* ---------------- §R UPDATE: WORLD ---------------- */
function step(dt) {
  timeNow += dt;
  // execution slow-mo decays in REAL time (the loop runs game time at 0.3x while active)
  if (slowmoT > 0) slowmoT = Math.max(0, slowmoT - dt / 0.3);
  stylePop = Math.max(0, stylePop - dt);
  // adaptive audio: combat intensity layer + low-HP heartbeat
  audio.updateDynamics(dt,
    state === "play" && !roomClear && (enemies.length > 0 || spawnQ.length > 0),
    !!(player && player.hp > 0 && player.hp < player.maxHp * 0.25));
  if (freezeT > 0) { freezeT -= dt; return; }
  shakeT = Math.max(0, shakeT - dt);
  if (shakeT <= 0) shakeA = 0;
  redFlash = Math.max(0, redFlash - dt * 1.6);
  roomFade = Math.max(0, roomFade - dt * 2.4);
  bossWarnT = Math.max(0, bossWarnT - dt);

  for (const t of toasts) t.t -= dt;
  toasts = toasts.filter((t) => t.t > 0);

  if (state !== "play" && state !== "hub") {
    updateParts(dt);
    return;
  }
  if (player && player.hp > 0) updatePlayer(dt);

  // style meter chain decay
  if (styleT > 0) {
    styleT -= dt;
    if (styleT <= 0) { styleN = 0; styleRank = -1; }
  }
  // aggregated core pickup float text
  if (coreFloatT > 0) {
    coreFloatT -= dt;
    if (coreFloatT <= 0 && coreFloatN > 0 && player) {
      dnum(player.x, player.y - 24, "+" + coreFloatN + " ⬡", "#ffcc44", false);
      coreFloatN = 0;
    }
  }

  // spawn queue
  for (const q of spawnQ) {
    q.t -= dt;
    if (q.t <= 0) spawnEnemy(q.type, q.x, q.y);
  }
  spawnQ = spawnQ.filter((q) => q.t > 0);

  // enemies
  for (const e of enemies) if (e.hp > 0) updateEnemy(e, dt);
  enemies = enemies.filter((e) => e.hp > 0);

  // environmental hazards (spikes / fences / barrels / quakes)
  updateHazards(dt);

  // challenge gauntlet countdown
  if (state === "play" && roomType === "challenge" && !roomClear && !challengeFailed) {
    const prevT = challengeT;
    challengeT -= dt;
    if (challengeT > 0 && challengeT <= 10 && Math.ceil(prevT) !== Math.ceil(challengeT)) audio.challengeTick();
    if (challengeT <= 0) {
      challengeFailed = true;
      toast("OUT OF TIME — 超时：普通奖励 — normal reward", "#ff7755");
      audio.deny();
    }
  }

  // waves / clear
  if (state === "play" && !roomClear && enemies.length === 0 && spawnQ.length === 0) {
    if (waveIdx < waves.length) {
      queueWave(waves[waveIdx]);
      waveIdx++;
      toast("WAVE " + (waveIdx) + " / " + waves.length, "#cc66ff");
    } else {
      roomClear = true;
      roomsCleared++;
      if (boonLv("wind")) {
        const h = Math.round(12 * boonPow("wind"));
        player.hp = Math.min(player.maxHp, player.hp + h);
        dnum(player.x, player.y - 20, "+" + h, "#66ff99", false);
      }
      if (roomType === "challenge") {
        // timed gauntlet payout: double cores if cleared inside the limit
        const base = 12 + depth * 3;
        const success = !challengeFailed;
        const got = coreGain(success ? base * 2 : base);
        saveMeta();
        if (success) {
          toast("CHALLENGE CLEAR — 双倍奖励 +" + got + " ◆", "#ffee55");
          audio.challengeWin();
          burst(player.x, player.y, "#ffee55", 26, 240, 0.7, 3);
        } else {
          toast("+" + got + " ◆", "#ffcc44");
        }
      }
      // style payout: best chain rank this room grants bonus cores
      if (styleBestRoom >= 0 && STYLE_RANKS[styleBestRoom].bonus > 0) {
        const sR = STYLE_RANKS[styleBestRoom];
        const got = coreGain(sR.bonus);
        if (got > 0) toast("STYLE " + sR.n + " — +" + got + " ◆", sR.col);
        saveMeta();
      }
      // lifetime stats: boss defeat tally
      if (roomType === "boss" && lastBossKind) {
        stats.boss[lastBossKind] = (stats.boss[lastBossKind] | 0) + 1;
      }
      saveStats();
      openDoors();
    }
  }

  // player bolts
  for (const b of pbolts) {
    b.x += b.vx * dt; b.y += b.vy * dt;
    b.t -= dt;
    addPart({ x: b.x, y: b.y, vx: 0, vy: 0, t: 0.15, tm: 0.15, col: "#ff66ee", r: 2, drag: 0 });
    const A = CONFIG;
    if (b.x < A.wall || b.x > A.arenaW - A.wall || b.y < A.wall || b.y > A.arenaH - A.wall) b.t = -1;
    if (pointInPillar(b.x, b.y, b.r)) { burst(b.x, b.y, "#ff66ee", 5, 100, 0.25, 2); b.t = -1; }
    if (b.t <= 0) continue;
    for (const bl of barrels) { // bolts detonate volatile barrels
      if (bl.dead || dist(b.x, b.y, bl.x, bl.y) >= b.r + bl.r) continue;
      igniteBarrel(bl, 0.05);
      if (b.pierce > 0) b.pierce--;
      else { b.t = -1; burst(b.x, b.y, "#ff66ee", 5, 120, 0.2, 2); }
      break;
    }
    if (b.t <= 0) continue;
    for (const e of enemies) {
      if (e.hp <= 0 || b.hitSet.includes(e)) continue;
      if (dist(b.x, b.y, e.x, e.y) < b.r + e.r) {
        if (shieldBlocks(e, b.x - b.vx * 0.02, b.y - b.vy * 0.02)) {
          // frontal energy shield eats the bolt
          burst(b.x, b.y, "#88aaff", 6, 140, 0.25, 2);
          audio.clank();
          b.t = -1;
          break;
        }
        const crit = critRoll();
        const a = Math.atan2(b.vy, b.vx);
        hitEnemy(e, boltDamage(), Math.cos(a) * 130, Math.sin(a) * 130, crit, false);
        if (crit && boonLv("volt")) applyShock(e, 7 * boonPow("volt") * dmgMul(), 1); // VOLT ROUNDS
        b.hitSet.push(e);
        if (b.pierce > 0) b.pierce--;
        else { b.t = -1; burst(b.x, b.y, "#ff66ee", 6, 140, 0.25, 2); break; }
      }
    }
  }
  pbolts = pbolts.filter((b) => b.t > 0);

  // enemy bolts
  for (const b of ebolts) {
    b.x += b.vx * dt; b.y += b.vy * dt;
    b.t -= dt;
    const A = CONFIG;
    if (b.x < A.wall || b.x > A.arenaW - A.wall || b.y < A.wall || b.y > A.arenaH - A.wall) b.t = -1;
    if (pointInPillar(b.x, b.y, b.r)) { burst(b.x, b.y, b.col, 4, 90, 0.2, 2); b.t = -1; }
    if (b.t > 0 && player.hp > 0 && dist(b.x, b.y, player.x, player.y) < b.r + player.r) {
      if (player.ifr <= 0 && player.hurtT <= 0) {
        damagePlayer(b.dmg, Math.atan2(b.vy, b.vx), null);
        b.t = -1;
      }
    }
  }
  ebolts = ebolts.filter((b) => b.t > 0);

  // burn zones
  for (const z of zones) {
    z.t -= dt; z.tick -= dt;
    if (z.tick <= 0) {
      z.tick = 0.18;
      for (const e of enemies) {
        if (e.hp > 0 && dist(z.x, z.y, e.x, e.y) < z.r + e.r) {
          hitEnemy(e, 4 * dmgMul() * boonPow("trail"), 0, 0, false, false);
        }
      }
      addPart({ x: z.x + rand(-14, 14), y: z.y + rand(-14, 14), vx: 0, vy: -40, t: 0.4, tm: 0.4, col: "#ffaa44", r: rand(2, 4), drag: 1 });
    }
  }
  zones = zones.filter((z) => z.t > 0);

  // mortar strikes (telegraphed AoE circles)
  for (const m of mortars) {
    m.t -= dt;
    if (m.t <= 0) {
      burst(m.x, m.y, m.col || "#ff8833", 26, 320, 0.55, 3.5);
      shake(6, 0.25);
      audio.enemyDie(true);
      if (player.hp > 0 && dist(m.x, m.y, player.x, player.y) < m.r + player.r) {
        damagePlayer(m.dmg * eDmgMul(), angTo(m.x, m.y, player.x, player.y), null);
      }
      for (const bl of barrels) { // mortar impacts cook off barrels
        if (!bl.dead && bl.fuse < 0 && dist(m.x, m.y, bl.x, bl.y) < m.r + bl.r) igniteBarrel(bl, 0.1);
      }
    }
  }
  mortars = mortars.filter((m) => m.t > 0);

  // freeze novas (visual rings)
  for (const nv of novas) nv.t -= dt;
  novas = novas.filter((nv) => nv.t > 0);

  // beams
  for (const bm of beams) bm.t -= dt;
  beams = beams.filter((bm) => bm.t > 0);

  // pickups
  for (const pk of pickups) {
    pk.t -= dt;
    pk.x += pk.vx * dt; pk.y += pk.vy * dt;
    pk.vx *= Math.pow(0.05, dt); pk.vy *= Math.pow(0.05, dt);
    const A = CONFIG;
    pk.x = clamp(pk.x, A.wall + 8, A.arenaW - A.wall - 8);
    pk.y = clamp(pk.y, A.wall + 8, A.arenaH - A.wall - 8);
  }
  pickups = pickups.filter((pk) => pk.t > 0);

  updateParts(dt);

  // damage numbers
  for (const n of dnums) { n.t -= dt; n.y += n.vy * dt; n.vy *= Math.pow(0.2, dt); }
  dnums = dnums.filter((n) => n.t > 0);

  // door open anim
  for (const d of doors) d.openT = Math.min(1, d.openT + dt * 2);
}

function updateParts(dt) {
  for (const p of parts) {
    p.t -= dt;
    p.x += p.vx * dt; p.y += p.vy * dt;
    const dr = Math.pow(Math.exp(-(p.drag || 0)), dt);
    p.vx *= dr; p.vy *= dr;
  }
  parts = parts.filter((p) => p.t > 0);
}

/* ---------------- §S RENDER: WORLD ---------------- */
function glow(col, b) { ctx.shadowColor = col; ctx.shadowBlur = b; }
function noglow() { ctx.shadowBlur = 0; }
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawArenaFloor() {
  const A = CONFIG;
  // floor
  ctx.fillStyle = "#070720";
  ctx.fillRect(0, 0, A.arenaW, A.arenaH);
  // grid
  ctx.strokeStyle = "rgba(70,80,160,0.13)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 60; x < A.arenaW; x += 60) { ctx.moveTo(x, 0); ctx.lineTo(x, A.arenaH); }
  for (let y = 60; y < A.arenaH; y += 60) { ctx.moveTo(0, y); ctx.lineTo(A.arenaW, y); }
  ctx.stroke();
  // soft center light
  const g = ctx.createRadialGradient(A.arenaW / 2, A.arenaH / 2, 50, A.arenaW / 2, A.arenaH / 2, A.arenaW * 0.7);
  g.addColorStop(0, "rgba(60,70,160,0.10)");
  g.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, A.arenaW, A.arenaH);
  // walls
  const w = A.wall;
  glow(state === "hub" ? "#44ddaa" : "#3355ff", 14);
  ctx.strokeStyle = state === "hub" ? "rgba(80,230,180,0.7)" : "rgba(90,110,255,0.65)";
  ctx.lineWidth = 3;
  ctx.strokeRect(w, w, A.arenaW - w * 2, A.arenaH - w * 2);
  noglow();
  ctx.strokeStyle = "rgba(20,25,60,0.9)";
  ctx.lineWidth = w;
  ctx.strokeRect(w / 2, w / 2, A.arenaW - w, A.arenaH - w);
}

function drawPillars() {
  for (const p of pillars) {
    glow("#3355ff", 10);
    ctx.fillStyle = p.hue;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.fill();
    noglow();
    ctx.strokeStyle = "rgba(110,140,255,0.5)";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.stroke();
    ctx.strokeStyle = "rgba(110,140,255,0.18)";
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 0.62, 0, TAU); ctx.stroke();
  }
}

function drawDoors() {
  for (const d of doors) {
    const o = d.openT;
    const rw = DOOR_REWARDS[d.reward];
    ctx.save();
    ctx.globalAlpha = o;
    glow(rw.col, 16);
    ctx.fillStyle = "rgba(8,10,30,0.95)";
    rrect(d.x - d.w / 2, d.y - d.h / 2, d.w, d.h, 6); ctx.fill();
    ctx.strokeStyle = rw.col;
    ctx.lineWidth = 2;
    rrect(d.x - d.w / 2, d.y - d.h / 2, d.w, d.h, 6); ctx.stroke();
    noglow();
    ctx.fillStyle = rw.col;
    ctx.font = "bold 13px 'Courier New', monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(rw.label, d.x, d.y + 1);
    // reward icon above
    const iy = d.y + d.h / 2 + 16 + Math.sin(timeNow * 3) * 3;
    glow(rw.col, 10);
    ctx.beginPath();
    if (d.reward === "boon") {
      ctx.moveTo(d.x, iy - 8); ctx.lineTo(d.x + 7, iy); ctx.lineTo(d.x, iy + 8); ctx.lineTo(d.x - 7, iy);
      ctx.closePath(); ctx.fill();
    } else if (d.reward === "hp") {
      ctx.fillRect(d.x - 8, iy - 2.5, 16, 5); ctx.fillRect(d.x - 2.5, iy - 8, 5, 16);
    } else if (d.reward === "energy") {
      ctx.moveTo(d.x + 3, iy - 9); ctx.lineTo(d.x - 5, iy + 1); ctx.lineTo(d.x - 1, iy + 1);
      ctx.lineTo(d.x - 3, iy + 9); ctx.lineTo(d.x + 5, iy - 1); ctx.lineTo(d.x + 1, iy - 1);
      ctx.closePath(); ctx.fill();
    } else if (d.reward === "shop") {
      // pedestal + floating ware icon
      ctx.fillRect(d.x - 8, iy + 4, 16, 4);
      ctx.fillRect(d.x - 4, iy, 8, 4);
      ctx.arc(d.x, iy - 6, 5, 0, TAU); ctx.fill();
    } else if (d.reward === "challenge") {
      // stopwatch: ring + ticking hand
      ctx.strokeStyle = rw.col; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(d.x, iy, 8, 0, TAU); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(d.x, iy);
      const ha = -Math.PI / 2 + (timeNow % 2) * Math.PI;
      ctx.lineTo(d.x + Math.cos(ha) * 6, iy + Math.sin(ha) * 6);
      ctx.stroke();
      ctx.fillRect(d.x - 2, iy - 12, 4, 3);
    } else if (d.reward === "treasure") {
      // chest: box + lid + latch
      ctx.fillRect(d.x - 8, iy - 2, 16, 8);
      ctx.fillRect(d.x - 9, iy - 6, 18, 3);
      ctx.fillStyle = "#070720";
      ctx.fillRect(d.x - 1.5, iy, 3, 3);
      ctx.fillStyle = rw.col;
    } else if (d.reward === "fountain") {
      // droplet
      ctx.moveTo(d.x, iy - 9);
      ctx.quadraticCurveTo(d.x + 7, iy + 1, d.x, iy + 7);
      ctx.quadraticCurveTo(d.x - 7, iy + 1, d.x, iy - 9);
      ctx.closePath(); ctx.fill();
    } else {
      ctx.arc(d.x, iy, 6, 0, TAU); ctx.fill();
    }
    noglow();
    if (d.bossNext) {
      ctx.fillStyle = "#ff3366";
      ctx.font = "bold 11px 'Courier New', monospace";
      ctx.fillText("⚠ BOSS", d.x, iy + 20);
    }
    ctx.restore();
  }
}

function drawZonesAndPickups() {
  for (const z of zones) {
    const a = clamp(z.t / 1.5, 0, 1);
    ctx.fillStyle = "rgba(255,150,50," + (0.16 * a) + ")";
    glow("#ffaa44", 8);
    ctx.beginPath(); ctx.arc(z.x, z.y, z.r, 0, TAU); ctx.fill();
    noglow();
  }
  // mortar AoE telegraphs (inner circle closes in as impact nears)
  for (const m of mortars) {
    const pr = 1 - clamp(m.t / m.tm, 0, 1);
    const col = m.col || "#ff8833";
    ctx.strokeStyle = col;
    ctx.fillStyle = "rgba(255,136,51," + (0.06 + pr * 0.16) + ")";
    glow(col, 10);
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, TAU); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(m.x, m.y, m.r * pr, 0, TAU); ctx.stroke();
    noglow();
  }
  // freeze nova / maul shockwave rings
  for (const nv of novas) {
    const pr = 1 - clamp(nv.t / nv.tm, 0, 1);
    const r = lerp(14, nv.maxR, Math.min(1, pr * 1.15));
    ctx.save();
    ctx.globalAlpha = clamp(1 - pr, 0, 1) * 0.9;
    glow(nv.col || "#aaeeff", 20);
    ctx.strokeStyle = nv.col || "#cfeeff";
    ctx.lineWidth = 6 * (1 - pr) + 2;
    ctx.beginPath(); ctx.arc(nv.x, nv.y, r, 0, TAU); ctx.stroke();
    ctx.strokeStyle = nv.col ? "rgba(255,153,102,0.4)" : "rgba(170,230,255,0.4)";
    ctx.lineWidth = 14 * (1 - pr) + 2;
    ctx.beginPath(); ctx.arc(nv.x, nv.y, r * 0.92, 0, TAU); ctx.stroke();
    noglow();
    ctx.restore();
  }
  for (const pk of pickups) {
    const bob = Math.sin(timeNow * 5 + pk.x) * 2;
    if (pk.kind === "core") {
      glow("#ffcc44", 10);
      ctx.fillStyle = "#ffcc44";
      ctx.save();
      ctx.translate(pk.x, pk.y + bob);
      ctx.rotate(timeNow * 2);
      ctx.fillRect(-4, -4, 8, 8);
      ctx.restore();
    } else {
      glow("#66ff99", 10);
      ctx.fillStyle = "#66ff99";
      ctx.fillRect(pk.x - 6, pk.y + bob - 2, 12, 4);
      ctx.fillRect(pk.x - 2, pk.y + bob - 6, 4, 12);
    }
    noglow();
  }
}

function drawHazards() {
  // AFTERSHOCK quake rings
  for (const q of quakes) {
    const a = clamp(q.t / q.tm, 0, 1);
    ctx.save();
    ctx.globalAlpha = 0.5 * a;
    glow("#ff9966", 8);
    ctx.strokeStyle = "#ff9966";
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(q.x, q.y, q.r, 0, TAU); ctx.stroke();
    ctx.fillStyle = "rgba(255,153,102,0.07)";
    ctx.beginPath(); ctx.arc(q.x, q.y, q.r, 0, TAU); ctx.fill();
    noglow();
    ctx.restore();
  }
  for (const h of hazards) {
    if (h.kind === "spike") {
      const act = spikeActive(h), warn = spikeWarning(h);
      const s = h.s;
      ctx.save();
      ctx.fillStyle = act ? "rgba(80,20,30,0.85)" : "rgba(30,18,40,0.8)";
      ctx.strokeStyle = act ? "#ff5566" : warn ? "rgba(255,119,85," + (0.45 + 0.45 * Math.abs(Math.sin(timeNow * 14))) + ")" : "rgba(255,119,85,0.35)";
      ctx.lineWidth = 2;
      if (act) glow("#ff5566", 12);
      rrect(h.x - s, h.y - s, s * 2, s * 2, 5); ctx.fill();
      rrect(h.x - s, h.y - s, s * 2, s * 2, 5); ctx.stroke();
      noglow();
      // spikes rise slightly during the warn rhythm, fully when live
      const ext = act ? 1 : warn ? clamp((h.t / h.warn - 0.6) / 0.4, 0, 1) * 0.3 : 0;
      if (ext > 0.02) {
        ctx.fillStyle = act ? "#ff8899" : "#aa5566";
        if (act) glow("#ff5566", 10);
        for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) {
          const sx = h.x - s + s * (i + 0.5) * 2 / 3, sy = h.y - s + s * (j + 0.5) * 2 / 3;
          ctx.beginPath();
          ctx.moveTo(sx - 4, sy + 3); ctx.lineTo(sx + 4, sy + 3); ctx.lineTo(sx, sy + 3 - 9 * ext - 4);
          ctx.closePath(); ctx.fill();
        }
        noglow();
      }
      ctx.restore();
    } else if (h.kind === "fence") {
      const on = fenceOn(h), warn = fenceWarn(h);
      ctx.save();
      for (const pp of [[h.x1, h.y1], [h.x2, h.y2]]) { // pylon posts
        glow("#ff5577", on ? 12 : 5);
        ctx.fillStyle = "#2a1a35";
        ctx.beginPath(); ctx.arc(pp[0], pp[1], 9, 0, TAU); ctx.fill();
        ctx.strokeStyle = on ? "#ff5577" : "rgba(255,85,119,0.5)";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(pp[0], pp[1], 9, 0, TAU); ctx.stroke();
        ctx.fillStyle = on ? "#ff8899" : warn ? (Math.floor(timeNow * 10) % 2 ? "#ff8899" : "#552233") : "#552233";
        ctx.beginPath(); ctx.arc(pp[0], pp[1], 3.5, 0, TAU); ctx.fill();
        noglow();
      }
      if (on) {
        glow("#ff5577", 14);
        ctx.strokeStyle = "rgba(255,85,119,0.95)";
        ctx.lineWidth = 3.5;
        ctx.beginPath(); ctx.moveTo(h.x1, h.y1); ctx.lineTo(h.x2, h.y2); ctx.stroke();
        ctx.strokeStyle = "rgba(255,170,190,0.5)";
        ctx.lineWidth = 8;
        ctx.beginPath(); ctx.moveTo(h.x1, h.y1); ctx.lineTo(h.x2, h.y2); ctx.stroke();
        noglow();
      } else if (warn) { // telegraphed power-up blink
        ctx.strokeStyle = "rgba(255,85,119," + (Math.floor(timeNow * 10) % 2 ? 0.55 : 0.15) + ")";
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 6]);
        ctx.beginPath(); ctx.moveTo(h.x1, h.y1); ctx.lineTo(h.x2, h.y2); ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.restore();
    }
  }
  // volatile barrels
  for (const b of barrels) {
    if (b.dead) continue;
    const fusing = b.fuse >= 0;
    const fl = fusing && Math.floor(timeNow * 18) % 2 === 0;
    ctx.save();
    glow("#ffb050", fusing ? 18 : 8);
    ctx.fillStyle = fl ? "#ffffff" : "#7a3a18";
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, TAU); ctx.fill();
    ctx.strokeStyle = "#ffb050";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, TAU); ctx.stroke();
    ctx.strokeStyle = fl ? "#ffb050" : "#ffd27a"; // hazard stripe
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(b.x - b.r * 0.7, b.y - 2); ctx.lineTo(b.x + b.r * 0.7, b.y - 2); ctx.stroke();
    ctx.fillStyle = fl ? "#ffffff" : "#ffb050"; // valve light
    ctx.beginPath(); ctx.arc(b.x, b.y - b.r - 3, 2.2 + (fusing ? 1.5 : 0), 0, TAU); ctx.fill();
    noglow();
    ctx.restore();
  }
}

function drawPedestals() {
  if (!shopRoom && roomType !== "treasure") return;
  const p = player;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  for (const pd of pedestals) {
    const it = pd.item;
    const afford = pd.price <= 0 || cores >= pd.price;
    const near = p && p.hp > 0 && dist(p.x, p.y, pd.x, pd.y) < 36;
    const bob = Math.sin(timeNow * 2.4 + pd.x) * 4;
    ctx.save();
    if (pd.sold) ctx.globalAlpha = 0.3;
    // pedestal base
    glow(it.col, near && !pd.sold ? 18 : 8);
    ctx.fillStyle = "rgba(20,24,60,0.9)";
    ctx.beginPath(); ctx.arc(pd.x, pd.y + 14, 24, 0, TAU); ctx.fill();
    ctx.strokeStyle = pd.sold ? "#556" : afford ? it.col : "rgba(130,140,180,0.6)";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(pd.x, pd.y + 14, 24, 0, TAU); ctx.stroke();
    noglow();
    // floating ware glyph
    ctx.fillStyle = pd.sold ? "#667" : afford ? it.col : "rgba(150,160,200,0.7)";
    if (!pd.sold) glow(it.col, 12);
    ctx.font = "bold 26px 'Courier New', monospace";
    ctx.fillText(it.glyph, pd.x, pd.y - 16 + bob);
    noglow();
    // name / desc / price
    ctx.font = "bold 11px 'Courier New', monospace";
    ctx.fillStyle = pd.sold ? "#667" : "#dde4ff";
    ctx.fillText(pd.sold ? "SOLD" : it.name, pd.x, pd.y + 48);
    if (!pd.sold) {
      ctx.font = "10px 'Courier New', monospace";
      ctx.fillStyle = "rgba(190,210,255,0.75)";
      ctx.fillText(it.desc, pd.x, pd.y + 62);
      ctx.font = "bold 12px 'Courier New', monospace";
      ctx.fillStyle = pd.price <= 0 ? "#cc88ff" : afford ? "#ffcc44" : "#ff5566";
      ctx.fillText(pd.price <= 0 ? "FREE — 免费" : "◆ " + pd.price, pd.x, pd.y + 78);
      if (near) {
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 11px 'Courier New', monospace";
        ctx.fillText(touchUI ? (pd.price <= 0 ? "TAP TO TAKE" : "TAP TO BUY") : (pd.price <= 0 ? "[J] TAKE" : "[J] BUY"), pd.x, pd.y - 48);
      }
    }
    ctx.restore();
  }
}

function drawSpawnTelegraphs() {
  for (const q of spawnQ) {
    const p = 1 - clamp(q.t / 1.1, 0, 1);
    const col = q.type === "boss" ? "#ff3366" : ENEMY_DEFS[q.type] ? ENEMY_DEFS[q.type].col : "#ff5577";
    ctx.strokeStyle = col;
    ctx.globalAlpha = 0.25 + p * 0.55;
    ctx.lineWidth = 2;
    glow(col, 8);
    ctx.beginPath(); ctx.arc(q.x, q.y, 20 * (1 - p) + 6, 0, TAU); ctx.stroke();
    ctx.beginPath(); ctx.arc(q.x, q.y, 4, 0, TAU); ctx.stroke();
    noglow();
    ctx.globalAlpha = 1;
  }
}

function drawEnemy(e) {
  const fl = e.flash > 0;
  const frozen = e.frozenT > 0;
  const col = fl ? "#ffffff" : frozen ? "#bfe8ff" : e.col;
  ctx.save();
  if (e.spawnT > 0) ctx.globalAlpha = 1 - e.spawnT / 0.4;
  // phantom cloak: barely-visible shimmer (statuses force visibility)
  if (e.type === "phantom" && e.state === "cloak" && e.frozenT <= 0 && (e.shockT || 0) <= 0 && !fl) {
    ctx.globalAlpha *= 0.12 + 0.05 * Math.sin(timeNow * 6 + e.phase);
  }
  // telegraphs first (under body)
  if (e.type === "bomber" && e.state === "fuse") {
    // pulsing blast-radius telegraph synced to the fuse
    const p2 = 1 - clamp(e.t / 1.0, 0, 1);
    const puls = 0.5 + 0.5 * Math.sin(timeNow * (10 + p2 * 22));
    ctx.strokeStyle = "#ff8844";
    ctx.fillStyle = "rgba(255,136,68," + (0.05 + p2 * 0.12 + puls * 0.05) + ")";
    ctx.lineWidth = 2;
    glow("#ff8844", 10);
    ctx.beginPath(); ctx.arc(e.x, e.y, 95, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(e.x, e.y, 95 * p2, 0, TAU); ctx.stroke();
    noglow();
  }
  if (e.type === "phantom" && e.state === "reveal") {
    // decloak strike telegraph
    const p2 = 1 - e.t / 0.5;
    ctx.strokeStyle = "rgba(187,153,255," + (0.3 + p2 * 0.6) + ")";
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 6]);
    ctx.beginPath();
    ctx.moveTo(e.x, e.y);
    ctx.lineTo(e.x + e.dirX * 200, e.y + e.dirY * 200);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  if (e.type === "tank" && e.state === "slam") {
    const p = 1 - e.t / 0.85;
    ctx.strokeStyle = "#ffaa33";
    ctx.fillStyle = "rgba(255,170,51," + (0.07 + p * 0.13) + ")";
    ctx.lineWidth = 2 + p * 2;
    glow("#ffaa33", 12);
    ctx.beginPath(); ctx.arc(e.x, e.y, 125, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(e.x, e.y, 125 * p, 0, TAU); ctx.stroke();
    noglow();
  }
  if (e.type === "chaser" && e.state === "wind") {
    const p = 1 - e.t / 0.45;
    ctx.strokeStyle = "rgba(255,85,119," + (0.3 + p * 0.6) + ")";
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 6]);
    ctx.beginPath();
    ctx.moveTo(e.x, e.y);
    ctx.lineTo(e.x + e.dirX * 150, e.y + e.dirY * 150);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  if (e.type === "boss" && e.state === "aim") {
    // laser-sight telegraph (warden dash / artillery lance)
    const p = 1 - e.t / (e.kind === "artillery" ? 0.95 : 0.7);
    ctx.save();
    ctx.globalAlpha *= 0.3 + clamp(p, 0, 1) * 0.6;
    ctx.strokeStyle = e.col;
    ctx.lineWidth = e.kind === "artillery" ? 3 : 5;
    ctx.setLineDash([12, 8]);
    ctx.beginPath();
    ctx.moveTo(e.x, e.y);
    ctx.lineTo(e.x + e.dirX * 900, e.y + e.dirY * 900);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
  if (e.type === "boss" && e.state === "wind") {
    // splitter lunge telegraph
    const p = 1 - e.t / 0.55;
    ctx.strokeStyle = "rgba(102,255,136," + (0.3 + p * 0.6) + ")";
    ctx.lineWidth = 4;
    ctx.setLineDash([10, 7]);
    ctx.beginPath();
    ctx.moveTo(e.x, e.y);
    ctx.lineTo(e.x + e.dirX * 260, e.y + e.dirY * 260);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  if (e.type === "boss" && e.state === "slam") {
    // splitter slam AoE telegraph
    const p = 1 - e.t / 0.9;
    const R = 95 + e.r;
    ctx.strokeStyle = e.col;
    ctx.fillStyle = "rgba(102,255,136," + (0.06 + p * 0.13) + ")";
    ctx.lineWidth = 2 + p * 2;
    glow(e.col, 12);
    ctx.beginPath(); ctx.arc(e.x, e.y, R, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(e.x, e.y, R * p, 0, TAU); ctx.stroke();
    noglow();
  }
  if (e.type === "boss" && e.state === "tele") {
    // summoner teleport: warning ring at the destination
    const p = 1 - e.t / 0.55;
    ctx.strokeStyle = "rgba(187,102,255," + (0.25 + p * 0.6) + ")";
    ctx.lineWidth = 2.5;
    glow("#bb66ff", 10);
    ctx.beginPath(); ctx.arc(e.tx, e.ty, 40 * (1 - p) + 12, 0, TAU); ctx.stroke();
    noglow();
  }
  if (e.type === "shooter" && e.state === "charge") {
    const p = 1 - e.t / 0.6;
    glow("#cc66ff", 16);
    ctx.fillStyle = "rgba(204,102,255," + (0.3 + p * 0.5) + ")";
    ctx.beginPath(); ctx.arc(e.x, e.y, 5 + p * 7, 0, TAU); ctx.fill();
    noglow();
  }
  if (e.type === "boss" && ["radial", "summon", "burst", "mortar"].includes(e.state)) {
    const p = 1 - clamp(e.t / 0.9, 0, 1);
    ctx.save();
    ctx.strokeStyle = e.col;
    ctx.globalAlpha *= 0.2 + p * 0.5;
    ctx.lineWidth = 2;
    glow(e.col, 10);
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r + 14 + p * 10, 0, TAU); ctx.stroke();
    noglow();
    ctx.restore();
  }

  glow(col, fl ? 22 : 13);
  ctx.fillStyle = col;
  ctx.strokeStyle = col;

  if (e.type === "chaser") {
    const a = e.state === "lunge" || e.state === "wind" ? Math.atan2(e.dirY, e.dirX) : angTo(e.x, e.y, player.x, player.y);
    ctx.save();
    ctx.translate(e.x, e.y); ctx.rotate(a);
    ctx.beginPath();
    ctx.moveTo(e.r + 4, 0); ctx.lineTo(-e.r * 0.7, e.r * 0.8); ctx.lineTo(-e.r * 0.3, 0); ctx.lineTo(-e.r * 0.7, -e.r * 0.8);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  } else if (e.type === "shooter") {
    ctx.save();
    ctx.translate(e.x, e.y); ctx.rotate(timeNow * 1.5);
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * TAU;
      const rr = i % 2 ? e.r * 0.6 : e.r;
      if (i === 0) ctx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr);
      else ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
  } else if (e.type === "tank") {
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(timeNow * 0.4);
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * TAU;
      if (i === 0) ctx.moveTo(Math.cos(a) * e.r, Math.sin(a) * e.r);
      else ctx.lineTo(Math.cos(a) * e.r, Math.sin(a) * e.r);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
    ctx.fillStyle = "#070720";
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r * 0.45, 0, TAU); ctx.fill();
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r * 0.2, 0, TAU); ctx.fill();
  } else if (e.type === "swarmer") {
    ctx.save();
    ctx.translate(e.x, e.y); ctx.rotate(e.phase);
    ctx.beginPath();
    ctx.moveTo(e.r + 2, 0); ctx.lineTo(0, e.r); ctx.lineTo(-e.r, 0); ctx.lineTo(0, -e.r);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  } else if (e.type === "bomber") {
    // squat scuttler with stubby legs and a glowing fuse dome
    ctx.save();
    ctx.translate(e.x, e.y);
    const fusing = e.state === "fuse";
    const fuseGlow = fusing ? 0.5 + 0.5 * Math.sin(timeNow * (12 + (1 - clamp(e.t, 0, 1)) * 26)) : 0.25 + 0.1 * Math.sin(timeNow * 4);
    ctx.lineWidth = 3;
    for (let i = 0; i < 6; i++) { // legs
      const a = (i / 6) * TAU + Math.sin(e.phase + i) * 0.18;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * e.r * 0.5, Math.sin(a) * e.r * 0.5);
      ctx.lineTo(Math.cos(a) * (e.r + 5), Math.sin(a) * (e.r + 5));
      ctx.stroke();
    }
    ctx.beginPath(); ctx.arc(0, 0, e.r, 0, TAU); ctx.fill();
    // fuse dome pulses hotter as detonation nears
    glow("#ffe0aa", 10 + fuseGlow * 16);
    ctx.fillStyle = fl ? "#ffffff" : "rgba(255," + Math.round(190 + fuseGlow * 65) + "," + Math.round(120 + fuseGlow * 100) + ",1)";
    ctx.beginPath(); ctx.arc(0, 0, e.r * (0.4 + fuseGlow * 0.18), 0, TAU); ctx.fill();
    ctx.restore();
  } else if (e.type === "shield") {
    // armored walker with a frontal energy shield arc
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(e.shieldA);
    rrect(-e.r * 0.8, -e.r * 0.7, e.r * 1.5, e.r * 1.4, 5); ctx.fill();
    ctx.fillStyle = "#070720";
    ctx.beginPath(); ctx.arc(-e.r * 0.05, 0, e.r * 0.35, 0, TAU); ctx.fill();
    ctx.fillStyle = fl ? "#ffffff" : "#cfe0ff";
    ctx.beginPath(); ctx.arc(-e.r * 0.05, 0, e.r * 0.15, 0, TAU); ctx.fill();
    // the shield itself: bright when active, shattered-dim when exposed/frozen/shocked
    const active = e.frozenT <= 0 && (e.shockT || 0) <= 0 && (e.exposeT || 0) <= 0;
    glow("#aaccff", active ? 14 : 4);
    ctx.strokeStyle = active ? "rgba(170,204,255,0.95)" : "rgba(120,140,200,0.35)";
    ctx.lineWidth = active ? 5 : 3;
    ctx.beginPath(); ctx.arc(0, 0, e.r + 7, -1.15, 1.15); ctx.stroke();
    if (active) {
      ctx.strokeStyle = "rgba(200,225,255,0.4)";
      ctx.lineWidth = 9;
      ctx.beginPath(); ctx.arc(0, 0, e.r + 7, -1.0, 1.0); ctx.stroke();
    }
    noglow();
    ctx.restore();
  } else if (e.type === "medic") {
    // heal beam to its patient (drawn under the drone body)
    if (e.healTgt && e.healTgt.hp > 0) {
      ctx.save();
      glow("#66ffcc", 10);
      ctx.strokeStyle = "rgba(102,255,204," + (0.5 + 0.25 * Math.sin(timeNow * 9)) + ")";
      ctx.lineWidth = 2.5;
      ctx.setLineDash([6, 5]);
      ctx.beginPath();
      ctx.moveTo(e.x, e.y);
      ctx.lineTo(e.healTgt.x, e.healTgt.y);
      ctx.stroke();
      ctx.setLineDash([]);
      noglow();
      ctx.restore();
      ctx.fillStyle = col; ctx.strokeStyle = col;
    }
    // hovering drone: rotor ring + medical cross
    ctx.save();
    ctx.translate(e.x, e.y + Math.sin(timeNow * 5 + e.phase) * 2.5);
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, e.r + 3, timeNow * 5, timeNow * 5 + 4.6); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, e.r, 0, TAU); ctx.fill();
    ctx.fillStyle = "#070720";
    ctx.fillRect(-e.r * 0.55, -e.r * 0.2, e.r * 1.1, e.r * 0.4);
    ctx.fillRect(-e.r * 0.2, -e.r * 0.55, e.r * 0.4, e.r * 1.1);
    ctx.restore();
  } else if (e.type === "phantom") {
    // sleek dagger shard, aimed along its motion / strike line
    ctx.save();
    ctx.translate(e.x, e.y);
    const pa = (e.state === "reveal" || e.state === "strike") ? Math.atan2(e.dirY, e.dirX)
      : (Math.hypot(e.vx, e.vy) > 5 ? Math.atan2(e.vy, e.vx) : angTo(e.x, e.y, player.x, player.y));
    ctx.rotate(pa);
    ctx.beginPath();
    ctx.moveTo(e.r + 7, 0); ctx.lineTo(-e.r * 0.5, e.r * 0.55);
    ctx.lineTo(-e.r * 0.9, 0); ctx.lineTo(-e.r * 0.5, -e.r * 0.55);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = fl ? "#ffffff" : "#e8defc";
    ctx.beginPath(); ctx.arc(e.r * 0.15, 0, e.r * 0.18, 0, TAU); ctx.fill();
    ctx.restore();
  } else if (e.type === "boss") {
    ctx.save();
    ctx.translate(e.x, e.y);
    if (e.kind === "summoner") {
      // VOIDCALLER: rune triangle with orbiting orbs; fades while teleporting
      if (e.state === "tele") ctx.globalAlpha *= clamp(e.t / 0.55, 0.15, 1);
      for (let i = 0; i < 3; i++) {
        const a = e.rot * 1.6 + (i / 3) * TAU;
        ctx.beginPath(); ctx.arc(Math.cos(a) * (e.r + 16), Math.sin(a) * (e.r + 16), 6, 0, TAU); ctx.fill();
      }
      ctx.rotate(e.rot * 0.7);
      ctx.beginPath();
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * TAU - Math.PI / 2;
        if (i === 0) ctx.moveTo(Math.cos(a) * (e.r + 6), Math.sin(a) * (e.r + 6));
        else ctx.lineTo(Math.cos(a) * (e.r + 6), Math.sin(a) * (e.r + 6));
      }
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#070720";
      ctx.beginPath(); ctx.arc(0, 0, e.r * 0.45, 0, TAU); ctx.fill();
      ctx.fillStyle = fl ? "#ffffff" : "#e0c0ff";
      ctx.beginPath(); ctx.arc(0, 0, e.r * 0.2, 0, TAU); ctx.fill();
    } else if (e.kind === "artillery") {
      // LANCE-7: walker turret with a long barrel
      ctx.lineWidth = 5;
      for (let i = 0; i < 4; i++) {
        const a = (i / 4) * TAU + Math.PI / 4 + Math.sin(e.rot * 2) * 0.08;
        ctx.beginPath();
        ctx.moveTo(Math.cos(a) * e.r * 0.5, Math.sin(a) * e.r * 0.5);
        ctx.lineTo(Math.cos(a) * (e.r + 12), Math.sin(a) * (e.r + 12));
        ctx.stroke();
      }
      rrect(-e.r * 0.75, -e.r * 0.75, e.r * 1.5, e.r * 1.5, 8); ctx.fill();
      const ba = e.state === "aim" ? Math.atan2(e.dirY, e.dirX) : angTo(e.x, e.y, player.x, player.y);
      ctx.rotate(ba);
      ctx.fillRect(0, -6, e.r + 22, 12);
      ctx.rotate(-ba);
      ctx.fillStyle = "#070720";
      ctx.beginPath(); ctx.arc(0, 0, e.r * 0.35, 0, TAU); ctx.fill();
      ctx.fillStyle = fl ? "#ffffff" : "#ffd0a0";
      ctx.beginPath(); ctx.arc(0, 0, e.r * 0.16, 0, TAU); ctx.fill();
    } else if (e.kind === "splitter") {
      // MITOSIS PRIME: wobbling blob with nuclei (one per remaining split)
      ctx.beginPath();
      const segs = 14;
      for (let i = 0; i <= segs; i++) {
        const a = (i / segs) * TAU;
        const rr = e.r * (1 + 0.09 * Math.sin(a * 3 + e.rot * 4) + 0.05 * Math.sin(a * 5 - e.rot * 3));
        if (i === 0) ctx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr);
        else ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
      }
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = "#070720";
      ctx.beginPath(); ctx.arc(0, 0, e.r * 0.55, 0, TAU); ctx.fill();
      ctx.fillStyle = fl ? "#ffffff" : "#caffd8";
      const nNuc = 3 - e.gen;
      for (let i = 0; i < nNuc; i++) {
        const a = e.rot * 2 + (i / nNuc) * TAU;
        ctx.beginPath(); ctx.arc(Math.cos(a) * e.r * 0.22, Math.sin(a) * e.r * 0.22, e.r * 0.16, 0, TAU); ctx.fill();
      }
    } else {
      // THE WARDEN: segmented outer ring + eye
      ctx.rotate(e.rot * 0.5);
      ctx.lineWidth = 4;
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a0 = (i / 6) * TAU, a1 = a0 + TAU / 9;
        ctx.moveTo(Math.cos(a0) * (e.r + 10), Math.sin(a0) * (e.r + 10));
        ctx.arc(0, 0, e.r + 10, a0, a1);
      }
      ctx.stroke();
      ctx.rotate(-e.rot * 0.5);
      ctx.beginPath(); ctx.arc(0, 0, e.r, 0, TAU); ctx.fill();
      ctx.fillStyle = "#070720";
      ctx.beginPath(); ctx.arc(0, 0, e.r * 0.7, 0, TAU); ctx.fill();
      const a = angTo(e.x, e.y, player.x, player.y);
      ctx.fillStyle = fl ? "#ffffff" : "#ff88aa";
      ctx.beginPath(); ctx.arc(Math.cos(a) * e.r * 0.3, Math.sin(a) * e.r * 0.3, e.r * 0.24, 0, TAU); ctx.fill();
    }
    ctx.restore();
  }
  noglow();

  // frozen overlay: ice shell + icicles
  if (frozen) {
    ctx.save();
    glow("#aaeeff", 12);
    ctx.fillStyle = "rgba(170,230,255,0.28)";
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r + 4, 0, TAU); ctx.fill();
    ctx.strokeStyle = "rgba(220,245,255,0.85)";
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 3; i++) {
      const a = (i / 3) * TAU + 0.6;
      const x1 = e.x + Math.cos(a) * e.r * 0.55, y1 = e.y + Math.sin(a) * e.r * 0.55;
      ctx.beginPath();
      ctx.moveTo(x1, y1 - 4); ctx.lineTo(x1 + 3, y1 + 5); ctx.lineTo(x1 - 3, y1 + 5);
      ctx.closePath(); ctx.stroke();
    }
    noglow();
    ctx.restore();
  }

  // elite: rotating gold ring
  if (e.elite) {
    ctx.save();
    glow("#ffcc44", 10);
    ctx.strokeStyle = "rgba(255,204,68,0.85)";
    ctx.lineWidth = 2;
    ctx.setLineDash([7, 5]);
    ctx.lineDashOffset = -timeNow * 22;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r + 7, 0, TAU); ctx.stroke();
    ctx.setLineDash([]);
    noglow();
    ctx.restore();
  }
  // enraged boss: pulsing red aura
  if (e.enraged) {
    ctx.save();
    const pl = 0.4 + 0.3 * Math.sin(timeNow * 9);
    glow("#ff3366", 16);
    ctx.strokeStyle = "rgba(255,51,102," + pl + ")";
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r + 14, 0, TAU); ctx.stroke();
    noglow();
    ctx.restore();
  }

  // small hp bar (not boss; boss has top bar)
  if (e.type !== "boss" && e.hp < e.maxHp) {
    const w = e.r * 2;
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(e.x - w / 2, e.y - e.r - 9, w, 3.5);
    ctx.fillStyle = e.col;
    ctx.fillRect(e.x - w / 2, e.y - e.r - 9, w * clamp(e.hp / e.maxHp, 0, 1), 3.5);
  }
  // tiny status icons above afflicted enemies
  if (frozen || (e.burnT || 0) > 0 || (e.shockT || 0) > 0) {
    const sts = [];
    if (frozen) sts.push(["❄", "#aaeeff"]);
    if ((e.burnT || 0) > 0) sts.push(["❋", "#ff8844"]);
    if ((e.shockT || 0) > 0) sts.push(["↯", "#ffee55"]);
    ctx.font = "bold 10px 'Courier New', monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    let sx0 = e.x - (sts.length - 1) * 6;
    const sy0 = e.y - e.r - 17;
    for (const s of sts) {
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(sx0 - 5, sy0 - 5, 10, 10);
      ctx.fillStyle = s[1];
      ctx.fillText(s[0], sx0, sy0 + 1);
      sx0 += 12;
    }
  }
  ctx.restore();
}

function drawPlayer() {
  const p = player;
  if (!p || p.hp <= 0) return;
  // weapon-colored swing trail afterimages
  for (const g of slashGhosts) {
    const a = g.t / g.tm;
    ctx.save();
    ctx.globalAlpha = a * 0.3;
    glow(g.col, 10);
    ctx.strokeStyle = g.col;
    if (g.lunge) {
      ctx.lineWidth = 5 * a + 1;
      ctx.beginPath();
      ctx.moveTo(g.x, g.y);
      ctx.lineTo(g.x + Math.cos(g.ang) * g.range, g.y + Math.sin(g.ang) * g.range);
      ctx.stroke();
    } else {
      ctx.lineWidth = 6 * a + 1;
      const a0 = g.ang - g.side * g.arc / 2;
      const a1 = g.ang + g.side * g.arc / 2;
      ctx.beginPath();
      ctx.arc(g.x, g.y, g.range - 10, Math.min(a0, a1), Math.max(a0, a1));
      ctx.stroke();
    }
    noglow();
    ctx.restore();
  }
  // dash trail ghosts
  for (const tr of p.trail) {
    const a = tr.t / 0.3;
    ctx.save();
    ctx.globalAlpha = a * 0.35;
    ctx.translate(tr.x, tr.y);
    ctx.rotate(tr.a);
    ctx.fillStyle = "#5ee6ff";
    glow("#5ee6ff", 8);
    ctx.beginPath();
    ctx.moveTo(p.r + 3, 0); ctx.lineTo(-p.r * 0.8, p.r * 0.85); ctx.lineTo(-p.r * 0.4, 0); ctx.lineTo(-p.r * 0.8, -p.r * 0.85);
    ctx.closePath(); ctx.fill();
    noglow();
    ctx.restore();
  }
  ctx.save();
  ctx.translate(p.x, p.y);
  const blink = p.hurtT > 0 && Math.floor(timeNow * 18) % 2 === 0;
  if (blink) ctx.globalAlpha = 0.35;
  ctx.rotate(p.aim);
  const bodyCol = p.dashT > 0 ? "#aaf6ff" : "#5ee6ff";
  glow(bodyCol, 16);
  ctx.fillStyle = bodyCol;
  ctx.beginPath();
  ctx.moveTo(p.r + 3, 0); ctx.lineTo(-p.r * 0.8, p.r * 0.85); ctx.lineTo(-p.r * 0.4, 0); ctx.lineTo(-p.r * 0.8, -p.r * 0.85);
  ctx.closePath(); ctx.fill();
  noglow();
  // visor
  ctx.fillStyle = "#0a0a28";
  ctx.beginPath();
  ctx.moveTo(p.r - 1, 0); ctx.lineTo(p.r * 0.1, p.r * 0.4); ctx.lineTo(p.r * 0.1, -p.r * 0.4);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // slash swipe (weapon-formed: blade arc / lance thrust / maul full slam)
  if (p.slashT > 0) {
    const W = weaponDef();
    const prog = 1 - p.slashT / (p.slashDur || CONFIG.slashDur);
    const range = meleeRangeNow();
    ctx.save();
    ctx.globalAlpha = (1 - prog) * 0.9;
    if (W.id === "lance") {
      // tapered spear thrust
      const ex = p.x + Math.cos(p.slashAng) * range, ey2 = p.y + Math.sin(p.slashAng) * range;
      glow(W.col, 16);
      ctx.strokeStyle = "#fff3d8";
      ctx.lineWidth = 6 * (1 - prog * 0.6);
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(ex, ey2); ctx.stroke();
      ctx.strokeStyle = "rgba(255,210,122,0.5)";
      ctx.lineWidth = 13 * (1 - prog);
      ctx.beginPath();
      ctx.moveTo(p.x + Math.cos(p.slashAng) * range * 0.3, p.y + Math.sin(p.slashAng) * range * 0.3);
      ctx.lineTo(ex, ey2);
      ctx.stroke();
    } else {
      const arc = meleeArcNow();
      const sweep = p.slashSide;
      const a0 = p.slashAng - sweep * arc / 2;
      const a1 = a0 + sweep * arc * Math.min(1, prog * 2.4);
      glow(W.col, 18);
      ctx.strokeStyle = W.id === "maul" ? "#ffd8c0" : "#cffaff";
      ctx.lineWidth = (W.id === "maul" ? 9 : 7) * (1 - prog * 0.6);
      ctx.beginPath();
      ctx.arc(p.x, p.y, range - 8, Math.min(a0, a1), Math.max(a0, a1));
      ctx.stroke();
      ctx.strokeStyle = W.id === "maul" ? "rgba(255,136,102,0.5)" : "rgba(94,230,255,0.5)";
      ctx.lineWidth = 16 * (1 - prog);
      ctx.beginPath();
      ctx.arc(p.x, p.y, range - 16, Math.min(a0, a1), Math.max(a0, a1));
      ctx.stroke();
    }
    noglow();
    ctx.restore();
  }
}

function drawBolts() {

function drawBeamsParts() {
  for (const bm of beams) {
    ctx.save();
    ctx.globalAlpha = bm.t / 0.18;
    glow(bm.col, 12);
    ctx.strokeStyle = bm.col;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    // jagged lightning
    const segs = 5;
    ctx.moveTo(bm.x1, bm.y1);
    for (let i = 1; i < segs; i++) {
      const t = i / segs;
      ctx.lineTo(lerp(bm.x1, bm.x2, t) + rand(-7, 7), lerp(bm.y1, bm.y2, t) + rand(-7, 7));
    }
    ctx.lineTo(bm.x2, bm.y2);
    ctx.stroke();
    noglow();
    ctx.restore();
  }
  for (const p of parts) {
    ctx.globalAlpha = clamp(p.t / p.tm, 0, 1);
    ctx.fillStyle = p.col;
    ctx.fillRect(p.x - p.r / 2, p.y - p.r / 2, p.r, p.r);
  }
  ctx.globalAlpha = 1;
}

}
