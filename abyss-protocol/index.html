<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>ABYSS PROTOCOL</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #050514; overflow: hidden;
    touch-action: none; -webkit-user-select: none; user-select: none;
    overscroll-behavior: none;
  }
  canvas { display: block; touch-action: none; }
  #arcade {
    position: fixed; top: 12px; left: 14px; z-index: 10;
    font: 14px "Courier New", monospace; letter-spacing: 1px;
    color: #5ee6ff; opacity: 0.45; text-decoration: none;
    text-shadow: 0 0 8px rgba(94,230,255,0.6);
    transition: opacity 0.2s;
  }
  #arcade:hover { opacity: 0.9; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="arcade" href="../">&larr; Arcade</a>
<script>
"use strict";

/* ============================================================
   ABYSS PROTOCOL — a top-down action roguelike.
   A lone android fights up from the depths of a derelict
   neon space station, room by room, boon by boon.

   Single file, zero dependencies, all art & audio procedural.

   Controls: WASD / arrows move, mouse aims.
             J / Left click / tap  = melee slash
             Right Ctrl / Right click / Shift / E = plasma bolt (energy)
             K (or Q) = freeze nova (ice skill, 12s CD)
             Space = dash (i-frames)
             P or Esc = pause, M = mute.
             Keyboard-only: if the mouse hasn't moved for ~1.5s,
             slashes/bolts auto-aim at the nearest enemy.
   Touch:    left half joystick, tap right half = slash,
             on-screen DASH / BOLT / FREEZE buttons.
   ============================================================ */

/* ---------------- §B CONFIG ---------------- */
const CONFIG = Object.freeze({
  arenaW: 960, arenaH: 600,     // logical arena size
  wall: 14,                     // wall inset
  playerR: 13,
  playerSpeed: 252,
  playerAccel: 2400,
  playerHP: 100,                // base, before meta
  energyMax: 100,
  energyRegen: 17,
  boltCost: 26,
  boltSpeed: 560,
  boltDmg: 11,
  meleeDmg: 14,
  meleeRange: 76,
  meleeArc: 1.8,                // radians
  meleeCD: 0.30,
  slashDur: 0.25,
  dashSpeed: 760,
  dashDur: 0.22,
  dashIfr: 0.27,
  dashCD: 0.95,
  hurtIfr: 0.75,
  freezeCD: 12,                 // freeze nova cooldown (s)
  freezeDur: 2.5,               // freeze duration on normals
  freezeBossDur: 1.2,           // freeze duration on bosses
  freezeR: 240,                 // freeze nova radius
  hitStop: 0.045,               // s frozen on melee hit
  killStop: 0.075,
  bossEvery: 6,
  maxParticles: 520,
  step: 1 / 120,                // fixed physics timestep
  challengeTime: 45,            // challenge room gauntlet timer (s)
  burnDur: 4,                   // burn DoT duration (s), halved on bosses
  shockStun: 0.7,               // shock stun (s), reduced on bosses
});

/* ---------------- §C UTIL ---------------- */
const TAU = Math.PI * 2;
const rand = (a, b) => a + Math.random() * (b - a);
const randi = (a, b) => Math.floor(rand(a, b + 1));
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);
const angTo = (x1, y1, x2, y2) => Math.atan2(y2 - y1, x2 - x1);
const angDiff = (a, b) => {
  let d = (b - a) % TAU;
  if (d > Math.PI) d -= TAU;
  if (d < -Math.PI) d += TAU;
  return d;
};
const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

const store = {
  get(k) { try { return localStorage.getItem("abyssprotocol." + k); } catch (e) { return this._m && this._m[k]; } },
  set(k, v) { try { localStorage.setItem("abyssprotocol." + k, v); } catch (e) { (this._m = this._m || {})[k] = v; } },
};

/* ---------------- canvas / view ---------------- */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const arcadeLink = document.getElementById("arcade");
let cw = 0, ch = 0, dpr = 1;
let aS = 1, aOX = 0, aOY = 0;   // arena scale & offset (screen px)
let vigGrad = null, lowHpGrad = null;

function resize() {
  dpr = Math.min(2, window.devicePixelRatio || 1);
  cw = window.innerWidth; ch = window.innerHeight;
  canvas.width = Math.round(cw * dpr);
  canvas.height = Math.round(ch * dpr);
  canvas.style.width = cw + "px";
  canvas.style.height = ch + "px";
  computeView();
  vigGrad = null;
  lowHpGrad = null;
}
function computeView() {
  const A = CONFIG;
  aS = Math.min(cw / (A.arenaW + 24), (ch - 56) / (A.arenaH + 24));
  aS = Math.min(aS, 1.5);
  aOX = (cw - A.arenaW * aS) / 2;
  aOY = (ch - A.arenaH * aS) / 2 + 14;
}
window.addEventListener("resize", resize);
resize();

const s2wX = (sx) => (sx - aOX) / aS;
const s2wY = (sy) => (sy - aOY) / aS;
const us = () => clamp(Math.min(cw, ch) / 640, 0.72, 1.25);  // ui scale

/* ---------------- §D AUDIO ---------------- */
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.muted = store.get("muted") === "1";
    // adaptive layers: JS-side smoothed levels (applied to gain nodes when ctx exists)
    this.intensity = 0; this.intensityCur = 0;   // combat arp/perc layer
    this.heartbeat = 0; this.heartbeatCur = 0;   // low-HP heartbeat pulse
  }
  unlock() {
    if (!this.ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      const c = this.ctx = new AC();
      this.master = c.createGain();
      this.master.gain.value = this.muted ? 0 : 1;
      const comp = c.createDynamicsCompressor();
      this.master.connect(comp);
      comp.connect(c.destination);
      // fake reverb: feedback delay
      this.send = c.createGain(); this.send.gain.value = 0.55;
      const delay = c.createDelay(1); delay.delayTime.value = 0.31;
      const fb = c.createGain(); fb.gain.value = 0.36;
      const damp = c.createBiquadFilter(); damp.type = "lowpass"; damp.frequency.value = 2400;
      this.send.connect(delay); delay.connect(damp); damp.connect(fb); fb.connect(delay);
      delay.connect(this.master);
      // 1s noise buffer for SFX
      const buf = c.createBuffer(1, c.sampleRate, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      this.noiseBuf = buf;
      // adaptive music buses: combat intensity layer + low-HP heartbeat
      this.intGain = c.createGain(); this.intGain.gain.value = 0;
      this.intGain.connect(this.master);
      this.hbGain = c.createGain(); this.hbGain.gain.value = 0;
      this.hbGain.connect(this.master);
      this._nextHb = 0;
      this.startMusic();
    }
    if (this.ctx.state !== "running") this.ctx.resume();
  }
  toggleMute() {
    this.muted = !this.muted;
    store.set("muted", this.muted ? "1" : "0");
    if (this.master) this.master.gain.value = this.muted ? 0 : 1;
  }
  ok() { return this.ctx && this.ctx.state === "running" && !this.muted; }
  tone(type, f0, f1, t0, dur, vol, wet, dest) {
    const c = this.ctx, o = c.createOscillator(), g = c.createGain();
    o.type = type;
    o.frequency.setValueAtTime(Math.max(1, f0), t0);
    if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0 + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(dest || this.master);
    if (wet) g.connect(this.send);
    o.start(t0); o.stop(t0 + dur + 0.05);
  }
  noise(t0, dur, vol, filterType, f0, f1, dest) {
    const c = this.ctx, src = c.createBufferSource(), g = c.createGain();
    src.buffer = this.noiseBuf; src.loop = true;
    const fl = c.createBiquadFilter();
    fl.type = filterType;
    fl.frequency.setValueAtTime(f0, t0);
    if (f1) fl.frequency.exponentialRampToValueAtTime(Math.max(20, f1), t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(fl); fl.connect(g); g.connect(dest || this.master);
    src.start(t0); src.stop(t0 + dur + 0.05);
  }
  /* adaptive layer targets; intensity ramps over ~1.5s, heartbeat a bit faster */
  updateDynamics(dt, inCombat, lowHP) {
    this.intensity = inCombat ? 1 : 0;
    this.heartbeat = lowHP ? 1 : 0;
    const iStep = dt / 1.5, hStep = dt / 0.6;
    this.intensityCur += clamp(this.intensity - this.intensityCur, -iStep, iStep);
    this.heartbeatCur += clamp(this.heartbeat - this.heartbeatCur, -hStep, hStep);
    if (this.intGain) this.intGain.gain.value = this.intensityCur;
    if (this.hbGain) this.hbGain.gain.value = this.heartbeatCur;
  }
  pad(freqs, t0, dur, vol) {
    const c = this.ctx;
    for (const f of freqs) {
      for (const det of [-3, 3]) {
        const o = c.createOscillator(), g = c.createGain();
        o.type = "triangle";
        o.frequency.value = f; o.detune.value = det;
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(vol, t0 + dur * 0.35);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        o.connect(g); g.connect(this.master); g.connect(this.send);
        o.start(t0); o.stop(t0 + dur + 0.05);
      }
    }
  }
  /* ----- SFX ----- */
  slash(kind) {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    if (kind === "lance") {
      this.noise(t, 0.12, 0.14, "bandpass", 3400, 900);
      this.tone("sawtooth", 760, 240, t, 0.1, 0.06, false);
    } else if (kind === "maul") {
      this.noise(t, 0.2, 0.18, "lowpass", 1800, 300);
      this.tone("sawtooth", 240, 80, t, 0.16, 0.1, false);
    } else {
      this.noise(t, 0.13, 0.16, "bandpass", 2600, 700);
      this.tone("sawtooth", 520, 180, t, 0.09, 0.07, false);
    }
  }
  weaponSwap() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.noise(t, 0.12, 0.12, "bandpass", 1800, 600);
    this.tone("square", 330, 330, t, 0.07, 0.08, false);
    this.tone("square", 495, 495, t + 0.08, 0.09, 0.07, true);
  }
  maulSlam() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.noise(t, 0.3, 0.2, "lowpass", 1600, 100);
    this.tone("sine", 95, 40, t, 0.3, 0.16, true);
  }
  styleUp(rank) {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    const f = 440 * Math.pow(1.25, rank + 1);
    this.tone("square", f, f * 1.5, t, 0.12, 0.07, true);
  }
  styleChime() { // S-rank fanfare
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    [880, 1108.7, 1318.5, 1760].forEach((f, i) =>
      this.tone("sine", f, f, t + i * 0.06, 0.35, 0.08, true));
    this.noise(t, 0.25, 0.05, "highpass", 4000, 8000);
  }
  spikeSnd() {
    if (!this.ok()) return;
    this.tone("square", 950, 300, this.ctx.currentTime, 0.06, 0.05, false);
  }
  fenceZap() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("sawtooth", 1200, 300, t, 0.06, 0.05, false);
    this.noise(t, 0.05, 0.06, "highpass", 3500, 6000);
  }
  barrelBoom() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.noise(t, 0.55, 0.3, "lowpass", 2800, 90);
    this.tone("sawtooth", 130, 35, t, 0.45, 0.18, true);
    this.noise(t, 0.12, 0.14, "highpass", 2000, 5000);
  }
  bolt() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("square", 880, 240, t, 0.14, 0.11, true);
    this.noise(t, 0.08, 0.07, "highpass", 3000, 6000);
  }
  hit(crit) {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("square", crit ? 420 : 300, 90, t, 0.09, 0.13, false);
    this.noise(t, 0.07, 0.12, "lowpass", 4000, 600);
  }
  dash() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.noise(t, 0.22, 0.14, "bandpass", 600, 2600);
    this.tone("sine", 180, 520, t, 0.16, 0.06, true);
  }
  enemyDie(big) {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.noise(t, big ? 0.5 : 0.25, big ? 0.3 : 0.17, "lowpass", 3200, 120);
    this.tone("sawtooth", big ? 160 : 320, 40, t, big ? 0.42 : 0.2, 0.14, true);
  }
  hurt() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("sawtooth", 200, 60, t, 0.22, 0.2, false);
    this.noise(t, 0.18, 0.2, "lowpass", 2200, 200);
  }
  boon() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    [523.25, 659.25, 783.99, 1046.5].forEach((f, i) =>
      this.tone("sine", f, f, t + i * 0.07, 0.3, 0.09, true));
  }
  pickupSnd() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("square", 700, 1100, t, 0.07, 0.07, true);
  }
  door() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("sine", 220, 440, t, 0.4, 0.09, true);
    this.noise(t, 0.35, 0.08, "bandpass", 400, 1400);
  }
  roar() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("sawtooth", 70, 38, t, 0.9, 0.26, true);
    this.tone("sawtooth", 105, 52, t, 0.9, 0.18, true);
    this.noise(t, 0.8, 0.22, "lowpass", 900, 80);
  }
  uiSnd() {
    if (!this.ok()) return;
    this.tone("square", 440, 440, this.ctx.currentTime, 0.06, 0.06, true);
  }
  deny() {
    if (!this.ok()) return;
    this.tone("square", 160, 110, this.ctx.currentTime, 0.14, 0.08, false);
  }
  buy() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("sine", 660, 660, t, 0.12, 0.09, true);
    this.tone("sine", 990, 990, t + 0.08, 0.16, 0.08, true);
  }
  freezeCast() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    // crystalline shimmer: rising glassy arpeggio over icy hiss
    [1318.5, 1760, 2349.3].forEach((f, i) =>
      this.tone("sine", f, f * 1.4, t + i * 0.045, 0.3, 0.06, true));
    this.noise(t, 0.45, 0.09, "highpass", 2600, 7500);
    this.tone("triangle", 340, 90, t, 0.38, 0.08, true);
  }
  shatter() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.noise(t, 0.15, 0.15, "highpass", 3500, 8000);
    this.tone("square", 1500, 420, t, 0.08, 0.07, false);
    this.tone("sine", 2300, 900, t, 0.12, 0.05, true);
  }
  heatClunk() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("square", 130, 55, t, 0.13, 0.14, false);
    this.noise(t, 0.1, 0.12, "lowpass", 1400, 200);
    this.tone("sine", 70, 50, t + 0.05, 0.12, 0.1, false);
  }
  challengeTick() {
    if (!this.ok()) return;
    this.tone("square", 940, 940, this.ctx.currentTime, 0.05, 0.055, false);
  }
  challengeWin() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    [659.25, 880, 1318.5].forEach((f, i) =>
      this.tone("square", f, f, t + i * 0.09, 0.22, 0.08, true));
    this.noise(t, 0.3, 0.06, "highpass", 2500, 6000);
  }
  burnCrackle() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.noise(t, 0.09, 0.06, "bandpass", rand(1800, 3200), 500);
    this.noise(t + 0.04, 0.07, 0.04, "bandpass", rand(900, 1600), 300);
  }
  shockZap() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("sawtooth", 1500, 220, t, 0.07, 0.07, false);
    this.noise(t, 0.06, 0.08, "highpass", 4000, 7000);
  }
  comboSnap() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.noise(t, 0.22, 0.18, "lowpass", 3600, 300);
    this.tone("sine", 520, 90, t, 0.18, 0.12, true);
    this.noise(t, 0.3, 0.07, "highpass", 2400, 5000);
  }
  bombBeep() {
    if (!this.ok()) return;
    this.tone("square", 1240, 1240, this.ctx.currentTime, 0.07, 0.09, false);
  }
  clank() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("square", 320, 250, t, 0.08, 0.1, false);
    this.noise(t, 0.09, 0.13, "bandpass", 2200, 900);
  }
  phantomCue() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("sine", 980, 620, t, 0.3, 0.06, true);
    this.noise(t, 0.25, 0.04, "highpass", 3000, 6500);
  }
  bossRoar(kind) {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    if (kind === "summoner") {
      // eerie rising wail + shimmer
      this.tone("sawtooth", 90, 340, t, 0.8, 0.2, true);
      this.tone("sine", 1100, 1900, t + 0.1, 0.6, 0.06, true);
      this.noise(t, 0.7, 0.14, "bandpass", 500, 2400);
    } else if (kind === "artillery") {
      // klaxon two-tone alert
      this.tone("square", 240, 240, t, 0.22, 0.15, true);
      this.tone("square", 170, 170, t + 0.26, 0.22, 0.15, true);
      this.tone("square", 240, 240, t + 0.52, 0.3, 0.15, true);
      this.noise(t, 0.9, 0.12, "lowpass", 1400, 200);
    } else if (kind === "splitter") {
      // guttural double bellow
      this.tone("sawtooth", 60, 28, t, 0.9, 0.24, true);
      this.tone("sawtooth", 88, 40, t + 0.18, 0.8, 0.2, true);
      this.noise(t, 1.0, 0.2, "lowpass", 700, 60);
    } else {
      this.roar();
    }
  }
  death() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.noise(t, 1.1, 0.32, "lowpass", 3000, 60);
    this.tone("sine", 110, 30, t, 1.0, 0.24, true);
  }
  /* dark ambient loop: low minor pads + sub pulse + sparse blips */
  startMusic() {
    const c = this.ctx;
    const chords = [
      [55, 110, 130.81, 164.81],   // Am (A1 A2 C3 E3)
      [43.65, 87.31, 130.81, 174.61], // F (F1 F2 C3 F3)
      [49, 98, 146.83, 196],       // G
      [41.2, 82.41, 123.47, 164.81], // E low-ish
    ];
    const blips = [440, 523.25, 587.33, 659.25, 880];
    const BAR = 4.8;
    let nextBar = c.currentTime + 0.2, bar = 0;
    const self = this;
    this._musicTimer = setInterval(() => {
      while (nextBar < c.currentTime + 1.4) {
        const t = nextBar;
        const ch2 = chords[bar % chords.length];
        self.pad(ch2, t, BAR * 1.15, 0.028);
        // sub pulse
        for (let b = 0; b < 4; b++) {
          self.tone("sine", ch2[0], ch2[0], t + b * (BAR / 4), 0.5, 0.05, false);
        }
        // sparse echo blip
        if (Math.random() < 0.65) {
          const f = pick(blips);
          self.tone("sine", f, f, t + rand(0, BAR * 0.7), 0.4, 0.035, true);
        }
        // metallic hiss texture
        if (Math.random() < 0.4) {
          self.noise(t + rand(0, BAR * 0.6), 1.6, 0.012, "bandpass", rand(1200, 3200), 600);
        }
        // combat intensity layer: arp + hats, only audible through intGain
        const arpN = [ch2[2] * 2, ch2[3] * 2, ch2[2] * 4, ch2[3] * 4, ch2[1] * 4, ch2[3] * 2];
        for (let b = 0; b < 12; b++) {
          const f = arpN[b % arpN.length];
          self.tone("square", f, f, t + b * (BAR / 12), 0.11, 0.045, false, self.intGain);
        }
        for (let b = 0; b < 16; b++) {
          self.noise(t + b * (BAR / 16), 0.04, b % 4 === 2 ? 0.085 : 0.04, "highpass", 6000, 7500, self.intGain);
        }
        nextBar += BAR; bar++;
      }
      // low-HP heartbeat: steady lub-dub through hbGain
      if (self._nextHb < c.currentTime) self._nextHb = c.currentTime + 0.05;
      while (self._nextHb < c.currentTime + 1.2) {
        const hbT = self._nextHb;
        self.tone("sine", 58, 40, hbT, 0.16, 0.5, false, self.hbGain);
        self.tone("sine", 52, 38, hbT + 0.19, 0.13, 0.38, false, self.hbGain);
        self._nextHb += 0.92;
      }
    }, 250);
  }
}
const audio = new AudioEngine();

/* ---------------- §E PERSISTENCE / META ---------------- */
let cores = parseInt(store.get("cores") || "0", 10) || 0;
let best = parseInt(store.get("best") || "0", 10) || 0;
let meta = { hp: 0, dmg: 0, dash: 0, boon: 0, luck: 0 };
try { const m = JSON.parse(store.get("meta") || "{}"); meta = Object.assign(meta, m); } catch (e) { /* noop */ }
function saveMeta() {
  store.set("cores", String(cores));
  store.set("best", String(best));

  for (const m of HEAT_MODS) t += (h[m.id] || 0) * m.pts;

let runHeatPts = 0, coreFrac = 0;
function coreGain(n) {
  const g = n * (1 + 0.25 * runHeatPts) + coreFrac;
  const whole = Math.floor(g);
  coreFrac = g - whole;
  cores += whole; runCores += whole;
  stats.cores += whole;
  return whole;
}
function metaCost(u, lv) { return Math.round(u.base * Math.pow(1.4, lv)); }
function fmtNum(n) {
  if (n >= 1e9) return (n / 1e9).toFixed(1).replace(/\.0$/, "") + "B";
  if (n >= 1e6) return (n / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
  if (n >= 1e4) return (n / 1e3).toFixed(n >= 1e5 ? 0 : 1).replace(/\.0$/, "") + "k";

}

function rollRarity() {
  const shift = Math.min(34, depth * 0.7 + (meta.luck || 0) * 1.8);
  const w = [Math.max(10, 62 - shift), 26 + shift * 0.45, 9 + shift * 0.38, 3 + shift * 0.17];

  for (let i = 0; i < 4; i++) { if (r < w[i]) return i; r -= w[i]; }
  return 0;
}

/* touch: left half joystick; right half tap = slash; on-canvas buttons */
function dashBtnPos() { return { x: cw - 64 * us(), y: ch - 64 * us(), r: 44 * us() }; }
function boltBtnPos() { return { x: cw - 150 * us(), y: ch - 110 * us(), r: 36 * us() }; }
function freezeBtnPos() { return { x: cw - 236 * us(), y: ch - 60 * us(), r: 32 * us() }; }
const touches = {}; // id -> {role, x, y}

canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  touchUI = true;
  audio.unlock();
  for (const t of e.changedTouches) {
    const x = t.clientX, y = t.clientY;
    if (state === "title" || state === "summary") { anyStart(); continue; }
    if (paused) { paused = false; continue; }
    if (state === "boon" || state === "shop" || state === "heat" || state === "stats") { uiClick(x, y); continue; }
    const db = dashBtnPos(), bb = boltBtnPos();
    if (dist(x, y, db.x, db.y) < db.r + 10) {
      touches[t.identifier] = { role: "dash" }; dashBuf = 0.15; continue;
    }
    if (dist(x, y, bb.x, bb.y) < bb.r + 10) {
      touches[t.identifier] = { role: "bolt" }; boltHeld = true; continue;
    }
    const fb = freezeBtnPos();
    if (dist(x, y, fb.x, fb.y) < fb.r + 10) {
      touches[t.identifier] = { role: "freeze" }; freezeBuf = 0.18; continue;
    }
    if (x < cw * 0.45 && joy.id === -1) {
      joy.id = t.identifier; joy.bx = x; joy.by = y; joy.dx = 0; joy.dy = 0;
      touches[t.identifier] = { role: "joy" };
      continue;
    }
    // tap to slash, auto-aim
    touches[t.identifier] = { role: "tap" };
    if (state === "hub" && player && dist(player.x, player.y, HUB.termX, HUB.termY) < HUB.termR + 30) {
      openShop(); continue;
    }
    if (state === "hub" && player && dist(player.x, player.y, HUB.heatX, HUB.heatY) < HUB.heatR + 30) {
      openHeat(); continue;
    }
    if (state === "hub" && player && dist(player.x, player.y, HUB.rackX, HUB.rackY) < HUB.rackR + 30) {
      cycleWeapon(); continue;
    }
    if (state === "hub" && player && dist(player.x, player.y, HUB.statX, HUB.statY) < HUB.statR + 30) {
      openStats(); continue;
    }
    if (player) {
      const tx = s2wX(x), ty = s2wY(y);
      const near = nearestEnemy(player.x, player.y, 420);
      if (near) player.aim = angTo(player.x, player.y, near.x, near.y);
      else player.aim = angTo(player.x, player.y, tx, ty);
      slashBuf = 0.12;
    }
  }
}, { passive: false });
canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.identifier === joy.id) {
      const dx = t.clientX - joy.bx, dy = t.clientY - joy.by;
      const d = Math.hypot(dx, dy), max = 52 * us();
      if (d > max) { joy.bx = t.clientX - dx / d * max; joy.by = t.clientY - dy / d * max; }
      const d2 = Math.min(d, max);
      joy.dx = d < 1 ? 0 : dx / d * (d2 / max);
      joy.dy = d < 1 ? 0 : dy / d * (d2 / max);
    }
  }
}, { passive: false });
function touchEnd(e) {
  e.preventDefault();
  for (const t of e.changedTouches) {
    const info = touches[t.identifier];
    if (info) {
      if (info.role === "joy") { joy.id = -1; joy.dx = 0; joy.dy = 0; }
      if (info.role === "bolt") boltHeld = false;
      delete touches[t.identifier];
    }
  }
}
canvas.addEventListener("touchend", touchEnd, { passive: false });
canvas.addEventListener("touchcancel", touchEnd, { passive: false });

  for (let i = 0; i < n; i++) {
    const a = rand(0, TAU), v = rand(spd * 0.3, spd);
    addPart({
      x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v,
      t: rand(life * 0.5, life), tm: life, col, r: rand(size * 0.5, size),
      drag: 4,
    });
  }
}

  for (let i = 0; i < n; i++) {
    const t = Math.random();
    addPart({
      x: lerp(x1, x2, t), y: lerp(y1, y2, t),
      vx: rand(-40, 40), vy: rand(-40, 40),
      t: rand(0.1, 0.3), tm: 0.3, col, r: rand(1, 2.5), drag: 2,
    });
  }
}

  dnums.push({ x: x + rand(-8, 8), y: y - 10, vy: -64, t: 0.8, txt, col, big: !!big });
}
function shake(amp, t) { shakeA = Math.max(shakeA, amp); shakeT = Math.max(shakeT, t); }
function toast(txt, col) { toasts.push({ txt, col: col || "#5ee6ff", t: 2.2 }); }

/* ---------------- §J PLAYER ---------------- */
function newPlayer() {
  const maxHp = CONFIG.playerHP + meta.hp * 15;
  const dashes = 1 + Math.min(meta.dash || 0, 4); // dash charges capped; extra levels = recharge speed
  return {
    x: CONFIG.arenaW / 2, y: CONFIG.arenaH - 90,
    vx: 0, vy: 0, r: CONFIG.playerR, aim: -Math.PI / 2,
    hp: maxHp, maxHp,
    energy: CONFIG.energyMax, maxEnergy: CONFIG.energyMax,
    slashT: 0, slashCD: 0, slashSide: 1, slashAng: 0,
    slashDur: CONFIG.slashDur, comboN: 0, comboT: 0,
    boltCD: 0,
    dashT: 0, dashCD: 0, dashCharges: dashes, dashMax: dashes,
    dashDX: 0, dashDY: 0,
    ifr: 0, hurtT: 0, trail: [], trailT: 0,
    freezeCD: 0, freezeCDMax: 0, buyCD: 0,
    meleeMul: 1, boltMul: 1, freezeCDMul: 1, frozenBonus: 0, // run-mods (shop items)
    boons: {}, boonPow: {}, boonBest: {},
  };
}
function boonLv(id) { return (player && player.boons[id]) || 0; }
/* rarity-scaled boon power: sum of rarity multipliers across picks of this boon */
function boonPow(id) { return (player && player.boonPow && player.boonPow[id]) || 0; }
function dmgMul() { return 1 + meta.dmg * 0.10; }
function dashRegenMul() { return 1 + 0.05 * Math.max(0, (meta.dash || 0) - 4); }
function meleeDamage() { return CONFIG.meleeDmg * weaponDef().dmgMul * dmgMul() * (1 + boonPow("blade") * 0.35) * player.meleeMul; }
function boltDamage() {
  const splitX = Math.max(0, boonPow("split") - boonLv("split")); // tri-cannon rarity bonus
  return CONFIG.boltDmg * dmgMul() * (1 + boonPow("over") * 0.35) * (1 + splitX * 0.06) * player.boltMul;
}
function critRoll() { return Math.random() < Math.min(0.8, boonPow("crit") * 0.15); }
function meleeRangeNow() { return (CONFIG.meleeRange + Math.min(64, boonPow("arc") * 12)) * weaponDef().rangeMul; }
function meleeArcNow() {
  if (curWeapon === "maul") return TAU; // maul: full 360° slam
  return CONFIG.meleeArc * Math.min(2.4, 1 + boonPow("arc") * 0.35) * weaponDef().arcMul;
}

function applyBoon(id, rar) {
  rar = rar || 0;
  const R = RARITIES[rar];
  player.boons[id] = (player.boons[id] || 0) + 1;
  player.boonPow[id] = (player.boonPow[id] || 0) + R.mul;
  player.boonBest[id] = Math.max(player.boonBest[id] || 0, rar);
  const b = boonById(id);
  toast((rar > 0 ? R.name + " " : "") + b.name + (player.boons[id] > 1 ? " " + "II III".split(" ")[player.boons[id] - 2] : ""), rar > 0 ? R.col : b.col);
  if (id === "wind") { /* passive */ }
  audio.boon();
  burst(player.x, player.y, R.col, 26, 220, 0.7, 3);
}
/* weapon-exclusive boons appear only for the wielded weapon form */
function boonPool() {
  return BOONS.filter((b) => boonLv(b.id) < b.max && (!b.weapon || b.weapon === curWeapon));
}
function rollBoons() {
  const avail = boonPool();
  const out = [];
  const pool = avail.slice();
  while (out.length < 3 && pool.length) {
    const i = Math.floor(Math.random() * pool.length);
    out.push({ b: pool.splice(i, 1)[0], rar: rollRarity() });
  }
  return out;
}
function pickBoon(i) {
  if (i < 0 || i >= boonChoices.length) return;
  applyBoon(boonChoices[i].b.id, boonChoices[i].rar);
  boonChoices = [];
  if (boonReturnToPlay) { boonReturnToPlay = false; state = "play"; return; } // bought at shop
  if (boonFromStart) { boonFromStart = false; nextRoom(); }
  else nextRoom();
}
function rerollBoons() {
  if (rerollsLeft <= 0) return;
  rerollsLeft--;
  boonChoices = rollBoons();
  audio.uiSnd();
}

/* ---------------- §K ENEMIES ---------------- */
/* difficulty keeps climbing harder past depth 12 to keep unlimited training honest */
function hpMul() { return (1 + (depth - 1) * 0.17 + Math.max(0, depth - 12) * 0.06) * (1 + 0.2 * (runHeat.ehp || 0)); }
function eDmgMul() { return (1 + (depth - 1) * 0.07 + Math.max(0, depth - 12) * 0.03) * (1 + 0.15 * (runHeat.edmg || 0)); }

const ENEMY_DEFS = {
  chaser:  { r: 14, hp: 30, speed: 116, col: "#ff5577", cost: 1.5 },
  shooter: { r: 13, hp: 26, speed: 88,  col: "#cc66ff", cost: 2.0 },
  tank:    { r: 24, hp: 95, speed: 44,  col: "#ffaa33", cost: 3.5 },
  swarmer: { r: 8,  hp: 10, speed: 178, col: "#66ff88", cost: 0.55 },
  bomber:  { r: 12, hp: 22, speed: 150, col: "#ff8844", cost: 1.8 },  // scuttles in, beeping fuse, AoE blast hurts everyone
  shield:  { r: 17, hp: 60, speed: 70,  col: "#88aaff", cost: 2.8 },  // frontal energy shield blocks bolts & slashes
  medic:   { r: 11, hp: 18, speed: 95,  col: "#66ffcc", cost: 2.2 },  // hovers behind, beam-heals most damaged ally
  phantom: { r: 13, hp: 26, speed: 130, col: "#bb99ff", cost: 2.4 },  // cloaked stalker, decloaks before dash-strike
};

function spawnEnemy(type, x, y) {
  const d = ENEMY_DEFS[type];
  const e = {
    type, x, y, vx: 0, vy: 0, r: d.r,
    hp: d.hp * hpMul(), maxHp: d.hp * hpMul(),
    col: d.col, speed: d.speed * (1 + (depth - 1) * 0.012),
    flash: 0, kbx: 0, kby: 0,
    state: "seek", t: rand(0, 1), cd: rand(0.4, 1.4),
    dirX: 0, dirY: 0, phase: rand(0, TAU), strafe: Math.random() < 0.5 ? 1 : -1,
    contactCD: 0, spawnT: 0.25, frozenT: 0,
    burnT: 0, burnStacks: 0, burnDps: 0, burnTick: 0, shockT: 0, sdCD: 0,
    shieldA: 0, exposeT: 0, healTgt: null, beeped: false, elite: false,
  };
  if (type === "shield") e.shieldA = player ? angTo(x, y, player.x, player.y) : -Math.PI / 2;
  if (type === "phantom") e.state = "cloak";
  if (eliteRoom && !eliteSpawned && type !== "swarmer" && type !== "medic") {
    eliteSpawned = true;
    e.elite = true;
    e.r = Math.round(e.r * 1.25);
    e.hp *= 2.6; e.maxHp *= 2.6;
    e.speed *= 1.08;
  }
  enemies.push(e);
  burst(x, y, d.col, e.elite ? 18 : 10, 160, 0.4, 2.5);
  if (e.elite) toast("ELITE — 精英出现", "#ffcc44");
  return e;
}

/* boss roster: rotated/randomized each boss room; depth 18+ spawns hard variants */
const BOSS_KINDS = [
  { kind: "warden",    name: "THE WARDEN",    col: "#ff3366", r: 44, hp: 420, speed: 60 },
  { kind: "summoner",  name: "VOIDCALLER",    col: "#bb66ff", r: 36, hp: 360, speed: 72 },
  { kind: "artillery", name: "LANCE-7",       col: "#ff8833", r: 38, hp: 380, speed: 55 },
  { kind: "splitter",  name: "MITOSIS PRIME", col: "#66ff88", r: 52, hp: 470, speed: 50 },
];

function spawnBoss(forceKind) {
  const tier = Math.floor(depth / CONFIG.bossEvery);
  const hard = depth >= 18;
  let def = forceKind ? BOSS_KINDS.find((b) => b.kind === forceKind) : null;
  if (!def) {
    const pool = BOSS_KINDS.filter((b) => b.kind !== lastBossKind);
    def = pick(pool.length ? pool : BOSS_KINDS);
  }
  lastBossKind = def.kind;
  const hp = Math.round(def.hp * (1 + (tier - 1) * 0.75) * (hard ? 1.25 : 1));
  boss = {
    type: "boss", kind: def.kind, name: def.name,
    x: CONFIG.arenaW / 2, y: 150, vx: 0, vy: 0, r: def.r,
    hp, maxHp: hp,
    col: def.col, speed: def.speed + tier * 6,
    flash: 0, kbx: 0, kby: 0,
    state: "move", t: 0, cd: 1.6, atk: 0,
    dirX: 0, dirY: 0, phase: 0, sub: 0, rot: 0,
    contactCD: 0, spawnT: 0.4, tier, hard, gen: 0, frozenT: 0,
    burnT: 0, burnStacks: 0, burnDps: 0, burnTick: 0, shockT: 0, sdCD: 0, enraged: false,
    strafe: Math.random() < 0.5 ? 1 : -1, tx: 0, ty: 0,
  };
  bossName = def.name; bossBarMax = hp;
  enemies.push(boss);
  audio.bossRoar(def.kind);
  shake(10, 0.5);
  bossWarnT = 2.0;
}

/* Splitter: at 50% HP it divides into two smaller copies (each splits once more) */
function splitBoss(e) {
  const childHp = Math.max(1, e.hp / 2);
  for (let i = 0; i < 2; i++) {
    const a = rand(0, TAU);
    enemies.push({
      type: "boss", kind: "splitter", name: e.name,
      x: clamp(e.x + Math.cos(a) * (e.r + 14), 60, CONFIG.arenaW - 60),
      y: clamp(e.y + Math.sin(a) * (e.r + 14), 60, CONFIG.arenaH - 60),
      vx: Math.cos(a) * 160, vy: Math.sin(a) * 160,
      r: Math.max(16, e.r * 0.72),
      hp: childHp, maxHp: childHp,
      col: e.col, speed: e.speed * 1.3,
      flash: 0, kbx: 0, kby: 0,
      state: "move", t: 0, cd: rand(0.8, 1.3), atk: 0,
      dirX: 0, dirY: 0, phase: rand(0, TAU), sub: 0, rot: rand(0, TAU),
      contactCD: 0, spawnT: 0.2, tier: e.tier, hard: e.hard,
      gen: e.gen + 1, frozenT: 0, strafe: 1, tx: 0, ty: 0,
      burnT: 0, burnStacks: 0, burnDps: 0, burnTick: 0, shockT: 0, sdCD: 0, enraged: false,
    });
  }
  burst(e.x, e.y, e.col, 36, 320, 0.8, 4);
  audio.bossRoar("splitter");
  shake(9, 0.4);
  toast("IT SPLITS!", e.col);
  e.hp = -1;
  if (e === boss) boss = null;
}

function nearestEnemy(x, y, maxD) {
  let bestE = null, bd = maxD || 1e9;
  for (const e of enemies) {
    if (e.hp <= 0) continue;
    const d = dist(x, y, e.x, e.y);
    if (d < bd) { bd = d; bestE = e; }
  }
  return bestE;
}

function hitEnemy(e, dmg, kx, ky, isCrit, melee) {
  if (e.hp <= 0) return;
  let mul = isCrit ? 2.5 : 1;
  if (e.frozenT > 0) { // shatter: frozen targets take bonus damage
    mul *= 1.3 + 0.4 * boonPow("shatter") + (player ? player.frozenBonus : 0);
    burst(e.x, e.y, "#cfeeff", 10, 230, 0.45, 3);
    audio.shatter();
  }
  const final = Math.round(dmg * mul);
  e.hp -= final;
  e.flash = 0.12;
  if (e.type === "phantom" && e.state === "cloak") { e.state = "recover"; e.t = 1.0; } // tagging a phantom rips its cloak
  const kbScale = e.type === "boss" ? 0.12 : (e.type === "tank" ? 0.3 : 1);
  e.kbx += kx * kbScale; e.kby += ky * kbScale;
  dnum(e.x, e.y - e.r, String(final), isCrit ? "#ffee55" : "#ffffff", isCrit);
  burst(e.x, e.y, e.col, isCrit ? 12 : 6, 180, 0.4, 2.5);
  audio.hit(isCrit);
  if (melee) {
    freezeT = Math.max(freezeT, CONFIG.hitStop);
    if (boonLv("steal")) {
      player.hp = Math.min(player.maxHp, player.hp + Math.max(1, Math.round(boonPow("steal"))));
    }
  }
  if (e.hp <= 0) killEnemy(e);
}

/* ---------------- §K2 ELEMENTAL STATUS (burn / shock / combos) ---------------- */
/* lightweight damage path for DoTs/AoEs: no knockback, no hit SFX spam */
function statusDamage(e, dmg, col) {
  if (e.hp <= 0) return;
  const final = Math.max(1, Math.round(dmg));
  e.hp -= final;
  e.flash = Math.max(e.flash, 0.05);
  dnum(e.x, e.y - e.r, String(final), col, false);
  if (e.hp <= 0) killEnemy(e);
}

function applyBurn(e, dps) {
  if (!e || e.hp <= 0) return;
  if (e.frozenT > 0) { thermalSnap(e); return; } // BURN + FREEZE combo
  e.burnStacks = Math.min(3, (e.burnStacks || 0) + 1);
  e.burnDps = Math.max(e.burnDps || 0, dps);
  e.burnT = e.type === "boss" ? CONFIG.burnDur * 0.5 : CONFIG.burnDur;
  if (!(e.burnTick > 0)) e.burnTick = 0.5;
  if (Math.random() < 0.6) audio.burnCrackle();
}

function applyShock(e, dmg, chains) {
  if (!e || e.hp <= 0) return;
  if (e.frozenT > 0) { shatterCombo(e); return; } // FREEZE + SHOCK combo
  e.shockT = Math.max(e.shockT || 0, e.type === "boss" ? CONFIG.shockStun * 0.4 : CONFIG.shockStun);
  sparkLine(e.x - e.r, e.y - e.r, e.x + e.r, e.y + e.r, "#ffee55", 5);
  audio.shockZap();
  statusDamage(e, dmg, "#ffee55");
  if (chains > 0) {
    const cands = [];
    for (const o of enemies) {
      if (o === e || o.hp <= 0 || (o.shockT || 0) > 0) continue;
      const dd = dist(e.x, e.y, o.x, o.y);
      if (dd < 170) cands.push([dd, o]);
    }
    cands.sort((a, b) => a[0] - b[0]);
    for (let i = 0; i < Math.min(2, cands.length); i++) {
      const o = cands[i][1];
      beams.push({ x1: e.x, y1: e.y, x2: o.x, y2: o.y, t: 0.18, col: "#ffee55" });
      applyShock(o, dmg * 0.7, chains - 1);
    }
  }
}

/* FREEZE + SHOCK = SHATTER: burst damage, consumes both statuses */
function shatterCombo(e) {
  e.frozenT = 0; e.shockT = 0;
  burst(e.x, e.y, "#cfeeff", 22, 300, 0.6, 3.5);
  dnum(e.x, e.y - e.r - 14, "SHATTER", "#cfeeff", true);
  audio.shatter();
  shake(4, 0.15);
  statusDamage(e, (30 + depth * 2.5) * dmgMul(), "#cfeeff");
}

/* BURN + FREEZE = THERMAL SNAP: small AoE, consumes both statuses */
function thermalSnap(e) {
  e.burnT = 0; e.burnStacks = 0; e.burnDps = 0; e.frozenT = 0;
  const R = 90, dmg = (16 + depth * 1.8) * dmgMul();
  burst(e.x, e.y, "#ffaa66", 18, 260, 0.5, 3);
  burst(e.x, e.y, "#ffffff", 8, 180, 0.3, 2);
  dnum(e.x, e.y - e.r - 14, "THERMAL SNAP", "#ffaa66", true);
  audio.comboSnap();
  shake(4, 0.15);
  const ex = e.x, ey = e.y;
  for (const o of enemies) {
    if (o.hp <= 0) continue;
    if (dist(ex, ey, o.x, o.y) < R + o.r) statusDamage(o, dmg, "#ffaa66");
  }
}

/* shieldbearer: blocks bolts/slashes arriving from the shield-facing side */
function shieldBlocks(e, fromX, fromY) {
  return e.type === "shield" && e.hp > 0 && e.frozenT <= 0 && (e.shockT || 0) <= 0 &&
    (e.exposeT || 0) <= 0 && e.spawnT <= 0 &&
    Math.abs(angDiff(e.shieldA, angTo(e.x, e.y, fromX, fromY))) < 1.15;
}

/* bomber detonation: hurts the player AND other enemies */
function explodeBomber(e) {
  const R = 95;
  burst(e.x, e.y, "#ff8844", 34, 340, 0.6, 4);
  burst(e.x, e.y, "#ffe0aa", 12, 260, 0.35, 3);
  shake(7, 0.3);
  audio.enemyDie(true);
  if (player && player.hp > 0 && dist(e.x, e.y, player.x, player.y) < R + player.r) {
    damagePlayer(15 * eDmgMul(), angTo(e.x, e.y, player.x, player.y), null);
  }
  const ex = e.x, ey = e.y;
  killEnemy(e);
  for (const o of enemies) {
    if (o === e || o.hp <= 0) continue;
    if (dist(ex, ey, o.x, o.y) < R + o.r) statusDamage(o, 26 + depth * 2, "#ff8844");
  }
  for (const bl of barrels) { // blasts cook off nearby volatile barrels
    if (!bl.dead && bl.fuse < 0 && dist(ex, ey, bl.x, bl.y) < R + bl.r) igniteBarrel(bl, 0.12);
  }
}

/* style meter: chained kills (3.5s window) climb C → B → A → S */
function styleKill() {
  if (state !== "play" || roomClear) return;
  styleN++;
  styleT = 3.5;
  let r = -1;
  for (let i = 0; i < STYLE_RANKS.length; i++) if (styleN >= STYLE_RANKS[i].at) r = i;
  if (r > styleRank) {
    styleRank = r;
    stylePop = 0.45;
    if (r === 3) audio.styleChime(); else audio.styleUp(r);
  }
  if (styleRank > styleBestRoom) styleBestRoom = styleRank;
}

function killEnemy(e) {
  e.hp = -1;
  kills++;
  stats.kills++;
  styleKill();
  const big = e.type === "tank" || e.type === "boss";
  burst(e.x, e.y, e.col, big ? 40 : 18, big ? 320 : 220, 0.8, big ? 4 : 3);
  burst(e.x, e.y, "#ffffff", 8, 260, 0.3, 2);
  audio.enemyDie(big);
  freezeT = Math.max(freezeT, e.type === "boss" ? 0.16 : CONFIG.killStop * 1.35);
  shake(big ? 9 : 4, big ? 0.4 : 0.18);
  // execution pulse: the LAST enemy of a combat room dies in slow motion
  if (state === "play" && !roomClear && waveIdx >= waves.length && spawnQ.length === 0 &&
      (roomType === "normal" || roomType === "challenge" || roomType === "boss")) {
    let alive = 0;
    for (const o of enemies) if (o !== e && o.hp > 0) alive++;
    if (alive === 0) slowmoT = 0.5;
  }
  if (boonLv("reset")) {
    player.dashCharges = Math.min(player.dashMax, player.dashCharges + 1);
    player.dashCD = 0;
    // rarity bonus: above-common KILL DRIVE also refunds a little energy
    const xPow = Math.max(0, boonPow("reset") - 1);
    if (xPow > 0) player.energy = Math.min(player.maxEnergy, player.energy + 6 * xPow);
  }
  // core drops (splitter fragments drop a share each)
  let n = e.type === "boss" ? (e.gen ? randi(3, 5) : randi(14, 18)) : e.type === "tank" ? randi(2, 4) : (Math.random() < 0.4 ? 1 : 0);
  if (e.elite) n += randi(3, 5);
  while (n-- > 0) {
    pickups.push({ kind: "core", x: e.x, y: e.y, vx: rand(-120, 120), vy: rand(-120, 120), t: 12 });
  }
  if (Math.random() < 0.06 && e.type !== "boss") {
    pickups.push({ kind: "hp", x: e.x, y: e.y, vx: rand(-80, 80), vy: rand(-80, 80), t: 12 });
  }
  if (e === boss) boss = null;
}

function damagePlayer(d, ang, attacker) {
  if (!player || player.hp <= 0) return;
  if (player.ifr > 0 || player.hurtT > 0) return;
  if (boonLv("thorn") && attacker && attacker.hp > 0) {
    hitEnemy(attacker, Math.round(9 * boonPow("thorn")), Math.cos(ang) * 120, Math.sin(ang) * 120, false, false);
  }
  player.hp -= d;
  player.hurtT = CONFIG.hurtIfr;
  player.vx += Math.cos(ang) * 220;
  player.vy += Math.sin(ang) * 220;
  redFlash = 0.35;
  shake(7, 0.3);
  burst(player.x, player.y, "#ff4455", 16, 240, 0.5, 3);
  dnum(player.x, player.y - 18, String(Math.round(d)), "#ff5566", false);
  audio.hurt();
  if (player.hp <= 0) {
    player.hp = 0;
    playerDie();
  }
}

function playerDie() {
  burst(player.x, player.y, "#5ee6ff", 60, 380, 1.2, 4);
  burst(player.x, player.y, "#ffffff", 24, 280, 0.6, 3);
  audio.death();
  shake(14, 0.7);
  if (depth > best) { best = depth; }
  if (depth > stats.deepest) stats.deepest = depth;
  saveMeta();
  saveStats();
  state = "summary";
}

/* ---------------- §L BULLETS / ZONES ---------------- */
function firePlayerBolt() {
  const n = 1 + boonLv("split") * 2;
  const spread = 0.2;
  for (let i = 0; i < n; i++) {
    const off = n === 1 ? 0 : (i - (n - 1) / 2) * spread;
    const a = player.aim + off;
    pbolts.push({
      x: player.x + Math.cos(a) * 16, y: player.y + Math.sin(a) * 16,
      vx: Math.cos(a) * CONFIG.boltSpeed, vy: Math.sin(a) * CONFIG.boltSpeed,
      r: 5, t: 1.6, pierce: Math.round(boonPow("pierce") * 2), hitSet: [],
    });
  }
  audio.bolt();
  burst(player.x + Math.cos(player.aim) * 18, player.y + Math.sin(player.aim) * 18, "#ff66ee", 5, 120, 0.2, 2);
}

function fireEbolt(x, y, a, spd, dmg, col, r) {
  const slow = 1 - Math.min(0.6, 0.25 * boonPow("slow"));
  ebolts.push({
    x, y, vx: Math.cos(a) * spd * slow, vy: Math.sin(a) * spd * slow,
    r: r || 6, t: 5, dmg: dmg * eDmgMul(), col: col || "#ff5577",
  });
}

function addZone(x, y) {
  zones.push({ x, y, r: 26, t: 1.5, tick: 0 });
}

/* ---------------- §M ROOMS / GEN ---------------- */
function isBossDepth(d) { return d > 0 && d % CONFIG.bossEvery === 0; }

function genPillars(n) {
  pillars = [];
  const A = CONFIG;
  let tries = 0;
  while (pillars.length < n && tries++ < 200) {
    const r = rand(26, 46);
    const x = rand(r + 70, A.arenaW - r - 70);
    const y = rand(r + 90, A.arenaH - r - 90);
    if (dist(x, y, A.arenaW / 2, A.arenaH - 90) < r + 120) continue; // player spawn
    if (dist(x, y, A.arenaW / 2, 150) < r + 110) continue;           // top spawn
    let ok = true;
    for (const p of pillars) if (dist(x, y, p.x, p.y) < r + p.r + 80) ok = false;
    if (ok) pillars.push({ x, y, r, hue: pick(["#223a66", "#2a2a55", "#1d3355"]) });
  }
}

function buildWaves(d) {
  waves = [];
  const nWaves = d <= 1 ? 1 : clamp(1 + randi(0, Math.min(2, Math.floor(d / 2))), 1, 3);
  for (let w = 0; w < nWaves; w++) {
    let budget = 2.6 + d * 1.25 + w * 1.1;
    const wave = [];
    const types = ["chaser", "swarmer"];
    if (d >= 2) types.push("shooter");
    if (d >= 3) types.push("bomber");
    if (d >= 4) types.push("tank");
    if (d >= 5) types.push("shield");
    if (d >= 6) types.push("medic");
    if (d >= 7) types.push("phantom");
    let guard = 0;
    while (budget > 0.5 && guard++ < 40) {
      const t = pick(types);
      const def = ENEMY_DEFS[t];
      if (def.cost > budget + 0.3) continue;
      if (t === "medic" && wave.indexOf("medic") !== -1) continue; // one medic per wave
      if (t === "swarmer") {
        const pack = randi(3, 5);
        for (let i = 0; i < pack; i++) wave.push("swarmer");
        budget -= def.cost * pack;
      } else {
        wave.push(t);
        budget -= def.cost;
      }
    }
    if (!wave.length) wave.push("chaser");
    waves.push(wave);
  }
}

function queueWave(list) {
  eliteSpawned = false; // one elite per wave in elite rooms
  let cx = rand(180, CONFIG.arenaW - 180), cy = rand(140, CONFIG.arenaH - 200);
  for (const type of list) {
    let x = 0, y = 0, tries = 0, ok = false;
    while (tries++ < 30 && !ok) {
      x = clamp(cx + rand(-220, 220), 60, CONFIG.arenaW - 60);
      y = clamp(cy + rand(-180, 180), 70, CONFIG.arenaH - 70);
      ok = dist(x, y, player.x, player.y) > 170;
      for (const p of pillars) if (dist(x, y, p.x, p.y) < p.r + 30) ok = false;
    }
    spawnQ.push({ type, x, y, t: rand(0.7, 1.1) });
    if (Math.random() < 0.35) { cx = rand(180, CONFIG.arenaW - 180); cy = rand(140, CONFIG.arenaH - 200); }
  }
}

/* ---------------- §M1b ENVIRONMENTAL HAZARDS ---------------- */
/* spike traps (rhythmic, hurt EVERYONE), laser fences (blink on/off, block+zap),
   volatile barrels (shoot/slash to detonate; chain reactions). depth-gated, sparing. */
function hazardSpotOk(x, y, r) {
  if (dist(x, y, CONFIG.arenaW / 2, CONFIG.arenaH - 90) < r + 130) return false; // player spawn
  if (dist(x, y, CONFIG.arenaW / 2, 150) < r + 100) return false;               // top spawn area
  if (y < 90 || y > CONFIG.arenaH - 70 || x < 70 || x > CONFIG.arenaW - 70) return false;
  if (pointInPillar(x, y, r + 14)) return false;
  for (const h of hazards) {
    if (h.kind === "spike" && dist(x, y, h.x, h.y) < r + 110) return false;
    if (h.kind === "fence" && (dist(x, y, h.x1, h.y1) < r + 80 || dist(x, y, h.x2, h.y2) < r + 80)) return false;
  }
  for (const b of barrels) if (dist(x, y, b.x, b.y) < r + 90) return false;
  return true;
}
function addSpike(x, y) {
  hazards.push({ kind: "spike", x, y, s: 24, t: rand(0, 2.6), period: 2.6, warn: 0.55, up: 0.8 });
}
function addFence(x1, y1, x2, y2) {
  hazards.push({ kind: "fence", x1, y1, x2, y2, t: rand(0, 3.4), period: 3.4, warn: 0.5, on: 1.5 });
}
function addBarrel(x, y) {
  barrels.push({ x, y, r: 13, fuse: -1, dead: false });
}
function spikeActive(h) { return h.t >= h.warn && h.t < h.warn + h.up; }
function spikeWarning(h) { return h.t < h.warn; }
function fenceOn(h) { return h.t >= h.period - h.on; }
function fenceWarn(h) { return h.t >= h.period - h.on - h.warn && h.t < h.period - h.on; }

function spawnHazards(bossArena) {
  let nB = 0;
  if (bossArena) {
    nB = randi(1, 2); // bosses' arenas get barrels only
  } else {
    if (depth >= 3 && Math.random() < 0.45) {
      const n = randi(1, 2);
      for (let i = 0; i < n; i++) {
        for (let tries = 0; tries < 24; tries++) {
          const x = rand(120, CONFIG.arenaW - 120), y = rand(120, CONFIG.arenaH - 150);
          if (hazardSpotOk(x, y, 34)) { addSpike(x, y); break; }
        }
      }
    }
    if (depth >= 5 && Math.random() < 0.3) {
      for (let tries = 0; tries < 24; tries++) {
        const x = rand(170, CONFIG.arenaW - 170), y = rand(140, CONFIG.arenaH - 190);
        const len = rand(110, 170);
        const horiz = Math.random() < 0.5;
        const x2 = horiz ? x + len : x, y2 = horiz ? y : y + len;
        if (hazardSpotOk(x, y, 26) && hazardSpotOk(x2, y2, 26) && hazardSpotOk((x + x2) / 2, (y + y2) / 2, 26)) {
          addFence(x, y, x2, y2);
          break;
        }
      }
    }
    if (depth >= 2 && Math.random() < 0.5) nB = randi(1, 2);
  }
  for (let i = 0; i < nB; i++) {
    for (let tries = 0; tries < 24; tries++) {
      const x = rand(110, CONFIG.arenaW - 110), y = rand(110, CONFIG.arenaH - 140);
      if (hazardSpotOk(x, y, 26)) { addBarrel(x, y); break; }
    }
  }
}

function segDist(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const L2 = dx * dx + dy * dy;
  const t = L2 > 0 ? clamp(((px - x1) * dx + (py - y1) * dy) / L2, 0, 1) : 0;
  const cx = x1 + dx * t, cy = y1 + dy * t;
  return { d: dist(px, py, cx, cy), cx, cy };
}
function pushFromSeg(o, sd, min) {
  if (sd.d < 0.01) return;
  const nx = (o.x - sd.cx) / sd.d, ny = (o.y - sd.cy) / sd.d;
  o.x = sd.cx + nx * min; o.y = sd.cy + ny * min;
  const dot = o.vx * nx + o.vy * ny;
  if (dot < 0) { o.vx -= nx * dot; o.vy -= ny * dot; }
}
function igniteBarrel(b, fuse) {
  if (b.dead || b.fuse >= 0) return;
  b.fuse = fuse;
  audio.bombBeep();
}
function explodeBarrel(b) {
  if (b.dead) return;
  b.dead = true;
  const R = 110;
  burst(b.x, b.y, "#ffb050", 30, 340, 0.6, 4);
  burst(b.x, b.y, "#ffe6c0", 12, 240, 0.35, 3);
  shake(7, 0.3);
  audio.barrelBoom();
  if (player && player.hp > 0 && dist(b.x, b.y, player.x, player.y) < R + player.r) {
    damagePlayer(14 * eDmgMul(), angTo(b.x, b.y, player.x, player.y), null);
  }
  for (const e of enemies) {
    if (e.hp <= 0 || dist(b.x, b.y, e.x, e.y) >= R + e.r) continue;
    const a = angTo(b.x, b.y, e.x, e.y);
    e.kbx += Math.cos(a) * 300; e.kby += Math.sin(a) * 300;
    statusDamage(e, 30 + depth * 2.2, "#ffb050");
  }
  for (const o of barrels) { // chain reaction
    if (o !== b && !o.dead && o.fuse < 0 && dist(b.x, b.y, o.x, o.y) < R + o.r) igniteBarrel(o, 0.16);
  }
}

function updateHazards(dt) {
  for (const h of hazards) {
    h.t += dt;
    if (h.t >= h.period) h.t -= h.period;
    if (h.kind === "spike") {
      if (!spikeActive(h)) continue;
      if (player && player.hp > 0 &&
          Math.abs(player.x - h.x) < h.s + player.r * 0.4 && Math.abs(player.y - h.y) < h.s + player.r * 0.4) {
        damagePlayer(10 * eDmgMul(), angTo(h.x, h.y, player.x + rand(-1, 1), player.y + rand(-1, 1)), null);
      }
      for (const e of enemies) {
        if (e.hp <= 0 || e.spawnT > 0 || (e.hazCD || 0) > 0) continue;
        if (Math.abs(e.x - h.x) < h.s && Math.abs(e.y - h.y) < h.s) {
          e.hazCD = 0.55;
          statusDamage(e, 14 + depth * 1.6, "#ff7755");
          audio.spikeSnd();
        }
      }
    } else if (h.kind === "fence") {
      if (!fenceOn(h)) continue;
      if (player && player.hp > 0) {
        const sd = segDist(player.x, player.y, h.x1, h.y1, h.x2, h.y2);
        if (sd.d < 7 + player.r) {
          damagePlayer(9 * eDmgMul(), angTo(sd.cx, sd.cy, player.x, player.y), null);
          pushFromSeg(player, sd, 7 + player.r);
        }
      }
      for (const e of enemies) {
        if (e.hp <= 0 || e.spawnT > 0) continue;
        const sd = segDist(e.x, e.y, h.x1, h.y1, h.x2, h.y2);
        if (sd.d < 7 + e.r) {
          if ((e.hazCD || 0) <= 0) { e.hazCD = 0.55; statusDamage(e, 10 + depth * 1.4, "#ff5577"); audio.fenceZap(); }
          pushFromSeg(e, sd, 7 + e.r);
        }
      }
    }
  }
  for (const b of barrels) {
    if (b.dead || b.fuse < 0) continue;
    b.fuse -= dt;
    if (b.fuse <= 0) explodeBarrel(b);
  }
  barrels = barrels.filter((b) => !b.dead);
  // AFTERSHOCK quake rings
  for (const q of quakes) {
    q.t -= dt; q.tick -= dt;
    if (q.tick <= 0) {
      q.tick = 0.25;
      for (const e of enemies) {
        if (e.hp > 0 && dist(q.x, q.y, e.x, e.y) < q.r + e.r) statusDamage(e, q.dps * 0.25, "#ff9966");
      }
      addPart({ x: q.x + rand(-q.r, q.r) * 0.8, y: q.y + rand(-q.r, q.r) * 0.8, vx: 0, vy: -30, t: 0.35, tm: 0.35, col: "#ff9966", r: rand(1.5, 3), drag: 1 });
    }
  }
  quakes = quakes.filter((q) => q.t > 0);
  // melee swing trail afterimages
  for (const g of slashGhosts) g.t -= dt;
  slashGhosts = slashGhosts.filter((g) => g.t > 0);
}

function genRoom() {
  enemies = []; pbolts = []; ebolts = []; doors = []; spawnQ = []; zones = []; beams = [];
  pickups = []; mortars = []; novas = []; pedestals = []; boss = null;
  hazards = []; barrels = []; quakes = []; slashGhosts = [];
  styleN = 0; styleT = 0; styleRank = -1; styleBestRoom = -1; stylePop = 0;
  coreFloatN = 0; coreFloatT = 0;
  roomClear = false; waveIdx = 0; shopRoom = false;
  challengeT = 0; challengeFailed = false; fountainUsed = false;
  eliteRoom = false; eliteSpawned = false;
  roomType = pendingRoom || (isBossDepth(depth) ? "boss" : "normal");
  pendingRoom = null;
  runTrack[depth] = roomType;
  player.x = CONFIG.arenaW / 2; player.y = CONFIG.arenaH - 90;
  player.vx = 0; player.vy = 0;
  roomFade = 1;
  if (roomType === "shop") {
    // Charon-style shop room: combat-free, pedestals priced in cores
    shopRoom = true;
    lastShopDepth = depth;
    lastSpecialDepth = depth;
    pillars = [];
    waves = [];
    pedestals = makeShopStock();
    roomClear = true;
    openDoors(true);
    toast("PROVISIONER — 商店 — spend cores on wares", "#ffd966");
  } else if (roomType === "treasure") {
    // combat-free cache: take ONE of the offerings, free
    lastSpecialDepth = depth;
    pillars = [];
    waves = [];
    pedestals = makeTreasureStock();
    roomClear = true;
    openDoors(true);
    toast("CACHE — 宝藏：任选其一 — take ONE, free", "#cc88ff");
  } else if (roomType === "fountain") {
    // combat-free rest stop: approach the spring to heal 30%
    lastFountainDepth = depth;
    lastSpecialDepth = depth;
    pillars = [];
    waves = [];
    roomClear = true;
    openDoors(true);
    toast("REST SITE — 泉水：靠近回复30%生命 — approach to heal 30%", "#66ffe0");
  } else if (roomType === "boss") {
    genPillars(randi(0, 2));
    spawnHazards(true); // barrels only in boss arenas
    waves = [["boss"]];
    spawnBoss();
    waveIdx = 1;
  } else {
    genPillars(randi(2, 5));
    spawnHazards(false);
    buildWaves(depth);
    if (roomType === "challenge") {
      // timed gauntlet: denser waves, double cores if cleared in time
      if (waves.length < 2) waves.push(waves[0].slice());
      challengeT = CONFIG.challengeTime;
      toast("CHALLENGE — " + CONFIG.challengeTime + "s 限时双倍奖励 — clear in time for 2x cores", "#ffee55");
    }
    eliteRoom = depth >= 3 && Math.random() < (runHeat.elite ? 0.45 : 0.12);
    queueWave(waves[0]);
    waveIdx = 1;
  }
}

function nextRoom() {
  depth++;
  if (depth > best) { best = depth; saveMeta(); }
  if (depth > stats.deepest) stats.deepest = depth;
  state = "play";
  genRoom();
  audio.door();
}

const DOOR_REWARDS = {
  boon:      { col: "#5ee6ff", label: "BOON" },
  hp:        { col: "#ff6677", label: "+MAX HP" },
  energy:    { col: "#ff66ee", label: "+ENERGY" },
  cores:     { col: "#ffcc44", label: "CORES" },
  shop:      { col: "#ffd966", label: "SHOP" },
  challenge: { col: "#ffee55", label: "CHALLENGE" },
  treasure:  { col: "#cc88ff", label: "TREASURE" },
  fountain:  { col: "#66ffe0", label: "FOUNTAIN" },
};
const SPECIAL_ROOMS = ["shop", "treasure", "fountain"]; // combat-free rooms

function openDoors(quiet) {
  const A = CONFIG;
  const n = randi(2, 3);
  const nextD = depth + 1;
  const rewards = [];
  // slot 0 is ALWAYS a combat door — a fight is always available
  rewards.push(Math.random() < 0.6 ? "boon" : pick(["hp", "energy", "cores"]));
  const others = ["boon", "hp", "energy", "cores"].filter((r) => r !== rewards[0]);
  while (rewards.length < n) {
    const r = pick(others);
    others.splice(others.indexOf(r), 1);
    rewards.push(r);
  }
  // CHALLENGE: optional timed gauntlet door (still a combat room)
  if (n > 1 && depth >= 2 && !isBossDepth(nextD) && roomType !== "challenge" && Math.random() < 0.22) {
    rewards[1] = "challenge";
  }
  // at most ONE special (combat-free) room per door set, never twice in a row
  const inSpecial = SPECIAL_ROOMS.indexOf(roomType) !== -1;
  if (!inSpecial && !isBossDepth(nextD) && nextD - lastSpecialDepth >= 2) {
    if (nextD - lastShopDepth >= 4 && (nextD - lastShopDepth >= 5 || Math.random() < 0.55)) {
      // SHOP door every ~4-5 depths
      rewards[rewards.length - 1] = "shop";
    } else if (nextD - lastFountainDepth >= 6 && (nextD - lastFountainDepth >= 7 || Math.random() < 0.6)) {
      // FOUNTAIN rest stop every ~6-7 depths, offset from shops
      rewards[rewards.length - 1] = "fountain";
    } else if (Math.random() < 0.12) {
      rewards[rewards.length - 1] = "treasure";
    }
  }
  const spacing = A.arenaW / (n + 1);
  for (let i = 0; i < n; i++) {
    doors.push({
      x: spacing * (i + 1), y: A.wall + 16, w: 96, h: 34,
      reward: rewards[i], openT: 0,
      bossNext: isBossDepth(depth + 1),
    });
  }
  audio.door();
  if (!quiet) toast("ROOM CLEAR — CHOOSE A DOOR", "#5ee6ff");
}

function enterDoor(d) {
  const r = d.reward;
  if (r === "hp") {
    player.maxHp += 12; player.hp = Math.min(player.maxHp, player.hp + 24);
    toast("+12 MAX HP", "#ff6677"); audio.boon();
    nextRoom();
  } else if (r === "energy") {
    player.maxEnergy += 14; player.energy = player.maxEnergy;
    toast("+14 MAX ENERGY", "#ff66ee"); audio.boon();
    nextRoom();
  } else if (r === "cores") {
    const n = coreGain(8 + depth * 3);
    saveMeta();
    toast("+" + n + " CORES", "#ffcc44"); audio.pickupSnd();
    nextRoom();
  } else if (r === "shop" || r === "treasure" || r === "fountain" || r === "challenge") {
    pendingRoom = r;
    nextRoom();
  } else {
    boonChoices = rollBoons();
    if (boonChoices.length) state = "boon";
    else nextRoom();
  }
}

/* ---------------- §M2 IN-RUN SHOP (Charon style) ---------------- */
const SHOP_ITEMS = [
  { id: "heal",  name: "REPAIR KIT",     desc: "heal 40% HP",                col: "#66ff99", glyph: "+", price: () => 18 + Math.floor(depth * 1.6) },
  { id: "maxhp", name: "HULL PLATING",   desc: "+20 max HP this run",        col: "#ff6677", glyph: "▣", price: () => 26 + Math.floor(depth * 1.8) },
  { id: "boon",  name: "PROTOCOL CACHE", desc: "gain a random boon",         col: "#5ee6ff", glyph: "◆", price: () => 34 + Math.floor(depth * 2) },
  { id: "dash",  name: "AUX CELL",       desc: "+1 dash charge this run",    col: "#5ee6ff", glyph: "»", price: () => 32 + Math.floor(depth * 2) },
  { id: "fcd",   name: "CRYO CAPACITOR", desc: "freeze cooldown -25%",       col: "#aaeeff", glyph: "❄", price: () => 24 + Math.floor(depth * 1.6) },
  { id: "fdmg",  name: "SHATTER EDGE",   desc: "frozen foes take +40% dmg",  col: "#aaeeff", glyph: "✸", price: () => 24 + Math.floor(depth * 1.6) },
  { id: "bolt",  name: "BOLT AMP",       desc: "+25% bolt damage this run",  col: "#ff66ee", glyph: "⚡", price: () => 28 + Math.floor(depth * 1.8) },
  { id: "melee", name: "EDGE AMP",       desc: "+25% melee damage this run", col: "#66ffff", glyph: "▲", price: () => 28 + Math.floor(depth * 1.8) },
];

function makeShopStock() {
  const pool = SHOP_ITEMS.slice();
  const n = randi(3, 4);
  const out = [];
  while (out.length < n && pool.length) {
    out.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  }
  // INFLATION heat contract: shop prices +50%
  const inf = 1 + 0.5 * (runHeat.shopUp || 0);
  return out.map((it, i) => ({
    x: CONFIG.arenaW * (i + 1) / (out.length + 1),
    y: CONFIG.arenaH * 0.52,
    item: it, price: Math.round(it.price() * inf), sold: false,
  }));
}

/* TREASURE room: combat-free, exactly one free pick */
const TREASURE_ITEMS = [
  { id: "tcores", name: "CORE CACHE",     desc: "a stash of cores",    col: "#ffcc44", glyph: "◆" },
  { id: "theal",  name: "NANO SALVE",     desc: "heal 40% HP",         col: "#66ff99", glyph: "+" },
  { id: "tboon",  name: "PROTOCOL SHARD", desc: "gain a random boon",  col: "#5ee6ff", glyph: "◇" },
];
function makeTreasureStock() {
  return TREASURE_ITEMS.map((it, i) => ({
    x: CONFIG.arenaW * (i + 1) / (TREASURE_ITEMS.length + 1),
    y: CONFIG.arenaH * 0.52,
    item: it, price: 0, sold: false,
  }));
}

function pedestalUnder() {
  if (!player) return null;
  for (const pd of pedestals) {
    if (!pd.sold && dist(player.x, player.y, pd.x, pd.y) < 36) return pd;
  }
  return null;
}

function tryBuyPedestal(pd) {
  const p = player;
  if (p.buyCD > 0) return;
  p.buyCD = 0.35;
  if (pd.price > 0 && cores < pd.price) { audio.deny(); toast("NOT ENOUGH CORES", "#ff5566"); return; }
  cores -= pd.price;
  saveMeta(); // sync spend with persistent store
  pd.sold = true;
  if (roomType === "treasure") for (const pd2 of pedestals) pd2.sold = true; // one free pick only
  applyShopItem(pd.item);
  audio.buy();
  burst(pd.x, pd.y, pd.item.col, 22, 220, 0.6, 3);
  toast(pd.item.name, pd.item.col);
}

function applyShopItem(it) {
  const p = player;
  if (it.id === "heal") p.hp = Math.min(p.maxHp, p.hp + Math.round(p.maxHp * 0.4));
  else if (it.id === "maxhp") { p.maxHp += 20; p.hp += 20; }
  else if (it.id === "boon" || it.id === "tboon") {
    boonChoices = rollBoons().slice(0, 1);
    if (boonChoices.length) { boonReturnToPlay = true; state = "boon"; }
  }
  else if (it.id === "dash") { p.dashMax++; p.dashCharges++; }
  else if (it.id === "fcd") p.freezeCDMul *= 0.75;
  else if (it.id === "fdmg") p.frozenBonus += 0.4;
  else if (it.id === "bolt") p.boltMul += 0.25;
  else if (it.id === "melee") p.meleeMul += 0.25;
  else if (it.id === "tcores") { const g = coreGain(20 + depth * 4); saveMeta(); toast("+" + g + " CORES", "#ffcc44"); }
  else if (it.id === "theal") p.hp = Math.min(p.maxHp, p.hp + Math.round(p.maxHp * 0.4));
}

function startRun() {
