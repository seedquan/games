      }
      ctx.globalAlpha = 1;
    }
    noglow();
    ctx.restore();
  }
  // burn overlay: ember outline + rising smoke (skip if frozen — combo is rare/short)
  if ((e.burnT || 0) > 0 && !frozen) {
    ctx.save();
    const flick = 0.5 + 0.5 * Math.sin(timeNow * 20 + e.phase);
    glow("#ff7733", 8 + flick * 8);
    ctx.strokeStyle = "rgba(255," + Math.round(120 + flick * 80) + ",40,0.85)";
    ctx.lineWidth = 2 + flick;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r + 2, 0, TAU); ctx.stroke();
    noglow();
    if (detail) { // licking flame tongues + smoke
      ctx.fillStyle = "rgba(255,150,40,0.7)";
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * TAU + timeNow * 2;
        const fr = e.r + 3 + flick * 4;
        ctx.beginPath(); ctx.arc(e.x + Math.cos(a) * fr, e.y + Math.sin(a) * fr, 2 + flick * 1.5, 0, TAU); ctx.fill();

      for (let i = 0; i < 2; i++) {
        const ph = (timeNow * 0.8 + i / 2) % 1;
        ctx.globalAlpha = (1 - ph) * 0.3;
        ctx.fillStyle = "#332828";
        ctx.beginPath(); ctx.arc(e.x + Math.sin(i * 3 + timeNow) * 4, e.y - e.r - ph * 20, 3 * ph + 2, 0, TAU); ctx.fill();

      ctx.globalAlpha = 1;
    }
    ctx.restore();
  }
  // shock overlay: crackling arc filaments around the (jittering) sprite
  if ((e.shockT || 0) > 0 && !frozen) {
    ctx.save();
    glow("#ffee55", 10);
    ctx.strokeStyle = "rgba(255,238,90,0.9)";
    ctx.lineWidth = 1.6;
    const nArc = detail ? 3 : 1;
    for (let k = 0; k < nArc; k++) {
      const a0 = rand(0, TAU);
      ctx.beginPath();
      let ax = e.x + Math.cos(a0) * e.r, ay = e.y + Math.sin(a0) * e.r;
      ctx.moveTo(ax, ay);
      for (let s = 0; s < 3; s++) {
        ax += rand(-7, 7); ay += rand(-7, 7);

      }
      ctx.stroke();
    }
    noglow();
    ctx.restore();
  }

  // elite: rotating gold ring
  if (e.elite) {
    ctx.save();
    glow("#ffcc44", 10);
    ctx.strokeStyle = "rgba(255,204,68,0.85)";
    ctx.lineWidth = 2;
    ctx.setLineDash([7, 5]);
    ctx.lineDashOffset = -timeNow * 22;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r + 7, 0, TAU); ctx.stroke();
    ctx.setLineDash([]);
    noglow();
    ctx.restore();
  }
  // enraged boss: pulsing red aura
  if (e.enraged) {
    ctx.save();
    const pl = 0.4 + 0.3 * Math.sin(timeNow * 9);
    glow("#ff3366", 16);
    ctx.strokeStyle = "rgba(255,51,102," + pl + ")";
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r + 14, 0, TAU); ctx.stroke();
    noglow();
    ctx.restore();
  }

  // small hp bar (not boss; boss has top bar)
  if (e.type !== "boss" && e.hp < e.maxHp) {
    const w = e.r * 2;
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(e.x - w / 2, e.y - e.r - 9, w, 3.5);
    ctx.fillStyle = e.col;
    ctx.fillRect(e.x - w / 2, e.y - e.r - 9, w * clamp(e.hp / e.maxHp, 0, 1), 3.5);
  }
  // tiny status icons above afflicted enemies
  if (frozen || (e.burnT || 0) > 0 || (e.shockT || 0) > 0 || (e.poisonT || 0) > 0) {
    const sts = [];
    if (frozen) sts.push(["❄", "#aaeeff"]);
    if ((e.burnT || 0) > 0) sts.push(["❋", "#ff8844"]);
    if ((e.shockT || 0) > 0) sts.push(["↯", "#ffee55"]);
    if ((e.poisonT || 0) > 0) sts.push(["☣", "#7fff5a"]);
    ctx.font = "bold 10px 'Courier New', monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    let sx0 = e.x - (sts.length - 1) * 6;
    const sy0 = e.y - e.r - 17;
    for (const s of sts) {
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(sx0 - 5, sy0 - 5, 10, 10);
      ctx.fillStyle = s[1];
      ctx.fillText(s[0], sx0, sy0 + 1);
      sx0 += 12;
    }
  }
  ctx.restore();
}

/* the held weapon, drawn in the android's lead hand at local coords
   (hand near (hx,hy), aiming +x). Each form is visually distinct & weapon-tinted. */
function drawHeldWeapon(W, hx, hy, recoil, fl, drawAmt) {
  const wc = fl ? "#ffffff" : W.col;
  drawAmt = drawAmt || 0;
  ctx.save();
  ctx.translate(hx, hy);
  glow(wc, 8);
  ctx.fillStyle = wc; ctx.strokeStyle = wc;
  if (W.id === "blade") {
    // single katana-blade
    ctx.lineWidth = 2.5; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-2, 0); ctx.lineTo(16 + recoil * 6, -2); ctx.stroke();
    ctx.fillRect(-3, -1.5, 4, 3); // hilt
  } else if (W.id === "lance") {
    // long spear
    ctx.lineWidth = 2.5; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-4, 0); ctx.lineTo(24 + recoil * 10, 0); ctx.stroke();
    ctx.beginPath(); // spearhead
    ctx.moveTo(24 + recoil * 10, 0); ctx.lineTo(19 + recoil * 10, -3); ctx.lineTo(19 + recoil * 10, 3);
    ctx.closePath(); ctx.fill();
  } else if (W.id === "maul") {
    // heavy maul: shaft + big block head
    ctx.lineWidth = 3; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-3, 0); ctx.lineTo(12 + recoil * 4, 0); ctx.stroke();
    rrect(10 + recoil * 4, -7, 10, 14, 2); ctx.fill();
  } else if (W.id === "fang") {
    // twin daggers fanned
    ctx.lineWidth = 2; ctx.lineCap = "round";
    for (const o of [-3.5, 3.5]) {
      ctx.beginPath(); ctx.moveTo(-1, o * 0.5); ctx.lineTo(11 + recoil * 5, o); ctx.stroke();
    }
  } else if (W.id === "arc") {
    // whip/arc emitter: a prong head crackling
    ctx.lineWidth = 2.5;
    ctx.beginPath(); ctx.moveTo(-3, 0); ctx.lineTo(9, 0); ctx.stroke();
    ctx.beginPath(); ctx.arc(11, 0, 4, -1.1, 1.1); ctx.stroke();
    ctx.fillStyle = "#eaffff";
    ctx.beginPath(); ctx.arc(11, 0, 1.8, 0, TAU); ctx.fill();
  } else if (W.id === "glaive") {
    // glaive: a crescent throwing blade held flat
    ctx.lineWidth = 2.5; ctx.lineCap = "round";
    ctx.beginPath(); ctx.arc(10 + recoil * 4, 0, 6, -2.2, 2.2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-2, 0); ctx.lineTo(6 + recoil * 4, 0); ctx.stroke(); // grip spoke
    ctx.fillStyle = "#eafff6";
    ctx.beginPath(); ctx.arc(10 + recoil * 4, 0, 1.6, 0, TAU); ctx.fill();
  } else if (W.id === "whip") {
    // chain whip: short haft trailing a dashed chain with a barbed tip
    ctx.lineWidth = 2.5; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-3, 0); ctx.lineTo(7, 0); ctx.stroke();
    ctx.setLineDash([2, 3]);
    ctx.lineWidth = 1.6;
    ctx.beginPath(); ctx.moveTo(7, 0); ctx.lineTo(20 + recoil * 8, 3 + recoil * 2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); // barb
    ctx.moveTo(20 + recoil * 8, 3 + recoil * 2);
    ctx.lineTo(24 + recoil * 8, 1 + recoil * 2); ctx.lineTo(22 + recoil * 8, 6 + recoil * 2);
    ctx.closePath(); ctx.fill();
  } else if (W.id === "prism") {
    // prism saber: a faceted twin-edged crystal blade with an inner light core
    ctx.lineWidth = 3; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-2, 0); ctx.lineTo(14 + recoil * 6, 0); ctx.stroke();
    ctx.fillStyle = "#efeaff";
    ctx.beginPath();
    ctx.moveTo(14 + recoil * 6, 0); ctx.lineTo(9 + recoil * 6, -2.5); ctx.lineTo(9 + recoil * 6, 2.5);
    ctx.closePath(); ctx.fill();
    ctx.fillRect(-3, -1.5, 4, 3); // hilt
  } else if (W.id === "ember") {
    // EMBER STAFF: a haft with a glowing ember orb cradled at the tip; flares on cast
    ctx.lineWidth = 2.6; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-4, 1); ctx.lineTo(14 + recoil * 4, -2); ctx.stroke();
    const tipx = 15 + recoil * 5, tipy = -2;
    glow("#ff7a3c", 10 + recoil * 12);
    ctx.fillStyle = recoil > 0.3 ? "#ffe0a0" : "#ff9a4c";
    ctx.beginPath(); ctx.arc(tipx, tipy, 3.4 + recoil * 2.5, 0, TAU); ctx.fill();
    ctx.fillStyle = "#fff3d6";
    ctx.beginPath(); ctx.arc(tipx, tipy, 1.6, 0, TAU); ctx.fill();
  } else if (W.id === "frost") {
    // FROST WAND: a slender wand ending in a crystalline shard
    ctx.lineWidth = 2.2; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-4, 0); ctx.lineTo(12 + recoil * 5, 0); ctx.stroke();
    const tx = 14 + recoil * 5;
    glow("#7fd8ff", 9 + recoil * 10);
    ctx.fillStyle = recoil > 0.3 ? "#eafcff" : "#bfeeff";
    ctx.beginPath(); // shard diamond
    ctx.moveTo(tx + 4, 0); ctx.lineTo(tx, -3); ctx.lineTo(tx - 3, 0); ctx.lineTo(tx, 3);
    ctx.closePath(); ctx.fill();
  } else if (W.id === "storm") {
    // STORM STAFF: a rod topped with a forked tine that crackles on cast
    ctx.lineWidth = 2.4; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-4, 0); ctx.lineTo(12 + recoil * 4, 0); ctx.stroke();
    const fx = 12 + recoil * 4;
    glow("#ffe24a", 9 + recoil * 12);
    ctx.beginPath(); // two-pronged fork
    ctx.moveTo(fx, 0); ctx.lineTo(fx + 6, -4);
    ctx.moveTo(fx, 0); ctx.lineTo(fx + 6, 4);
    ctx.stroke();
    if (recoil > 0.2) { // cast arc spark between the prongs
      ctx.fillStyle = "#fff6a0";
      ctx.beginPath(); ctx.arc(fx + 6, 0, 1.6 + recoil * 1.5, 0, TAU); ctx.fill();
    }
  } else if (W.id === "rifle") {
    // AUTO-RIFLE: a slim carbine — body, barrel, mag, with a muzzle flash on recoil
    ctx.lineWidth = 2.4; ctx.lineCap = "round";
    ctx.fillRect(-4, -2, 12, 4);                 // receiver
    ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(18 + recoil * 5, 0); ctx.stroke(); // barrel
    ctx.fillRect(0, 2, 3, 5);                     // magazine
    if (recoil > 0.25) {                          // muzzle flash + ejected shell
      glow("#ffe6a0", 10);
      ctx.fillStyle = "#fff3c8";
      ctx.beginPath(); ctx.arc(19 + recoil * 5, 0, 2 + recoil * 2.4, 0, TAU); ctx.fill();
      ctx.fillStyle = "#ffcf7a";
      ctx.fillRect(2, -5 - recoil * 3, 1.6, 2.4);
    }
  } else if (W.id === "scatter") {
    // SCATTERGUN: a stubby double-barrel with a wide muzzle that flares hard on fire
    ctx.lineWidth = 3.2; ctx.lineCap = "round";
    ctx.fillRect(-5, -3, 9, 6);                   // chunky receiver
    for (const o of [-1.6, 1.6]) {                // twin short barrels
      ctx.beginPath(); ctx.moveTo(4, o); ctx.lineTo(14 + recoil * 4, o); ctx.stroke();
    }
    if (recoil > 0.2) {
      glow("#ffd29a", 12 + recoil * 8);
      ctx.fillStyle = "#fff0d0";
      ctx.beginPath();                            // cone of muzzle flash
      ctx.moveTo(14 + recoil * 4, -4 - recoil * 3);
      ctx.lineTo(22 + recoil * 8, 0);
      ctx.lineTo(14 + recoil * 4, 4 + recoil * 3);
      ctx.closePath(); ctx.fill();
    }
  } else if (W.id === "rail") {
    // RAILGUN: a long heavy rail with twin rails and a charge coil that glows when fired
    ctx.lineWidth = 2; ctx.lineCap = "round";
    ctx.fillRect(-5, -3, 9, 6);                   // body
    for (const o of [-2.4, 2.4]) {                // parallel rails
      ctx.beginPath(); ctx.moveTo(4, o); ctx.lineTo(26 + recoil * 8, o); ctx.stroke();
    }
    glow(W.col, 8 + recoil * 14);
    ctx.fillStyle = recoil > 0.3 ? "#eafaff" : "#7fd0ff";
    ctx.beginPath(); ctx.arc(2, 0, 2.4 + recoil * 2.2, 0, TAU); ctx.fill(); // charge coil
    if (recoil > 0.3) {                           // rail discharge arc at the muzzle
      ctx.strokeStyle = "#eafaff"; ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.moveTo(26 + recoil * 8, -2.4); ctx.lineTo(30 + recoil * 8, 0); ctx.lineTo(26 + recoil * 8, 2.4); ctx.stroke();
    }
  } else if (W.isBow) {
    // BOWS: a curved limb held vertical with a string; drawing pulls the string + nocked arrow back.
    // QUICK BOW = small recurve; LONGBOW = tall longbow (bigger limbs); STORMBOW = wide multi-limb.
    const big = W.id === "lbow", wide = W.id === "sbow";
    const limb = big ? 13 : (wide ? 11 : 9);          // limb half-height
    const bx = 6;                                       // bow handle x-offset from hand
    const pull = drawAmt * 7;                           // string draw-back distance
    ctx.lineWidth = big ? 2.6 : 2.2; ctx.lineCap = "round";
    // the bow limbs (an arc bulging forward)
    ctx.beginPath();
    ctx.moveTo(bx, -limb);
    ctx.quadraticCurveTo(bx + (big ? 8 : 6), 0, bx, limb);
    ctx.stroke();
    if (wide) { // STORMBOW: a second offset limb pair for the multishot look
      ctx.globalAlpha = 0.6;
      ctx.beginPath();
      ctx.moveTo(bx - 2, -limb * 0.7);
      ctx.quadraticCurveTo(bx + 4, 0, bx - 2, limb * 0.7);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
    // bowstring: pulled back to the hand by `pull`, with a nocked arrow when drawing
    ctx.strokeStyle = "rgba(230,240,255,0.85)"; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(bx, -limb);
    ctx.lineTo(bx - 2 - pull, 0);
    ctx.lineTo(bx, limb);
    ctx.stroke();
    if (drawAmt > 0.04) { // nocked arrow drawn back along the aim line
      glow(wc, 6 + drawAmt * 8);
      ctx.strokeStyle = wc; ctx.lineWidth = 1.6;
      ctx.beginPath(); ctx.moveTo(bx - 2 - pull, 0); ctx.lineTo(bx + 8 + drawAmt * 6, 0); ctx.stroke();
      ctx.fillStyle = "#f4ffe8";
      ctx.beginPath(); // arrowhead
      ctx.moveTo(bx + 11 + drawAmt * 6, 0); ctx.lineTo(bx + 8 + drawAmt * 6, -2); ctx.lineTo(bx + 8 + drawAmt * 6, 2);
      ctx.closePath(); ctx.fill();
      if (big && drawAmt > 0.9) { // LONGBOW full-draw glint
        ctx.fillStyle = "#fff3c0";
        ctx.beginPath(); ctx.arc(bx + 11 + drawAmt * 6, 0, 1.6, 0, TAU); ctx.fill();
      }
    }
    ctx.strokeStyle = wc;
  } else { // grav — gravity flail: short haft + orb on a chain
    ctx.lineWidth = 2; ctx.lineCap = "round";
    ctx.beginPath(); ctx.moveTo(-3, 0); ctx.lineTo(8, 0); ctx.stroke();
    ctx.setLineDash([2, 2]);
    ctx.beginPath(); ctx.moveTo(8, 0); ctx.lineTo(15 + recoil * 4, 2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(17 + recoil * 4, 2, 4, 0, TAU); ctx.fill();
    ctx.fillStyle = "#1a0a28";
    ctx.beginPath(); ctx.arc(17 + recoil * 4, 2, 1.8, 0, TAU); ctx.fill();
  }
  ctx.lineCap = "butt";
  noglow();
  ctx.restore();
}

/* the player android: head/visor, torso + chest light, two arms (lead arm holds the
   weapon), legs/thrusters. Animated: idle bob, walk swing, dash thruster flare,
   attack recoil/lunge, hit flinch, low-HP smoking/flicker. Faces aimDraw smoothly. */
function drawAndroid(p) {
  const W = weaponDefP(p);
  const detail = spriteDetail();
  const r = p.r;
  const dashing = p.dashT > 0;
  const lowHp = p.hp / p.maxHp < 0.3;
  const bodyCol = dashing ? (p.colDash || "#aaf6ff") : (p.col || "#5ee6ff");
  const blink = p.hurtT > 0 && Math.floor(timeNow * 18) % 2 === 0;
  // recoil pushes the whole body back a touch and kicks the weapon arm forward
  const recoil = p.recoilT > 0 ? Math.sin((p.recoilT / 0.18) * Math.PI) : 0;
  const lunge = recoil * (W.id === "lance" || W.id === "maul" ? 1 : 0.6);
  // low-HP flicker
  const flick = lowHp && Math.floor(timeNow * 14) % 3 === 0;
  ctx.save();
  ctx.translate(p.x, p.y);
  if (blink) ctx.globalAlpha = 0.35;
  else if (flick) ctx.globalAlpha = 0.7;
  ctx.rotate(p.aimDraw);
  // idle breathing bob + walk amount drives limb swing
  const bob = Math.sin(timeNow * 3) * (0.6 + p.moveAmt * 0.4);
  const swing = (detail ? Math.sin(p.walkT) : 0) * p.moveAmt;
  const backShift = -lunge * 2.5;

  // legs / thrusters (drawn first, under torso)
  if (dashing) {
    // thruster flare trailing behind
    glow("#aaf6ff", 14);
    ctx.fillStyle = "rgba(170,246,255,0.8)";
    ctx.beginPath();
    ctx.moveTo(-r * 0.6, -r * 0.45); ctx.lineTo(-r * 1.7, 0); ctx.lineTo(-r * 0.6, r * 0.45);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.9)";
    ctx.beginPath();
    ctx.moveTo(-r * 0.6, -r * 0.25); ctx.lineTo(-r * 1.2, 0); ctx.lineTo(-r * 0.6, r * 0.25);
    ctx.closePath(); ctx.fill();
    noglow();
  } else {
    ctx.strokeStyle = bodyCol; ctx.lineWidth = 3; ctx.lineCap = "round";
    for (const sgn of [-1, 1]) {
      const step = swing * sgn; // legs alternate
      ctx.beginPath();
      ctx.moveTo(backShift - r * 0.1, sgn * r * 0.45);
      ctx.lineTo(backShift - r * 0.55 + step * 3, sgn * r * (0.75 + 0.1 * Math.abs(step)));
      ctx.stroke();
    }
    ctx.lineCap = "butt";
  }

  // rear arm (free hand) swings opposite the legs
  if (detail) {
    ctx.strokeStyle = bodyCol; ctx.lineWidth = 2.6; ctx.lineCap = "round";
    ctx.beginPath();
    ctx.moveTo(backShift + r * 0.1, -r * 0.55);
    ctx.lineTo(backShift + r * 0.3 - swing * 3, -r * 0.85);
    ctx.stroke();
    ctx.lineCap = "butt";
  }

  // torso (rounded chassis) with chest light
  glow(bodyCol, 14);
  ctx.fillStyle = bodyCol;
  ctx.beginPath();
  ctx.ellipse(backShift, 0, r * 0.95 + lunge * 2, r * 0.72, 0, 0, TAU); ctx.fill();
  noglow();
  // chest core light (flares on dash, sputters at low HP)
  ctx.fillStyle = lowHp ? (flick ? "#ff7755" : "#ffaa66") : (dashing ? "#ffffff" : "#d6fbff");
  glow(lowHp ? "#ff5566" : bodyCol, 8);
  ctx.beginPath(); ctx.arc(backShift, 0, r * 0.22 * (1 + (dashing ? 0.2 : 0)), 0, TAU); ctx.fill();
  noglow();

  // head + glowing visor (slightly forward of torso)
  const hx = r * 0.45 + lunge;
  ctx.fillStyle = "#0a1830";
  ctx.beginPath(); ctx.arc(hx, 0, r * 0.42, 0, TAU); ctx.fill();
  glow(bodyCol, 8);
  ctx.fillStyle = blink ? "#ffffff" : (lowHp && flick ? "#ff6655" : "#9ff6ff");
  // visor: a forward-facing slit
  ctx.beginPath();
  ctx.moveTo(hx + r * 0.42, -r * 0.18);
  ctx.lineTo(hx + r * 0.1, -r * 0.05);
  ctx.lineTo(hx + r * 0.1, r * 0.05);
  ctx.lineTo(hx + r * 0.42, r * 0.18);
  ctx.closePath(); ctx.fill();
  noglow();

  // weapon arm + held weapon (lead hand, kicks forward on recoil)
  const handX = r * 0.5 + lunge * 4, handY = r * 0.5;
  ctx.strokeStyle = bodyCol; ctx.lineWidth = 2.8; ctx.lineCap = "round";
  ctx.beginPath();
  ctx.moveTo(backShift + r * 0.2, r * 0.45);
  ctx.lineTo(handX - 2, handY);
  ctx.stroke();
  ctx.lineCap = "butt";
  // BOW draw amount drives the held-bow nock/draw/release pose
  const drawAmt = (W.isBow ? (W.id === "lbow" ? (p.drawing ? p.drawT : 0) : (recoil > 0.05 ? 0.6 : 0)) : 0);
  if (!p.glaiveOut) drawHeldWeapon(W, handX, handY, recoil, blink, drawAmt); // glaive: hide held blade while it's in flight

  ctx.restore();

  // low-HP smoke + exposed-core sparks (world-space, behind glow; cheap, detail-gated)
  if (lowHp && detail && Math.random() < 0.5) {
    addPart({
      x: p.x + rand(-r * 0.5, r * 0.5), y: p.y - rand(0, r * 0.4),
      vx: rand(-12, 12), vy: rand(-40, -18),
      t: 0.5, tm: 0.5, col: Math.random() < 0.4 ? "#ffaa66" : "#445", r: rand(1.5, 3), drag: 1.5,
    });
  }
  // hit flinch sparks (brief burst right after being hit)
  if (p.hurtT > CONFIG.hurtIfr - 0.08 && detail && Math.random() < 0.5) {
    ffx.spray(p.x, p.y, rand(0, TAU), "#aaf6ff", 5, 200);
  }
}

function drawPlayer() {
  // weapon-colored swing trails: smooth tapered ribbon arcs, tinted per weapon (shared)
  for (const g of slashGhosts) {
    const a = g.t / g.tm;
    ctx.save();
    if (ffx.bloom) ctx.globalCompositeOperation = "lighter";
    glow(g.col, ffx.bloom ? 14 : 8);
    ctx.lineCap = "round";
    if (g.lunge || g.weapon === "lance") {
      // lance: clean tapered streak
      ctx.globalAlpha = a * 0.4;
      ctx.strokeStyle = g.col;
      ctx.lineWidth = 5 * a + 1;
      ctx.beginPath();
      ctx.moveTo(g.x, g.y);
      ctx.lineTo(g.x + Math.cos(g.ang) * g.range, g.y + Math.sin(g.ang) * g.range);
      ctx.stroke();
    } else if (g.weapon === "fang") {
      // twin fang: quick thin double-streaks offset to either side
      ctx.globalAlpha = a * 0.45;
      ctx.strokeStyle = g.col;
      const a0 = g.ang - g.side * g.arc / 2, a1 = g.ang + g.side * g.arc / 2;
      for (const off of [-6, 6]) {
        ctx.lineWidth = (g.flurry ? 2 : 2.6) * a + 0.6;
        ctx.beginPath();
        ctx.arc(g.x, g.y, g.range - 10 + off, Math.min(a0, a1), Math.max(a0, a1));
        ctx.stroke();
      }
    } else if (g.weapon === "arc") {
      // arc caster: jagged electric beam along the cone edge
      ctx.globalAlpha = a * 0.5;
      ctx.strokeStyle = g.col;
      ctx.lineWidth = 2.5 * a + 1;
      const a0 = g.ang - g.side * g.arc / 2, a1 = g.ang + g.side * g.arc / 2;
      const segs = 9;
      ctx.beginPath();
      for (let i = 0; i <= segs; i++) {
        const ang = lerp(a0, a1, i / segs);
        const rr = g.range - 10 + (i === 0 || i === segs ? 0 : rand(-7, 7));
        const x = g.x + Math.cos(ang) * rr, y = g.y + Math.sin(ang) * rr;
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    } else if (g.weapon === "grav") {
      // graviton: thick dark-tinted warped arc
      ctx.globalAlpha = a * 0.5;
      const a0 = g.ang - g.side * g.arc / 2, a1 = g.ang + g.side * g.arc / 2;
      ctx.strokeStyle = "rgba(40,12,70,0.7)";
      ctx.lineWidth = 11 * a + 2;
      ctx.beginPath(); ctx.arc(g.x, g.y, g.range - 12, Math.min(a0, a1), Math.max(a0, a1)); ctx.stroke();
      ctx.strokeStyle = g.col;
      ctx.lineWidth = 4 * a + 1;
      ctx.beginPath(); ctx.arc(g.x, g.y, g.range - 12, Math.min(a0, a1), Math.max(a0, a1)); ctx.stroke();
    } else {
      // blade / maul: tapered ribbon arc with soft inner glow
      const a0 = g.ang - g.side * g.arc / 2, a1 = g.ang + g.side * g.arc / 2;
      ctx.globalAlpha = a * 0.45;
      ctx.strokeStyle = g.col;
      ctx.lineWidth = (g.weapon === "maul" ? 9 : 6) * a + 1;
      ctx.beginPath(); ctx.arc(g.x, g.y, g.range - 10, Math.min(a0, a1), Math.max(a0, a1)); ctx.stroke();
      ctx.globalAlpha = a * 0.2;
      ctx.lineWidth = (g.weapon === "maul" ? 18 : 13) * a + 1;
      ctx.beginPath(); ctx.arc(g.x, g.y, g.range - 16, Math.min(a0, a1), Math.max(a0, a1)); ctx.stroke();
    }
    noglow();
    ctx.restore();
  }
  // per-player body, trail, swipe, tag and revive ring
  for (const p of players) {
    if (!p) continue;
    if (p.hp <= 0 && !p.downed) continue;
    drawOnePlayer(p);
  }
}

function drawOnePlayer(p) {
  // dash trail ghosts (afterimage of the android torso)
  for (const tr of p.trail) {
    const a = tr.t / 0.3;
    ctx.save();
    ctx.globalAlpha = a * 0.35;
    ctx.translate(tr.x, tr.y);
    ctx.rotate(tr.a);
    ctx.fillStyle = p.col;
    glow(p.col, 8);
    ctx.beginPath(); ctx.ellipse(-p.r * 0.1, 0, p.r * 0.95, p.r * 0.72, 0, 0, TAU); ctx.fill();
    noglow();
    ctx.restore();
  }
  if (p.downed) { drawDowned(p); return; }
  bloomCircle(p.x, p.y, p.dashT > 0 ? 34 : 24, p.dashT > 0 ? p.colDash : p.col, 0.5);
  drawAndroid(p);
  if (numPlayers > 1) drawPlayerTag(p);

  // slash swipe (weapon-formed: blade arc / lance thrust / maul full slam)
  if (p.slashT > 0) {
    ctxP = p; // range/arc helpers read the drawing player's boons/weapon
    const W = weaponDefP(p);
    const prog = 1 - p.slashT / (p.slashDur || CONFIG.slashDur);
    const range = meleeRangeNow();
    ctx.save();
    ctx.globalAlpha = (1 - prog) * 0.9;
    if (W.id === "lance") {
      // tapered spear thrust
      const ex = p.x + Math.cos(p.slashAng) * range, ey2 = p.y + Math.sin(p.slashAng) * range;
      glow(W.col, 16);
      ctx.strokeStyle = "#fff3d8";
      ctx.lineWidth = 6 * (1 - prog * 0.6);
      ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(ex, ey2); ctx.stroke();
      ctx.strokeStyle = "rgba(255,210,122,0.5)";
      ctx.lineWidth = 13 * (1 - prog);
      ctx.beginPath();
      ctx.moveTo(p.x + Math.cos(p.slashAng) * range * 0.3, p.y + Math.sin(p.slashAng) * range * 0.3);
      ctx.lineTo(ex, ey2);
      ctx.stroke();
    } else {
      const arc = meleeArcNow();
      const sweep = p.slashSide;
      const a0 = p.slashAng - sweep * arc / 2;
      const a1 = a0 + sweep * arc * Math.min(1, prog * 2.4);
      glow(W.col, 18);
      ctx.strokeStyle = W.id === "maul" ? "#ffd8c0" : "#cffaff";
      ctx.lineWidth = (W.id === "maul" ? 9 : 7) * (1 - prog * 0.6);
      ctx.beginPath();
      ctx.arc(p.x, p.y, range - 8, Math.min(a0, a1), Math.max(a0, a1));
      ctx.stroke();
      ctx.strokeStyle = W.id === "maul" ? "rgba(255,136,102,0.5)" : "rgba(94,230,255,0.5)";
      ctx.lineWidth = 16 * (1 - prog);
      ctx.beginPath();
      ctx.arc(p.x, p.y, range - 16, Math.min(a0, a1), Math.max(a0, a1));
      ctx.stroke();
    }
    noglow();
    ctx.restore();
  }
}

/* downed android: dim, slumped, with a revive progress ring filling as the partner helps */
function drawDowned(p) {
  ctx.save();
  ctx.globalAlpha = 0.5 + 0.2 * Math.sin(timeNow * 5);
  glow("#ff5566", 10);
  ctx.fillStyle = "#3a1820";
  ctx.beginPath(); ctx.ellipse(p.x, p.y, p.r * 1.05, p.r * 0.6, 0, 0, TAU); ctx.fill();
  ctx.fillStyle = "#ff6677";
  ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 0.3, 0, TAU); ctx.fill();
  noglow();
  ctx.restore();
  // revive ring
  const frac = clamp(p.reviveT / REVIVE_TIME, 0, 1);
  ctx.save();
  ctx.strokeStyle = "rgba(255,255,255,0.25)"; ctx.lineWidth = 3;
  ctx.beginPath(); ctx.arc(p.x, p.y, p.r + 12, 0, TAU); ctx.stroke();
  if (frac > 0) {
    glow("#66ff99", 8);
    ctx.strokeStyle = "#66ff99"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r + 12, -Math.PI / 2, -Math.PI / 2 + TAU * frac); ctx.stroke();
    noglow();
  }
  ctx.fillStyle = "#ff8899";
  ctx.font = "bold 10px 'Courier New', monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText(p.tag + " DOWN", p.x, p.y - p.r - 20);
  ctx.restore();
}

function drawArrows() {
  const detail = spriteDetail();
  for (const a of arrows) {
    const len = a.r * (a.kind === "larrow" ? 5.5 : 4.2);

    ctx.translate(a.x, a.y);
    ctx.rotate(a.ang);
    glow(a.col, a.kind === "larrow" ? 11 : 8);

    ctx.strokeStyle = a.crit ? "#fff3c0" : a.col;

    ctx.beginPath(); ctx.moveTo(-len * 0.6, 0); ctx.lineTo(len * 0.4, 0); ctx.stroke();
    // arrowhead
    ctx.fillStyle = a.crit ? "#fff3c0" : "#f4ffe8";
    ctx.beginPath();
    ctx.moveTo(len * 0.6, 0); ctx.lineTo(len * 0.4, -a.r * 0.9); ctx.lineTo(len * 0.4, a.r * 0.9);
    ctx.closePath(); ctx.fill();

      ctx.strokeStyle = a.col; ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(-len * 0.6, 0); ctx.lineTo(-len * 0.75, -a.r * 0.8);
      ctx.moveTo(-len * 0.6, 0); ctx.lineTo(-len * 0.75, a.r * 0.8);

function drawBeamsParts() {
  for (const bm of beams) {

    ctx.beginPath();

    const segs = 5;
    ctx.moveTo(bm.x1, bm.y1);
    for (let i = 1; i < segs; i++) {

      ctx.lineTo(lerp(bm.x1, bm.x2, t) + rand(-7, 7), lerp(bm.y1, bm.y2, t) + rand(-7, 7));

    ctx.lineTo(bm.x2, bm.y2);
    ctx.stroke();

    ctx.restore();

  for (const p of parts) {
    ctx.globalAlpha = clamp(p.t / p.tm, 0, 1);

function drawDnums() {
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  for (const n of dnums) {
    const life = clamp(n.t / 0.8, 0, 1);

    // snappy pop-in scale that settles, then a slight fade
    const pop = age < 0.18 ? 1 + (0.18 - age) / 0.18 * (n.big ? 0.7 : 0.4) : 1;
    const a = age < 0.7 ? 1 : (life / 0.3);
    const base = n.big ? 22 : 14;
    ctx.save();
    ctx.translate(n.x, n.y);
    ctx.scale(pop, pop);
    ctx.globalAlpha = a;
    ctx.font = "bold " + base + "px 'Courier New', monospace";
    if (n.big) { glow(n.col, 12); } // crit emphasis: glow halo
    ctx.fillStyle = "#000";
    ctx.fillText(n.txt, 1.2, 1.2);
    ctx.fillStyle = n.col;
    ctx.fillText(n.txt, 0, 0);
    noglow();
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

/* ---------------- §T RENDER: HUD & SCREENS ---------------- */
/* compact horizontal depth track: recent room icons, current depth,
   plus knowable upcoming markers (boss every 6th, shop cadence guess) */
const TRACK_ICONS = {
  normal:    ["✦", "#8fa8d8"],
  boss:      ["☠", "#ff3366"],
  shop:      ["$", "#ffd966"],
  treasure:  ["◆", "#cc88ff"],
  fountain:  ["+", "#66ffe0"],
  challenge: ["!", "#ffee55"],
};
function drawDepthTrack(u) {
  if (state !== "play" || depth <= 0) return;
  const cellW = 20 * u, y0 = 16 * u, x0 = 18;
  const from = Math.max(1, depth - 3), to = depth + 3;
  let shopGuess = Math.max(depth + 1, (lastShopDepth || 0) + 4); // cadence: ~every 4-5 rooms
  if (isBossDepth(shopGuess)) shopGuess++;
  ctx.save();
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  let x = x0;
  for (let d = from; d <= to; d++) {
    const cur = d === depth;
    let glyph = "·", col = "rgba(140,160,220,0.4)";
    if (d <= depth && runTrack[d]) {
      const ic = TRACK_ICONS[runTrack[d]] || TRACK_ICONS.normal;
      glyph = ic[0]; col = ic[1];
    } else if (d > depth) {
      if (isBossDepth(d)) { glyph = "☠"; col = "rgba(255,51,102,0.75)"; }
      else if (d === shopGuess) { glyph = "$"; col = "rgba(255,217,102,0.55)"; }
    }
    if (cur) {
      glow("#5ee6ff", 8);
      ctx.strokeStyle = "#5ee6ff";
      ctx.lineWidth = 1.5;
      rrect(x - 9 * u, y0 - 9 * u, 18 * u, 18 * u, 4); ctx.stroke();
      noglow();
    }
    ctx.fillStyle = col;
    ctx.globalAlpha = d < depth ? 0.6 : 1;
    ctx.font = "bold " + (cur ? 12 : 10) * u + "px 'Courier New', monospace";
    ctx.fillText(glyph, x, y0 + 1);
    ctx.globalAlpha = 1;
    x += cellW;
  }
  // current depth numeral under its cell
  ctx.fillStyle = "rgba(94,230,255,0.8)";
  ctx.font = "bold " + 10 * u + "px 'Courier New', monospace";
  ctx.fillText(String(depth), x0 + (depth - from) * cellW, y0 + 17 * u);
  ctx.restore();
}

/* one player's HP / energy / dash / freeze / weapon panel.
   side = "left" (P1, anchored at bx) or "right" (P2, mirrored from screen right). */
function drawPlayerBars(p, u, by, side) {
  const bw = 190 * u, bh = 13 * u;
  const right = side === "right";
  const bx = right ? cw - 16 - bw : 16;
  const downed = p.downed;
  // tag label for co-op
  if (numPlayers > 1) {
    ctx.fillStyle = p.col;
    ctx.font = "bold " + 10 * u + "px 'Courier New', monospace";
    ctx.textAlign = right ? "right" : "left";
    ctx.fillText(p.tag + (downed ? " — DOWN" : ""), right ? bx + bw : bx, by - 9 * u);
  }
  // HP
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  rrect(bx, by, bw, bh, 4); ctx.fill();
  const hpFrac = clamp(p.hp / p.maxHp, 0, 1);
  const hpCol = downed ? "rgba(120,40,55,0.8)" : (hpFrac > 0.35 ? "#ff5566" : (Math.floor(timeNow * 6) % 2 ? "#ff8899" : "#ff2244"));
  glow("#ff5566", 8);
  ctx.fillStyle = hpCol;
  rrect(bx, by, bw * hpFrac, bh, 4); ctx.fill();
  noglow();
  // downed revive progress overlay on the HP bar
  if (downed) {
    ctx.fillStyle = "#66ff99";
    rrect(bx, by, bw * clamp(p.reviveT / REVIVE_TIME, 0, 1), bh, 4); ctx.fill();
  }
  ctx.fillStyle = "#fff";
  ctx.font = "bold " + 10 * u + "px 'Courier New', monospace";
  ctx.textAlign = "left";
  ctx.fillText(downed ? "DOWNED" : (Math.ceil(p.hp) + " / " + p.maxHp), bx + 6, by + bh / 2 + 1);
  // Energy
  const ey = by + bh + 6 * u;
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  rrect(bx, ey, bw * 0.8, bh * 0.7, 3); ctx.fill();
  glow("#ff66ee", 8);
  ctx.fillStyle = "#ff66ee";
  rrect(bx, ey, bw * 0.8 * clamp(p.energy / p.maxEnergy, 0, 1), bh * 0.7, 3); ctx.fill();
  noglow();
  // dash pips
  const py = ey + bh * 0.7 + 9 * u;
  for (let i = 0; i < p.dashMax; i++) {
    const filled = i < p.dashCharges;
    ctx.fillStyle = filled ? p.col : "rgba(94,230,255,0.18)";
    if (filled) glow(p.col, 6);
    ctx.beginPath(); ctx.arc(bx + 7 + i * 18 * u, py, 5 * u, 0, TAU); ctx.fill();
    noglow();
  }
  // partial recharge arc
  if (p.dashCharges < p.dashMax && p.dashCD > 0) {
    const i = p.dashCharges;
    ctx.strokeStyle = p.col;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(bx + 7 + i * 18 * u, py, 5 * u, -Math.PI / 2, -Math.PI / 2 + TAU * (1 - p.dashCD / CONFIG.dashCD));
    ctx.stroke();
  }
  // freeze nova icon with radial cooldown sweep
  {
    const fx = bx + 7 + p.dashMax * 18 * u + 16 * u, fy = py;
    const ready = p.freezeCD <= 0;
    const frac = p.freezeCDMax > 0 ? 1 - clamp(p.freezeCD / p.freezeCDMax, 0, 1) : 1;
    ctx.fillStyle = "rgba(8,10,30,0.85)";
    rrect(fx - 9 * u, fy - 9 * u, 18 * u, 18 * u, 4); ctx.fill();
    if (ready) glow("#aaeeff", 8);
    ctx.strokeStyle = ready ? "#aaeeff" : "rgba(170,230,255,0.3)";
    ctx.lineWidth = 1.5;
    rrect(fx - 9 * u, fy - 9 * u, 18 * u, 18 * u, 4); ctx.stroke();
    noglow();
    ctx.fillStyle = ready ? "#aaeeff" : "rgba(170,230,255,0.4)";
    ctx.font = "bold " + 11 * u + "px 'Courier New', monospace";
    ctx.textAlign = "center";
    ctx.fillText("❄", fx, fy + 1);
    if (!ready) {
      ctx.strokeStyle = "#aaeeff";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(fx, fy, 11 * u, -Math.PI / 2, -Math.PI / 2 + TAU * frac);
      ctx.stroke();
    } else if (!touchUI && p.idx === 0 && numPlayers === 1) {
      ctx.font = 8 * u + "px 'Courier New', monospace";
      ctx.fillStyle = "rgba(170,230,255,0.6)";
      ctx.fillText("K", fx, fy + 15 * u);
    }
  }
  // weapon form readout (P1 to the right of bars, P2 to the left of its mirrored bars)
  {
    const W = weaponDefP(p);
    glow(W.col, 5);
    ctx.fillStyle = W.col;
    ctx.font = "bold " + 11 * u + "px 'Courier New', monospace";
    if (right) { ctx.textAlign = "right"; ctx.fillText(W.glyph + " " + W.name, bx - 12, by + bh / 2 + 1); }
    else { ctx.textAlign = "left"; ctx.fillText(W.glyph + " " + W.name, bx + bw + 12, by + bh / 2 + 1); }
    noglow();
    // 元素附魔: active melee enchant icons (with stack counts) just under the weapon readout
    if (p.enchants) {
      const active = ENCHANTS.filter((x) => (p.enchants[x.id] || 0) > 0);
      if (active.length) {
        ctx.font = "bold " + 10 * u + "px 'Courier New', monospace";
        ctx.textBaseline = "middle";
        const ey2 = by + bh / 2 + 15 * u;
        if (right) {
          let exx = bx - 12;
          ctx.textAlign = "right";
          for (let i = active.length - 1; i >= 0; i--) {
            const en = active[i];
            ctx.fillStyle = en.col;
            ctx.fillText(en.glyph, exx, ey2);
            exx -= 16 * u;
          }
        } else {
          let exx = bx + bw + 12;
          ctx.textAlign = "left";
          for (const en of active) {
            ctx.fillStyle = en.col;
            ctx.fillText(en.glyph, exx, ey2);
            exx += 16 * u;
          }
        }
      }
    }
  }
}

function drawHUD() {
  const u = us();
  const p = player;
  if (!p) return;
  ctx.save();
  ctx.textBaseline = "middle";
  const bx = 16, by = ch - 64 * u;
  const bw = 190 * u, bh = 13 * u;
  // P1 bars (left). In 2P, P2 bars mirror on the right.
  drawPlayerBars(p, u, by, "left");
  if (players[1]) drawPlayerBars(players[1], u, by, "right");
  // style meter badge (kill-chain rank with decay bar)
  if (state === "play" && styleRank >= 0 && styleT > 0) {
    const R = STYLE_RANKS[styleRank];
    const sx = bx + bw + 34 * u, sy = by - 34 * u;
    const pop = 1 + stylePop * 1.3;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.scale(pop, pop);
    glow(R.col, 14);
    ctx.fillStyle = R.col;
    ctx.font = "bold " + 26 * u + "px 'Courier New', monospace";
    ctx.textAlign = "center";
    ctx.fillText(R.n, 0, 0);
    noglow();
    ctx.restore();
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.font = "bold " + 9 * u + "px 'Courier New', monospace";
    ctx.textAlign = "center";
    ctx.fillText("x" + styleN, sx, sy + 13 * u);
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(sx - 16 * u, sy + 19 * u, 32 * u, 3);
    ctx.fillStyle = R.col;
    ctx.fillRect(sx - 16 * u, sy + 19 * u, 32 * u * clamp(styleT / 3.5, 0, 1), 3);
  }
  // run progress depth track (top-left)
  drawDepthTrack(u);
  // boon icons (border tinted by best rarity acquired)
  let ix = bx, iy = by - 22 * u;
  for (const id in p.boons) {
    const b = boonById(id);
    if (!b) continue;
    const rc = RARITIES[(p.boonBest && p.boonBest[id]) || 0].col;
    glow(rc, 6);
    ctx.fillStyle = "rgba(8,10,30,0.9)";
    rrect(ix, iy - 9 * u, 18 * u, 18 * u, 4); ctx.fill();
    ctx.strokeStyle = ((p.boonBest && p.boonBest[id]) || 0) > 0 ? rc : b.col;
    ctx.lineWidth = ((p.boonBest && p.boonBest[id]) || 0) > 0 ? 2 : 1.5;
    rrect(ix, iy - 9 * u, 18 * u, 18 * u, 4); ctx.stroke();
    noglow();
    ctx.fillStyle = b.col;
    ctx.font = "bold " + 11 * u + "px 'Courier New', monospace";
    ctx.textAlign = "center";
    ctx.fillText(b.glyph, ix + 9 * u, iy + 1);
    if (p.boons[id] > 1) {
      ctx.font = "bold " + 8 * u + "px 'Courier New', monospace";
      ctx.fillText("x" + p.boons[id], ix + 9 * u, iy + 13 * u);
    }
    ix += 22 * u;
  }
  // top-right: depth & cores
  ctx.textAlign = "right";
  ctx.font = "bold " + 16 * u + "px 'Courier New', monospace";
  ctx.fillStyle = "#5ee6ff";
  glow("#5ee6ff", 6);
  ctx.fillText(state === "hub" ? "HUB" : "DEPTH " + depth, cw - 16, 24 * u);
  noglow();
  ctx.fillStyle = "#ffcc44";
  ctx.font = "bold " + 13 * u + "px 'Courier New', monospace";
  ctx.fillText("◆ " + fmtNum(cores), cw - 16, 44 * u);
  // active HEAT contract readout
  const heatLine = state !== "hub" && runHeatPts > 0;
  if (heatLine) {
    ctx.fillStyle = "#ff7755";
    ctx.font = "bold " + 11 * u + "px 'Courier New', monospace";
    ctx.fillText("♨ HEAT " + runHeatPts + " · ◆+" + runHeatPts * 25 + "%", cw - 16, 62 * u);
  }
  if (state === "play" && !roomClear && waves.length > 1) {
    ctx.fillStyle = "rgba(204,102,255,0.8)";
    ctx.font = 11 * u + "px 'Courier New', monospace";
    ctx.fillText("wave " + waveIdx + "/" + waves.length, cw - 16, (heatLine ? 79 : 62) * u);
  }
  // challenge gauntlet countdown
  if (state === "play" && roomType === "challenge" && !roomClear) {
    ctx.textAlign = "center";
    if (!challengeFailed) {
      const secs = Math.max(0, challengeT);
      const urgent = secs <= 10;
      const col = urgent ? (Math.floor(timeNow * 4) % 2 ? "#ff5566" : "#ffee55") : "#ffee55";
      glow(col, 12);
      ctx.fillStyle = col;
      ctx.font = "bold " + (urgent ? 30 : 24) * u + "px 'Courier New', monospace";
      ctx.fillText(secs.toFixed(1), cw / 2, 52 * u);
      noglow();
      ctx.fillStyle = "rgba(255,238,85,0.7)";
      ctx.font = 10 * u + "px 'Courier New', monospace";
      ctx.fillText("CHALLENGE — 2x ◆", cw / 2, 70 * u);
    } else {
      ctx.fillStyle = "rgba(255,119,85,0.8)";
      ctx.font = "bold " + 14 * u + "px 'Courier New', monospace";
      ctx.fillText("TIME UP — normal reward", cw / 2, 52 * u);
    }
    ctx.textAlign = "right";
  }
  // boss bar (sums all boss-type entities, e.g. splitter fragments)
  let bossHpSum = 0, bossCol = "#ff3366", bossAlive = false;
  for (const e of enemies) {
    if (e.type === "boss" && e.hp > 0) { bossHpSum += e.hp; bossCol = e.col; bossAlive = true; }
  }
  if (bossAlive && bossBarMax > 0) {
    const w = Math.min(520, cw * 0.6);
    const x = (cw - w) / 2, y = 18 * u;
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    rrect(x - 2, y - 2, w + 4, 14 * u + 4, 4); ctx.fill();
    glow(bossCol, 10);
    ctx.fillStyle = bossCol;
    rrect(x, y, w * clamp(bossHpSum / bossBarMax, 0, 1), 14 * u, 3); ctx.fill();
    noglow();
    ctx.fillStyle = "#ffffff";
    ctx.textAlign = "center";
    ctx.font = "bold " + 11 * u + "px 'Courier New', monospace";
    ctx.fillText(bossName + " — DEPTH " + depth, cw / 2, y + 7 * u);
  }
  if (bossWarnT > 0 && Math.floor(timeNow * 4) % 2 === 0) {
    ctx.fillStyle = "#ff3366";
    ctx.textAlign = "center";
    glow("#ff3366", 16);
    ctx.font = "bold " + 30 * u + "px 'Courier New', monospace";
    ctx.fillText("!! " + (bossName || "WARDEN") + " DETECTED !!", cw / 2, ch * 0.3);
    noglow();
  }
  // toasts
  let ty = ch * 0.18;
  ctx.textAlign = "center";
  for (const t of toasts) {
    ctx.globalAlpha = clamp(t.t / 0.5, 0, 1);
    ctx.font = "bold " + 15 * u + "px 'Courier New', monospace";
    glow(t.col, 8);
    ctx.fillStyle = t.col;
    ctx.fillText(t.txt, cw / 2, ty);
    noglow();
    ty += 22 * u;
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawTouchControls() {
  if (!touchUI || (state !== "play" && state !== "hub")) return;
  const u = us();
  ctx.save();
  // joystick
  if (joy.id !== -1) {
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = "#5ee6ff";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(joy.bx, joy.by, 52 * u, 0, TAU); ctx.stroke();
    ctx.fillStyle = "#5ee6ff";
    ctx.beginPath(); ctx.arc(joy.bx + joy.dx * 52 * u, joy.by + joy.dy * 52 * u, 20 * u, 0, TAU); ctx.fill();
  }
  // buttons
  const db = dashBtnPos(), bb = boltBtnPos(), fb = freezeBtnPos();
  ctx.globalAlpha = 0.4;
  ctx.fillStyle = "rgba(94,230,255,0.16)";
  ctx.strokeStyle = "#5ee6ff"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(db.x, db.y, db.r, 0, TAU); ctx.fill(); ctx.stroke();
  ctx.fillStyle = "rgba(255,102,238,0.16)";
  ctx.strokeStyle = "#ff66ee";
  ctx.beginPath(); ctx.arc(bb.x, bb.y, bb.r, 0, TAU); ctx.fill(); ctx.stroke();
  ctx.fillStyle = "rgba(170,230,255,0.16)";
  ctx.strokeStyle = "#aaeeff";
  ctx.beginPath(); ctx.arc(fb.x, fb.y, fb.r, 0, TAU); ctx.fill(); ctx.stroke();
  if (player && player.freezeCD > 0 && player.freezeCDMax > 0) {
    ctx.beginPath();
    ctx.arc(fb.x, fb.y, fb.r - 5, -Math.PI / 2, -Math.PI / 2 + TAU * (1 - player.freezeCD / player.freezeCDMax));
    ctx.stroke();
  }
  ctx.globalAlpha = 0.85;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.font = "bold " + 13 * u + "px 'Courier New', monospace";
  ctx.fillStyle = "#5ee6ff";
  ctx.fillText("DASH", db.x, db.y);
  ctx.fillStyle = "#ff66ee";
  ctx.fillText("BOLT", bb.x, bb.y);
  ctx.fillStyle = "#aaeeff";
  ctx.font = "bold " + 10 * u + "px 'Courier New', monospace";
  ctx.fillText("FREEZE", fb.x, fb.y);
  ctx.restore();
}

/* title-screen 1P/2P selector; registers a uiRect for click/tap toggling */
function drawPlayerCountToggle(u, y) {
  const bw = 240 * u, bh = 30 * u, bx = cw / 2 - bw / 2;
  ctx.save();
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillStyle = "rgba(10,14,34,0.8)";
  rrect(bx, y - bh / 2, bw, bh, 6); ctx.fill();
  ctx.strokeStyle = "#5ee6ff"; ctx.lineWidth = 2;
  rrect(bx, y - bh / 2, bw, bh, 6); ctx.stroke();

function uiClick(x, y) {
  for (const r of uiRects) {
    if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
      if (r.act === "boon") { pickBoon(r.i); return; }
      if (r.act === "reroll") { rerollBoons(); return; }
      if (r.act === "meta") { buyMeta(META_UPGRADES[r.i]); return; }
      if (r.act === "close") { closeShop(); return; }
      if (r.act === "heatmod") { toggleHeat(r.i); return; }
      if (r.act === "heatclose") { closeHeat(); return; }
      if (r.act === "statsclose") { closeStats(); return; }
      if (r.act === "fxtoggle") { ffx.cycleLevel(); return; }
      if (r.act === "fstoggle") { toggleFullscreen(); updateFsBtn(); return; }
      if (r.act === "fsauto") { setAutoFullscreen(!FS.auto); audio.uiSnd(); return; }
    }
  }
}

/* ---------------- §U RENDER: MAIN ---------------- */
function render() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  computeView();
  // bg
  ctx.fillStyle = "#050514";
  ctx.fillRect(0, 0, cw, ch);
  // dim starfield specks behind arena
  ctx.fillStyle = "rgba(120,140,255,0.08)";
  for (let i = 0; i < 40; i++) {
    const sx = (i * 199.7 + 50) % cw;
    const sy = (i * 137.3 + ((timeNow * (4 + i % 5)) % ch)) % ch;
    ctx.fillRect(sx, sy, 2, 2);
  }

  // world — trauma-curve screen shake (offset + slight rotation), legacy shakeA as floor
  let sx2 = 0, sy2 = 0, srot = 0;
  const tr = ffx.traumaV * ffx.traumaV; // squared trauma feels punchier
  if (tr > 0.0008 || shakeT > 0) {
    const amp = Math.max(shakeT > 0 ? shakeA : 0, tr * 26);
    sx2 = rand(-amp, amp); sy2 = rand(-amp, amp);
    srot = rand(-1, 1) * tr * 0.05;
  }
  ctx.save();
  ctx.translate(aOX, aOY);
  if (srot) { // rotate about arena center for the trauma roll
    const cx = (CONFIG.arenaW / 2) * aS, cy = (CONFIG.arenaH / 2) * aS;
    ctx.translate(cx, cy); ctx.rotate(srot); ctx.translate(-cx, -cy);
  }
  ctx.translate(sx2, sy2);
  ctx.scale(aS, aS);
  if (slowmoT > 0) { // execution slow-mo: subtle zoom pulse on the arena
    const z = 1 + 0.05 * Math.sin((slowmoT / 0.5) * Math.PI);
    ctx.translate(CONFIG.arenaW / 2, CONFIG.arenaH / 2);
    ctx.scale(z, z);
    ctx.translate(-CONFIG.arenaW / 2, -CONFIG.arenaH / 2);
  }
  drawArenaFloor();
  drawMotes();
  drawLighting();
  drawHazards();
  drawSweeps();
  drawZonesAndPickups();
  drawSingularities();
  if (state === "hub" || state === "shop" || state === "heat" || state === "stats") drawHubObjects();
  if (roomType === "fountain" && state === "play") drawFountain();
  if (shopRoom || roomType === "treasure") drawPedestals();
  if (roomClear) drawDoors();
  drawPillars();
  drawSpawnTelegraphs();
  for (const e of enemies) drawEnemy(e);
  drawPlayer();
  drawGlaives();
  drawSpells();
  drawBullets();
  drawArrows();
  drawBolts();
  drawBeamsParts();
  drawFxRings();
  drawDnums();
  ctx.restore();

  // vignette
  if (!vigGrad) {
    vigGrad = ctx.createRadialGradient(cw / 2, ch / 2, Math.min(cw, ch) * 0.36, cw / 2, ch / 2, Math.max(cw, ch) * 0.72);
    vigGrad.addColorStop(0, "rgba(0,0,0,0)");
    vigGrad.addColorStop(1, "rgba(2,2,10,0.72)");
  }
  ctx.fillStyle = vigGrad;
  ctx.fillRect(0, 0, cw, ch);
  // combat-reactive vignette deepening
  if (audio.intensityCur > 0.02) {
    ctx.save();
    ctx.globalAlpha = audio.intensityCur * 0.35;
    ctx.fillStyle = vigGrad;
    ctx.fillRect(0, 0, cw, ch);
    ctx.restore();
  }

  // red hurt flash
  if (redFlash > 0) {
    ctx.fillStyle = "rgba(255,30,60," + redFlash * 0.4 + ")";
    ctx.fillRect(0, 0, cw, ch);
  }
  // low-HP heartbeat vignette: red edges pulsing with the heartbeat layer
  if (audio.heartbeatCur > 0.02 && player && player.hp > 0) {
    if (!lowHpGrad) {
      lowHpGrad = ctx.createRadialGradient(cw / 2, ch / 2, Math.min(cw, ch) * 0.32, cw / 2, ch / 2, Math.max(cw, ch) * 0.66);
      lowHpGrad.addColorStop(0, "rgba(255,20,40,0)");
      lowHpGrad.addColorStop(1, "rgba(255,20,40,0.45)");
    }
    ctx.save();
    ctx.globalAlpha = audio.heartbeatCur * (0.55 + 0.45 * Math.abs(Math.sin(timeNow * 3.4)));
    ctx.fillStyle = lowHpGrad;
    ctx.fillRect(0, 0, cw, ch);
    ctx.restore();
  }
  // execution slow-mo: subtle vignette flash
  if (slowmoT > 0) {
    const a = Math.sin((slowmoT / 0.5) * Math.PI);
    ctx.save();
    ctx.globalAlpha = a * 0.55;
    ctx.fillStyle = vigGrad;
    ctx.fillRect(0, 0, cw, ch);
    ctx.restore();
    ctx.fillStyle = "rgba(200,240,255," + (a * 0.06).toFixed(3) + ")";
    ctx.fillRect(0, 0, cw, ch);
  }
  // cheap chromatic-aberration / distortion pulse on big events (boss slam, shatter, barrel chain)
  if (ffx.shocks.length) {
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    for (const s of ffx.shocks) {
      const pr = 1 - clamp(s.t / s.tm, 0, 1);
      const sx = w2sX(s.x), sy = w2sY(s.y);
      const rad = (40 + pr * 220) * aS;
      const a = (1 - pr) * 0.5;
      const off = s.mag * (1 - pr);
      ctx.lineWidth = 3 * (1 - pr) + 1;
      ctx.globalAlpha = a;
      ctx.strokeStyle = "rgba(255,40,40,1)";
      ctx.beginPath(); ctx.arc(sx - off, sy, rad, 0, TAU); ctx.stroke();
      ctx.strokeStyle = "rgba(40,160,255,1)";
      ctx.beginPath(); ctx.arc(sx + off, sy, rad, 0, TAU); ctx.stroke();
      ctx.strokeStyle = "rgba(80,255,120,1)";
      ctx.beginPath(); ctx.arc(sx, sy - off, rad, 0, TAU); ctx.stroke();
    }
    ctx.restore();
  }
  // subtle CRT scanline shimmer (neon-arcade vibe)
  if (ffx.scanlines) {
    ctx.save();
    ctx.fillStyle = "rgba(0,0,0," + (0.07 + 0.02 * Math.sin(timeNow * 1.5)).toFixed(3) + ")";
    const off = Math.floor((timeNow * 24) % 3);
    for (let y = off; y < ch; y += 3) ctx.fillRect(0, y, cw, 1);
    ctx.restore();
  }

  // room fade
  if (roomFade > 0) {
    ctx.fillStyle = "rgba(3,3,14," + roomFade + ")";
    ctx.fillRect(0, 0, cw, ch);
  }

  if (state === "play" || state === "hub") {
    drawHUD();
    drawTouchControls();
    if (paused) drawPause();
  } else if (state === "title") {
    drawTitle();
  } else if (state === "summary") {
    drawHUD();
    drawSummary();
  } else if (state === "boon") {
    drawHUD();
    drawBoonScreen();
  } else if (state === "shop") {
    drawHUD();
    drawShopScreen();
  } else if (state === "heat") {
    drawHUD();
    drawHeatScreen();
  } else if (state === "stats") {
    drawHUD();
    drawStatsScreen();
  }

  // mute hint
  if (audio.muted) {
    ctx.textAlign = "right"; ctx.textBaseline = "alphabetic";
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    ctx.font = "11px 'Courier New', monospace";
    ctx.fillText("MUTED [M]", cw - 10, ch - 10);
  }

  arcadeLink.style.display = (state === "title" || state === "summary") ? "block" : "none";
  updateFsBtn();
}

/* ---------------- §V MAIN LOOP ---------------- */
/* Gamepad menus/state transitions: polled each frame (the Gamepad API gives no
   button events). Handles title-start, pause toggle, and menu navigation/confirm. */
function pollGamepadUI(dt) {
  // start / resume / menu interactions via gamepad edges
  if (state === "title") {
    if (gpStartPressed()) { anyStart(); return; }
    // □ on the title also flips 1P/2P for convenience
    for (const pad of GP.pads) if (gpPressed(pad, 2)) { setPlayerCount(numPlayers === 1 ? 2 : 1); audio.uiSnd(); }
    return;
  }
  if (state === "summary") { if (gpStartPressed()) anyStart(); return; }
  // Options/Start toggles pause in play/hub
  for (const pad of GP.pads) {
    if (gpPressed(pad, 9)) {
      if (state === "play" || state === "hub") { paused = !paused; if (paused) menuHighlight = 0; audio.uiSnd(); }
      else if (state === "shop") closeShop();
      else if (state === "heat") closeHeat();
      else if (state === "stats") closeStats();
      return;
    }
  }
  if (paused) {
    // navigate the 3 pause settings items (EFFECTS / FULLSCREEN / AUTO-FS); × confirms,
    // ○ resumes. Highlight is clamped to the item count.
    const PAUSE_ITEMS = 3;
    const stepNav = gpMenuStep(dt);
    if (stepNav.vert && GP.navCD <= 0) {
      menuHighlight = (menuHighlight + stepNav.vert + PAUSE_ITEMS) % PAUSE_ITEMS;
      GP.navCD = 0.18; audio.uiSnd();
    }
    if (gpConfirm()) {
      const i = ((menuHighlight % PAUSE_ITEMS) + PAUSE_ITEMS) % PAUSE_ITEMS;
      if (i === 0) ffx.cycleLevel();
      else if (i === 1) { toggleFullscreen(); updateFsBtn(); }
      else { setAutoFullscreen(!FS.auto); audio.uiSnd(); }
      return;
    }
    if (gpCancel()) { paused = false; audio.uiSnd(); }
    return;
  }
  // boon / shop / heat menu navigation
  if (state === "boon" || state === "shop" || state === "heat" || state === "stats") {
    const stepNav = gpMenuStep(dt);
    const count = menuItemCount();
    if ((stepNav.nav || stepNav.vert) && GP.navCD <= 0 && count > 0) {
      menuHighlight = (menuHighlight + (stepNav.nav || stepNav.vert) + count) % count;
      GP.navCD = 0.18; audio.uiSnd();
    }
    if (gpConfirm()) menuConfirm();
    if (gpCancel()) menuCancel();
    return;
  }
}
function menuItemCount() {
  if (state === "boon") return boonChoices.length;
  if (state === "shop") return META_UPGRADES.length;
  if (state === "heat") return HEAT_MODS.length;
  return 0;
}
function menuConfirm() {
  if (state === "boon") { pickBoon(menuHighlight); menuHighlight = 0; }
  else if (state === "shop") buyMeta(META_UPGRADES[menuHighlight]);
  else if (state === "heat") toggleHeat(menuHighlight);
  else if (state === "stats") closeStats();
}
function menuCancel() {
  if (state === "shop") closeShop();
  else if (state === "heat") closeHeat();
  else if (state === "stats") closeStats();
  // boon must be chosen — no cancel
}

let lastT = performance.now(), acc = 0;
function loop(now) {
  requestAnimationFrame(loop);
  let dt = (now - lastT) / 1000;
  lastT = now;
  if (dt > 0.2) dt = 0.2;
  pollGamepads();      // refresh pad state for this frame
  pollGamepadUI(dt);   // menu / state transitions via gamepad
  if (!paused) {
    acc += dt * (slowmoT > 0 ? 0.3 : 1); // execution slow-mo: 0.3x timescale
    const S = CONFIG.step;
    let guard = 0;
    while (acc >= S && guard++ < 40) {
      step(S);
      acc -= S;
    }
  }
  render();
}
requestAnimationFrame(loop);
</script>
