      e.state = "move"; e.cd = rand(1.6, 2.2) * cdm;
    }
  }
}

/* --- OVERSEER: hovering eye-sentinel — rotating laser sweeps, turret-drone summons,
   radial bullet bloom. Phase 2 fires DUAL opposed sweeps and faster blooms.
   Telegraphs: sweep beams glow before they cut; bloom flashes a ring before firing. --- */
function updateBossOverseer(e, dt, d) {
  const p = e._tgt || targetFor(e) || player;
  const phase2 = e.hp < e.maxHp * 0.5;
  const cdm = (e.hard ? 0.75 : 1) * (phase2 ? 0.82 : 1) * (e.enraged ? 0.65 : 1);
  e.rot += dt * (e.state === "bloom" ? 4 : 1.4);
  e.cd = Math.max(0, e.cd - dt);
  if (e.state === "move") {
    // hover at mid range, gently strafing so its sweeps come from varied angles
    const v = seekVec(e, p.x, p.y);
    const want = d > 340 ? 0.7 : (d < 230 ? -0.7 : 0.1);
    e.vx = lerp(e.vx, (v.x * want - v.y * 0.5 * e.strafe) * e.speed, 3 * dt);
    e.vy = lerp(e.vy, (v.y * want + v.x * 0.5 * e.strafe) * e.speed, 3 * dt);
    if (Math.random() < dt * 0.3) e.strafe *= -1;
    if (e.cd <= 0) {
      e.atk = (e.atk + 1) % 3;
      e.sub = 0;
      if (e.atk === 0) { e.state = "sweep"; e.t = 0.45; }
      else if (e.atk === 1) { e.state = "summon"; e.t = 0.8; audio.bossRoar("overseer"); }
      else { e.state = "bloom"; e.t = 0.7; }
    }
  } else if (e.state === "sweep") {
    e.vx *= 0.9; e.vy *= 0.9;
    e.t -= dt;
    if (e.t <= 0) {
      const len = 640 + e.tier * 20;
      const dmg = 12;
      const base = angTo(e.x, e.y, p.x, p.y);
      const rate = (phase2 ? 1.5 : 1.1) * (e.hard ? 1.25 : 1) * (Math.random() < 0.5 ? 1 : -1);
      addSweep(e.x, e.y, base - rate * 0.5, rate, len, dmg, "#33ddee");
      if (phase2 || e.hard) addSweep(e.x, e.y, base + Math.PI - rate * 0.5, rate, len, dmg, "#33ddee"); // dual opposed
      audio.bolt();
      shake(3, 0.12);
      e.state = "move"; e.cd = (phase2 ? 1.6 : 2.3) * cdm;
    }
  } else if (e.state === "summon") {
    e.vx *= 0.9; e.vy *= 0.9;
    e.t -= dt;
    if (e.t <= 0) {
      const n = (phase2 ? 3 : 2) + (e.hard ? 1 : 0);
      for (let i = 0; i < n; i++) {
        const a = (i / n) * TAU + e.rot;
        const x = clamp(e.x + Math.cos(a) * 120, 50, CONFIG.arenaW - 50);
        const y = clamp(e.y + Math.sin(a) * 120, 50, CONFIG.arenaH - 50);
        spawnQ.push({ type: "shooter", x, y, t: 0.8 }); // turret-drones
      }
      e.state = "move"; e.cd = rand(2.4, 3.0) * cdm;
    }
  } else if (e.state === "bloom") {
    e.vx *= 0.92; e.vy *= 0.92;
    e.t -= dt;
    if (e.t <= 0) {
      const volleys = (phase2 ? 3 : 2) + (e.hard ? 1 : 0);
      const n = 18 + e.tier * 2;
      const baseA = e.rot + e.sub * 0.16;
      for (let i = 0; i < n; i++) fireEbolt(e.x, e.y, baseA + (i / n) * TAU, 175 + e.tier * 10, 10, "#7fe8ff", 6);
      audio.bolt();
      shake(3, 0.12);
      e.sub++;
      if (e.sub >= volleys) { e.state = "move"; e.cd = (phase2 ? 1.7 : 2.4) * cdm; }
      else e.t = 0.4;
    }
  }
  enemyContact(e, 12, dt);
}

/* --- JUGGERNAUT: heavy armored brute — telegraphed charge-dashes (leave a shockwave),
   ground-pound slams with expanding rings, hurls debris arcs. Armor plates break off
   as HP drops, exposing the weak core (more damage taken when plates gone). --- */
function updateBossJuggernaut(e, dt, d) {
  // shed armor plates at HP thresholds: 4 plates -> 0 over the fight
  const wantPlates = Math.max(0, Math.ceil(4 * (e.hp / e.maxHp)));
  if (wantPlates < e.plates) {
    e.plates = wantPlates;
    burst(e.x, e.y, "#cc9966", 18, 280, 0.6, 4);
    ffx.ring(e.x, e.y, e.r + 24, "#ffcc88", 0.4, 5);
    shake(5, 0.2);
    audio.heatClunk();
    toast(e.plates > 0 ? "ARMOR BREAKS — 装甲碎裂!" : "CORE EXPOSED — 核心暴露!", "#ffcc88");
  }
  const p = e._tgt || targetFor(e) || player;
  const phase2 = e.hp < e.maxHp * 0.5;
  const cdm = (e.hard ? 0.75 : 1) * (e.enraged ? 0.65 : 1);
  e.rot += dt * 0.6;
  e.cd = Math.max(0, e.cd - dt);
  if (e.state === "move") {
    const v = seekVec(e, p.x, p.y);
    e.vx = lerp(e.vx, v.x * e.speed, 3 * dt);
    e.vy = lerp(e.vy, v.y * e.speed, 3 * dt);
    enemyContact(e, 13, dt);
    if (e.cd <= 0) {
      e.atk = (e.atk + 1) % 3;
      e.sub = 0;
      if (e.atk === 0) { e.state = "wind"; e.t = 0.6; }       // charge-dash wind-up (telegraph line)
      else if (e.atk === 1) { e.state = "slam"; e.t = 0.85; } // ground-pound
      else { e.state = "hurl"; e.t = 0.65; }                  // debris toss
    }
  } else if (e.state === "wind") {
    e.vx *= 0.86; e.vy *= 0.86;
    if (e.t > 0.18) { const v = seekVec(e, p.x, p.y); e.dirX = v.x; e.dirY = v.y; }
    e.t -= dt;
    if (e.t <= 0) {
      e.state = "charge"; e.t = 0.55;
      const spd = 540 + e.tier * 30;
      e.vx = e.dirX * spd; e.vy = e.dirY * spd;
      audio.dash();
    }
  } else if (e.state === "charge") {
    e.t -= dt;
    enemyContact(e, 18, dt);
    addPart({ x: e.x + rand(-22, 22), y: e.y + rand(-22, 22), vx: 0, vy: 0, t: 0.32, tm: 0.32, col: "#ffaa44", r: rand(3, 6), drag: 1 });
    const A = CONFIG;
    if (e.x < 80 || e.x > A.arenaW - 80 || e.y < 80 || e.y > A.arenaH - 80 || e.t <= 0) {
      // slam to a stop, leaving a shockwave ring of bolts
      burst(e.x, e.y, e.col, 28, 320, 0.5, 4);
      shake(8, 0.35);
      audio.enemyDie(true);
      const n = 12 + (phase2 ? 4 : 0) + (e.hard ? 4 : 0);
      for (let i = 0; i < n; i++) fireEbolt(e.x, e.y, (i / n) * TAU + e.rot, 210, 9, "#ffcc88", 7);
      e.state = "move"; e.cd = rand(1.3, 1.9) * cdm; e.vx *= 0.15; e.vy *= 0.15;
    }
  } else if (e.state === "slam") {
    e.vx *= 0.85; e.vy *= 0.85;
    e.t -= dt;
    if (e.t <= 0) {
      const R = 120 + e.r;
      burst(e.x, e.y, e.col, 34, 360, 0.6, 4);
      ffx.ring(e.x, e.y, R, "#ffcc88", 0.5, 6);
      shake(9, 0.4);
      audio.enemyDie(true);
      damagePlayersInRadius(e.x, e.y, R, 20 * eDmgMul(), e);
      // expanding ring of debris bolts after the pound
      const n = 16 + e.tier * 2 + (phase2 ? 4 : 0);
      for (let i = 0; i < n; i++) fireEbolt(e.x, e.y, (i / n) * TAU, 200 + (phase2 ? 40 : 0), 10, "#ffcc88", 7);
      e.state = "move"; e.cd = rand(1.8, 2.4) * cdm;
    }
  } else if (e.state === "hurl") {
    e.vx *= 0.9; e.vy *= 0.9;
    e.t -= dt;
    if (e.t <= 0) {
      // hurl an arc of heavy debris toward the target
      const a0 = angTo(e.x, e.y, p.x, p.y);
      const k = 5 + (phase2 ? 2 : 0) + (e.hard ? 1 : 0);
      for (let i = 0; i < k; i++) {
        fireEbolt(e.x, e.y, a0 + (i - (k - 1) / 2) * 0.22, 300 + e.tier * 12, 12, "#ffbb66", 8);
      }
      audio.bolt();
      shake(4, 0.15);
      e.state = "move"; e.cd = rand(1.6, 2.2) * cdm;
    }
  }
}

/* --- HEXWEAVER: caster — conjures telegraphed AoE rune-zones (reuses the mortar
   system), fires homing hex-orbs, raises temporary barriers + adds. Punishes standing
   still: rune-zones drop where the player is. Phase 2 lays overlapping rune patterns. --- */
function updateBossHexweaver(e, dt, d) {
  const p = e._tgt || targetFor(e) || player;
  const phase2 = e.hp < e.maxHp * 0.5;
  const cdm = (e.hard ? 0.75 : 1) * (phase2 ? 0.84 : 1) * (e.enraged ? 0.65 : 1);
  e.rot += dt * 1.8;
  e.cd = Math.max(0, e.cd - dt);
  if (e.state === "move") {
    // keep distance, weaving — never sits still
    const v = seekVec(e, p.x, p.y);
    const want = d < 300 ? -0.9 : (d > 440 ? 0.6 : 0.1);
    e.vx = lerp(e.vx, (v.x * want - v.y * 0.7 * e.strafe) * e.speed, 3 * dt);
    e.vy = lerp(e.vy, (v.y * want + v.x * 0.7 * e.strafe) * e.speed, 3 * dt);
    if (Math.random() < dt * 0.4) e.strafe *= -1;
    if (e.cd <= 0) {
      e.atk = (e.atk + 1) % 3;
      e.sub = 0;
      if (e.atk === 0) { e.state = "runes"; e.t = 0.55; audio.bossRoar("hexweaver"); }
      else if (e.atk === 1) { e.state = "hex"; e.t = 0.7; }
      else { e.state = "ward"; e.t = 0.8; }
    }
  } else if (e.state === "runes") {
    e.vx *= 0.9; e.vy *= 0.9;
    e.t -= dt;
    if (e.t <= 0) {
      // drop rune-zones (telegraphed AoE) on/around each living player — punishes standing still
      const k = (phase2 ? 4 : 3) + (e.hard ? 1 : 0);
      for (const tp of players) {
        if (tp.downed || tp.hp <= 0) continue;
        for (let i = 0; i < k; i++) {
          const ox = i === 0 ? 0 : rand(-150, 150);
          const oy = i === 0 ? 0 : rand(-130, 130);
          const tt = 1.0 + i * 0.1;
          mortars.push({
            x: clamp(tp.x + ox, 50, CONFIG.arenaW - 50),
            y: clamp(tp.y + oy, 50, CONFIG.arenaH - 50),
            r: 62, t: tt, tm: tt, dmg: 15, col: e.col,
          });
        }
      }
      if (phase2) { // overlapping ring of runes around the weaver
        const ring = 6;
        for (let i = 0; i < ring; i++) {
          const a = (i / ring) * TAU + e.rot;
          const tt = 1.2;
          mortars.push({
            x: clamp(e.x + Math.cos(a) * 150, 50, CONFIG.arenaW - 50),
            y: clamp(e.y + Math.sin(a) * 150, 50, CONFIG.arenaH - 50),
            r: 58, t: tt, tm: tt, dmg: 14, col: e.col,
          });
        }
      }
      audio.bolt();
      e.state = "move"; e.cd = rand(1.8, 2.4) * cdm;
    }
  } else if (e.state === "hex") {
    e.vx *= 0.92; e.vy *= 0.92;
    e.t -= dt;
    if (e.t <= 0) {
      const volleys = (phase2 ? 2 : 1) + (e.hard ? 1 : 0);
      const n = 3 + (phase2 ? 1 : 0);
      const a0 = angTo(e.x, e.y, p.x, p.y);
      for (let i = 0; i < n; i++) {
        fireHexOrb(e.x, e.y, a0 + (i - (n - 1) / 2) * 0.4, 150 + e.tier * 8, 12, "#dd88ff", 8, 1.4);
      }
      audio.bolt();
      e.sub++;
      if (e.sub >= volleys) { e.state = "move"; e.cd = rand(1.6, 2.2) * cdm; }
      else e.t = 0.4;
    }
  } else if (e.state === "ward") {
    e.vx *= 0.9; e.vy *= 0.9;
    e.t -= dt;
    if (e.t <= 0) {
      // raise a couple of temporary barriers (timed pillars) + summon adds behind them
      const k = phase2 ? 3 : 2;
      for (let i = 0; i < k; i++) {
        for (let tries = 0; tries < 18; tries++) {
          const a = rand(0, TAU), rr = rand(110, 200);
          const bx = clamp(e.x + Math.cos(a) * rr, 90, CONFIG.arenaW - 90);
          const by = clamp(e.y + Math.sin(a) * rr, 110, CONFIG.arenaH - 110);
          if (pointInPillar(bx, by, 40)) continue;
          if (dist(bx, by, CONFIG.arenaW / 2, CONFIG.arenaH - 90) < 130) continue;
          if (dist(bx, by, p.x, p.y) < 70) continue;
          pillars.push({ x: bx, y: by, r: 30, hue: "#3a2255", ttl: 6 + (phase2 ? 3 : 0), maxTtl: 6 + (phase2 ? 3 : 0) });
          break;
        }
      }
      const adds = (phase2 ? 3 : 2) + (e.hard ? 1 : 0);
      for (let i = 0; i < adds; i++) {
        const a = (i / adds) * TAU + e.rot;
        const x = clamp(e.x + Math.cos(a) * 120, 50, CONFIG.arenaW - 50);
        const y = clamp(e.y + Math.sin(a) * 120, 50, CONFIG.arenaH - 50);
        spawnQ.push({ type: Math.random() < 0.5 ? "swarmer" : "chaser", x, y, t: 0.8 });
      }
      audio.bossRoar("hexweaver");
      e.state = "move"; e.cd = rand(2.2, 3.0) * cdm;
    }
  }
  enemyContact(e, 12, dt);
}

/* ---------------- §R UPDATE: WORLD ---------------- */
function step(dt) {
  timeNow += dt;
  // execution slow-mo decays in REAL time (the loop runs game time at 0.3x while active)
  if (slowmoT > 0) slowmoT = Math.max(0, slowmoT - dt / 0.3);
  stylePop = Math.max(0, stylePop - dt);
  ffx.update(dt);
  updateMotes(dt);
  // adaptive audio: combat intensity layer + low-HP heartbeat
  audio.updateDynamics(dt,
    state === "play" && !roomClear && (enemies.length > 0 || spawnQ.length > 0),
    anyLowHp());
  if (freezeT > 0) { freezeT -= dt; return; }
  shakeT = Math.max(0, shakeT - dt);
  if (shakeT <= 0) shakeA = 0;
  redFlash = Math.max(0, redFlash - dt * 1.6);
  roomFade = Math.max(0, roomFade - dt * 2.4);
  bossWarnT = Math.max(0, bossWarnT - dt);

  for (const t of toasts) t.t -= dt;
  toasts = toasts.filter((t) => t.t > 0);

  if (state !== "play" && state !== "hub") {
    updateParts(dt);
    return;
  }
  // update every player (downed players still tick for revive). Solo path unchanged.
  for (const p of players) {
    if (p && (p.hp > 0 || p.downed)) updatePlayer(p, dt);
  }
  ctxP = players[0] || null;

  // style meter chain decay
  if (styleT > 0) {
    styleT -= dt;
    if (styleT <= 0) { styleN = 0; styleRank = -1; }
  }
  // aggregated core pickup float text
  if (coreFloatT > 0) {
    coreFloatT -= dt;
    if (coreFloatT <= 0 && coreFloatN > 0 && player) {
      dnum(player.x, player.y - 24, "+" + coreFloatN + " ⬡", "#ffcc44", false);
      coreFloatN = 0;
    }
  }

  // spawn queue
  for (const q of spawnQ) {
    q.t -= dt;
    if (q.t <= 0) spawnEnemy(q.type, q.x, q.y);
  }
  spawnQ = spawnQ.filter((q) => q.t > 0);

  // enemies
  for (const e of enemies) if (e.hp > 0) updateEnemy(e, dt);
  enemies = enemies.filter((e) => e.hp > 0);

  // environmental hazards (spikes / fences / barrels / quakes)
  updateHazards(dt);

  // challenge gauntlet countdown
  if (state === "play" && roomType === "challenge" && !roomClear && !challengeFailed) {
    const prevT = challengeT;
    challengeT -= dt;
    if (challengeT > 0 && challengeT <= 10 && Math.ceil(prevT) !== Math.ceil(challengeT)) audio.challengeTick();
    if (challengeT <= 0) {
      challengeFailed = true;
      toast("OUT OF TIME — 超时：普通奖励 — normal reward", "#ff7755");
      audio.deny();
    }
  }

  // waves / clear
  if (state === "play" && !roomClear && enemies.length === 0 && spawnQ.length === 0) {
    if (waveIdx < waves.length) {
      queueWave(waves[waveIdx]);
      waveIdx++;
      toast("WAVE " + (waveIdx) + " / " + waves.length, "#cc66ff");
    } else {
      roomClear = true;
      roomsCleared++;
      for (const p of players) { // SECOND WIND: per-player heal on room clear
        if (p.downed || p.hp <= 0) continue;
        const lv = p.boonPow && p.boonPow.wind ? p.boonPow.wind : 0;
        if (lv > 0) {
          const h = Math.round(12 * lv);
          p.hp = Math.min(p.maxHp, p.hp + h);
          dnum(p.x, p.y - 20, "+" + h, "#66ff99", false);
        }
      }
      if (roomType === "challenge") {
        // timed gauntlet payout: double cores if cleared inside the limit
        const base = 12 + depth * 3;
        const success = !challengeFailed;
        const got = coreGain(success ? base * 2 : base);
        saveMeta();
        if (success) {
          toast("CHALLENGE CLEAR — 双倍奖励 +" + got + " ◆", "#ffee55");
          audio.challengeWin();
          burst(player.x, player.y, "#ffee55", 26, 240, 0.7, 3);
        } else {
          toast("+" + got + " ◆", "#ffcc44");
        }
      }
      // style payout: best chain rank this room grants bonus cores
      if (styleBestRoom >= 0 && STYLE_RANKS[styleBestRoom].bonus > 0) {
        const sR = STYLE_RANKS[styleBestRoom];
        const got = coreGain(sR.bonus);
        if (got > 0) toast("STYLE " + sR.n + " — +" + got + " ◆", sR.col);
        saveMeta();
      }
      // lifetime stats: boss defeat tally
      if (roomType === "boss" && lastBossKind) {
        stats.boss[lastBossKind] = (stats.boss[lastBossKind] | 0) + 1;
      }
      saveStats();
      openDoors();
    }
  }

  // player bolts
  for (const b of pbolts) {
    ctxP = b.owner || player; // boon/crit context = the firing player
    b.x += b.vx * dt; b.y += b.vy * dt;
    b.t -= dt;
    addPart({ x: b.x, y: b.y, vx: 0, vy: 0, t: 0.15, tm: 0.15, col: "#ff66ee", r: 2, drag: 0 });
    const A = CONFIG;
    if (b.x < A.wall || b.x > A.arenaW - A.wall || b.y < A.wall || b.y > A.arenaH - A.wall) b.t = -1;
    if (pointInPillar(b.x, b.y, b.r)) { burst(b.x, b.y, "#ff66ee", 5, 100, 0.25, 2); b.t = -1; }
    if (b.t <= 0) continue;
    for (const bl of barrels) { // bolts detonate volatile barrels
      if (bl.dead || dist(b.x, b.y, bl.x, bl.y) >= b.r + bl.r) continue;
      igniteBarrel(bl, 0.05);
      if (b.pierce > 0) b.pierce--;
      else { b.t = -1; burst(b.x, b.y, "#ff66ee", 5, 120, 0.2, 2); }
      break;
    }
    if (b.t <= 0) continue;
    for (const e of enemies) {
      if (e.hp <= 0 || b.hitSet.includes(e)) continue;
      if (dist(b.x, b.y, e.x, e.y) < b.r + e.r) {
        if (shieldBlocks(e, b.x - b.vx * 0.02, b.y - b.vy * 0.02)) {
          // frontal energy shield eats the bolt
          burst(b.x, b.y, "#88aaff", 6, 140, 0.25, 2);
          audio.clank();
          b.t = -1;
          break;
        }
        const crit = critRoll();
        const a = Math.atan2(b.vy, b.vx);
        hitEnemy(e, boltDamage(), Math.cos(a) * 130, Math.sin(a) * 130, crit, false);
        if (crit && boonLv("volt")) applyShock(e, 7 * boonPow("volt") * dmgMul(), 1); // VOLT ROUNDS
        b.hitSet.push(e);
        if (b.pierce > 0) b.pierce--;
        else { b.t = -1; burst(b.x, b.y, "#ff66ee", 6, 140, 0.25, 2); break; }
      }
    }
  }
  pbolts = pbolts.filter((b) => b.t > 0);

  // enemy bolts
  for (const b of ebolts) {
    // HEXWEAVER hex-orbs curve toward the nearest player while their homing window lasts
    if (b.homing > 0) {
      b.homing -= dt;
      const tp = nearestPlayer(b.x, b.y, false);
      if (tp) {
        const desired = angTo(b.x, b.y, tp.x, tp.y);
        const cur = Math.atan2(b.vy, b.vx);
        const na = cur + clamp(angDiff(cur, desired), -2.6 * dt, 2.6 * dt);
        b.vx = Math.cos(na) * b.spd; b.vy = Math.sin(na) * b.spd;
      }
    }
    b.x += b.vx * dt; b.y += b.vy * dt;
    b.t -= dt;
    const A = CONFIG;
    if (b.x < A.wall || b.x > A.arenaW - A.wall || b.y < A.wall || b.y > A.arenaH - A.wall) b.t = -1;
    if (pointInPillar(b.x, b.y, b.r)) { burst(b.x, b.y, b.col, 4, 90, 0.2, 2); b.t = -1; }
    if (b.t > 0) {
      for (const p of players) {
        if (p.downed || p.hp <= 0) continue;
        if (dist(b.x, b.y, p.x, p.y) < b.r + p.r) {
          if (p.ifr <= 0 && p.hurtT <= 0) {
            damagePlayer(b.dmg, Math.atan2(b.vy, b.vx), null, p);
            b.t = -1;
            break;
          }
        }
      }
    }
  }
  ebolts = ebolts.filter((b) => b.t > 0);

  // ground zones (dash AFTERBURN trail · EMBER STAFF burning patches · ARC FIELD shock fields)
  for (const z of zones) {
    z.t -= dt; z.tick -= dt;
    if (z.tick <= 0) {
      z.tick = z.shock ? 0.3 : 0.18;
      const zdps = (z.ember || z.shock) ? z.dps : 4 * dmgMul() * boonPow("trail");
      for (const e of enemies) {
        if (e.hp > 0 && dist(z.x, z.y, e.x, e.y) < z.r + e.r) {
          if (z.shock) { statusDamage(e, zdps, "#ffee55"); if (e.hp > 0) e.shockT = Math.max(e.shockT || 0, e.type === "boss" ? 0.12 : 0.3); }
          else if (z.ember) { statusDamage(e, zdps, "#ffaa44"); if (z.fireslow) { e.iceSlow = Math.max(e.iceSlow || 0, 0.4); e.iceSlowT = Math.max(e.iceSlowT || 0, 0.4); } }
          else hitEnemy(e, zdps, 0, 0, false, false);
        }
      }
      addPart({ x: z.x + rand(-14, 14), y: z.y + rand(-14, 14), vx: 0, vy: z.shock ? 0 : -40, t: 0.4, tm: 0.4, col: z.shock ? "#ffee55" : "#ffaa44", r: rand(2, 4), drag: 1 });
    }
  }
  zones = zones.filter((z) => z.t > 0);

  // mortar strikes (telegraphed AoE circles)
  for (const m of mortars) {
    m.t -= dt;
    if (m.t <= 0) {
      burst(m.x, m.y, m.col || "#ff8833", 26, 320, 0.55, 3.5);
      shake(6, 0.25);
      audio.enemyDie(true);
      damagePlayersInRadius(m.x, m.y, m.r, m.dmg * eDmgMul(), null);
      for (const bl of barrels) { // mortar impacts cook off barrels
        if (!bl.dead && bl.fuse < 0 && dist(m.x, m.y, bl.x, bl.y) < m.r + bl.r) igniteBarrel(bl, 0.1);
      }
    }
  }
  mortars = mortars.filter((m) => m.t > 0);

  // OVERSEER laser sweeps: rotate, telegraph, then damage players the live beam crosses
  for (const s of sweeps) {
    s.t += dt;
    s.a += s.rate * dt;
    s.hitCD = Math.max(0, s.hitCD - dt);
    if (s.t >= s.warn && s.t < s.warn + s.live && s.hitCD <= 0) {
      const ex = s.cx + Math.cos(s.a) * s.len, ey = s.cy + Math.sin(s.a) * s.len;
      for (const p of players) {
        if (p.downed || p.hp <= 0) continue;
        if (p.ifr > 0 || p.hurtT > 0) continue;
        const sd = segDist(p.x, p.y, s.cx, s.cy, ex, ey);
        if (sd.d < 9 + p.r) {
          damagePlayer(s.dmg * eDmgMul(), angTo(sd.cx, sd.cy, p.x, p.y), null, p);
          s.hitCD = 0.45;
          break;
        }
      }
    }
  }
  for (let i = sweeps.length - 1; i >= 0; i--) {
    if (sweeps[i].t >= sweeps[i].warn + sweeps[i].live) {
      if (sweepPool.length < SWEEP_CAP) sweepPool.push(sweeps[i]);
      sweeps.splice(i, 1);
    }
  }

  // freeze novas (visual rings)
  for (const nv of novas) nv.t -= dt;
  novas = novas.filter((nv) => nv.t > 0);

  // graviton singularities: pull nearby foes inward, then implode
  for (const sg of singularities) {
    ctxP = sg.owner || player; // boon/crit context = the wielder who cast it
    sg.t -= dt;
    const pr = 1 - clamp(sg.t / sg.tm, 0, 1);
    for (const e of enemies) {
      if (e.hp <= 0) continue;
      if (e.type === "boss" && !sg.pullBoss) continue; // bosses resist the pull unless DENSITY
      const d = dist(sg.x, sg.y, e.x, e.y);
      if (d < sg.pullR && d > 1) {
        const a = angTo(e.x, e.y, sg.x, sg.y);
        const bossResist = e.type === "boss" ? 0.22 : 1; // DENSITY drags bosses, but gently
        const force = (1 - d / sg.pullR) * 1400 * dt * bossResist;
        e.kbx += Math.cos(a) * force; e.kby += Math.sin(a) * force;
        if (sg.slow) e.gravSlow = 0.12;
        if (!sg.pulled.includes(e)) sg.pulled.push(e);
      }
    }
    if (sg.t <= 0 && !sg.done) { // implosion burst
      sg.done = true;
      const nPulled = sg.pulled.filter((e) => e.hp > 0).length;
      const collapseMul = 1 + 0.35 * boonPow("collapse") * nPulled; // COLLAPSE: scales with foes pulled
      const idmg = sg.dmg * collapseMul;
      burst(sg.x, sg.y, sg.col, 26, 320, 0.6, 4);
      burst(sg.x, sg.y, "#ffffff", 10, 240, 0.35, 2.5);
      novas.push({ x: sg.x, y: sg.y, t: 0.35, tm: 0.35, maxR: sg.pullR * 0.7, col: sg.col });
      ffx.ring(sg.x, sg.y, sg.pullR * 0.7, sg.col, 0.4, 5);
      ffx.spawnLight(sg.x, sg.y, sg.pullR, sg.col, 1);
      ffx.pulse(sg.x, sg.y, 7);
      shake(5, 0.2);
      audio.gravImplode();
      const ir = sg.pullR * 0.6;
      for (const e of enemies) {
        if (e.hp <= 0) continue;
        if (dist(sg.x, sg.y, e.x, e.y) < ir + e.r) {
          const crit = critRoll() || sg.darkstar;     // DARK STAR: implosion always crits
          hitEnemy(e, idmg, 0, 0, crit, true);
          if (e.hp > 0 && sg.darkstar) applyShock(e, 6 * dmgMul(), 1); // DARK STAR: shock all caught
          if (e.hp > 0 && boonLv("ignite")) applyBurn(e, 4 * boonPow("ignite") * dmgMul());
        }
      }
      for (const bl of barrels) {
        if (!bl.dead && bl.fuse < 0 && dist(sg.x, sg.y, bl.x, bl.y) < ir + bl.r) igniteBarrel(bl, 0.06);
      }
    }
  }
  singularities = singularities.filter((s) => s.t > 0);

  // glaive thrown blades (pooled): fly out & return, hitting on both legs
  updateGlaives(dt);

  // staff/wand spell projectiles (pooled): fireballs & icebolts
  updateSpells(dt);

  // ballistic gun bullets (pooled): rifle rounds, scatter pellets
  updateBullets(dt);

  // bow arrows (pooled): quick/long/storm arrows + ARROW RAIN volleys
  updateArrows(dt);

  // beams
  for (const bm of beams) bm.t -= dt;
  beams = beams.filter((bm) => bm.t > 0);

  // pickups
  for (const pk of pickups) {
    pk.t -= dt;
    pk.x += pk.vx * dt; pk.y += pk.vy * dt;
    pk.vx *= Math.pow(0.05, dt); pk.vy *= Math.pow(0.05, dt);
    const A = CONFIG;
    pk.x = clamp(pk.x, A.wall + 8, A.arenaW - A.wall - 8);
    pk.y = clamp(pk.y, A.wall + 8, A.arenaH - A.wall - 8);
  }
  pickups = pickups.filter((pk) => pk.t > 0);

  updateParts(dt);

  // damage numbers
  for (const n of dnums) { n.t -= dt; n.y += n.vy * dt; n.vy *= Math.pow(0.2, dt); }
  dnums = dnums.filter((n) => n.t > 0);

  // door open anim
  for (const d of doors) d.openT = Math.min(1, d.openT + dt * 2);
}

function updateMotes(dt) {
  if (!ffx.ambient) { if (motes.length) motes.length = 0; return; }
  const want = ffx.level === "full" ? 34 : 18;
  while (motes.length < want) {
    motes.push({
      x: rand(0, CONFIG.arenaW), y: rand(0, CONFIG.arenaH),
      vx: rand(-7, 7), vy: rand(-12, -3), r: rand(0.7, 2), ph: rand(0, TAU),
      col: Math.random() < 0.5 ? "rgba(120,150,255," : "rgba(110,200,255,",
    });
  }
  while (motes.length > want) motes.pop();
  for (const m of motes) {
    m.x += (m.vx + Math.sin(timeNow * 0.5 + m.ph) * 4) * dt;
    m.y += m.vy * dt;
    if (m.y < -6) { m.y = CONFIG.arenaH + 6; m.x = rand(0, CONFIG.arenaW); }
    if (m.x < -6) m.x = CONFIG.arenaW + 6; else if (m.x > CONFIG.arenaW + 6) m.x = -6;
  }
}

function updateParts(dt) {
  for (const p of parts) {
    p.t -= dt;
    p.x += p.vx * dt; p.y += p.vy * dt;
    const dr = Math.pow(Math.exp(-(p.drag || 0)), dt);
    p.vx *= dr; p.vy *= dr;
  }
  parts = parts.filter((p) => p.t > 0);
}

/* ---------------- §S RENDER: WORLD ---------------- */
function glow(col, b) { ctx.shadowColor = col; ctx.shadowBlur = b; }
function noglow() { ctx.shadowBlur = 0; }
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

/* biome tints by depth range — deeper sectors look distinct (floor/grid/center light).
   Hub keeps the default cold blue. Purely visual; doesn't affect collision/gameplay. */
const BIOMES = [
  { floor: "#070720", grid: "rgba(70,80,160,0.13)",  light: "rgba(60,70,160,0.10)" },  // 0: SURFACE (cold blue)
  { floor: "#0a0518", grid: "rgba(150,80,170,0.12)", light: "rgba(150,70,180,0.10)" }, // 1: VOID (violet)
  { floor: "#0a0712", grid: "rgba(190,90,60,0.12)",  light: "rgba(190,90,50,0.10)" },  // 2: FORGE (amber/red)
  { floor: "#04140f", grid: "rgba(60,180,140,0.12)", light: "rgba(50,180,140,0.10)" }, // 3: REACTOR (teal/green)
  { floor: "#0f0510", grid: "rgba(210,70,110,0.13)", light: "rgba(210,60,110,0.11)" }, // 4: ABYSS (crimson)
];
function biomeForDepth(d) {
  if (d <= 0) return BIOMES[0];
  return BIOMES[Math.min(BIOMES.length - 1, Math.floor((d - 1) / 4) + 1)];
}
function drawArenaFloor() {
  const A = CONFIG;
  const bi = state === "hub" ? BIOMES[0] : biomeForDepth(depth);
  // floor
  ctx.fillStyle = bi.floor;
  ctx.fillRect(0, 0, A.arenaW, A.arenaH);
  // grid
  ctx.strokeStyle = bi.grid;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 60; x < A.arenaW; x += 60) { ctx.moveTo(x, 0); ctx.lineTo(x, A.arenaH); }
  for (let y = 60; y < A.arenaH; y += 60) { ctx.moveTo(0, y); ctx.lineTo(A.arenaW, y); }
  ctx.stroke();
  // soft center light
  const g = ctx.createRadialGradient(A.arenaW / 2, A.arenaH / 2, 50, A.arenaW / 2, A.arenaH / 2, A.arenaW * 0.7);
  g.addColorStop(0, bi.light);
  g.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, A.arenaW, A.arenaH);
  // walls
  const w = A.wall;
  glow(state === "hub" ? "#44ddaa" : "#3355ff", 14);
  ctx.strokeStyle = state === "hub" ? "rgba(80,230,180,0.7)" : "rgba(90,110,255,0.65)";
  ctx.lineWidth = 3;
  ctx.strokeRect(w, w, A.arenaW - w * 2, A.arenaH - w * 2);
  noglow();
  ctx.strokeStyle = "rgba(20,25,60,0.9)";
  ctx.lineWidth = w;
  ctx.strokeRect(w / 2, w / 2, A.arenaW - w, A.arenaH - w);
}

/* dynamic point lights: soft additive radial gradients onto the dark floor.
   Bright entities cast reactive light; capped + additive to stay cheap. */
function drawLighting() {
  lights.length = 0;
  if (ffx.level === "off") return;
  const cap = ffx.lightCap;
  const add = (x, y, r, col, a) => { if (lights.length < cap) lights.push({ x, y, r, col, a }); };
  // player core glow (per player; weapon-tinted slash glow)
  if (state === "play" || state === "hub") {
    for (const p of players) {
      if (!p || p.hp <= 0) continue;
      add(p.x, p.y, 90, p.dashT > 0 ? p.colDash : p.col, p.dashT > 0 ? 0.5 : (p.downed ? 0.18 : 0.32));
      if (p.slashT > 0) { const W = weaponDefP(p); add(p.x + Math.cos(p.slashAng) * 30, p.y + Math.sin(p.slashAng) * 30, 70, W.col, 0.4); }
    }
  }
  for (const g of glaives) add(g.x, g.y, 50, g.col, 0.34);
  for (const s of spells) add(s.x, s.y, s.kind === "fire" ? 60 : 44, s.col, s.kind === "fire" ? 0.4 : 0.3);
  for (const b of bullets) add(b.x, b.y, 30, b.col, 0.22);
  for (const b of pbolts) add(b.x, b.y, 46, "#ff66ee", 0.32);
  for (const b of ebolts) add(b.x, b.y, 40, b.col, 0.26);
  for (const z of zones) add(z.x, z.y, 64, "#ffaa44", 0.3);
  for (const s of sweeps) { // OVERSEER beam emitter glow when live
    if (s.t >= s.warn && s.t < s.warn + s.live) add(s.cx, s.cy, 70, s.col, 0.3);
  }
  for (const nv of novas) {
    const pr = 1 - clamp(nv.t / nv.tm, 0, 1);
    add(nv.x, nv.y, lerp(40, nv.maxR, pr), nv.col || "#aaeeff", (1 - pr) * 0.5);
  }
  for (const sg of singularities) add(sg.x, sg.y, sg.pullR, sg.col, 0.4 + 0.4 * (1 - sg.t / sg.tm));
  for (const f of ffx.flashes) add(f.x, f.y, f.r, f.col, f.a * (f.t / f.tm));
  for (const b of barrels) { if (!b.dead) add(b.x, b.y, b.fuse >= 0 ? 90 : 44, "#ffb050", b.fuse >= 0 ? 0.5 : 0.22); }
  // burning enemies cast warm flicker light; frozen ones a cold glow
  for (const e of enemies) {
    if (e.hp <= 0) continue;
    if ((e.burnT || 0) > 0) add(e.x, e.y, 54 + Math.sin(timeNow * 18 + e.x) * 8, "#ff8844", 0.3);
    else if (e.frozenT > 0) add(e.x, e.y, 44, "#bfe8ff", 0.22);
  }
  for (const pd of pillars) add(pd.x, pd.y, pd.r + 26, "#5577ff", 0.12); // glowstone-like props
  if (!lights.length) return;
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  for (const L of lights) {
    const g = ctx.createRadialGradient(L.x, L.y, 0, L.x, L.y, L.r);
    g.addColorStop(0, hexA(L.col, L.a));
    g.addColorStop(1, hexA(L.col, 0));
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(L.x, L.y, L.r, 0, TAU); ctx.fill();
  }
  ctx.restore();
}

/* convert "#rrggbb" + alpha to rgba(); passes through rgba() strings */
const _hexCache = {};
function hexA(col, a) {
  if (col[0] !== "#") return col + (col.endsWith(",") ? a + ")" : "");
  let rgb = _hexCache[col];
  if (!rgb) {
    const h = col.length === 4
      ? [col[1] + col[1], col[2] + col[2], col[3] + col[3]]
      : [col.slice(1, 3), col.slice(3, 5), col.slice(5, 7)];
    rgb = _hexCache[col] = h.map((x) => parseInt(x, 16));
  }
  return "rgba(" + rgb[0] + "," + rgb[1] + "," + rgb[2] + "," + a + ")";
}

/* additive bloom helper: redraw an emissive shape larger & faint under 'lighter' */
function bloomCircle(x, y, r, col, a) {
  if (!ffx.bloom) return;
  ctx.save();
  ctx.globalCompositeOperation = "lighter";
  ctx.globalAlpha = a;
  const g = ctx.createRadialGradient(x, y, 0, x, y, r);
  g.addColorStop(0, hexA(col, 0.9));
  g.addColorStop(1, hexA(col, 0));
  ctx.fillStyle = g;
  ctx.beginPath(); ctx.arc(x, y, r, 0, TAU); ctx.fill();
  ctx.restore();
}

function drawMotes() {
  if (!ffx.ambient || !motes.length) return;
  for (const m of motes) {
    const tw = 0.25 + 0.35 * (0.5 + 0.5 * Math.sin(timeNow * 2 + m.ph));
    ctx.fillStyle = m.col + tw + ")";
    ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, TAU); ctx.fill();
  }
}

function drawSingularities() {
  for (const sg of singularities) {
    const pr = 1 - clamp(sg.t / sg.tm, 0, 1);
    ctx.save();
    // accretion swirl
    ctx.translate(sg.x, sg.y);
    ctx.rotate(timeNow * 6 + pr * 4);
    glow(sg.col, 18);
    ctx.strokeStyle = sg.col;
    for (let i = 0; i < 3; i++) {
      const rr = sg.pullR * (0.55 - i * 0.15) * (1 - pr * 0.4);
      ctx.globalAlpha = 0.5 - i * 0.12;
      ctx.lineWidth = 2.5 - i * 0.5;
      ctx.beginPath();
      ctx.arc(0, 0, rr, i * 1.6, i * 1.6 + 4.2);
      ctx.stroke();
    }
    noglow();
    // dark core
    ctx.globalAlpha = 0.9;
    const cg = ctx.createRadialGradient(0, 0, 0, 0, 0, 14 + pr * 6);
    cg.addColorStop(0, "rgba(8,2,18,0.95)");
    cg.addColorStop(1, "rgba(8,2,18,0)");
    ctx.fillStyle = cg;
    ctx.beginPath(); ctx.arc(0, 0, 14 + pr * 6, 0, TAU); ctx.fill();
    ctx.restore();
    // faint pull-radius ring
    ctx.save();
    ctx.globalAlpha = 0.18 * (1 - pr);
    ctx.strokeStyle = sg.col;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(sg.x, sg.y, sg.pullR, 0, TAU); ctx.stroke();
    ctx.restore();
    bloomCircle(sg.x, sg.y, 24, sg.col, 0.4 * (1 - pr));
  }
}

/* impact / shockwave rings */
function drawFxRings() {
  for (const r of ffx.rings) {
    const pr = 1 - clamp(r.t / r.tm, 0, 1);
    const rad = lerp(r.r0, r.r, Math.min(1, pr * 1.1));
    ctx.save();
    ctx.globalCompositeOperation = "lighter";
    ctx.globalAlpha = (1 - pr) * 0.8;
    glow(r.col, 14);
    ctx.strokeStyle = r.col;
    ctx.lineWidth = r.w * (1 - pr) + 1;
    ctx.beginPath(); ctx.arc(r.x, r.y, rad, 0, TAU); ctx.stroke();
    noglow();
    ctx.restore();
  }
}

function drawPillars() {
  for (const p of pillars) {
    const tmp = p.ttl !== undefined;
    ctx.save();
    if (tmp) {
      // HEXWEAVER ward barrier: pulsing arcane sigil; fades as it expires
      const lifeIn = clamp((p.maxTtl - p.ttl) / 0.5, 0, 1);
      const lifeOut = clamp(p.ttl / 0.6, 0, 1);
      ctx.globalAlpha = Math.min(lifeIn, lifeOut);
      glow("#cc66ff", 12 + 4 * Math.sin(timeNow * 6));
      ctx.fillStyle = p.hue;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.fill();
      noglow();
      ctx.strokeStyle = "rgba(204,136,255,0.7)";
      ctx.lineWidth = 2.5;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.stroke();
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(timeNow * 1.5);
      ctx.strokeStyle = "rgba(230,180,255,0.45)";
      ctx.lineWidth = 2;
      ctx.beginPath();
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * TAU;
        if (i === 0) ctx.moveTo(Math.cos(a) * p.r * 0.6, Math.sin(a) * p.r * 0.6);
        else ctx.lineTo(Math.cos(a) * p.r * 0.6, Math.sin(a) * p.r * 0.6);
      }
      ctx.closePath(); ctx.stroke();
      ctx.restore();
      ctx.restore();
      continue;
    }
    glow("#3355ff", 10);
    ctx.fillStyle = p.hue;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.fill();
    noglow();
    ctx.strokeStyle = "rgba(110,140,255,0.5)";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.stroke();
    ctx.strokeStyle = "rgba(110,140,255,0.18)";
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 0.62, 0, TAU); ctx.stroke();
    ctx.restore();
  }
}

function drawDoors() {
  for (const d of doors) {
    const o = d.openT;
    const rw = DOOR_REWARDS[d.reward];
    ctx.save();
    ctx.globalAlpha = o;
    glow(rw.col, 16);
    ctx.fillStyle = "rgba(8,10,30,0.95)";
    rrect(d.x - d.w / 2, d.y - d.h / 2, d.w, d.h, 6); ctx.fill();
    ctx.strokeStyle = rw.col;
    ctx.lineWidth = 2;
    rrect(d.x - d.w / 2, d.y - d.h / 2, d.w, d.h, 6); ctx.stroke();
    noglow();
    ctx.fillStyle = rw.col;
    ctx.font = "bold 13px 'Courier New', monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(rw.label, d.x, d.y + 1);
    // reward icon above
    const iy = d.y + d.h / 2 + 16 + Math.sin(timeNow * 3) * 3;
    glow(rw.col, 10);
    ctx.beginPath();
    if (d.reward === "boon") {
      ctx.moveTo(d.x, iy - 8); ctx.lineTo(d.x + 7, iy); ctx.lineTo(d.x, iy + 8); ctx.lineTo(d.x - 7, iy);
      ctx.closePath(); ctx.fill();
    } else if (d.reward === "hp") {
      ctx.fillRect(d.x - 8, iy - 2.5, 16, 5); ctx.fillRect(d.x - 2.5, iy - 8, 5, 16);
    } else if (d.reward === "energy") {
      ctx.moveTo(d.x + 3, iy - 9); ctx.lineTo(d.x - 5, iy + 1); ctx.lineTo(d.x - 1, iy + 1);
      ctx.lineTo(d.x - 3, iy + 9); ctx.lineTo(d.x + 5, iy - 1); ctx.lineTo(d.x + 1, iy - 1);
      ctx.closePath(); ctx.fill();
    } else if (d.reward === "shop") {
      // pedestal + floating ware icon
      ctx.fillRect(d.x - 8, iy + 4, 16, 4);
      ctx.fillRect(d.x - 4, iy, 8, 4);
      ctx.arc(d.x, iy - 6, 5, 0, TAU); ctx.fill();
    } else if (d.reward === "challenge") {
      // stopwatch: ring + ticking hand
      ctx.strokeStyle = rw.col; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(d.x, iy, 8, 0, TAU); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(d.x, iy);
      const ha = -Math.PI / 2 + (timeNow % 2) * Math.PI;
      ctx.lineTo(d.x + Math.cos(ha) * 6, iy + Math.sin(ha) * 6);
      ctx.stroke();
      ctx.fillRect(d.x - 2, iy - 12, 4, 3);
    } else if (d.reward === "treasure") {
      // chest: box + lid + latch
      ctx.fillRect(d.x - 8, iy - 2, 16, 8);
      ctx.fillRect(d.x - 9, iy - 6, 18, 3);
      ctx.fillStyle = "#070720";
      ctx.fillRect(d.x - 1.5, iy, 3, 3);
      ctx.fillStyle = rw.col;
    } else if (d.reward === "fountain") {
      // droplet
      ctx.moveTo(d.x, iy - 9);
      ctx.quadraticCurveTo(d.x + 7, iy + 1, d.x, iy + 7);
      ctx.quadraticCurveTo(d.x - 7, iy + 1, d.x, iy - 9);
      ctx.closePath(); ctx.fill();
    } else {
      ctx.arc(d.x, iy, 6, 0, TAU); ctx.fill();
    }
    noglow();
    if (d.bossNext) {
      ctx.fillStyle = "#ff3366";
      ctx.font = "bold 11px 'Courier New', monospace";
      ctx.fillText("⚠ BOSS", d.x, iy + 20);
    }
    ctx.restore();
  }
}

function drawZonesAndPickups() {
  for (const z of zones) {
    const a = clamp(z.t / 1.5, 0, 1);
    ctx.fillStyle = "rgba(255,150,50," + (0.16 * a) + ")";
    glow("#ffaa44", 8);
    ctx.beginPath(); ctx.arc(z.x, z.y, z.r, 0, TAU); ctx.fill();
    noglow();
  }
  // mortar AoE telegraphs (inner circle closes in as impact nears)
  for (const m of mortars) {
    const pr = 1 - clamp(m.t / m.tm, 0, 1);
    const col = m.col || "#ff8833";
    ctx.strokeStyle = col;
    ctx.fillStyle = "rgba(255,136,51," + (0.06 + pr * 0.16) + ")";
    glow(col, 10);
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(m.x, m.y, m.r, 0, TAU); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(m.x, m.y, m.r * pr, 0, TAU); ctx.stroke();
    noglow();
  }
  // freeze nova / maul shockwave rings
  for (const nv of novas) {
    const pr = 1 - clamp(nv.t / nv.tm, 0, 1);
    const r = lerp(14, nv.maxR, Math.min(1, pr * 1.15));
    ctx.save();
    ctx.globalAlpha = clamp(1 - pr, 0, 1) * 0.9;
    glow(nv.col || "#aaeeff", 20);
    ctx.strokeStyle = nv.col || "#cfeeff";
    ctx.lineWidth = 6 * (1 - pr) + 2;
    ctx.beginPath(); ctx.arc(nv.x, nv.y, r, 0, TAU); ctx.stroke();
    ctx.strokeStyle = nv.col ? "rgba(255,153,102,0.4)" : "rgba(170,230,255,0.4)";
    ctx.lineWidth = 14 * (1 - pr) + 2;
    ctx.beginPath(); ctx.arc(nv.x, nv.y, r * 0.92, 0, TAU); ctx.stroke();
    noglow();
    ctx.restore();
  }
  for (const pk of pickups) {
    const bob = Math.sin(timeNow * 5 + pk.x) * 2;
    if (pk.kind === "core") {
      glow("#ffcc44", 10);
      ctx.fillStyle = "#ffcc44";
      ctx.save();
      ctx.translate(pk.x, pk.y + bob);
      ctx.rotate(timeNow * 2);
      ctx.fillRect(-4, -4, 8, 8);
      ctx.restore();
    } else {
      glow("#66ff99", 10);
      ctx.fillStyle = "#66ff99";
      ctx.fillRect(pk.x - 6, pk.y + bob - 2, 12, 4);
      ctx.fillRect(pk.x - 2, pk.y + bob - 6, 4, 12);
    }
    noglow();
  }
}

/* OVERSEER laser sweeps: dashed warning line while arming, solid hot beam when live */
function drawSweeps() {
  for (const s of sweeps) {
    const ex = s.cx + Math.cos(s.a) * s.len, ey = s.cy + Math.sin(s.a) * s.len;
    const live = s.t >= s.warn && s.t < s.warn + s.live;
    ctx.save();
    if (live) {
      glow(s.col, 16);
      ctx.strokeStyle = s.col;
      ctx.lineWidth = 6;
      ctx.beginPath(); ctx.moveTo(s.cx, s.cy); ctx.lineTo(ex, ey); ctx.stroke();
      ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(s.cx, s.cy); ctx.lineTo(ex, ey); ctx.stroke();
      noglow();
    } else {
      const p = clamp(s.t / s.warn, 0, 1);
      ctx.globalAlpha = 0.25 + p * 0.55;
      ctx.strokeStyle = s.col;
      ctx.lineWidth = 2 + p * 2;
      ctx.setLineDash([12, 9]);
      ctx.beginPath(); ctx.moveTo(s.cx, s.cy); ctx.lineTo(ex, ey); ctx.stroke();
      ctx.setLineDash([]);
    }
    ctx.restore();
  }
}

function drawHazards() {
  // AFTERSHOCK quake rings
  for (const q of quakes) {
    const a = clamp(q.t / q.tm, 0, 1);
    ctx.save();
    ctx.globalAlpha = 0.5 * a;
    glow("#ff9966", 8);
    ctx.strokeStyle = "#ff9966";
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(q.x, q.y, q.r, 0, TAU); ctx.stroke();
    ctx.fillStyle = "rgba(255,153,102,0.07)";
    ctx.beginPath(); ctx.arc(q.x, q.y, q.r, 0, TAU); ctx.fill();
    noglow();
    ctx.restore();
  }
  for (const h of hazards) {
    if (h.kind === "spike") {
      const act = spikeActive(h), warn = spikeWarning(h);
      const s = h.s;
      ctx.save();
      ctx.fillStyle = act ? "rgba(80,20,30,0.85)" : "rgba(30,18,40,0.8)";
      ctx.strokeStyle = act ? "#ff5566" : warn ? "rgba(255,119,85," + (0.45 + 0.45 * Math.abs(Math.sin(timeNow * 14))) + ")" : "rgba(255,119,85,0.35)";
      ctx.lineWidth = 2;
      if (act) glow("#ff5566", 12);
      rrect(h.x - s, h.y - s, s * 2, s * 2, 5); ctx.fill();
      rrect(h.x - s, h.y - s, s * 2, s * 2, 5); ctx.stroke();
      noglow();
      // spikes rise slightly during the warn rhythm, fully when live
      const ext = act ? 1 : warn ? clamp((h.t / h.warn - 0.6) / 0.4, 0, 1) * 0.3 : 0;
      if (ext > 0.02) {
        ctx.fillStyle = act ? "#ff8899" : "#aa5566";
        if (act) glow("#ff5566", 10);
        for (let i = 0; i < 3; i++) for (let j = 0; j < 3; j++) {
          const sx = h.x - s + s * (i + 0.5) * 2 / 3, sy = h.y - s + s * (j + 0.5) * 2 / 3;
          ctx.beginPath();
          ctx.moveTo(sx - 4, sy + 3); ctx.lineTo(sx + 4, sy + 3); ctx.lineTo(sx, sy + 3 - 9 * ext - 4);
          ctx.closePath(); ctx.fill();
        }
        noglow();
      }
      ctx.restore();
    } else if (h.kind === "fence") {
      const on = fenceOn(h), warn = fenceWarn(h);
      ctx.save();
      for (const pp of [[h.x1, h.y1], [h.x2, h.y2]]) { // pylon posts
        glow("#ff5577", on ? 12 : 5);
        ctx.fillStyle = "#2a1a35";
        ctx.beginPath(); ctx.arc(pp[0], pp[1], 9, 0, TAU); ctx.fill();
        ctx.strokeStyle = on ? "#ff5577" : "rgba(255,85,119,0.5)";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(pp[0], pp[1], 9, 0, TAU); ctx.stroke();
        ctx.fillStyle = on ? "#ff8899" : warn ? (Math.floor(timeNow * 10) % 2 ? "#ff8899" : "#552233") : "#552233";
        ctx.beginPath(); ctx.arc(pp[0], pp[1], 3.5, 0, TAU); ctx.fill();
        noglow();
      }
      if (on) {
        glow("#ff5577", 14);
        ctx.strokeStyle = "rgba(255,85,119,0.95)";
        ctx.lineWidth = 3.5;
        ctx.beginPath(); ctx.moveTo(h.x1, h.y1); ctx.lineTo(h.x2, h.y2); ctx.stroke();
        ctx.strokeStyle = "rgba(255,170,190,0.5)";
        ctx.lineWidth = 8;
        ctx.beginPath(); ctx.moveTo(h.x1, h.y1); ctx.lineTo(h.x2, h.y2); ctx.stroke();
        noglow();
      } else if (warn) { // telegraphed power-up blink
        ctx.strokeStyle = "rgba(255,85,119," + (Math.floor(timeNow * 10) % 2 ? 0.55 : 0.15) + ")";
        ctx.lineWidth = 2;
        ctx.setLineDash([6, 6]);
        ctx.beginPath(); ctx.moveTo(h.x1, h.y1); ctx.lineTo(h.x2, h.y2); ctx.stroke();
        ctx.setLineDash([]);
      }
      ctx.restore();
    }
  }
  // volatile barrels
  for (const b of barrels) {
    if (b.dead) continue;
    const fusing = b.fuse >= 0;
    const fl = fusing && Math.floor(timeNow * 18) % 2 === 0;
    ctx.save();
    glow("#ffb050", fusing ? 18 : 8);
    ctx.fillStyle = fl ? "#ffffff" : "#7a3a18";
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, TAU); ctx.fill();
    ctx.strokeStyle = "#ffb050";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, TAU); ctx.stroke();
    ctx.strokeStyle = fl ? "#ffb050" : "#ffd27a"; // hazard stripe
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(b.x - b.r * 0.7, b.y - 2); ctx.lineTo(b.x + b.r * 0.7, b.y - 2); ctx.stroke();
    ctx.fillStyle = fl ? "#ffffff" : "#ffb050"; // valve light
    ctx.beginPath(); ctx.arc(b.x, b.y - b.r - 3, 2.2 + (fusing ? 1.5 : 0), 0, TAU); ctx.fill();
    noglow();
    ctx.restore();
  }
}

function drawPedestals() {
  if (!shopRoom && roomType !== "treasure") return;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  for (const pd of pedestals) {
    const it = pd.item;
    const afford = pd.price <= 0 || cores >= pd.price;
    let near = false;
    for (const p of players) { if (p && p.hp > 0 && !p.downed && dist(p.x, p.y, pd.x, pd.y) < 36) { near = true; break; } }
    const bob = Math.sin(timeNow * 2.4 + pd.x) * 4;
    ctx.save();
    if (pd.sold) ctx.globalAlpha = 0.3;
    // pedestal base
    glow(it.col, near && !pd.sold ? 18 : 8);
    ctx.fillStyle = "rgba(20,24,60,0.9)";
    ctx.beginPath(); ctx.arc(pd.x, pd.y + 14, 24, 0, TAU); ctx.fill();
    ctx.strokeStyle = pd.sold ? "#556" : afford ? it.col : "rgba(130,140,180,0.6)";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(pd.x, pd.y + 14, 24, 0, TAU); ctx.stroke();
    noglow();
    // floating ware glyph
    ctx.fillStyle = pd.sold ? "#667" : afford ? it.col : "rgba(150,160,200,0.7)";
    if (!pd.sold) glow(it.col, 12);
    ctx.font = "bold 26px 'Courier New', monospace";
    ctx.fillText(it.glyph, pd.x, pd.y - 16 + bob);
    noglow();
    // name / desc / price
    ctx.font = "bold 11px 'Courier New', monospace";
    ctx.fillStyle = pd.sold ? "#667" : "#dde4ff";
    ctx.fillText(pd.sold ? "SOLD" : it.name, pd.x, pd.y + 48);
    if (!pd.sold) {
      ctx.font = "10px 'Courier New', monospace";
      ctx.fillStyle = "rgba(190,210,255,0.75)";
      ctx.fillText(it.desc, pd.x, pd.y + 62);
      ctx.font = "bold 12px 'Courier New', monospace";
      ctx.fillStyle = pd.price <= 0 ? "#cc88ff" : afford ? "#ffcc44" : "#ff5566";
      ctx.fillText(pd.price <= 0 ? "FREE — 免费" : "◆ " + pd.price, pd.x, pd.y + 78);
      if (near) {
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 11px 'Courier New', monospace";
        ctx.fillText(touchUI ? (pd.price <= 0 ? "TAP TO TAKE" : "TAP TO BUY") : (pd.price <= 0 ? "[J] TAKE" : "[J] BUY"), pd.x, pd.y - 48);
      }
    }
    ctx.restore();
  }
}

function drawSpawnTelegraphs() {
  for (const q of spawnQ) {
    const p = 1 - clamp(q.t / 1.1, 0, 1);
    const col = q.type === "boss" ? "#ff3366" : ENEMY_DEFS[q.type] ? ENEMY_DEFS[q.type].col : "#ff5577";
    ctx.strokeStyle = col;
    ctx.globalAlpha = 0.25 + p * 0.55;
    ctx.lineWidth = 2;
    glow(col, 8);
    ctx.beginPath(); ctx.arc(q.x, q.y, 20 * (1 - p) + 6, 0, TAU); ctx.stroke();
    ctx.beginPath(); ctx.arc(q.x, q.y, 4, 0, TAU); ctx.stroke();
    noglow();
    ctx.globalAlpha = 1;
  }
}

/* Bosses: larger multi-part bodies, each with an animated part synced to its
   attack pattern. Telegraph poses (wind-ups) are made deliberately obvious. */
function drawBossBody(e, fl, col, dark, detail) {
  const aimP = e._tgt ? angTo(e.x, e.y, e._tgt.x, e._tgt.y) : (player ? angTo(e.x, e.y, player.x, player.y) : 0);
  ctx.save();
  ctx.translate(e.x, e.y);
  if (e.kind === "summoner") {
    // VOIDCALLER — floating eye ringed by orbiting shards; the eye flares wide and
    // the shards splay out when it teleports or summons.
    if (e.state === "tele") ctx.globalAlpha *= clamp(e.t / 0.55, 0.15, 1);
    const flare = (e.state === "tele") ? (1 - clamp(e.t / 0.55, 0, 1))
      : (e.state === "summon") ? (1 - clamp(e.t / 0.9, 0, 1)) : 0;
    const nSh = detail ? 6 : 3;
    glow(col, 8 + flare * 14);
    ctx.fillStyle = col;
    for (let i = 0; i < nSh; i++) {
      const a = e.rot * 1.6 + (i / nSh) * TAU;
      const orb = e.r + 16 + flare * 22;            // shards splay out on cast
      const sx = Math.cos(a) * orb, sy = Math.sin(a) * orb;
      ctx.save(); ctx.translate(sx, sy); ctx.rotate(a + Math.PI / 2);
      ctx.beginPath();
      ctx.moveTo(0, -7); ctx.lineTo(4, 0); ctx.lineTo(0, 7); ctx.lineTo(-4, 0);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    }
    noglow();
    // rune-triangle mantle
    ctx.save();
    ctx.rotate(e.rot * 0.7);
    ctx.fillStyle = col;
    ctx.beginPath();
    for (let i = 0; i < 3; i++) {
      const a = (i / 3) * TAU - Math.PI / 2;
      const rr = e.r + 6;
      if (i === 0) ctx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr);
      else ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
    // central eye: socket + wide-flaring pupil aimed at the player
    ctx.fillStyle = dark;
    ctx.beginPath(); ctx.arc(0, 0, e.r * 0.55, 0, TAU); ctx.fill();
    glow(col, 8 + flare * 16);
    ctx.fillStyle = fl ? "#ffffff" : "#e0c0ff";
    const pr = e.r * (0.22 + flare * 0.3);
    ctx.beginPath(); ctx.arc(Math.cos(aimP) * e.r * 0.14, Math.sin(aimP) * e.r * 0.14, pr, 0, TAU); ctx.fill();
    noglow();
  } else if (e.kind === "artillery") {
    // LANCE-7 — quad-leg walker with a long articulated cannon that swivels to aim
    // and BRACES (recoils back, splays legs) right before the lance shot.
    const aiming = e.state === "aim";
    const ap = aiming ? (1 - clamp(e.t / 0.95, 0, 1)) : 0; // 0→1 brace progress
    ctx.lineWidth = 5; ctx.strokeStyle = col; ctx.lineCap = "round";
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * TAU + Math.PI / 4;
      const splay = (i < 2 ? 1 : -1) * ap * 0.12 + (detail ? Math.sin(e.rot * 2 + i) * 0.06 : 0);
      const knee = e.r * (0.5 + ap * 0.1);
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * e.r * 0.4, Math.sin(a) * e.r * 0.4);
      ctx.lineTo(Math.cos(a + splay) * knee, Math.sin(a + splay) * knee);
      ctx.lineTo(Math.cos(a + splay) * (e.r + 14), Math.sin(a + splay) * (e.r + 14));
      ctx.stroke();
    }
    ctx.lineCap = "butt";
    // chassis
    ctx.fillStyle = col;
    rrect(-e.r * 0.75, -e.r * 0.75, e.r * 1.5, e.r * 1.5, 8); ctx.fill();
    // long cannon: two-segment arm, recoils back as it braces, snaps on fire
    const ba = aiming ? Math.atan2(e.dirY, e.dirX) : aimP;
    ctx.rotate(ba);
    const recoil = -ap * e.r * 0.22;
    ctx.fillStyle = "#aa5520";
    ctx.fillRect(recoil, -8, e.r * 0.8, 16);                 // breech
    glow(aiming ? "#ffcc66" : col, 6 + ap * 16);
    ctx.fillStyle = fl ? "#ffffff" : col;
    ctx.fillRect(e.r * 0.7 + recoil, -6, e.r + 24, 12);      // barrel
    if (aiming) { // charging muzzle glow
      ctx.fillStyle = "#fff0c0";
      ctx.beginPath(); ctx.arc(e.r * 1.7 + recoil + 24, 0, 4 + ap * 6, 0, TAU); ctx.fill();
    }
    noglow();
    ctx.rotate(-ba);
    // cockpit eye
    ctx.fillStyle = dark;
    ctx.beginPath(); ctx.arc(0, 0, e.r * 0.35, 0, TAU); ctx.fill();
    ctx.fillStyle = fl ? "#ffffff" : "#ffd0a0";
    ctx.beginPath(); ctx.arc(0, 0, e.r * 0.16, 0, TAU); ctx.fill();
  } else if (e.kind === "splitter") {
    // MITOSIS PRIME — gelatinous body that wobbles; visibly pinches/elongates
    // (mitosis) on its lunge/slam wind-up. Fragments are smaller copies.
    const pinch = (e.state === "wind") ? (1 - clamp(e.t / 0.55, 0, 1)) : 0;
    const sq = 1 + pinch * 0.25, sqp = 1 - pinch * 0.18; // stretch on wind-up
    ctx.save();
    if (pinch > 0) ctx.rotate(e._tgt ? angTo(e.x, e.y, e._tgt.x, e._tgt.y) : (player ? angTo(e.x, e.y, player.x, player.y) : 0));
    ctx.scale(sq, sqp);
    glow(col, 12);
    ctx.fillStyle = col;
    ctx.beginPath();
    const segs = detail ? 16 : 10;
    for (let i = 0; i <= segs; i++) {
      const a = (i / segs) * TAU;
      const rr = e.r * (1 + 0.09 * Math.sin(a * 3 + e.rot * 4) + 0.05 * Math.sin(a * 5 - e.rot * 3));
      if (i === 0) ctx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr);
      else ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
    }
    ctx.closePath(); ctx.fill();
    noglow();
    ctx.restore();
    // membrane
    ctx.fillStyle = dark;
    ctx.beginPath(); ctx.arc(0, 0, e.r * 0.55, 0, TAU); ctx.fill();
    // nuclei — one per remaining split, jiggling; pull apart as it prepares to divide
    const nNuc = Math.max(1, 3 - e.gen);
    glow(col, 8);
    ctx.fillStyle = fl ? "#ffffff" : "#caffd8";
    for (let i = 0; i < nNuc; i++) {
      const a = e.rot * 2 + (i / nNuc) * TAU;
      const sep = e.r * (0.22 + pinch * 0.25);
      ctx.beginPath(); ctx.arc(Math.cos(a) * sep, Math.sin(a) * sep, e.r * 0.16, 0, TAU); ctx.fill();
    }
    noglow();
  } else if (e.kind === "overseer") {
    // OVERSEER — hovering eye-sentinel: a big iris ringed by orbiting sensor lenses;
    // the iris narrows & the ring spins up when it sweeps or blooms.
    const charge = (e.state === "sweep") ? (1 - clamp(e.t / 0.45, 0, 1))
      : (e.state === "bloom") ? (1 - clamp(e.t / 0.7, 0, 1)) : 0;
    const nL = detail ? 8 : 4;
    ctx.save();
    ctx.rotate(e.rot * (0.6 + charge));
    glow(col, 7 + charge * 14);
    ctx.fillStyle = col;
    for (let i = 0; i < nL; i++) {
      const a = (i / nL) * TAU;
      const orb = e.r + 14;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * orb, Math.sin(a) * orb, detail ? 4.5 : 3.5, 0, TAU);
      ctx.fill();
    }
    noglow();
    ctx.restore();
    // segmented outer iris ring
    ctx.save();
    ctx.rotate(-e.rot * 0.7);
    ctx.strokeStyle = col; ctx.lineWidth = 3 + charge * 2;
    glow(col, 5 + charge * 10);
    ctx.beginPath();
    for (let i = 0; i < 8; i++) {
      const a0 = (i / 8) * TAU, a1 = a0 + TAU / 12;
      ctx.moveTo(Math.cos(a0) * (e.r + 6), Math.sin(a0) * (e.r + 6));
      ctx.arc(0, 0, e.r + 6, a0, a1);
    }
    ctx.stroke();
    noglow();
    ctx.restore();
    // sclera + iris; pupil narrows (slit) while charging a sweep/bloom
    ctx.fillStyle = dark;
    ctx.beginPath(); ctx.arc(0, 0, e.r * 0.8, 0, TAU); ctx.fill();
    glow(charge > 0 ? "#bff6ff" : col, 6 + charge * 16);
    ctx.fillStyle = fl ? "#ffffff" : "#bdf3ff";
    ctx.beginPath(); ctx.arc(0, 0, e.r * 0.5, 0, TAU); ctx.fill();
    noglow();
    // pupil: round at rest, vertical slit when charging, tracks the target
    ctx.fillStyle = dark;
    ctx.save();
    ctx.rotate(aimP + Math.PI / 2);
    const pw = e.r * (0.34 - charge * 0.24), ph = e.r * (0.34 + charge * 0.12);
    ctx.beginPath(); ctx.ellipse(0, 0, Math.max(2, pw), ph, 0, 0, TAU); ctx.fill();
    ctx.restore();
  } else if (e.kind === "juggernaut") {
    // JUGGERNAUT — heavy armored brute: a blocky hull plated in armor segments that
    // visibly break off as it loses HP, exposing a glowing weak core. Hunkers on slams.
    const pound = (e.state === "slam") ? (1 - clamp(e.t / 0.85, 0, 1)) : 0;
    const brace = (e.state === "wind") ? (1 - clamp(e.t / 0.6, 0, 1)) : 0;
    const mv = (e.state === "charge" || e.state === "wind") ? Math.atan2(e.dirY, e.dirX) : aimP;
    ctx.save();
    ctx.rotate(mv);
    ctx.scale(1 + brace * 0.1, 1 - brace * 0.08);
    // hull
    ctx.fillStyle = "#7a4410";
    rrect(-e.r * 0.85, -e.r * 0.85, e.r * 1.7, e.r * 1.7, 10); ctx.fill();
    ctx.fillStyle = col;
    rrect(-e.r * 0.7, -e.r * 0.7, e.r * 1.4, e.r * 1.4, 8); ctx.fill();
    // armor plates around the rim — one wedge per remaining plate (break off as HP drops)
    ctx.fillStyle = col;
    glow(col, 6);
    for (let i = 0; i < 4; i++) {
      if (i >= e.plates) continue;
      const a = (i / 4) * TAU + Math.PI / 4;
      ctx.save();
      ctx.rotate(a);
      rrect(e.r * 0.55, -e.r * 0.32, e.r * 0.5, e.r * 0.64, 5); ctx.fill();
      if (detail) {
        ctx.strokeStyle = "rgba(255,230,180,0.5)"; ctx.lineWidth = 2;
        rrect(e.r * 0.55, -e.r * 0.32, e.r * 0.5, e.r * 0.64, 5); ctx.stroke();
      }
      ctx.restore();
    }
    noglow();
    // exposed core — brighter & angrier as plates are stripped; pulses on slam
    const exposure = 1 - e.plates / 4;
    glow(exposure > 0.5 ? "#ffee88" : col, 5 + exposure * 14 + pound * 10);
    ctx.fillStyle = fl ? "#ffffff" : (exposure > 0.5 ? "#ffdd66" : "#3a2008");
    const cr = e.r * (0.3 + exposure * 0.14 + pound * 0.08);
    ctx.beginPath(); ctx.arc(0, 0, cr, 0, TAU); ctx.fill();
    if (exposure > 0 && detail) {
      ctx.strokeStyle = "rgba(255,200,120," + (0.3 + exposure * 0.5) + ")"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, cr + 3, 0, TAU); ctx.stroke();
    }
    noglow();
    ctx.restore();
  } else if (e.kind === "hexweaver") {
    // HEXWEAVER — robed caster: a hovering cowl with conjuring rune-rings that flare
    // when it casts; trailing wisps. Splays its sigil ring wide on rune/ward casts.
    const cast = (e.state === "runes" || e.state === "ward") ? (1 - clamp(e.t / 0.6, 0, 1))
      : (e.state === "hex") ? 0.5 : 0;
    // outer counter-rotating rune rings
    for (let ring = 0; ring < (detail ? 2 : 1); ring++) {
      ctx.save();
      ctx.rotate((ring === 0 ? 1 : -1.4) * e.rot * (0.5 + cast));
      ctx.strokeStyle = ring === 0 ? col : "rgba(221,136,255,0.6)";
      ctx.lineWidth = 2.5;
      glow(col, 5 + cast * 12);
      const rr = e.r + 8 + ring * 8 + cast * 14;
      ctx.beginPath();
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * TAU - Math.PI / 2;
        if (i === 0) ctx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr);
        else ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
      }
      ctx.closePath(); ctx.stroke();
      noglow();
      ctx.restore();
    }
    // cowl body
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(0, -e.r);
    ctx.quadraticCurveTo(e.r, -e.r * 0.3, e.r * 0.6, e.r);
    ctx.lineTo(-e.r * 0.6, e.r);
    ctx.quadraticCurveTo(-e.r, -e.r * 0.3, 0, -e.r);
    ctx.closePath(); ctx.fill();
    // dark hood + glowing inner eye(s)
    ctx.fillStyle = dark;
    ctx.beginPath(); ctx.arc(0, -e.r * 0.15, e.r * 0.55, 0, TAU); ctx.fill();
    glow(cast > 0 ? "#f0d0ff" : col, 6 + cast * 14);
    ctx.fillStyle = fl ? "#ffffff" : "#e6b3ff";
    const ex = Math.cos(aimP) * e.r * 0.12;
    ctx.beginPath(); ctx.arc(ex - e.r * 0.16, -e.r * 0.15, e.r * 0.1, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(ex + e.r * 0.16, -e.r * 0.15, e.r * 0.1, 0, TAU); ctx.fill();
    noglow();
  } else {
    // THE WARDEN — armored core with counter-rotating guard rings; the rings spin up
    // and the eye glares forward when it aims its dash or fires a radial volley.
    const charge = (e.state === "aim") ? (1 - clamp(e.t / 0.7, 0, 1))
      : (e.state === "radial") ? 0.6 : 0;
    // outer guard ring (segmented), spins faster while charging
    ctx.save();
    ctx.rotate(e.rot * (0.5 + charge));
    ctx.strokeStyle = col; ctx.lineWidth = 4 + charge * 2;
    glow(col, 6 + charge * 12);
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a0 = (i / 6) * TAU, a1 = a0 + TAU / 9;
      ctx.moveTo(Math.cos(a0) * (e.r + 12), Math.sin(a0) * (e.r + 12));
      ctx.arc(0, 0, e.r + 12, a0, a1);
    }
    ctx.stroke();
    noglow();
    ctx.restore();
    // inner guard ring counter-rotates
    if (detail) {
      ctx.save();
      ctx.rotate(-e.rot * 0.8);
      ctx.strokeStyle = "rgba(255,90,130,0.7)"; ctx.lineWidth = 3;
      ctx.beginPath();
      for (let i = 0; i < 4; i++) {
        const a0 = (i / 4) * TAU + 0.3, a1 = a0 + TAU / 10;
        ctx.moveTo(Math.cos(a0) * (e.r + 4), Math.sin(a0) * (e.r + 4));
        ctx.arc(0, 0, e.r + 4, a0, a1);
      }
      ctx.stroke();
      ctx.restore();
    }
    // armored hull + dark face
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(0, 0, e.r, 0, TAU); ctx.fill();
    ctx.fillStyle = dark;
    ctx.beginPath(); ctx.arc(0, 0, e.r * 0.7, 0, TAU); ctx.fill();
    // single glaring eye tracks the player, flares on charge
    glow(charge > 0 ? "#ffdd66" : col, 6 + charge * 16);
    ctx.fillStyle = fl ? "#ffffff" : (charge > 0.4 ? "#ffe0a0" : "#ff88aa");
    ctx.beginPath();
    ctx.arc(Math.cos(aimP) * e.r * 0.32, Math.sin(aimP) * e.r * 0.32, e.r * (0.24 + charge * 0.08), 0, TAU);
    ctx.fill();
    noglow();
  }
  ctx.restore();
}

function drawEnemy(e) {
  const fl = e.flash > 0;
  const frozen = e.frozenT > 0;
  const poisoned = (e.poisonT || 0) > 0;
  // poison tints the body sickly green (flash/freeze take priority)
  const col = fl ? "#ffffff" : frozen ? "#bfe8ff" : (poisoned ? "#7fdf6a" : e.col);
  ctx.save();
  if (e.spawnT > 0) ctx.globalAlpha = 1 - e.spawnT / 0.4;
  // shock: the whole sprite jitters (frozen targets are locked, so no jitter then)
  if ((e.shockT || 0) > 0 && !frozen) {
    const j = 1.4 + Math.min(1.4, e.r * 0.06);
    ctx.translate(rand(-j, j), rand(-j, j));
  }
  // phantom cloak: barely-visible shimmer (statuses force visibility)
  if (e.type === "phantom" && e.state === "cloak" && e.frozenT <= 0 && (e.shockT || 0) <= 0 && !fl) {
    ctx.globalAlpha *= 0.12 + 0.05 * Math.sin(timeNow * 6 + e.phase);
  }
  // telegraphs first (under body)
  if (e.type === "bomber" && e.state === "fuse") {
    // pulsing blast-radius telegraph synced to the fuse
    const p2 = 1 - clamp(e.t / 1.0, 0, 1);
    const puls = 0.5 + 0.5 * Math.sin(timeNow * (10 + p2 * 22));
    ctx.strokeStyle = "#ff8844";
    ctx.fillStyle = "rgba(255,136,68," + (0.05 + p2 * 0.12 + puls * 0.05) + ")";
    ctx.lineWidth = 2;
    glow("#ff8844", 10);
    ctx.beginPath(); ctx.arc(e.x, e.y, 95, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(e.x, e.y, 95 * p2, 0, TAU); ctx.stroke();
    noglow();
  }
  if (e.type === "phantom" && e.state === "reveal") {
    // decloak strike telegraph
    const p2 = 1 - e.t / 0.5;
    ctx.strokeStyle = "rgba(187,153,255," + (0.3 + p2 * 0.6) + ")";
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 6]);
    ctx.beginPath();
    ctx.moveTo(e.x, e.y);
    ctx.lineTo(e.x + e.dirX * 200, e.y + e.dirY * 200);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  if (e.type === "tank" && e.state === "slam") {
    const p = 1 - e.t / 0.85;
    ctx.strokeStyle = "#ffaa33";
    ctx.fillStyle = "rgba(255,170,51," + (0.07 + p * 0.13) + ")";
    ctx.lineWidth = 2 + p * 2;
    glow("#ffaa33", 12);
    ctx.beginPath(); ctx.arc(e.x, e.y, 125, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(e.x, e.y, 125 * p, 0, TAU); ctx.stroke();
    noglow();
  }
  if (e.type === "chaser" && e.state === "wind") {
    const p = 1 - e.t / 0.45;
    ctx.strokeStyle = "rgba(255,85,119," + (0.3 + p * 0.6) + ")";
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 6]);
    ctx.beginPath();
    ctx.moveTo(e.x, e.y);
    ctx.lineTo(e.x + e.dirX * 150, e.y + e.dirY * 150);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  if (e.type === "boss" && e.state === "aim") {
    // laser-sight telegraph (warden dash / artillery lance)
    const p = 1 - e.t / (e.kind === "artillery" ? 0.95 : 0.7);
    ctx.save();
    ctx.globalAlpha *= 0.3 + clamp(p, 0, 1) * 0.6;
    ctx.strokeStyle = e.col;
    ctx.lineWidth = e.kind === "artillery" ? 3 : 5;
    ctx.setLineDash([12, 8]);
    ctx.beginPath();
    ctx.moveTo(e.x, e.y);
    ctx.lineTo(e.x + e.dirX * 900, e.y + e.dirY * 900);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
  if (e.type === "boss" && e.state === "wind") {
    // splitter lunge / juggernaut charge-dash telegraph (direction line)
    const jug = e.kind === "juggernaut";
    const p = 1 - e.t / (jug ? 0.6 : 0.55);
    const len = jug ? 520 : 260;
    ctx.strokeStyle = hexA(e.col, 0.3 + p * 0.6);
    ctx.lineWidth = jug ? 6 : 4;
    ctx.setLineDash([10, 7]);
    ctx.beginPath();
    ctx.moveTo(e.x, e.y);
    ctx.lineTo(e.x + e.dirX * len, e.y + e.dirY * len);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  if (e.type === "boss" && e.state === "slam") {
    // splitter / juggernaut slam AoE telegraph
    const p = 1 - e.t / (e.kind === "juggernaut" ? 0.85 : 0.9);
    const R = (e.kind === "juggernaut" ? 120 : 95) + e.r;
    ctx.strokeStyle = e.col;
    ctx.fillStyle = hexA(e.col, 0.06 + p * 0.13);
    ctx.lineWidth = 2 + p * 2;
    glow(e.col, 12);
    ctx.beginPath(); ctx.arc(e.x, e.y, R, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(e.x, e.y, R * p, 0, TAU); ctx.stroke();
    noglow();
  }
  if (e.type === "boss" && e.state === "tele") {
    // summoner teleport: warning ring at the destination
    const p = 1 - e.t / 0.55;
    ctx.strokeStyle = "rgba(187,102,255," + (0.25 + p * 0.6) + ")";
    ctx.lineWidth = 2.5;
    glow("#bb66ff", 10);
    ctx.beginPath(); ctx.arc(e.tx, e.ty, 40 * (1 - p) + 12, 0, TAU); ctx.stroke();
    noglow();
  }
  if (e.type === "shooter" && e.state === "charge") {
    const p = 1 - e.t / 0.6;
    glow("#cc66ff", 16);
    ctx.fillStyle = "rgba(204,102,255," + (0.3 + p * 0.5) + ")";
    ctx.beginPath(); ctx.arc(e.x, e.y, 5 + p * 7, 0, TAU); ctx.fill();
    noglow();
  }
  if (e.type === "boss" && ["radial", "summon", "burst", "mortar", "bloom", "runes", "sweep", "hex", "ward", "hurl"].includes(e.state)) {
    const p = 1 - clamp(e.t / 0.9, 0, 1);
    ctx.save();
    ctx.strokeStyle = e.col;
    ctx.globalAlpha *= 0.2 + p * 0.5;
    ctx.lineWidth = 2;
    glow(e.col, 10);
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r + 14 + p * 10, 0, TAU); ctx.stroke();
    noglow();
    ctx.restore();
  }

  glow(col, fl ? 22 : 13);
  ctx.fillStyle = col;
  ctx.strokeStyle = col;
  const detail = spriteDetail();
  const dark = "#1a0a14";   // shared inset/socket tone for the hostile palette
  const aimP = (e._tgt ? angTo(e.x, e.y, e._tgt.x, e._tgt.y) : (player ? angTo(e.x, e.y, player.x, player.y) : 0));

  if (e.type === "chaser") {
    // CHASER — bladed biped raptor: crouches & coils on the wind-up, lunges flat.
    const a = (e.state === "lunge" || e.state === "wind") ? Math.atan2(e.dirY, e.dirX) : aimP;
    const wind = e.state === "wind" ? (1 - clamp(e.t / 0.45, 0, 1)) : 0; // 0→1 coil
    const lunge = e.state === "lunge" ? clamp(e.t / 0.3, 0, 1) : 0;      // 1→0 extend
    ctx.save();
    ctx.translate(e.x, e.y); ctx.rotate(a);
    const crouch = 1 - wind * 0.28;            // body squashes back as it coils
    const gait = detail ? Math.sin(timeNow * 14 + e.phase) : 0;
    // hind legs (open scissor when running, planted & bent when coiled)
    if (detail) {
      ctx.strokeStyle = col; ctx.lineWidth = 2.6; ctx.lineCap = "round";
      for (const sgn of [-1, 1]) {
        const sw = gait * sgn * (0.5 + wind);
        ctx.beginPath();
        ctx.moveTo(-e.r * 0.2, sgn * e.r * 0.5);
        ctx.lineTo(-e.r * (0.7 + wind * 0.2), sgn * e.r * (0.9 + sw * 0.3));
        ctx.lineTo(-e.r * (0.4) + sw * 4, sgn * e.r * 1.15);
        ctx.stroke();
      }
      ctx.lineCap = "butt";
    }
    // sleek body wedge
    ctx.beginPath();
    ctx.moveTo(e.r * (0.95 + lunge * 0.3) * crouch, 0);
    ctx.lineTo(-e.r * 0.75 * crouch, e.r * 0.7);
    ctx.lineTo(-e.r * 0.35 * crouch, 0);
    ctx.lineTo(-e.r * 0.75 * crouch, -e.r * 0.7);
    ctx.closePath(); ctx.fill();
    // twin blade-arms snap forward on the lunge, drawn back when coiling
    const reach = e.r * (0.6 - wind * 0.45 + lunge * 0.7);
    ctx.strokeStyle = fl ? "#ffffff" : "#ffd0dd"; ctx.lineWidth = 2.4; ctx.lineCap = "round";
    for (const sgn of [-1, 1]) {
      ctx.beginPath();
      ctx.moveTo(e.r * 0.2, sgn * e.r * 0.4);
      ctx.lineTo(e.r * 0.5 + reach, sgn * e.r * (0.25 + lunge * 0.1));
      ctx.lineTo(e.r * 0.9 + reach, sgn * e.r * 0.05);
      ctx.stroke();
    }
    ctx.lineCap = "butt";
    // snapping maw eye
    glow(col, 8);
    ctx.fillStyle = fl ? "#ffffff" : "#3a0d18";
    ctx.beginPath(); ctx.arc(e.r * 0.35, 0, e.r * 0.26, 0, TAU); ctx.fill();
    ctx.fillStyle = fl ? "#ffffff" : (wind > 0.3 ? "#ffee66" : "#ff7088");
    ctx.beginPath(); ctx.arc(e.r * 0.4, 0, e.r * 0.12, 0, TAU); ctx.fill();
    noglow();
    ctx.restore();
  } else if (e.type === "shooter") {
    // SHOOTER — hovering turret-drone: a ring eye that swivels its barrel to aim,
    // the barrel charges (recedes) then recoils (kicks back) when it fires.
    const charging = e.state === "charge";
    const cp = charging ? (1 - clamp(e.t / 0.6, 0, 1)) : 0; // 0→1 as the shot nears
    const bob = Math.sin(timeNow * 4 + e.phase) * 2;
    ctx.save();
    ctx.translate(e.x, e.y + bob);
    // outer eyelid ring (slow spin), housing
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, 0, e.r * 0.95, timeNow * 1.5, timeNow * 1.5 + 5.0); ctx.stroke();
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(0, 0, e.r * 0.72, 0, TAU); ctx.fill();
    // dark iris + glowing pupil tracks the player
    ctx.fillStyle = fl ? "#ffffff" : dark;
    ctx.beginPath(); ctx.arc(0, 0, e.r * 0.5, 0, TAU); ctx.fill();
    const px = Math.cos(aimP) * e.r * 0.18, py = Math.sin(aimP) * e.r * 0.18;
    glow(charging ? "#ffaa66" : col, 8 + cp * 14);
    ctx.fillStyle = fl ? "#ffffff" : (charging ? "#ffd27a" : "#e6b3ff");
    ctx.beginPath(); ctx.arc(px, py, e.r * (0.22 + cp * 0.12), 0, TAU); ctx.fill();
    noglow();
    // barrel: charge pulls it in, the muzzle flash kicks it back out
    const recoil = charging ? -cp * e.r * 0.3 : 0;
    ctx.rotate(aimP);
    ctx.fillStyle = fl ? "#ffffff" : col;
    ctx.fillRect(e.r * 0.5 + recoil, -e.r * 0.22, e.r * 0.7, e.r * 0.44);
    if (charging) {
      glow("#ffaa66", 12);
      ctx.fillStyle = "#fff0d0";
      ctx.beginPath(); ctx.arc(e.r * 1.2 + recoil, 0, e.r * 0.14 * (0.5 + cp), 0, TAU); ctx.fill();
      noglow();
    }
    ctx.restore();
  } else if (e.type === "tank") {
    // TANK — heavy armored walker: plated hex shell, stomping legs, glowing core
    // that flares & the body rears on the slam wind-up.
    const slamP = e.state === "slam" ? (1 - clamp(e.t / 0.85, 0, 1)) : 0; // 0→1 charge
    const stomp = detail ? Math.sin(timeNow * 5 + e.phase) : 0;
    ctx.save();
    ctx.translate(e.x, e.y);
    // stomping legs poke out the sides
    if (detail) {
      ctx.fillStyle = "#7a4410";
      for (const sgn of [-1, 1]) {
        const lift = (sgn > 0 ? stomp : -stomp) * 3;
        ctx.fillRect(sgn * e.r * 0.7, -e.r * 0.55 + lift, e.r * 0.4, e.r * 0.45);
        ctx.fillRect(sgn * e.r * 0.7, e.r * 0.15 - lift, e.r * 0.4, e.r * 0.45);
      }
    }
    ctx.rotate(timeNow * 0.25 + slamP * 0.4);
    // plated hexagonal shell
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * TAU;
      const rr = e.r * (1 + slamP * 0.06);
      if (i === 0) ctx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr);
      else ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
    }
    ctx.closePath(); ctx.fill();
    // armor plate seams
    ctx.strokeStyle = "rgba(20,10,4,0.6)"; ctx.lineWidth = 2;
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * TAU;
      ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(Math.cos(a) * e.r, Math.sin(a) * e.r); ctx.stroke();
    }
    ctx.restore();
    // reactor core: dark socket + bright pupil that flares hot on the slam
    ctx.fillStyle = dark;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r * 0.45, 0, TAU); ctx.fill();
    glow(slamP > 0 ? "#ffdd66" : col, 8 + slamP * 18);
    ctx.fillStyle = fl ? "#ffffff" : (slamP > 0.4 ? "#fff0a0" : col);
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r * (0.2 + slamP * 0.16), 0, TAU); ctx.fill();
    noglow();
  } else if (e.type === "swarmer") {
    // SWARMER — skittering multi-legged bug: 6 flicking legs + segmented body
    ctx.save();
    ctx.translate(e.x, e.y);
    const head = (Math.hypot(e.vx, e.vy) > 5) ? Math.atan2(e.vy, e.vx) : (e.phase + timeNow);
    ctx.rotate(head);
    const sk = Math.sin(timeNow * 22 + e.phase); // fast skitter
    if (detail) {
      ctx.strokeStyle = col; ctx.lineWidth = 1.6; ctx.lineCap = "round";
      for (let i = 0; i < 3; i++) {
        const ly = (i - 1) * e.r * 0.6;
        const sw = Math.sin(timeNow * 22 + e.phase + i) * e.r * 0.5;
        for (const sgn of [-1, 1]) {
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(e.r * 0.7 * (i - 1) + sw * 0.3, sgn * e.r * 0.7);
          ctx.lineTo(e.r * 0.7 * (i - 1) + sw, sgn * e.r * 1.3);
          ctx.stroke();
        }
      }
      ctx.lineCap = "butt";
    }
    // body: thorax + head bead
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.ellipse(-e.r * 0.2, 0, e.r * 0.9, e.r * 0.6, 0, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(e.r * 0.55, 0, e.r * 0.45, 0, TAU); ctx.fill();
    ctx.fillStyle = fl ? "#ffffff" : "#0d2a14";
    ctx.beginPath(); ctx.arc(e.r * 0.6, 0, e.r * 0.18 + Math.abs(sk) * 1, 0, TAU); ctx.fill();
    ctx.restore();
  } else if (e.type === "bomber") {
    // BOMBER — round pulsing creature: body inflates & the core flashes faster as the fuse burns
    ctx.save();
    ctx.translate(e.x, e.y);
    const fusing = e.state === "fuse";
    const fz = fusing ? (1 - clamp(e.t, 0, 1)) : 0; // 0→1 fuse progress
    const beat = fusing ? Math.sin(timeNow * (12 + fz * 30)) : Math.sin(timeNow * 4 + e.phase);
    const inflate = 1 + (fusing ? fz * 0.22 + beat * 0.1 * fz : beat * 0.04);
    const fuseGlow = fusing ? 0.5 + 0.5 * beat : 0.25 + 0.1 * beat;

    ctx.strokeStyle = "#7a3a18"; ctx.lineWidth = 3; ctx.lineCap = "round";
    const nLeg = detail ? 6 : 4;
    for (let i = 0; i < nLeg; i++) {
      const a = (i / nLeg) * TAU + (detail ? Math.sin(timeNow * 10 + e.phase + i) * 0.18 : 0);
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * e.r * 0.5, Math.sin(a) * e.r * 0.5);
      ctx.lineTo(Math.cos(a) * (e.r + 5), Math.sin(a) * (e.r + 5));
      ctx.stroke();
    }
    ctx.lineCap = "butt";
    // taut inflating shell
    ctx.fillStyle = fl || (fusing && beat > 0.6) ? "#ffffff" : col;
    ctx.beginPath(); ctx.arc(0, 0, e.r * inflate, 0, TAU); ctx.fill();
    // glowing fuse core, hotter & whiter near detonation
    glow("#ffe0aa", 10 + fuseGlow * 18);
    ctx.fillStyle = fl ? "#ffffff" : "rgba(255," + Math.round(190 + fuseGlow * 65) + "," + Math.round(110 + fuseGlow * 120) + ",1)";
    ctx.beginPath(); ctx.arc(0, 0, e.r * (0.4 + fuseGlow * 0.2), 0, TAU); ctx.fill();
    noglow();
    ctx.restore();
  } else if (e.type === "shield") {
    // SHIELDBEARER — armored sentinel hoisting a wide energy shield on its front facing
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(e.shieldA);
    const trudge = detail ? Math.sin(timeNow * 6 + e.phase) * 2 : 0;
    // legs
    if (detail) {
      ctx.fillStyle = "#3a4a7a";
      ctx.fillRect(-e.r * 0.5, e.r * 0.45 + trudge, e.r * 0.4, e.r * 0.5);
      ctx.fillRect(-e.r * 0.5, -e.r * 0.95 - trudge, e.r * 0.4, e.r * 0.5);
    }
    // armored torso
    ctx.fillStyle = col;
    rrect(-e.r * 0.85, -e.r * 0.7, e.r * 1.45, e.r * 1.4, 5); ctx.fill();
    // head core
    ctx.fillStyle = dark;
    ctx.beginPath(); ctx.arc(-e.r * 0.05, 0, e.r * 0.35, 0, TAU); ctx.fill();
    ctx.fillStyle = fl ? "#ffffff" : "#cfe0ff";
    ctx.beginPath(); ctx.arc(-e.r * 0.05, 0, e.r * 0.15, 0, TAU); ctx.fill();
    // the big energy shield — bright & layered when active, fractured-dim when down
    const active = e.frozenT <= 0 && (e.shockT || 0) <= 0 && (e.exposeT || 0) <= 0;
    glow("#aaccff", active ? 16 : 4);
    ctx.strokeStyle = active ? "rgba(170,204,255,0.95)" : "rgba(120,140,200,0.32)";
    ctx.lineWidth = active ? 5 : 3;
    ctx.beginPath(); ctx.arc(0, 0, e.r + 8, -1.2, 1.2); ctx.stroke();
    if (active) {
      ctx.strokeStyle = "rgba(200,225,255,0.4)";
      ctx.lineWidth = 10;
      ctx.beginPath(); ctx.arc(0, 0, e.r + 8, -1.05, 1.05); ctx.stroke();
      if (detail) { // hex shimmer ribs
        ctx.strokeStyle = "rgba(220,235,255,0.5)"; ctx.lineWidth = 1.5;
        for (let i = -2; i <= 2; i++) {
          const a = i * 0.45;
          ctx.beginPath();
          ctx.moveTo(Math.cos(a) * (e.r + 2), Math.sin(a) * (e.r + 2));
          ctx.lineTo(Math.cos(a) * (e.r + 12), Math.sin(a) * (e.r + 12));
          ctx.stroke();
        }
      }
    }
    noglow();
    ctx.restore();
  } else if (e.type === "medic") {
    // MEDIC DRONE — sleek hovering drone, rotor glow, emitter flares on the heal beam
    const healing = e.healTgt && e.healTgt.hp > 0;
    if (healing) {
      ctx.save();
      glow("#66ffcc", 10);
      ctx.strokeStyle = "rgba(102,255,204," + (0.5 + 0.25 * Math.sin(timeNow * 9)) + ")";
      ctx.lineWidth = 2.5;
      ctx.setLineDash([6, 5]); ctx.lineDashOffset = -timeNow * 30;
      ctx.beginPath(); ctx.moveTo(e.x, e.y); ctx.lineTo(e.healTgt.x, e.healTgt.y); ctx.stroke();
      ctx.setLineDash([]);
      noglow();
      ctx.restore();
      ctx.fillStyle = col; ctx.strokeStyle = col;
    }
    ctx.save();
    ctx.translate(e.x, e.y + Math.sin(timeNow * 5 + e.phase) * 2.5);
    // twin rotor blur rings
    ctx.lineWidth = 2;
    ctx.strokeStyle = "rgba(102,255,204,0.5)";
    ctx.beginPath(); ctx.arc(0, 0, e.r + 4, timeNow * 9, timeNow * 9 + 3.2); ctx.stroke();
    ctx.beginPath(); ctx.arc(0, 0, e.r + 4, timeNow * 9 + Math.PI, timeNow * 9 + Math.PI + 3.2); ctx.stroke();
    // teardrop chassis
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.ellipse(0, 0, e.r, e.r * 0.82, 0, 0, TAU); ctx.fill();
    // medical cross
    ctx.fillStyle = dark;
    ctx.fillRect(-e.r * 0.5, -e.r * 0.18, e.r * 1.0, e.r * 0.36);
    ctx.fillRect(-e.r * 0.18, -e.r * 0.5, e.r * 0.36, e.r * 1.0);
    // emitter pod glows while beaming
    glow(healing ? "#aaffe0" : col, healing ? 12 : 6);
    ctx.fillStyle = fl ? "#ffffff" : (healing ? "#d6fff0" : "#9fffe0");
    ctx.beginPath(); ctx.arc(0, e.r * 0.7, e.r * 0.22 * (healing ? 1 + 0.3 * Math.sin(timeNow * 14) : 1), 0, TAU); ctx.fill();
    noglow();
    ctx.restore();
  } else if (e.type === "phantom") {
    // PHANTOM — cloaked wraith: a soft shimmer that resolves into a sharp striker on decloak
    ctx.save();
    ctx.translate(e.x, e.y);
    const pa = (e.state === "reveal" || e.state === "strike") ? Math.atan2(e.dirY, e.dirX)
      : (Math.hypot(e.vx, e.vy) > 5 ? Math.atan2(e.vy, e.vx) : aimP);
    ctx.rotate(pa);
    // solidity: 0 = ghostly drifting, 1 = fully materialized striker
    const solid = e.state === "reveal" ? clamp(1 - e.t / 0.5, 0, 1)
      : (e.state === "strike" || e.state === "recover") ? 1
      : 0.15;
    // wispy trailing cloak (always faintly there)
    ctx.globalAlpha *= 0.5 + solid * 0.5;
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(-e.r * 1.2, 0);
    ctx.quadraticCurveTo(-e.r * 0.3, e.r * (0.5 + 0.2 * Math.sin(timeNow * 8)), e.r * 0.2, 0);
    ctx.quadraticCurveTo(-e.r * 0.3, -e.r * (0.5 + 0.2 * Math.sin(timeNow * 8 + 1)), -e.r * 1.2, 0);
    ctx.closePath(); ctx.fill();
    // hard striker blade emerges as it solidifies
    ctx.globalAlpha = Math.min(1, 0.2 + solid);
    glow(col, 6 + solid * 12);
    ctx.fillStyle = fl ? "#ffffff" : "#e8defc";
    ctx.beginPath();
    ctx.moveTo(e.r + 8, 0);
    ctx.lineTo(-e.r * 0.4, e.r * 0.5 * solid + e.r * 0.15);
    ctx.lineTo(-e.r * 0.8, 0);
    ctx.lineTo(-e.r * 0.4, -(e.r * 0.5 * solid + e.r * 0.15));
    ctx.closePath(); ctx.fill();

    ctx.fillStyle = fl ? "#ffffff" : (solid > 0.5 ? "#ffffff" : "#c9b3ff");
    ctx.beginPath(); ctx.arc(e.r * 0.1, 0, e.r * 0.16, 0, TAU); ctx.fill();

    ctx.restore();

    drawBossBody(e, fl, col, dark, detail);

  noglow();

  if (frozen) {
    ctx.save();
    glow("#aaeeff", 12);
    ctx.fillStyle = "rgba(170,230,255,0.30)";
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r + 4, 0, TAU); ctx.fill();
    // crystalline crust facets
    ctx.strokeStyle = "rgba(225,248,255,0.7)";
    ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * TAU + e.phase;
      ctx.beginPath();
      ctx.moveTo(e.x + Math.cos(a) * e.r * 0.3, e.y + Math.sin(a) * e.r * 0.3);
      ctx.lineTo(e.x + Math.cos(a) * (e.r + 3), e.y + Math.sin(a) * (e.r + 3));
      ctx.stroke();
    }
    // icicles
    ctx.strokeStyle = "rgba(220,245,255,0.85)";
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 3; i++) {
      const a = (i / 3) * TAU + 0.6;
      const x1 = e.x + Math.cos(a) * e.r * 0.55, y1 = e.y + Math.sin(a) * e.r * 0.55;

      ctx.closePath(); ctx.stroke();

    if (detail) {
      for (let i = 0; i < 3; i++) {
        const ph = (timeNow * 0.6 + i / 3) % 1;
        ctx.globalAlpha = (1 - ph) * 0.4;
        ctx.fillStyle = "#dff4ff";
        ctx.beginPath();
        ctx.arc(e.x + Math.sin(i * 2 + timeNow) * e.r * 0.6, e.y - e.r - ph * 16, 2.5 * (1 - ph) + 1, 0, TAU);
