function openShop() { state = "shop"; audio.uiSnd(); }
function closeShop() { state = "hub"; audio.uiSnd(); }
function buyMeta(u) {
  const lv = meta[u.id] || 0;
  if (lv >= u.max) { audio.deny(); return; }
  const c = u.cost(lv);
  if (cores < c) { audio.deny(); toast("NOT ENOUGH CORES", "#ff5566"); return; }
  cores -= c;
  meta[u.id] = lv + 1;
  saveMeta();
  audio.buy();
  toast(u.name + " LV " + (lv + 1), "#ffcc44");
  // live-apply to hub player
  if (u.id === "hp") { player.maxHp += 15; player.hp += 15; }
  if (u.id === "dash") { player.dashMax++; player.dashCharges++; }
}

/* ---------------- §O COLLISION ---------------- */
function collideArena(o) {
  const A = CONFIG, w = A.wall;
  if (o.x < w + o.r) { o.x = w + o.r; o.vx = Math.abs(o.vx) * 0.2; }
  if (o.x > A.arenaW - w - o.r) { o.x = A.arenaW - w - o.r; o.vx = -Math.abs(o.vx) * 0.2; }
  if (o.y < w + o.r) { o.y = w + o.r; o.vy = Math.abs(o.vy) * 0.2; }
  if (o.y > A.arenaH - w - o.r) { o.y = A.arenaH - w - o.r; o.vy = -Math.abs(o.vy) * 0.2; }
}
function collidePillars(o) {
  for (const p of pillars) {
    const d = dist(o.x, o.y, p.x, p.y), min = p.r + o.r;
    if (d < min && d > 0.001) {
      const nx = (o.x - p.x) / d, ny = (o.y - p.y) / d;
      o.x = p.x + nx * min; o.y = p.y + ny * min;
      const dot = o.vx * nx + o.vy * ny;
      if (dot < 0) { o.vx -= nx * dot; o.vy -= ny * dot; }
    }
  }
}
function pointInPillar(x, y, r) {
  for (const p of pillars) if (dist(x, y, p.x, p.y) < p.r + (r || 0)) return p;
  return null;
}

/* ---------------- §P UPDATE: PLAYER ---------------- */
function moveInput() {
  let mx = 0, my = 0;
  if (keys["w"] || keys["ArrowUp"]) my -= 1;
  if (keys["s"] || keys["ArrowDown"]) my += 1;
  if (keys["a"] || keys["ArrowLeft"]) mx -= 1;
  if (keys["d"] || keys["ArrowRight"]) mx += 1;
  if (joy.id !== -1) { mx += joy.dx; my += joy.dy; }
  const m = Math.hypot(mx, my);
  if (m > 1) { mx /= m; my /= m; }
  return { x: mx, y: my };
}

function trySlash() {
  const p = player;
  if (p.slashCD > 0 || p.dashT > 0) return;
  p.slashCD = CONFIG.meleeCD;
  p.slashT = CONFIG.slashDur;
  p.slashSide *= -1;
  p.slashAng = p.aim;
  audio.slash();
  // immediate hit detection — snappy
  const range = CONFIG.meleeRange + boonLv("arc") * 14;
  const arc = CONFIG.meleeArc * (1 + boonLv("arc") * 0.45);
  const dmg = meleeDamage();
  let hitAny = false;
  for (const e of enemies) {
    if (e.hp <= 0) continue;
    const d = dist(p.x, p.y, e.x, e.y);
    if (d > range + e.r) continue;
    const a = angTo(p.x, p.y, e.x, e.y);
    if (Math.abs(angDiff(p.slashAng, a)) > arc / 2 + Math.atan2(e.r, Math.max(1, d))) continue;
    const crit = critRoll();
    hitEnemy(e, dmg, Math.cos(a) * 260, Math.sin(a) * 260, crit, true);
    hitAny = true;
    // chain lightning
    const cl = boonLv("chain");
    if (cl) {
      let from = e, chained = 0;
      const hitIds = [e];
      while (chained < cl) {
        let tgt = null, bd = 170;
        for (const o of enemies) {
          if (o.hp <= 0 || hitIds.includes(o)) continue;
          const dd = dist(from.x, from.y, o.x, o.y);
          if (dd < bd) { bd = dd; tgt = o; }
        }
        if (!tgt) break;
        beams.push({ x1: from.x, y1: from.y, x2: tgt.x, y2: tgt.y, t: 0.18, col: "#8cc8ff" });
        sparkLine(from.x, from.y, tgt.x, tgt.y, "#8cc8ff", 8);
        hitEnemy(tgt, dmg * 0.6, 0, 0, false, false);
        hitIds.push(tgt);
        from = tgt; chained++;
      }
    }
  }
  if (hitAny) shake(2.5, 0.1);
}

function tryBolt() {
  const p = player;
  if (p.boltCD > 0) return;
  if (p.energy < CONFIG.boltCost) { return; }
  p.energy -= CONFIG.boltCost;
  p.boltCD = 0.26;
  if (touchUI && !mouseActive) {
    const near = nearestEnemy(p.x, p.y, 520);
    if (near) p.aim = angTo(p.x, p.y, near.x, near.y);
  }
  firePlayerBolt();
}

function tryDash() {
  const p = player;
  if (p.dashT > 0) return;
  if (p.dashCharges <= 0) return;
  const mv = moveInput();
  let dx = mv.x, dy = mv.y;
  if (Math.hypot(dx, dy) < 0.2) { dx = Math.cos(p.aim); dy = Math.sin(p.aim); }
  const m = Math.hypot(dx, dy);
  p.dashDX = dx / m; p.dashDY = dy / m;
  p.dashT = CONFIG.dashDur;
  p.ifr = Math.max(p.ifr, CONFIG.dashIfr);
  p.dashCharges--;
  if (p.dashCD <= 0) p.dashCD = CONFIG.dashCD;
  audio.dash();
  burst(p.x, p.y, "#5ee6ff", 10, 160, 0.35, 2.5);
}

let mouseActive = false;
canvas.addEventListener("mousemove", () => { mouseActive = true; });

function updatePlayer(dt) {
  const p = player;
  // aim
  if (!touchUI || mouseActive) {
    p.aim = angTo(p.x, p.y, s2wX(mouse.x), s2wY(mouse.y));
  } else if (joy.id !== -1 && Math.hypot(joy.dx, joy.dy) > 0.25) {
    const near = nearestEnemy(p.x, p.y, 380);
    if (near) p.aim = angTo(p.x, p.y, near.x, near.y);
    else p.aim = Math.atan2(joy.dy, joy.dx);
  }
  // timers
  p.slashCD = Math.max(0, p.slashCD - dt);
  p.slashT = Math.max(0, p.slashT - dt);
  p.boltCD = Math.max(0, p.boltCD - dt);
  p.ifr = Math.max(0, p.ifr - dt);
  p.hurtT = Math.max(0, p.hurtT - dt);
  slashBuf = Math.max(0, slashBuf - dt);
  dashBuf = Math.max(0, dashBuf - dt);
  if (p.dashCharges < p.dashMax) {
    p.dashCD -= dt;
    if (p.dashCD <= 0) {
      p.dashCharges++;
      if (p.dashCharges < p.dashMax) p.dashCD = CONFIG.dashCD;
    }
  }
  // energy
  p.energy = Math.min(p.maxEnergy, p.energy + CONFIG.energyRegen * (1 + boonLv("over") * 0.4) * dt);

  // actions
  if (slashBuf > 0) { trySlash(); if (p.slashT > 0) slashBuf = 0; }
  if (mouse.left && p.slashCD <= 0) trySlash();
  if ((mouse.right || keys["Shift"] || keys["e"] || boltHeld) && state === "play") tryBolt();
  if (boltHeld && state === "hub") tryBolt();
  if (dashBuf > 0) { const had = p.dashT; tryDash(); if (p.dashT > 0 && !had) dashBuf = 0; }

  // movement
  const spd = CONFIG.playerSpeed * (1 + boonLv("swift") * 0.12);
  if (p.dashT > 0) {
    p.dashT -= dt;
    p.vx = p.dashDX * CONFIG.dashSpeed;
    p.vy = p.dashDY * CONFIG.dashSpeed;
    p.trailT -= dt;
    if (p.trailT <= 0) {
      p.trailT = 0.016;
      p.trail.push({ x: p.x, y: p.y, t: 0.3, a: p.aim });
      if (boonLv("trail")) addZone(p.x, p.y);
    }
  } else {
    const mv = moveInput();
    const tx = mv.x * spd, ty = mv.y * spd;
    const acc = CONFIG.playerAccel * dt;
    p.vx += clamp(tx - p.vx, -acc, acc);
    p.vy += clamp(ty - p.vy, -acc, acc);
    if (Math.hypot(mv.x, mv.y) > 0.1) lastDir = { x: mv.x, y: mv.y };
  }
  p.x += p.vx * dt; p.y += p.vy * dt;
  collidePillars(p);
  collideArena(p);
  for (const tr of p.trail) tr.t -= dt;
  p.trail = p.trail.filter((tr) => tr.t > 0);

  // hub interactions
  if (state === "hub") {
    if (p.x > HUB.exitX - HUB.exitW / 2 && p.x < HUB.exitX + HUB.exitW / 2 && p.y < HUB.exitY + HUB.exitH + p.r) {
      startRun();
    }
  }
  // doors
  if (state === "play" && roomClear) {
    for (const d of doors) {
      if (Math.abs(p.x - d.x) < d.w / 2 + p.r && p.y < d.y + d.h / 2 + p.r + 6) {
        enterDoor(d);
        break;
      }
    }
  }
  // pickups
  for (const pk of pickups) {
    const dd = dist(p.x, p.y, pk.x, pk.y);
    if (dd < 90) { // magnet
      const a = angTo(pk.x, pk.y, p.x, p.y);
      pk.vx += Math.cos(a) * 900 * dt; pk.vy += Math.sin(a) * 900 * dt;
    }
    if (dd < p.r + 10) {
      if (pk.kind === "core") { cores++; runCores++; audio.pickupSnd(); }
      else { player.hp = Math.min(player.maxHp, player.hp + 8); dnum(p.x, p.y - 16, "+8", "#66ff99", false); audio.pickupSnd(); }
      pk.t = -1;
      burst(pk.x, pk.y, pk.kind === "core" ? "#ffcc44" : "#66ff99", 6, 120, 0.3, 2);
    }
  }
}

/* ---------------- §Q UPDATE: ENEMIES ---------------- */
function seekVec(e, tx, ty) {
  const a = angTo(e.x, e.y, tx, ty);
  return { x: Math.cos(a), y: Math.sin(a), a };
}

function enemyContact(e, dmg, dt) {
  e.contactCD = Math.max(0, e.contactCD - dt);
  if (e.contactCD > 0) return;
  if (dist(e.x, e.y, player.x, player.y) < e.r + player.r) {
    damagePlayer(dmg * eDmgMul(), angTo(e.x, e.y, player.x, player.y), e);
    e.contactCD = 0.5;
  }
}

function updateEnemy(e, dt) {
  e.flash = Math.max(0, e.flash - dt);
  e.spawnT = Math.max(0, e.spawnT - dt);
  if (e.spawnT > 0) return;
  // knockback decay
  e.x += e.kbx * dt; e.y += e.kby * dt;
  e.kbx *= Math.pow(0.0001, dt); e.kby *= Math.pow(0.0001, dt);
  const p = player;
  const d = dist(e.x, e.y, p.x, p.y);

  if (e.type === "chaser") {
    e.cd = Math.max(0, e.cd - dt);
    if (e.state === "seek") {
      const v = seekVec(e, p.x, p.y);
      e.vx = v.x * e.speed; e.vy = v.y * e.speed;
      if (d < 150 && e.cd <= 0) { e.state = "wind"; e.t = 0.45; }
      enemyContact(e, 8, dt);
    } else if (e.state === "wind") {
      e.vx *= 0.85; e.vy *= 0.85;
      if (e.t > 0.15) { const v = seekVec(e, p.x, p.y); e.dirX = v.x; e.dirY = v.y; }
      e.t -= dt;
      if (e.t <= 0) {
        e.state = "lunge"; e.t = 0.3;
        e.vx = e.dirX * 460; e.vy = e.dirY * 460;
        audio.noise && audio.ok() && audio.noise(audio.ctx.currentTime, 0.12, 0.08, "bandpass", 1200, 400);
      }
    } else if (e.state === "lunge") {
      e.t -= dt;
      enemyContact(e, 13, dt);
      if (e.t <= 0) { e.state = "seek"; e.cd = rand(1.0, 1.6); e.vx *= 0.3; e.vy *= 0.3; }
    }
  } else if (e.type === "shooter") {
    e.cd = Math.max(0, e.cd - dt);
    if (e.state === "seek") {
      let mx = 0, my = 0;
      const v = seekVec(e, p.x, p.y);
      if (d < 190) { mx = -v.x; my = -v.y; }
      else if (d > 300) { mx = v.x; my = v.y; }
      else { mx = -v.y * e.strafe; my = v.x * e.strafe; if (Math.random() < dt * 0.5) e.strafe *= -1; }
      e.vx = lerp(e.vx, mx * e.speed, 6 * dt);
      e.vy = lerp(e.vy, my * e.speed, 6 * dt);
      if (e.cd <= 0 && d < 480) { e.state = "charge"; e.t = 0.6; }
    } else if (e.state === "charge") {
      e.vx *= 0.9; e.vy *= 0.9;
      e.t -= dt;
      if (e.t <= 0) {
        const a = angTo(e.x, e.y, p.x, p.y);
        fireEbolt(e.x, e.y, a, 270 + depth * 5, 10, "#cc66ff");
        if (depth >= 8) { fireEbolt(e.x, e.y, a + 0.25, 270, 10, "#cc66ff"); fireEbolt(e.x, e.y, a - 0.25, 270, 10, "#cc66ff"); }
        audio.bolt();
        e.state = "seek"; e.cd = rand(1.4, 2.2);
      }
    }
    enemyContact(e, 6, dt);
  } else if (e.type === "tank") {
    e.cd = Math.max(0, e.cd - dt);
    if (e.state === "seek") {
      const v = seekVec(e, p.x, p.y);
      e.vx = v.x * e.speed; e.vy = v.y * e.speed;
      if (d < 130 && e.cd <= 0) { e.state = "slam"; e.t = 0.85; }
      enemyContact(e, 10, dt);
    } else if (e.state === "slam") {
      e.vx = 0; e.vy = 0;
      e.t -= dt;
      if (e.t <= 0) {
        const R = 125;
        burst(e.x, e.y, "#ffaa33", 36, 360, 0.6, 4);
        shake(8, 0.35);
        audio.enemyDie(true);
        if (dist(e.x, e.y, p.x, p.y) < R + p.r) {
          damagePlayer(18 * eDmgMul(), angTo(e.x, e.y, p.x, p.y), e);
        }
        e.state = "seek"; e.cd = rand(2.0, 2.8);
      }
    }
  } else if (e.type === "swarmer") {
    e.phase += dt * 7;
    const v = seekVec(e, p.x, p.y);
    const wob = Math.sin(e.phase) * 0.7;
    e.vx = (v.x + -v.y * wob) * e.speed * 0.72;
    e.vy = (v.y + v.x * wob) * e.speed * 0.72;
    enemyContact(e, 6, dt);
  } else if (e.type === "boss") {
    updateBoss(e, dt, d);
  }

  e.x += e.vx * dt; e.y += e.vy * dt;
  if (!(e.type === "boss" && e.state === "dash")) collidePillars(e);
  collideArena(e);
  // separation
  for (const o of enemies) {
    if (o === e || o.hp <= 0) continue;
    const dd = dist(e.x, e.y, o.x, o.y), min = (e.r + o.r) * 0.8;
    if (dd < min && dd > 0.01) {
      const push = (min - dd) * 0.5;
      const a = angTo(o.x, o.y, e.x, e.y);
      e.x += Math.cos(a) * push; e.y += Math.sin(a) * push;
    }
  }
}

function updateBoss(e, dt, d) {
  e.rot += dt * (e.state === "radial" ? 6 : 1.2);
  const p = player;
  const phase2 = e.hp < e.maxHp * 0.5;
  e.cd = Math.max(0, e.cd - dt);
  if (e.state === "move") {
    const v = seekVec(e, p.x, p.y);
    const want = d > 240 ? 1 : (d < 160 ? -0.6 : 0.2);
    e.vx = lerp(e.vx, v.x * e.speed * want, 3 * dt);
    e.vy = lerp(e.vy, v.y * e.speed * want, 3 * dt);
    if (e.cd <= 0) {
      e.atk = (e.atk + 1) % 3;
      e.sub = 0;
      if (e.atk === 0) { e.state = "radial"; e.t = 0.8; }
      else if (e.atk === 1) { e.state = "aim"; e.t = 0.7; }
      else { e.state = "summon"; e.t = 0.8; audio.roar(); }
    }
  } else if (e.state === "radial") {
    e.vx *= 0.92; e.vy *= 0.92;
    e.t -= dt;
    if (e.t <= 0) {
      const volleys = phase2 ? 4 : 3;
      const n = 16 + e.tier * 2;
      const baseA = e.rot + e.sub * 0.13;
      for (let i = 0; i < n; i++) {
        fireEbolt(e.x, e.y, baseA + (i / n) * TAU, 165 + e.tier * 12, 10, "#ff3366", 7);
      }
      audio.bolt();
      shake(4, 0.15);
      e.sub++;
      if (e.sub >= volleys) { e.state = "move"; e.cd = phase2 ? 1.5 : 2.2; }
      else e.t = 0.42;
    }
  } else if (e.state === "aim") {
    e.vx *= 0.9; e.vy *= 0.9;
    if (e.t > 0.18) { const v = seekVec(e, p.x, p.y); e.dirX = v.x; e.dirY = v.y; }
    e.t -= dt;
    if (e.t <= 0) {
      e.state = "dash"; e.t = 0.6;
      e.vx = e.dirX * (520 + e.tier * 30); e.vy = e.dirY * (520 + e.tier * 30);
      audio.dash();
    }
  } else if (e.state === "dash") {
    e.t -= dt;
    enemyContact(e, 18, dt);
    addPart({ x: e.x + rand(-20, 20), y: e.y + rand(-20, 20), vx: 0, vy: 0, t: 0.3, tm: 0.3, col: "#ff3366", r: rand(2, 5), drag: 1 });
    const A = CONFIG;
    if (e.x < 70 || e.x > A.arenaW - 70 || e.y < 70 || e.y > A.arenaH - 70 || e.t <= 0) {
      e.state = "move"; e.cd = phase2 ? 1.2 : 1.9;
      e.vx *= 0.2; e.vy *= 0.2;
      shake(6, 0.25);
    }
  } else if (e.state === "summon") {
    e.vx *= 0.9; e.vy *= 0.9;
    e.t -= dt;
    if (e.t <= 0) {
      const n = phase2 ? 5 : 4;
      for (let i = 0; i < n; i++) {
        const a = (i / n) * TAU + e.rot;
        const x = clamp(e.x + Math.cos(a) * 110, 50, CONFIG.arenaW - 50);
        const y = clamp(e.y + Math.sin(a) * 110, 50, CONFIG.arenaH - 50);
        spawnQ.push({ type: Math.random() < 0.75 ? "swarmer" : "chaser", x, y, t: 0.8 });
      }
      e.state = "move"; e.cd = phase2 ? 2.0 : 3.0;
    }
  }
  enemyContact(e, 14, dt);
}

/* ---------------- §R UPDATE: WORLD ---------------- */
function step(dt) {
  timeNow += dt;
  if (freezeT > 0) { freezeT -= dt; return; }
  shakeT = Math.max(0, shakeT - dt);
  if (shakeT <= 0) shakeA = 0;
  redFlash = Math.max(0, redFlash - dt * 1.6);
  roomFade = Math.max(0, roomFade - dt * 2.4);
  bossWarnT = Math.max(0, bossWarnT - dt);

  for (const t of toasts) t.t -= dt;
  toasts = toasts.filter((t) => t.t > 0);

  if (state !== "play" && state !== "hub") {
    updateParts(dt);
    return;
  }
  if (player && player.hp > 0) updatePlayer(dt);

  // spawn queue
  for (const q of spawnQ) {
    q.t -= dt;
    if (q.t <= 0) spawnEnemy(q.type, q.x, q.y);
  }
  spawnQ = spawnQ.filter((q) => q.t > 0);

  // enemies
  for (const e of enemies) if (e.hp > 0) updateEnemy(e, dt);
  enemies = enemies.filter((e) => e.hp > 0);

  // waves / clear
  if (state === "play" && !roomClear && enemies.length === 0 && spawnQ.length === 0) {
    if (waveIdx < waves.length) {
      queueWave(waves[waveIdx]);
      waveIdx++;
      toast("WAVE " + (waveIdx) + " / " + waves.length, "#cc66ff");
    } else {
      roomClear = true;
      roomsCleared++;
      if (boonLv("wind")) {
        const h = 12 * boonLv("wind");
        player.hp = Math.min(player.maxHp, player.hp + h);
        dnum(player.x, player.y - 20, "+" + h, "#66ff99", false);
      }
      openDoors();
    }
  }

  // player bolts
  for (const b of pbolts) {
    b.x += b.vx * dt; b.y += b.vy * dt;
    b.t -= dt;
    addPart({ x: b.x, y: b.y, vx: 0, vy: 0, t: 0.15, tm: 0.15, col: "#ff66ee", r: 2, drag: 0 });
    const A = CONFIG;
    if (b.x < A.wall || b.x > A.arenaW - A.wall || b.y < A.wall || b.y > A.arenaH - A.wall) b.t = -1;
    if (pointInPillar(b.x, b.y, b.r)) { burst(b.x, b.y, "#ff66ee", 5, 100, 0.25, 2); b.t = -1; }
    if (b.t <= 0) continue;
    for (const e of enemies) {
      if (e.hp <= 0 || b.hitSet.includes(e)) continue;
      if (dist(b.x, b.y, e.x, e.y) < b.r + e.r) {
        const crit = critRoll();
        const a = Math.atan2(b.vy, b.vx);
        hitEnemy(e, boltDamage(), Math.cos(a) * 130, Math.sin(a) * 130, crit, false);
        b.hitSet.push(e);
        if (b.pierce > 0) b.pierce--;
        else { b.t = -1; burst(b.x, b.y, "#ff66ee", 6, 140, 0.25, 2); break; }
      }
    }
  }
  pbolts = pbolts.filter((b) => b.t > 0);

  // enemy bolts
  for (const b of ebolts) {
    b.x += b.vx * dt; b.y += b.vy * dt;
    b.t -= dt;
    const A = CONFIG;
    if (b.x < A.wall || b.x > A.arenaW - A.wall || b.y < A.wall || b.y > A.arenaH - A.wall) b.t = -1;
    if (pointInPillar(b.x, b.y, b.r)) { burst(b.x, b.y, b.col, 4, 90, 0.2, 2); b.t = -1; }
    if (b.t > 0 && player.hp > 0 && dist(b.x, b.y, player.x, player.y) < b.r + player.r) {
      if (player.ifr <= 0 && player.hurtT <= 0) {
        damagePlayer(b.dmg, Math.atan2(b.vy, b.vx), null);
        b.t = -1;
      }
    }
  }
  ebolts = ebolts.filter((b) => b.t > 0);

  // burn zones
  for (const z of zones) {
    z.t -= dt; z.tick -= dt;
    if (z.tick <= 0) {
      z.tick = 0.18;
      for (const e of enemies) {
        if (e.hp > 0 && dist(z.x, z.y, e.x, e.y) < z.r + e.r) {
          hitEnemy(e, 4 * dmgMul() * boonLv("trail"), 0, 0, false, false);
        }
      }
      addPart({ x: z.x + rand(-14, 14), y: z.y + rand(-14, 14), vx: 0, vy: -40, t: 0.4, tm: 0.4, col: "#ffaa44", r: rand(2, 4), drag: 1 });
    }
  }
  zones = zones.filter((z) => z.t > 0);

  // beams
  for (const bm of beams) bm.t -= dt;
  beams = beams.filter((bm) => bm.t > 0);

  // pickups
  for (const pk of pickups) {
    pk.t -= dt;
    pk.x += pk.vx * dt; pk.y += pk.vy * dt;
    pk.vx *= Math.pow(0.05, dt); pk.vy *= Math.pow(0.05, dt);
    const A = CONFIG;
    pk.x = clamp(pk.x, A.wall + 8, A.arenaW - A.wall - 8);
    pk.y = clamp(pk.y, A.wall + 8, A.arenaH - A.wall - 8);
  }
  pickups = pickups.filter((pk) => pk.t > 0);

  updateParts(dt);

  // damage numbers
  for (const n of dnums) { n.t -= dt; n.y += n.vy * dt; n.vy *= Math.pow(0.2, dt); }
  dnums = dnums.filter((n) => n.t > 0);

  // door open anim
  for (const d of doors) d.openT = Math.min(1, d.openT + dt * 2);
}

function updateParts(dt) {
  for (const p of parts) {
    p.t -= dt;
    p.x += p.vx * dt; p.y += p.vy * dt;
    const dr = Math.pow(Math.exp(-(p.drag || 0)), dt);
    p.vx *= dr; p.vy *= dr;
  }
  parts = parts.filter((p) => p.t > 0);
}

/* ---------------- §S RENDER: WORLD ---------------- */
function glow(col, b) { ctx.shadowColor = col; ctx.shadowBlur = b; }
function noglow() { ctx.shadowBlur = 0; }
function rrect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawArenaFloor() {
  const A = CONFIG;
  // floor
  ctx.fillStyle = "#070720";
  ctx.fillRect(0, 0, A.arenaW, A.arenaH);
  // grid
  ctx.strokeStyle = "rgba(70,80,160,0.13)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 60; x < A.arenaW; x += 60) { ctx.moveTo(x, 0); ctx.lineTo(x, A.arenaH); }
  for (let y = 60; y < A.arenaH; y += 60) { ctx.moveTo(0, y); ctx.lineTo(A.arenaW, y); }
  ctx.stroke();
  // soft center light
  const g = ctx.createRadialGradient(A.arenaW / 2, A.arenaH / 2, 50, A.arenaW / 2, A.arenaH / 2, A.arenaW * 0.7);
  g.addColorStop(0, "rgba(60,70,160,0.10)");
  g.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, A.arenaW, A.arenaH);
  // walls
  const w = A.wall;
  glow(state === "hub" ? "#44ddaa" : "#3355ff", 14);
  ctx.strokeStyle = state === "hub" ? "rgba(80,230,180,0.7)" : "rgba(90,110,255,0.65)";
  ctx.lineWidth = 3;
  ctx.strokeRect(w, w, A.arenaW - w * 2, A.arenaH - w * 2);
  noglow();
  ctx.strokeStyle = "rgba(20,25,60,0.9)";
  ctx.lineWidth = w;
  ctx.strokeRect(w / 2, w / 2, A.arenaW - w, A.arenaH - w);
}

function drawPillars() {
  for (const p of pillars) {
    glow("#3355ff", 10);
    ctx.fillStyle = p.hue;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.fill();
    noglow();
    ctx.strokeStyle = "rgba(110,140,255,0.5)";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, TAU); ctx.stroke();
    ctx.strokeStyle = "rgba(110,140,255,0.18)";
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * 0.62, 0, TAU); ctx.stroke();
  }
}

function drawDoors() {
  for (const d of doors) {
    const o = d.openT;
    const rw = DOOR_REWARDS[d.reward];
    ctx.save();
    ctx.globalAlpha = o;
    glow(rw.col, 16);
    ctx.fillStyle = "rgba(8,10,30,0.95)";
    rrect(d.x - d.w / 2, d.y - d.h / 2, d.w, d.h, 6); ctx.fill();
    ctx.strokeStyle = rw.col;
    ctx.lineWidth = 2;
    rrect(d.x - d.w / 2, d.y - d.h / 2, d.w, d.h, 6); ctx.stroke();
    noglow();
    ctx.fillStyle = rw.col;
    ctx.font = "bold 13px 'Courier New', monospace";
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(rw.label, d.x, d.y + 1);
    // reward icon above
    const iy = d.y + d.h / 2 + 16 + Math.sin(timeNow * 3) * 3;
    glow(rw.col, 10);
    ctx.beginPath();
    if (d.reward === "boon") {
      ctx.moveTo(d.x, iy - 8); ctx.lineTo(d.x + 7, iy); ctx.lineTo(d.x, iy + 8); ctx.lineTo(d.x - 7, iy);
      ctx.closePath(); ctx.fill();
    } else if (d.reward === "hp") {
      ctx.fillRect(d.x - 8, iy - 2.5, 16, 5); ctx.fillRect(d.x - 2.5, iy - 8, 5, 16);
    } else if (d.reward === "energy") {
      ctx.moveTo(d.x + 3, iy - 9); ctx.lineTo(d.x - 5, iy + 1); ctx.lineTo(d.x - 1, iy + 1);
      ctx.lineTo(d.x - 3, iy + 9); ctx.lineTo(d.x + 5, iy - 1); ctx.lineTo(d.x + 1, iy - 1);
      ctx.closePath(); ctx.fill();
    } else {
      ctx.arc(d.x, iy, 6, 0, TAU); ctx.fill();
    }
    noglow();
    if (d.bossNext) {
      ctx.fillStyle = "#ff3366";
      ctx.font = "bold 11px 'Courier New', monospace";
      ctx.fillText("⚠ BOSS", d.x, iy + 20);
    }
    ctx.restore();
  }
}

function drawZonesAndPickups() {
  for (const z of zones) {
    const a = clamp(z.t / 1.5, 0, 1);
    ctx.fillStyle = "rgba(255,150,50," + (0.16 * a) + ")";
    glow("#ffaa44", 8);
    ctx.beginPath(); ctx.arc(z.x, z.y, z.r, 0, TAU); ctx.fill();
    noglow();
  }
  for (const pk of pickups) {
    const bob = Math.sin(timeNow * 5 + pk.x) * 2;
    if (pk.kind === "core") {
      glow("#ffcc44", 10);
      ctx.fillStyle = "#ffcc44";
      ctx.save();
      ctx.translate(pk.x, pk.y + bob);
      ctx.rotate(timeNow * 2);
      ctx.fillRect(-4, -4, 8, 8);
      ctx.restore();
    } else {
      glow("#66ff99", 10);
      ctx.fillStyle = "#66ff99";
      ctx.fillRect(pk.x - 6, pk.y + bob - 2, 12, 4);
      ctx.fillRect(pk.x - 2, pk.y + bob - 6, 4, 12);
    }
    noglow();
  }
}

function drawSpawnTelegraphs() {
  for (const q of spawnQ) {
    const p = 1 - clamp(q.t / 1.1, 0, 1);
    const col = q.type === "boss" ? "#ff3366" : ENEMY_DEFS[q.type] ? ENEMY_DEFS[q.type].col : "#ff5577";
    ctx.strokeStyle = col;
    ctx.globalAlpha = 0.25 + p * 0.55;
    ctx.lineWidth = 2;
    glow(col, 8);
    ctx.beginPath(); ctx.arc(q.x, q.y, 20 * (1 - p) + 6, 0, TAU); ctx.stroke();
    ctx.beginPath(); ctx.arc(q.x, q.y, 4, 0, TAU); ctx.stroke();
    noglow();
    ctx.globalAlpha = 1;
  }
}

function drawEnemy(e) {
  const fl = e.flash > 0;
  const col = fl ? "#ffffff" : e.col;
  ctx.save();
  if (e.spawnT > 0) ctx.globalAlpha = 1 - e.spawnT / 0.4;
  // telegraphs first (under body)
  if (e.type === "tank" && e.state === "slam") {
    const p = 1 - e.t / 0.85;
    ctx.strokeStyle = "#ffaa33";
    ctx.fillStyle = "rgba(255,170,51," + (0.07 + p * 0.13) + ")";
    ctx.lineWidth = 2 + p * 2;
    glow("#ffaa33", 12);
    ctx.beginPath(); ctx.arc(e.x, e.y, 125, 0, TAU); ctx.fill();
    ctx.beginPath(); ctx.arc(e.x, e.y, 125 * p, 0, TAU); ctx.stroke();
    noglow();
  }
  if (e.type === "chaser" && e.state === "wind") {
    const p = 1 - e.t / 0.45;
    ctx.strokeStyle = "rgba(255,85,119," + (0.3 + p * 0.6) + ")";
    ctx.lineWidth = 3;
    ctx.setLineDash([8, 6]);
    ctx.beginPath();
    ctx.moveTo(e.x, e.y);
    ctx.lineTo(e.x + e.dirX * 150, e.y + e.dirY * 150);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  if (e.type === "boss" && e.state === "aim") {
    const p = 1 - e.t / 0.7;
    ctx.strokeStyle = "rgba(255,51,102," + (0.3 + p * 0.6) + ")";
    ctx.lineWidth = 5;
    ctx.setLineDash([12, 8]);
    ctx.beginPath();
    ctx.moveTo(e.x, e.y);
    ctx.lineTo(e.x + e.dirX * 700, e.y + e.dirY * 700);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  if (e.type === "shooter" && e.state === "charge") {
    const p = 1 - e.t / 0.6;
    glow("#cc66ff", 16);
    ctx.fillStyle = "rgba(204,102,255," + (0.3 + p * 0.5) + ")";
    ctx.beginPath(); ctx.arc(e.x, e.y, 5 + p * 7, 0, TAU); ctx.fill();
    noglow();
  }
  if (e.type === "boss" && (e.state === "radial" || e.state === "summon")) {
    const p = e.state === "radial" ? 1 - clamp(e.t / 0.8, 0, 1) : 1 - clamp(e.t / 0.8, 0, 1);
    ctx.strokeStyle = "rgba(255,51,102," + (0.2 + p * 0.5) + ")";
    ctx.lineWidth = 2;
    glow("#ff3366", 10);
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r + 14 + p * 10, 0, TAU); ctx.stroke();
    noglow();
  }

  glow(col, fl ? 22 : 13);
  ctx.fillStyle = col;
  ctx.strokeStyle = col;

  if (e.type === "chaser") {
    const a = e.state === "lunge" || e.state === "wind" ? Math.atan2(e.dirY, e.dirX) : angTo(e.x, e.y, player.x, player.y);
    ctx.save();
    ctx.translate(e.x, e.y); ctx.rotate(a);
    ctx.beginPath();
    ctx.moveTo(e.r + 4, 0); ctx.lineTo(-e.r * 0.7, e.r * 0.8); ctx.lineTo(-e.r * 0.3, 0); ctx.lineTo(-e.r * 0.7, -e.r * 0.8);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  } else if (e.type === "shooter") {
    ctx.save();
    ctx.translate(e.x, e.y); ctx.rotate(timeNow * 1.5);
    ctx.beginPath();
    for (let i = 0; i < 5; i++) {
      const a = (i / 5) * TAU;
      const rr = i % 2 ? e.r * 0.6 : e.r;
      if (i === 0) ctx.moveTo(Math.cos(a) * rr, Math.sin(a) * rr);
      else ctx.lineTo(Math.cos(a) * rr, Math.sin(a) * rr);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
  } else if (e.type === "tank") {
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.rotate(timeNow * 0.4);
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * TAU;
      if (i === 0) ctx.moveTo(Math.cos(a) * e.r, Math.sin(a) * e.r);
      else ctx.lineTo(Math.cos(a) * e.r, Math.sin(a) * e.r);
    }
    ctx.closePath(); ctx.fill();
    ctx.restore();
    ctx.fillStyle = "#070720";
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r * 0.45, 0, TAU); ctx.fill();
    ctx.fillStyle = col;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r * 0.2, 0, TAU); ctx.fill();
  } else if (e.type === "swarmer") {
    ctx.save();
    ctx.translate(e.x, e.y); ctx.rotate(e.phase);
    ctx.beginPath();
    ctx.moveTo(e.r + 2, 0); ctx.lineTo(0, e.r); ctx.lineTo(-e.r, 0); ctx.lineTo(0, -e.r);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  } else if (e.type === "boss") {
    ctx.save();
    ctx.translate(e.x, e.y);
    // outer ring
    ctx.rotate(e.rot * 0.5);
    ctx.lineWidth = 4;
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a0 = (i / 6) * TAU, a1 = a0 + TAU / 9;
      ctx.moveTo(Math.cos(a0) * (e.r + 10), Math.sin(a0) * (e.r + 10));
      ctx.arc(0, 0, e.r + 10, a0, a1);
    }
    ctx.stroke();
    ctx.rotate(-e.rot * 0.5);
    // body
    ctx.beginPath(); ctx.arc(0, 0, e.r, 0, TAU); ctx.fill();
    ctx.fillStyle = "#070720";
    ctx.beginPath(); ctx.arc(0, 0, e.r * 0.7, 0, TAU); ctx.fill();
    // eye looks at player
    const a = angTo(e.x, e.y, player.x, player.y);
    ctx.fillStyle = fl ? "#ffffff" : "#ff88aa";
    ctx.beginPath(); ctx.arc(Math.cos(a) * e.r * 0.3, Math.sin(a) * e.r * 0.3, e.r * 0.24, 0, TAU); ctx.fill();
    ctx.restore();
  }
  noglow();

  // small hp bar (not boss; boss has top bar)
  if (e.type !== "boss" && e.hp < e.maxHp) {
    const w = e.r * 2;
    ctx.fillStyle = "rgba(0,0,0,0.5)";
    ctx.fillRect(e.x - w / 2, e.y - e.r - 9, w, 3.5);
    ctx.fillStyle = e.col;
    ctx.fillRect(e.x - w / 2, e.y - e.r - 9, w * clamp(e.hp / e.maxHp, 0, 1), 3.5);
  }
  ctx.restore();
}

function drawPlayer() {
  const p = player;
  if (!p || p.hp <= 0) return;
  // dash trail ghosts
  for (const tr of p.trail) {
    const a = tr.t / 0.3;
    ctx.save();
    ctx.globalAlpha = a * 0.35;
    ctx.translate(tr.x, tr.y);
    ctx.rotate(tr.a);
    ctx.fillStyle = "#5ee6ff";
    glow("#5ee6ff", 8);
    ctx.beginPath();
    ctx.moveTo(p.r + 3, 0); ctx.lineTo(-p.r * 0.8, p.r * 0.85); ctx.lineTo(-p.r * 0.4, 0); ctx.lineTo(-p.r * 0.8, -p.r * 0.85);
    ctx.closePath(); ctx.fill();
    noglow();
    ctx.restore();
  }
  ctx.save();
  ctx.translate(p.x, p.y);
  const blink = p.hurtT > 0 && Math.floor(timeNow * 18) % 2 === 0;
  if (blink) ctx.globalAlpha = 0.35;
  ctx.rotate(p.aim);
  const bodyCol = p.dashT > 0 ? "#aaf6ff" : "#5ee6ff";
  glow(bodyCol, 16);
  ctx.fillStyle = bodyCol;
  ctx.beginPath();
  ctx.moveTo(p.r + 3, 0); ctx.lineTo(-p.r * 0.8, p.r * 0.85); ctx.lineTo(-p.r * 0.4, 0); ctx.lineTo(-p.r * 0.8, -p.r * 0.85);
  ctx.closePath(); ctx.fill();
  noglow();
  // visor
  ctx.fillStyle = "#0a0a28";
  ctx.beginPath();
  ctx.moveTo(p.r - 1, 0); ctx.lineTo(p.r * 0.1, p.r * 0.4); ctx.lineTo(p.r * 0.1, -p.r * 0.4);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // slash arc swipe
  if (p.slashT > 0) {
    const prog = 1 - p.slashT / CONFIG.slashDur;
    const range = CONFIG.meleeRange + boonLv("arc") * 14;
    const arc = CONFIG.meleeArc * (1 + boonLv("arc") * 0.45);
    const sweep = p.slashSide;
    const a0 = p.slashAng - sweep * arc / 2;
    const a1 = a0 + sweep * arc * Math.min(1, prog * 2.4);
    ctx.save();
    ctx.globalAlpha = (1 - prog) * 0.9;
    glow("#aaf6ff", 18);
    ctx.strokeStyle = "#cffaff";
    ctx.lineWidth = 7 * (1 - prog * 0.6);
    ctx.beginPath();
    ctx.arc(p.x, p.y, range - 8, Math.min(a0, a1), Math.max(a0, a1));
    ctx.stroke();
    ctx.strokeStyle = "rgba(94,230,255,0.5)";
    ctx.lineWidth = 16 * (1 - prog);
    ctx.beginPath();
    ctx.arc(p.x, p.y, range - 16, Math.min(a0, a1), Math.max(a0, a1));
    ctx.stroke();
    noglow();
    ctx.restore();
  }
}

function drawBolts() {
  for (const b of pbolts) {
    glow("#ff66ee", 14);
    ctx.fillStyle = "#ffb3f5";
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, TAU); ctx.fill();
    noglow();
  }
  for (const b of ebolts) {
    glow(b.col, 12);
    ctx.fillStyle = b.col;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, TAU); ctx.fill();
    ctx.fillStyle = "rgba(255,255,255,0.7)";
    ctx.beginPath(); ctx.arc(b.x, b.y, b.r * 0.45, 0, TAU); ctx.fill();
    noglow();
  }
}

function drawBeamsParts() {
  for (const bm of beams) {
    ctx.save();
    ctx.globalAlpha = bm.t / 0.18;
    glow(bm.col, 12);
    ctx.strokeStyle = bm.col;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    // jagged lightning
    const segs = 5;
    ctx.moveTo(bm.x1, bm.y1);
    for (let i = 1; i < segs; i++) {
      const t = i / segs;
      ctx.lineTo(lerp(bm.x1, bm.x2, t) + rand(-7, 7), lerp(bm.y1, bm.y2, t) + rand(-7, 7));
    }
    ctx.lineTo(bm.x2, bm.y2);
    ctx.stroke();
    noglow();
    ctx.restore();
  }
  for (const p of parts) {
    ctx.globalAlpha = clamp(p.t / p.tm, 0, 1);
    ctx.fillStyle = p.col;
    ctx.fillRect(p.x - p.r / 2, p.y - p.r / 2, p.r, p.r);
  }
  ctx.globalAlpha = 1;
}

function drawDnums() {
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  for (const n of dnums) {
    const a = clamp(n.t / 0.8, 0, 1);
    ctx.globalAlpha = a;
    ctx.font = "bold " + (n.big ? 20 : 14) + "px 'Courier New', monospace";
    ctx.fillStyle = "#000";
    ctx.fillText(n.txt, n.x + 1, n.y + 1);
    ctx.fillStyle = n.col;
    ctx.fillText(n.txt, n.x, n.y);
  }
  ctx.globalAlpha = 1;
}

function drawHubObjects() {
  const t = HUB;
  // upgrade terminal
  glow("#ffcc44", 16);
  ctx.fillStyle = "#181230";
  rrect(t.termX - 34, t.termY - 26, 68, 52, 8); ctx.fill();
  ctx.strokeStyle = "#ffcc44";
  ctx.lineWidth = 2.5;
  rrect(t.termX - 34, t.termY - 26, 68, 52, 8); ctx.stroke();
  noglow();
  ctx.fillStyle = "#ffcc44";
  ctx.font = "bold 11px 'Courier New', monospace";
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.fillText("MIRROR", t.termX, t.termY - 6);
  ctx.fillText("CORE", t.termX, t.termY + 8);
  const pulse = 0.5 + Math.sin(timeNow * 3) * 0.3;
  ctx.strokeStyle = "rgba(255,204,68," + pulse * 0.6 + ")";
  ctx.beginPath(); ctx.arc(t.termX, t.termY, t.termR, 0, TAU); ctx.stroke();
  if (player && dist(player.x, player.y, t.termX, t.termY) < t.termR + 30) {
    ctx.fillStyle = "#ffcc44";
    ctx.font = "13px 'Courier New', monospace";
    ctx.fillText(touchUI ? "TAP TO UPGRADE" : "PRESS E TO UPGRADE", t.termX, t.termY - 48);
  }
  // exit gate
  glow("#5ee6ff", 18);
  ctx.fillStyle = "rgba(94,230,255,0.12)";
  rrect(t.exitX - t.exitW / 2, t.exitY - t.exitH / 2, t.exitW, t.exitH, 6); ctx.fill();
  ctx.strokeStyle = "#5ee6ff";
  ctx.lineWidth = 2.5;
  rrect(t.exitX - t.exitW / 2, t.exitY - t.exitH / 2, t.exitW, t.exitH, 6); ctx.stroke();
  noglow();
  ctx.fillStyle = "#5ee6ff";
  ctx.font = "bold 13px 'Courier New', monospace";
  ctx.fillText("▲ DESCEND", t.exitX, t.exitY + 1);
  ctx.font = "11px 'Courier New', monospace";
  ctx.fillStyle = "rgba(94,230,255,0.6)";
  ctx.fillText("walk in to begin the run", t.exitX, t.exitY + t.exitH / 2 + 14);
}

/* ---------------- §T RENDER: HUD & SCREENS ---------------- */
function drawHUD() {
  const u = us();
  const p = player;
  if (!p) return;
  ctx.save();
  ctx.textBaseline = "middle";
  const bx = 16, by = ch - 64 * u;
  const bw = 190 * u, bh = 13 * u;
  // HP
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  rrect(bx, by, bw, bh, 4); ctx.fill();
  const hpFrac = clamp(p.hp / p.maxHp, 0, 1);
  glow("#ff5566", 8);
  ctx.fillStyle = hpFrac > 0.35 ? "#ff5566" : (Math.floor(timeNow * 6) % 2 ? "#ff8899" : "#ff2244");
  rrect(bx, by, bw * hpFrac, bh, 4); ctx.fill();
  noglow();
  ctx.fillStyle = "#fff";
  ctx.font = "bold " + 10 * u + "px 'Courier New', monospace";
  ctx.textAlign = "left";
  ctx.fillText(Math.ceil(p.hp) + " / " + p.maxHp, bx + 6, by + bh / 2 + 1);
  // Energy
  const ey = by + bh + 6 * u;
  ctx.fillStyle = "rgba(0,0,0,0.55)";
  rrect(bx, ey, bw * 0.8, bh * 0.7, 3); ctx.fill();
  glow("#ff66ee", 8);
  ctx.fillStyle = "#ff66ee";
  rrect(bx, ey, bw * 0.8 * clamp(p.energy / p.maxEnergy, 0, 1), bh * 0.7, 3); ctx.fill();
  noglow();
  // dash pips
  const py = ey + bh * 0.7 + 9 * u;
  for (let i = 0; i < p.dashMax; i++) {
    const filled = i < p.dashCharges;
    ctx.fillStyle = filled ? "#5ee6ff" : "rgba(94,230,255,0.18)";
    if (filled) glow("#5ee6ff", 6);
    ctx.beginPath(); ctx.arc(bx + 7 + i * 18 * u, py, 5 * u, 0, TAU); ctx.fill();
    noglow();
  }
  // partial recharge arc
  if (p.dashCharges < p.dashMax && p.dashCD > 0) {
    const i = p.dashCharges;
    ctx.strokeStyle = "#5ee6ff";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(bx + 7 + i * 18 * u, py, 5 * u, -Math.PI / 2, -Math.PI / 2 + TAU * (1 - p.dashCD / CONFIG.dashCD));
    ctx.stroke();
  }
  // boon icons
  let ix = bx, iy = by - 22 * u;
  for (const id in p.boons) {
    const b = boonById(id);
    if (!b) continue;
    glow(b.col, 6);
    ctx.fillStyle = "rgba(8,10,30,0.9)";
    rrect(ix, iy - 9 * u, 18 * u, 18 * u, 4); ctx.fill();
    ctx.strokeStyle = b.col; ctx.lineWidth = 1.5;
    rrect(ix, iy - 9 * u, 18 * u, 18 * u, 4); ctx.stroke();
    noglow();
    ctx.fillStyle = b.col;
    ctx.font = "bold " + 11 * u + "px 'Courier New', monospace";
    ctx.textAlign = "center";
    ctx.fillText(b.glyph, ix + 9 * u, iy + 1);
    if (p.boons[id] > 1) {
      ctx.font = "bold " + 8 * u + "px 'Courier New', monospace";
      ctx.fillText("x" + p.boons[id], ix + 9 * u, iy + 13 * u);
    }
    ix += 22 * u;
  }
  // top-right: depth & cores
  ctx.textAlign = "right";
  ctx.font = "bold " + 16 * u + "px 'Courier New', monospace";
  ctx.fillStyle = "#5ee6ff";
  glow("#5ee6ff", 6);
  ctx.fillText(state === "hub" ? "HUB" : "DEPTH " + depth, cw - 16, 24 * u);
  noglow();
  ctx.fillStyle = "#ffcc44";
  ctx.font = "bold " + 13 * u + "px 'Courier New', monospace";
  ctx.fillText("◆ " + cores, cw - 16, 44 * u);
  if (state === "play" && !roomClear && waves.length > 1) {
    ctx.fillStyle = "rgba(204,102,255,0.8)";
    ctx.font = 11 * u + "px 'Courier New', monospace";
    ctx.fillText("wave " + waveIdx + "/" + waves.length, cw - 16, 62 * u);
  }
  // boss bar
  if (boss && boss.hp > 0) {
    const w = Math.min(520, cw * 0.6);
    const x = (cw - w) / 2, y = 18 * u;
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    rrect(x - 2, y - 2, w + 4, 14 * u + 4, 4); ctx.fill();
    glow("#ff3366", 10);
    ctx.fillStyle = "#ff3366";
    rrect(x, y, w * clamp(boss.hp / boss.maxHp, 0, 1), 14 * u, 3); ctx.fill();
    noglow();
    ctx.fillStyle = "#ffd0dd";
    ctx.textAlign = "center";
    ctx.font = "bold " + 11 * u + "px 'Courier New', monospace";
    ctx.fillText("WARDEN OF DEPTH " + depth, cw / 2, y + 7 * u);
  }
  if (bossWarnT > 0 && Math.floor(timeNow * 4) % 2 === 0) {
    ctx.fillStyle = "#ff3366";
    ctx.textAlign = "center";
    glow("#ff3366", 16);
    ctx.font = "bold " + 30 * u + "px 'Courier New', monospace";
    ctx.fillText("!! WARDEN DETECTED !!", cw / 2, ch * 0.3);
    noglow();
  }
  // toasts
  let ty = ch * 0.18;
  ctx.textAlign = "center";
  for (const t of toasts) {
    ctx.globalAlpha = clamp(t.t / 0.5, 0, 1);
    ctx.font = "bold " + 15 * u + "px 'Courier New', monospace";
    glow(t.col, 8);
    ctx.fillStyle = t.col;
    ctx.fillText(t.txt, cw / 2, ty);
    noglow();
    ty += 22 * u;
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawTouchControls() {
  if (!touchUI || (state !== "play" && state !== "hub")) return;
  const u = us();
  ctx.save();
  // joystick
  if (joy.id !== -1) {
    ctx.globalAlpha = 0.35;
    ctx.strokeStyle = "#5ee6ff";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(joy.bx, joy.by, 52 * u, 0, TAU); ctx.stroke();
    ctx.fillStyle = "#5ee6ff";
    ctx.beginPath(); ctx.arc(joy.bx + joy.dx * 52 * u, joy.by + joy.dy * 52 * u, 20 * u, 0, TAU); ctx.fill();
  }
  // buttons
  const db = dashBtnPos(), bb = boltBtnPos();
  ctx.globalAlpha = 0.4;
  ctx.fillStyle = "rgba(94,230,255,0.16)";
  ctx.strokeStyle = "#5ee6ff"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(db.x, db.y, db.r, 0, TAU); ctx.fill(); ctx.stroke();
  ctx.fillStyle = "rgba(255,102,238,0.16)";
  ctx.strokeStyle = "#ff66ee";
  ctx.beginPath(); ctx.arc(bb.x, bb.y, bb.r, 0, TAU); ctx.fill(); ctx.stroke();
  ctx.globalAlpha = 0.85;
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  ctx.font = "bold " + 13 * u + "px 'Courier New', monospace";
  ctx.fillStyle = "#5ee6ff";
  ctx.fillText("DASH", db.x, db.y);
  ctx.fillStyle = "#ff66ee";
  ctx.fillText("BOLT", bb.x, bb.y);
  ctx.restore();
}

function dimScreen(a) {
  ctx.fillStyle = "rgba(3,3,14," + a + ")";
  ctx.fillRect(0, 0, cw, ch);
}

function drawTitle() {
  dimScreen(0.55);
  const u = us();
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  const t = timeNow;
  // animated title glyph
  glow("#5ee6ff", 30);
  ctx.fillStyle = "#5ee6ff";
  ctx.font = "bold " + 52 * u + "px 'Courier New', monospace";
  ctx.fillText("ABYSS", cw / 2, ch * 0.3);
  glow("#ff66ee", 30);
  ctx.fillStyle = "#ff66ee";
  ctx.fillText("PROTOCOL", cw / 2, ch * 0.3 + 56 * u);
  noglow();
  ctx.fillStyle = "rgba(170,200,255,0.75)";
  ctx.font = 14 * u + "px 'Courier New', monospace";
  ctx.fillText("a lone android climbs from the depths of a dead station", cw / 2, ch * 0.3 + 104 * u);
  if (Math.floor(t * 1.6) % 2 === 0) {
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold " + 18 * u + "px 'Courier New', monospace";
    glow("#5ee6ff", 12);
    ctx.fillText(touchUI ? "TAP TO START" : "PRESS ANY KEY TO START", cw / 2, ch * 0.62);
    noglow();
  }
  ctx.fillStyle = "rgba(255,204,68,0.9)";
  ctx.font = 13 * u + "px 'Courier New', monospace";
  if (best > 0) ctx.fillText("BEST DEPTH: " + best + "   ◆ " + cores + " cores", cw / 2, ch * 0.7);
  // HOW TO PLAY / 操作说明 — device-aware bilingual panel
  ctx.font = 12 * u + "px 'Courier New', monospace";
  const help = touchUI ? [
    "HOW TO PLAY / 操作说明",
    "目标：清理房间，选择奖励之门与祝福 — clear rooms, pick reward doors & boons",
    "左半屏虚拟摇杆移动 — left-half joystick to move",
    "点按右半屏挥砍（自动瞄准） — tap right half to slash (auto-aim)",
    "DASH 冲刺（无敌帧）· BOLT 等离子弹 — dash (i-frames) · plasma bolt",
    "死亡即成长：在枢纽终端消费核心 — death is progress: spend cores at the hub",
  ] : [
    "HOW TO PLAY / 操作说明",
    "目标：清理房间，选择奖励之门与祝福 — clear rooms, pick reward doors & boons",
    "WASD/方向键移动 · 鼠标瞄准 — WASD/arrows move · mouse aim",
    "左键挥砍 · 右键/Shift/E 等离子弹（耗能量） — LMB slash · RMB/Shift/E bolt (energy)",
    "空格冲刺（无敌帧） — Space dash with i-frames",
    "死亡即成长：在枢纽终端消费核心 — death is progress: spend cores at the hub",
    "P/Esc 暂停 · M 静音 — pause / mute",
  ];
  let hy = ch * 0.73;
  for (let i = 0; i < help.length; i++) {
    ctx.fillStyle = i === 0 ? "rgba(94,230,255,0.6)" : "rgba(190,190,230,0.75)";
    ctx.fillText(help[i], cw / 2, hy);
    hy += 17 * u;
  }
}

function drawSummary() {
  dimScreen(0.7);
  const u = us();
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  glow("#ff3366", 24);
  ctx.fillStyle = "#ff3366";
  ctx.font = "bold " + 40 * u + "px 'Courier New', monospace";
  ctx.fillText("UNIT TERMINATED", cw / 2, ch * 0.26);
  noglow();
  ctx.font = 16 * u + "px 'Courier New', monospace";
  const rows = [
    ["DEPTH REACHED", String(depth)],
    ["ROOMS CLEARED", String(roomsCleared)],
    ["KILLS", String(kills)],
    ["CORES EARNED", "◆ " + runCores],
  ];
  let y = ch * 0.4;
  for (const r of rows) {
    ctx.fillStyle = "rgba(170,200,255,0.8)";
    ctx.textAlign = "right";
    ctx.fillText(r[0], cw / 2 - 14, y);
    ctx.fillStyle = "#ffcc44";
    ctx.textAlign = "left";
    ctx.fillText(r[1], cw / 2 + 14, y);
    y += 28 * u;
  }
  if (depth >= best && depth > 0) {
    ctx.textAlign = "center";
    ctx.fillStyle = "#5ee6ff";
    glow("#5ee6ff", 10);
    ctx.fillText("★ NEW BEST DEPTH ★", cw / 2, y + 8 * u);
    noglow();
  }
  if (Math.floor(timeNow * 1.6) % 2 === 0) {
    ctx.textAlign = "center";
    ctx.fillStyle = "#ffffff";
    ctx.font = "bold " + 16 * u + "px 'Courier New', monospace";
    ctx.fillText(touchUI ? "TAP TO RETURN TO HUB" : "PRESS ANY KEY — RETURN TO HUB", cw / 2, ch * 0.78);
  }
}

function drawBoonScreen() {
  dimScreen(0.66);
  uiRects = [];
  const u = us();
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  glow("#5ee6ff", 16);
  ctx.fillStyle = "#5ee6ff";
  ctx.font = "bold " + 26 * u + "px 'Courier New', monospace";
  ctx.fillText("SELECT PROTOCOL UPGRADE", cw / 2, ch * 0.16);
  noglow();
  const n = boonChoices.length;
  const cwid = Math.min(230 * u, (cw - 60) / n - 14);
  const chei = 200 * u;
  const total = n * cwid + (n - 1) * 18;
  let x = (cw - total) / 2;
  const y = ch * 0.5 - chei / 2;
  for (let i = 0; i < n; i++) {
    const b = boonChoices[i];
    const lv = boonLv(b.id);
    const hover = mouse.x >= x && mouse.x <= x + cwid && mouse.y >= y && mouse.y <= y + chei;
    ctx.save();
    glow(b.col, hover ? 24 : 12);
    ctx.fillStyle = "rgba(10,12,34,0.95)";
    rrect(x, y, cwid, chei, 10); ctx.fill();
    ctx.strokeStyle = b.col;
    ctx.lineWidth = hover ? 3 : 2;
    rrect(x, y, cwid, chei, 10); ctx.stroke();
    noglow();
    ctx.fillStyle = b.col;
    ctx.font = "bold " + 34 * u + "px 'Courier New', monospace";
    ctx.fillText(b.glyph, x + cwid / 2, y + 44 * u);
    ctx.font = "bold " + 14 * u + "px 'Courier New', monospace";
    ctx.fillText(b.name, x + cwid / 2, y + 84 * u);
    if (lv > 0) {
      ctx.fillStyle = "rgba(255,255,255,0.65)";
      ctx.font = 11 * u + "px 'Courier New', monospace";
      ctx.fillText("(rank " + (lv + 1) + ")", x + cwid / 2, y + 102 * u);
    }
    // wrap desc
    ctx.fillStyle = "rgba(190,210,255,0.85)";
    ctx.font = 12 * u + "px 'Courier New', monospace";
    const words = b.desc.split(" ");
    let line = "", ly = y + 126 * u;
    for (const w of words) {
      const test = line ? line + " " + w : w;
      if (ctx.measureText(test).width > cwid - 24 && line) {
        ctx.fillText(line, x + cwid / 2, ly); ly += 16 * u; line = w;
      } else line = test;
    }
    if (line) ctx.fillText(line, x + cwid / 2, ly);
    ctx.fillStyle = "rgba(255,255,255,0.45)";
    ctx.font = 11 * u + "px 'Courier New', monospace";
    ctx.fillText(touchUI ? "tap" : "[" + (i + 1) + "]", x + cwid / 2, y + chei - 18 * u);
    ctx.restore();
    uiRects.push({ x, y, w: cwid, h: chei, act: "boon", i });
    x += cwid + 18;
  }
}

function drawShopScreen() {
  dimScreen(0.66);
  uiRects = [];
  const u = us();
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  glow("#ffcc44", 16);
  ctx.fillStyle = "#ffcc44";
  ctx.font = "bold " + 24 * u + "px 'Courier New', monospace";
  ctx.fillText("MIRROR CORE — PERMANENT UPGRADES", cw / 2, ch * 0.13);
  noglow();
  ctx.fillStyle = "#ffcc44";
  ctx.font = "bold " + 15 * u + "px 'Courier New', monospace";
  ctx.fillText("◆ " + cores + " cores", cw / 2, ch * 0.13 + 28 * u);
  const w = Math.min(560 * u, cw - 40);
  const rh = 64 * u;
  let y = ch * 0.26;
  for (let i = 0; i < META_UPGRADES.length; i++) {
    const m = META_UPGRADES[i];
    const lv = meta[m.id] || 0;
    const maxed = lv >= m.max;
    const cost = maxed ? 0 : m.cost(lv);
    const afford = !maxed && cores >= cost;
    const x = (cw - w) / 2;
    const hover = mouse.x >= x && mouse.x <= x + w && mouse.y >= y && mouse.y <= y + rh;
    ctx.save();
    glow(afford ? "#ffcc44" : "#445", hover && !maxed ? 18 : 8);
    ctx.fillStyle = "rgba(10,12,34,0.95)";
    rrect(x, y, w, rh, 8); ctx.fill();
    ctx.strokeStyle = maxed ? "rgba(110,255,170,0.7)" : afford ? "#ffcc44" : "rgba(120,130,180,0.45)";
    ctx.lineWidth = 2;
    rrect(x, y, w, rh, 8); ctx.stroke();
    noglow();
    ctx.textAlign = "left";
    ctx.fillStyle = "#fff";
    ctx.font = "bold " + 14 * u + "px 'Courier New', monospace";
    ctx.fillText("[" + (i + 1) + "] " + m.name, x + 14, y + rh * 0.32);
    ctx.fillStyle = "rgba(190,210,255,0.75)";
    ctx.font = 12 * u + "px 'Courier New', monospace";
    ctx.fillText(m.desc, x + 14, y + rh * 0.68);
    // pips
    ctx.textAlign = "right";
    for (let pp = 0; pp < m.max; pp++) {
      ctx.fillStyle = pp < lv ? "#66ff99" : "rgba(255,255,255,0.15)";
      ctx.fillRect(x + w - 120 * u + pp * 12 * u, y + rh * 0.25 - 4, 8 * u, 8 * u);
    }
    ctx.fillStyle = maxed ? "#66ff99" : afford ? "#ffcc44" : "#888";
    ctx.font = "bold " + 13 * u + "px 'Courier New', monospace";
    ctx.fillText(maxed ? "MAX" : "◆ " + cost, x + w - 14, y + rh * 0.68);
    ctx.restore();
    uiRects.push({ x, y, w, h: rh, act: "meta", i });
    y += rh + 12 * u;
  }
  ctx.textAlign = "center";
  ctx.fillStyle = "rgba(255,255,255,0.6)";
  ctx.font = 13 * u + "px 'Courier New', monospace";
  const cy = y + 10 * u;
  ctx.fillText(touchUI ? "tap here to close" : "[E] or [Esc] to close", cw / 2, cy);
  uiRects.push({ x: cw / 2 - 140, y: cy - 18, w: 280, h: 36, act: "close" });
}

function drawPause() {
  dimScreen(0.55);
  const u = us();
  ctx.textAlign = "center"; ctx.textBaseline = "middle";
  glow("#5ee6ff", 18);
  ctx.fillStyle = "#5ee6ff";
  ctx.font = "bold " + 34 * u + "px 'Courier New', monospace";
  ctx.fillText("PAUSED", cw / 2, ch * 0.42);
  noglow();
  ctx.fillStyle = "rgba(190,210,255,0.7)";
  ctx.font = 14 * u + "px 'Courier New', monospace";
  ctx.fillText(touchUI ? "点按继续 — tap to resume" : "P/Esc/点击 继续 · M 静音 — P / Esc / click to resume · M mute", cw / 2, ch * 0.52);
}

function uiClick(x, y) {
  for (const r of uiRects) {
    if (x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h) {
      if (r.act === "boon") { pickBoon(r.i); return; }
      if (r.act === "meta") { buyMeta(META_UPGRADES[r.i]); return; }
      if (r.act === "close") { closeShop(); return; }
    }
  }
}

/* ---------------- §U RENDER: MAIN ---------------- */
function render() {
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  computeView();
  // bg
  ctx.fillStyle = "#050514";
  ctx.fillRect(0, 0, cw, ch);
  // dim starfield specks behind arena
  ctx.fillStyle = "rgba(120,140,255,0.08)";
  for (let i = 0; i < 40; i++) {
    const sx = (i * 199.7 + 50) % cw;
    const sy = (i * 137.3 + ((timeNow * (4 + i % 5)) % ch)) % ch;
    ctx.fillRect(sx, sy, 2, 2);
  }

  // world
  let sx2 = 0, sy2 = 0;
  if (shakeT > 0) {
    sx2 = rand(-shakeA, shakeA); sy2 = rand(-shakeA, shakeA);
  }
  ctx.save();
  ctx.translate(aOX + sx2, aOY + sy2);
  ctx.scale(aS, aS);
  drawArenaFloor();
  drawZonesAndPickups();
  if (state === "hub" || (state === "shop")) drawHubObjects();
  if (roomClear) drawDoors();
  drawPillars();
  drawSpawnTelegraphs();
  for (const e of enemies) drawEnemy(e);
  drawPlayer();
  drawBolts();
  drawBeamsParts();
  drawDnums();
  ctx.restore();

  // vignette
  if (!vigGrad) {
    vigGrad = ctx.createRadialGradient(cw / 2, ch / 2, Math.min(cw, ch) * 0.36, cw / 2, ch / 2, Math.max(cw, ch) * 0.72);
    vigGrad.addColorStop(0, "rgba(0,0,0,0)");
    vigGrad.addColorStop(1, "rgba(2,2,10,0.72)");
  }
  ctx.fillStyle = vigGrad;
  ctx.fillRect(0, 0, cw, ch);

  // red hurt flash
  if (redFlash > 0) {
    ctx.fillStyle = "rgba(255,30,60," + redFlash * 0.4 + ")";
    ctx.fillRect(0, 0, cw, ch);
  }
  // room fade
  if (roomFade > 0) {
    ctx.fillStyle = "rgba(3,3,14," + roomFade + ")";
    ctx.fillRect(0, 0, cw, ch);
  }

  if (state === "play" || state === "hub") {
    drawHUD();
    drawTouchControls();
    if (paused) drawPause();
  } else if (state === "title") {
    drawTitle();
  } else if (state === "summary") {
    drawHUD();
    drawSummary();
  } else if (state === "boon") {
    drawHUD();
    drawBoonScreen();
  } else if (state === "shop") {
    drawHUD();
    drawShopScreen();
  }

  // mute hint
  if (audio.muted) {
    ctx.textAlign = "right"; ctx.textBaseline = "alphabetic";
    ctx.fillStyle = "rgba(255,255,255,0.35)";
    ctx.font = "11px 'Courier New', monospace";
    ctx.fillText("MUTED [M]", cw - 10, ch - 10);
  }

  arcadeLink.style.display = (state === "title" || state === "summary") ? "block" : "none";
}

/* ---------------- §V MAIN LOOP ---------------- */
let lastT = performance.now(), acc = 0;
function loop(now) {
  requestAnimationFrame(loop);
  let dt = (now - lastT) / 1000;
  lastT = now;
  if (dt > 0.2) dt = 0.2;
  if (!paused) {
    acc += dt;
    const S = CONFIG.step;
    let guard = 0;
    while (acc >= S && guard++ < 40) {
      step(S);
      acc -= S;
    }
  }
  render();
}
requestAnimationFrame(loop);
</script>
