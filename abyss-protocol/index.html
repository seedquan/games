<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
<title>ABYSS PROTOCOL</title>
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #050514; overflow: hidden;
    touch-action: none; -webkit-user-select: none; user-select: none;
    overscroll-behavior: none;
  }
  canvas { display: block; touch-action: none; }
  #arcade {
    position: fixed; top: 12px; left: 14px; z-index: 10;
    font: 14px "Courier New", monospace; letter-spacing: 1px;
    color: #5ee6ff; opacity: 0.45; text-decoration: none;
    text-shadow: 0 0 8px rgba(94,230,255,0.6);
    transition: opacity 0.2s;
  }
  #arcade:hover { opacity: 0.9; }
  #fsbtn {
    position: fixed; top: 12px; right: 14px; z-index: 10;
    font: 14px "Courier New", monospace; letter-spacing: 1px;
    color: #5ee6ff; opacity: 0.45; text-decoration: none;
    text-shadow: 0 0 8px rgba(94,230,255,0.6);
    background: none; border: none; cursor: pointer; padding: 0;
    transition: opacity 0.2s; display: none;
  }
  #fsbtn:hover { opacity: 0.9; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<a id="arcade" href="../">&larr; Arcade</a>
<button id="fsbtn" type="button" aria-label="Toggle fullscreen">FULLSCREEN ⛶</button>
<script>
"use strict";

/* ============================================================
   ABYSS PROTOCOL — a top-down action roguelike.
   A lone android fights up from the depths of a derelict
   neon space station, room by room, boon by boon.

   Single file, zero dependencies, all art & audio procedural.

   Controls: WASD / arrows move, mouse aims.
             J / Left click / tap  = melee slash
             Right Ctrl / Right click / Shift / E = plasma bolt (energy)
             K (or Q) = freeze nova (ice skill, 12s CD)
             Space = dash (i-frames)
             P or Esc = pause, M = mute, F = fullscreen toggle.
             (Auto-fullscreen on the first start gesture, persisted & toggleable
             in the pause menu; a ⛶ button sits top-right on title/pause.)
             Keyboard-only: if the mouse hasn't moved for ~1.5s,
             slashes/bolts auto-aim at the nearest enemy.
   Touch:    left half joystick, tap right half = slash,
             on-screen DASH / BOLT / FREEZE buttons.
   Gamepad:  (PS4/PS5/Xbox standard mapping, navigator.getGamepads)
             left stick move · right stick aim/fire dir (overrides auto-aim)
             □ slash · R2 (or R1) bolt · × dash · △ (or L1) freeze
             d-pad/left stick navigate menus · × confirm · ○ cancel
             Options/Start = pause/start.  ~0.22 radial deadzone.
   Co-op:    title/pause 1P/2P (单人/双人).  P1 = keyboard+mouse or pad1;
             P2 = pad2 (if present) else keyboard (arrows move · . slash ·
             / bolt · Enter dash · , freeze, auto-aim).  Shared cores & run
             progress; each player has own HP/energy/dash/weapon and picks
             their own boon.  HP=0 = DOWNED; a partner revives by standing
             close ~3s; both down = game over.  Style meter shared.
   Hub ARMORY rack: 18 weapon forms (BLADE / LANCE / MAUL /
             TWIN FANG / ARC CASTER / GRAVITON MACE /
             GLAIVE / CHAIN WHIP / PRISM SABER /
             EMBER STAFF / FROST WAND / STORM STAFF /
             AUTO-RIFLE / SCATTERGUN / RAILGUN /
             QUICK BOW / LONGBOW / STORMBOW).
             EMBER/FROST/STORM are MAGIC WAND/STAFF casters: the slash
             key/button CASTS a ranged/area spell (own cast cadence)
             instead of a melee swing. AUTO-RIFLE/SCATTERGUN/RAILGUN are
             BALLISTIC FIREARMS: the slash key/button FIRES the gun in the
             aim direction (own fire cadence, pooled bullets). QUICK BOW/
             LONGBOW/STORMBOW are ARCHERY bows: the slash key/button NOCKS &
             LOOSES pooled physical ARROWS (the LONGBOW is chargeable — hold
             to draw, release to loose a piercing line shot) — all distinct
             from the casters, guns and the shared plasma BOLT ability.
   元素附魔 / ENCHANTS: melee ("冷兵器") forms can carry MULTIPLE stacking
             elemental enchants at once (fire/ice/electric/poison/lifesteal/
             execute), each firing on hit. Gathered via the universal
             ELEMENTAL ENCHANT boon line (stacks, rarity raises potency) or
             the shop RUNE FORGE. Per-player in co-op. Stacked elements feed
             the SHATTER / THERMAL combos plus a POISON COMBUST combo.
   Pause menu: EFFECTS toggle (F while paused) cycles bloom/scanlines/shake
             intensity (full / reduced / off), persisted; plus FULLSCREEN and
             AUTO-FULLSCREEN items (gamepad d-pad navigates, × confirms).
   ============================================================ */

/* ---------------- §B CONFIG ---------------- */
const CONFIG = Object.freeze({
  arenaW: 960, arenaH: 600,     // logical arena size
  wall: 14,                     // wall inset
  playerR: 13,
  playerSpeed: 252,
  playerAccel: 2400,
  playerHP: 100,                // base, before meta
  energyMax: 100,
  energyRegen: 17,
  boltCost: 26,
  boltSpeed: 560,
  boltDmg: 11,
  meleeDmg: 14,
  meleeRange: 76,
  meleeArc: 1.8,                // radians
  meleeCD: 0.30,
  slashDur: 0.25,
  dashSpeed: 760,
  dashDur: 0.22,
  dashIfr: 0.27,
  dashCD: 0.95,
  hurtIfr: 0.75,
  freezeCD: 12,                 // freeze nova cooldown (s)
  freezeDur: 2.5,               // freeze duration on normals
  freezeBossDur: 1.2,           // freeze duration on bosses
  freezeR: 240,                 // freeze nova radius
  hitStop: 0.045,               // s frozen on melee hit
  killStop: 0.075,
  bossEvery: 6,
  maxParticles: 520,
  step: 1 / 120,                // fixed physics timestep
  challengeTime: 45,            // challenge room gauntlet timer (s)
  burnDur: 4,                   // burn DoT duration (s), halved on bosses
  shockStun: 0.7,               // shock stun (s), reduced on bosses
  poisonDur: 6,                 // poison DoT duration (s) — lingers longer than burn; reduced on bosses
  poisonMaxStacks: 6,           // poison stack cap (ramps with stacks, then clamps)
});

/* ---------------- §C UTIL ---------------- */
const TAU = Math.PI * 2;
const rand = (a, b) => a + Math.random() * (b - a);
const randi = (a, b) => Math.floor(rand(a, b + 1));
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;
const lerp = (a, b, t) => a + (b - a) * t;
const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);
const angTo = (x1, y1, x2, y2) => Math.atan2(y2 - y1, x2 - x1);
const angDiff = (a, b) => {
  let d = (b - a) % TAU;
  if (d > Math.PI) d -= TAU;
  if (d < -Math.PI) d += TAU;
  return d;
};
const pick = (arr) => arr[Math.floor(Math.random() * arr.length)];

const store = {
  get(k) { try { return localStorage.getItem("abyssprotocol." + k); } catch (e) { return this._m && this._m[k]; } },
  set(k, v) { try { localStorage.setItem("abyssprotocol." + k, v); } catch (e) { (this._m = this._m || {})[k] = v; } },
};

/* ---------------- canvas / view ---------------- */
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
const arcadeLink = document.getElementById("arcade");
let cw = 0, ch = 0, dpr = 1;
let aS = 1, aOX = 0, aOY = 0;   // arena scale & offset (screen px)
let vigGrad = null, lowHpGrad = null;

function resize() {
  dpr = Math.min(2, window.devicePixelRatio || 1);
  cw = window.innerWidth; ch = window.innerHeight;
  canvas.width = Math.round(cw * dpr);
  canvas.height = Math.round(ch * dpr);
  canvas.style.width = cw + "px";
  canvas.style.height = ch + "px";
  computeView();
  vigGrad = null;
  lowHpGrad = null;
}
function computeView() {
  const A = CONFIG;
  // Reserve screen-anchored HUD insets (scaled by the UI scale us()), then fit the
  // fixed-size arena into the remaining space and let it scale UP on large displays.
  // The whole arena is always drawn (camera never tracks a sub-region), so fitting the
  // full room here guarantees both players + room bounds stay in frame at any zoom.
  // UI scale (mirrors us()); inlined so computeView is safe to call during early init.
  const u = clamp(Math.min(cw, ch) / 640, 0.72, 1.25);
  const topHud = 46 * u;          // boss bar + depth/cores readout clearance
  const botHud = 78 * u;          // player HP/energy/dash/boon block (P1 left / P2 right)
  const sideMargin = 16;          // small breathing room at the screen edges
  // 2P spreads players wider, so give it a touch more vertical clearance for the
  // mirrored bars but it shares the same fit logic (one screen, whole arena visible).
  const availW = Math.max(80, cw - sideMargin * 2);
  const availH = Math.max(80, ch - topHud - botHud);
  let fit = Math.min(availW / A.arenaW, availH / A.arenaH);
  // Fill the available real estate: raise the cap further so big/4K monitors in
  // fullscreen get a large arena. `fit` (whole 960x600 room into the HUD-inset band)
  // is always the limiter, so the full arena + both players stay on-screen; the cap
  // is only an upper bound to avoid pathological zoom. 2P is allowed slightly more.
  const maxZoom = nPlayersSafe() > 1 ? 4.0 : 3.8;
  aS = clamp(fit, 0.35, maxZoom);
  // Center the arena within the free band between the top and bottom HUD insets.
  aOX = (cw - A.arenaW * aS) / 2;
  aOY = topHud + (availH - A.arenaH * aS) / 2;
}
// Reads numPlayers if initialized; returns 1 during early module init (TDZ-safe).
function nPlayersSafe() { try { return numPlayers; } catch (e) { return 1; } }
window.addEventListener("resize", resize);
resize();

const s2wX = (sx) => (sx - aOX) / aS;
const s2wY = (sy) => (sy - aOY) / aS;
const w2sX = (wx) => wx * aS + aOX;
const w2sY = (wy) => wy * aS + aOY;
const us = () => clamp(Math.min(cw, ch) / 640, 0.72, 1.25);  // ui scale

/* ---------------- §C2 FULLSCREEN ----------------
   Browsers only grant requestFullscreen() from a user gesture, so we fire it from
   the title/pause start handlers (anyStart / startRun) and from the explicit toggle.
   Everything is feature-detected and wrapped so a denied/rejected request can never
   throw or break starting the game. A persisted "auto-fullscreen on start" pref
   (default ON) and a per-page-load session flag keep it non-annoying: if the user
   exits fullscreen we don't keep forcing them back. */
const FS = {
  // persisted preference; default ON unless explicitly disabled
  auto: store.get("autofs") !== "0",
  autoTried: false,   // only auto-request once per page load (reset if user re-enables)
};
function fsElement() {
  return document.fullscreenElement || document.webkitFullscreenElement || null;
}
function fsSupported() {
  const el = document.documentElement;
  return !!(el.requestFullscreen || el.webkitRequestFullscreen ||
            document.exitFullscreen || document.webkitExitFullscreen);
}
function isFullscreen() { return !!fsElement(); }
/* Request fullscreen on the document root; swallow rejections (may be denied). */
function requestFullscreen() {
  if (isFullscreen()) return;
  const el = document.documentElement;
  try {
    const fn = el.requestFullscreen || el.webkitRequestFullscreen;
    if (!fn) return;
    const r = fn.call(el);
    if (r && typeof r.catch === "function") r.catch(() => {});
  } catch (e) { /* fullscreen denied — never break the game */ }
}
function exitFullscreen() {
  try {
    const fn = document.exitFullscreen || document.webkitExitFullscreen;
    if (!fn) return;
    const r = fn.call(document);
    if (r && typeof r.catch === "function") r.catch(() => {});
  } catch (e) { /* ignore */ }
}
/* explicit user toggle (key / button / pause-menu item): exit if in, else enter */
function toggleFullscreen() {
  if (isFullscreen()) { exitFullscreen(); }
  else { FS.autoTried = true; requestFullscreen(); }
}
/* auto-request on the start gesture, honoring the persisted pref + session flag */
function autoRequestFullscreen() {
  if (!FS.auto) return;               // user turned it off
  if (FS.autoTried) return;           // only once per page load (until re-enabled)
  if (isFullscreen()) return;
  FS.autoTried = true;
  requestFullscreen();
}
function setAutoFullscreen(on) {
  FS.auto = !!on;
  store.set("autofs", FS.auto ? "1" : "0");
  if (FS.auto) FS.autoTried = false;  // re-enabling lets the next start re-request
}
// On entering/exiting fullscreen the viewport size changes — re-fit canvas + view.
function onFullscreenChange() { resize(); }
document.addEventListener("fullscreenchange", onFullscreenChange);
document.addEventListener("webkitfullscreenchange", onFullscreenChange);

/* subtle on-screen fullscreen button (title / pause), styled like the Arcade link */
const fsBtn = document.getElementById("fsbtn");
function updateFsBtn() {
  if (!fsBtn) return;
  fsBtn.style.display = (state === "title" || state === "summary" || paused) ? "block" : "none";
  fsBtn.textContent = isFullscreen() ? "EXIT FULL ⛶" : "FULLSCREEN ⛶";
}
if (fsBtn) {
  const fsClick = (e) => { e.preventDefault(); e.stopPropagation(); toggleFullscreen(); updateFsBtn(); };
  fsBtn.addEventListener("click", fsClick);
  fsBtn.addEventListener("touchstart", fsClick, { passive: false });
}

/* ---------------- §D AUDIO ---------------- */
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.muted = store.get("muted") === "1";
    // adaptive layers: JS-side smoothed levels (applied to gain nodes when ctx exists)
    this.intensity = 0; this.intensityCur = 0;   // combat arp/perc layer
    this.heartbeat = 0; this.heartbeatCur = 0;   // low-HP heartbeat pulse
  }
  unlock() {
    if (!this.ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      const c = this.ctx = new AC();
      this.master = c.createGain();
      this.master.gain.value = this.muted ? 0 : 1;
      const comp = c.createDynamicsCompressor();
      this.master.connect(comp);
      comp.connect(c.destination);
      // fake reverb: feedback delay
      this.send = c.createGain(); this.send.gain.value = 0.55;
      const delay = c.createDelay(1); delay.delayTime.value = 0.31;
      const fb = c.createGain(); fb.gain.value = 0.36;
      const damp = c.createBiquadFilter(); damp.type = "lowpass"; damp.frequency.value = 2400;
      this.send.connect(delay); delay.connect(damp); damp.connect(fb); fb.connect(delay);
      delay.connect(this.master);
      // 1s noise buffer for SFX
      const buf = c.createBuffer(1, c.sampleRate, c.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
      this.noiseBuf = buf;
      // adaptive music buses: combat intensity layer + low-HP heartbeat
      this.intGain = c.createGain(); this.intGain.gain.value = 0;
      this.intGain.connect(this.master);
      this.hbGain = c.createGain(); this.hbGain.gain.value = 0;
      this.hbGain.connect(this.master);
      this._nextHb = 0;
      this.startMusic();
    }
    if (this.ctx.state !== "running") this.ctx.resume();
  }
  toggleMute() {
    this.muted = !this.muted;
    store.set("muted", this.muted ? "1" : "0");
    if (this.master) this.master.gain.value = this.muted ? 0 : 1;
  }
  ok() { return this.ctx && this.ctx.state === "running" && !this.muted; }
  tone(type, f0, f1, t0, dur, vol, wet, dest) {
    const c = this.ctx, o = c.createOscillator(), g = c.createGain();
    o.type = type;
    o.frequency.setValueAtTime(Math.max(1, f0), t0);
    if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t0 + dur);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(vol, t0 + 0.015);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    o.connect(g); g.connect(dest || this.master);
    if (wet) g.connect(this.send);
    o.start(t0); o.stop(t0 + dur + 0.05);
  }
  noise(t0, dur, vol, filterType, f0, f1, dest) {
    const c = this.ctx, src = c.createBufferSource(), g = c.createGain();
    src.buffer = this.noiseBuf; src.loop = true;
    const fl = c.createBiquadFilter();
    fl.type = filterType;
    fl.frequency.setValueAtTime(f0, t0);
    if (f1) fl.frequency.exponentialRampToValueAtTime(Math.max(20, f1), t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(fl); fl.connect(g); g.connect(dest || this.master);
    src.start(t0); src.stop(t0 + dur + 0.05);
  }
  /* adaptive layer targets; intensity ramps over ~1.5s, heartbeat a bit faster */
  updateDynamics(dt, inCombat, lowHP) {
    this.intensity = inCombat ? 1 : 0;
    this.heartbeat = lowHP ? 1 : 0;
    const iStep = dt / 1.5, hStep = dt / 0.6;
    this.intensityCur += clamp(this.intensity - this.intensityCur, -iStep, iStep);
    this.heartbeatCur += clamp(this.heartbeat - this.heartbeatCur, -hStep, hStep);
    if (this.intGain) this.intGain.gain.value = this.intensityCur;
    if (this.hbGain) this.hbGain.gain.value = this.heartbeatCur;
  }
  pad(freqs, t0, dur, vol) {
    const c = this.ctx;
    for (const f of freqs) {
      for (const det of [-3, 3]) {
        const o = c.createOscillator(), g = c.createGain();
        o.type = "triangle";
        o.frequency.value = f; o.detune.value = det;
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(vol, t0 + dur * 0.35);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
        o.connect(g); g.connect(this.master); g.connect(this.send);
        o.start(t0); o.stop(t0 + dur + 0.05);
      }
    }
  }
  /* ----- SFX ----- */
  slash(kind) {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    if (kind === "lance") {
      this.noise(t, 0.12, 0.14, "bandpass", 3400, 900);
      this.tone("sawtooth", 760, 240, t, 0.1, 0.06, false);
    } else if (kind === "maul") {
      this.noise(t, 0.2, 0.18, "lowpass", 1800, 300);
      this.tone("sawtooth", 240, 80, t, 0.16, 0.1, false);
    } else if (kind === "whip") {
      // chain whip: a long thin crack — rising whistle then a sharp snap
      this.noise(t, 0.16, 0.1, "bandpass", 1400, 3600);
      this.tone("sawtooth", 300, 1100, t, 0.07, 0.05, false);
      this.noise(t + 0.08, 0.05, 0.14, "highpass", 5000, 8000);
    } else if (kind === "prism") {
      // prism saber: crystalline slash with a bright harmonic shimmer
      this.noise(t, 0.1, 0.12, "bandpass", 3000, 1400);
      this.tone("square", 880, 1760, t, 0.08, 0.05, true);
      this.tone("sine", 1320, 1320, t + 0.02, 0.09, 0.04, true);
    } else {
      this.noise(t, 0.13, 0.16, "bandpass", 2600, 700);
      this.tone("sawtooth", 520, 180, t, 0.09, 0.07, false);
    }
  }
  glaiveThrow() { // spinning blade hurled — whirring metal
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.noise(t, 0.14, 0.12, "bandpass", 2200, 1200);
    this.tone("sawtooth", 420, 720, t, 0.12, 0.05, false);
  }
  glaiveCatch() { // blade returns to hand — short metallic chink
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("square", 1400, 700, t, 0.05, 0.05, true);
    this.noise(t, 0.05, 0.08, "highpass", 5000, 6000);
  }
  prismBeam() { // forward energy lance — bright ascending zap
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("sawtooth", 700, 1900, t, 0.1, 0.06, true);
    this.tone("sine", 1600, 2400, t, 0.08, 0.04, true);
    this.noise(t, 0.08, 0.06, "highpass", 4000, 7000);
  }
  weaponSwap() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.noise(t, 0.12, 0.12, "bandpass", 1800, 600);
    this.tone("square", 330, 330, t, 0.07, 0.08, false);
    this.tone("square", 495, 495, t + 0.08, 0.09, 0.07, true);
  }
  maulSlam() {
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.noise(t, 0.3, 0.2, "lowpass", 1600, 100);
    this.tone("sine", 95, 40, t, 0.3, 0.16, true);
  }
  fangFlurry() { // twin fang rapid multi-slash zip
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    for (let i = 0; i < 3; i++) {
      this.noise(t + i * 0.035, 0.06, 0.09, "bandpass", 3200 + i * 400, 900);
    }
    this.tone("sawtooth", 720, 1500, t, 0.1, 0.05, false);
  }
  arcZap() { // arc caster chain crackle
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("sawtooth", 1300, 380, t, 0.1, 0.07, true);
    this.noise(t, 0.1, 0.07, "highpass", 4000, 7000);
    this.tone("square", 900, 1700, t + 0.03, 0.07, 0.04, false);
  }
  gravCast() { // graviton mace swing — descending whoomp
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("sine", 220, 60, t, 0.28, 0.14, true);
    this.noise(t, 0.24, 0.1, "lowpass", 900, 200);
  }
  emberCast(big) { // EMBER STAFF fireball launch — airy whoosh + low fwoomp
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.noise(t, big ? 0.2 : 0.14, 0.12, "bandpass", 900, 240);
    this.tone("sawtooth", big ? 200 : 260, big ? 90 : 120, t, 0.16, 0.08, true);
    if (big) this.tone("sine", 140, 60, t, 0.22, 0.1, true);
  }
  emberBlast(big) { // EMBER fireball impact — bursting boom
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.noise(t, big ? 0.4 : 0.26, big ? 0.24 : 0.18, "lowpass", 2600, 110);
    this.tone("sawtooth", big ? 150 : 200, 45, t, big ? 0.32 : 0.22, 0.14, true);
    this.noise(t, 0.1, 0.12, "bandpass", 1800, 600);
  }
  frostCast() { // FROST WAND icebolt — sharp glassy zip
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("triangle", 1400, 2200, t, 0.1, 0.06, true);
    this.tone("sine", 2100, 2600, t, 0.07, 0.04, true);
    this.noise(t, 0.07, 0.07, "highpass", 4000, 8000);
  }
  stormCast() { // STORM STAFF lightning — bright crackling discharge
    if (!this.ok()) return;
    const t = this.ctx.currentTime;
    this.tone("sawtooth", 1700, 420, t, 0.11, 0.07, true);
    this.tone("square", 1100, 2000, t + 0.02, 0.08, 0.05, false);
    this.noise(t, 0.12, 0.09, "highpass", 3800, 7500);
  }
  gravImplode() { // singularity collapse — sub thump + inrush
    if (!this.ok()) return;
    const t = this.ctx.currentTime;

  /* dark ambient loop: low minor pads + sub pulse + sparse blips */
  startMusic() {
    const c = this.ctx;
    const chords = [
      [55, 110, 130.81, 164.81],   // Am (A1 A2 C3 E3)
      [43.65, 87.31, 130.81, 174.61], // F (F1 F2 C3 F3)
      [49, 98, 146.83, 196],       // G
      [41.2, 82.41, 123.47, 164.81], // E low-ish
    ];
    const blips = [440, 523.25, 587.33, 659.25, 880];
    const BAR = 4.8;
    let nextBar = c.currentTime + 0.2, bar = 0;
    const self = this;
    this._musicTimer = setInterval(() => {
      while (nextBar < c.currentTime + 1.4) {
        const t = nextBar;
        const ch2 = chords[bar % chords.length];
        self.pad(ch2, t, BAR * 1.15, 0.028);
        // sub pulse
        for (let b = 0; b < 4; b++) {
          self.tone("sine", ch2[0], ch2[0], t + b * (BAR / 4), 0.5, 0.05, false);
        }
        // sparse echo blip
        if (Math.random() < 0.65) {
          const f = pick(blips);
          self.tone("sine", f, f, t + rand(0, BAR * 0.7), 0.4, 0.035, true);
        }
        // metallic hiss texture
        if (Math.random() < 0.4) {
          self.noise(t + rand(0, BAR * 0.6), 1.6, 0.012, "bandpass", rand(1200, 3200), 600);
        }
        // combat intensity layer: arp + hats, only audible through intGain
        const arpN = [ch2[2] * 2, ch2[3] * 2, ch2[2] * 4, ch2[3] * 4, ch2[1] * 4, ch2[3] * 2];
        for (let b = 0; b < 12; b++) {
          const f = arpN[b % arpN.length];
          self.tone("square", f, f, t + b * (BAR / 12), 0.11, 0.045, false, self.intGain);
        }
        for (let b = 0; b < 16; b++) {
          self.noise(t + b * (BAR / 16), 0.04, b % 4 === 2 ? 0.085 : 0.04, "highpass", 6000, 7500, self.intGain);
        }
        nextBar += BAR; bar++;
      }
      // low-HP heartbeat: steady lub-dub through hbGain
      if (self._nextHb < c.currentTime) self._nextHb = c.currentTime + 0.05;
      while (self._nextHb < c.currentTime + 1.2) {
        const hbT = self._nextHb;
        self.tone("sine", 58, 40, hbT, 0.16, 0.5, false, self.hbGain);
        self.tone("sine", 52, 38, hbT + 0.19, 0.13, 0.38, false, self.hbGain);
        self._nextHb += 0.92;
      }
    }, 250);
  }

  if (n >= 1e4) return (n / 1e3).toFixed(n >= 1e5 ? 0 : 1).replace(/\.0$/, "") + "k";

let curWeapon = store.get("weapon") || "blade";
if (!WEAPONS.some((w) => w.id === curWeapon)) curWeapon = "blade";
function weaponDef() { return WEAPONS.find((w) => w.id === curWeapon) || WEAPONS[0]; }
function selectWeapon(id) {
  if (!WEAPONS.some((w) => w.id === id)) return;
  curWeapon = id;
  store.set("weapon", id);
}
function cycleWeapon() {
  const i = WEAPONS.findIndex((w) => w.id === curWeapon);
  selectWeapon(WEAPONS[(i + 1) % WEAPONS.length].id);
  const W = weaponDef();
  if (players[0]) players[0].weapon = curWeapon; // live-apply to hub P1
  toast((numPlayers > 1 ? "P1 " : "") + "WEAPON: " + W.name + " — " + W.zh, W.col);
  audio.weaponSwap();
}
/* P2's own armory selection (separate from P1; persisted as p2weapon) */
function cycleWeaponP2() {
  const i = WEAPONS.findIndex((w) => w.id === p2Weapon);
  p2Weapon = WEAPONS[(i + 1) % WEAPONS.length].id;
  store.set("p2weapon", p2Weapon);
  if (players[1]) players[1].weapon = p2Weapon;
  const W = WEAPONS.find((w) => w.id === p2Weapon) || WEAPONS[0];
  toast("P2 WEAPON: " + W.name + " — " + W.zh, W.col);
  audio.weaponSwap();
}

/* ---------------- §E4 LIFETIME STATS (existing saves start at zero) ---------------- */
let stats = { runs: 0, kills: 0, deepest: 0, cores: 0, boss: {}, weapon: {} };
try {
  const s = JSON.parse(store.get("stats") || "{}");
  if (s && typeof s === "object") {
    stats.runs = s.runs | 0; stats.kills = s.kills | 0;
    stats.deepest = s.deepest | 0; stats.cores = s.cores | 0;
    if (s.boss && typeof s.boss === "object") stats.boss = s.boss;
    if (s.weapon && typeof s.weapon === "object") stats.weapon = s.weapon;
  }
} catch (e) { /* fresh stats */ }
function saveStats() { store.set("stats", JSON.stringify(stats)); }
function favoriteWeapon() {
  let bestId = null, bestN = 0;
  for (const w of WEAPONS) {
    const n = stats.weapon[w.id] | 0;
    if (n > bestN) { bestN = n; bestId = w.id; }
  }
  return bestId;
}

/* Standard-mapping button indices (PS4/PS5/Xbox):
   0 = ×/A (dash), 1 = ○/B (cancel), 2 = □/X (slash), 3 = △/Y (freeze),
   4 = L1, 5 = R1, 6 = L2, 7 = R2 (bolt), 8 = Share/Back, 9 = Options/Start (pause),
   12-15 = D-pad up/down/left/right.
   Axes: 0,1 = left stick; 2,3 = right stick. */
const GP_DEADZONE = 0.22;
const GP = {
  connected: [false, false],         // per-slot connection flag
  // per-pad held + edge state for menu/action edge detection
  pads: [],                          // {b:[], bPrev:[], lx,ly,rx,ry}
  navCD: 0,                          // menu navigation repeat cooldown
};
function gpInit(i) {
  return { b: [], bPrev: [], lx: 0, ly: 0, rx: 0, ry: 0, active: false };
}
GP.pads[0] = gpInit(0); GP.pads[1] = gpInit(1);
function gpDead(v) { return Math.abs(v) < GP_DEADZONE ? 0 : v; }
/* radial deadzone on a stick pair, returns {x,y,mag} (mag scaled 0..1 past deadzone) */
function gpStick(x, y) {
  const m = Math.hypot(x, y);
  if (m < GP_DEADZONE) return { x: 0, y: 0, mag: 0 };
  const scaled = Math.min(1, (m - GP_DEADZONE) / (1 - GP_DEADZONE));
  return { x: x / m * scaled, y: y / m * scaled, mag: scaled };
}
function gpButton(pad, i) { return !!(pad && pad.b[i]); }
function gpPressed(pad, i) { return !!(pad && pad.b[i] && !pad.bPrev[i]); } // rising edge
function gpAnyPressed(pad) {
  if (!pad) return false;
  for (let i = 0; i < pad.b.length; i++) if (pad.b[i] && !pad.bPrev[i]) return true;
  return false;
}
let _gpToastT = 0;
window.addEventListener("gamepadconnected", (e) => {
  const idx = e.gamepad.index < 2 ? e.gamepad.index : 0;
  GP.connected[idx] = true;
  toast("手柄已连接 P" + (idx + 1) + " — Gamepad connected", "#5ee6ff");
  audio.unlock && audio.unlock();
});
window.addEventListener("gamepaddisconnected", (e) => {
  const idx = e.gamepad.index < 2 ? e.gamepad.index : 0;
  GP.connected[idx] = false;
  toast("手柄断开 P" + (idx + 1) + " — Gamepad disconnected", "#ff7755");

/* poll the Gamepad API once per render frame; updates GP.pads held/edge/stick state */
function pollGamepads() {
  const list = (navigator.getGamepads && navigator.getGamepads()) || [];
  for (let slot = 0; slot < 2; slot++) {
    const pad = GP.pads[slot];
    // shift current -> prev for edge detection
    pad.bPrev = pad.b;
    const g = list[slot];
    if (!g) { pad.b = []; pad.active = false; pad.lx = pad.ly = pad.rx = pad.ry = 0; GP.connected[slot] = false; continue; }
    GP.connected[slot] = true;
    pad.active = true;
    const nb = [];
    for (let i = 0; i < g.buttons.length; i++) nb[i] = g.buttons[i] && g.buttons[i].pressed;
    pad.b = nb;
    const ax = g.axes || [];
    pad.lx = gpDead(ax[0] || 0); pad.ly = gpDead(ax[1] || 0);
    pad.rx = gpDead(ax[2] || 0); pad.ry = gpDead(ax[3] || 0);

function anyGamepad() { return GP.connected[0] || GP.connected[1]; }

function padForPlayer(idx) {
  if (numPlayers > 1) {
    // 2P: pad slot maps directly to player slot (pad0->P1, pad1->P2)
    return GP.connected[idx] ? GP.pads[idx] : null;
  }
  // solo: the first connected pad drives P1
  if (idx !== 0) return null;
  if (GP.connected[0]) return GP.pads[0];
  if (GP.connected[1]) return GP.pads[1];
  return null;
}
/* gamepad menu navigation: returns -1/0/+1 step from d-pad or left stick, rate-limited */
function gpMenuStep(dt) {
  GP.navCD = Math.max(0, GP.navCD - dt);
  let nav = 0, vert = 0;
  for (const pad of GP.pads) {
    if (!pad || !pad.active) continue;
    if (gpButton(pad, 14) || pad.lx < -0.5) nav = -1;
    else if (gpButton(pad, 15) || pad.lx > 0.5) nav = 1;
    if (gpButton(pad, 12) || pad.ly < -0.5) vert = -1;
    else if (gpButton(pad, 13) || pad.ly > 0.5) vert = 1;

  for (const pad of GP.pads) if (gpPressed(pad, 0)) return true;
  return false;
}
function gpCancel() { for (const pad of GP.pads) if (gpPressed(pad, 1)) return true; return false; }
function gpStartPressed() { for (const pad of GP.pads) if (gpPressed(pad, 9) || gpPressed(pad, 0)) return true; return false; }

/* ---------------- §I FX HELPERS ---------------- */
function addPart(p) {
  if (parts.length >= CONFIG.maxParticles) parts.shift();
  parts.push(p);
}
function burst(x, y, col, n, spd, life, size) {
  for (let i = 0; i < n; i++) {
    const a = rand(0, TAU), v = rand(spd * 0.3, spd);
    addPart({
      x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v,
      t: rand(life * 0.5, life), tm: life, col, r: rand(size * 0.5, size),
      drag: 4,
    });
  }
}
function sparkLine(x1, y1, x2, y2, col, n) {
  for (let i = 0; i < n; i++) {
    const t = Math.random();
    addPart({
      x: lerp(x1, x2, t), y: lerp(y1, y2, t),
      vx: rand(-40, 40), vy: rand(-40, 40),
      t: rand(0.1, 0.3), tm: 0.3, col, r: rand(1, 2.5), drag: 2,
    });
  }
}
function dnum(x, y, txt, col, big) {
  dnums.push({ x: x + rand(-8, 8), y: y - 10, vy: -64, t: 0.8, txt, col, big: !!big });
}
function shake(amp, t) { shakeA = Math.max(shakeA, amp); shakeT = Math.max(shakeT, t); ffx.trauma(amp * 0.012 * ffx.shakeScale); }
function toast(txt, col) { toasts.push({ txt, col: col || "#5ee6ff", t: 2.2 }); }

/* ---- §I2 VISUAL FX SYSTEM (bloom / lights / trauma / shockwaves / settings) ---- */
const FX_LIGHT_CAP = 48;       // max additive point lights per frame
const FX_RING_CAP = 40;        // max shockwave rings
const FX_SPARK_DIRMAX = 22;    // directional spark count clamp
const ffx = {
  // persisted settings: full | reduced | off
  level: store.get("fxLevel") || (touchUI ? "reduced" : "full"),
  rings: [],                   // shockwave / impact rings
  shocks: [],                  // chromatic / distortion pulses
  flashes: [],                 // transient point-light flashes (from attacks/explosions)
  traumaV: 0,                  // accumulating screen-shake trauma (0..1)
  setLevel(lv) { this.level = lv; store.set("fxLevel", lv); rebuildFxGrads(); },
  cycleLevel() {
    const order = ["full", "reduced", "off"];
    this.setLevel(order[(order.indexOf(this.level) + 1) % order.length]);
    audio.uiSnd();
  },
  get bloom() { return this.level !== "off"; },
  get scanlines() { return this.level === "full"; },
  get ambient() { return this.level !== "off"; },
  get shakeScale() { return this.level === "off" ? 0.35 : this.level === "reduced" ? 0.7 : 1; },
  get lightCap() { return this.level === "full" ? FX_LIGHT_CAP : this.level === "reduced" ? 22 : 0; },
  trauma(v) { this.traumaV = Math.min(1, this.traumaV + v * this.shakeScale); },
  spawnLight(x, y, r, col, a) {
    if (this.level === "off") return;
    if (this.flashes.length >= 24) this.flashes.shift();
    this.flashes.push({ x, y, r, col, a: (a == null ? 0.6 : a), t: 0.25, tm: 0.25 });
  },
  ring(x, y, r, col, life, width) {
    if (this.level === "off") return;
    if (this.rings.length >= FX_RING_CAP) this.rings.shift();
    this.rings.push({ x, y, r0: r * 0.25, r, t: life || 0.4, tm: life || 0.4, col, w: width || 4 });
  },
  pulse(x, y, mag) { // chromatic-aberration / distortion pulse on big events
    if (this.level !== "full") return;
    if (this.shocks.length >= 6) this.shocks.shift();
    this.shocks.push({ x, y, t: 0.32, tm: 0.32, mag: mag || 6 });
  },
  // directional impact spray
  spray(x, y, ang, col, n, spd) {
    n = Math.min(FX_SPARK_DIRMAX, this.level === "off" ? Math.ceil(n * 0.4) : this.level === "reduced" ? Math.ceil(n * 0.65) : n);
    for (let i = 0; i < n; i++) {
      const a = ang + rand(-0.7, 0.7), v = rand(spd * 0.4, spd);
      addPart({ x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v, t: rand(0.18, 0.4), tm: 0.4, col, r: rand(1.4, 3), drag: 6 });
    }
  },
  update(dt) {
    this.traumaV = Math.max(0, this.traumaV - dt * 1.6);
    for (const r of this.rings) { r.t -= dt; }
    this.rings = this.rings.filter((r) => r.t > 0);
    for (const s of this.shocks) { s.t -= dt; }
    this.shocks = this.shocks.filter((s) => s.t > 0);
    for (const f of this.flashes) { f.t -= dt; }
    this.flashes = this.flashes.filter((f) => f.t > 0);
  },
};
let fxLightGrad = null;
function rebuildFxGrads() { fxLightGrad = null; }

/* sprite detail gate: full per-limb animation & sub-shapes only at EFFECTS=full
   on a precise pointer. reduced/off and touch get simpler, cheaper silhouettes. */
function spriteDetail() { return ffx.level === "full" && !touchUI; }

    drawT: 0, drawing: false,           // LONGBOW draw-charge accumulator + held-draw flag

    seekTgt: null, seekN: 0,            // QUICK BOW HEARTSEEKER consecutive-same-foe crit ramp
    qdrawBuff: 0,                       // LONGBOW QUICKDRAW next-shot damage buff
