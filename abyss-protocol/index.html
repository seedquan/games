/* per-player weapon def (falls back to the context/legacy player) */
function weaponDefP(p) { p = p || ctxP || player; const id = (p && p.weapon) || curWeapon; return WEAPONS.find((w) => w.id === id) || WEAPONS[0]; }
function boonLv(id) { const p = ctxP || player; return (p && p.boons[id]) || 0; }
/* rarity-scaled boon power: sum of rarity multipliers across picks of this boon */
function boonPow(id) { const p = ctxP || player; return (p && p.boonPow && p.boonPow[id]) || 0; }

/* ---------------- §F2 元素附魔 — STACKABLE MELEE ELEMENTAL ENCHANTS ----------------
   A melee ("冷兵器") weapon can carry MULTIPLE elemental enchants at once; every one fires on a
   melee hit so a build can stack fire + ice + electric + poison + lifesteal (+ execute). Each
   element's potency is the summed rarity power of its ELEMENTAL ENCHANT boon picks (so it flows
   through the existing boon UI + rarity system, and stacks). Enchants are per-player (co-op safe),
   reset each run with the player's boons, and only apply on melee-form hits. Bounded by the
   existing status duration/stack clamps, the per-second lifesteal cap, and boss resistances. */
const ENCHANTS = [
  { id: "fire",   glyph: "❋", col: "#ff8844", name: "FIRE",      zh: "火" },
  { id: "ice",    glyph: "❄", col: "#aaeeff", name: "ICE",       zh: "冰" },
  { id: "shock",  glyph: "↯", col: "#ffee55", name: "ELECTRIC",  zh: "电" },
  { id: "poison", glyph: "☣", col: "#7fff5a", name: "POISON",    zh: "毒" },
  { id: "steal",  glyph: "♥", col: "#ff6688", name: "LIFESTEAL", zh: "吸血" },
  { id: "exec",   glyph: "†", col: "#cffaff", name: "EXECUTE",   zh: "处决" },
];
const enchantById = (id) => ENCHANTS.find((x) => x.id === id);
/* a weapon form is "melee" (冷兵器) if it isn't a caster/gun/bow */
function isMeleeForm(W) { return W && !W.isCaster && !W.isGun && !W.isBow; }
/* enchant potency for the acting player (summed rarity power across that enchant's picks) */
function enchantPow(p, id) { return (p && p.enchants && p.enchants[id]) || 0; }

/* apply all of the acting player's elemental enchants on a melee hit against `e`.
   Called from the shared melee-hit path; respects status clamps, lifesteal cap & boss resistances.
   The freeze/shock/burn from enchants flow into the existing SHATTER / THERMAL / COMBUST combos. */
function applyMeleeEnchants(e, p) {
  p = p || ctxP || player;
  if (!p || !p.enchants || e.hp <= 0) return;
  if (!isMeleeForm(weaponDefP(p))) return; // 冷兵器 only
  const en = p.enchants;
  // FIRE: ignite (burn DoT) — scales with potency
  const fire = en.fire || 0;
  if (fire > 0) applyBurn(e, (3.5 + depth * 0.4) * fire * dmgMul());
  // ICE: build freeze stacks + chill slow (multiple stacks build faster)
  const ice = en.ice || 0;
  if (ice > 0 && e.hp > 0) {
    e.iceSlow = Math.max(e.iceSlow || 0, 0.4);
    e.iceSlowT = Math.max(e.iceSlowT || 0, 1.0);
    e.freezeBuild = (e.freezeBuild || 0) + Math.min(0.9, 0.22 + 0.12 * ice);
    if (e.frozenT <= 0 && e.freezeBuild >= 1 && canFreeze(e)) {
      e.freezeBuild = 0;
      if ((e.shockT || 0) > 0) { shatterCombo(e); }       // FREEZE + SHOCK = SHATTER
      else if ((e.burnT || 0) > 0) { thermalSnap(e); }    // BURN + FREEZE = THERMAL SNAP
      else {
        e.frozenT = e.type === "boss" ? CONFIG.freezeBossDur : CONFIG.freezeDur;
        e.vx = 0; e.vy = 0;
        burst(e.x, e.y, "#bfe8ff", 6, 120, 0.35, 2.2);
      }
    }
  }
  // ELECTRIC: shock + a small chain (auto-triggers FREEZE->SHATTER on frozen foes via applyShock)
  const shock = en.shock || 0;
  if (shock > 0 && e.hp > 0) applyShock(e, (3 + depth * 0.35) * shock * dmgMul(), shock >= 2 ? 1 : 0);
  // POISON: stacking DoT that ramps & lingers (more potency = more stacks per hit)
  const poison = en.poison || 0;
  if (poison > 0 && e.hp > 0) applyPoison(e, (3 + depth * 0.35) * poison * dmgMul(), 1 + Math.floor(poison * 0.5));
  // LIFESTEAL: heal on hit, respecting the SHARED per-second lifesteal throughput cap
  const steal = en.steal || 0;
  if (steal > 0) {
    const heal = Math.max(1, Math.round(steal));
    const capPerSec = 8 + 6 * (steal + (p.boonPow && p.boonPow.steal ? p.boonPow.steal : 0)); // shared cap with SIPHON EDGE
    if ((p.stealBudget || 0) < capPerSec) {
      const give = Math.min(heal, capPerSec - (p.stealBudget || 0));
      p.hp = Math.min(p.maxHp, p.hp + give);
      p.stealBudget = (p.stealBudget || 0) + give;
    }
  }
  // EXECUTE: finish badly-wounded non-bosses below a (potency-scaled, clamped) HP threshold
  const exec = en.exec || 0;
  if (exec > 0 && e.hp > 0 && e.type !== "boss") {
    const thr = Math.min(0.22, 0.06 + 0.04 * exec); // clamped so it can't execute healthy foes
    if (e.hp <= e.maxHp * thr) {
      dnum(e.x, e.y - e.r - 14, "EXECUTE", "#cffaff", true);
      burst(e.x, e.y, "#cffaff", 14, 240, 0.45, 3);
      statusDamage(e, e.hp + 999, "#cffaff");
    }
  }
}
/* META EFFECT SOFT-CAPS: levels stay purchasable forever (geometric cost), but the *effect*
   has diminishing returns past a knee so stacking can't break the game (no hard "MAX" on the
   purchase — only the benefit tapers). Damage past +150% and dash recharge past +100% each
   feed through a soft curve toward an asymptote, keeping high-meta runs strong but not absurd. */
function softCap(x, knee, ceil) {
  // identity below the knee; smoothly approaches `ceil` above it (never reaches/exceeds it)
  if (x <= knee) return x;
  const over = x - knee, room = ceil - knee;
  return knee + room * (over / (over + room));
}
function dmgMul() {
  const raw = meta.dmg * 0.10;                 // +10% per level, raw
  return 1 + softCap(raw, 1.5, 4.0);           // soft knee at +150%, asymptote ~+400%
}
function dashRegenMul() {
  const raw = 0.05 * Math.max(0, (meta.dash || 0) - 4);
  return 1 + softCap(raw, 1.0, 2.4);           // soft knee at +100% recharge, asymptote ~+240%
}
function meleeDamage() { const p = ctxP || player; return CONFIG.meleeDmg * weaponDefP(p).dmgMul * dmgMul() * (1 + boonPow("blade") * 0.35) * p.meleeMul; }
/* base spell-cast damage for STAFF/WAND casters. Scales with the same global/meta/run mods
   as melee (HEAVY EDGE applies, slash button drives both) so casters share the power budget. */
function spellDamage() { const p = ctxP || player; return CONFIG.meleeDmg * weaponDefP(p).dmgMul * dmgMul() * (1 + boonPow("blade") * 0.35) * p.meleeMul; }
function boltDamage() {
  const p = ctxP || player;
  const splitX = Math.max(0, boonPow("split") - boonLv("split")); // tri-cannon rarity bonus
  return CONFIG.boltDmg * dmgMul() * (1 + boonPow("over") * 0.35) * (1 + splitX * 0.06) * p.boltMul;
}
function critRoll() { return Math.random() < Math.min(0.85, (weaponDefP().critBase || 0) + boonPow("crit") * 0.15); }
function meleeRangeNow() { return (CONFIG.meleeRange + Math.min(64, boonPow("arc") * 12)) * weaponDefP().rangeMul; }
function meleeArcNow() {
  if (weaponDefP().id === "maul") return TAU; // maul: full 360° slam
  return CONFIG.meleeArc * Math.min(2.4, 1 + boonPow("arc") * 0.35) * weaponDefP().arcMul;
}

function applyBoon(id, rar, who) {
  rar = rar || 0;
  const p = who || ctxP || player;
  const R = RARITIES[rar];
  p.boons[id] = (p.boons[id] || 0) + 1;
  p.boonPow[id] = (p.boonPow[id] || 0) + R.mul;
  p.boonBest[id] = Math.max(p.boonBest[id] || 0, rar);
  const b = boonById(id);
  // 元素附魔: an ELEMENTAL ENCHANT boon imbues this player's melee weapon — stack its potency by rarity.
  if (b && b.enchant) {
    p.enchants = p.enchants || {};
    p.enchants[b.enchant] = (p.enchants[b.enchant] || 0) + R.mul;
  }
  const roman = ["II", "III", "IV", "V", "VI", "VII", "VIII"];
  const tier = p.boons[id] > 1 ? " " + (roman[p.boons[id] - 2] || ("x" + p.boons[id])) : "";
  toast((numPlayers > 1 ? p.tag + " " : "") + (rar > 0 ? R.name + " " : "") + b.name + tier, rar > 0 ? R.col : b.col);
  if (id === "wind") { /* passive */ }
  audio.boon();
  burst(p.x, p.y, R.col, 26, 220, 0.7, 3);
  // rarity-colored pickup flourish: expanding ring(s) + light burst
  ffx.ring(p.x, p.y, 60 + rar * 16, R.col, 0.6, 4 + rar);
  if (rar >= 2) ffx.ring(p.x, p.y, 90 + rar * 20, R.col, 0.7, 3);
  ffx.spawnLight(p.x, p.y, 120, R.col, 0.7);
  if (rar >= 3) ffx.pulse(p.x, p.y, 6); // legendary flash
}
/* weapon-exclusive boons appear only for the wielded weapon form (of the selecting player) */
function boonPool(who) {
  const wep = (who && who.weapon) || curWeapon;
  const lv = (id) => (who ? (who.boons[id] || 0) : boonLv(id));
  return BOONS.filter((b) => lv(b.id) < b.max && (!b.weapon || b.weapon === wep));
}
function rollBoons(who, max) {
  const avail = boonPool(who);
  const out = [];
  const pool = avail.slice();
  const lim = max || 3;
  while (out.length < lim && pool.length) {
    const i = Math.floor(Math.random() * pool.length);
    out.push({ b: pool.splice(i, 1)[0], rar: rollRarity() });
  }
  return out;
}
/* Co-op boon rule: each player chooses their OWN boon from a separate offer,
   applied per-player. Players pick in turn (P1 then P2). Solo = single pick. */
function beginBoonSelection(afterFn, max) {
  boonAfter = afterFn || nextRoom;
  menuHighlight = 0;
  boonQueue = players.filter((p) => p && !p.downed).map((p) => p.idx);
  if (boonQueue.length === 0) boonQueue = [0];
  advanceBoonPick(max);
}
function advanceBoonPick(max) {
  if (boonQueue.length === 0) { finishBoonSelection(); return; }
  boonPickIdx = boonQueue[0];
  const who = players[boonPickIdx] || players[0];
  boonChoices = rollBoons(who, max);
  menuHighlight = 0;
  if (boonChoices.length === 0) { boonQueue.shift(); advanceBoonPick(max); return; }
  state = "boon";
}
function finishBoonSelection() {
  boonChoices = [];
  const fn = boonAfter; boonAfter = null;
  if (fn) fn();
}
function pickBoon(i) {
  if (i < 0 || i >= boonChoices.length) return;
  const who = players[boonPickIdx] || players[0];
  applyBoon(boonChoices[i].b.id, boonChoices[i].rar, who);
  boonChoices = [];
  if (boonQueue.length) boonQueue.shift();
  if (boonQueue.length) { advanceBoonPick(boonMax); return; }
  finishBoonSelection();
}
function rerollBoons() {
  if (rerollsLeft <= 0) return;
  rerollsLeft--;
  const who = players[boonPickIdx] || players[0];
  boonChoices = rollBoons(who, boonMax);
  menuHighlight = 0;
  audio.uiSnd();
}

/* ---------------- §K ENEMIES ---------------- */
/* difficulty keeps climbing harder past depth 12 to keep unlimited training honest.
   Co-op: each extra living player adds enemy HP so 2P (≈2x DPS + 2x bodies) stays a real
   fight rather than trivial. Damage is left near-1P (two targets already split aggro), with a
   tiny bump, so 2P is harder than 1P without being unfairly spiky. */
function playerCountSafe() { const n = (players && players.length) || numPlayers || 1; return clamp(n, 1, 2); }
function coopHpMul() { return 1 + 0.6 * (playerCountSafe() - 1); }     // +60% enemy HP at 2P
function coopDmgMul() { return 1 + 0.08 * (playerCountSafe() - 1); }   // +8% enemy dmg at 2P
function hpMul() { return (1 + (depth - 1) * 0.17 + Math.max(0, depth - 12) * 0.06) * (1 + 0.2 * (runHeat.ehp || 0)) * coopHpMul(); }
function eDmgMul() { return (1 + (depth - 1) * 0.07 + Math.max(0, depth - 12) * 0.03) * (1 + 0.15 * (runHeat.edmg || 0)) * coopDmgMul(); }

const ENEMY_DEFS = {
  chaser:  { r: 14, hp: 30, speed: 116, col: "#ff5577", cost: 1.5 },
  shooter: { r: 13, hp: 26, speed: 88,  col: "#cc66ff", cost: 2.0 },
  tank:    { r: 24, hp: 95, speed: 44,  col: "#ffaa33", cost: 3.5 },
  swarmer: { r: 8,  hp: 10, speed: 178, col: "#66ff88", cost: 0.55 },
  bomber:  { r: 12, hp: 22, speed: 150, col: "#ff8844", cost: 1.8 },  // scuttles in, beeping fuse, AoE blast hurts everyone
  shield:  { r: 17, hp: 60, speed: 70,  col: "#88aaff", cost: 2.8 },  // frontal energy shield blocks bolts & slashes
  medic:   { r: 11, hp: 18, speed: 95,  col: "#66ffcc", cost: 2.2 },  // hovers behind, beam-heals most damaged ally
  phantom: { r: 13, hp: 26, speed: 130, col: "#bb99ff", cost: 2.4 },  // cloaked stalker, decloaks before dash-strike
};

function spawnEnemy(type, x, y) {
  const d = ENEMY_DEFS[type];
  const e = {
    type, x, y, vx: 0, vy: 0, r: d.r,
    hp: d.hp * hpMul(), maxHp: d.hp * hpMul(),
    col: d.col, speed: d.speed * (1 + (depth - 1) * 0.012),
    flash: 0, kbx: 0, kby: 0,
    state: "seek", t: rand(0, 1), cd: rand(0.4, 1.4),
    dirX: 0, dirY: 0, phase: rand(0, TAU), strafe: Math.random() < 0.5 ? 1 : -1,
    contactCD: 0, spawnT: 0.25, frozenT: 0,
    burnT: 0, burnStacks: 0, burnDps: 0, burnTick: 0, shockT: 0, sdCD: 0,
    poisonT: 0, poisonStacks: 0, poisonDps: 0, poisonTick: 0,
    shieldA: 0, exposeT: 0, healTgt: null, beeped: false, elite: false,
  };
  if (type === "shield") e.shieldA = player ? angTo(x, y, player.x, player.y) : -Math.PI / 2;
  if (type === "phantom") e.state = "cloak";
  if (eliteRoom && !eliteSpawned && type !== "swarmer" && type !== "medic") {
    eliteSpawned = true;
    e.elite = true;
    e.r = Math.round(e.r * 1.25);
    e.hp *= 2.6; e.maxHp *= 2.6;
    e.speed *= 1.08;
  }
  enemies.push(e);
  burst(x, y, d.col, e.elite ? 18 : 10, 160, 0.4, 2.5);
  if (e.elite) toast("ELITE — 精英出现", "#ffcc44");
  return e;
}

/* boss roster: rotated/randomized each boss room; depth 18+ spawns hard variants */
const BOSS_KINDS = [
  { kind: "warden",    name: "THE WARDEN",    col: "#ff3366", r: 44, hp: 420, speed: 60 },
  { kind: "summoner",  name: "VOIDCALLER",    col: "#bb66ff", r: 36, hp: 360, speed: 72 },
  { kind: "artillery", name: "LANCE-7",       col: "#ff8833", r: 38, hp: 380, speed: 55 },
  { kind: "splitter",  name: "MITOSIS PRIME", col: "#66ff88", r: 52, hp: 470, speed: 50 },
  { kind: "overseer",  name: "OVERSEER 监视者",  col: "#33ddee", r: 40, hp: 430, speed: 58 },
  { kind: "juggernaut",name: "JUGGERNAUT 重锤者", col: "#ffaa44", r: 50, hp: 540, speed: 52 },
  { kind: "hexweaver", name: "HEXWEAVER 咒织者",  col: "#cc66ff", r: 38, hp: 410, speed: 64 },
];

function spawnBoss(forceKind) {
  const tier = Math.floor(depth / CONFIG.bossEvery);
  const hard = depth >= 18;
  let def = forceKind ? BOSS_KINDS.find((b) => b.kind === forceKind) : null;
  if (!def) {
    const pool = BOSS_KINDS.filter((b) => b.kind !== lastBossKind);
    def = pick(pool.length ? pool : BOSS_KINDS);
  }
  lastBossKind = def.kind;
  const hp = Math.round(def.hp * (1 + (tier - 1) * 0.75) * (hard ? 1.25 : 1));
  boss = {
    type: "boss", kind: def.kind, name: def.name,
    x: CONFIG.arenaW / 2, y: 150, vx: 0, vy: 0, r: def.r,
    hp, maxHp: hp,
    col: def.col, speed: def.speed + tier * 6,
    flash: 0, kbx: 0, kby: 0,
    state: "move", t: 0, cd: 1.6, atk: 0,
    dirX: 0, dirY: 0, phase: 0, sub: 0, rot: 0,
    contactCD: 0, spawnT: 0.4, tier, hard, gen: 0, frozenT: 0,
    burnT: 0, burnStacks: 0, burnDps: 0, burnTick: 0, shockT: 0, sdCD: 0, enraged: false,
    poisonT: 0, poisonStacks: 0, poisonDps: 0, poisonTick: 0,
    strafe: Math.random() < 0.5 ? 1 : -1, tx: 0, ty: 0,
    plates: 0, sweepA: 0,
  };
  // JUGGERNAUT: armored plates that break off as HP drops, exposing the weak core
  if (def.kind === "juggernaut") boss.plates = 4;
  bossName = def.name; bossBarMax = hp;
  enemies.push(boss);
  audio.bossRoar(def.kind);
  shake(10, 0.5);
  bossWarnT = 2.0;
}

/* Splitter: at 50% HP it divides into two smaller copies (each splits once more) */
function splitBoss(e) {
  const childHp = Math.max(1, e.hp / 2);
  for (let i = 0; i < 2; i++) {
    const a = rand(0, TAU);
    enemies.push({
      type: "boss", kind: "splitter", name: e.name,
      x: clamp(e.x + Math.cos(a) * (e.r + 14), 60, CONFIG.arenaW - 60),
      y: clamp(e.y + Math.sin(a) * (e.r + 14), 60, CONFIG.arenaH - 60),
      vx: Math.cos(a) * 160, vy: Math.sin(a) * 160,
      r: Math.max(16, e.r * 0.72),
      hp: childHp, maxHp: childHp,
      col: e.col, speed: e.speed * 1.3,
      flash: 0, kbx: 0, kby: 0,
      state: "move", t: 0, cd: rand(0.8, 1.3), atk: 0,
      dirX: 0, dirY: 0, phase: rand(0, TAU), sub: 0, rot: rand(0, TAU),
      contactCD: 0, spawnT: 0.2, tier: e.tier, hard: e.hard,
      gen: e.gen + 1, frozenT: 0, strafe: 1, tx: 0, ty: 0,
      burnT: 0, burnStacks: 0, burnDps: 0, burnTick: 0, shockT: 0, sdCD: 0, enraged: false,
      poisonT: 0, poisonStacks: 0, poisonDps: 0, poisonTick: 0,
    });
  }
  burst(e.x, e.y, e.col, 36, 320, 0.8, 4);
  audio.bossRoar("splitter");
  shake(9, 0.4);
  toast("IT SPLITS!", e.col);
  e.hp = -1;
  if (e === boss) boss = null;
}

function nearestEnemy(x, y, maxD) {
  let bestE = null, bd = maxD || 1e9;
  for (const e of enemies) {
    if (e.hp <= 0) continue;
    const d = dist(x, y, e.x, e.y);
    if (d < bd) { bd = d; bestE = e; }
  }
  return bestE;
}

function hitEnemy(e, dmg, kx, ky, isCrit, melee) {
  if (e.hp <= 0) return;
  let mul = isCrit ? 2.5 : 1;
  // JUGGERNAUT: stripped armor plates expose the weak core — bonus damage when exposed
  if (e.kind === "juggernaut" && e.plates !== undefined) mul *= 1 + 0.18 * (4 - e.plates);
  if (e.frozenT > 0) { // shatter: frozen targets take bonus damage
    const sp = ctxP || player;
    mul *= 1.3 + 0.4 * boonPow("shatter") + (sp ? sp.frozenBonus : 0);
    burst(e.x, e.y, "#cfeeff", 10, 230, 0.45, 3);
    audio.shatter();
  }
  const final = Math.round(dmg * mul);
  e.hp -= final;
  e.flash = 0.12;
  if (e.type === "phantom" && e.state === "cloak") { e.state = "recover"; e.t = 1.0; } // tagging a phantom rips its cloak
  const kbScale = e.type === "boss" ? 0.12 : (e.type === "tank" ? 0.3 : 1);
  e.kbx += kx * kbScale; e.kby += ky * kbScale;
  dnum(e.x, e.y - e.r, String(final), isCrit ? "#ffee55" : "#ffffff", isCrit);
  // punchier directional impact spray along the knockback vector
  const sa = (kx || ky) ? Math.atan2(ky, kx) : rand(0, TAU);
  ffx.spray(e.x, e.y, sa, isCrit ? "#ffee55" : e.col, isCrit ? 12 : 7, isCrit ? 320 : 220);
  ffx.spawnLight(e.x, e.y, isCrit ? 60 : 40, isCrit ? "#ffee55" : e.col, isCrit ? 0.5 : 0.3);
  if (isCrit) ffx.ring(e.x, e.y, 30, "#ffee55", 0.3, 3);
  audio.hit(isCrit);
  if (melee) {
    freezeT = Math.max(freezeT, CONFIG.hitStop);
    if (boonLv("steal")) {
      const sp = ctxP || player;
      // SIPHON EDGE: heal per hit, but cap healing per second so multi-hit weapons
      // (twin fang flurry, etc.) + stacked lifesteal can't out-heal damage into immortality.
      const heal = Math.max(1, Math.round(boonPow("steal")));
      const capPerSec = 8 + 6 * boonPow("steal");          // soft lifesteal throughput cap
      if ((sp.stealBudget || 0) < capPerSec) {
        const give = Math.min(heal, capPerSec - (sp.stealBudget || 0));
        sp.hp = Math.min(sp.maxHp, sp.hp + give);
        sp.stealBudget = (sp.stealBudget || 0) + give;
      }
    }
    // 冷兵器附魔: stacked elemental enchants all fire on the melee hit (survivors only; combos/poison
    // self-resolve kills via the guarded killEnemy). Reads the acting player's per-player enchant set.
    if (e.hp > 0) applyMeleeEnchants(e, ctxP || player);
  }
  if (e.hp <= 0) killEnemy(e);
}

/* ---------------- §K2 ELEMENTAL STATUS (burn / shock / combos) ---------------- */
/* lightweight damage path for DoTs/AoEs: no knockback, no hit SFX spam */
function statusDamage(e, dmg, col) {
  if (e.hp <= 0) return;
  const final = Math.max(1, Math.round(dmg));
  e.hp -= final;
  e.flash = Math.max(e.flash, 0.05);
  dnum(e.x, e.y - e.r, String(final), col, false);
  if (e.hp <= 0) killEnemy(e);
}

function applyBurn(e, dps) {
  if (!e || e.hp <= 0) return;
  if (e.frozenT > 0) { thermalSnap(e); return; } // BURN + FREEZE combo
  e.burnStacks = Math.min(3, (e.burnStacks || 0) + 1);
  e.burnDps = Math.max(e.burnDps || 0, dps);
  e.burnT = e.type === "boss" ? CONFIG.burnDur * 0.5 : CONFIG.burnDur;
  if (!(e.burnTick > 0)) e.burnTick = 0.5;
  if (Math.random() < 0.6) audio.burnCrackle();
}

function applyShock(e, dmg, chains) {
  if (!e || e.hp <= 0) return;
  if (e.frozenT > 0) { shatterCombo(e); return; } // FREEZE + SHOCK combo
  e.shockT = Math.max(e.shockT || 0, e.type === "boss" ? CONFIG.shockStun * 0.4 : CONFIG.shockStun);
  sparkLine(e.x - e.r, e.y - e.r, e.x + e.r, e.y + e.r, "#ffee55", 5);
  audio.shockZap();
  statusDamage(e, dmg, "#ffee55");
  if (chains > 0) {
    const cands = [];
    for (const o of enemies) {
      if (o === e || o.hp <= 0 || (o.shockT || 0) > 0) continue;
      const dd = dist(e.x, e.y, o.x, o.y);
      if (dd < 170) cands.push([dd, o]);
    }
    cands.sort((a, b) => a[0] - b[0]);
    const srcPoison = (e.poisonStacks || 0) > 0 ? e.poisonDps : 0; // POISON + SHOCK conducts poison to chained foes
    for (let i = 0; i < Math.min(2, cands.length); i++) {
      const o = cands[i][1];
      beams.push({ x1: e.x, y1: e.y, x2: o.x, y2: o.y, t: 0.18, col: "#ffee55" });
      if (srcPoison > 0) applyPoison(o, srcPoison, 1); // toxic conduction
      applyShock(o, dmg * 0.7, chains - 1);
    }
  }
}

/* POISON (毒) — a stacking damage-over-time that RAMPS with stacks and LINGERS longer than burn.
   Combos: POISON + FIRE = COMBUST (consume poison stacks for a fire burst + ignite);
            POISON + SHOCK spreads the poison to nearby foes (toxic conduction). */
function applyPoison(e, dps, stacks) {
  if (!e || e.hp <= 0) return;
  stacks = stacks || 1;
  // POISON + FIRE = COMBUST: an already-burning foe combusts its poison into a fire burst
  if ((e.burnT || 0) > 0 && (e.poisonStacks || 0) > 0) { combustCombo(e); /* re-seed poison below */ }
  e.poisonStacks = Math.min(CONFIG.poisonMaxStacks, (e.poisonStacks || 0) + stacks);
  e.poisonDps = Math.max(e.poisonDps || 0, dps);
  e.poisonT = e.type === "boss" ? CONFIG.poisonDur * 0.5 : CONFIG.poisonDur; // bosses: reduced duration like other statuses
  if (!(e.poisonTick > 0)) e.poisonTick = 0.6;
  if (Math.random() < 0.4) {
    addPart({ x: e.x + rand(-e.r, e.r), y: e.y + rand(-e.r, e.r), vx: rand(-12, 12), vy: -rand(20, 50), t: 0.5, tm: 0.5, col: Math.random() < 0.5 ? "#7fff5a" : "#3fce3a", r: rand(1.4, 2.8), drag: 1 });
  }
}

/* POISON + FIRE = COMBUST: consume the foe's poison stacks for an immediate fire burst + ignite. */
function combustCombo(e) {
  const stacks = e.poisonStacks || 0;
  if (stacks <= 0) return;
  e.poisonStacks = 0; e.poisonT = 0; e.poisonDps = 0;
  const dmg = (10 + depth * 1.6 + stacks * (6 + depth * 0.8)) * dmgMul();
  burst(e.x, e.y, "#9fff5a", 14, 240, 0.45, 3);
  burst(e.x, e.y, "#ffaa44", 12, 260, 0.5, 3);
  dnum(e.x, e.y - e.r - 14, "COMBUST", "#bfff66", true);
  audio.comboSnap();
  shake(3, 0.12);
  ffx.ring(e.x, e.y, 60, "#bfff66", 0.35, 4);
  ffx.spawnLight(e.x, e.y, 80, "#bfff66", 0.6);
  statusDamage(e, dmg, "#bfff66");
  if (e.hp > 0) applyBurn(e, (5 + depth * 0.5) * dmgMul());
}

/* freeze gate: bosses can't be re-frozen during their thaw-resistance window, so even
   FROST WAND + PERMAFROST or a fast freeze-nova loop can't perma-lock a boss. Normal
   enemies are always freezable (crowd control stays satisfying). */
function canFreeze(e) { return e.type !== "boss" || (e.freezeImmT || 0) <= 0; }

/* FREEZE + SHOCK = SHATTER: burst damage, consumes both statuses */
function shatterCombo(e) {
  e.frozenT = 0; e.shockT = 0;
  burst(e.x, e.y, "#cfeeff", 22, 300, 0.6, 3.5);
  dnum(e.x, e.y - e.r - 14, "SHATTER", "#cfeeff", true);
  audio.shatter();
  shake(4, 0.15);
  ffx.ring(e.x, e.y, 60, "#cfeeff", 0.4, 5);
  ffx.pulse(e.x, e.y, 7);
  ffx.spawnLight(e.x, e.y, 90, "#cfeeff", 0.7);
  statusDamage(e, (30 + depth * 2.5) * dmgMul(), "#cfeeff");
}

/* BURN + FREEZE = THERMAL SNAP: small AoE, consumes both statuses */
function thermalSnap(e) {
  e.burnT = 0; e.burnStacks = 0; e.burnDps = 0; e.frozenT = 0;
  const R = 90, dmg = (16 + depth * 1.8) * dmgMul();
  burst(e.x, e.y, "#ffaa66", 18, 260, 0.5, 3);
  burst(e.x, e.y, "#ffffff", 8, 180, 0.3, 2);
  dnum(e.x, e.y - e.r - 14, "THERMAL SNAP", "#ffaa66", true);
  audio.comboSnap();
  shake(4, 0.15);
  const ex = e.x, ey = e.y;
  for (const o of enemies) {
    if (o.hp <= 0) continue;
    if (dist(ex, ey, o.x, o.y) < R + o.r) statusDamage(o, dmg, "#ffaa66");
  }
}

/* shieldbearer: blocks bolts/slashes arriving from the shield-facing side */
function shieldBlocks(e, fromX, fromY) {
  return e.type === "shield" && e.hp > 0 && e.frozenT <= 0 && (e.shockT || 0) <= 0 &&
    (e.exposeT || 0) <= 0 && e.spawnT <= 0 &&
    Math.abs(angDiff(e.shieldA, angTo(e.x, e.y, fromX, fromY))) < 1.15;
}

/* bomber detonation: hurts the player AND other enemies */
function explodeBomber(e) {
  const R = 95;
  burst(e.x, e.y, "#ff8844", 34, 340, 0.6, 4);
  burst(e.x, e.y, "#ffe0aa", 12, 260, 0.35, 3);
  shake(7, 0.3);
  audio.enemyDie(true);
  damagePlayersInRadius(e.x, e.y, R, 15 * eDmgMul(), null);
  const ex = e.x, ey = e.y;
  killEnemy(e);
  for (const o of enemies) {
    if (o === e || o.hp <= 0) continue;
    if (dist(ex, ey, o.x, o.y) < R + o.r) statusDamage(o, 26 + depth * 2, "#ff8844");
  }
  for (const bl of barrels) { // blasts cook off nearby volatile barrels
    if (!bl.dead && bl.fuse < 0 && dist(ex, ey, bl.x, bl.y) < R + bl.r) igniteBarrel(bl, 0.12);
  }
}

/* style meter: chained kills (3.5s window) climb C → B → A → S */
function styleKill() {
  if (state !== "play" || roomClear) return;
  styleN++;
  styleT = 3.5;
  let r = -1;
  for (let i = 0; i < STYLE_RANKS.length; i++) if (styleN >= STYLE_RANKS[i].at) r = i;
  if (r > styleRank) {
    styleRank = r;
    stylePop = 0.45;
    if (r === 3) audio.styleChime(); else audio.styleUp(r);
    // rank-up flash centered on the killing player
    const sp = ctxP || player;
    if (sp) {
      ffx.ring(sp.x, sp.y, 70 + r * 18, STYLE_RANKS[r].col, 0.5, 4);
      ffx.spawnLight(sp.x, sp.y, 120, STYLE_RANKS[r].col, 0.6);
      if (r === 3) ffx.pulse(sp.x, sp.y, 7);
    }
  }
  if (styleRank > styleBestRoom) styleBestRoom = styleRank;
}

function killEnemy(e) {
  if (e._dead) return;   // re-entry guard: a status/combo may have already finished this foe
  e._dead = true;
  e.hp = -1;
  kills++;
  stats.kills++;
  styleKill();
  const big = e.type === "tank" || e.type === "boss";
  burst(e.x, e.y, e.col, big ? 40 : 18, big ? 320 : 220, 0.8, big ? 4 : 3);
  burst(e.x, e.y, "#ffffff", 8, 260, 0.3, 2);
  // richer per-type death effects
  ffx.ring(e.x, e.y, big ? 70 : 36, e.col, big ? 0.5 : 0.32, big ? 6 : 3);
  ffx.spawnLight(e.x, e.y, big ? 120 : 56, e.col, big ? 0.8 : 0.4);
  if (e.type === "boss") { ffx.pulse(e.x, e.y, 9); ffx.ring(e.x, e.y, 140, "#ffffff", 0.6, 5); }
  else if (e.type === "swarmer") { ffx.spray(e.x, e.y, rand(0, TAU), e.col, 6, 240); } // bug pops
  else if (e.type === "phantom") { burst(e.x, e.y, "#bb99ff", 14, 240, 0.5, 2.5); ffx.pulse(e.x, e.y, 4); } // wraith dissipates
  else if (e.type === "tank") { ffx.pulse(e.x, e.y, 6); ffx.ring(e.x, e.y, 60, "#ffaa33", 0.4, 5); burst(e.x, e.y, "#7a4410", 14, 200, 0.7, 3.5); } // brute crumbles
  else if (e.type === "shield") { burst(e.x, e.y, "#88aaff", 16, 260, 0.5, 3); ffx.ring(e.x, e.y, 44, "#aaccff", 0.35, 3); } // shield shatters
  else if (e.type === "shooter" || e.type === "medic") { ffx.spray(e.x, e.y, rand(0, TAU), e.col, 8, 200); burst(e.x, e.y, "#ffee99", 6, 180, 0.4, 2); } // drone sparks & falls
  else if (e.type === "bomber") { burst(e.x, e.y, "#ffcc66", 12, 240, 0.5, 3); } // pops
  audio.enemyDie(big);
  freezeT = Math.max(freezeT, e.type === "boss" ? 0.16 : CONFIG.killStop * 1.35);
  shake(big ? 9 : 4, big ? 0.4 : 0.18);
  // execution pulse: the LAST enemy of a combat room dies in slow motion
  if (state === "play" && !roomClear && waveIdx >= waves.length && spawnQ.length === 0 &&
      (roomType === "normal" || roomType === "challenge" || roomType === "boss")) {
    let alive = 0;
    for (const o of enemies) if (o !== e && o.hp > 0) alive++;
    if (alive === 0) slowmoT = 0.5;
  }
  if (boonLv("reset")) {
    const kp = ctxP || player;
    kp.dashCharges = Math.min(kp.dashMax, kp.dashCharges + 1);
    kp.dashCD = 0;
    // rarity bonus: above-common KILL DRIVE also refunds a little energy
    const xPow = Math.max(0, boonPow("reset") - 1);
    if (xPow > 0) kp.energy = Math.min(kp.maxEnergy, kp.energy + 6 * xPow);
  }
  // TWIN FANG PHANTOM STEP: kills briefly phase the wielder (i-frames) + refund a dash
  {
    const kp = ctxP || player;
    if (kp && kp.weapon === "fang" && (kp.boons && kp.boons.phantstk)) {
      kp.ifr = Math.max(kp.ifr, 0.25 + 0.12 * (kp.boonPow.phantstk || 0));
      kp.dashCharges = Math.min(kp.dashMax, kp.dashCharges + 1);
      burst(kp.x, kp.y, "#ff9fcf", 8, 160, 0.3, 2.2);
    }
    // EMBER CINDER BURST: a burning foe that dies bursts into fire, igniting nearby foes
    if (kp && kp.weapon === "ember" && (kp.boons && kp.boons.cinderbrst) && (e.burnT || 0) > 0) {
      const cbR = 80, ex = e.x, ey = e.y;
      burst(ex, ey, "#ff8844", 16, 280, 0.5, 3.2);
      ffx.ring(ex, ey, cbR, "#ff8844", 0.35, 4);
      for (const o of enemies) {
        if (o === e || o.hp <= 0) continue;
        if (dist(ex, ey, o.x, o.y) < cbR + o.r) {
          statusDamage(o, (8 + depth * 0.8) * (kp.boonPow.cinderbrst || 1) * dmgMul(), "#ff8844");
          if (o.hp > 0) applyBurn(o, (4 + depth * 0.4) * dmgMul());
        }
      }
    }
  }
  // core drops (splitter fragments drop a share each)
  let n = e.type === "boss" ? (e.gen ? randi(3, 5) : randi(14, 18)) : e.type === "tank" ? randi(2, 4) : (Math.random() < 0.4 ? 1 : 0);
  if (e.elite) n += randi(3, 5);
  while (n-- > 0) {
    pickups.push({ kind: "core", x: e.x, y: e.y, vx: rand(-120, 120), vy: rand(-120, 120), t: 12 });
  }
  if (Math.random() < 0.06 && e.type !== "boss") {
    pickups.push({ kind: "hp", x: e.x, y: e.y, vx: rand(-80, 80), vy: rand(-80, 80), t: 12 });
  }
  if (e === boss) boss = null;
}

/* damagePlayer: victim is an explicit player (defaults to legacy players[0]).
   The boon context (thorns) reads the victim's boons. */
function damagePlayer(d, ang, attacker, victim) {
  const p = victim || player;
  if (!p || p.hp <= 0 || p.downed) return;
  if (p.ifr > 0 || p.hurtT > 0) return;
  const prevCtx = ctxP; ctxP = p;
  if (boonLv("thorn") && attacker && attacker.hp > 0) {
    hitEnemy(attacker, Math.round(9 * boonPow("thorn")), Math.cos(ang) * 120, Math.sin(ang) * 120, false, false);
  }
  ctxP = prevCtx;
  p.hp -= d;
  p.hurtT = CONFIG.hurtIfr;
  p.vx += Math.cos(ang) * 220;
  p.vy += Math.sin(ang) * 220;
  redFlash = 0.35;
  shake(7, 0.3);
  burst(p.x, p.y, "#ff4455", 16, 240, 0.5, 3);
  dnum(p.x, p.y - 18, String(Math.round(d)), "#ff5566", false);
  audio.hurt();
  if (p.hp <= 0) {
    p.hp = 0;
    playerDie(p);
  }
}

function playerDie(p) {
  p = p || player;
  burst(p.x, p.y, p.col || "#5ee6ff", 60, 380, 1.2, 4);
  burst(p.x, p.y, "#ffffff", 24, 280, 0.6, 3);
  audio.death();
  shake(14, 0.7);
  // CO-OP: a single player going down becomes "downed" and can be revived.
  // Only a true game-over (run end) when solo dies or BOTH co-op players are down.
  if (players.length > 1) {
    p.downed = true; p.reviveT = 0; p.vx = 0; p.vy = 0;
    toast(p.tag + " 倒下 — DOWNED · revive nearby", "#ff5566");
    if (allDowned()) endRun();
    return;
  }
  endRun();
}

function endRun() {
  if (depth > best) { best = depth; }
  if (depth > stats.deepest) stats.deepest = depth;
  saveMeta();
  saveStats();
  state = "summary";
}

/* ---------------- §L BULLETS / ZONES ---------------- */
function firePlayerBolt(p) {
  p = p || ctxP || player;
  ctxP = p;
  const n = 1 + boonLv("split") * 2;
  const spread = 0.2;
  for (let i = 0; i < n; i++) {
    const off = n === 1 ? 0 : (i - (n - 1) / 2) * spread;
    const a = p.aim + off;
    pbolts.push({
      x: p.x + Math.cos(a) * 16, y: p.y + Math.sin(a) * 16,
      vx: Math.cos(a) * CONFIG.boltSpeed, vy: Math.sin(a) * CONFIG.boltSpeed,
      r: 5, t: 1.6, pierce: Math.round(boonPow("pierce") * 2), hitSet: [], owner: p,
    });
  }
  audio.bolt();
  p.recoilT = Math.max(p.recoilT, 0.12); // arm kick on bolt fire
  burst(p.x + Math.cos(p.aim) * 18, p.y + Math.sin(p.aim) * 18, "#ff66ee", 5, 120, 0.2, 2);
}

function fireEbolt(x, y, a, spd, dmg, col, r) {
  const slow = 1 - Math.min(0.6, 0.25 * boonPow("slow"));
  ebolts.push({
    x, y, vx: Math.cos(a) * spd * slow, vy: Math.sin(a) * spd * slow,
    r: r || 6, t: 5, dmg: dmg * eDmgMul(), col: col || "#ff5577",
    homing: 0, spd: 0,
  });
}
/* HEXWEAVER homing hex-orb: a slow ebolt that curves toward its target for a window,
   then flies straight. Reuses the ebolt pool/update; `homing` is the turn-rate window. */
function fireHexOrb(x, y, a, spd, dmg, col, r, homing) {
  const slow = 1 - Math.min(0.6, 0.25 * boonPow("slow"));
  const sp = spd * slow;
  ebolts.push({
    x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
    r: r || 7, t: 4.5, dmg: dmg * eDmgMul(), col: col || "#cc66ff",
    homing: homing || 1.2, spd: sp,
  });
}
/* OVERSEER laser sweep: a rotating telegraphed beam line. Pooled, capped.
   warn → the line glows but is harmless; live → it damages players it crosses. */
function addSweep(cx, cy, a0, sweepRate, len, dmg, col) {
  if (sweeps.length >= SWEEP_CAP) return;
  const s = sweepPool.pop() || {};
  s.cx = cx; s.cy = cy; s.a = a0; s.rate = sweepRate; s.len = len;
  s.dmg = dmg; s.col = col || "#33ddee";
  s.warn = 0.7; s.live = 1.1; s.t = 0; s.hitCD = 0;
  sweeps.push(s);
}

function addZone(x, y) {
  zones.push({ x, y, r: 26, t: 1.5, tick: 0 });
}

/* ---------------- §M ROOMS / GEN ---------------- */
function isBossDepth(d) { return d > 0 && d % CONFIG.bossEvery === 0; }

/* ----- ARENA LAYOUTS -----
   The combat room obstacle layout. Several themed configurations pick from a weighted
   set scaling with depth, beyond the original random scatter. Every layout guarantees
   fairness: the player spawn band (bottom-center) and top spawn band stay clear, pillars
   never overlap, and a navigability check (open lanes + reachable center) gates the result.
   Hazards (spikes/lasers/barrels) are layered on afterward by spawnHazards(). */
const PILLAR_HUES = ["#223a66", "#2a2a55", "#1d3355"];
function arenaHue() { return pick(PILLAR_HUES); }

/* clear of both spawn bands? (player start bottom-center; enemy top-center) */
function spawnBandsClear(x, y, r) {
  const A = CONFIG;
  if (dist(x, y, A.arenaW / 2, A.arenaH - 90) < r + 120) return false; // player spawn
  if (dist(x, y, A.arenaW / 2, 150) < r + 110) return false;           // top spawn
  return true;
}
/* try to add a pillar at (x,y,r); rejects spawn-band overlap & crowding. returns ok */
function tryAddPillar(x, y, r, gap) {
  const A = CONFIG;
  if (x < r + 60 || x > A.arenaW - r - 60 || y < r + 80 || y > A.arenaH - r - 80) return false;
  if (!spawnBandsClear(x, y, r)) return false;
  const g = gap === undefined ? 80 : gap;
  for (const p of pillars) if (dist(x, y, p.x, p.y) < r + p.r + g) return false;
  pillars.push({ x, y, r, hue: arenaHue() });
  return true;
}

/* original random scatter (also used for boss arenas: few/no pillars) */
function genPillars(n) {
  pillars = [];
  let tries = 0;
  while (pillars.length < n && tries++ < 200) {
    const r = rand(26, 46);
    const A = CONFIG;
    tryAddPillar(rand(r + 70, A.arenaW - r - 70), rand(r + 90, A.arenaH - r - 90), r, 80);
  }
}

/* central pillar cluster: a knot of obstacles in the middle, open perimeter to circle */
function layoutCluster() {
  const A = CONFIG, cx = A.arenaW / 2, cy = A.arenaH / 2 - 10;
  const n = randi(3, 5);
  for (let i = 0; i < n; i++) {
    const a = (i / n) * TAU + rand(-0.3, 0.3);
    const rr = rand(40, 95);
    tryAddPillar(cx + Math.cos(a) * rr, cy + Math.sin(a) * rr, rand(26, 40), 28);
  }
}
/* symmetric columns: mirrored pairs left/right — readable lanes between */
function layoutColumns() {
  const A = CONFIG;
  const rows = randi(2, 3);
  const offX = rand(150, 230);
  for (let i = 0; i < rows; i++) {
    const y = lerp(170, A.arenaH - 170, rows === 1 ? 0.5 : i / (rows - 1));
    const r = rand(28, 40);
    tryAddPillar(A.arenaW / 2 - offX, y, r, 24);
    tryAddPillar(A.arenaW / 2 + offX, y, r, 24);
  }
}
/* corner cover: chunky blocks in the four corners, wide-open middle */
function layoutCorners() {
  const A = CONFIG, m = 150;
  const spots = [[m, m + 30], [A.arenaW - m, m + 30], [m, A.arenaH - m - 30], [A.arenaW - m, A.arenaH - m - 30]];
  for (const [x, y] of spots) tryAddPillar(x, y, rand(34, 46), 24);
}
/* open arena: nearly empty — relies on hazards for danger (handled by spawnHazards) */
function layoutOpen() {
  if (Math.random() < 0.5) tryAddPillar(CONFIG.arenaW / 2, CONFIG.arenaH / 2 - 10, rand(34, 46), 24);
}
/* maze-ish: staggered short walls (clusters of touching pillars) forming lanes */
function layoutMaze() {
  const A = CONFIG;
  const cols = randi(2, 3);
  for (let c = 0; c < cols; c++) {
    const x = lerp(220, A.arenaW - 220, cols === 1 ? 0.5 : c / (cols - 1));
    const segs = randi(2, 3);
    const y0 = rand(160, 230);
    for (let s = 0; s < segs; s++) {
      tryAddPillar(x, y0 + s * 64 + (c % 2) * 40, rand(24, 32), 10);
    }
  }
}
/* pit/chasm-edged: a ring of pillars hugging the perimeter, open center (visual "edge") */
function layoutPitEdge() {
  const A = CONFIG;
  const n = randi(5, 7);
  for (let i = 0; i < n; i++) {
    const a = (i / n) * TAU + rand(-0.2, 0.2);
    const rx = A.arenaW / 2 + Math.cos(a) * (A.arenaW * 0.36);
    const ry = A.arenaH / 2 + Math.sin(a) * (A.arenaH * 0.32);
    tryAddPillar(rx, ry, rand(26, 38), 18);
  }
}

const ARENA_LAYOUTS = [
  { fn: genPillars, scatter: true }, // handled specially (needs a count)
  { fn: layoutCluster },
  { fn: layoutColumns },
  { fn: layoutCorners },
  { fn: layoutOpen },
  { fn: layoutMaze },
  { fn: layoutPitEdge },
];

/* navigability check: enough open floor + clear vertical lane somewhere so the player
   can always reach the fight. Conservative — rejects pathological dense layouts. */
function arenaNavigable() {
  const A = CONFIG;
  // total obstacle coverage must stay modest
  let area = 0;
  for (const p of pillars) area += Math.PI * p.r * p.r;
  if (area > A.arenaW * A.arenaH * 0.22) return false;
  // at least one wide vertical lane (a 70px-radius corridor top→bottom) must be open
  for (let x = 120; x <= A.arenaW - 120; x += 40) {
    let open = true;
    for (const p of pillars) {
      if (Math.abs(p.x - x) < p.r + 30) { open = false; break; }
    }
    if (open) return true;
  }
  return false;
}

/* build the combat-room obstacle layout: pick a layout (weighted, depth-scaled),
   generate it, then verify navigability — falling back to a safe scatter if needed. */
function genArena(d) {
  for (let attempt = 0; attempt < 5; attempt++) {
    pillars = [];
    if (attempt >= 3) { genPillars(randi(2, 4)); break; } // guaranteed-safe fallback
    // weight: early depths favor simpler open/scatter; deeper favors structured layouts
    let choice;
    const roll = Math.random();
    if (d <= 2) choice = roll < 0.5 ? "scatter" : (roll < 0.7 ? "open" : "corners");
    else {
      const r = Math.random();
      if (r < 0.20) choice = "scatter";
      else if (r < 0.34) choice = "cluster";
      else if (r < 0.48) choice = "columns";
      else if (r < 0.62) choice = "corners";
      else if (r < 0.74) choice = "open";
      else if (r < 0.88) choice = "maze";
      else choice = "pit";
    }
    if (choice === "scatter") genPillars(randi(2, 5));
    else if (choice === "cluster") layoutCluster();
    else if (choice === "columns") layoutColumns();
    else if (choice === "corners") layoutCorners();
    else if (choice === "open") layoutOpen();
    else if (choice === "maze") layoutMaze();
    else layoutPitEdge();
    if (arenaNavigable()) break;
  }
}

function buildWaves(d) {
  waves = [];
  const nWaves = d <= 1 ? 1 : clamp(1 + randi(0, Math.min(2, Math.floor(d / 2))), 1, 3);
  // co-op spawns more bodies per wave so two players have enough to fight
  const coopBudget = 1 + 0.45 * (playerCountSafe() - 1);
  for (let w = 0; w < nWaves; w++) {
    let budget = (2.6 + d * 1.25 + w * 1.1) * coopBudget;
    const wave = [];
    const types = ["chaser", "swarmer"];
    if (d >= 2) types.push("shooter");
    if (d >= 3) types.push("bomber");
    if (d >= 4) types.push("tank");
    if (d >= 5) types.push("shield");
    if (d >= 6) types.push("medic");
    if (d >= 7) types.push("phantom");
    let guard = 0;
    while (budget > 0.5 && guard++ < 40) {
      const t = pick(types);
      const def = ENEMY_DEFS[t];
      if (def.cost > budget + 0.3) continue;
      if (t === "medic" && wave.indexOf("medic") !== -1) continue; // one medic per wave
      if (t === "swarmer") {
        const pack = randi(3, 5);
        for (let i = 0; i < pack; i++) wave.push("swarmer");
        budget -= def.cost * pack;
      } else {
        wave.push(t);
        budget -= def.cost;
      }
    }
    if (!wave.length) wave.push("chaser");
    waves.push(wave);
  }
}

/* a point inside the arena not overlapping any pillar — always returns something
   (scans a grid, picks the open cell furthest from any obstacle). */
function clearSpawnPoint() {
  const A = CONFIG;
  let best = { x: A.arenaW / 2, y: A.arenaH / 2 }, bestD = -1;
  for (let gx = 90; gx <= A.arenaW - 90; gx += 60) {
    for (let gy = 110; gy <= A.arenaH - 90; gy += 60) {
      let md = 1e9;
      for (const p of pillars) md = Math.min(md, dist(gx, gy, p.x, p.y) - p.r);
      if (md > bestD) { bestD = md; best = { x: gx, y: gy }; }
    }
  }
  return best;
}

function queueWave(list) {
  eliteSpawned = false; // one elite per wave in elite rooms
  let cx = rand(180, CONFIG.arenaW - 180), cy = rand(140, CONFIG.arenaH - 200);
  for (const type of list) {
    let x = 0, y = 0, tries = 0, ok = false;
    while (tries++ < 30 && !ok) {
      x = clamp(cx + rand(-220, 220), 60, CONFIG.arenaW - 60);
      y = clamp(cy + rand(-180, 180), 70, CONFIG.arenaH - 70);
      ok = dist(x, y, player.x, player.y) > 170;
      for (const p of pillars) if (dist(x, y, p.x, p.y) < p.r + 30) ok = false;
    }
    if (!ok) { const f = clearSpawnPoint(); x = f.x; y = f.y; } // guaranteed never inside a wall
    spawnQ.push({ type, x, y, t: rand(0.7, 1.1) });
    if (Math.random() < 0.35) { cx = rand(180, CONFIG.arenaW - 180); cy = rand(140, CONFIG.arenaH - 200); }
  }
}

/* ---------------- §M1b ENVIRONMENTAL HAZARDS ---------------- */
/* spike traps (rhythmic, hurt EVERYONE), laser fences (blink on/off, block+zap),
   volatile barrels (shoot/slash to detonate; chain reactions). depth-gated, sparing. */
function hazardSpotOk(x, y, r) {
  if (dist(x, y, CONFIG.arenaW / 2, CONFIG.arenaH - 90) < r + 130) return false; // player spawn
  if (dist(x, y, CONFIG.arenaW / 2, 150) < r + 100) return false;               // top spawn area
  if (y < 90 || y > CONFIG.arenaH - 70 || x < 70 || x > CONFIG.arenaW - 70) return false;
  if (pointInPillar(x, y, r + 14)) return false;
  for (const h of hazards) {
    if (h.kind === "spike" && dist(x, y, h.x, h.y) < r + 110) return false;
    if (h.kind === "fence" && (dist(x, y, h.x1, h.y1) < r + 80 || dist(x, y, h.x2, h.y2) < r + 80)) return false;
  }
  for (const b of barrels) if (dist(x, y, b.x, b.y) < r + 90) return false;
  return true;
}
function addSpike(x, y) {
  hazards.push({ kind: "spike", x, y, s: 24, t: rand(0, 2.6), period: 2.6, warn: 0.55, up: 0.8 });
}
function addFence(x1, y1, x2, y2) {
  hazards.push({ kind: "fence", x1, y1, x2, y2, t: rand(0, 3.4), period: 3.4, warn: 0.5, on: 1.5 });
}
function addBarrel(x, y) {
  barrels.push({ x, y, r: 13, fuse: -1, dead: false });
}
function spikeActive(h) { return h.t >= h.warn && h.t < h.warn + h.up; }
function spikeWarning(h) { return h.t < h.warn; }
function fenceOn(h) { return h.t >= h.period - h.on; }
function fenceWarn(h) { return h.t >= h.period - h.on - h.warn && h.t < h.period - h.on; }

function spawnHazards(bossArena) {
  let nB = 0;
  if (bossArena) {
    nB = randi(1, 2); // bosses' arenas get barrels only
  } else {
    if (depth >= 3 && Math.random() < 0.45) {
      const n = randi(1, 2);
      for (let i = 0; i < n; i++) {
        for (let tries = 0; tries < 24; tries++) {
          const x = rand(120, CONFIG.arenaW - 120), y = rand(120, CONFIG.arenaH - 150);
          if (hazardSpotOk(x, y, 34)) { addSpike(x, y); break; }
        }
      }
    }
    if (depth >= 5 && Math.random() < 0.3) {
      for (let tries = 0; tries < 24; tries++) {
        const x = rand(170, CONFIG.arenaW - 170), y = rand(140, CONFIG.arenaH - 190);
        const len = rand(110, 170);
        const horiz = Math.random() < 0.5;
        const x2 = horiz ? x + len : x, y2 = horiz ? y : y + len;
        if (hazardSpotOk(x, y, 26) && hazardSpotOk(x2, y2, 26) && hazardSpotOk((x + x2) / 2, (y + y2) / 2, 26)) {
          addFence(x, y, x2, y2);
          break;
        }
      }
    }
    if (depth >= 2 && Math.random() < 0.5) nB = randi(1, 2);
  }
  for (let i = 0; i < nB; i++) {
    for (let tries = 0; tries < 24; tries++) {
      const x = rand(110, CONFIG.arenaW - 110), y = rand(110, CONFIG.arenaH - 140);
      if (hazardSpotOk(x, y, 26)) { addBarrel(x, y); break; }
    }
  }
}

function segDist(px, py, x1, y1, x2, y2) {
  const dx = x2 - x1, dy = y2 - y1;
  const L2 = dx * dx + dy * dy;
  const t = L2 > 0 ? clamp(((px - x1) * dx + (py - y1) * dy) / L2, 0, 1) : 0;
  const cx = x1 + dx * t, cy = y1 + dy * t;
  return { d: dist(px, py, cx, cy), cx, cy };
}
function pushFromSeg(o, sd, min) {
  if (sd.d < 0.01) return;
  const nx = (o.x - sd.cx) / sd.d, ny = (o.y - sd.cy) / sd.d;
  o.x = sd.cx + nx * min; o.y = sd.cy + ny * min;
  const dot = o.vx * nx + o.vy * ny;
  if (dot < 0) { o.vx -= nx * dot; o.vy -= ny * dot; }
}
function igniteBarrel(b, fuse) {
  if (b.dead || b.fuse >= 0) return;
  b.fuse = fuse;
  audio.bombBeep();
}
function explodeBarrel(b) {
  if (b.dead) return;
  b.dead = true;
  const R = 110;
  burst(b.x, b.y, "#ffb050", 30, 340, 0.6, 4);
  burst(b.x, b.y, "#ffe6c0", 12, 240, 0.35, 3);
  shake(7, 0.3);
  ffx.ring(b.x, b.y, R, "#ffb050", 0.45, 6);
  ffx.spawnLight(b.x, b.y, R + 30, "#ffb050", 0.9);
  ffx.pulse(b.x, b.y, 8); // barrel chain distortion pulse
  audio.barrelBoom();
  damagePlayersInRadius(b.x, b.y, R, 14 * eDmgMul(), null);
  for (const e of enemies) {
    if (e.hp <= 0 || dist(b.x, b.y, e.x, e.y) >= R + e.r) continue;
    const a = angTo(b.x, b.y, e.x, e.y);
    e.kbx += Math.cos(a) * 300; e.kby += Math.sin(a) * 300;
    statusDamage(e, 30 + depth * 2.2, "#ffb050");
  }
  for (const o of barrels) { // chain reaction
    if (o !== b && !o.dead && o.fuse < 0 && dist(b.x, b.y, o.x, o.y) < R + o.r) igniteBarrel(o, 0.16);
  }
}

function updateHazards(dt) {
  for (const h of hazards) {
    h.t += dt;
    if (h.t >= h.period) h.t -= h.period;
    if (h.kind === "spike") {
      if (!spikeActive(h)) continue;
      for (const p of players) {
        if (p.downed || p.hp <= 0) continue;
        if (Math.abs(p.x - h.x) < h.s + p.r * 0.4 && Math.abs(p.y - h.y) < h.s + p.r * 0.4) {
          damagePlayer(10 * eDmgMul(), angTo(h.x, h.y, p.x + rand(-1, 1), p.y + rand(-1, 1)), null, p);
        }
      }
      for (const e of enemies) {
        if (e.hp <= 0 || e.spawnT > 0 || (e.hazCD || 0) > 0) continue;
        if (Math.abs(e.x - h.x) < h.s && Math.abs(e.y - h.y) < h.s) {
          e.hazCD = 0.55;
          statusDamage(e, 14 + depth * 1.6, "#ff7755");
          audio.spikeSnd();
        }
      }
    } else if (h.kind === "fence") {
      if (!fenceOn(h)) continue;
      for (const p of players) {
        if (p.downed || p.hp <= 0) continue;
        const sd = segDist(p.x, p.y, h.x1, h.y1, h.x2, h.y2);
        if (sd.d < 7 + p.r) {
          damagePlayer(9 * eDmgMul(), angTo(sd.cx, sd.cy, p.x, p.y), null, p);
          pushFromSeg(p, sd, 7 + p.r);
        }
      }
      for (const e of enemies) {
        if (e.hp <= 0 || e.spawnT > 0) continue;
        const sd = segDist(e.x, e.y, h.x1, h.y1, h.x2, h.y2);
        if (sd.d < 7 + e.r) {
          if ((e.hazCD || 0) <= 0) { e.hazCD = 0.55; statusDamage(e, 10 + depth * 1.4, "#ff5577"); audio.fenceZap(); }
          pushFromSeg(e, sd, 7 + e.r);
        }
      }
    }
  }
  for (const b of barrels) {
    if (b.dead || b.fuse < 0) continue;
    b.fuse -= dt;
    if (b.fuse <= 0) explodeBarrel(b);
  }
  barrels = barrels.filter((b) => !b.dead);
  // AFTERSHOCK quake rings
  for (const q of quakes) {
    q.t -= dt; q.tick -= dt;
    if (q.tick <= 0) {
      q.tick = 0.25;
      for (const e of enemies) {
        if (e.hp > 0 && dist(q.x, q.y, e.x, e.y) < q.r + e.r) statusDamage(e, q.dps * 0.25, "#ff9966");
      }
      addPart({ x: q.x + rand(-q.r, q.r) * 0.8, y: q.y + rand(-q.r, q.r) * 0.8, vx: 0, vy: -30, t: 0.35, tm: 0.35, col: "#ff9966", r: rand(1.5, 3), drag: 1 });
    }
  }
  quakes = quakes.filter((q) => q.t > 0);
  // HEXWEAVER temporary barriers: tick down & dissolve (pillars with a ttl field)
  let pillarDirty = false;
  for (const pl of pillars) {
    if (pl.ttl !== undefined) {
      pl.ttl -= dt;
      if (pl.ttl <= 0) { pillarDirty = true; burst(pl.x, pl.y, "#cc88ff", 12, 220, 0.4, 3); }
    }
  }
  if (pillarDirty) pillars = pillars.filter((pl) => pl.ttl === undefined || pl.ttl > 0);
  // melee swing trail afterimages
  for (const g of slashGhosts) g.t -= dt;
  slashGhosts = slashGhosts.filter((g) => g.t > 0);
}

/* recycle any live boss laser sweeps back to the pool (room/run reset) */
function clearSweeps() {
  for (const s of sweeps) if (sweepPool.length < SWEEP_CAP) sweepPool.push(s);
  sweeps.length = 0;
}

/* recycle any in-flight glaives to the pool and clear per-player flight locks */
function clearGlaives() {
  for (const g of glaives) { g.hitSet.length = 0; glaivePool.push(g); }
  glaives.length = 0;
  for (const p of players) if (p) { p.glaiveOut = false; }
}

/* recycle any live spell projectiles back to the pool (room/run reset) */
function clearSpells() {
  for (const s of spells) { s.hitSet.length = 0; s.owner = null; if (spellPool.length < 40) spellPool.push(s); }
  spells.length = 0;
}

/* recycle any live gun bullets back to the pool (room/run reset) */
function clearBullets() {
  for (const b of bullets) { b.hitSet.length = 0; b.owner = null; if (bulletPool.length < 80) bulletPool.push(b); }
  bullets.length = 0;
}

function genRoom() {
  enemies = []; pbolts = []; ebolts = []; doors = []; spawnQ = []; zones = []; beams = [];
  pickups = []; mortars = []; novas = []; pedestals = []; boss = null;
  clearSweeps();
  clearGlaives();
  clearSpells();
  clearBullets();
  clearArrows();
  arrowRains.length = 0;
  hazards = []; barrels = []; quakes = []; slashGhosts = [];

function openDoors(quiet) {
  const A = CONFIG;
  const n = randi(2, 3);
  const nextD = depth + 1;
  const rewards = [];
  // slot 0 is ALWAYS a combat door — a fight is always available
  rewards.push(Math.random() < 0.6 ? "boon" : pick(["hp", "energy", "cores"]));
  const others = ["boon", "hp", "energy", "cores"].filter((r) => r !== rewards[0]);
  while (rewards.length < n) {
    const r = pick(others);
    others.splice(others.indexOf(r), 1);
    rewards.push(r);
  }
  // CHALLENGE: optional timed gauntlet door (still a combat room)
  if (n > 1 && depth >= 2 && !isBossDepth(nextD) && roomType !== "challenge" && Math.random() < 0.22) {
    rewards[1] = "challenge";
  }
  // at most ONE special (combat-free) room per door set, never twice in a row
  const inSpecial = SPECIAL_ROOMS.indexOf(roomType) !== -1;
  if (!inSpecial && !isBossDepth(nextD) && nextD - lastSpecialDepth >= 2) {
    if (nextD - lastShopDepth >= 4 && (nextD - lastShopDepth >= 5 || Math.random() < 0.55)) {
      // SHOP door every ~4-5 depths
      rewards[rewards.length - 1] = "shop";
    } else if (nextD - lastFountainDepth >= 6 && (nextD - lastFountainDepth >= 7 || Math.random() < 0.6)) {
      // FOUNTAIN rest stop every ~6-7 depths, offset from shops
      rewards[rewards.length - 1] = "fountain";
    } else if (Math.random() < 0.12) {
      rewards[rewards.length - 1] = "treasure";
    }
  }
  const spacing = A.arenaW / (n + 1);
  for (let i = 0; i < n; i++) {
    doors.push({
      x: spacing * (i + 1), y: A.wall + 16, w: 96, h: 34,
      reward: rewards[i], openT: 0,
      bossNext: isBossDepth(depth + 1),
    });
  }
  audio.door();
  if (!quiet) toast("ROOM CLEAR — CHOOSE A DOOR", "#5ee6ff");
}

function enterDoor(d) {

function makeShopStock() {
  const pool = SHOP_ITEMS.slice();
  const n = randi(3, 4);
  const out = [];
  while (out.length < n && pool.length) {
    out.push(pool.splice(Math.floor(Math.random() * pool.length), 1)[0]);
  }
  // INFLATION heat contract: shop prices +50%
  const inf = 1 + 0.5 * (runHeat.shopUp || 0);
  return out.map((it, i) => ({
    x: CONFIG.arenaW * (i + 1) / (out.length + 1),
    y: CONFIG.arenaH * 0.52,
    item: it, price: Math.round(it.price() * inf), sold: false,
  }));
}

/* ---------------- §N HUB / RUN FLOW ---------------- */
/* (re)build the players[] array for the current numPlayers; players[0] stays P1 (=== player) */
function spawnPlayers() {
  players = [];
  for (let i = 0; i < numPlayers; i++) players.push(newPlayer(i));
  player = players[0];
  ctxP = players[0];
  placePlayers(CONFIG.arenaW / 2, CONFIG.arenaH * 0.62);
}
/* arrange players around a spawn anchor so they don't fully overlap */
function placePlayers(cx, cy) {
  if (players.length <= 1) {
    if (players[0]) { players[0].x = cx; players[0].y = cy; players[0].vx = 0; players[0].vy = 0; }
    return;
  }
  const off = 34;
  players.forEach((p, i) => {
    p.x = cx + (i === 0 ? -off : off);
    p.y = cy;
    p.vx = 0; p.vy = 0;
  });
}
/* any alive (not downed, hp>0) player nearest to (x,y); used by enemy targeting */
function nearestPlayer(x, y, includeDowned) {
  let best = null, bd = Infinity;
  for (const p of players) {
    if (!p) continue;
    if (!includeDowned && (p.downed || p.hp <= 0)) continue;
    const d = dist(x, y, p.x, p.y);
    if (d < bd) { bd = d; best = p; }
  }
  return best;
}
/* enemy aggro target: nearest non-downed player, else any player (so AI never stalls) */
function targetFor(e) { return nearestPlayer(e.x, e.y, false) || nearestPlayer(e.x, e.y, true) || player; }
function allDowned() { return players.length > 0 && players.every((p) => p.downed || p.hp <= 0); }
function anyLowHp() { for (const p of players) if (p && p.hp > 0 && !p.downed && p.hp < p.maxHp * 0.25) return true; return false; }
/* damage every alive player whose body overlaps a circle (radius R + their r) */
function damagePlayersInRadius(x, y, R, dmg, attacker) {
  for (const p of players) {
    if (p.downed || p.hp <= 0) continue;
    if (dist(x, y, p.x, p.y) < R + p.r) damagePlayer(dmg, angTo(x, y, p.x, p.y), attacker, p);
  }
}

/* ---------------- §O COLLISION ---------------- */
function collideArena(o) {
  const A = CONFIG, w = A.wall;
  if (o.x < w + o.r) { o.x = w + o.r; o.vx = Math.abs(o.vx) * 0.2; }
  if (o.x > A.arenaW - w - o.r) { o.x = A.arenaW - w - o.r; o.vx = -Math.abs(o.vx) * 0.2; }
  if (o.y < w + o.r) { o.y = w + o.r; o.vy = Math.abs(o.vy) * 0.2; }
  if (o.y > A.arenaH - w - o.r) { o.y = A.arenaH - w - o.r; o.vy = -Math.abs(o.vy) * 0.2; }
}
function collidePillars(o) {
  for (const p of pillars) {
    const d = dist(o.x, o.y, p.x, p.y), min = p.r + o.r;
    if (d < min && d > 0.001) {
      const nx = (o.x - p.x) / d, ny = (o.y - p.y) / d;
      o.x = p.x + nx * min; o.y = p.y + ny * min;
      const dot = o.vx * nx + o.vy * ny;
      if (dot < 0) { o.vx -= nx * dot; o.vy -= ny * dot; }
    }
  }
}
function pointInPillar(x, y, r) {
  for (const p of pillars) if (dist(x, y, p.x, p.y) < p.r + (r || 0)) return p;
  return null;
}

/* ---------------- §P UPDATE: PLAYER ---------------- */
/* P2 keyboard scheme (used only in 2P when P2 has no gamepad in slot 1):
   move = Arrow keys, slash = ".", bolt = "/", dash = Enter, freeze = ","  (P2 auto-aims) */
function p2UsesKeyboard() { return numPlayers > 1 && !GP.connected[1]; }
/* P1 uses arrows too in solo/1-pad; in 2P-keyboard mode, arrows belong to P2 only */
function p1ArrowsActive() { return !p2UsesKeyboard(); }

/* movement vector for a specific player from its assigned device(s) */
function moveInputFor(p) {
  let mx = 0, my = 0;
  const pad = padForPlayer(p.idx);
  if (p.idx === 0) {
    // P1: WASD always; arrows only when P2 isn't using the keyboard; touch joystick; pad left stick
    if (keys["w"]) my -= 1;
    if (keys["s"]) my += 1;
    if (keys["a"]) mx -= 1;
    if (keys["d"]) mx += 1;
    if (p1ArrowsActive()) {
      if (keys["ArrowUp"]) my -= 1;
      if (keys["ArrowDown"]) my += 1;
      if (keys["ArrowLeft"]) mx -= 1;
      if (keys["ArrowRight"]) mx += 1;
    }
    if (joy.id !== -1) { mx += joy.dx; my += joy.dy; }
  } else if (p2UsesKeyboard()) {
    if (keys["ArrowUp"]) my -= 1;
    if (keys["ArrowDown"]) my += 1;
    if (keys["ArrowLeft"]) mx -= 1;
    if (keys["ArrowRight"]) mx += 1;
  }
  if (pad) {
    const s = gpStick(pad.lx, pad.ly);
    mx += s.x; my += s.y;
  }
  const m = Math.hypot(mx, my);
  if (m > 1) { mx /= m; my /= m; }
  return { x: mx, y: my };
}
/* legacy alias: solo/global movement (players[0]) — kept for any stray callers */
function moveInput() { return moveInputFor(ctxP || player); }

function trySlash(p) {
  p = p || ctxP || player;
  ctxP = p;
  if ((shopRoom || roomType === "treasure") && state === "play") { // slash doubles as interact/take
    const pd = pedestalUnder(p);
    if (pd) { tryBuyPedestal(pd, p); return; }
  }
  if (p.dashT > 0) return;
  const W = weaponDefP(p);
  // STAFF/WAND casters: the slash button CASTS a spell in the aim direction (own cast cadence).
  if (W.isCaster) {
    if (p.castCD > 0) return;
    if (p.idx === 0 && !touchUI && !p.padBound && mouseIdle()) kbAutoAim(p);
    castSpell(p, W);
    return;
  }
  // BALLISTIC GUNS: the slash button FIRES the gun in the aim direction (own fire cadence).
  if (W.isGun) {
    if (p.gunCD > 0) return;
    if (p.idx === 0 && !touchUI && !p.padBound && mouseIdle()) kbAutoAim(p);
    fireGun(p, W);
    return;
  }
  // BOWS: the slash button NOCKS & LOOSES an arrow (own nock cadence). The LONGBOW is chargeable
  // and looses on RELEASE (handled in updatePlayer); the QUICK BOW & STORMBOW loose on each press.
  if (W.isBow) {
    if (p.bowCD > 0) return;
    if (W.id === "lbow") return; // longbow draws while held, looses on release (see updatePlayer)
    if (p.idx === 0 && !touchUI && !p.padBound && mouseIdle()) kbAutoAim(p);
    fireBow(p, W, 0);
    return;
  }
  if (p.slashCD > 0) return;
  if (p.idx === 0 && !touchUI && !p.padBound && mouseIdle()) kbAutoAim(p); // keyboard-only: snap aim to nearest enemy
  // GLAIVE: while a thrown blade is in flight the wielder has no melee — wait for the return
  if (W.id === "glaive") {
    if (p.glaiveOut) return;
    throwGlaive(p, W);
    return;
  }
  if (p.comboT <= 0) p.comboN = 0;
  p.comboN = p.comboN % 3 + 1;
  p.comboT = 1.5;
  const lunge = W.id === "lance" && p.comboN === 3; // lance: 3rd hit is a piercing lunge
  const maul = W.id === "maul";
  const fang = W.id === "fang";
  const arcW = W.id === "arc";
  const grav = W.id === "grav";
  const whip = W.id === "whip";
  const prism = W.id === "prism";
  const flurry = fang && p.comboN === 3; // TWIN FANG: every 3rd hit is a rapid flurry
  // FRENZY ramps attack speed on consecutive hits (twin fang only)
  let cdMul = W.cdMul;
  if (fang && boonLv("frenzy")) cdMul *= Math.max(0.45, 1 - 0.08 * boonPow("frenzy") * Math.min(6, p.frenzyN || 0));
  p.slashCD = CONFIG.meleeCD * cdMul;
  p.slashDur = CONFIG.slashDur * W.durMul;
  p.slashT = p.slashDur;
  p.slashSide *= -1;
  p.slashAng = p.aim;
  p.recoilT = 0.18; // weapon-arm lunge/recoil pose window
  audio.slash(W.id);
  if (fang) p.frenzyT = 1.2; // frenzy decay window
  if (lunge) { // dash a short step forward along the thrust
    burst(p.x, p.y, W.col, 8, 150, 0.3, 2.5);
    // LANCE VAULT: longer lunge, burning wake, and refunds a dash charge
    const vault = boonLv("vault");
    const lungeStep = 64 * (vault ? 1 + 0.25 * boonPow("vault") : 1);
    if (vault) {
      addZone(p.x, p.y);
      p.dashCharges = Math.min(p.dashMax, p.dashCharges + 1);
    }
    p.x += Math.cos(p.slashAng) * lungeStep;
    p.y += Math.sin(p.slashAng) * lungeStep;
    if (vault) addZone(p.x, p.y);
    collidePillars(p); collideArena(p);
    p.ifr = Math.max(p.ifr, 0.1);
    audio.dash();
  }
  const blade = W.id === "blade";
  // BLADE TEMPO EDGE: each chained slash ramps damage (decays via tempoT)
  let tempoMul = 1;
  if (blade && boonLv("tempo")) {
    p.tempoN = Math.min(8, (p.tempoN || 0) + 1); p.tempoT = 1.5;
    tempoMul = 1 + 0.06 * boonPow("tempo") * (p.tempoN - 1);
  }
  // BLADE RIPOSTE: the first slash within the post-dash window crits & stuns
  const riposte = blade && boonLv("riposte") && (p.dashedT || 0) > 0;
  if (riposte) p.dashedT = 0;
  // immediate hit detection — snappy
  let range = meleeRangeNow() * (lunge ? 1.15 : 1);
  if (maul && boonLv("seismic")) range *= 1 + 0.18 * boonPow("seismic"); // SEISMIC widens the slam (~+35% at II)
  let arc = lunge ? meleeArcNow() * 0.6 : meleeArcNow();
  if (blade && boonLv("cleave")) arc *= 1 + 0.25 * boonPow("cleave"); // CLEAVE widens the blade arc
  // twin fang per-hit is low; the flurry distributes its dmg across rapid sub-slashes
  // (each flurry sub-swing deals 0.42x so 3 swings ≈ 1.26x a normal hit — rewarding but
  // not the dominant outlier it was at 0.6x/3 ≈ 1.8x).
  const dmg = meleeDamage() * (lunge ? 1.3 : 1) * (flurry ? 0.42 : 1) * tempoMul;
  const kb = maul ? 400 * (1 + 0.5 * boonPow("jugg")) : (fang ? 150 : (whip ? 0 : 260)); // JUGGERNAUT; fang barely knocks back; whip yanks (handled per-hit)
  // swing trail ribbon (weapon-tinted; style chosen at render time)
  slashGhosts.push({ x: p.x, y: p.y, ang: p.slashAng, side: p.slashSide, arc, range, t: 0.32, tm: 0.32, col: W.col, lunge, weapon: W.id, flurry });
  if (slashGhosts.length > 14) slashGhosts.shift();
  ffx.spawnLight(p.x + Math.cos(p.slashAng) * range * 0.5, p.y + Math.sin(p.slashAng) * range * 0.5, range * 0.7, W.col, 0.5);

  // GRAVITON MACE: the swing seeds a mini singularity at its reach; it pulls then implodes.
  if (grav) {
    const sx = p.x + Math.cos(p.slashAng) * range * 0.8;
    const sy = p.y + Math.sin(p.slashAng) * range * 0.8;
    const pullR = (120 + range * 0.6) * (1 + 0.5 * boonPow("horizon"));
    const density = boonLv("singpull");
    const life = 0.4 * (density ? 1 + 0.4 * boonPow("singpull") : 1); // DENSITY: longer-lived
    singularities.push({
      x: sx, y: sy, t: life, tm: life, pullR,
      dmg: dmg * 1.6, slow: boonLv("horizon") > 0, col: W.col, pulled: [], done: false,
      pullBoss: density > 0,        // DENSITY: singularities also drag bosses
      darkstar: boonLv("darkstar"), // DARK STAR: implosion crits + shocks everything caught
      owner: p,                     // boon/crit context for the delayed implosion
    });
    if (singularities.length > 6) singularities.shift();
    burst(sx, sy, W.col, 14, 180, 0.4, 3);
    ffx.spawnLight(sx, sy, pullR, W.col, 0.9);
    audio.gravCast();
    shake(3, 0.12);
    // light direct contact damage along the swing so it isn't purely delayed
    for (const e of enemies) {
      if (e.hp <= 0) continue;
      const d = dist(p.x, p.y, e.x, e.y);
      if (d > range + e.r) continue;
      const a = angTo(p.x, p.y, e.x, e.y);
      if (Math.abs(angDiff(p.slashAng, a)) > arc / 2 + Math.atan2(e.r, Math.max(1, d))) continue;
      if (shieldBlocks(e, p.x, p.y)) { e.exposeT = 1.1; e.kbx += Math.cos(a) * 200; audio.clank(); continue; }
      hitEnemy(e, dmg * 0.5, Math.cos(a) * 120, Math.sin(a) * 120, critRoll(), true);
      if (boonLv("ignite")) applyBurn(e, 4 * boonPow("ignite") * dmgMul());
    }
    // barrels too
    for (const b of barrels) {
      if (b.dead || b.fuse >= 0) continue;
      if (dist(sx, sy, b.x, b.y) < pullR) igniteBarrel(b, 0.2);
    }
    return; // graviton's hit feedback is handled by the singularity
  }

  let hitAny = false;
  const arcHits = []; // ARC CASTER: enemies struck this swing, for the chain zap
  // one swing's hit pass; flurry runs it several times with tiny angle jitter
  const swings = flurry ? 3 : 1;
  const doSwing = (jitter) => {
    const sAng = p.slashAng + jitter;
    for (const e of enemies) {
      if (e.hp <= 0) continue;
      const d = dist(p.x, p.y, e.x, e.y);
      if (d > range + e.r) continue;
      const a = angTo(p.x, p.y, e.x, e.y);
      if (Math.abs(angDiff(sAng, a)) > arc / 2 + Math.atan2(e.r, Math.max(1, d))) continue;
      if (!lunge && shieldBlocks(e, p.x, p.y)) { // the lance lunge punches through shields
        e.kbx += Math.cos(a) * 340; e.kby += Math.sin(a) * 340;
        e.exposeT = 1.1;
        burst(e.x + Math.cos(e.shieldA) * (e.r + 6), e.y + Math.sin(e.shieldA) * (e.r + 6), "#88aaff", 8, 180, 0.3, 2.5);
        audio.clank();
        hitAny = true;
        continue;
      }
      // PHALANX: lance crits far more often at the tip of its reach
      let crit = critRoll();
      if (!crit && boonLv("phalanx") && d > range * 0.66) crit = Math.random() < 0.25 * boonPow("phalanx");
      // BLADE RIPOSTE: post-dash slash always crits
      if (riposte) crit = true;
      // BLADE EXECUTE ORDER: bonus damage to wounded foes (energy refund handled on kill below)
      let hitDmg = dmg;
      if (blade && boonLv("execorder") && e.type !== "boss" && e.hp < e.maxHp * 0.5) {
        hitDmg *= 1 + 0.4 * boonPow("execorder");
      }
      const wasAlive = e.hp;
      hitEnemy(e, hitDmg, Math.cos(a) * kb, Math.sin(a) * kb, crit, true);
      // BLADE RIPOSTE: post-dash strike also stuns
      if (riposte && e.hp > 0) e.shockT = Math.max(e.shockT || 0, e.type === "boss" ? 0.3 : 0.7);
      // BLADE CLEAVE: slashes make foes bleed
      if (blade && boonLv("cleave") && e.hp > 0) applyBurn(e, (2.5 + depth * 0.3) * boonPow("cleave") * dmgMul());
      // BLADE EXECUTE ORDER: refund energy when a slash finishes a foe
      if (blade && boonLv("execorder") && wasAlive > 0 && e.hp <= 0) {
        p.energy = Math.min(p.maxEnergy, p.energy + 8 * boonPow("execorder"));
      }
      if (maul && boonLv("jugg") && e.hp > 0) {
        e.shockT = Math.max(e.shockT || 0, e.type === "boss" ? 0.25 : 0.55);
      }
      // MAUL SEISMIC: slams knock foes down (longer stun)
      if (maul && boonLv("seismic") && e.hp > 0) {
        e.shockT = Math.max(e.shockT || 0, e.type === "boss" ? 0.3 : 0.6 + 0.2 * boonPow("seismic"));
      }
      // MAUL MAGMA CORE: slams set struck foes burning
      if (maul && boonLv("magma") && e.hp > 0) applyBurn(e, (4 + depth * 0.5) * boonPow("magma") * dmgMul());
      if (lunge && boonLv("skewer") && e.hp > 0) {
        e.kbx = (p.x - e.x) * 6; e.kby = (p.y - e.y) * 6;
      }
      // CHAIN WHIP: yank struck foes toward the wielder (heavy enemies barely budge — bosses/tanks resist)
      if (whip && e.hp > 0) {
        const resist = e.type === "boss" ? 0.12 : (e.type === "tank" ? 0.4 : 1);
        // pull toward a point near the player so they cluster (great with freeze/AoE)
        e.kbx += (p.x - e.x) * 7 * resist;
        e.kby += (p.y - e.y) * 7 * resist;
        if (boonLv("hookshot")) {
          hitEnemy(e, dmg * 0.45 * boonPow("hookshot"), 0, 0, false, false); // HOOKSHOT bonus damage
          if (e.hp > 0) e.shockT = Math.max(e.shockT || 0, e.type === "boss" ? 0.2 : 0.45); // brief stun (reuses shock-stun)
        }
        // WHIP LIVE WIRE: hits shock & chain lightning (works with freeze->shatter)
        if (boonLv("electrowhip") && e.hp > 0) applyShock(e, 5 * boonPow("electrowhip") * dmgMul(), 1);
        // WHIP CONSTRICT: yanked foes are rooted briefly and take ramping damage
        if (boonLv("constrict") && e.hp > 0) {
          e.constrictT = Math.max(e.constrictT || 0, e.type === "boss" ? 0.5 : 1.1);
          e.constrictDps = (4 + depth * 0.5) * boonPow("constrict") * dmgMul();
        }
      }
      if (boonLv("ignite")) applyBurn(e, 4 * boonPow("ignite") * dmgMul()); // IGNITION EDGE
      // TWIN FANG: frenzy ramp + EXSANGUINATE bleed-on-crit + VENOM stacking poison
      if (fang) {
        p.frenzyN = Math.min(8, (p.frenzyN || 0) + 1); p.frenzyT = 1.2;
        if (crit && boonLv("exsang") && e.hp > 0) applyBurn(e, (3 + depth * 0.4) * boonPow("exsang") * dmgMul());
        if (boonLv("venom") && e.hp > 0) applyBurn(e, (2 + depth * 0.3) * boonPow("venom") * dmgMul());
      }
      // ARC CASTER: CONDUCTOR always shocks struck foes
      if (arcW && boonLv("conduct") && e.hp > 0) applyShock(e, 4 * dmgMul(), 0);
      // ARC SUPERCONDUCT: shock that chains 1 (applyShock auto-triggers FREEZE->SHATTER on frozen foes)
      if (arcW && boonLv("supercond") && e.hp > 0) applyShock(e, 4 * boonPow("supercond") * dmgMul(), 1);
      if (arcW && !arcHits.includes(e)) arcHits.push(e);
      hitAny = true;
      // chain lightning (boon, all weapons)
      const cl = boonLv("chain");
      if (cl) {
        let from = e, chained = 0;
        const hitIds = [e];
        const chFrac = Math.min(1.1, 0.5 + 0.1 * boonPow("chain"));
        while (chained < cl) {
          let tgt = null, bd = 170;
          for (const o of enemies) {
            if (o.hp <= 0 || hitIds.includes(o)) continue;
            const dd = dist(from.x, from.y, o.x, o.y);
            if (dd < bd) { bd = dd; tgt = o; }
          }
          if (!tgt) break;
          beams.push({ x1: from.x, y1: from.y, x2: tgt.x, y2: tgt.y, t: 0.18, col: "#8cc8ff" });
          sparkLine(from.x, from.y, tgt.x, tgt.y, "#8cc8ff", 8);
          hitEnemy(tgt, dmg * chFrac, 0, 0, false, false);
          hitIds.push(tgt);
          from = tgt; chained++;
        }
      }
    }
  };
  for (let s = 0; s < swings; s++) doSwing(swings === 1 ? 0 : (s - 1) * 0.22 * p.slashSide);
  // ARC CASTER signature: a small zap chains between every enemy hit in the cone/line
  if (arcW && arcHits.length >= 2) {
    const jumps = 2 + boonLv("overld") * 2; // OVERLOAD: +2 jumps per pick
    const zapDmg = dmg * 0.45;
    for (let i = 0; i < arcHits.length - 1; i++) {
      const a2 = arcHits[i], b2 = arcHits[i + 1];
      beams.push({ x1: a2.x, y1: a2.y, x2: b2.x, y2: b2.y, t: 0.2, col: W.col });
      sparkLine(a2.x, a2.y, b2.x, b2.y, W.col, 6);
      ffx.spawnLight((a2.x + b2.x) / 2, (a2.y + b2.y) / 2, 60, W.col, 0.4);
    }
    // additional jumps from the last struck foe to nearby unhit enemies
    let from = arcHits[arcHits.length - 1], used = arcHits.slice(), jumped = 0;
    while (jumped < jumps) {
      let tgt = null, bd = 200;
      for (const o of enemies) {
        if (o.hp <= 0 || used.includes(o)) continue;
        const dd = dist(from.x, from.y, o.x, o.y);
        if (dd < bd) { bd = dd; tgt = o; }
      }
      if (!tgt) break;
      beams.push({ x1: from.x, y1: from.y, x2: tgt.x, y2: tgt.y, t: 0.2, col: W.col });
      sparkLine(from.x, from.y, tgt.x, tgt.y, W.col, 6);
      hitEnemy(tgt, zapDmg, 0, 0, false, false);
      if (boonLv("conduct") && tgt.hp > 0) applyShock(tgt, 3 * dmgMul(), 0);
      used.push(tgt); from = tgt; jumped++;
    }
    audio.arcZap();
  }
  // ARC FIELD: the arc swing leaves a lingering shocking field at its reach
  if (arcW && boonLv("arcfield")) {
    const fx = p.x + Math.cos(p.slashAng) * range * 0.7, fy = p.y + Math.sin(p.slashAng) * range * 0.7;
    zones.push({ x: fx, y: fy, r: 54, t: 1.4 + 0.3 * boonPow("arcfield"), tick: 0, shock: true, dps: (4 + depth * 0.5) * boonPow("arcfield") * dmgMul() });
    ffx.spawnLight(fx, fy, 60, W.col, 0.5);
  }
  // PRISM SABER signature: the slash emits a forward piercing energy beam (a second damage tick in a line ahead).
  // OVERCHARGE+ grows the beam with consecutive hits; REFRACTION fans it into a V.
  if (prism) {
    // OVERCHARGE+ charge ramps with consecutive slashes (decays via prismT in the player update)
    p.prismN = Math.min(6, (p.prismN || 0) + 1); p.prismT = 1.4;
    const charge = boonLv("ocharge") ? Math.min(1, 0.18 * boonPow("ocharge") * p.prismN) : 0;
    const beamLen = range * (1.45 + charge * 0.8);
    const beamW = (16 + charge * 18); // half-width of the in-line hit band
    const beamDmg = dmg * (0.55 + charge * 0.6); // second tick; balanced vs power budget (forward-only payoff)
    const angs = boonLv("refract") ? [0, -0.32, 0.32] : [0]; // REFRACTION: V-split
    const piercedAny = [];
    for (const off of angs) {
      const ba = p.slashAng + off;
      const ex = p.x + Math.cos(ba) * beamLen, ey = p.y + Math.sin(ba) * beamLen;
      beams.push({ x1: p.x, y1: p.y, x2: ex, y2: ey, t: 0.16, col: W.col });
      sparkLine(p.x, p.y, ex, ey, W.col, 6);
      ffx.spawnLight((p.x + ex) / 2, (p.y + ey) / 2, 50, W.col, 0.4);
      for (const e of enemies) {
        if (e.hp <= 0 || piercedAny.includes(e)) continue;
        // point-to-segment distance from the enemy to the beam line
        const dx = ex - p.x, dy = ey - p.y;
        const len2 = dx * dx + dy * dy || 1;
        let t = ((e.x - p.x) * dx + (e.y - p.y) * dy) / len2;
        t = clamp(t, 0, 1);
        const px = p.x + dx * t, py = p.y + dy * t;
        if (dist(px, py, e.x, e.y) > beamW + e.r) continue;
        const crit = critRoll();
        hitEnemy(e, beamDmg, Math.cos(ba) * 90, Math.sin(ba) * 90, crit, true); // pierces (no break)
        if (e.hp > 0 && boonLv("ignite")) applyBurn(e, 4 * boonPow("ignite") * dmgMul());
        // PRISM SOLAR FLARE: the beam ignites foes (and naturally pierces shields, being a beam)
        if (e.hp > 0 && boonLv("prismburn")) applyBurn(e, (4 + depth * 0.5) * boonPow("prismburn") * dmgMul());
        piercedAny.push(e);
        hitAny = true;
      }
    }
    // PRISM LIGHTSPEED: a charged beam blinks the wielder forward through foes with i-frames
    if (boonLv("lightspeed") && charge > 0.45) {
      p.dashDX = Math.cos(p.slashAng); p.dashDY = Math.sin(p.slashAng);
      p.dashT = Math.max(p.dashT, 0.12);
      p.ifr = Math.max(p.ifr, 0.18 + 0.06 * boonPow("lightspeed"));
      burst(p.x, p.y, W.col, 8, 180, 0.3, 2.4);
    }
    audio.prismBeam();
  }
  // LANCE GUNGNIR: every thrust fires a piercing energy spike down the line
  if (W.id === "lance" && boonLv("gungnir")) {
    const ba = p.slashAng;
    const beamLen = range * 2.2;
    const ex = p.x + Math.cos(ba) * beamLen, ey = p.y + Math.sin(ba) * beamLen;
    const spikeDmg = dmg * (0.55 + 0.15 * boonPow("gungnir"));
    beams.push({ x1: p.x, y1: p.y, x2: ex, y2: ey, t: 0.16, col: W.col });
    sparkLine(p.x, p.y, ex, ey, W.col, 6);
    const dx = ex - p.x, dy = ey - p.y, len2 = dx * dx + dy * dy || 1;
    for (const e of enemies) {
      if (e.hp <= 0) continue;
      let t = clamp(((e.x - p.x) * dx + (e.y - p.y) * dy) / len2, 0, 1);
      if (dist(p.x + dx * t, p.y + dy * t, e.x, e.y) > 14 + e.r) continue;
      hitEnemy(e, spikeDmg, Math.cos(ba) * 80, Math.sin(ba) * 80, critRoll(), true);
      if (e.hp > 0 && boonLv("ignite")) applyBurn(e, 4 * boonPow("ignite") * dmgMul());
      hitAny = true;
    }
  }
  // volatile barrels can be struck by melee
  for (const b of barrels) {
    if (b.dead || b.fuse >= 0) continue;
    const d = dist(p.x, p.y, b.x, b.y);
    if (d > range + b.r) continue;
    const a = angTo(p.x, p.y, b.x, b.y);
    if (Math.abs(angDiff(p.slashAng, a)) > arc / 2 + Math.atan2(b.r, Math.max(1, d))) continue;
    igniteBarrel(b, 0.06);
    hitAny = true;
  }
  if (maul) { // heavy slam: shockwave ring + AFTERSHOCK quake
    novas.push({ x: p.x, y: p.y, t: 0.35, tm: 0.35, maxR: range + 16, col: "#ff9966" });
    shake(4, 0.18);
    audio.maulSlam();
    ffx.spawnLight(p.x, p.y, range + 24, "#ff9966", 0.8);
    if (boonLv("ashock")) {
      quakes.push({ x: p.x, y: p.y, r: range * 0.85, t: 1.4, tm: 1.4, tick: 0.25, dps: (5 + depth) * dmgMul() * boonPow("ashock") });
    }
  }
  // CHAIN WHIP FLECHETTE: the tip cracks a small shockwave at max reach
  if (whip && boonLv("flechette")) {
    const tx = p.x + Math.cos(p.slashAng) * range, ty = p.y + Math.sin(p.slashAng) * range;
    const fr = 56 + 14 * boonPow("flechette");
    novas.push({ x: tx, y: ty, t: 0.3, tm: 0.3, maxR: fr, col: W.col });
    ffx.spawnLight(tx, ty, fr, W.col, 0.6);
    burst(tx, ty, W.col, 10, 200, 0.35, 2.5);
    for (const e of enemies) {
      if (e.hp <= 0) continue;
      if (dist(tx, ty, e.x, e.y) < fr + e.r) {
        hitEnemy(e, dmg * 0.5 * boonPow("flechette"), (e.x - tx) * 2, (e.y - ty) * 2, false, true);
        if (e.hp > 0 && boonLv("ignite")) applyBurn(e, 4 * boonPow("ignite") * dmgMul());
        hitAny = true;
      }
    }
  }
  if (flurry) { audio.fangFlurry(); if (hitAny) ffx.trauma(0.18); }
  if (hitAny) shake(2.5, 0.1);
}

/* spawn a single pooled glaive along an angle (shared by throw + TWIN GLAIVE) */
function spawnGlaive(p, W, ang, dmg, reach, speed) {
  let g = glaivePool.pop();
  if (!g) g = { x: 0, y: 0, ang: 0, dist: 0, reach: 0, speed: 0, dmg: 0, leg: 0, spin: 0,
                col: "#7fffd0", owner: null, hitSet: [], bounces: 0, t: 0, hoverT: 0 };
  g.x = p.x; g.y = p.y; g.ang = ang; g.dist = 0; g.reach = reach;
  g.speed = speed; g.dmg = dmg; g.leg = 0 /* 0 = outbound, 1 = returning */; g.spin = 0;
  g.col = W.col; g.owner = p; g.hitSet.length = 0; g.bounces = 0; g.t = 0;
  // CYCLONE: the blade hovers and spins at full reach before returning (extra hit window)
  g.hoverT = boonLv("tempest2") ? 0.5 + 0.25 * boonPow("tempest2") : 0;
  glaives.push(g);
}

/* GLAIVE: hurl a spinning blade out along the aim; it flies out, then returns to the wielder,
   damaging foes on BOTH legs (each enemy can be hit once per leg). Pooled to avoid per-throw allocs. */
function throwGlaive(p, W) {
  p.slashCD = CONFIG.meleeCD * W.cdMul;
  p.slashAng = p.aim;
  p.recoilT = 0.18;
  p.glaiveOut = true;
  audio.glaiveThrow();
  const reach = meleeRangeNow() * 3.1; // ranged-ish: travels well past normal melee
  const speed = 760;
  const dmg = meleeDamage();
  spawnGlaive(p, W, p.slashAng, dmg, reach, speed);
  // TWIN GLAIVE: hurl a second blade in a mirrored arc (slightly weaker so it isn't a flat 2x)
  if (boonLv("twinblade")) spawnGlaive(p, W, p.slashAng + 0.4, dmg * 0.8, reach, speed);
  ffx.spawnLight(p.x, p.y, 50, W.col, 0.5);
  burst(p.x + Math.cos(p.slashAng) * 16, p.y + Math.sin(p.slashAng) * 16, W.col, 6, 160, 0.25, 2.5);
}

/* glaive flight: outbound to reach, then homes back to its owner; hits each foe once per leg. */
function updateGlaives(dt) {
  for (const g of glaives) {
    g.t += dt; g.spin += dt * 26;
    const p = g.owner;
    if (g.leg === 0) {
      // outbound straight along throw angle
      g.x += Math.cos(g.ang) * g.speed * dt;
      g.y += Math.sin(g.ang) * g.speed * dt;
      g.dist += g.speed * dt;
      if (g.dist >= g.reach) {
        if ((g.hoverT || 0) > 0) { g.leg = 2; g.hoverTick = 0; } // CYCLONE: hover & spin at reach
        else { g.leg = 1; g.hitSet.length = 0; } // returning leg can re-hit
      }
    } else if (g.leg === 2) {
      // CYCLONE hover: spin in place, re-arming its hit set periodically so it grinds foes
      g.hoverT -= dt;
      g.hoverTick = (g.hoverTick || 0) - dt;
      if (g.hoverTick <= 0) { g.hoverTick = 0.18; g.hitSet.length = 0; }
      if (g.hoverT <= 0) { g.leg = 1; g.hitSet.length = 0; }
    } else {
      // home back toward the (possibly moved) owner
      if (p) {
        const a = angTo(g.x, g.y, p.x, p.y);
        g.x += Math.cos(a) * g.speed * dt;
        g.y += Math.sin(a) * g.speed * dt;
        if (dist(g.x, g.y, p.x, p.y) < p.r + 12) { catchGlaive(g); continue; }
      } else { catchGlaive(g); continue; }
    }
    // damage pass (one hit per enemy per leg)
    ctxP = p;
    for (const e of enemies) {
      if (e.hp <= 0 || g.hitSet.includes(e)) continue;
      if (dist(g.x, g.y, e.x, e.y) > e.r + 12) continue;
      const returning = g.leg === 1;
      let crit = critRoll();
      if (returning && boonLv("velret")) crit = true; // RETURN VELOCITY: returning hits crit
      const a = g.leg === 0 ? g.ang : angTo(g.x, g.y, e.x, e.y);
      hitEnemy(e, g.dmg, Math.cos(a) * 180, Math.sin(a) * 180, crit, true);
      if (e.hp > 0 && boonLv("ignite")) applyBurn(e, 4 * boonPow("ignite") * dmgMul());
      g.hitSet.push(e);
      // RICOCHET: glaive can bounce toward another nearby foe (redirect the outbound leg)
