      if (boonLv("ricochet") && g.bounces < boonPow("ricochet") * 2) {
        let tgt = null, bd = 220;
        for (const o of enemies) {
          if (o.hp <= 0 || g.hitSet.includes(o)) continue;
          const dd = dist(g.x, g.y, o.x, o.y);
          if (dd < bd) { bd = dd; tgt = o; }
        }
        if (tgt) { g.ang = angTo(g.x, g.y, tgt.x, tgt.y); g.bounces++; g.dist = Math.max(0, g.dist - 60); }
      }
    }
    // collide with arena bounds -> start returning early
    if (g.leg === 0 && (g.x < CONFIG.wall || g.x > CONFIG.arenaW - CONFIG.wall ||
        g.y < CONFIG.wall || g.y > CONFIG.arenaH - CONFIG.wall)) { g.leg = 1; g.hitSet.length = 0; }
    // trail spark
    if (Math.random() < 0.5) addPart({ x: g.x, y: g.y, vx: rand(-20, 20), vy: rand(-20, 20), t: 0.25, tm: 0.25, col: g.col, r: rand(1, 2.4), drag: 1.5 });
  }
}

/* glaive caught: free melee again, apply RETURN VELOCITY speed buff, recycle to the pool */
function catchGlaive(g) {
  const p = g.owner;
  if (p) {
    p.glaiveOut = false;
    if (boonLv("velret")) p.velBuffT = Math.max(p.velBuffT || 0, 1.4 * boonPow("velret"));
    ffx.spawnLight(p.x, p.y, 44, g.col, 0.4);
  }
  audio.glaiveCatch();
  const i = glaives.indexOf(g);
  if (i >= 0) glaives.splice(i, 1);
  g.hitSet.length = 0; g.owner = null;
  if (glaivePool.length < 24) glaivePool.push(g);
}

/* ---------------- §L2 STAFF / WAND SPELLCASTING ---------------- */
/* grab a pooled spell object (no per-cast allocation in the hot path) */
function getSpell() {
  let s = spellPool.pop();
  if (!s) s = { kind: "", x: 0, y: 0, vx: 0, vy: 0, ang: 0, r: 0, t: 0, tm: 0,
                dmg: 0, col: "#fff", owner: null, hitSet: [], spin: 0,
                pierce: 0, empowered: false, blastR: 0, slow: 0 };
  s.hitSet.length = 0; s.empowered = false; s.pierce = 0; s.slow = 0; s.spin = 0;
  return s;
}
function freeSpell(s) {
  const i = spells.indexOf(s);
  if (i >= 0) spells.splice(i, 1);
  s.hitSet.length = 0; s.owner = null;
  if (spellPool.length < 40) spellPool.push(s);
}

/* slash-button cast for the three caster forms — distinctly magical, ranged/area. */
function castSpell(p, W) {
  ctxP = p;
  p.castCD = (W.castCD || 0.5);
  p.castN = (p.castN || 0) + 1;
  p.slashAng = p.aim;
  p.recoilT = 0.18;        // cast pose (reuses the weapon-arm recoil window)
  const a = p.slashAng;
  const base = spellDamage();
  if (W.id === "ember") {
    // EMBER STAFF: lob a fireball; explodes in an AoE on impact + leaves a burning patch.
    // METEOR: every few casts launch an empowered, stunning fireball.
    p.castCD = 0.54;
    const meteor = boonLv("meteor") && (p.castN % 4 === 0);
    const s = getSpell();
    s.kind = "fire"; s.x = p.x + Math.cos(a) * 16; s.y = p.y + Math.sin(a) * 16;
    const spd = 360;
    s.vx = Math.cos(a) * spd; s.vy = Math.sin(a) * spd; s.ang = a;
    s.r = meteor ? 9 : 6; s.t = 1.4; s.tm = 1.4;
    s.dmg = base * (meteor ? 1.6 : 1.15); s.col = W.col; s.owner = p;
    s.blastR = (70 + 18 * boonPow("conflag")) * (meteor ? 1.35 : 1);
    s.empowered = meteor;
    spells.push(s);
    ffx.spawnLight(s.x, s.y, 50, W.col, 0.5);
    burst(s.x, s.y, W.col, 6, 150, 0.25, 2.5);
    audio.emberCast(meteor);
  } else if (W.id === "frost") {
    // FROST WAND: fast piercing icebolt; slows + builds FREEZE stacks. ICE LANCE: pierces all & shatters frozen.
    // BLIZZARD: the shot splits into 3 chilling shards (slightly weaker each).
    p.castCD = 0.42;
    const blizzard = boonLv("blizzard");
    const angs = blizzard ? [0, -0.18, 0.18] : [0];
    const shardDmg = base * 0.92 * (blizzard ? 0.7 : 1);
    for (const off of angs) {
      const ca = a + off;
      const s = getSpell();
      s.kind = "ice"; s.x = p.x + Math.cos(ca) * 16; s.y = p.y + Math.sin(ca) * 16;
      const spd = 720;
      s.vx = Math.cos(ca) * spd; s.vy = Math.sin(ca) * spd; s.ang = ca;
      s.r = 6; s.t = 1.0; s.tm = 1.0;
      s.dmg = shardDmg; s.col = W.col; s.owner = p;
      s.pierce = boonLv("icelance") ? 99 : (1 + Math.round(boonPow("pierce")));
      s.slow = 0.55;
      spells.push(s);
    }
    ffx.spawnLight(p.x + Math.cos(a) * 16, p.y + Math.sin(a) * 16, 44, W.col, 0.45);
    burst(p.x + Math.cos(a) * 16, p.y + Math.sin(a) * 16, W.col, 5, 160, 0.2, 2.2);
    audio.frostCast();
  } else { // storm
    // STORM STAFF: emit a chaining lightning bolt that arcs to several nearby foes, applying SHOCK.
    p.castCD = 0.5;
    castStorm(p, W, a, base);
  }
}

/* STORM STAFF: pick the nearest foe in the aim half, then chain a lightning bolt through several. */
function castStorm(p, W, a, base) {
  audio.stormCast();
  p.recoilT = 0.2;
  const maxChains = 3 + boonLv("tempest") * 2; // base 3 jumps, TEMPEST +2 each
  const falloff = boonLv("tempest") ? Math.max(0.78, 0.7 + 0.06 * boonPow("tempest")) : 0.7;
  // first target: nearest enemy within range, biased toward the aim direction
  let first = null, bestScore = Infinity;
  const aimRange = 420;
  for (const e of enemies) {
    if (e.hp <= 0) continue;
    const d = dist(p.x, p.y, e.x, e.y);
    if (d > aimRange) continue;
    const ad = Math.abs(angDiff(a, angTo(p.x, p.y, e.x, e.y)));
    const score = d + ad * 120; // prefer near + on-aim
    if (ad < 1.4 && score < bestScore) { bestScore = score; first = e; }
  }
  // visual stub even with no target: a forward zap arc
  if (!first) {
    const ex = p.x + Math.cos(a) * 180, ey = p.y + Math.sin(a) * 180;
    beams.push({ x1: p.x, y1: p.y, x2: ex, y2: ey, t: 0.16, col: W.col });
    sparkLine(p.x, p.y, ex, ey, W.col, 6);
    ffx.spawnLight(ex, ey, 40, W.col, 0.4);
    return;
  }
  let from = { x: p.x, y: p.y }, used = [], dmg = base * 1.0;
  let cur = first, jumps = 0;
  while (cur && jumps <= maxChains) {
    let crit = critRoll();
    if (!boonLv("overvolt") && jumps > 0) crit = false; // OVERVOLT lets chain links crit too
    let d = dmg;
    if (boonLv("overvolt") && (cur.shockT || 0) > 0) d *= 1 + 0.4 * boonPow("overvolt"); // bonus vs already-shocked
    beams.push({ x1: from.x, y1: from.y, x2: cur.x, y2: cur.y, t: 0.2, col: W.col });
    sparkLine(from.x, from.y, cur.x, cur.y, W.col, 6);
    ffx.spawnLight(cur.x, cur.y, 46, W.col, 0.4);
    hitEnemy(cur, d, 0, 0, crit, false);
    if (cur.hp > 0) applyShock(cur, 4 * dmgMul(), 0); // STORM always shocks (interacts w/ freeze->shatter)
    if (cur.hp > 0 && boonLv("ignite")) applyBurn(cur, 4 * boonPow("ignite") * dmgMul());
    used.push(cur);
    from = { x: cur.x, y: cur.y };
    dmg *= falloff;
    // next nearest unhit foe
    let nxt = null, bd = 220;
    for (const o of enemies) {
      if (o.hp <= 0 || used.includes(o)) continue;
      const dd = dist(from.x, from.y, o.x, o.y);
      if (dd < bd) { bd = dd; nxt = o; }
    }
    cur = nxt; jumps++;
  }
  // THUNDERCLAP: the first struck target detonates a shock AoE around itself
  if (boonLv("thunderclap") && first && first.hp > 0) {
    const tr = 80 + 12 * boonPow("thunderclap"), tx = first.x, ty = first.y;
    novas.push({ x: tx, y: ty, t: 0.28, tm: 0.28, maxR: tr, col: W.col });
    ffx.ring(tx, ty, tr, W.col, 0.32, 4);
    burst(tx, ty, W.col, 14, 240, 0.4, 3);
    for (const o of enemies) {
      if (o.hp <= 0 || o === first) continue;
      if (dist(tx, ty, o.x, o.y) < tr + o.r) {
        statusDamage(o, base * (0.5 + 0.12 * boonPow("thunderclap")), "#ffee55");
        if (o.hp > 0) applyShock(o, 4 * dmgMul(), 0);
      }
    }
  }
  // BALL LIGHTNING: lob a slow orb that drifts forward and zaps nearby foes
  if (boonLv("ballight")) {
    const s = getSpell();
    s.kind = "ball"; s.x = p.x + Math.cos(a) * 18; s.y = p.y + Math.sin(a) * 18;
    s.vx = Math.cos(a) * 150; s.vy = Math.sin(a) * 150; s.ang = a;
    s.r = 10; s.t = 1.8; s.tm = 1.8;
    s.dmg = base * (0.35 + 0.08 * boonPow("ballight")); s.col = W.col; s.owner = p;
    s.zapTick = 0;
    spells.push(s);
    ffx.spawnLight(s.x, s.y, 48, W.col, 0.5);
  }
  shake(2, 0.08);
}

/* spell projectiles (pooled): fireball (arcs, explodes), icebolt (pierces, slows). */
function updateSpells(dt) {
  const A = CONFIG;
  for (let si = spells.length - 1; si >= 0; si--) {
    const s = spells[si];
    ctxP = s.owner || player;
    s.x += s.vx * dt; s.y += s.vy * dt; s.t -= dt; s.spin += dt * 18;
    // trail spark (cheap, respects particle cap via addPart)
    if (Math.random() < 0.6) addPart({ x: s.x, y: s.y, vx: rand(-18, 18), vy: rand(-18, 18),
      t: 0.22, tm: 0.22, col: s.col, r: rand(1.4, 2.6), drag: 2 });
    let detonate = false;
    if (s.x < A.wall || s.x > A.arenaW - A.wall || s.y < A.wall || s.y > A.arenaH - A.wall) detonate = true;
    else if (pointInPillar(s.x, s.y, s.r)) detonate = true;
    else if (s.t <= 0) detonate = true;
    if (s.kind === "fire") {
      // fireball: impact on first enemy -> AoE blast
      if (!detonate) {
        for (const e of enemies) {
          if (e.hp <= 0) continue;
          if (dist(s.x, s.y, e.x, e.y) < s.r + e.r) { detonate = true; break; }
        }
      }
      if (detonate) { emberBlast(s); freeSpell(s); continue; }
    } else if (s.kind === "ice") {
      // icebolt: pierces; slows + builds freeze; ICE LANCE shatters frozen foes
      for (const e of enemies) {
        if (e.hp <= 0 || s.hitSet.includes(e)) continue;
        if (dist(s.x, s.y, e.x, e.y) >= s.r + e.r) continue;
        if (shieldBlocks(e, s.x - s.vx * 0.02, s.y - s.vy * 0.02)) {
          burst(s.x, s.y, "#88aaff", 6, 140, 0.25, 2); audio.clank(); detonate = true; break;
        }
        frostHitEnemy(s, e);
        s.hitSet.push(e);
        if (s.pierce > 0) s.pierce--; else { detonate = true; break; }
      }
      // barrels
      if (!detonate) for (const bl of barrels) {
        if (bl.dead || bl.fuse >= 0) continue;
        if (dist(s.x, s.y, bl.x, bl.y) < s.r + bl.r) { igniteBarrel(bl, 0.06); if (s.pierce > 0) s.pierce--; else detonate = true; break; }
      }
      if (detonate) { burst(s.x, s.y, s.col, 6, 150, 0.25, 2.4); freeSpell(s); continue; }
    } else if (s.kind === "ball") {
      // BALL LIGHTNING: slow orb that periodically zaps + shocks nearby foes; fades out
      s.vx *= Math.pow(0.45, dt); s.vy *= Math.pow(0.45, dt); // drag to a hover
      s.zapTick = (s.zapTick || 0) - dt;
      if (s.zapTick <= 0) {
        s.zapTick = 0.22;
        for (const e of enemies) {
          if (e.hp <= 0) continue;
          if (dist(s.x, s.y, e.x, e.y) < 90 + e.r) {
            beams.push({ x1: s.x, y1: s.y, x2: e.x, y2: e.y, t: 0.12, col: s.col });
            statusDamage(e, s.dmg, "#ffee55");
            if (e.hp > 0) applyShock(e, 3 * dmgMul(), 0);
          }
        }
      }
      if (Math.random() < 0.5) sparkLine(s.x + rand(-8, 8), s.y + rand(-8, 8), s.x + rand(-8, 8), s.y + rand(-8, 8), s.col, 2);
      if (detonate) { burst(s.x, s.y, s.col, 8, 160, 0.3, 2.6); freeSpell(s); continue; }
    }
  }
}

/* FROST WAND per-hit: damage, slow, build freeze stacks; PERMAFROST builds faster/longer.
   ICE LANCE shatters already-frozen foes for a big burst. */
function frostHitEnemy(s, e) {
  const crit = critRoll();
  const a = Math.atan2(s.vy, s.vx);
  // FROST NOVA: striking an already-frozen foe emits a chilling nova (slow + chip + freeze-build to nearby)
  if (boonLv("frostnova") && e.frozenT > 0) {
    const nr = 70 + 10 * boonPow("frostnova"), nx = e.x, ny = e.y;
    novas.push({ x: nx, y: ny, t: 0.3, tm: 0.3, maxR: nr, col: "#bfeeff" });
    burst(nx, ny, "#bfe8ff", 12, 200, 0.4, 2.6);
    for (const o of enemies) {
      if (o === e || o.hp <= 0) continue;
      if (dist(nx, ny, o.x, o.y) < nr + o.r) {
        statusDamage(o, (5 + depth * 0.5) * boonPow("frostnova") * dmgMul(), "#bfeeff");
        o.iceSlow = Math.max(o.iceSlow || 0, 0.5); o.iceSlowT = Math.max(o.iceSlowT || 0, 1.0);
        o.freezeBuild = (o.freezeBuild || 0) + 0.35;
      }
    }
  }
  // ICE LANCE: striking a frozen foe shatters it for bonus damage
  if (boonLv("icelance") && e.frozenT > 0) {
    e.frozenT = 0;
    burst(e.x, e.y, "#cfeeff", 18, 280, 0.5, 3.2);
    dnum(e.x, e.y - e.r - 14, "ICE LANCE", "#bfeeff", true);
    audio.shatter();
    statusDamage(e, (24 + depth * 2.2) * dmgMul() * (1 + 0.3 * boonPow("icelance")), "#bfeeff");
  }
  hitEnemy(e, s.dmg, Math.cos(a) * 90, Math.sin(a) * 90, crit, false);
  if (e.hp <= 0) return;
  e.iceSlow = Math.max(e.iceSlow || 0, s.slow);
  e.iceSlowT = Math.max(e.iceSlowT || 0, 1.2);
  // build freeze: stacks accumulate to a full freeze; PERMAFROST builds faster + lasts longer
  const buildRate = boonLv("permaf") ? 0.5 + 0.18 * boonPow("permaf") : 0.34;
  e.freezeBuild = (e.freezeBuild || 0) + buildRate;
  if (e.frozenT <= 0 && e.freezeBuild >= 1 && canFreeze(e)) {
    e.freezeBuild = 0;
    if ((e.shockT || 0) > 0) { shatterCombo(e); return; } // FREEZE + SHOCK = SHATTER
    if ((e.burnT || 0) > 0) { thermalSnap(e); return; }   // BURN + FREEZE = THERMAL SNAP
    const dur = (e.type === "boss" ? CONFIG.freezeBossDur : CONFIG.freezeDur) * (boonLv("permaf") ? 1 + 0.25 * boonPow("permaf") : 1);
    e.frozenT = dur; e.vx = 0; e.vy = 0;
    burst(e.x, e.y, "#bfe8ff", 8, 130, 0.4, 2.5);
  }
  if (e.hp > 0 && boonLv("ignite")) applyBurn(e, 4 * boonPow("ignite") * dmgMul());
}

/* EMBER STAFF fireball detonation: AoE damage + applies BURN, leaves a burning patch (zone).
   CONFLAGRATION enlarges the blast & spreads burn between close foes; METEOR shots stun. */
function emberBlast(s) {
  ctxP = s.owner || player;
  const R = s.blastR;
  burst(s.x, s.y, s.col, 22, 320, 0.55, 3.6);
  burst(s.x, s.y, "#ffe0aa", 10, 240, 0.35, 2.6);
  novas.push({ x: s.x, y: s.y, t: 0.32, tm: 0.32, maxR: R, col: s.col });
  ffx.ring(s.x, s.y, R, s.col, 0.4, 5);
  ffx.spawnLight(s.x, s.y, R + 20, s.col, 0.9);
  if (s.empowered) { ffx.pulse(s.x, s.y, 7); shake(5, 0.2); } else shake(3, 0.12);
  audio.emberBlast(s.empowered);
  const hit = [];
  for (const e of enemies) {
    if (e.hp <= 0) continue;
    if (dist(s.x, s.y, e.x, e.y) >= R + e.r) continue;
    const a = angTo(s.x, s.y, e.x, e.y);
    const crit = critRoll();
    hitEnemy(e, s.dmg, Math.cos(a) * 200, Math.sin(a) * 200, crit, false);
    if (e.hp > 0) {
      applyBurn(e, (5 + depth * 0.4) * dmgMul()); // naturally applies BURN
      if (s.empowered) e.shockT = Math.max(e.shockT || 0, e.type === "boss" ? 0.4 : 0.9); // METEOR stun (reuses shock-stun)
      hit.push(e);
    }
  }
  // CONFLAGRATION: burn spreads between close foes
  if (boonLv("conflag")) {
    for (const e of hit) {
      for (const o of enemies) {
        if (o === e || o.hp <= 0 || (o.burnT || 0) > 0) continue;
        if (dist(e.x, e.y, o.x, o.y) < 64) applyBurn(o, (5 + depth * 0.4) * dmgMul());
      }
    }
  }
  // leave a burning patch (reuses the AFTERBURN zone path but with its own DPS).
  // FIRE WALL: bigger, longer-lasting, and chills (slows) foes standing in it.
  const fw = boonLv("firewall");
  zones.push({
    x: s.x, y: s.y, r: R * 0.6 * (fw ? 1 + 0.3 * boonPow("firewall") : 1),
    t: 1.6 * (fw ? 1 + 0.5 * boonPow("firewall") : 1), tick: 0, ember: true,
    dps: (4 + depth * 0.6) * dmgMul(), fireslow: fw > 0,
  });
  for (const bl of barrels) {
    if (!bl.dead && bl.fuse < 0 && dist(s.x, s.y, bl.x, bl.y) < R + bl.r) igniteBarrel(bl, 0.06);
  }
}

/* ---------------- §L3 BALLISTIC FIREARMS (GUN class) ---------------- */
/* Pooled bullet objects (no per-shot allocation in the hot path). Bullets are mechanical
   ballistic rounds — distinct from the magic `spells` and the plasma `pbolts` BOLT ability. */
function getBullet() {
  let b = bulletPool.pop();
  if (!b) b = { kind: "", x: 0, y: 0, vx: 0, vy: 0, ang: 0, r: 0, t: 0, tm: 0,
                dmg: 0, kb: 0, col: "#fff", owner: null, hitSet: [], pierce: 0,
                bounces: 0, falloff: 0, crit: false, pblank: false, ignite: 0, tracer: 0 };
  b.hitSet.length = 0; b.pierce = 0; b.bounces = 0; b.falloff = 0; b.crit = false; b.pblank = false; b.kb = 0;
  b.ignite = 0; b.tracer = 0;
  return b;
}
function freeBullet(b) {
  const i = bullets.indexOf(b);
  if (i >= 0) bullets.splice(i, 1);
  b.hitSet.length = 0; b.owner = null;
  if (bulletPool.length < 80) bulletPool.push(b);
}
function spawnBullet(p, kind, a, spd, dmg, col, r, opts) {
  // hard cap on live bullets so the rifle stream can't blow the pool/particle budget
  if (bullets.length >= 72) { const old = bullets[0]; if (old) freeBullet(old); }
  const b = getBullet();
  b.kind = kind;
  b.x = p.x + Math.cos(a) * (p.r + 4); b.y = p.y + Math.sin(a) * (p.r + 4);
  b.vx = Math.cos(a) * spd; b.vy = Math.sin(a) * spd; b.ang = a;
  b.r = r; b.dmg = dmg; b.col = col; b.owner = p;
  b.t = (opts && opts.life) || 1.2; b.tm = b.t;
  b.kb = (opts && opts.kb) || 0;
  b.pierce = (opts && opts.pierce) || 0;
  b.falloff = (opts && opts.falloff) || 0;   // per-pixel damage falloff fraction (scattergun)
  b.crit = !!(opts && opts.crit);
  b.pblank = !!(opts && opts.pblank);
  b.bounces = (opts && opts.bounces) || 0;
  b.ignite = (opts && opts.ignite) || 0;   // DRAGON'S BREATH incendiary burn power
  b.tracer = (opts && opts.tracer) || 0;   // TRACER FIRE mark power
  bullets.push(b);
  return b;
}

/* slash-button fire for the three firearm forms — distinctly ballistic, ranged. */
function fireGun(p, W) {
  ctxP = p;
  p.gunN = (p.gunN || 0) + 1;
  p.slashAng = p.aim;
  const a = p.slashAng;
  const base = gunDamage();
  if (W.id === "rifle") fireRifle(p, W, a, base);
  else if (W.id === "scatter") fireScatter(p, W, a, base);
  else fireRail(p, W, a, base);
}

/* base per-pellet/round damage for GUN firearms; shares the melee/HEAVY EDGE power budget
   (slash button drives it) but tuned low/per-pellet so sustained guns don't outclass melee. */
function gunDamage() { const p = ctxP || player; return CONFIG.meleeDmg * weaponDefP(p).dmgMul * dmgMul() * (1 + boonPow("blade") * 0.35) * p.meleeMul; }

/* AUTO-RIFLE: rapid low-damage rounds with mild spread + recoil. OVERHEAT ramps rate & damage
   on sustained fire; RICOCHET ROUNDS lets a round bounce once (wall or to a nearby foe). */
function fireRifle(p, W, a, base) {
  // OVERHEAT: each shot while sustaining fire ramps the counter; decays via heatT.
  if (boonLv("overheat")) { p.heatN = Math.min(20, (p.heatN || 0) + 1); p.heatT = 0.9; }
  const heat = boonLv("overheat") ? Math.min(1, 0.05 * (p.heatN || 0) * boonPow("overheat")) : 0;
  p.gunCD = W.fireCD * (1 - heat * 0.4);   // OVERHEAT: up to 40% faster
  p.recoilT = 0.1;
  const spread = (0.10 - heat * 0.04) * (Math.random() * 2 - 1); // recoil/spread, tightens as it heats
  const aa = a + spread;
  const dmg = base * 0.34 * (1 + heat * 0.5); // per-round low; OVERHEAT up to +50%
  // AP ROUNDS: rounds pierce extra foes and crit more often
  let crit = critRoll();
  if (boonLv("apr") && !crit) crit = Math.random() < 0.10 * boonPow("apr");
  spawnBullet(p, "rifle", aa, 760, dmg, W.col, 3.2, {
    life: 1.0, kb: 60, crit,
    pierce: boonLv("apr") ? 2 * Math.round(boonPow("apr")) : 0,
    bounces: boonLv("ricoR") ? Math.round(boonPow("ricoR")) : 0,
    tracer: boonLv("tracer") ? boonPow("tracer") : 0,
  });
  audio.rifleShot();
  if (Math.random() < 0.5) burst(p.x + Math.cos(aa) * 18, p.y + Math.sin(aa) * 18, "#ffe6b0", 2, 120, 0.14, 1.8);
}

/* SCATTERGUN: a tight cone of pellets — devastating point-blank, sharp range falloff, big knockback.
   DOUBLE BARREL adds a pellet; POINT BLANK boosts close damage and executes low-HP foes up close. */
function fireScatter(p, W, a, base) {
  p.gunCD = W.fireCD;
  p.recoilT = 0.2;
  const pellets = 6 + (boonLv("dbarrel") ? 1 + Math.round(boonPow("dbarrel")) : 0);
  const spread = 0.5;
  // SLUG ROUNDS: pellets fly far with far less falloff and hit much harder physically
  const slug = boonLv("slugs");
  const dragon = boonLv("dragonsbreath");
  for (let i = 0; i < pellets; i++) {
    const off = (i / (pellets - 1) - 0.5) * spread + rand(-0.04, 0.04);
    const aa = a + off;
    spawnBullet(p, "pellet", aa, 640 + rand(-40, 60), base * 0.42, W.col, slug ? 3.2 : 2.6, {
      life: slug ? 0.34 + 0.12 * boonPow("slugs") : 0.34,
      kb: slug ? 220 + 90 * boonPow("slugs") : 220,
      falloff: slug ? 0.0042 / (1 + 0.6 * boonPow("slugs")) : 0.0042,
      crit: critRoll(), pblank: boonLv("pblank") > 0,
      ignite: dragon ? boonPow("dragonsbreath") : 0,
    });
  }
  // recoil shove backward (mechanical kick)
  p.vx -= Math.cos(a) * 120; p.vy -= Math.sin(a) * 120;
  burst(p.x + Math.cos(a) * 18, p.y + Math.sin(a) * 18, "#ffd29a", 7, 200, 0.22, 2.4);
  ffx.spawnLight(p.x + Math.cos(a) * 24, p.y + Math.sin(a) * 24, 60, W.col, 0.5);
  shake(3, 0.1);
  audio.scatterShot();
}

/* RAILGUN: an instant charged piercing rail that hits everything along a line. Slow cadence;
   OVERCHARGE makes shots crit & pierce/reach further; RECOIL DASH kicks you back with i-frames. */
function fireRail(p, W, a, base) {
  p.gunCD = W.fireCD;
  p.recoilT = 0.24;
  const over = boonLv("ocharge2");
  const reachMul = over ? 1.35 + 0.15 * boonPow("ocharge2") : 1;
  const len = (560 * reachMul);
  // CAPACITOR: holding off between shots stores charge for bonus damage (capped); consumed here
  let capMul = 1;
  if (boonLv("chargeshot")) {
    const charge = Math.min(1, (p.railChargeT || 0) / 1.4); // ~1.4s to full
    capMul = 1 + charge * (0.6 + 0.3 * boonPow("chargeshot"));
    p.railChargeT = 0;
    if (charge > 0.5) { ffx.spawnLight(p.x, p.y, 80, W.col, 0.7); }
  }
  const dmg = base * 2.3 * (over ? 1.15 : 1) * capMul; // single big hit; balanced vs slow cadence
  const ex = clamp(p.x + Math.cos(a) * len, CONFIG.wall, CONFIG.arenaW - CONFIG.wall);
  const ey = clamp(p.y + Math.sin(a) * len, CONFIG.wall, CONFIG.arenaH - CONFIG.wall);
  // visual rail beam + sparks
  beams.push({ x1: p.x, y1: p.y, x2: ex, y2: ey, t: 0.22, col: W.col });
  beams.push({ x1: p.x, y1: p.y, x2: ex, y2: ey, t: 0.14, col: "#eafaff" });
  sparkLine(p.x, p.y, ex, ey, W.col, 10);
  ffx.spawnLight(p.x, p.y, 70, W.col, 0.6);
  ffx.spawnLight(ex, ey, 60, W.col, 0.5);
  shake(5, 0.18);
  audio.railShot();
  // hitscan: damage every enemy whose center is within the rail band
  const dx = ex - p.x, dy = ey - p.y, len2 = dx * dx + dy * dy || 1;
  const bandW = 16 + (over ? 6 : 0);
  for (const e of enemies) {
    if (e.hp <= 0) continue;
    let t = ((e.x - p.x) * dx + (e.y - p.y) * dy) / len2;
    t = clamp(t, 0, 1);
    const px = p.x + dx * t, py = p.y + dy * t;
    if (dist(px, py, e.x, e.y) > bandW + e.r) continue;
    if (shieldBlocks(e, p.x, p.y)) { e.exposeT = 1.1; e.kbx += Math.cos(a) * 200; audio.clank(); continue; }
    let crit = critRoll() || over;       // OVERCHARGE: full-charge shots always crit
    hitEnemy(e, dmg, Math.cos(a) * 160, Math.sin(a) * 160, crit, false);
    if (e.hp > 0 && boonLv("ignite")) applyBurn(e, 4 * boonPow("ignite") * dmgMul());
  }
  for (const bl of barrels) {
    if (bl.dead || bl.fuse >= 0) continue;
    let t = ((bl.x - p.x) * dx + (bl.y - p.y) * dy) / len2; t = clamp(t, 0, 1);
    if (dist(p.x + dx * t, p.y + dy * t, bl.x, bl.y) < bandW + bl.r) igniteBarrel(bl, 0.06);
  }
  // SIEGE MODE: the rail detonates a blast at the impact point
  if (boonLv("siege")) {
    const sr = 70 + 14 * boonPow("siege");
    novas.push({ x: ex, y: ey, t: 0.3, tm: 0.3, maxR: sr, col: W.col });
    ffx.ring(ex, ey, sr, W.col, 0.35, 5);
    burst(ex, ey, W.col, 18, 280, 0.5, 3.4);
    shake(3, 0.12);
    for (const e of enemies) {
      if (e.hp <= 0) continue;
      if (dist(ex, ey, e.x, e.y) < sr + e.r) {
        const a2 = angTo(ex, ey, e.x, e.y);
        hitEnemy(e, dmg * 0.5, Math.cos(a2) * 160, Math.sin(a2) * 160, critRoll(), false);
        if (e.hp > 0 && boonLv("ignite")) applyBurn(e, 4 * boonPow("ignite") * dmgMul());
      }
    }
    for (const bl of barrels) {
      if (!bl.dead && bl.fuse < 0 && dist(ex, ey, bl.x, bl.y) < sr + bl.r) igniteBarrel(bl, 0.06);
    }
  }
  // RECOIL DASH: fire dashes the wielder backward a step with brief i-frames
  if (boonLv("recoild")) {
    p.dashDX = -Math.cos(a); p.dashDY = -Math.sin(a);
    p.dashT = Math.max(p.dashT, 0.14);
    p.ifr = Math.max(p.ifr, 0.22 * boonPow("recoild"));
    burst(p.x, p.y, W.col, 8, 160, 0.3, 2.4);
  } else {
    p.vx -= Math.cos(a) * 90; p.vy -= Math.sin(a) * 90;
  }
}

/* per-hit resolution for a ballistic bullet striking an enemy (crit/lifesteal/statuses/style
   all flow through the shared hitEnemy path; the firing player is the ctxP boon context). */
function bulletHitEnemy(b, e) {
  const p = b.owner || player;
  ctxP = p;
  let dmg = b.dmg;
  // scattergun pellets fall off with travelled distance (close-range weapon)
  if (b.falloff > 0) {
    const travelled = (b.tm - b.t) * Math.hypot(b.vx, b.vy);
    dmg *= Math.max(0.3, 1 - b.falloff * travelled);
  }
  // POINT BLANK: bonus damage + execute low-HP foes when struck very close to the muzzle
  let exec = false;
  if (b.pblank && dist(p.x, p.y, e.x, e.y) < 110) {
    dmg *= 1 + 0.35 * boonPow("pblank");
    if (e.type !== "boss" && e.hp <= e.maxHp * (0.14 + 0.05 * boonPow("pblank"))) exec = true;
  }
  if (exec) {
    burst(e.x, e.y, "#ffd29a", 16, 260, 0.5, 3);
    dnum(e.x, e.y - e.r - 14, "POINT BLANK", "#ffd29a", true);
    statusDamage(e, e.hp + 999, "#ffd29a");
    return;
  }
  // TRACER FIRE: marked foes take bonus damage; this hit consumes & re-applies the mark
  if ((e.markT || 0) > 0) dmg *= 1 + 0.12 * (e.markPow || 0);
  hitEnemy(e, dmg, Math.cos(b.ang) * b.kb, Math.sin(b.ang) * b.kb, b.crit, false);
  if (e.hp > 0 && boonLv("ignite")) applyBurn(e, 4 * boonPow("ignite") * dmgMul());
  if (e.hp > 0 && b.crit && boonLv("volt")) applyShock(e, 7 * boonPow("volt") * dmgMul(), 1); // VOLT ROUNDS works for guns too
  // DRAGON'S BREATH: incendiary pellets/rounds set foes burning
  if (e.hp > 0 && b.ignite > 0) applyBurn(e, (3 + depth * 0.4) * b.ignite * dmgMul());
  // TRACER FIRE: (re)apply the damage-amp mark
  if (e.hp > 0 && b.tracer > 0) { e.markT = 3; e.markPow = b.tracer; }
}

/* pooled bullet update: motion, wall/pillar collision (with RICOCHET bounce), enemy hits with
   pierce, barrels, and lifetime — no per-frame allocations in the loop. */
function updateBullets(dt) {
  const A = CONFIG;
  for (let bi = bullets.length - 1; bi >= 0; bi--) {
    const b = bullets[bi];
    ctxP = b.owner || player;
    b.x += b.vx * dt; b.y += b.vy * dt; b.t -= dt;
    // cheap tracer spark (respects particle cap via addPart)
    if (Math.random() < 0.4) addPart({ x: b.x, y: b.y, vx: 0, vy: 0, t: 0.1, tm: 0.1, col: b.col, r: 1.6, drag: 0 });
    let dead = b.t <= 0;
    // wall bounce (RICOCHET ROUNDS) or expire
    if (!dead && (b.x < A.wall || b.x > A.arenaW - A.wall)) {
      if (b.bounces > 0) { b.vx = -b.vx; b.ang = Math.atan2(b.vy, b.vx); b.bounces--; b.x = clamp(b.x, A.wall, A.arenaW - A.wall); b.hitSet.length = 0; }
      else dead = true;
    }
    if (!dead && (b.y < A.wall || b.y > A.arenaH - A.wall)) {
      if (b.bounces > 0) { b.vy = -b.vy; b.ang = Math.atan2(b.vy, b.vx); b.bounces--; b.y = clamp(b.y, A.wall, A.arenaH - A.wall); b.hitSet.length = 0; }
      else dead = true;
    }
    if (!dead && pointInPillar(b.x, b.y, b.r)) { burst(b.x, b.y, b.col, 4, 110, 0.2, 2); dead = true; }
    if (dead) { freeBullet(b); continue; }
    // enemy collisions (pierce-aware)
    for (const e of enemies) {
      if (e.hp <= 0 || b.hitSet.includes(e)) continue;
      if (dist(b.x, b.y, e.x, e.y) >= b.r + e.r) continue;
      if (shieldBlocks(e, b.x - b.vx * 0.02, b.y - b.vy * 0.02)) {
        burst(b.x, b.y, "#88aaff", 5, 130, 0.22, 2); audio.clank(); dead = true; break;
      }
      bulletHitEnemy(b, e);
      b.hitSet.push(e);
      // RICOCHET ROUNDS: a rifle round can redirect toward a nearby unhit foe instead of stopping
      if (b.bounces > 0 && b.kind === "rifle") {
        let tgt = null, bd = 200;
        for (const o of enemies) {
          if (o.hp <= 0 || b.hitSet.includes(o)) continue;
          const dd = dist(b.x, b.y, o.x, o.y);
          if (dd < bd) { bd = dd; tgt = o; }
        }
        if (tgt) { b.ang = angTo(b.x, b.y, tgt.x, tgt.y); const sp = Math.hypot(b.vx, b.vy); b.vx = Math.cos(b.ang) * sp; b.vy = Math.sin(b.ang) * sp; b.bounces--; }
        else { dead = true; }
        break;
      }
      if (b.pierce > 0) b.pierce--;
      else { burst(b.x, b.y, b.col, 4, 120, 0.2, 2); dead = true; break; }
    }
    if (dead) { freeBullet(b); continue; }
    // volatile barrels
    for (const bl of barrels) {
      if (bl.dead || bl.fuse >= 0) continue;
      if (dist(b.x, b.y, bl.x, bl.y) < b.r + bl.r) { igniteBarrel(bl, 0.05); dead = true; break; }
    }
    if (dead) { freeBullet(b); continue; }
  }
}

/* ---------------- §L4 ARCHERY / BOWS (pooled physical arrows) ---------------- */
/* Arrows are pooled PHYSICAL projectiles, distinct from spells/bullets/pbolts: a draw-and-release
   feel, precision/headshot flavor (high crit base), and per-bow cadence. They flow through the
   shared hitEnemy / status / crit / lifesteal / style systems via the firing player's ctxP. */
function getArrow() {
  let a = arrowPool.pop();
  if (!a) a = { kind: "", x: 0, y: 0, vx: 0, vy: 0, ang: 0, r: 0, t: 0, tm: 0,
                dmg: 0, kb: 0, col: "#fff", owner: null, hitSet: [], pierce: 0,
                crit: false, charge: 0, split: 0, shock: 0, mark: 0, rico: 0, gale: false, falloff: 0 };
  a.hitSet.length = 0; a.pierce = 0; a.crit = false; a.charge = 0; a.split = 0;
  a.shock = 0; a.mark = 0; a.rico = 0; a.gale = false; a.kb = 0; a.falloff = 0;
  return a;
}
function freeArrow(a) {
  const i = arrows.indexOf(a);
  if (i >= 0) arrows.splice(i, 1);
  a.hitSet.length = 0; a.owner = null;
  if (arrowPool.length < 80) arrowPool.push(a);
}
/* recycle live arrows back to the pool (room / run reset) */
function clearArrows() {
  for (const a of arrows) { a.hitSet.length = 0; a.owner = null; if (arrowPool.length < 80) arrowPool.push(a); }
  arrows.length = 0;
  for (const p of players) if (p) { p.drawing = false; p.drawT = 0; }
}
function spawnArrow(p, kind, a, spd, dmg, col, r, opts) {
  // hard cap on live arrows so a stormbow + barrage volley can't blow the pool/particle budget
  if (arrows.length >= 72) { const old = arrows[0]; if (old) freeArrow(old); }
  const o = getArrow();
  o.kind = kind;
  o.x = p.x + Math.cos(a) * (p.r + 6); o.y = p.y + Math.sin(a) * (p.r + 6);
  o.vx = Math.cos(a) * spd; o.vy = Math.sin(a) * spd; o.ang = a;
  o.r = r; o.dmg = dmg; o.col = col; o.owner = p;
  o.t = (opts && opts.life) || 0.9; o.tm = o.t;
  o.kb = (opts && opts.kb) || 0;
  o.pierce = (opts && opts.pierce) || 0;
  o.crit = !!(opts && opts.crit);
  o.charge = (opts && opts.charge) || 0;
  o.split = (opts && opts.split) || 0;     // SPLIT ARROW shards remaining
  o.shock = (opts && opts.shock) || 0;     // STATIC ARROWS shock power
  o.mark = (opts && opts.mark) || 0;       // HUNTER'S MARK power
  o.rico = (opts && opts.rico) || 0;       // RICOCHET bounces remaining
  o.gale = !!(opts && opts.gale);          // GALEFORCE knockback flag
  o.falloff = (opts && opts.falloff) || 0; // STORMBOW range falloff
  arrows.push(o);
  return o;
}

/* base per-arrow damage for BOWS; shares the melee/HEAVY EDGE power budget (slash button drives
   it) but tuned per-bow so archery sits inside the existing single-target DPS band. */
function bowDamage() { const p = ctxP || player; return CONFIG.meleeDmg * weaponDefP(p).dmgMul * dmgMul() * (1 + boonPow("blade") * 0.35) * p.meleeMul; }

/* loose an arrow / volley for the wielded bow. `charge` is the LONGBOW draw fraction (0..1). */
function fireBow(p, W, charge) {
  ctxP = p;
  p.bowN = (p.bowN || 0) + 1;
  p.slashAng = p.aim;
  const a = p.slashAng;
  const base = bowDamage();
  if (W.id === "qbow") fireQuickBow(p, W, a, base);
  else if (W.id === "lbow") fireLongBow(p, W, a, base, charge);
  else fireStormBow(p, W, a, base);
}

/* QUICK BOW: a fast stream of light arrows. RAPID NOCK ramps fire rate + damage on sustained fire;
   SPLIT ARROW shards arrows on hit; HEARTSEEKER ramps crit on the same foe; BARRAGE fans every 4th. */
function fireQuickBow(p, W, a, base) {
  if (boonLv("rapidnock")) { p.rapidN = Math.min(16, (p.rapidN || 0) + 1); p.rapidT = 0.8; }
  const ramp = boonLv("rapidnock") ? Math.min(1, 0.06 * (p.rapidN || 0) * boonPow("rapidnock")) : 0;
  p.bowCD = W.fireCD * (1 - ramp * 0.4);  // RAPID NOCK: up to 40% faster
  p.recoilT = 0.12;
  const dmg = base * 0.46 * (1 + ramp * 0.4); // light per-hit; RAPID NOCK up to +40%
  // BARRAGE: every 4th shot looses a 3-arrow fan instead of a single arrow
  const barrage = boonLv("barrage") && (p.bowN % 4 === 0);
  const angs = barrage ? [0, -0.14, 0.14] : [0];
  for (const off of angs) {
    let crit = critRoll();
    spawnArrow(p, "qarrow", a + off + rand(-0.015, 0.015), 880, dmg, W.col, 3, {
      life: 0.8, kb: 70, crit,
      pierce: boonLv("rapidnock") ? 0 : 0,
      split: boonLv("splitarrow") ? 1 + Math.round(boonPow("splitarrow")) : 0,
    });
  }
  audio.bowShot("quick");
  if (Math.random() < 0.5) burst(p.x + Math.cos(a) * 18, p.y + Math.sin(a) * 18, "#eaffd0", 2, 110, 0.13, 1.6);
}

/* LONGBOW: a single heavy arrow scaled by draw `charge` (0..1). A full draw PIERCES a line.
   PENETRATOR: full-draw pierces ALL & crits.  GALEFORCE: knockback + wind shockwave.
   HUNTER'S MARK: marks foes for bonus damage.  QUICKDRAW: a perfect release refunds + buffs next. */
function fireLongBow(p, W, a, base, charge) {
  charge = clamp(charge || 0, 0, 1);
  p.bowCD = W.fireCD;
  p.recoilT = 0.22;
  // damage scales steeply with draw: a tap is weak, a full draw hits hard (great single-target).
  // Tuned so the measured DPS (draw time + cooldown included) sits inside the existing weapon band.
  const dmgMulC = 0.9 + charge * 2.9;     // 0.9x .. 3.8x of base
  let dmg = base * dmgMulC * (1 + (p.qdrawBuff || 0));
  const full = charge >= 0.92;
  const penetrator = boonLv("penetrator") && full;
  let crit = critRoll() || penetrator;
  // a full natural draw pierces a couple of foes; PENETRATOR pierces everything
  const pierce = penetrator ? 99 : (full ? 2 : (charge > 0.5 ? 1 : 0));
  spawnArrow(p, "larrow", a, 1000, dmg, W.col, full ? 4.4 : 3.4, {
    life: 1.0, kb: 220 + charge * 220, crit, charge,
    pierce, gale: boonLv("galeforce") && charge > 0.5,
    mark: boonLv("huntmark") ? boonPow("huntmark") : 0,
  });
  // GALEFORCE: a charged release also cracks a forward wind shockwave (knockback + chip)
  if (boonLv("galeforce") && charge > 0.5) {
    const gx = p.x + Math.cos(a) * 90, gy = p.y + Math.sin(a) * 90;
    const gr = 70 + 16 * boonPow("galeforce");
    novas.push({ x: gx, y: gy, t: 0.3, tm: 0.3, maxR: gr, col: "#e8f0c0" });
    ffx.ring(gx, gy, gr, "#e8f0c0", 0.32, 4);
    for (const e of enemies) {
      if (e.hp <= 0) continue;
      if (dist(gx, gy, e.x, e.y) < gr + e.r) {
        const ka = angTo(p.x, p.y, e.x, e.y);
        e.kbx += Math.cos(ka) * 320; e.kby += Math.sin(ka) * 320;
        statusDamage(e, base * 0.4 * boonPow("galeforce"), "#e8f0c0");
      }
    }
  }
  // QUICKDRAW: a perfect (near-full) release refunds the cooldown and buffs the next shot
  if (boonLv("quickdraw") && charge >= 0.85) {
    p.bowCD = 0;
    p.qdrawBuff = Math.min(0.6, 0.2 * boonPow("quickdraw"));
    burst(p.x, p.y, "#fff0c0", 8, 160, 0.3, 2.2);
    dnum(p.x, p.y - 20, "QUICKDRAW", "#fff0c0", false);
  } else {
    p.qdrawBuff = 0;
  }
  ffx.spawnLight(p.x + Math.cos(a) * 20, p.y + Math.sin(a) * 20, 50, W.col, 0.5 + charge * 0.3);
  shake(2 + charge * 3, 0.1 + charge * 0.08);
  audio.bowShot("long");
}

/* STORMBOW: looses a spread of arrows at once for area coverage; arrows fall off at range.
   ARROW RAIN: a volley also arcs down on the target zone.  STATIC ARROWS: arrows apply SHOCK.
   THICKET: more arrows + wider spread.  RICOCHET: arrows bounce to a nearby foe once. */
function fireStormBow(p, W, a, base) {
  p.bowCD = W.fireCD;
  p.recoilT = 0.2;
  const extra = boonLv("thicket") ? 1 + Math.round(boonPow("thicket")) : 0;
  const count = 5 + extra;                          // base 5 arrows
  const spread = 0.62 * (boonLv("thicket") ? 1 + 0.18 * boonPow("thicket") : 1);
  const dmg = base * 0.42;                          // per-arrow; many arrows, range falloff
  for (let i = 0; i < count; i++) {
    const off = (count === 1 ? 0 : (i / (count - 1) - 0.5) * spread) + rand(-0.03, 0.03);
    spawnArrow(p, "sarrow", a + off, 820 + rand(-40, 50), dmg, W.col, 2.8, {
      life: 0.6, kb: 90, crit: critRoll(), falloff: 0.0024,
      shock: boonLv("staticarr") ? boonPow("staticarr") : 0,
      rico: boonLv("ricoarr") ? 1 : 0,
    });
  }
  // ARROW RAIN: a delayed volley arcs down onto the aimed target zone (mortar-style telegraph)
  if (boonLv("arrowrain")) {
    let tx = p.x + Math.cos(a) * 260, ty = p.y + Math.sin(a) * 260;
    const near = nearestEnemy(p.x, p.y, 460);
    if (near && Math.abs(angDiff(a, angTo(p.x, p.y, near.x, near.y))) < 0.6) { tx = near.x; ty = near.y; }
    tx = clamp(tx, CONFIG.wall + 10, CONFIG.arenaW - CONFIG.wall - 10);
    ty = clamp(ty, CONFIG.wall + 10, CONFIG.arenaH - CONFIG.wall - 10);
    const rainR = 64 + 14 * boonPow("arrowrain");
    arrowRains.push({ x: tx, y: ty, r: rainR, t: 0.55, dmg: base * (0.5 + 0.12 * boonPow("arrowrain")) * dmgMul(),
                      col: W.col, owner: p, shock: boonLv("staticarr") ? boonPow("staticarr") : 0 });
  }
  p.vx -= Math.cos(a) * 70; p.vy -= Math.sin(a) * 70; // light recoil
  burst(p.x + Math.cos(a) * 18, p.y + Math.sin(a) * 18, "#cfeaff", 5, 160, 0.18, 2);
  shake(2.5, 0.09);
  audio.bowShot("storm");
}

/* per-hit resolution for an arrow striking an enemy (crit / lifesteal / statuses / style / enchants
   all flow through the shared hitEnemy path; the firing player is the ctxP boon context). */
function arrowHitEnemy(a, e) {
  const p = a.owner || player;
  ctxP = p;
  let dmg = a.dmg;
  // STORMBOW arrows fall off with travelled distance (area weapon, weak at range)
  if (a.falloff > 0) {
    const travelled = (a.tm - a.t) * Math.hypot(a.vx, a.vy);
    dmg *= Math.max(0.4, 1 - a.falloff * travelled);
  }
  // HUNTER'S MARK: marked foes take bonus damage; QUICK BOW HEARTSEEKER ramps crit on the same foe
  if ((e.markT || 0) > 0) dmg *= 1 + 0.14 * (e.markPow || 0);
  let crit = a.crit;
  if (a.kind === "qarrow" && boonLv("heartseek")) {
    if (p.seekTgt === e) p.seekN = Math.min(6, (p.seekN || 0) + 1);
    else { p.seekTgt = e; p.seekN = 0; }
    if (!crit && Math.random() < 0.10 * boonPow("heartseek") * p.seekN) crit = true;
  }
  hitEnemy(e, dmg, Math.cos(a.ang) * a.kb, Math.sin(a.ang) * a.kb, crit, false);
  if (e.hp <= 0) return;
  // GALEFORCE knockback already folded into kb; STATIC ARROWS apply SHOCK (chains + shatters frozen)
  if (a.shock > 0) applyShock(e, (4 + depth * 0.4) * a.shock * dmgMul(), 1);
  // HUNTER'S MARK: (re)apply the damage-amp mark (reuses the TRACER FIRE mark fields)
  if (a.mark > 0) { e.markT = 3; e.markPow = a.mark; }
  // shared on-hit element boons + melee/cold enchants do NOT apply to bows (ranged, see applyOnHitElements)
  if (boonLv("ignite")) applyBurn(e, 4 * boonPow("ignite") * dmgMul()); // IGNITION EDGE is universal (slashes); allow on arrows for parity with guns
}

/* arrow update: motion, wall/pillar collision, enemy hits (pierce + split + ricochet), barrels,
   lifetime — pooled, no per-frame allocations in the hot loop. */
function updateArrows(dt) {
  const A = CONFIG;
  for (let ai = arrows.length - 1; ai >= 0; ai--) {
    const a = arrows[ai];
    ctxP = a.owner || player;
    a.x += a.vx * dt; a.y += a.vy * dt; a.t -= dt;
    // cheap fletching trail spark (respects particle cap via addPart)
    if (Math.random() < 0.35) addPart({ x: a.x, y: a.y, vx: 0, vy: 0, t: 0.1, tm: 0.1, col: a.col, r: 1.5, drag: 0 });
    let dead = a.t <= 0;
    if (!dead && (a.x < A.wall || a.x > A.arenaW - A.wall || a.y < A.wall || a.y > A.arenaH - A.wall)) dead = true;
    if (!dead && pointInPillar(a.x, a.y, a.r)) { burst(a.x, a.y, a.col, 4, 100, 0.18, 1.8); dead = true; }
    if (dead) { freeArrow(a); continue; }
    // enemy collisions (pierce-aware)
    for (const e of enemies) {
      if (e.hp <= 0 || a.hitSet.includes(e)) continue;
      if (dist(a.x, a.y, e.x, e.y) >= a.r + e.r) continue;
      if (shieldBlocks(e, a.x - a.vx * 0.02, a.y - a.vy * 0.02)) {
        burst(a.x, a.y, "#88aaff", 5, 130, 0.2, 2); audio.clank(); dead = true; break;
      }
      const ex = a.x, ey = a.y;
      arrowHitEnemy(a, e);
      a.hitSet.push(e);
      // SPLIT ARROW: spawn shard arrows fanning off the impact (QUICK BOW)
      if (a.split > 0) {
        const shards = a.split; a.split = 0;
        for (let sI = 0; sI < shards; sI++) {
          const sa = a.ang + (sI === 0 ? 0.5 : -0.5) + rand(-0.1, 0.1);
          spawnArrow(a.owner, "qarrow", sa, 760, a.dmg * 0.5, a.col, 2.4, { life: 0.4, kb: 40, crit: critRoll() });
        }
      }
      // RICOCHET: redirect toward a nearby unhit foe instead of stopping (STORMBOW)
      if (a.rico > 0 && a.kind === "sarrow") {
        let tgt = null, bd = 200;
        for (const o of enemies) {
          if (o.hp <= 0 || a.hitSet.includes(o)) continue;
          const dd = dist(ex, ey, o.x, o.y);
          if (dd < bd) { bd = dd; tgt = o; }
        }
        if (tgt) { a.ang = angTo(ex, ey, tgt.x, tgt.y); const sp = Math.hypot(a.vx, a.vy); a.vx = Math.cos(a.ang) * sp; a.vy = Math.sin(a.ang) * sp; a.rico--; }
        else { dead = true; }
        break;
      }
      if (a.pierce > 0) a.pierce--;
      else { burst(ex, ey, a.col, 4, 110, 0.18, 2); dead = true; break; }
    }
    if (dead) { freeArrow(a); continue; }
    // volatile barrels
    for (const bl of barrels) {
      if (bl.dead || bl.fuse >= 0) continue;
      if (dist(a.x, a.y, bl.x, bl.y) < a.r + bl.r) { igniteBarrel(bl, 0.05); dead = true; break; }
    }
    if (dead) { freeArrow(a); continue; }
  }
  // ARROW RAIN volleys: a brief telegraph, then arrows rain down dealing AoE in the zone
  for (let ri = arrowRains.length - 1; ri >= 0; ri--) {
    const r = arrowRains[ri];
    r.t -= dt;
    if (Math.random() < dt * 30) addPart({ x: r.x + rand(-r.r, r.r), y: r.y + rand(-r.r, r.r) - 40, vx: 0, vy: 360, t: 0.18, tm: 0.18, col: r.col, r: rand(1.5, 2.6), drag: 0 });
    if (r.t <= 0) {
      ctxP = r.owner || player;
      burst(r.x, r.y, r.col, 16, 240, 0.4, 3);
      ffx.ring(r.x, r.y, r.r, r.col, 0.32, 4);
      for (const e of enemies) {
        if (e.hp <= 0) continue;
        if (dist(r.x, r.y, e.x, e.y) < r.r + e.r) {
          hitEnemy(e, r.dmg, 0, 0, critRoll(), false);
          if (e.hp > 0 && r.shock > 0) applyShock(e, (4 + depth * 0.4) * r.shock * dmgMul(), 1);
        }
      }
      arrowRains.splice(ri, 1);
    }
  }
}

function tryBolt(p) {
  p = p || ctxP || player;
  ctxP = p;
  if (p.boltCD > 0) return;
  if (p.energy < CONFIG.boltCost) { return; }
  p.energy -= CONFIG.boltCost;
  p.boltCD = 0.26;
  if (p.idx === 0 && touchUI && !mouseActive && !p.padBound) {
    const near = nearestEnemy(p.x, p.y, 520);
    if (near) p.aim = angTo(p.x, p.y, near.x, near.y);
  } else if (p.idx === 0 && !p.padBound && mouseIdle()) {
    kbAutoAim(p); // keyboard-only bolt: auto-aim
  }
  firePlayerBolt(p);
}

function tryFreeze(p) {
  p = p || ctxP || player;
  ctxP = p;
  if (!p || p.hp <= 0 || p.freezeCD > 0) return;
  p.freezeBuf = 0;
  const cd = CONFIG.freezeCD * p.freezeCDMul * Math.max(0.3, Math.pow(0.75, boonPow("cryo")));
  p.freezeCD = cd; p.freezeCDMax = cd;
  novas.push({ x: p.x, y: p.y, t: 0.5, tm: 0.5, maxR: CONFIG.freezeR });
  audio.freezeCast();
  shake(3, 0.15);
  ffx.ring(p.x, p.y, CONFIG.freezeR, "#aaeeff", 0.5, 6);
  ffx.spawnLight(p.x, p.y, CONFIG.freezeR, "#aaeeff", 0.6);
  for (const e of enemies) {
    if (e.hp <= 0) continue;
    if (dist(p.x, p.y, e.x, e.y) < CONFIG.freezeR + e.r) {
      if ((e.shockT || 0) > 0) { shatterCombo(e); continue; }  // FREEZE + SHOCK = SHATTER
      if ((e.burnT || 0) > 0) { thermalSnap(e); continue; }    // BURN + FREEZE = THERMAL SNAP
      if (!canFreeze(e)) continue;                             // boss thaw-resistance window
      e.frozenT = e.type === "boss" ? CONFIG.freezeBossDur : CONFIG.freezeDur;
      e.vx = 0; e.vy = 0;
      burst(e.x, e.y, "#bfe8ff", 8, 130, 0.4, 2.5);
    }
  }
}

function tryDash(p) {
  p = p || ctxP || player;
  ctxP = p;
  if (p.dashT > 0) return;
  if (p.dashCharges <= 0) return;
  const mv = moveInputFor(p);
  let dx = mv.x, dy = mv.y;
  if (Math.hypot(dx, dy) < 0.2) { dx = Math.cos(p.aim); dy = Math.sin(p.aim); }
  const m = Math.hypot(dx, dy);
  p.dashDX = dx / m; p.dashDY = dy / m;
  p.dashT = CONFIG.dashDur;
  p.dashedT = 0.45;                 // BLADE RIPOSTE: arm the post-dash empowered slash
  p.ifr = Math.max(p.ifr, CONFIG.dashIfr);
  p.dashCharges--;
  if (p.dashCD <= 0) p.dashCD = CONFIG.dashCD;
  audio.dash();
  burst(p.x, p.y, p.col, 10, 160, 0.35, 2.5);
  ffx.ring(p.x, p.y, 40, p.col, 0.3, 3);
  ffx.spawnLight(p.x, p.y, 70, p.colDash, 0.5);
}

let mouseActive = false;
canvas.addEventListener("mousemove", () => { mouseActive = true; });

/* gather raw control intents for a player from its assigned device(s) for this frame.
   slash/dash/freeze are edge buffers (set by handlers / gamepad edges); bolt is "held". */
function readPlayerControls(p) {
  const pad = padForPlayer(p.idx);
  p.padBound = !!pad;
  const c = { aimHas: false, aimAng: 0, aimIsDir: false, bolt: false, interact: false, fireHeld: false };
  if (p.idx === 0) {
    // P1 mouse aim (only while recent and not pad-bound)
    if (!pad && (!touchUI || mouseActive) && !mouseIdle()) {
      c.aimHas = true; c.aimAng = angTo(p.x, p.y, s2wX(mouse.x), s2wY(mouse.y));
    }
    // P1 keyboard/touch fire
    if (mouse.left || keys["j"]) { p.slashBuf = Math.max(p.slashBuf, 0.05); c.fireHeld = true; }
    if (mouse.right || keys["Shift"] || keys["ctrlRight"] || keys["e"] || boltHeld) c.bolt = true;
    if (keys["k"] || keys["q"]) p.freezeBuf = Math.max(p.freezeBuf, 0.05);
    if (keys[" "]) p.dashBuf = Math.max(p.dashBuf, 0.05);
    if (touchFireHeld) { p.slashBuf = Math.max(p.slashBuf, 0.05); c.fireHeld = true; } // touch tap held on the right half
  }
  // gamepad bindings (twin-stick PS4 layout):
  // left stick move (handled in moveInputFor), right stick aim, □(2) slash, R2(7)/R1(5) bolt,
  // ×(0) dash, △(3)/L1(4) freeze, ×(0) also confirms interactions
  if (pad) {
    const rs = gpStick(pad.rx, pad.ry);
    if (rs.mag > 0) { c.aimHas = true; c.aimAng = Math.atan2(rs.y, rs.x); c.aimIsDir = true; }
    if (gpPressed(pad, 2)) p.slashBuf = 0.12;
    if (gpButton(pad, 2)) c.fireHeld = true; // □ held = bow draw
    if (gpButton(pad, 7) || gpButton(pad, 5)) c.bolt = true; // R2 / R1 held = bolt
    if (gpPressed(pad, 0)) { p.dashBuf = 0.15; c.interact = true; }
    if (gpPressed(pad, 3) || gpPressed(pad, 4)) p.freezeBuf = 0.18;
  }
  // P2 keyboard scheme
  if (p.idx === 1 && p2UsesKeyboard()) {
    if (keys["."]) { p.slashBuf = Math.max(p.slashBuf, 0.05); c.fireHeld = true; }
    if (keys["/"]) c.bolt = true;
    if (keys[","]) p.freezeBuf = Math.max(p.freezeBuf, 0.05);
    if (keys["Enter"]) p.dashBuf = Math.max(p.dashBuf, 0.05);
  }
  return c;
}

function updatePlayer(p, dt) {
  ctxP = p;
  if (p.downed) { updateDowned(p, dt); return; }
  const c = readPlayerControls(p);
  // aim resolution
  if (c.aimHas) {
    p.aim = c.aimAng;
  } else if (p.idx === 0 && !p.padBound && joy.id !== -1 && Math.hypot(joy.dx, joy.dy) > 0.25) {
    const near = nearestEnemy(p.x, p.y, 380);
    if (near) p.aim = angTo(p.x, p.y, near.x, near.y);
    else p.aim = Math.atan2(joy.dy, joy.dx);
  } else if (p.idx === 1 && p2UsesKeyboard()) {
    // P2 keyboard: auto-aim toward nearest foe, else movement dir
    const near = nearestEnemy(p.x, p.y, 420);
    if (near) p.aim = angTo(p.x, p.y, near.x, near.y);
    else p.aim = Math.atan2(p.lastDir.y, p.lastDir.x);
  }
  // timers
  p.slashCD = Math.max(0, p.slashCD - dt);
  p.slashT = Math.max(0, p.slashT - dt);
  p.comboT = Math.max(0, p.comboT - dt);
  p.frenzyT = Math.max(0, p.frenzyT - dt);
  if (p.frenzyT <= 0) p.frenzyN = 0;
  p.prismT = Math.max(0, p.prismT - dt);
  if (p.prismT <= 0) p.prismN = 0;
  p.tempoT = Math.max(0, (p.tempoT || 0) - dt);   // BLADE TEMPO EDGE ramp window
  if (p.tempoT <= 0) p.tempoN = 0;
  p.dashedT = Math.max(0, (p.dashedT || 0) - dt); // BLADE RIPOSTE post-dash window
  p.velBuffT = Math.max(0, (p.velBuffT || 0) - dt);
  // SIPHON EDGE + LIFESTEAL enchant share one budget that drains toward 0 over real time, so the cap
  // is genuinely "per second" — a satisfying steady heal, never a runaway immortality loop.
  const stealCap = 8 + 6 * ((p.boonPow && p.boonPow.steal ? p.boonPow.steal : 0) + (p.enchants && p.enchants.steal ? p.enchants.steal : 0));
  p.stealBudget = Math.max(0, (p.stealBudget || 0) - stealCap * dt);
  p.castCD = Math.max(0, (p.castCD || 0) - dt);
  p.gunCD = Math.max(0, (p.gunCD || 0) - dt);
  p.heatT = Math.max(0, (p.heatT || 0) - dt);
  if (p.heatT <= 0) p.heatN = 0; // OVERHEAT ramp decays when fire isn't sustained
  // RAILGUN CAPACITOR: store charge while the rail is between shots (caps ~1.6s of charge)
  if (p.weapon === "rail" && p.gunCD <= 0) p.railChargeT = Math.min(1.6, (p.railChargeT || 0) + dt);
  p.bowCD = Math.max(0, (p.bowCD || 0) - dt);
  p.rapidT = Math.max(0, (p.rapidT || 0) - dt);
  if (p.rapidT <= 0) p.rapidN = 0; // QUICK BOW RAPID NOCK ramp decays when not sustaining fire
  p.ifr = Math.max(0, p.ifr - dt);
  p.hurtT = Math.max(0, p.hurtT - dt);
  p.freezeCD = Math.max(0, p.freezeCD - dt);
  p.buyCD = Math.max(0, p.buyCD - dt);
  p.slashBuf = Math.max(0, p.slashBuf - dt);
  p.dashBuf = Math.max(0, p.dashBuf - dt);
  p.freezeBuf = Math.max(0, p.freezeBuf - dt);
  if (p.dashCharges < p.dashMax) {
    p.dashCD -= dt * dashRegenMul();
    if (p.dashCD <= 0) {
      p.dashCharges++;
      if (p.dashCharges < p.dashMax) p.dashCD = CONFIG.dashCD;
    }
  }
  // energy
  p.energy = Math.min(p.maxEnergy, p.energy + CONFIG.energyRegen * (1 + boonPow("over") * 0.4) * dt);

  // actions
  if (p.slashBuf > 0) { trySlash(p); const Wp = weaponDefP(p); if (p.slashT > 0 || (Wp.isCaster && p.castCD > 0) || (Wp.isGun && p.gunCD > 0) || (Wp.isBow && Wp.id !== "lbow" && p.bowCD > 0)) p.slashBuf = 0; }
  // LONGBOW draw-and-release: hold the fire button to draw (drawT charges); loose on release.
  {
    const Wp = weaponDefP(p);
    if (Wp.isBow && Wp.id === "lbow" && (state === "play" || state === "hub")) {
      if (c.fireHeld && p.bowCD <= 0 && p.dashT <= 0) {
        if (!p.drawing) { p.drawing = true; p.drawT = 0; audio.bowDraw(0); }
        const prev = p.drawT;
        p.drawT = Math.min(1, p.drawT + dt / 0.85); // ~0.85s to full draw
        // a soft creak tick partway through the draw
        if (prev < 0.55 && p.drawT >= 0.55) audio.bowDraw(p.drawT);
        if (p.idx === 0 && !touchUI && !p.padBound && mouseIdle()) kbAutoAim(p);
        p.recoilT = Math.max(p.recoilT, 0.05);
      } else if (p.drawing) {
        // released — loose an arrow scaled by how far it was drawn
        const charge = p.drawT;
        p.drawing = false; p.drawT = 0;
        if (p.idx === 0 && !touchUI && !p.padBound && mouseIdle()) kbAutoAim(p);
        fireBow(p, Wp, charge);
      }
    } else if (p.drawing) {
      p.drawing = false; p.drawT = 0; // swapped away / dashed mid-draw
    }
  }
  if (c.bolt && (state === "play" || state === "hub")) tryBolt(p);
  if (p.freezeBuf > 0) tryFreeze(p);
  if (p.dashBuf > 0) { const had = p.dashT; tryDash(p); if (p.dashT > 0 && !had) p.dashBuf = 0; }
  ctxP = p;

  // movement
  const spd = CONFIG.playerSpeed * (1 + Math.min(0.55, boonPow("swift") * 0.12)) * (p.velBuffT > 0 ? 1.25 : 1);
  if (p.dashT > 0) {
    p.dashT -= dt;
    p.vx = p.dashDX * CONFIG.dashSpeed;
    p.vy = p.dashDY * CONFIG.dashSpeed;
    p.trailT -= dt;
    if (p.trailT <= 0) {
      p.trailT = 0.016;
      p.trail.push({ x: p.x, y: p.y, t: 0.3, a: p.aim });
      if (boonLv("trail")) addZone(p.x, p.y);
      if (boonLv("sdash")) { // STATIC DASH: trail shocks nearby foes
        for (const e2 of enemies) {
          if (e2.hp > 0 && (e2.sdCD || 0) <= 0 && dist(p.x, p.y, e2.x, e2.y) < 60 + e2.r) {
            e2.sdCD = 1.4;
            applyShock(e2, 6 * boonPow("sdash") * dmgMul(), 1);
          }
        }
      }
    }
  } else {
    const mv = moveInputFor(p);
    const tx = mv.x * spd, ty = mv.y * spd;
    const acc = CONFIG.playerAccel * dt;
    p.vx += clamp(tx - p.vx, -acc, acc);
    p.vy += clamp(ty - p.vy, -acc, acc);
    if (Math.hypot(mv.x, mv.y) > 0.1) p.lastDir = { x: mv.x, y: mv.y };
  }
  p.x += p.vx * dt; p.y += p.vy * dt;
  collidePillars(p);
  collideArena(p);
  separatePlayers(p);
  for (const tr of p.trail) tr.t -= dt;
  p.trail = p.trail.filter((tr) => tr.t > 0);

  // --- render-animation state (cheap; no allocations) ---
  // smooth the drawn facing toward the true aim along the shortest arc
  p.aimDraw += angDiff(p.aimDraw, p.aim) * Math.min(1, dt * 16);
  // walk cycle advances with actual speed; moveAmt eases the leg/arm swing in/out
  const spdNow = Math.hypot(p.vx, p.vy);
  const movingNow = spdNow > 26 || p.dashT > 0;
  p.moveAmt += ((movingNow ? 1 : 0) - p.moveAmt) * Math.min(1, dt * 12);
  p.walkT += dt * (8 + spdNow * 0.018);
  p.recoilT = Math.max(0, p.recoilT - dt);

  // hub interactions
  if (state === "hub") {
    if (p.x > HUB.exitX - HUB.exitW / 2 && p.x < HUB.exitX + HUB.exitW / 2 && p.y < HUB.exitY + HUB.exitH + p.r) {
      startRun();
    }
    // gamepad confirm at hub terminals (the touch/keyboard path uses key/mouse handlers)
    if (c.interact) hubInteract(p);
  }
  // fountain rest stop: approach the spring to heal 30% (once, per player)
  if (state === "play" && roomType === "fountain" && !p.fountainUsed &&
      dist(p.x, p.y, CONFIG.arenaW / 2, CONFIG.arenaH * 0.5) < 52) {
    p.fountainUsed = true;
    const h = Math.round(p.maxHp * 0.3);
    p.hp = Math.min(p.maxHp, p.hp + h);
    dnum(p.x, p.y - 20, "+" + h, "#66ffe0", true);
    burst(CONFIG.arenaW / 2, CONFIG.arenaH * 0.5, "#66ffe0", 30, 220, 0.8, 3);
    toast(p.tag + " SYSTEMS RESTORED +30%", "#66ffe0");
    audio.buy();
  }
  // doors
  if (state === "play" && roomClear) {
    for (const d of doors) {
      if (Math.abs(p.x - d.x) < d.w / 2 + p.r && p.y < d.y + d.h / 2 + p.r + 6) {
        enterDoor(d);
        break;
      }
    }
  }
  // pickups (cores/currency shared; HP picks heal the gathering player)
  for (const pk of pickups) {
    const dd = dist(p.x, p.y, pk.x, pk.y);
    if (dd < 90) { // magnet
      const a = angTo(pk.x, pk.y, p.x, p.y);
      pk.vx += Math.cos(a) * 900 * dt; pk.vy += Math.sin(a) * 900 * dt;
    }
    if (dd < p.r + 10) {
      if (pk.kind === "core") {
        const g = coreGain(1);
        if (g > 0) { coreFloatN += g; if (coreFloatT <= 0) coreFloatT = 0.3; } // aggregated "+N ⬡" float
        audio.pickupSnd();
      }
      else { p.hp = Math.min(p.maxHp, p.hp + 8); dnum(p.x, p.y - 16, "+8", "#66ff99", false); audio.pickupSnd(); }
      pk.t = -1;
      burst(pk.x, pk.y, pk.kind === "core" ? "#ffcc44" : "#66ff99", 6, 120, 0.3, 2);
    }
  }
}

/* gentle soft separation so two co-op androids don't fully stack */
function separatePlayers(p) {
  if (players.length < 2) return;
  for (const o of players) {
    if (o === p || o.downed) continue;
    const d = dist(p.x, p.y, o.x, o.y), min = p.r + o.r;
    if (d < min && d > 0.001) {
      const nx = (p.x - o.x) / d, ny = (p.y - o.y) / d, push = (min - d) * 0.5;
      p.x += nx * push; p.y += ny * push;
    }
  }
}

/* hub terminal interaction for a gamepad-driven player (mirrors the key/mouse path) */
function hubInteract(p) {
  if (dist(p.x, p.y, HUB.termX, HUB.termY) < HUB.termR + 30) { openShop(); return; }
  if (dist(p.x, p.y, HUB.heatX, HUB.heatY) < HUB.heatR + 30) { openHeat(); return; }
  if (dist(p.x, p.y, HUB.rackX, HUB.rackY) < HUB.rackR + 30) { p.idx === 1 ? cycleWeaponP2() : cycleWeapon(); return; }
  if (dist(p.x, p.y, HUB.statX, HUB.statY) < HUB.statR + 30) { openStats(); return; }
}

/* downed player: lies still, no actions; the partner revives by standing close ~3s */
const REVIVE_TIME = 3;
function updateDowned(p, dt) {
  p.vx *= Math.pow(0.02, dt); p.vy *= Math.pow(0.02, dt);
  p.x += p.vx * dt; p.y += p.vy * dt;
  collidePillars(p); collideArena(p);
  p.ifr = Math.max(0, p.ifr - dt);
  // a non-downed partner standing nearby fills the revive ring
  let reviver = null;
  for (const o of players) {
    if (o === p || o.downed || o.hp <= 0) continue;
    if (dist(o.x, o.y, p.x, p.y) < p.r + o.r + 26) { reviver = o; break; }
  }
  if (reviver) {
    p.reviveT += dt;
    if (Math.random() < dt * 8) ffx.spawnLight(p.x, p.y, 50, "#66ff99", 0.4);
    if (p.reviveT >= REVIVE_TIME) reviveP(p);
  } else {
    p.reviveT = Math.max(0, p.reviveT - dt * 0.6); // decays if left alone
  }
}
function reviveP(p) {
  p.downed = false; p.reviveT = 0;
  p.hp = Math.max(1, Math.round(p.maxHp * 0.4));
  p.ifr = Math.max(p.ifr, 1.2);
  p.vx = 0; p.vy = 0;
  burst(p.x, p.y, "#66ff99", 28, 240, 0.7, 3);
  ffx.ring(p.x, p.y, 70, "#66ff99", 0.6, 5);
  toast(p.tag + " 复活 — REVIVED", "#66ff99");
  audio.boon();
}

/* ---------------- §Q UPDATE: ENEMIES ---------------- */
function seekVec(e, tx, ty) {
  const a = angTo(e.x, e.y, tx, ty);
  return { x: Math.cos(a), y: Math.sin(a), a };
}

function enemyContact(e, dmg, dt) {
  e.contactCD = Math.max(0, e.contactCD - dt);
  if (e.contactCD > 0) return;
  for (const p of players) {
    if (p.downed || p.hp <= 0) continue;
    if (dist(e.x, e.y, p.x, p.y) < e.r + p.r) {
      damagePlayer(dmg * eDmgMul() * (e.elite ? 1.35 : 1), angTo(e.x, e.y, p.x, p.y), e, p);
      e.contactCD = 0.5;
      break;
    }
  }
}

function updateEnemy(e, dt) {
  e.flash = Math.max(0, e.flash - dt);
  e.spawnT = Math.max(0, e.spawnT - dt);
  if (e.spawnT > 0) return;
  if ((e.sdCD || 0) > 0) e.sdCD -= dt;
  if ((e.hazCD || 0) > 0) e.hazCD -= dt;
  if ((e.markT || 0) > 0) e.markT -= dt; // TRACER FIRE damage-amp mark
  // BURN: damage-over-time ticks (works alongside any state)
  if ((e.burnT || 0) > 0) {
    e.burnT -= dt;
    e.burnTick -= dt;
    if (e.burnTick <= 0) {
      e.burnTick = 0.5;
      statusDamage(e, e.burnDps * 0.5 * e.burnStacks, "#ff8844");
      if (Math.random() < 0.35) audio.burnCrackle();
      if (e.hp <= 0) return;
    }
    if (Math.random() < dt * 7) {
      addPart({ x: e.x + rand(-e.r, e.r), y: e.y + rand(-e.r, e.r), vx: rand(-15, 15), vy: -rand(30, 70), t: 0.45, tm: 0.45, col: Math.random() < 0.5 ? "#ff8844" : "#ffcc66", r: rand(1.5, 3), drag: 1 });
    }
    if (e.burnT <= 0) { e.burnStacks = 0; e.burnDps = 0; }
  }
  // POISON: a stacking DoT that ramps with stacks and lingers (works alongside any state)
  if ((e.poisonT || 0) > 0) {
    e.poisonT -= dt;
    e.poisonTick -= dt;
    if (e.poisonTick <= 0) {
      e.poisonTick = 0.6;
      // ramps with stacks: each stack adds a little more than linear so deep stacks bite
      const stacks = e.poisonStacks || 0;
      const ramp = stacks * (1 + 0.10 * (stacks - 1)); // mild super-linear ramp, clamped by poisonMaxStacks
      statusDamage(e, e.poisonDps * 0.6 * ramp, "#7fff5a");
      if (e.hp <= 0) return;
    }
    if (Math.random() < dt * 6) {
      addPart({ x: e.x + rand(-e.r, e.r), y: e.y + rand(-e.r, e.r), vx: rand(-10, 10), vy: -rand(20, 50), t: 0.5, tm: 0.5, col: Math.random() < 0.5 ? "#7fff5a" : "#3fce3a", r: rand(1.4, 2.6), drag: 1 });
    }
    if (e.poisonT <= 0) { e.poisonStacks = 0; e.poisonDps = 0; }
  }
  // SHOCK: brief stun — no movement, no attacks
  if ((e.shockT || 0) > 0) {
    e.shockT -= dt;
    e.vx *= Math.pow(0.001, dt); e.vy *= Math.pow(0.001, dt);
    e.x += e.vx * dt; e.y += e.vy * dt;
    if (Math.random() < dt * 12) {
      sparkLine(e.x + rand(-e.r, e.r), e.y + rand(-e.r, e.r), e.x + rand(-e.r, e.r), e.y + rand(-e.r, e.r), "#ffee55", 2);
    }
    collideArena(e);
    return;
  }
  if ((e.freezeImmT || 0) > 0) e.freezeImmT -= dt; // freeze-resistance window (anti perma-freeze on bosses)
  // frozen: no movement, no attacks — cheap early-out
  if (e.frozenT > 0) {
    e.frozenT -= dt;
    e.kbx *= Math.pow(0.0001, dt); e.kby *= Math.pow(0.0001, dt);
    if (Math.random() < dt * 5) {
      addPart({ x: e.x + rand(-e.r, e.r), y: e.y + rand(-e.r, e.r), vx: 0, vy: 26, t: 0.4, tm: 0.4, col: "#bfe8ff", r: rand(1.5, 3), drag: 0 });
    }
    // when a boss thaws, it briefly resists being re-frozen so it can't be perma-locked
    if (e.frozenT <= 0 && e.type === "boss") e.freezeImmT = 2.6;
    collideArena(e);
    return;
  }
  // knockback decay
  e.x += e.kbx * dt; e.y += e.kby * dt;
  e.kbx *= Math.pow(0.0001, dt); e.kby *= Math.pow(0.0001, dt);
  if ((e.gravSlow || 0) > 0) e.gravSlow = Math.max(0, e.gravSlow - dt); // EVENT HORIZON slow lingers
  const p = targetFor(e) || player; // co-op: aggro the nearest living player
  e._tgt = p;
  const d = dist(e.x, e.y, p.x, p.y);

  if (e.type === "chaser") {
    e.cd = Math.max(0, e.cd - dt);
    if (e.state === "seek") {
      const v = seekVec(e, p.x, p.y);
      e.vx = v.x * e.speed; e.vy = v.y * e.speed;
      if (d < 150 && e.cd <= 0) { e.state = "wind"; e.t = 0.45; }
      enemyContact(e, 8, dt);
    } else if (e.state === "wind") {
      e.vx *= 0.85; e.vy *= 0.85;
      if (e.t > 0.15) { const v = seekVec(e, p.x, p.y); e.dirX = v.x; e.dirY = v.y; }
      e.t -= dt;
      if (e.t <= 0) {
        e.state = "lunge"; e.t = 0.3;
        e.vx = e.dirX * 460; e.vy = e.dirY * 460;
        audio.noise && audio.ok() && audio.noise(audio.ctx.currentTime, 0.12, 0.08, "bandpass", 1200, 400);
      }
    } else if (e.state === "lunge") {
      e.t -= dt;
      enemyContact(e, 13, dt);
      if (e.t <= 0) { e.state = "seek"; e.cd = rand(1.0, 1.6); e.vx *= 0.3; e.vy *= 0.3; }
    }
  } else if (e.type === "shooter") {
    e.cd = Math.max(0, e.cd - dt);
    if (e.state === "seek") {
      let mx = 0, my = 0;
      const v = seekVec(e, p.x, p.y);
      if (d < 190) { mx = -v.x; my = -v.y; }
      else if (d > 300) { mx = v.x; my = v.y; }
      else { mx = -v.y * e.strafe; my = v.x * e.strafe; if (Math.random() < dt * 0.5) e.strafe *= -1; }
      e.vx = lerp(e.vx, mx * e.speed, 6 * dt);
      e.vy = lerp(e.vy, my * e.speed, 6 * dt);
      if (e.cd <= 0 && d < 480) { e.state = "charge"; e.t = 0.6; }
    } else if (e.state === "charge") {
      e.vx *= 0.9; e.vy *= 0.9;
      e.t -= dt;
      if (e.t <= 0) {
        const a = angTo(e.x, e.y, p.x, p.y);
        fireEbolt(e.x, e.y, a, 270 + depth * 5, 10, "#cc66ff");
        if (depth >= 8) { fireEbolt(e.x, e.y, a + 0.25, 270, 10, "#cc66ff"); fireEbolt(e.x, e.y, a - 0.25, 270, 10, "#cc66ff"); }
        audio.bolt();
        e.state = "seek"; e.cd = rand(1.4, 2.2);
      }
    }
    enemyContact(e, 6, dt);
  } else if (e.type === "tank") {
    e.cd = Math.max(0, e.cd - dt);
    if (e.state === "seek") {
      const v = seekVec(e, p.x, p.y);
      e.vx = v.x * e.speed; e.vy = v.y * e.speed;
      if (d < 130 && e.cd <= 0) { e.state = "slam"; e.t = 0.85; }
      enemyContact(e, 10, dt);
    } else if (e.state === "slam") {
      e.vx = 0; e.vy = 0;
      e.t -= dt;
      if (e.t <= 0) {
        const R = 125;
        burst(e.x, e.y, "#ffaa33", 36, 360, 0.6, 4);
        shake(8, 0.35);
        audio.enemyDie(true);
        if (dist(e.x, e.y, p.x, p.y) < R + p.r) {
          damagePlayer(18 * eDmgMul(), angTo(e.x, e.y, p.x, p.y), e);
        }
        e.state = "seek"; e.cd = rand(2.0, 2.8);
      }
    }
  } else if (e.type === "swarmer") {
    e.phase += dt * 7;
    const v = seekVec(e, p.x, p.y);
    const wob = Math.sin(e.phase) * 0.7;
    e.vx = (v.x + -v.y * wob) * e.speed * 0.72;
    e.vy = (v.y + v.x * wob) * e.speed * 0.72;
    enemyContact(e, 6, dt);
  } else if (e.type === "bomber") {
    // scuttles at the player; close range arms a beeping fuse, then detonates (hurts everyone)
    if (e.state === "fuse") {
      const v = seekVec(e, p.x, p.y);
      e.vx = v.x * e.speed * 0.35; e.vy = v.y * e.speed * 0.35;
      e.t -= dt;
      if (!e.beeped && e.t < 0.45) { e.beeped = true; audio.bombBeep(); }
      if (e.t <= 0) { explodeBomber(e); return; }
    } else {
      e.phase += dt * 11;
      const v = seekVec(e, p.x, p.y);
      const wob = Math.sin(e.phase) * 0.5;
      e.vx = (v.x + -v.y * wob) * e.speed;
      e.vy = (v.y + v.x * wob) * e.speed;
      enemyContact(e, 6, dt);
      if (d < 95) { e.state = "fuse"; e.t = 1.0; e.beeped = false; audio.bombBeep(); }
    }
  } else if (e.type === "shield") {
    // shield faces the player but turns slowly — flank, freeze, shock or knock it back
    e.exposeT = Math.max(0, (e.exposeT || 0) - dt);
    const turn = 1.7 * dt;
    e.shieldA += clamp(angDiff(e.shieldA, angTo(e.x, e.y, p.x, p.y)), -turn, turn);
    const v = seekVec(e, p.x, p.y);
    const wantSpd = d > 60 ? 1 : 0.2;
    e.vx = lerp(e.vx, v.x * e.speed * wantSpd, 4 * dt);
    e.vy = lerp(e.vy, v.y * e.speed * wantSpd, 4 * dt);
    enemyContact(e, 9, dt);
  } else if (e.type === "medic") {
    // hovers behind others, beam-heals the most damaged ally
    let tgt = null, worst = 0.999;
    for (const o of enemies) {
      if (o === e || o.hp <= 0 || o.type === "medic") continue;
      const fr = o.hp / o.maxHp;
      if (fr < worst) { worst = fr; tgt = o; }
    }
    e.healTgt = null;
    let mx = 0, my = 0;
    if (tgt) {
      const away = angTo(p.x, p.y, tgt.x, tgt.y); // hide on the far side of the patient
      const wx = clamp(tgt.x + Math.cos(away) * 80, 40, CONFIG.arenaW - 40);
      const wy = clamp(tgt.y + Math.sin(away) * 80, 40, CONFIG.arenaH - 40);
      const v = seekVec(e, wx, wy);
      const dw = dist(e.x, e.y, wx, wy);
      mx = v.x * Math.min(1, dw / 60); my = v.y * Math.min(1, dw / 60);
      if (dist(e.x, e.y, tgt.x, tgt.y) < 230) {
        e.healTgt = tgt;
        e.cd -= dt;
        if (e.cd <= 0) {
          e.cd = 0.45;
          const h = Math.max(2, Math.round((4 + depth * 1.1)));
          tgt.hp = Math.min(tgt.maxHp, tgt.hp + h);
          dnum(tgt.x, tgt.y - tgt.r, "+" + h, "#66ffcc", false);
          burst(tgt.x, tgt.y, "#66ffcc", 3, 70, 0.3, 2);
        }
      }
    } else {
      const v = seekVec(e, p.x, p.y);
      mx = -v.x; my = -v.y; // nobody to heal: flee
    }
    if (d < 150) { const v = seekVec(e, p.x, p.y); mx -= v.x * 0.8; my -= v.y * 0.8; }
    e.vx = lerp(e.vx, mx * e.speed, 5 * dt);
    e.vy = lerp(e.vy, my * e.speed, 5 * dt);
    enemyContact(e, 4, dt);
  } else if (e.type === "phantom") {
    // cloaked stalker: shimmer drift -> decloak cue (0.5s) -> dash-strike -> visible recovery
    if (e.state === "cloak") {
      e.t += dt;
      const v = seekVec(e, p.x, p.y);
      const orbit = d > 200 ? 1 : 0.3;
      e.vx = lerp(e.vx, (v.x * orbit - v.y * 0.7 * e.strafe) * e.speed, 4 * dt);
      e.vy = lerp(e.vy, (v.y * orbit + v.x * 0.7 * e.strafe) * e.speed, 4 * dt);
      if (Math.random() < dt * 0.4) e.strafe *= -1;
      if (Math.random() < dt * 3) { // faint shimmer
        addPart({ x: e.x + rand(-e.r, e.r), y: e.y + rand(-e.r, e.r), vx: 0, vy: 0, t: 0.3, tm: 0.3, col: "rgba(187,153,255,0.4)", r: rand(1, 2), drag: 0 });
      }
      if (e.t > 1.4 && d < 240) {
        e.state = "reveal"; e.t = 0.5;
        audio.phantomCue();
        burst(e.x, e.y, e.col, 10, 120, 0.4, 2.5);
      }
    } else if (e.state === "reveal") {
      e.vx *= 0.85; e.vy *= 0.85;
      const v = seekVec(e, p.x, p.y); e.dirX = v.x; e.dirY = v.y;
      e.t -= dt;
      if (e.t <= 0) {
        e.state = "strike"; e.t = 0.32;
        e.vx = e.dirX * 540; e.vy = e.dirY * 540;
        audio.dash();
      }
    } else if (e.state === "strike") {
      e.t -= dt;
      enemyContact(e, 14, dt);
      if (e.t <= 0) { e.state = "recover"; e.t = 1.1; e.vx *= 0.2; e.vy *= 0.2; }
    } else { // recover (visible, vulnerable)
      e.t -= dt;
      e.vx *= 0.95; e.vy *= 0.95;
      if (e.t <= 0) { e.state = "cloak"; e.t = 0; }
    }
  } else if (e.type === "boss") {
    // BERSERK CORES heat contract: bosses enrage at 30% HP
    if (runHeat.enrage && !e.enraged && e.hp < e.maxHp * 0.3) {
      e.enraged = true;
      e.speed *= 1.3;
      toast("ENRAGED — 狂暴!", "#ff3366");
      audio.roar();
      burst(e.x, e.y, "#ff3366", 30, 300, 0.7, 4);
      shake(8, 0.4);
    }
    if (e.kind === "summoner") updateBossSummoner(e, dt, d);
    else if (e.kind === "artillery") updateBossArtillery(e, dt, d);
    else if (e.kind === "splitter") updateBossSplitter(e, dt, d);
    else if (e.kind === "overseer") updateBossOverseer(e, dt, d);
    else if (e.kind === "juggernaut") updateBossJuggernaut(e, dt, d);
    else if (e.kind === "hexweaver") updateBossHexweaver(e, dt, d);
    else updateBoss(e, dt, d);
  }

  // hazard awareness: drift off live/arming spike tiles (knockback can still shove them in)
  for (const h of hazards) {
    if (h.kind !== "spike") continue;
    if (spikeActive(h) || spikeWarning(h)) {
      const hdx = e.x - h.x, hdy = e.y - h.y;
      if (Math.abs(hdx) < h.s + e.r + 8 && Math.abs(hdy) < h.s + e.r + 8) {
        const dd = Math.max(8, Math.hypot(hdx, hdy));
        e.vx += hdx / dd * e.speed * 1.1;
        e.vy += hdy / dd * e.speed * 1.1;
      }
    }
  }

  if ((e.gravSlow || 0) > 0) { e.vx *= 0.45; e.vy *= 0.45; } // EVENT HORIZON: pulled foes are sluggish
  if ((e.iceSlowT || 0) > 0) { e.iceSlowT -= dt; e.vx *= (1 - (e.iceSlow || 0)); e.vy *= (1 - (e.iceSlow || 0)); } // FROST WAND chill
  // WHIP CONSTRICT: rooted foe (no movement) taking ramping damage
  if ((e.constrictT || 0) > 0) {
    e.constrictT -= dt;
    const cm = e.type === "boss" ? 0.6 : 0.05; // bosses only slowed, not fully rooted
    e.vx *= cm; e.vy *= cm;
    e.constrictTick = (e.constrictTick || 0) - dt;
    if (e.constrictTick <= 0) { e.constrictTick = 0.3; statusDamage(e, (e.constrictDps || 0) * 0.3, "#ffe09a"); if (e.hp <= 0) return; }
  }
  e.x += e.vx * dt; e.y += e.vy * dt;
  if (!(e.type === "boss" && (e.state === "dash" || e.state === "charge"))) collidePillars(e);
  collideArena(e);
  // separation
  for (const o of enemies) {
    if (o === e || o.hp <= 0) continue;
    const dd = dist(e.x, e.y, o.x, o.y), min = (e.r + o.r) * 0.8;
    if (dd < min && dd > 0.01) {
      const push = (min - dd) * 0.5;
      const a = angTo(o.x, o.y, e.x, e.y);
      e.x += Math.cos(a) * push; e.y += Math.sin(a) * push;
    }
  }
}

function updateBoss(e, dt, d) {
  e.rot += dt * (e.state === "radial" ? 6 : 1.2);
  const p = e._tgt || targetFor(e) || player;
  const phase2 = e.hp < e.maxHp * 0.5;
  const cdm = (e.hard ? 0.75 : 1) * (e.enraged ? 0.65 : 1); // hard variant / enrage: faster pattern cycling
  e.cd = Math.max(0, e.cd - dt);
  if (e.state === "move") {
    const v = seekVec(e, p.x, p.y);
    const want = d > 240 ? 1 : (d < 160 ? -0.6 : 0.2);
    e.vx = lerp(e.vx, v.x * e.speed * want, 3 * dt);
    e.vy = lerp(e.vy, v.y * e.speed * want, 3 * dt);
    if (e.cd <= 0) {
      e.atk = (e.atk + 1) % 3;
      e.sub = 0;
      if (e.atk === 0) { e.state = "radial"; e.t = 0.8; }
      else if (e.atk === 1) { e.state = "aim"; e.t = 0.7; }
      else { e.state = "summon"; e.t = 0.8; audio.roar(); }
    }
  } else if (e.state === "radial") {
    e.vx *= 0.92; e.vy *= 0.92;
    e.t -= dt;
    if (e.t <= 0) {
      const volleys = (phase2 ? 4 : 3) + (e.hard ? 1 : 0);
      const n = 16 + e.tier * 2 + (e.hard ? 4 : 0);
      const baseA = e.rot + e.sub * 0.13;
      for (let i = 0; i < n; i++) {
        fireEbolt(e.x, e.y, baseA + (i / n) * TAU, 165 + e.tier * 12, 10, "#ff3366", 7);
      }
      audio.bolt();
      shake(4, 0.15);
      e.sub++;
      if (e.sub >= volleys) { e.state = "move"; e.cd = (phase2 ? 1.5 : 2.2) * cdm; }
      else e.t = 0.42;
    }
  } else if (e.state === "aim") {
    e.vx *= 0.9; e.vy *= 0.9;
    if (e.t > 0.18) { const v = seekVec(e, p.x, p.y); e.dirX = v.x; e.dirY = v.y; }
    e.t -= dt;
    if (e.t <= 0) {
      e.state = "dash"; e.t = 0.6;
      e.vx = e.dirX * (520 + e.tier * 30); e.vy = e.dirY * (520 + e.tier * 30);
      audio.dash();
    }
  } else if (e.state === "dash") {
    e.t -= dt;
    enemyContact(e, 18, dt);
    addPart({ x: e.x + rand(-20, 20), y: e.y + rand(-20, 20), vx: 0, vy: 0, t: 0.3, tm: 0.3, col: "#ff3366", r: rand(2, 5), drag: 1 });
    const A = CONFIG;
    if (e.x < 70 || e.x > A.arenaW - 70 || e.y < 70 || e.y > A.arenaH - 70 || e.t <= 0) {
      e.state = "move"; e.cd = (phase2 ? 1.2 : 1.9) * cdm;
      e.vx *= 0.2; e.vy *= 0.2;
      shake(6, 0.25);
    }
  } else if (e.state === "summon") {
    e.vx *= 0.9; e.vy *= 0.9;
    e.t -= dt;
    if (e.t <= 0) {
      const n = phase2 ? 5 : 4;
      for (let i = 0; i < n; i++) {
        const a = (i / n) * TAU + e.rot;
        const x = clamp(e.x + Math.cos(a) * 110, 50, CONFIG.arenaW - 50);
        const y = clamp(e.y + Math.sin(a) * 110, 50, CONFIG.arenaH - 50);
        spawnQ.push({ type: Math.random() < 0.75 ? "swarmer" : "chaser", x, y, t: 0.8 });
      }
      // hard pairing: a radial burst alongside the summon
      if (e.hard) {
        for (let i = 0; i < 12; i++) fireEbolt(e.x, e.y, (i / 12) * TAU + e.rot, 170, 9, "#ff3366", 6);
      }
      e.state = "move"; e.cd = (phase2 ? 2.0 : 3.0) * cdm;
    }
  }
  enemyContact(e, 14, dt);
}

/* --- VOIDCALLER: teleports, spawns adds, radial bursts --- */
function updateBossSummoner(e, dt, d) {
  const p = e._tgt || targetFor(e) || player;
  const phase2 = e.hp < e.maxHp * 0.5;
  const cdm = (e.hard ? 0.75 : 1) * (phase2 ? 0.85 : 1) * (e.enraged ? 0.65 : 1);
  e.rot += dt * 2.2;
  e.cd = Math.max(0, e.cd - dt);
  if (e.state === "move") {
    const v = seekVec(e, p.x, p.y);
    const want = d > 330 ? 0.8 : (d < 230 ? -0.9 : 0.1);
    e.vx = lerp(e.vx, (v.x * want - v.y * 0.6 * e.strafe) * e.speed, 3 * dt);
    e.vy = lerp(e.vy, (v.y * want + v.x * 0.6 * e.strafe) * e.speed, 3 * dt);
    if (Math.random() < dt * 0.3) e.strafe *= -1;
    if (e.cd <= 0) {
      e.atk = (e.atk + 1) % 3;
      e.sub = 0;
      if (e.atk === 0) {
        e.state = "tele"; e.t = 0.55;
        let tx = 0, ty = 0, tries = 0;
        do {
          const a = rand(0, TAU), rr = rand(200, 340);
          tx = clamp(p.x + Math.cos(a) * rr, 70, CONFIG.arenaW - 70);
          ty = clamp(p.y + Math.sin(a) * rr, 70, CONFIG.arenaH - 70);
        } while (pointInPillar(tx, ty, e.r) && tries++ < 20);
        e.tx = tx; e.ty = ty;
      } else if (e.atk === 1) {
        e.state = "summon"; e.t = 0.9;
        audio.bossRoar("summoner");
      } else {
        e.state = "burst"; e.t = 0.7;
      }
    }
  } else if (e.state === "tele") {
    e.vx *= 0.85; e.vy *= 0.85;
    e.t -= dt;
    if (e.t <= 0) {
      burst(e.x, e.y, e.col, 18, 240, 0.5, 3);
      e.x = e.tx; e.y = e.ty;
      burst(e.x, e.y, e.col, 24, 260, 0.6, 3);
      audio.dash();
      const n = 8 + e.tier * 2 + (e.hard ? 4 : 0); // arrival burst (hard pairing: denser)
      const a0 = angTo(e.x, e.y, p.x, p.y);
      for (let i = 0; i < n; i++) fireEbolt(e.x, e.y, a0 + (i / n) * TAU, 185 + e.tier * 10, 9, e.col, 6);
      audio.bolt();
      e.state = "move"; e.cd = rand(1.3, 1.8) * cdm;
    }
  } else if (e.state === "summon") {
    e.vx *= 0.88; e.vy *= 0.88;
    e.t -= dt;
    if (e.t <= 0) {
      const n = (phase2 ? 4 : 3) + (e.hard ? 1 : 0);
      for (let i = 0; i < n; i++) {
        const a = (i / n) * TAU + e.rot;
        const x = clamp(e.x + Math.cos(a) * 120, 50, CONFIG.arenaW - 50);
        const y = clamp(e.y + Math.sin(a) * 120, 50, CONFIG.arenaH - 50);
        spawnQ.push({ type: Math.random() < 0.5 ? "swarmer" : (Math.random() < 0.6 ? "chaser" : "shooter"), x, y, t: 0.8 });
      }
      e.state = "move"; e.cd = rand(2.2, 3.0) * cdm;
    }
  } else if (e.state === "burst") {
    e.vx *= 0.9; e.vy *= 0.9;
    e.t -= dt;
    if (e.t <= 0) {
      const volleys = phase2 ? 3 : 2;
      const n = 12 + e.tier * 2;
      const baseA = e.rot * 3 + e.sub * 0.21;
      for (let i = 0; i < n; i++) fireEbolt(e.x, e.y, baseA + (i / n) * TAU, 170 + e.tier * 10, 10, e.col, 6);
      audio.bolt();
      shake(3, 0.12);
      e.sub++;
      if (e.sub >= volleys) { e.state = "move"; e.cd = rand(1.8, 2.4) * cdm; }
      else e.t = 0.4;
    }
  }
  enemyContact(e, 12, dt);
}

/* --- LANCE-7: long-range lance shots with laser-sight + mortar AoE circles --- */
function updateBossArtillery(e, dt, d) {
  const p = e._tgt || targetFor(e) || player;
  const phase2 = e.hp < e.maxHp * 0.5;
  const cdm = (e.hard ? 0.75 : 1) * (phase2 ? 0.85 : 1) * (e.enraged ? 0.65 : 1);
  e.rot += dt;
  e.cd = Math.max(0, e.cd - dt);
  if (e.state === "move") {
    const v = seekVec(e, p.x, p.y);
    const want = d < 330 ? -1 : (d > 470 ? 0.5 : 0);
    e.vx = lerp(e.vx, (v.x * want - v.y * 0.5 * e.strafe) * e.speed, 3 * dt);
    e.vy = lerp(e.vy, (v.y * want + v.x * 0.5 * e.strafe) * e.speed, 3 * dt);
    if (Math.random() < dt * 0.4) e.strafe *= -1;
    if (e.cd <= 0) {
      e.atk = (e.atk + 1) % 2;
      e.sub = 0;
      if (e.atk === 0) { e.state = "aim"; e.t = 0.95; }
      else { e.state = "mortar"; e.t = 0.6; }
    }
  } else if (e.state === "aim") {
    e.vx *= 0.85; e.vy *= 0.85;
    if (e.t > 0.28) { const v = seekVec(e, p.x, p.y); e.dirX = v.x; e.dirY = v.y; } // sight locks late
    e.t -= dt;
    if (e.t <= 0) {
      const a = Math.atan2(e.dirY, e.dirX);
      fireEbolt(e.x + e.dirX * e.r, e.y + e.dirY * e.r, a, 720 + e.tier * 30, 15, "#ffd0a0", 7);
      audio.bolt();
      shake(3, 0.1);
      e.sub++;
      const volleys = (phase2 ? 2 : 1) + (e.hard ? 1 : 0);
      if (e.sub >= volleys) { e.state = "move"; e.cd = rand(1.5, 2.1) * cdm; }
      else e.t = 0.5;
    }
  } else if (e.state === "mortar") {
    e.vx *= 0.85; e.vy *= 0.85;
    e.t -= dt;
    if (e.t <= 0) {
      const k = 3 + (phase2 ? 2 : 0) + (e.hard ? 1 : 0);
      for (let i = 0; i < k; i++) {
        const ox = i === 0 ? 0 : rand(-160, 160);
        const oy = i === 0 ? 0 : rand(-130, 130);
        const tt = 1.15 + i * 0.12;
        mortars.push({
          x: clamp(p.x + ox, 50, CONFIG.arenaW - 50),
          y: clamp(p.y + oy, 50, CONFIG.arenaH - 50),
          r: 68, t: tt, tm: tt, dmg: 16, col: e.col,
        });
      }
      audio.bolt();
      if (e.hard) { // hard pairing: a snap lance with the mortar call
        const a = angTo(e.x, e.y, p.x, p.y);
        fireEbolt(e.x, e.y, a, 700, 13, "#ffd0a0", 7);
      }
      e.state = "move"; e.cd = rand(2.0, 2.6) * cdm;
    }
  }
  enemyContact(e, 12, dt);
}

/* --- MITOSIS PRIME: big brute; splits at 50% HP, fragments split once more --- */
function updateBossSplitter(e, dt, d) {
  if (e.gen < 2 && e.hp <= e.maxHp * 0.5) { splitBoss(e); return; }
  const p = e._tgt || targetFor(e) || player;
  const cdm = (e.hard ? 0.75 : 1) * (e.enraged ? 0.65 : 1);
  e.rot += dt * 0.8;
  e.cd = Math.max(0, e.cd - dt);
  if (e.state === "move") {
    const v = seekVec(e, p.x, p.y);
    e.vx = lerp(e.vx, v.x * e.speed, 4 * dt);
    e.vy = lerp(e.vy, v.y * e.speed, 4 * dt);
    enemyContact(e, 12, dt);
    if (e.cd <= 0) {
      if (d < 150) { e.state = "slam"; e.t = 0.9; }
      else if (d < 460) { e.state = "wind"; e.t = 0.55; }
    }
  } else if (e.state === "wind") {
    e.vx *= 0.86; e.vy *= 0.86;
    if (e.t > 0.18) { const v = seekVec(e, p.x, p.y); e.dirX = v.x; e.dirY = v.y; }
    e.t -= dt;
    if (e.t <= 0) {
      e.state = "lunge"; e.t = 0.42;
      const spd = 480 + e.tier * 25;
      e.vx = e.dirX * spd; e.vy = e.dirY * spd;
      audio.dash();
    }
  } else if (e.state === "lunge") {
    e.t -= dt;
    enemyContact(e, 17, dt);
    if (e.t <= 0) { e.state = "move"; e.cd = rand(1.2, 1.8) * cdm; e.vx *= 0.25; e.vy *= 0.25; }
  } else if (e.state === "slam") {
    e.vx *= 0.85; e.vy *= 0.85;
    e.t -= dt;
    if (e.t <= 0) {
      const R = 95 + e.r;
      burst(e.x, e.y, e.col, 34, 360, 0.6, 4);
      shake(8, 0.35);
      audio.enemyDie(true);
      if (dist(e.x, e.y, p.x, p.y) < R + p.r) {
        damagePlayer(20 * eDmgMul(), angTo(e.x, e.y, p.x, p.y), e);
      }
      if (e.hard) { // hard pairing: slam shockwave ring
        for (let i = 0; i < 10; i++) fireEbolt(e.x, e.y, (i / 10) * TAU, 200, 9, e.col, 6);
      }
